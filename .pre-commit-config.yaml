minimum_pre_commit_version: "4.5.1"
repos:
  - repo: local
    hooks:
      # Run the rules lane and the syntax-check lane as two concurrent
      # ansible-lint processes. Sequentially the full lint is ~18s; in
      # parallel it's ~6s on a multi-core box. `set -e` makes the hook
      # fail fast if either lane errors. Pre-commit passes filenames
      # relative to the repo root; we strip the src/host-configuration/ansible/
      # prefix after cd-ing so ansible-lint resolves them against its
      # config dir. The trailing `--` becomes $0 so "$@" is exactly the
      # filename list pre-commit appended.
      - id: ansible-lint
        name: ansible-lint (parallel rules + syntax-check)
        entry: |
          bash -lc '
            set -e
            cd src/host-configuration/ansible
            # Pin fact caching to memory and disable gather_facts for the
            # duration of the hook. The syntax-check lane would otherwise write
            # to .cache/facts/ via ansible.cfg's jsonfile cache plugin, which
            # races with pre-commit's stash/restore of unstaged files. The
            # disk cache remains authoritative for real playbook runs.
            export ANSIBLE_CACHE_PLUGIN=memory
            export ANSIBLE_GATHERING=explicit
            files=()
            for f in "$@"; do files+=("${f#src/host-configuration/ansible/}"); done
            [ ${#files[@]} -eq 0 ] && exit 0
            ansible-lint --tags command-shell,core,deprecations,formatting,idempotency,idiom,metadata,security,unpredictability,yaml,custom "${files[@]}" &
            rules_pid=$!
            ansible-lint --tags syntax "${files[@]}" &
            syntax_pid=$!
            wait $rules_pid
            wait $syntax_pid
          ' --
        language: system
        files: ^src/host-configuration/ansible/
        pass_filenames: true
