name: GitHub CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 24.15.0
  PNPM_VERSION: 10.33.0
  VITE_PLUS_VERSION: 0.1.16

jobs:
  viteplus:
    name: Vite+ monorepo
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Cache Vite+ global toolchain
        uses: actions/cache@v4
        with:
          key: ${{ github.repository }}-viteplus-global-node${{ env.NODE_VERSION }}-vp-${{ env.VITE_PLUS_VERSION }}
          path: /home/runner/.npm-global

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          key: ${{ github.repository }}-viteplus-pnpm-store-node${{ env.NODE_VERSION }}-${{ hashFiles('src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: /home/runner/.pnpm-store

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          key: ${{ github.repository }}-viteplus-node-modules-node${{ env.NODE_VERSION }}-${{ hashFiles('src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: src/viteplus-monorepo/node_modules

      - name: Configure Vite+ toolchain
        run: |
          set -euo pipefail
          npm config set prefix "$HOME/.npm-global"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.npm-global/bin:$PATH"
          if ! command -v vp >/dev/null 2>&1; then
            npm install -g "vite-plus@${VITE_PLUS_VERSION}"
          fi
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          pnpm config set store-dir "$HOME/.pnpm-store" --global
          node --version
          pnpm --version
          vp --version

      - name: Install JS dependencies
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          vp install --frozen-lockfile --prefer-offline

      - name: Build workspace
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          pnpm exec vp run -r --no-cache build
