name: GitHub CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build + test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache Bazel disk + repo
        uses: actions/cache@v5
        with:
          key: ${{ github.repository }}-bazel-${{ github.sha }}
          restore-keys: |
            ${{ github.repository }}-bazel-
          path: |
            ~/.cache/bazel-disk
            ~/.cache/bazel-repo

      - name: Bootstrap toolchain
        run: scripts/bootstrap

      - name: bazelisk build //...
        run: bazelisk build //...

      - name: bazelisk test //...
        run: bazelisk test //...
