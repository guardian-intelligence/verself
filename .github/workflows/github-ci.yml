name: GitHub CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  viteplus:
    name: Vite+ monorepo
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # vp ships its own Node runtime under ~/.vite-plus and owns the
      # lockfile/catalog resolution path. Caching the install dir keeps the
      # Node + workspace toolchain warm across runs at the same vp version
      # the lockfile pins.
      - name: Cache Vite+ toolchain
        uses: actions/cache@v5
        with:
          key: ${{ github.repository }}-vite-plus-${{ hashFiles('src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: ~/.vite-plus

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          key: ${{ github.repository }}-viteplus-node-modules-${{ hashFiles('src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: src/viteplus-monorepo/node_modules

      - name: Install Vite+
        run: |
          set -euo pipefail
          curl -fsSL https://vite.plus | bash
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Install JS dependencies
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          vp install --frozen-lockfile --prefer-offline
          vp --version

      - name: Build workspace
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          vp run -r --no-cache build
