name: Blacksmith runner canary

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runner-canary:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Mount Vite+ global toolchain
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-viteplus-global-node24-vp-0.1.16
          path: ~/.npm-global

      - name: Mount pnpm store
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-viteplus-pnpm-store-node24-${{ hashFiles('src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: ~/.pnpm-store

      - name: Mount node_modules
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-viteplus-node-modules-node24-${{ hashFiles('src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: src/viteplus-monorepo/node_modules

      - name: Configure Vite+ toolchain
        run: |
          set -euo pipefail
          npm config set prefix "$HOME/.npm-global"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.npm-global/bin:$PATH"
          if ! command -v vp >/dev/null 2>&1; then
            npm install -g vite-plus@0.1.16
          fi
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm config set store-dir "$HOME/.pnpm-store" --global
          vp --version
          pnpm --version

      - name: Install JS dependencies with Vite+
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          vp install --frozen-lockfile --prefer-offline

      - name: Build rent-a-sandbox with Vite+
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          vp run @forge-metal/rent-a-sandbox#build
