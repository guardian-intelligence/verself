name: Verself runner canary

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runner-canary:
    runs-on: verself-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: guardian-intelligence/verself/.github/actions/checkout@main

      - name: Setup Node.js
        uses: guardian-intelligence/verself/.github/actions/setup-node@main
        with:
          node-version: 24
          package-manager: pnpm
          working-directory: src/viteplus-monorepo
          cache: true
          node-modules: true

      - name: Prime cached pnpm paths
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          store_dir="$(pnpm store path)"
          mkdir -p "${store_dir}/verself-canary" "node_modules/.verself-canary"
          printf 'run=%s\nsha=%s\n' "${GITHUB_RUN_ID}" "${GITHUB_SHA}" >"${store_dir}/verself-canary/marker.txt"
          printf 'run=%s\nsha=%s\n' "${GITHUB_RUN_ID}" "${GITHUB_SHA}" >"node_modules/.verself-canary/marker.txt"
          printf 'store=%s\n' "${store_dir}"

      - name: Read cached markers
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          store_dir="$(pnpm store path)"
          cat "${store_dir}/verself-canary/marker.txt"
          cat "node_modules/.verself-canary/marker.txt"
