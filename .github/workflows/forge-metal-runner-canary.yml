name: Forge Metal runner canary

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runner-canary:
    runs-on: metal-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: guardian-intelligence/forge-metal/.github/actions/checkout@main

      - name: Setup Node.js
        uses: guardian-intelligence/forge-metal/.github/actions/setup-node@main
        with:
          node-version: 24
          package-manager: pnpm
          working-directory: src/viteplus-monorepo
          cache: true
          node-modules: true

      - name: Install JS dependencies with Vite+
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          vp install --frozen-lockfile --prefer-offline

      - name: Build rent-a-sandbox with Vite+
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          vp run @forge-metal/rent-a-sandbox#build
