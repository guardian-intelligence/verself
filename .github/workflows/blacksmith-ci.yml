name: Blacksmith CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 24.15.0
  PNPM_VERSION: 10.33.0

jobs:
  viteplus:
    name: Vite+ monorepo
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Mount pnpm store
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-viteplus-pnpm-store-node${{ env.NODE_VERSION }}-${{ hashFiles('src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: /home/runner/.pnpm-store

      - name: Mount node_modules
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-viteplus-node-modules-node${{ env.NODE_VERSION }}-${{ hashFiles('src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: src/viteplus-monorepo/node_modules

      - name: Configure pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          pnpm config set store-dir "$HOME/.pnpm-store" --global
          node --version
          pnpm --version

      - name: Install JS dependencies
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile --prefer-offline
          pnpm exec vp --version

      - name: Build workspace
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          pnpm exec vp run -r --no-cache build
