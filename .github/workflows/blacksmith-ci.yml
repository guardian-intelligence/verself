name: Blacksmith CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  viteplus:
    name: Vite+ monorepo
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Mount Bazel disk cache
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-bazel-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: /home/runner/.cache/bazel-disk

      - name: Mount Bazel repo cache
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-bazel-repo-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: /home/runner/.cache/bazel-repo

      - name: Mount Vite+ toolchain
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-vite-plus-${{ hashFiles('src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: /home/runner/.vite-plus

      - name: Bootstrap toolchain
        run: |
          set -euo pipefail
          scripts/bootstrap
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: vp install
        working-directory: src/viteplus-monorepo
        run: vp install --frozen-lockfile --prefer-offline

      - name: vp build
        working-directory: src/viteplus-monorepo
        run: vp run -r --no-cache build

      - name: bazelisk build (packages + per-app OTel preload)
        run: |
          set -euo pipefail
          bazelisk build \
            //src/viteplus-monorepo/packages/... \
            //src/viteplus-monorepo/apps/verself-web:app_entry_bundle \
            //src/viteplus-monorepo/apps/company:app_entry_bundle

      - name: bazelisk test (openapi drift gate)
        run: bazelisk test //src/viteplus-monorepo/apps/verself-web:openapi_clients_tests
