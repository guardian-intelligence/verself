name: Blacksmith CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build + test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Mount Bazel disk cache
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-bazel-disk
          path: /home/runner/.cache/bazel-disk

      - name: Mount Bazel repo cache
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-bazel-repo
          path: /home/runner/.cache/bazel-repo

      - name: Bootstrap toolchain
        run: scripts/bootstrap

      - name: bazelisk build //...
        run: bazelisk build //...

      - name: bazelisk test //...
        run: bazelisk test //...
