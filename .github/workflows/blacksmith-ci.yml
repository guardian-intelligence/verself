name: Blacksmith CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  viteplus:
    name: Vite+ monorepo
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Mount Vite+ toolchain
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-vite-plus-${{ hashFiles('src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: /home/runner/.vite-plus

      - name: Mount node_modules
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-viteplus-node-modules-${{ hashFiles('src/viteplus-monorepo/pnpm-lock.yaml') }}
          path: src/viteplus-monorepo/node_modules

      - name: Install Vite+
        run: |
          set -euo pipefail
          curl -fsSL https://vite.plus | bash
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Install JS dependencies
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          vp install --frozen-lockfile --prefer-offline
          vp --version

      - name: Build workspace
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          vp run -r --no-cache build
