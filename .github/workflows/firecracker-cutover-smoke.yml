name: Firecracker Cutover Static Asserts

# Source-tree-only assertions for the substrate + toolchain + bridge
# cleanup landed on main. Builds vm-orchestrator + vm-bridge under
# both build tags with -trimpath, scans the binaries for forbidden
# env strings, asserts BUILD.bazel cross-references. Runs in ~90s on
# Blacksmith with no SSH, no Ansible, no SOPS, no prod tooling.
#
# Live deploy + ClickHouse-trace verification is done separately by
# the operator via `src/platform/scripts/verify-sandbox-live.sh` from a
# workstation that already has the full controller toolchain pinned.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/vm-orchestrator/**"
      - "src/platform/scripts/verify-firecracker-cutover-static.sh"
      - ".github/workflows/firecracker-cutover-smoke.yml"

permissions:
  contents: read

concurrency:
  group: firecracker-cutover-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Cutover static asserts
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/vm-orchestrator/go.mod
          cache: false

      - name: Run static asserts
        run: src/platform/scripts/verify-firecracker-cutover-static.sh
