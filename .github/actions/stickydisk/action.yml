name: Forge Metal Sticky Disk
description: Verify a pre-mounted Forge Metal sticky disk path and queue ZFS persistence after the job exits.
inputs:
  key:
    description: Sticky disk key.
    required: true
  path:
    description: Path to verify and persist.
    required: true
runs:
  using: node24
  main: dist/index.js
  post: dist/index.js
