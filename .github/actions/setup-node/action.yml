name: Verself Setup Node
description: Configure Node.js and preboot Verself sticky disks for pnpm workloads.
inputs:
  node-version:
    description: Node.js major or exact version expected in the runner image.
    required: true
  package-manager:
    description: Package manager to configure. This tracer bullet supports pnpm.
    required: true
  working-directory:
    description: Workspace-relative package root.
    required: false
    default: "."
  cache:
    description: Mount and save the package-manager store.
    required: false
    default: "true"
  node-modules:
    description: Mount and save node_modules for this working directory.
    required: false
    default: "false"
outputs:
  cache-hit:
    description: "true when all configured Verself cache paths had warm contents."
  store-cache-hit:
    description: "true when the package-manager store had warm contents."
  node-modules-cache-hit:
    description: "true when node_modules had warm contents."
runs:
  using: node24
  main: dist/index.js
  post: dist/index.js
  post-if: success()
