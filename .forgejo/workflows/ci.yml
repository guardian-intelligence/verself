name: Forgejo CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: 24.15.0
  PNPM_VERSION: 10.33.0

jobs:
  viteplus:
    name: Vite+ monorepo
    runs-on: [self-hosted, linux, x64, verself-4vcpu-ubuntu-2404]
    timeout-minutes: 15
    steps:
      - name: Check out repository
        run: |
          set -euo pipefail
          workspace="${FORGEJO_WORKSPACE:-${GITHUB_WORKSPACE:-}}"
          if [ -z "$workspace" ] || [ "$workspace" = "/" ]; then
            echo "invalid Forgejo workspace: ${workspace:-<empty>}" >&2
            exit 1
          fi
          mkdir -p "$workspace"
          cd "$workspace"
          server_url="${VERSELF_HOST_SERVICE_HTTP_ORIGIN:-${FORGEJO_SERVER_URL:?}}"
          repo_url="${server_url%/}/${FORGEJO_REPOSITORY:?}.git"
          if [ -d .git ]; then
            git remote set-url origin "$repo_url"
          else
            if [ -n "$(find . -mindepth 1 -maxdepth 1 -print -quit)" ]; then
              echo "Forgejo workspace is not empty and is not a Git checkout: $workspace" >&2
              exit 1
            fi
            git init
            git remote add origin "$repo_url"
          fi
          askpass="$(mktemp)"
          cleanup() { rm -f "$askpass"; }
          trap cleanup EXIT
          cat >"$askpass" <<'SH'
          #!/usr/bin/env sh
          case "$1" in
            *Username*) printf '%s\n' x-access-token ;;
            *Password*) printf '%s\n' "${FORGEJO_TOKEN:?}" ;;
            *) printf '\n' ;;
          esac
          SH
          chmod 0700 "$askpass"
          GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0 git fetch --depth=1 origin "${FORGEJO_SHA:?}"
          git -c advice.detachedHead=false checkout --detach FETCH_HEAD
          git status --short

      - name: Configure pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          pnpm config set store-dir "$HOME/.pnpm-store" --global
          node --version
          pnpm --version

      - name: Install JS dependencies
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile --prefer-offline
          pnpm exec vp --version

      - name: Build workspace
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          pnpm exec vp run -r --no-cache build
