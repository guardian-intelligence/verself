name: Forgejo CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build + test
    runs-on: [self-hosted, linux, x64, verself-4vcpu-ubuntu-2404]
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v6
        with:
          persist-credentials: false

      # Self-hosted runner; Bazel disk + repo caches are already on the host's
      # ~/.cache/bazel-* and survive between jobs without an explicit cache step.
      - name: Bootstrap toolchain
        run: scripts/bootstrap

      - name: bazelisk build //...
        run: bazelisk build //...

      - name: bazelisk test //...
        run: bazelisk test //...
