name: Forgejo CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: 24.15.0
  PNPM_VERSION: 10.33.0

jobs:
  viteplus:
    name: Vite+ monorepo
    runs-on: [self-hosted, linux, x64, verself-4vcpu-ubuntu-2404]
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: https://data.forgejo.org/actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Configure pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          pnpm config set store-dir "$HOME/.pnpm-store" --global
          node --version
          pnpm --version

      - name: Install JS dependencies
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile --prefer-offline
          pnpm exec vp --version

      - name: Build workspace
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          pnpm exec vp run -r --no-cache build
