name: Forgejo CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

jobs:
  viteplus:
    name: Vite+ monorepo
    runs-on: [self-hosted, linux, x64, verself-4vcpu-ubuntu-2404]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v6
        with:
          persist-credentials: false

      # Bazel owns the build graph. `viteplus_app` wraps `vp build` as a
      # sandboxed action; the openapi-clients write_source_files rule wraps
      # @hey-api/openapi-ts; node_modules linkage comes from
      # `npm_link_all_packages()`. So a single `bazelisk build` covers
      # source-package validation, app `.output` builds, openapi codegen
      # snapshot drift, and the deploy_bundle tarballs that get shipped.
      # No standalone vp install or pnpm step needed — Bazel resolves and
      # invokes vp inside its hermetic sandbox via the workspace
      # `node_modules` filegroup.
      - name: Install Bazelisk + Aspect
        run: |
          set -euo pipefail
          scripts/bootstrap

      - name: Build viteplus deploy_bundles + packages
        # Explicit targets instead of `//src/viteplus-monorepo/...` because
        # `:output` (viteplus_app) and `:openapi_clients_*_gen` both target
        # `src/__generated/<sdk>/` paths in bazel-out — Bazel rejects
        # prefix-overlapping outputs when both are scheduled in one
        # invocation. The deploy_bundle path is what `aspect deploy` uses
        # too, so this matches production reality.
        run: |
          set -euo pipefail
          bazelisk build \
            //src/viteplus-monorepo/packages/... \
            //src/viteplus-monorepo/apps/verself-web:deploy_bundle \
            //src/viteplus-monorepo/apps/company:deploy_bundle

      - name: Test openapi-client drift gates
        run: |
          set -euo pipefail
          bazelisk test //src/viteplus-monorepo/apps/verself-web:openapi_clients_tests
