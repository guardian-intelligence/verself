name: Forgejo CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

jobs:
  viteplus:
    name: Vite+ monorepo
    runs-on: [self-hosted, linux, x64, verself-4vcpu-ubuntu-2404]
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v6
        with:
          persist-credentials: false

      # vp is the workspace's authoritative entry point: it ships its own Node
      # runtime, owns lockfile/catalog resolution, and routes through the
      # configured registry. We never call pnpm directly — vp owns those
      # concerns. The installer is idempotent: existing ~/.vite-plus on the
      # self-hosted runner is reused, dev workstation parity is preserved.
      - name: Install Vite+
        run: |
          set -euo pipefail
          curl -fsSL https://vite.plus | bash
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Install JS dependencies
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          vp install --frozen-lockfile --prefer-offline
          vp --version

      - name: Build workspace
        working-directory: src/viteplus-monorepo
        run: |
          set -euo pipefail
          vp run -r --no-cache build
