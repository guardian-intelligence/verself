name: Forgejo CI

on:
  push:
    branches:
      - main
      - beta
      - gamma
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build + test
    runs-on: [self-hosted, linux, x64, verself-4vcpu-ubuntu-2404]
    timeout-minutes: 20
    env:
      VERSELF_NPM_REGISTRY_TOKEN: ${{ secrets.VERSELF_NPM_REGISTRY_TOKEN_FORGEJO }}
    steps:
      - name: Check out repository
        env:
          VERSELF_FORGEJO_CHECKOUT_TOKEN: ${{ secrets.VERSELF_FORGEJO_CHECKOUT_TOKEN }}
        run: |
          set -eu
          auth="$(printf 'x-access-token:%s' "$VERSELF_FORGEJO_CHECKOUT_TOKEN" | base64 | tr -d '\n')"
          git init .
          git remote add origin http://10.255.0.1:18080/guardian-intelligence/verself.git
          git -c "http.http://10.255.0.1:18080/.extraheader=AUTHORIZATION: basic $auth" fetch --no-tags --depth=1 origin "${GITHUB_SHA:?}"
          git checkout --detach FETCH_HEAD

      # Self-hosted runner; Bazel disk + repo caches are already on the host's
      # ~/.cache/bazel-* and survive between jobs without an explicit cache step.
      - name: Bootstrap toolchain
        run: scripts/bootstrap-linux-amd64

      - name: Restart Bazel server
        run: bazelisk shutdown

      - name: bazelisk build //...
        run: bazelisk build //...

      - name: bazelisk test //...
        run: bazelisk test //...
