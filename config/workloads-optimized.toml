# Optimized workloads: seeded workspace with pre-warmed caches.
# Demonstrates forge-metal's ZFS golden image advantage.

concurrency = 1
job_timeout = "10m"

[[workload]]
name = "next-learn/warm"
project = "next-learn"
source = "seeded_workspace"
workspace_path = "workspaces/next-learn"
sub_dir = "dashboard/final-example"
timeout = "5m"
weight = 1
npm_cache_hit = true
next_cache_hit = true
lockfile_changed = false
env = { NODE_COMPILE_CACHE = "/var/cache/node-compile-cache" }

[[workload.phases]]
phase = "lint"
command = ["npm", "run", "lint"]
stage = 0

[[workload.phases]]
phase = "build"
command = ["npm", "run", "build"]
stage = 1
