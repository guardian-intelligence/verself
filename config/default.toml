# forge-metal default configuration
# Override with forge-metal.toml, --config flag, or environment variables.

[controller]
listen = "0.0.0.0:8443"
grpc_listen = "0.0.0.0:9443"

[controller.queue]
# SQLite-backed job queue
db_path = "/var/lib/forge-metal/queue.db"

[agent]
heartbeat_interval = "5s"
controller_addr = ""

[agent.sandbox]
runtime = "runsc"  # gVisor
max_concurrent_jobs = 1

[clickhouse]
addr = "127.0.0.1:9000"
database = "forge_metal"
username = "default"
# password via FORGE_METAL_CLICKHOUSE_PASSWORD env var

[clickhouse.replication]
enabled = false
# cluster = "forge_metal_cluster"
# When enabled, uses ReplicatedMergeTree. Otherwise MergeTree.

[zfs]
pool = "benchpool"
golden_dataset = "golden"
ci_dataset = "ci"

[wireguard]
interface = "wg0"
listen_port = 51820
network = "10.0.0.0/16"

[latitude]
region = "ASH"
plan = "s3-large-x86"
operating_system = "ubuntu_24_04_x64_lts"
billing = "hourly"

[ssh]
private_key_path = "~/.ssh/id_ed25519"
public_key_path = "~/.ssh/id_ed25519.pub"
user = "ubuntu"
