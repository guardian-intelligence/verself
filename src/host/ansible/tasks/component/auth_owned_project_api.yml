---
- name: Select owned component Zitadel project
  ansible.builtin.set_fact:
    component_auth_project_name: "{{ component_auth_component.workload.auth.project_name }}"
    component_auth_project: >-
      {{ component_zitadel_projects_by_name.get(component_auth_component.workload.auth.project_name, {}) }}
  no_log: true

- name: Create owned component Zitadel project if missing
  ansible.builtin.uri:
    url: "http://{{ zitadel_http_address | default('127.0.0.1:8085') }}/management/v1/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ component_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ component_auth_project_name }}"
      projectRoleAssertion: "{{ component_auth_component.workload.auth.project_role_assertion }}"
      projectRoleCheck: "{{ component_auth_component.workload.auth.project_role_check }}"
    return_content: true
  register: component_auth_project_created
  when: component_auth_project == {}
  no_log: true

- name: Resolve owned component Zitadel project ID
  ansible.builtin.set_fact:
    component_auth_project_id: >-
      {{
        component_auth_project.id
        | default(component_auth_project_created.json.id, true)
      }}
  no_log: true

- name: Ensure owned component Zitadel project settings are current
  ansible.builtin.uri:
    url: "http://{{ zitadel_http_address | default('127.0.0.1:8085') }}/management/v1/projects/{{ component_auth_project_id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ component_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ component_auth_project_name }}"
      projectRoleAssertion: "{{ component_auth_component.workload.auth.project_role_assertion }}"
      projectRoleCheck: "{{ component_auth_component.workload.auth.project_role_check }}"
    status_code: 200
  when: component_auth_project != {}
  no_log: true

- name: Ensure owned component Zitadel project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ component_zitadel_admin_pat }}"
    zitadel_project_roles_project_id: "{{ component_auth_project_id }}"
    zitadel_project_roles_definitions: "{{ component_auth_component.workload.auth.roles }}"
  when: component_auth_component.workload.auth.roles | length > 0
  no_log: true

- name: Index owned component Zitadel project ID
  ansible.builtin.set_fact:
    component_zitadel_projects_by_name: >-
      {{
        component_zitadel_projects_by_name
        | combine({
          component_auth_project_name: component_auth_project
          | combine({
            "id": component_auth_project_id,
            "name": component_auth_project_name,
          })
        })
      }}
    component_auth_project_ids_by_name: >-
      {{
        component_auth_project_ids_by_name
        | combine({component_auth_project_name: component_auth_project_id})
      }}
  no_log: true
