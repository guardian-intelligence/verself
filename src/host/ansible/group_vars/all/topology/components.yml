# Authored substrate topology contract.
# Source: src/host/ansible/group_vars/all/topology
---
topology_components:
- kind: resource
  name: bazel_remote
- kind: resource
  name: clickhouse
- kind: resource
  name: electric
  nftables_rulesets:
  - name: electric
    table: verself_electric
    target: /etc/nftables.d/electric.nft
- kind: resource
  name: electric_notifications
  nftables_rulesets:
  - name: electric_notifications
    table: verself_electric_notifications
    target: /etc/nftables.d/electric-notifications.nft
- kind: privileged_daemon
  name: firecracker_host_service
- kind: protocol_backend
  name: forgejo
- kind: resource
  name: garage
  nftables_rulesets:
  - name: garage
    table: verself_garage
    target: /etc/nftables.d/garage.nft
- kind: protocol_backend
  name: grafana
  postgres:
    database: grafana
- kind: resource
  name: nats
  nftables_rulesets:
  - name: nats
    table: verself_nats
    target: /etc/nftables.d/nats.nft
- kind: resource
  name: nomad
  nftables_rulesets:
  - name: nomad
    table: verself_nomad
    target: /etc/nftables.d/nomad.nft
- kind: resource
  name: openbao
  nftables_rulesets:
  - name: openbao
    table: verself_openbao
    target: /etc/nftables.d/openbao.nft
- kind: resource
  name: otelcol
- kind: resource
  name: postgresql
- kind: resource
  name: spicedb
  deployment:
    supervisor: nomad
  postgres:
    connection_limit: 20
    database: spicedb
- kind: resource
  name: pomerium
  postgres:
    connection_limit: 20
    database: pomerium
- kind: resource
  name: spire_bundle_endpoint
- kind: resource
  name: spire_server
- kind: protocol_backend
  name: stalwart
  nftables_rulesets:
  - name: stalwart
    table: verself_stalwart
    target: /etc/nftables.d/stalwart.nft
  postgres:
    database: stalwart
- kind: resource
  name: temporal
  deployment:
    supervisor: nomad
  postgres:
    connection_limit: 80
    database: temporal
- kind: resource
  name: tigerbeetle
- kind: resource
  name: verdaccio
- kind: protocol_backend
  name: zitadel
  postgres:
    connection_limit: 15
    database: zitadel
