---
# Controller-side preflight for the canonical site deploy.
# Imported at task-level so gather_facts settings are inherited from the
# importing play.

- name: Require Ansible collection
  ansible.builtin.command: "ansible-galaxy collection list {{ item }}"
  register: controller_preflight_collection
  changed_when: false
  failed_when: "item not in controller_preflight_collection.stdout"
  loop:
    - community.general
    - ansible.posix
    - community.postgresql
  loop_control:
    label: "{{ item }}"
