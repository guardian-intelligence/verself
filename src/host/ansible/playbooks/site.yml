---
- name: "Site secrets"
  hosts: all
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - always
  tasks:
    - name: Load site secrets
      ansible.builtin.import_tasks: tasks/site-secrets.yml

- name: "Preflight: controller prerequisites"
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - preflight
    - controller
  tasks:
    - name: Run controller preflight checks
      ansible.builtin.import_tasks: tasks/controller-preflight.yml

- name: "Transitional workload accounts"
  hosts: all
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - runtime_accounts
    - workload-bindings
  tasks:
    # Nomad raw_exec tasks still run as host users. Until runtime accounts are
    # applied by per-owner deployable units, keep this Bazel-descriptor bridge.
    - name: Configure runtime accounts
      ansible.builtin.import_tasks: tasks/runtime_accounts.yml

- name: "Host bootstrap foundation"
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - bootstrap
    - foundation
  roles:
    - role: substrate_profile
      tags:
        - profile
        - packages
    - role: base
      tags:
        - base
        - packages
    - role: nftables
      tags:
        - firewall
        - network
    - role: zfs
      tags:
        - zfs

- name: "Guest image staging"
  hosts: workers
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - bootstrap
    - worker
    - firecracker
    - guest_rootfs
  roles:
    - role: guest_rootfs
      tags:
        - guest_rootfs

- name: "Preflight: Firecracker worker prerequisites"
  hosts: workers
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  become: true
  tags:
    - preflight
    - worker
    - firecracker
  tasks:
    - name: Run Firecracker worker preflight checks
      ansible.builtin.import_tasks: tasks/firecracker-preflight.yml

- name: "Worker bootstrap substrate"
  hosts: workers
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - bootstrap
    - worker
  roles:
    - role: containerd
      tags:
        - containerd
    - role: wireguard
      tags:
        - network
        - wireguard
      vars:
        wireguard_tunnels: >-
          {{
            wireguard_host_tunnel_groups.workers
            | map('extract', host_wireguard_tunnels)
            | list
          }}
    - role: firecracker
      tags:
        - firecracker

- name: "Infrastructure bootstrap networking"
  hosts: infra
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - bootstrap
    - infra
    - network
  roles:
    - role: wireguard
      tags:
        - wireguard
      vars:
        wireguard_tunnels: >-
          {{
            wireguard_host_tunnel_groups.infra
            | map('extract', host_wireguard_tunnels)
            | list
          }}

- name: "Host bootstrap daemons"
  hosts: infra
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - bootstrap
    - daemons
  roles:
    - role: postgresql
      tags:
        - postgresql
        - database
    - role: spire
      tags:
        - spire
        - identity
    - role: spire_registrations
      tags:
        - spire-registrations
        - identity
        - workload-bindings
    - role: nomad
      tags:
        - nomad
        - scheduler

- name: "Transitional workload substrate bindings"
  hosts: infra
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - workload-bindings
  tasks:
    # This is the remaining bridge from service/component-local Bazel metadata
    # to host state. It is intentionally isolated from bootstrap so it can be
    # replaced by per-owner deployable units without touching the host roles.
    - name: Configure Nomad workload substrate bindings
      ansible.builtin.import_tasks: tasks/component-substrate.yml
