---
- name: "Site secrets"
  hosts: infra
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tasks:
    - name: Load site secrets
      ansible.builtin.import_tasks: tasks/site-secrets.yml

- name: "Host service: HAProxy"
  hosts: infra
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  roles:
    - role: haproxy
