---
# Install apt-managed system packages declared in topology_system_packages.
# These intentionally bypass content pinning — each entry's
# `risk_acknowledgement` (in topology) documents why we accept upstream Ubuntu's
# archive integrity instead of sha256-pinning the binary.
#
# This is the only Ansible-side delivery channel for unpinned packages;
# every other dev tool flows through dev_tools.tar.zst (Bazel-managed),
# uv lockfile sync, or rules_go source builds.

- name: Install system packages via apt
  ansible.builtin.apt:
    name: "{{ topology_system_packages | dict2items | map(attribute='key') | list }}"
    state: present
    update_cache: true
