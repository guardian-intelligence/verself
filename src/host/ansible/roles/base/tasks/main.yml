---
# Base system configuration for all nodes.
# No package installs — all software comes from the substrate_profile role.
# This role only handles system-level configuration (ZFS, users, sudoers, etc.).

- name: Install ZFS and ext4 utilities
  ansible.builtin.apt:
    name:
      - zfsutils-linux
      - e2fsprogs
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Block algif_aead autoload for Copy Fail
  ansible.builtin.copy:
    content: |
      # Managed by Verself host.
      # CVE-2026-31431 (Copy Fail): block AF_ALG AEAD autoload until the host kernel carries the upstream fix.
      blacklist algif_aead
      install algif_aead /bin/false
    dest: /etc/modprobe.d/cve-2026-31431-copy-fail.conf
    owner: root
    group: root
    mode: "0644"

- name: Unload algif_aead if already loaded
  community.general.modprobe:
    name: algif_aead
    state: absent

- name: Check Copy Fail algif_aead autoload hardening
  ansible.builtin.command: modprobe -n -v algif_aead
  register: base_copy_fail_algif_aead_modprobe
  changed_when: false
  failed_when: base_copy_fail_algif_aead_modprobe.stdout is not search('/bin/false')

- name: Create credstore parent directory
  ansible.builtin.file:
    path: /etc/credstore
    state: directory
    owner: root
    group: root
    mode: "0711"

- name: Create verself system config directory
  ansible.builtin.file:
    path: /etc/verself
    state: directory
    owner: root
    group: root
    # 0755 so substrate users (haproxy, openbao, wireguard) can traverse
    # into their per-component config subdirs without needing
    # supplementary group membership on /etc/verself itself. The
    # contents stay tight: each subdirectory carries its own mode.
    mode: "0755"

- name: Disable unsupported GSSAPIAuthentication in ssh_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/ssh_config
    regexp: '^\s*GSSAPIAuthentication'
    line: "    # GSSAPIAuthentication yes  # disabled — not supported by this SSH build"
    backrefs: false
  register: base_ssh_gssapi_update
  failed_when: false

- name: Harden sshd configuration
  ansible.builtin.template:
    src: sshd-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/50-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sshd

# auth.<verself_domain> resolves to 127.0.0.1 so on-host services that
# validate Zitadel-issued JWTs hit the local Zitadel for OIDC discovery
# instead of routing through Cloudflare. systemd-supervised services pick
# this up via per-unit BindReadOnlyPaths over a generated
# /etc/verself/auth-discovery-hosts file. Nomad raw_exec workloads have
# no mount-namespace facility, so we add the entry directly to the host
# /etc/hosts and let both supervisors resolve via the same file.
- name: Ensure auth.<verself_domain> resolves to loopback in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 auth.{{ verself_domain }}"
    regexp: '^127\.0\.0\.1\s+auth\.{{ verself_domain | regex_escape }}\s*$'
    state: present
    owner: root
    group: root
    mode: "0644"
