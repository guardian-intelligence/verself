---
- name: Ensure nftables is installed
  ansible.builtin.apt:
    name: nftables
    state: present

- name: Create nftables config directory
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    mode: "0755"

- name: Deploy main nftables config
  ansible.builtin.copy:
    src: "{{ platform_host_files_dir }}/etc/nftables.conf"
    dest: /etc/nftables.conf
    mode: "0644"
  notify: reload nftables

- name: Load service-owned component substrate registry for nftables
  ansible.builtin.set_fact:
    nftables_component_substrate_registry: >-
      {{
        lookup('ansible.builtin.file', component_substrate_registry_file) | from_json
        if component_substrate_registry_file is defined
        else {"schema_version": 1, "components": []}
      }}

- name: Collect platform nftables source files
  ansible.builtin.set_fact:
    nftables_platform_ruleset_paths: >-
      {{
        lookup('ansible.builtin.fileglob', platform_host_files_dir + '/etc/nftables.d/*.nft', wantlist=True)
        | reject('search', '/firecracker\\.nft$')
        | sort
        | list
      }}

- name: Initialize nftables desired rulesets
  ansible.builtin.set_fact:
    nftables_rendered_rulesets: []

- name: Add platform-owned nftables rulesets
  ansible.builtin.set_fact:
    nftables_rendered_rulesets: >-
      {{
        nftables_rendered_rulesets + [{
          'basename': item | basename,
          'dest': '/etc/nftables.d/' ~ (item | basename),
          'source': item,
        }]
      }}
  loop: "{{ nftables_platform_ruleset_paths }}"
  loop_control:
    label: "{{ item | basename }}"
  when: (item | basename) != "firecracker.nft"

- name: Collect service-owned nftables ruleset records
  ansible.builtin.set_fact:
    nftables_service_rulesets: >-
      {{
        nftables_component_substrate_registry.components
        | selectattr('nftables_rulesets', 'defined')
        | map(attribute='nftables_rulesets')
        | flatten
        | list
      }}

- name: Assert service-owned nftables rulesets declare source and target
  ansible.builtin.assert:
    that:
      - item.source is defined
      - item.source | default('') | length > 0
      - item.target is defined
      - (item.target | default('')) is match('^/etc/nftables\\.d/[^/]+\\.nft$')
    fail_msg: "component nftables rulesets must declare workspace-relative source and /etc/nftables.d target"
  loop: "{{ nftables_service_rulesets }}"
  loop_control:
    label: "{{ item.name | default(item.target | default('unknown')) }}"

- name: Add service-owned nftables rulesets
  ansible.builtin.set_fact:
    nftables_rendered_rulesets: >-
      {{
        nftables_rendered_rulesets + [{
          'basename': item.target | basename,
          'dest': item.target,
          'source': verself_repo_root ~ '/' ~ item.source,
        }]
      }}
  loop: "{{ nftables_service_rulesets }}"
  loop_control:
    label: "{{ item.target | basename }}"

- name: Assert nftables ruleset filenames are unique
  ansible.builtin.assert:
    that:
      - (nftables_rendered_rulesets | map(attribute='basename') | list | unique | length) == (nftables_rendered_rulesets | length)
    fail_msg: "nftables ruleset filenames must be unique across platform and service-owned inputs"

- name: Set nftables desired ruleset names
  ansible.builtin.set_fact:
    nftables_rendered_ruleset_names: "{{ nftables_rendered_rulesets | map(attribute='basename') | list }}"

- name: Initialize nftables derived inventories
  ansible.builtin.set_fact:
    nftables_rendered_ruleset_checksums: {}
    nftables_required_users: []

- name: Build rendered nftables ruleset checksum inventory
  ansible.builtin.set_fact:
    nftables_rendered_ruleset_checksums: >-
      {{
        (nftables_rendered_ruleset_checksums | default({}))
        | combine({item.basename: ((lookup('ansible.builtin.file', item.source, rstrip=False) | hash('sha1')) ~ ':0644')})
      }}
  loop: "{{ nftables_rendered_rulesets }}"
  loop_control:
    label: "{{ item.basename }}"

- name: Extract symbolic nftables skuid users
  ansible.builtin.set_fact:
    nftables_required_users: >-
      {{
        (
          nftables_required_users | default([])
          + (
            lookup('ansible.builtin.file', item.source, rstrip=False)
            | regex_findall('meta\s+skuid\s+(?:!=\s*)?([A-Za-z_][A-Za-z0-9_-]*)')
          )
        )
        | unique
        | sort
      }}
  loop: "{{ nftables_rendered_rulesets }}"
  loop_control:
    label: "{{ item.basename }}"

- name: Ensure nftables skuid groups exist before ruleset validation
  ansible.builtin.group:
    name: "{{ item }}"
    system: true
  loop: "{{ nftables_required_users | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: Ensure nftables skuid users exist before ruleset validation
  ansible.builtin.user:
    name: "{{ item }}"
    group: "{{ item }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  loop: "{{ nftables_required_users | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: Inspect deployed nftables rulesets
  ansible.builtin.find:
    paths: /etc/nftables.d
    patterns: "*.nft"
    excludes: firecracker.nft
    file_type: file
    get_checksum: true
    checksum_algorithm: sha1
  register: nftables_deployed_rulesets

- name: Build deployed nftables ruleset checksum inventory
  ansible.builtin.set_fact:
    nftables_deployed_ruleset_checksums: >-
      {{
        dict(
          (
            nftables_deployed_rulesets.files
            | map(attribute='path')
            | map('basename')
            | list
          )
          | zip(
            nftables_deployed_rulesets.files
            | map(attribute='checksum')
            | zip(nftables_deployed_rulesets.files | map(attribute='mode'))
            | map('join', ':')
            | list
          )
        )
      }}

- name: Remove stale nftables rulesets
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ nftables_deployed_rulesets.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: (item.path | basename) not in nftables_rendered_ruleset_names
  notify: reload nftables

- name: Deploy rendered nftables rulesets
  ansible.builtin.copy:
    src: "{{ item.source }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop: "{{ nftables_rendered_rulesets }}"
  loop_control:
    label: "{{ item.basename }}"
  when:
    - nftables_deployed_ruleset_checksums.get(item.basename, '') != nftables_rendered_ruleset_checksums[item.basename]
  notify: reload nftables

- name: Enable and start nftables service
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
    daemon_reload: true

- name: Deploy verself-firewall target
  ansible.builtin.copy:
    src: "{{ platform_host_files_dir }}/etc/systemd/system/verself-firewall.target"
    dest: /etc/systemd/system/verself-firewall.target
    mode: "0644"

- name: Enable verself-firewall target
  ansible.builtin.systemd:
    name: verself-firewall.target
    enabled: true
    state: started
    daemon_reload: true
