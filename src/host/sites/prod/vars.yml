  - kind: public_api_origin
    record: secrets.api
    zone: product
  - kind: public_api_origin
    record: mail.api
    zone: product
  - kind: operator_origin
    record: dashboard
    zone: product
  - kind: operator_origin
    record: access
    zone: product
  - kind: protocol_origin
    record: git
    zone: product
  - kind: protocol_origin
    record: auth
    zone: product
  - kind: protocol_origin
    record: zitadel-actions
    zone: product
