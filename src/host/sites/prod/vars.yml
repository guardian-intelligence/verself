    record: mail
    zone: product

# Host bootstrap substrate. These values are the manual, non-Nomad surface
# needed to first-start or recover the box; component/service ports should live
# in Nomad job specs and service registration instead.
postgresql_host: 127.0.0.1
postgresql_port: 5432
postgresql_address: "{{ postgresql_host }}:{{ postgresql_port }}"
nomad_host: 127.0.0.1
nomad_http_port: 4646
nomad_http_address: "{{ nomad_host }}:{{ nomad_http_port }}"
nomad_artifact_bucket: nomad-artifacts
nomad_artifact_region: garage
# Nomad's go-getter S3 transport requires AWS_* variable names even though
# Garage is the backing S3-compatible store.
nomad_artifact_getter_s3_environment_file: /etc/nomad/nomad-artifacts.env
nomad_artifact_getter_s3_access_key_env_var: AWS_ACCESS_KEY_ID
nomad_artifact_getter_s3_secret_key_env_var: AWS_SECRET_ACCESS_KEY
nomad_artifact_publisher_s3_environment_file: /etc/garage/nomad-artifacts/publisher.env
nomad_artifact_publisher_s3_access_key_env_var: VERSELF_NOMAD_ARTIFACTS_S3_ACCESS_KEY_ID
nomad_artifact_publisher_s3_secret_key_env_var: VERSELF_NOMAD_ARTIFACTS_S3_SECRET_ACCESS_KEY
nomad_artifact_origin_hostname: artifacts.internal.verself.sh
nomad_artifact_origin_ca_bundle_path: /etc/verself/pki/nomad-artifacts-ca.pem
firecracker_guest_pool_cidr: 172.16.0.0/16
firecracker_host_service_ip: 10.255.0.1
firecracker_host_service_port: 18080
firecracker_seed_images:
  - filesystem_label: ""
    ref: substrate
    size_bytes: 2147483648
    source_path: /var/lib/verself/guest-images/substrate.ext4
    strategy: dd_from_file
    tier: substrate
    volblocksize: 16K
  - filesystem_label: ""
    ref: gh-actions-runner
    size_bytes: 1073741824
    source_path: /var/lib/verself/guest-images/toolchains/gh-actions-runner.ext4
    strategy: dd_from_file
    tier: platform_toolchain
    volblocksize: 16K
  - filesystem_label: ""
    ref: forgejo-runner
    size_bytes: 268435456
    source_path: /var/lib/verself/guest-images/toolchains/forgejo-runner.ext4
    strategy: dd_from_file
    tier: platform_toolchain
    volblocksize: 16K
  - filesystem_label: stickydisk
    ref: sticky-empty
    size_bytes: 8589934592
    source_path: ""
    strategy: mkfs_ext4
    tier: platform_toolchain
    volblocksize: 16K

spire_agent_id: spiffe://spiffe.verself.sh/node/single-node
spire_agent_socket_path: /run/spire-agent/sockets/agent.sock
spire_bundle_endpoint_bind_address: 127.0.0.1
spire_bundle_endpoint_bind_port: 8082
spire_jwt_bundle_endpoint_url: https://127.0.0.1:8082
spire_jwt_issuer_url: https://127.0.0.1:8082
spire_server_bind_address: 127.0.0.1
spire_server_bind_port: 8081
spire_server_socket_path: /run/spire-server/private/api.sock
spire_trust_domain: spiffe.verself.sh
spire_workload_group: spire_workload

