# Host bootstrap substrate. These values are the manual, non-Nomad surface
# needed to first-start or recover the box; component/service ports should live
# in Nomad job specs and service registration instead.
postgresql_host: 127.0.0.1
postgresql_port: 5432
nomad_host: 127.0.0.1
nomad_http_port: 4646
nomad_http_address: "{{ nomad_host }}:{{ nomad_http_port }}"
nomad_artifact_getter_environment_file: /etc/nomad/nomad-artifacts.env
firecracker_guest_pool_cidr: 172.16.0.0/16
firecracker_host_service_ip: 10.255.0.1
firecracker_host_service_port: 18080

garage_cluster:
  host: 127.0.0.1
  nodes:
    - instance: 0
      s3_port: 3900
      rpc_port: 3901
      admin_port: 3903
    - instance: 1
      s3_port: 3910
      rpc_port: 3911
      admin_port: 3913
    - instance: 2
      s3_port: 3920
      rpc_port: 3921
      admin_port: 3923

spire_agent_id: spiffe://spiffe.verself.sh/node/single-node
spire_agent_socket_path: /run/spire-agent/sockets/agent.sock
spire_bundle_endpoint_bind_address: 127.0.0.1
spire_bundle_endpoint_bind_port: 8082
spire_jwt_bundle_endpoint_url: https://127.0.0.1:8082
spire_jwt_issuer_url: https://127.0.0.1:8082
spire_server_bind_address: 127.0.0.1
spire_server_bind_port: 8081
spire_server_socket_path: /run/spire-server/private/api.sock
spire_trust_domain: spiffe.verself.sh
spire_workload_group: spire_workload

host_wireguard_tunnels:
  ops:
    address: 10.66.66.1
    address_prefix: 24
    interface: wg-ops
    network: 10.66.66.0/24
    peers:
      - allowed_ips: 10.66.66.2/32
        public_key: AoVgh4aWFK5Gi7HBdqIzTea37aa5SaemU4Pyk92Nglc=
    port: 51821
  worker:
    address: 10.0.0.1
    address_prefix: 16
    interface: wg0
    network: 10.0.0.0/16
    peers: []
    port: 51820
wireguard_host_tunnel_groups:
  infra:
    - worker
    - ops
  workers:
    - worker

# Components absent from this allowlist are excluded from site-level convergence
# and, after component-role rollout, from Nomad registration for this site.
enabled_components:
  - bazel_remote
  - clickhouse
  - electric
  - forgejo
  - garage
  - grafana
  - haproxy
  - nats
  - openbao
  - otelcol
  - pomerium
  - spicedb
  - stalwart
  - temporal-platform
  - tigerbeetle
  - verdaccio
  - zitadel
  - zot

platform_org_id: "370200542594579812"
platform_company_slug: guardian-intelligence
platform_company_display_name: Guardian Intelligence
platform_repo_slug: verself
platform_repo_display_name: Verself
platform_repo_description: Verself platform monorepo.
secrets_service_platform_org_id: "{{ platform_org_id }}"
