  - kind: browser_origin
    record: "@"
    zone: product
  - kind: browser_origin
    record: "@"
    zone: company
  - kind: public_api_origin
    record: billing.api
    zone: product
  - kind: public_api_origin
    record: sandbox.api
    zone: product
  - kind: public_api_origin
    record: iam.api
    zone: product
  - kind: public_api_origin
    record: profile.api
    zone: product
  - kind: public_api_origin
    record: notifications.api
    zone: product
  - kind: public_api_origin
    record: projects.api
    zone: product
  - kind: public_api_origin
    record: source.api
    zone: product
  - kind: public_api_origin
    record: governance.api
    zone: product
  - kind: public_api_origin
    record: secrets.api
    zone: product
  - kind: public_api_origin
    record: mail.api
    zone: product
  - kind: operator_origin
    record: dashboard
    zone: product
  - kind: operator_origin
    record: access
    zone: product
  - kind: protocol_origin
    record: git
    zone: product
