version: 1
effective_at: 2026-04-17

processing_activities:
  - id: account-administration
    role: controller
    purpose: Provision and administer the Verself customer organization
    data_categories:
      - Organization administrator name
      - Organization administrator email
      - Authentication events (timestamps, IP addresses)
    lawful_basis: Contract (GDPR Art. 6(1)(b))
    retention_ref: billing_records

  - id: billing
    role: controller
    purpose: Issue invoices, collect payments, produce tax documents
    data_categories:
      - Billing contact
      - Tax identifier
      - Usage metering aggregates
      - Invoice line items
    lawful_basis: Contract (GDPR Art. 6(1)(b)) and legal obligation (GDPR Art. 6(1)(c))
    retention_ref: billing_records

  - id: profile-preferences
    role: controller
    purpose: Store human-editable profile and product-experience preferences across Verself surfaces
    data_categories:
      - Human profile cache (name and primary email)
      - Locale and time zone preferences
      - Product display preferences
    lawful_basis: Contract (GDPR Art. 6(1)(b))
    retention_ref: profile_preferences

  - id: sandbox-workloads
    role: processor
    purpose: Execute customer-defined compute workloads in hardware-virtualized microVMs
    data_categories:
      - Durable VM disk contents (customer-controlled)
      - Execution logs (customer-controlled)
      - Execution results
    lawful_basis: Processed on the customer's documented instructions (GDPR Art. 28)
    retention_ref: durable_data

  - id: inbound-mail
    role: processor
    purpose: Receive and store inbound email on behalf of customer mailboxes
    data_categories:
      - Customer-mailbox message bodies
      - Envelope addresses
      - Delivery metadata
    lawful_basis: Processed on the customer's documented instructions (GDPR Art. 28)
    retention_ref: durable_data

  - id: observability
    role: controller
    purpose: Operate and secure the Verself platform; detect and respond to availability and security incidents
    data_categories:
      - Service logs
      - Traces
      - Metrics
      - Security-incident artifacts
    lawful_basis: Legitimate interests (GDPR Art. 6(1)(f)) — operating and securing the service
    retention_ref: operational_logs
