packages:
  - apps/*
  - packages/*

minimumReleaseAge: 4320
strictDepBuilds: true
allowBuilds:
  esbuild: true
  protobufjs: true
dangerouslyAllowAllBuilds: false
verifyDepsBeforeRun: error
packageManagerStrict: true
packageManagerStrictVersion: true

packageExtensions:
  "@voidzero-dev/vite-plus-core@*":
    dependencies:
      picomatch: 4.0.4

patchedDependencies:
  srvx@0.11.15: patches/srvx@0.11.15.patch

catalog:
  "@base-ui/react": ^1.4.0
  "@hey-api/openapi-ts": 0.95.0
  "@opentelemetry/api": ^1.9.1
  "@opentelemetry/context-zone": ^2.6.1
  "@opentelemetry/core": ^2.6.1
  "@opentelemetry/exporter-trace-otlp-http": ^0.214.0
  "@opentelemetry/instrumentation": ^0.214.0
  "@opentelemetry/instrumentation-fetch": ^0.214.0
  "@opentelemetry/instrumentation-http": ^0.214.0
  "@opentelemetry/instrumentation-undici": ^0.24.0
  "@opentelemetry/resources": ^2.6.1
  "@opentelemetry/sdk-node": ^0.214.0
  "@opentelemetry/sdk-trace-base": ^2.6.1
  "@opentelemetry/sdk-trace-web": ^2.6.1
  "@opentelemetry/semantic-conventions": ^1.40.0
  "@playwright/test": ^1.59.1
  "@tailwindcss/typography": ^0.5.16
  "@tailwindcss/vite": ^4
  "@tanstack/electric-db-collection": 0.3.2
  "@tanstack/query-db-collection": 1.0.35
  "@tanstack/react-db": 0.1.82
  "@tanstack/react-form": ^1.28.6
  "@tanstack/react-query": ^5.75.0
  "@tanstack/react-router": ^1.167.0
  "@tanstack/react-start": ^1.166.0
  "@tiptap/core": ^2
  "@tiptap/extension-image": ^2
  "@tiptap/extension-link": ^2
  "@tiptap/extension-placeholder": ^2
  "@tiptap/html": ^2
  "@tiptap/pm": ^2
  "@tiptap/react": ^2
  "@tiptap/starter-kit": ^2
  "@types/node": ^22.19.17
  "@types/react": ^19
  "@types/react-dom": ^19
  "@vitejs/plugin-react": ^6.0.1
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  fast-check: ^4.6.0
  gray-matter: ^4.0.3
  jose: ^6
  lucide-react: ^1.8.0
  marked: ^15.0.7
  nitro: ^3.0.260311-beta
  postgres: ^3
  react: ^19.0.0
  react-dom: ^19.0.0
  rolldown: 1.0.0-rc.13
  sonner: ^1.7.0
  tailwind-merge: ^3.0.2
  tailwindcss: ^4
  typescript: ^5.9.3
  use-stick-to-bottom: ^1.1.3
  valibot: ^1.3.1
  # Pinned to specific versions so the on-host Verdaccio mirror does not
  # have to keep up with @latest publish drift on every install.
  vite: npm:@voidzero-dev/vite-plus-core@0.1.19
  vite-plus: ^0.1.16
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.16
  web-vitals: ^4.2.4
  zod: ^4.3.6

catalogMode: prefer

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
