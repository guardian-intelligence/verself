components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://profile.api.verself.sh/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    ProfileIdentity:
      additionalProperties: false
      properties:
        display_name:
          type: string
        email:
          type: string
        family_name:
          type: string
        given_name:
          type: string
        synced_at:
          format: date-time
          type: string
        version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
      required:
        - version
        - email
        - given_name
        - family_name
        - display_name
      type: object
    ProfilePreferences:
      additionalProperties: false
      properties:
        default_surface:
          type: string
        locale:
          type: string
        theme:
          enum:
            - system
            - light
            - dark
          type: string
        time_display:
          enum:
            - utc
            - local
          type: string
        timezone:
          type: string
        updated_at:
          format: date-time
          type: string
        updated_by:
          type: string
        version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
      required:
        - version
        - locale
        - timezone
        - time_display
        - theme
        - updated_at
        - updated_by
      type: object
    ProfilePutPreferencesRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://profile.api.verself.sh/schemas/ProfilePutPreferencesRequest.json
          format: uri
          readOnly: true
          type: string
        default_surface:
          maxLength: 80
          type: string
        locale:
          maxLength: 35
          type: string
        theme:
          enum:
            - system
            - light
            - dark
          type: string
        time_display:
          enum:
            - utc
            - local
          type: string
        timezone:
          maxLength: 64
          type: string
        version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
      required:
        - version
        - locale
        - timezone
        - time_display
        - theme
      type: object
    ProfileSnapshot:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://profile.api.verself.sh/schemas/ProfileSnapshot.json
          format: uri
          readOnly: true
          type: string
        identity:
          $ref: "#/components/schemas/ProfileIdentity"
        org_id:
          description: Active organization ID from the validated token.
          type: string
        preferences:
          $ref: "#/components/schemas/ProfilePreferences"
        subject_id:
          description: Zitadel human subject ID.
          type: string
      required:
        - subject_id
        - org_id
        - identity
        - preferences
      type: object
    ProfileUpdateIdentityRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://profile.api.verself.sh/schemas/ProfileUpdateIdentityRequest.json
          format: uri
          readOnly: true
          type: string
        display_name:
          maxLength: 200
          type: string
        family_name:
          maxLength: 100
          type: string
        given_name:
          maxLength: 100
          type: string
        version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
      required:
        - version
        - given_name
        - family_name
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: Zitadel OIDC access token for a human subject.
      scheme: bearer
      type: http
info:
  title: Profile Service
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/v1/profile:
    get:
      operationId: get-profile
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileSnapshot"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get the current human profile snapshot
      x-verself-iam:
        action: read
        audit_event: profile.subject.read
        data_classification: controller_personal_data
        event_category: profile
        operation_display: get profile
        operation_type: read
        org_scope: token_org_id
        permission: profile:self:read
        rate_limit_class: read
        resource: profile_subject
        risk_level: low
        source_product_area: Profile
  /api/v1/profile/identity:
    patch:
      operationId: patch-profile-identity
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateIdentityRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileSnapshot"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Update the current human's identity profile fields
      x-verself-iam:
        action: write
        audit_event: profile.subject.identity.write
        data_classification: controller_personal_data
        event_category: profile
        idempotency: idempotency_key_header
        operation_display: update profile identity
        operation_type: write
        org_scope: token_subject
        permission: profile:self:identity:write
        rate_limit_class: profile_mutation
        request_body_max_bytes: 16384
        resource: profile_identity
        risk_level: medium
        source_product_area: Profile
  /api/v1/profile/preferences:
    put:
      operationId: put-profile-preferences
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfilePutPreferencesRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileSnapshot"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Replace the current human's profile preferences
      x-verself-iam:
        action: write
        audit_event: profile.preferences.write
        data_classification: controller_personal_data
        event_category: profile
        idempotency: idempotency_key_header
        operation_display: update profile preferences
        operation_type: write
        org_scope: token_subject
        permission: profile:self:preferences:write
        rate_limit_class: profile_mutation
        request_body_max_bytes: 16384
        resource: profile_preferences
        risk_level: low
        source_product_area: Profile
servers:
  - url: https://profile.api.verself.sh
