components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://127.0.0.1:4259/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    ProfileDataRightsArtifact:
      additionalProperties: false
      properties:
        bytes:
          type: string
        content_type:
          type: string
        path:
          type: string
        rows:
          type: string
        sha256:
          type: string
      required:
        - path
        - content_type
        - rows
        - bytes
        - sha256
      type: object
    ProfileDataRightsErasureAction:
      additionalProperties: false
      properties:
        description:
          type: string
        name:
          type: string
        rows:
          type: string
      required:
        - name
        - rows
      type: object
    ProfileDataRightsManifest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://127.0.0.1:4259/schemas/ProfileDataRightsManifest.json
          format: uri
          readOnly: true
          type: string
        artifacts:
          items:
            $ref: "#/components/schemas/ProfileDataRightsArtifact"
          type:
            - array
            - "null"
        completed_at:
          format: date-time
          type: string
        erasure_actions:
          items:
            $ref: "#/components/schemas/ProfileDataRightsErasureAction"
          type:
            - array
            - "null"
        org_id:
          type: string
        record_counts:
          additionalProperties:
            type: string
          type: object
        request_id:
          type: string
        request_type:
          type: string
        retained_categories:
          items:
            $ref: "#/components/schemas/ProfileDataRightsRetainedCategory"
          type:
            - array
            - "null"
        status:
          type: string
        subject_id:
          type: string
      required:
        - request_id
        - request_type
        - status
        - artifacts
        - erasure_actions
        - retained_categories
        - completed_at
      type: object
    ProfileDataRightsRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://127.0.0.1:4259/schemas/ProfileDataRightsRequest.json
          format: uri
          readOnly: true
          type: string
        org_id:
          maxLength: 200
          type: string
        request_id:
          maxLength: 128
          type: string
        requested_at:
          format: date-time
          type: string
        requested_by:
          maxLength: 200
          type: string
        subject_id:
          maxLength: 200
          type: string
        traceparent:
          maxLength: 200
          type: string
      required:
        - request_id
        - requested_at
        - requested_by
      type: object
    ProfileDataRightsRetainedCategory:
      additionalProperties: false
      properties:
        category:
          type: string
        reason:
          type: string
      required:
        - category
        - reason
      type: object
  securitySchemes:
    mutualTLS:
      description: SPIFFE X.509-SVID mutual TLS on the profile-service internal listener.
      type: mutualTLS
info:
  title: Profile Service Internal API
  version: 1.0.0
openapi: 3.1.0
paths:
  /internal/v1/data-rights/org-export:
    post:
      operationId: profile-org-export
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileDataRightsRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDataRightsManifest"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - mutualTLS: []
      summary: Export organization-local profile data
      x-verself-iam:
        action: export
        audit_event: profile.data_rights.org_export
        data_classification: controller_personal_data
        event_category: profile
        operation_display: export organization profile data
        operation_type: export
        org_scope: request_org_id
        permission: profile:data_rights:write
        rate_limit_class: internal_data_rights
        request_body_max_bytes: 65536
        resource: profile_data_rights
        risk_level: high
        source_product_area: Profile
  /internal/v1/data-rights/requests/{request_id}:
    get:
      operationId: profile-data-rights-status
      parameters:
        - description: Data-rights request ID
          in: path
          name: request_id
          required: true
          schema:
            description: Data-rights request ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDataRightsManifest"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - mutualTLS: []
      summary: Get profile data-rights request status
      x-verself-iam:
        action: read
        audit_event: profile.data_rights.status
        data_classification: controller_personal_data
        event_category: profile
        operation_display: get profile data-rights status
        operation_type: read
        org_scope: request_id
        permission: profile:data_rights:write
        rate_limit_class: internal_data_rights
        resource: profile_data_rights
        risk_level: medium
        source_product_area: Profile
  /internal/v1/data-rights/subject-erasure:
    post:
      operationId: profile-subject-erasure
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileDataRightsRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDataRightsManifest"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - mutualTLS: []
      summary: Erase subject-local profile data
      x-verself-iam:
        action: erase
        audit_event: profile.data_rights.subject_erasure
        data_classification: controller_personal_data
        event_category: profile
        operation_display: erase subject profile data
        operation_type: delete
        org_scope: request_subject_id
        permission: profile:data_rights:write
        rate_limit_class: internal_data_rights
        request_body_max_bytes: 65536
        resource: profile_data_rights
        risk_level: high
        source_product_area: Profile
  /internal/v1/data-rights/subject-export:
    post:
      operationId: profile-subject-export
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileDataRightsRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDataRightsManifest"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - mutualTLS: []
      summary: Export subject-local profile data
      x-verself-iam:
        action: export
        audit_event: profile.data_rights.subject_export
        data_classification: controller_personal_data
        event_category: profile
        operation_display: export subject profile data
        operation_type: export
        org_scope: request_subject_id
        permission: profile:data_rights:write
        rate_limit_class: internal_data_rights
        request_body_max_bytes: 65536
        resource: profile_data_rights
        risk_level: high
        source_product_area: Profile
servers:
  - url: https://127.0.0.1:4259
