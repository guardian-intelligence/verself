---
# Global variables for all nodes.

forge_metal_version: "0.1.0"

# Nix server profile path. All binaries here after nix_deploy role.
fm_bin: "/opt/forge-metal/profile/bin"

# Root domain (required). Services get subdomains automatically:
#   admin.<domain>  → ClickStack dashboard
#   git.<domain>    → Forgejo
forge_metal_domain: "anveio.com"

# Transactional email (Resend)
resend_subdomain: notify
resend_domain: "{{ resend_subdomain }}.{{ forge_metal_domain }}"
resend_sender_address: "noreply@{{ resend_domain }}"
resend_sender_name: forge-metal

# WireGuard
wireguard_interface: wg0
wireguard_port: 51820
wireguard_network: "10.0.0.0/16"
