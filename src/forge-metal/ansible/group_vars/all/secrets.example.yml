---
# Secrets for forge-metal.
#
# All secrets live in secrets.sops.yml, encrypted with SOPS + Age.
# The encrypted file is safe to commit.
#
# First-time setup:
#   cd ansible && ansible-playbook playbooks/setup-sops.yml
#
# Edit secrets (decrypts in $EDITOR, re-encrypts on save):
#   sops ansible/group_vars/all/secrets.sops.yml
#
# Decrypt to stdout (read-only):
#   sops -d ansible/group_vars/all/secrets.sops.yml
#
# The Age private key (~/.config/sops/age/keys.txt) must NEVER be committed.
# Share it with teammates out-of-band.
#
# Variable reference (all auto-generated by setup-sops unless noted):
#
#   cloudflare_api_token        — Cloudflare Zone:DNS:Edit token (user-provided)
#   latitudesh_auth_token       — Latitude.sh API token (user-provided, Terraform only)
#   postgresql_admin_password   — PostgreSQL superuser password
#   postgresql_billing_password — Billing service PostgreSQL password
#   clickhouse_password         — ClickHouse default user password
#   zitadel_db_password         — Zitadel PostgreSQL user password
#   zitadel_masterkey           — Zitadel AES-256 encryption key
#   zitadel_admin_password      — Zitadel admin password (includes #@F1 suffix)
#   zitadel_admin_pat           — Zitadel admin PAT (written after first deploy)
#   forgejo_admin_user          — Forgejo admin username (e.g. forge-admin-ab12)
#   forgejo_admin_email         — Forgejo admin email (e.g. admin+xyz@forge-metal.local)
#   forgejo_admin_password      — Forgejo admin password (includes #@F1 suffix)
#   hyperdx_admin_email         — HyperDX admin email (e.g. admin+xyz@forge-metal.local)
#   hyperdx_admin_password      — HyperDX admin password (includes #@F1 suffix)
#   hyperdx_session_secret      — HyperDX Express session signing key (hex)
#   billing_pg_password         — Billing PostgreSQL user password
#   stripe_secret_key           — Stripe API secret key (user-provided)
#   stripe_webhook_secret       — Stripe webhook signing secret (user-provided)
#   resend_api_key              — Resend API key for transactional email (user-provided)
