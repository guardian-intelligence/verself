---
- name: Rebuild initramfs
  listen: rebuild initramfs
  ansible.builtin.command: update-initramfs -u -k all
  changed_when: false

- name: Restart Firecracker networking
  listen: restart firecracker networking
  ansible.builtin.systemd:
    name: forge-metal-firecracker-network.service
    state: restarted
    daemon_reload: true

- name: Restart homestead smelter
  listen: restart homestead smelter
  ansible.builtin.systemd:
    name: homestead-smelter-host.service
    state: restarted
    daemon_reload: true
