---
- name: Create credstore directory for billing
  ansible.builtin.file:
    path: /etc/credstore/billing
    state: directory
    owner: root
    group: billing
    mode: "0750"

# Individual credential files consumed via systemd LoadCredential=.
# The service reads from $CREDENTIALS_DIRECTORY, not from these paths directly.

- name: Deploy billing PG DSN credential
  ansible.builtin.copy:
    content: "postgres://billing:{{ postgresql_billing_password }}@{{ services.postgresql.host }}:{{ services.postgresql.port }}/sandbox?sslmode=disable"
    dest: /etc/credstore/billing/pg-dsn
    owner: root
    group: billing
    mode: "0640"
  no_log: true
  notify: restart billing-service

- name: Deploy Stripe secret key credential
  ansible.builtin.copy:
    content: "{{ stripe_secret_key }}"
    dest: /etc/credstore/billing/stripe-secret-key
    owner: root
    group: billing
    mode: "0640"
  no_log: true
  notify: restart billing-service

- name: Deploy Stripe webhook secret credential
  ansible.builtin.copy:
    content: "{{ stripe_webhook_secret }}"
    dest: /etc/credstore/billing/stripe-webhook-secret
    owner: root
    group: billing
    mode: "0640"
  no_log: true
  notify: restart billing-service

- name: Deploy ClickHouse password credential
  ansible.builtin.copy:
    content: "{{ clickhouse_password }}"
    dest: /etc/credstore/billing/ch-password
    owner: root
    group: billing
    mode: "0640"
  no_log: true
  notify: restart billing-service

- name: Remove legacy billing secrets.env
  ansible.builtin.file:
    path: /etc/credstore/billing/secrets.env
    state: absent

- name: Remove legacy billing environment file
  ansible.builtin.file:
    path: /etc/forge-metal/billing.env
    state: absent
