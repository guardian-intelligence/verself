---
# Mirror Update: ZFS-backed Verdaccio supply chain scan pipeline.
#
# Clones the current known-good Verdaccio storage snapshot into a staging
# dataset, warms new packages, runs the scan pipeline (age gate, GuardDog,
# js-x-ray, OSV-Scanner), and atomically promotes the staging snapshot on
# success. Production Verdaccio is never modified directly.
#
# Usage:
#   cd ansible && ansible-playbook playbooks/mirror-update.yml
#
# Rollback:
#   ssh <host> 'sudo zfs rollback forgepool/verdaccio@scanned'

- name: Update and scan Verdaccio mirror
  hosts: workers
  become: true
  vars:
    zfs_pool: forgepool
    verdaccio_dataset: "{{ zfs_pool }}/verdaccio"
    staging_dataset: "{{ zfs_pool }}/verdaccio-staging"
    staging_mount: /mnt/verdaccio-staging
    scanned_snapshot: "{{ verdaccio_dataset }}@scanned"
    staging_snapshot: "{{ staging_dataset }}@scanned"
    verdaccio_port: 4873
    verdaccio_install_prefix: /opt/forge-metal/verdaccio
    fm_bin: /opt/forge-metal/profile/bin
    fixture_root: /opt/forge-metal/test-fixtures

  tasks:
    # ── Preflight ──────────────────────────────────────────────────
    - name: Verify scanned snapshot exists
      ansible.builtin.command: zfs list -t snapshot {{ scanned_snapshot }}
      changed_when: false
      register: snapshot_check
      failed_when: false

    - name: Bootstrap initial snapshot if absent
      when: snapshot_check.rc != 0
      block:
        - name: Create initial snapshot from current storage
          ansible.builtin.command: zfs snapshot {{ scanned_snapshot }}
          changed_when: true

    - name: Destroy stale staging dataset if exists
      ansible.builtin.command: zfs destroy -r {{ staging_dataset }}
      changed_when: true
      failed_when: false

    # ── Clone ──────────────────────────────────────────────────────
    - name: Clone scanned snapshot to staging
      ansible.builtin.command: zfs clone {{ scanned_snapshot }} {{ staging_dataset }}
      changed_when: true

    - name: Create staging mount point
      ansible.builtin.file:
        path: "{{ staging_mount }}"
        state: directory
        mode: "0755"

    - name: Mount staging dataset
      ansible.builtin.command: >
        zfs set mountpoint={{ staging_mount }} {{ staging_dataset }}
      changed_when: true

    - name: Set staging ownership
      ansible.builtin.file:
        path: "{{ staging_mount }}"
        owner: verdaccio
        group: verdaccio
        state: directory
        mode: "0755"
        recurse: false

    # ── Warm ───────────────────────────────────────────────────────
    - name: Stop production Verdaccio
      ansible.builtin.systemd:
        name: verdaccio
        state: stopped

    - name: Deploy unsealed Verdaccio config for staging
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/verdaccio/templates/config.yaml.j2"
        dest: /etc/verdaccio/config.yaml
        mode: "0644"
      vars:
        verdaccio_storage_path: "{{ staging_mount }}"

    - name: Start Verdaccio against staging storage
      ansible.builtin.systemd:
        name: verdaccio
        state: started

    - name: Wait for Verdaccio to be ready
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verdaccio_port }}/-/ping"
        method: GET
        status_code: 200
      retries: 10
      delay: 2
      register: verdaccio_ping
      until: verdaccio_ping.status == 200

    - name: Warm fixture dependencies into staging mirror
      ansible.builtin.command: >
        {{ fm_bin }}/npm install --prefer-offline --no-audit
      args:
        chdir: "{{ fixture_root }}/{{ item }}"
      environment:
        PATH: "{{ fm_bin }}:{{ ansible_facts['env']['PATH'] }}"
        HOME: /tmp
        npm_config_registry: "http://127.0.0.1:{{ verdaccio_port }}"
      loop:
        - next-npm-single-app
        - next-npm-single-app-fail
        - next-npm-workspaces
      changed_when: true
      ignore_errors: false

    - name: Stop Verdaccio after warming
      ansible.builtin.systemd:
        name: verdaccio
        state: stopped

    # ── Scan ───────────────────────────────────────────────────────
    - name: Download OSV vulnerability database
      ansible.builtin.command: >
        osv-scanner scan source
        --offline-vulnerabilities --download-offline-databases
        --allow-no-lockfiles -r /tmp
      environment:
        OSV_SCANNER_LOCAL_DB_CACHE_DIRECTORY: /var/lib/osv-scanner
        PATH: "/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"
      changed_when: true

    - name: Run supply chain scan pipeline
      ansible.builtin.command: >
        {{ fm_bin }}/forge-metal ci scan-registry
        --storage-path {{ staging_mount }}
      environment:
        PATH: "{{ fm_bin }}:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"
        HOME: /root
        NODE_PATH: "{{ verdaccio_install_prefix }}/lib/node_modules"
        FORGE_METAL_CLICKHOUSE_PASSWORD: "{{ clickhouse_password }}"
      register: scan_result
      failed_when: false
      changed_when: false

    - name: Display scan results
      ansible.builtin.debug:
        msg: "{{ scan_result.stdout }}"
      when: scan_result.stdout | length > 0

    # ── Promote or Rollback ────────────────────────────────────────
    - name: Promote staging on scan pass
      when: scan_result.rc == 0
      block:
        # zfs promote moves the origin snapshot (@scanned) to the clone.
        # This makes the clone independent so the old parent can be destroyed.
        - name: Promote staging clone to independent dataset
          ansible.builtin.command: zfs promote {{ staging_dataset }}
          changed_when: true

        - name: Destroy old production dataset
          ansible.builtin.command: zfs destroy -r {{ verdaccio_dataset }}
          changed_when: true

        - name: Rename staging to production
          ansible.builtin.command: zfs rename {{ staging_dataset }} {{ verdaccio_dataset }}
          changed_when: true

        - name: Set production mountpoint
          ansible.builtin.command: >
            zfs set mountpoint=/var/lib/verdaccio/storage {{ verdaccio_dataset }}
          changed_when: true

    - name: Rollback staging on scan failure
      when: scan_result.rc != 0
      block:
        - name: Destroy failed staging dataset
          ansible.builtin.command: zfs destroy -r {{ staging_dataset }}
          changed_when: true

        - name: Restore production mountpoint
          ansible.builtin.command: >
            zfs set mountpoint=/var/lib/verdaccio/storage {{ verdaccio_dataset }}
          changed_when: true

    # ── Restore ────────────────────────────────────────────────────
    - name: Deploy sealed Verdaccio config for production
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/verdaccio/templates/config.yaml.j2"
        dest: /etc/verdaccio/config.yaml
        mode: "0644"

    - name: Start production Verdaccio
      ansible.builtin.systemd:
        name: verdaccio
        state: started

    - name: Clean up staging mount point
      ansible.builtin.file:
        path: "{{ staging_mount }}"
        state: absent

    - name: Fail playbook if scan failed
      ansible.builtin.fail:
        msg: "Supply chain scan failed. Staging rolled back. Review: {{ scan_result.stderr | default('see scan output above') }}"
      when: scan_result.rc != 0
