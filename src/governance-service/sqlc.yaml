version: "2"
sql:
  - engine: postgresql
    schema:
      - migrations
    queries:
      - internal/store/queries
    gen:
      go:
        package: store
        out: internal/store
        sql_package: pgx/v5
        query_parameter_limit: 0
        emit_empty_slices: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        omit_unused_structs: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: pg_catalog.timestamptz
            nullable: false
            go_type:
              import: time
              type: Time
          - db_type: date
            nullable: false
            go_type:
              import: time
              type: Time
  - engine: postgresql
    schema:
      - ../identity-service/migrations
    queries:
      - internal/store/identityexport/queries
    gen:
      go:
        package: identityexport
        out: internal/store/identityexport
        sql_package: pgx/v5
        query_parameter_limit: 0
        emit_empty_slices: true
        omit_unused_structs: true
  - engine: postgresql
    schema:
      - ../billing-service/migrations
    queries:
      - internal/store/billingexport/queries
    gen:
      go:
        package: billingexport
        out: internal/store/billingexport
        sql_package: pgx/v5
        query_parameter_limit: 0
        emit_empty_slices: true
        omit_unused_structs: true
  - engine: postgresql
    schema:
      - ../sandbox-rental-service/migrations
    queries:
      - internal/store/sandboxexport/queries
    gen:
      go:
        package: sandboxexport
        out: internal/store/sandboxexport
        sql_package: pgx/v5
        query_parameter_limit: 0
        emit_empty_slices: true
        omit_unused_structs: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: uuid
            nullable: true
            go_type:
              import: github.com/google/uuid
              type: UUID
              pointer: true
