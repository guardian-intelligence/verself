openapi: 3.1.0
info:
    title: Forge Metal Governance Service API
    version: dev
servers:
    - url: http://127.0.0.1:4250
paths:
    /api/v1/governance/audit/events:
        get:
            summary: List organization audit events
            operationId: list-audit-events
            parameters:
                - name: limit
                  in: query
                  description: Maximum events to return.
                  explode: false
                  schema:
                    type: integer
                    description: Maximum events to return.
                    format: int64
                    minimum: 1
                    maximum: 200
                - name: cursor
                  in: query
                  explode: false
                  schema:
                    type: string
                    maxLength: 1024
                - name: actor_id
                  in: query
                  explode: false
                  schema:
                    type: string
                    maxLength: 255
                - name: audit_event
                  in: query
                  explode: false
                  schema:
                    type: string
                    maxLength: 255
                - name: high_risk
                  in: query
                  description: Return events that are high or critical risk, write/delete/export operations, denials, or errors.
                  explode: false
                  schema:
                    type: boolean
                    description: Return events that are high or critical risk, write/delete/export operations, denials, or errors.
                - name: operation_id
                  in: query
                  explode: false
                  schema:
                    type: string
                    maxLength: 128
                - name: operation_type
                  in: query
                  explode: false
                  schema:
                    type: string
                    enum:
                        - read
                        - write
                        - delete
                        - authn
                        - authz
                        - billing
                        - export
                        - system
                        - unknown
                - name: result
                  in: query
                  explode: false
                  schema:
                    type: string
                    enum:
                        - allowed
                        - denied
                        - error
                - name: risk_level
                  in: query
                  explode: false
                  schema:
                    type: string
                    enum:
                        - low
                        - medium
                        - high
                        - critical
                - name: service_name
                  in: query
                  explode: false
                  schema:
                    type: string
                    maxLength: 128
                - name: source_product_area
                  in: query
                  explode: false
                  schema:
                    type: string
                    maxLength: 128
                - name: target_id
                  in: query
                  explode: false
                  schema:
                    type: string
                    maxLength: 255
                - name: target_kind
                  in: query
                  explode: false
                  schema:
                    type: string
                    maxLength: 128
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GovernanceAuditEvents'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
            security:
                - bearerAuth: []
            x-forge-metal-iam:
                action: list
                audit_event: governance.audit_event.list
                data_classification: restricted
                event_category: governance
                operation_display: List audit events
                operation_type: read
                org_scope: token_org_id
                permission: governance:audit:read
                rate_limit_class: read
                resource: audit_event
                risk_level: medium
                source_product_area: Governance
    /api/v1/governance/exports:
        get:
            summary: List organization data exports
            operationId: list-data-exports
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GovernanceExportJobs'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
            security:
                - bearerAuth: []
            x-forge-metal-iam:
                action: list
                audit_event: governance.data_export.list
                data_classification: restricted
                event_category: export
                operation_display: List data exports
                operation_type: read
                org_scope: token_org_id
                permission: governance:export:read
                rate_limit_class: read
                resource: data_export
                risk_level: medium
                source_product_area: Governance
        post:
            summary: Create an organization data export
            operationId: create-data-export
            parameters:
                - name: Idempotency-Key
                  in: header
                  description: Stable caller-provided key used to make this mutation retry-safe.
                  required: true
                  schema:
                    type: string
                    minLength: 1
                    maxLength: 128
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/GovernanceCreateExportRequest'
                required: true
            responses:
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GovernanceExportJob'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
            security:
                - bearerAuth: []
            x-forge-metal-iam:
                action: create
                audit_event: governance.data_export.create
                data_classification: restricted
                event_category: export
                idempotency: idempotency_key_header
                operation_display: Create data export
                operation_type: export
                org_scope: token_org_id
                permission: governance:export:create
                rate_limit_class: export_create
                request_body_max_bytes: 16384
                resource: data_export
                risk_level: high
                source_product_area: Governance
    /api/v1/governance/exports/{export_id}:
        get:
            summary: Get an organization data export
            operationId: get-data-export
            parameters:
                - name: export_id
                  in: path
                  required: true
                  schema:
                    type: string
                    format: uuid
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GovernanceExportJob'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
            security:
                - bearerAuth: []
            x-forge-metal-iam:
                action: read
                audit_event: governance.data_export.read
                data_classification: restricted
                event_category: export
                operation_display: Read data export
                operation_type: read
                org_scope: token_org_id
                permission: governance:export:read
                rate_limit_class: read
                resource: data_export
                risk_level: medium
                source_product_area: Governance
    /api/v1/governance/exports/{export_id}/download:
        get:
            summary: Download an organization data export artifact
            operationId: download-data-export
            parameters:
                - name: export_id
                  in: path
                  required: true
                  schema:
                    type: string
                    format: uuid
            responses:
                "200":
                    description: tar.gz export artifact
                    headers:
                        Content-Disposition:
                            schema:
                                type: string
                        Content-Type:
                            schema:
                                type: string
                    content:
                        application/gzip:
                            schema:
                                type: string
                                format: binary
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
            security:
                - bearerAuth: []
            x-forge-metal-iam:
                action: download
                audit_event: governance.data_export.download
                data_classification: restricted
                event_category: export
                operation_display: Download data export
                operation_type: export
                org_scope: token_org_id
                permission: governance:export:read
                rate_limit_class: export_download
                resource: data_export
                risk_level: high
                source_product_area: Governance
components:
    schemas:
        ErrorDetail:
            type: object
            additionalProperties: false
            properties:
                location:
                    type: string
                    description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
                message:
                    type: string
                    description: Error message text
                value:
                    description: The value at the given location
        ErrorModel:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - http://127.0.0.1:4250/schemas/ErrorModel.json
                    readOnly: true
                detail:
                    type: string
                    description: A human-readable explanation specific to this occurrence of the problem.
                    examples:
                        - Property foo is required but is missing.
                errors:
                    type: array
                    description: Optional list of individual error details
                    items:
                        $ref: '#/components/schemas/ErrorDetail'
                instance:
                    type: string
                    description: A URI reference that identifies the specific occurrence of the problem.
                    format: uri
                    examples:
                        - https://example.com/error-log/abc123
                status:
                    type: integer
                    description: HTTP status code
                    format: int64
                    examples:
                        - 400
                    maximum: 599
                title:
                    type: string
                    description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
                    examples:
                        - Bad Request
                type:
                    type: string
                    description: A URI reference to human-readable documentation for the error.
                    format: uri
                    default: about:blank
                    examples:
                        - https://example.com/errors/example
        GovernanceAuditEvent:
            type: object
            additionalProperties: false
            properties:
                action:
                    type: string
                    description: Action declared by the operation catalog.
                actor_display:
                    type: string
                    description: Display label for the actor when available.
                actor_id:
                    type: string
                    description: Exact authenticated actor ID.
                actor_owner_display:
                    type: string
                    description: Display label for the actor owner when known.
                actor_owner_id:
                    type: string
                    description: Owner of an API credential or workload actor when known.
                actor_type:
                    type: string
                    description: Actor class, for example user, api_credential, workload, service, or operator.
                asn:
                    type: string
                    description: Locally enriched autonomous system number when configured.
                asn_org:
                    type: string
                    description: Locally enriched autonomous system organization when configured.
                audit_event:
                    type: string
                    description: Stable audit event name.
                auth_method:
                    type: string
                    description: Authentication method used by the actor.
                client_ip:
                    type: string
                    description: Client IP observed at the trusted service boundary.
                client_ip_version:
                    type: string
                    description: IPv4 or IPv6.
                content_sha256:
                    type: string
                    description: Canonical payload SHA-256.
                credential_fingerprint:
                    type: string
                    description: Non-secret credential fingerprint when known.
                credential_id:
                    type: string
                    description: Forge Metal API credential ID when the actor is a credential.
                credential_name:
                    type: string
                    description: API credential display name when known.
                decision:
                    type: string
                    description: Authorization decision.
                denial_reason:
                    type: string
                    description: Stable denial reason when authorization denied the operation.
                error_code:
                    type: string
                    description: Stable problem code when the operation failed.
                error_message:
                    type: string
                    description: Redacted failure detail.
                event_category:
                    type: string
                    description: Audit event family for filtering.
                event_id:
                    type: string
                    description: Audit event UUID.
                geo_country:
                    type: string
                    description: Locally enriched country code when configured.
                geo_region:
                    type: string
                    description: Locally enriched region when configured.
                hmac_key_id:
                    type: string
                    description: Audit HMAC key identifier.
                idempotency_key_hash:
                    type: string
                    description: SHA-256 hash of the caller-provided idempotency key.
                ip_chain:
                    type: string
                    description: Comma-separated proxy chain retained as request evidence.
                mfa_present:
                    type: boolean
                    description: Whether MFA was present in the authenticated request context.
                network_type:
                    type: string
                    description: Locally enriched network type when configured.
                operation_display:
                    type: string
                    description: Short customer-facing operation label.
                operation_id:
                    type: string
                    description: Stable OpenAPI operation ID.
                operation_type:
                    type: string
                    description: read, write, delete, authn, authz, billing, export, system, or unknown.
                org_id:
                    type: string
                    description: Organization ID derived from the caller's token.
                org_scope:
                    type: string
                    description: Organization scoping rule used for the decision.
                permission:
                    type: string
                    description: Forge Metal operation permission.
                prev_hmac:
                    type: string
                    description: Previous audit row HMAC in the organization chain.
                recorded_at:
                    type: string
                    description: UTC time when the event was recorded.
                    format: date-time
                request_id:
                    type: string
                    description: Caller or service request ID when available.
                result:
                    type: string
                    description: allowed, denied, or error.
                risk_level:
                    type: string
                    description: low, medium, high, or critical.
                row_hmac:
                    type: string
                    description: Current audit row HMAC.
                sequence:
                    type: string
                    description: Per-organization tamper-evident sequence number.
                service_name:
                    type: string
                    description: Internal service that enforced the operation.
                source_product_area:
                    type: string
                    description: Customer-facing product area, for example Governance or Sandbox.
                target_display:
                    type: string
                    description: Target display label when known.
                target_id:
                    type: string
                    description: Target identifier when known and safe to expose.
                target_kind:
                    type: string
                    description: Resource kind declared by the operation catalog.
                target_scope:
                    type: string
                    description: Target scoping rule or resolved scope.
                trace_id:
                    type: string
                    description: OpenTelemetry trace ID.
                trust_class:
                    type: string
                    description: Trust class used by the policy decision.
                user_agent_hash:
                    type: string
                    description: SHA-256 hash of the sanitized User-Agent.
            required:
                - event_id
                - recorded_at
                - org_id
                - source_product_area
                - service_name
                - operation_id
                - audit_event
                - operation_display
                - operation_type
                - event_category
                - risk_level
                - actor_type
                - actor_id
                - target_kind
                - permission
                - action
                - org_scope
                - decision
                - result
                - sequence
                - prev_hmac
                - row_hmac
                - content_sha256
        GovernanceAuditEvents:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                events:
                    type: array
                    items:
                        $ref: '#/components/schemas/GovernanceAuditEvent'
                filters:
                    $ref: '#/components/schemas/GovernanceAuditFilters'
                limit:
                    type: integer
                    description: Applied page size.
                    format: int32
                next_cursor:
                    type: string
                    description: Cursor for the next page.
            required:
                - events
                - limit
                - filters
        GovernanceAuditFilters:
            type: object
            additionalProperties: false
            properties:
                actor_id:
                    type: string
                audit_event:
                    type: string
                high_risk:
                    type: boolean
                operation_id:
                    type: string
                operation_type:
                    type: string
                result:
                    type: string
                risk_level:
                    type: string
                service_name:
                    type: string
                source_product_area:
                    type: string
                target_id:
                    type: string
                target_kind:
                    type: string
        GovernanceCreateExportRequest:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - http://127.0.0.1:4250/schemas/GovernanceCreateExportRequest.json
                    readOnly: true
                include_logs:
                    type: boolean
                    description: Include high-volume sandbox log content.
                scopes:
                    type: array
                    description: Export scopes. Empty means identity, billing, sandbox, and audit.
                    items:
                        type: string
        GovernanceExportFile:
            type: object
            additionalProperties: false
            properties:
                bytes:
                    type: string
                    description: JavaScript-safe file byte count.
                content_type:
                    type: string
                    description: File media type.
                path:
                    type: string
                    description: Path inside the tar.gz artifact.
                rows:
                    type: string
                    description: JavaScript-safe row count.
                sha256:
                    type: string
                    description: File SHA-256.
            required:
                - path
                - content_type
                - rows
                - bytes
                - sha256
        GovernanceExportJob:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - http://127.0.0.1:4250/schemas/GovernanceExportJob.json
                    readOnly: true
                artifact_bytes:
                    type: string
                artifact_sha256:
                    type: string
                completed_at:
                    type: string
                    format: date-time
                created_at:
                    type: string
                    format: date-time
                download_url:
                    type: string
                error_code:
                    type: string
                error_message:
                    type: string
                expires_at:
                    type: string
                    format: date-time
                export_id:
                    type: string
                    description: Export job UUID.
                files:
                    type: array
                    items:
                        $ref: '#/components/schemas/GovernanceExportFile'
                format:
                    type: string
                include_logs:
                    type: boolean
                org_id:
                    type: string
                    description: Organization ID.
                requested_by:
                    type: string
                    description: Zitadel subject that requested the export.
                scopes:
                    type: array
                    items:
                        type: string
                state:
                    type: string
                updated_at:
                    type: string
                    format: date-time
            required:
                - export_id
                - org_id
                - requested_by
                - scopes
                - include_logs
                - format
                - state
                - artifact_bytes
                - files
                - created_at
                - updated_at
                - expires_at
        GovernanceExportJobs:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                exports:
                    type: array
                    items:
                        $ref: '#/components/schemas/GovernanceExportJob'
            required:
                - exports
    securitySchemes:
        bearerAuth:
            type: http
            description: Zitadel-issued bearer token scoped to the governance-service API audience.
            scheme: bearer
            bearerFormat: JWT
