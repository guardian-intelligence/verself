components:
  schemas:
    BillingBalance:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/BillingBalance.json
          format: uri
          readOnly: true
          type: string
        credit_available:
          pattern: ^[0-9]+$
          type: string
        credit_pending:
          pattern: ^[0-9]+$
          type: string
        free_tier_available:
          pattern: ^[0-9]+$
          type: string
        free_tier_pending:
          pattern: ^[0-9]+$
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        total_available:
          pattern: ^[0-9]+$
          type: string
      required:
        - org_id
        - free_tier_available
        - free_tier_pending
        - credit_available
        - credit_pending
        - total_available
      type: object
    BillingGrant:
      additionalProperties: false
      properties:
        available:
          pattern: ^[0-9]+$
          type: string
        expires_at:
          format: date-time
          type: string
        grant_id:
          type: string
        pending:
          pattern: ^[0-9]+$
          type: string
        source:
          type: string
      required:
        - grant_id
        - source
        - available
        - pending
      type: object
    BillingGrants:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/BillingGrants.json
          format: uri
          readOnly: true
          type: string
        grants:
          items:
            $ref: "#/components/schemas/BillingGrant"
          nullable: true
          type: array
      required:
        - grants
      type: object
    BillingSubscription:
      additionalProperties: false
      properties:
        cadence:
          type: string
        current_period_end:
          format: date-time
          type: string
        current_period_start:
          format: date-time
          type: string
        plan_id:
          type: string
        product_id:
          type: string
        status:
          type: string
        subscription_id:
          pattern: ^-?[0-9]+$
          type: string
      required:
        - subscription_id
        - product_id
        - plan_id
        - cadence
        - status
      type: object
    BillingSubscriptions:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/BillingSubscriptions.json
          format: uri
          readOnly: true
          type: string
        subscriptions:
          items:
            $ref: "#/components/schemas/BillingSubscription"
          nullable: true
          type: array
      required:
        - subscriptions
      type: object
    BillingURLResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/BillingURLResponse.json
          format: uri
          readOnly: true
          type: string
        url:
          type: string
      required:
        - url
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    SandboxAttemptRecord:
      additionalProperties: false
      properties:
        attempt_id:
          type: string
        attempt_seq:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        billing_job_id:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        completed_at:
          format: date-time
          type: string
        created_at:
          format: date-time
          type: string
        duration_ms:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        exit_code:
          format: int64
          maximum: 255
          minimum: 0
          type: integer
        failure_reason:
          type: string
        golden_snapshot:
          type: string
        orchestrator_job_id:
          type: string
        runner_name:
          type: string
        started_at:
          format: date-time
          type: string
        state:
          type: string
        stderr_bytes:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        stdout_bytes:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        trace_id:
          type: string
        updated_at:
          format: date-time
          type: string
        zfs_written:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
      required:
        - attempt_id
        - attempt_seq
        - state
        - created_at
        - updated_at
      type: object
    SandboxBillingCheckoutRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/SandboxBillingCheckoutRequest.json
          format: uri
          readOnly: true
          type: string
        amount_cents:
          description: Amount in cents
          format: int64
          maximum: 9007199254740991
          minimum: 1
          type: integer
        cancel_url:
          maxLength: 2048
          type: string
        product_id:
          description: Product to purchase credits for
          maxLength: 255
          type: string
        success_url:
          maxLength: 2048
          type: string
      required:
        - product_id
        - amount_cents
        - success_url
        - cancel_url
      type: object
    SandboxBillingSubscriptionRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/SandboxBillingSubscriptionRequest.json
          format: uri
          readOnly: true
          type: string
        cadence:
          description: Billing cadence (default monthly)
          enum:
            - monthly
            - annual
          type: string
        cancel_url:
          maxLength: 2048
          type: string
        plan_id:
          description: Plan to subscribe to
          maxLength: 255
          type: string
        success_url:
          maxLength: 2048
          type: string
      required:
        - plan_id
        - success_url
        - cancel_url
      type: object
    SandboxBillingWindow:
      additionalProperties: false
      properties:
        actual_quantity:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        attempt_id:
          type: string
        billing_window_id:
          type: string
        created_at:
          format: date-time
          type: string
        pricing_phase:
          type: string
        reservation_shape:
          type: string
        reserved_quantity:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        settled_at:
          format: date-time
          type: string
        state:
          type: string
        window_seq:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        window_start:
          format: date-time
          type: string
      required:
        - attempt_id
        - billing_window_id
        - window_seq
        - reservation_shape
        - reserved_quantity
        - state
        - window_start
        - created_at
      type: object
    SandboxExecutionLogs:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/SandboxExecutionLogs.json
          format: uri
          readOnly: true
          type: string
        attempt_id:
          type: string
        execution_id:
          type: string
        logs:
          type: string
      required:
        - execution_id
        - attempt_id
        - logs
      type: object
    SandboxExecutionRecord:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/SandboxExecutionRecord.json
          format: uri
          readOnly: true
          type: string
        actor_id:
          type: string
        billing_windows:
          items:
            $ref: "#/components/schemas/SandboxBillingWindow"
          nullable: true
          type: array
        commit_sha:
          type: string
        correlation_id:
          type: string
        created_at:
          format: date-time
          type: string
        default_branch:
          type: string
        execution_id:
          type: string
        golden_generation_id:
          type: string
        idempotency_key:
          type: string
        kind:
          type: string
        latest_attempt:
          $ref: "#/components/schemas/SandboxAttemptRecord"
        org_id:
          pattern: ^[0-9]+$
          type: string
        product_id:
          type: string
        provider:
          type: string
        provider_job_id:
          type: string
        provider_run_id:
          type: string
        ref:
          type: string
        repo:
          type: string
        repo_id:
          type: string
        repo_url:
          type: string
        run_command:
          type: string
        status:
          type: string
        updated_at:
          format: date-time
          type: string
        workflow_job_name:
          type: string
        workflow_path:
          type: string
      required:
        - execution_id
        - org_id
        - actor_id
        - kind
        - product_id
        - status
        - latest_attempt
        - created_at
        - updated_at
      type: object
    SandboxGoldenGenerationRecord:
      additionalProperties: false
      properties:
        activated_at:
          format: date-time
          type: string
        attempt_id:
          type: string
        created_at:
          format: date-time
          type: string
        execution_id:
          type: string
        failure_detail:
          type: string
        failure_reason:
          type: string
        golden_generation_id:
          type: string
        orchestrator_job_id:
          type: string
        repo_id:
          type: string
        runner_profile_slug:
          type: string
        snapshot_ref:
          type: string
        source_ref:
          type: string
        source_sha:
          type: string
        state:
          type: string
        superseded_at:
          format: date-time
          type: string
        trigger_reason:
          type: string
        updated_at:
          format: date-time
          type: string
      required:
        - golden_generation_id
        - repo_id
        - runner_profile_slug
        - source_ref
        - source_sha
        - state
        - trigger_reason
        - created_at
        - updated_at
      type: object
    SandboxImportRepoRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/SandboxImportRepoRequest.json
          format: uri
          readOnly: true
          type: string
        clone_url:
          type: string
        default_branch:
          type: string
        full_name:
          type: string
        name:
          type: string
        owner:
          type: string
        provider:
          type: string
        provider_repo_id:
          type: string
      required:
        - clone_url
      type: object
    SandboxRepoBootstrapRecord:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/SandboxRepoBootstrapRecord.json
          format: uri
          readOnly: true
          type: string
        attempt_id:
          type: string
        execution_id:
          type: string
        generation:
          $ref: "#/components/schemas/SandboxGoldenGenerationRecord"
        repo:
          $ref: "#/components/schemas/SandboxRepoRecord"
        trigger_reason:
          type: string
      required:
        - repo
        - generation
        - execution_id
        - attempt_id
        - trigger_reason
      type: object
    SandboxRepoRecord:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/SandboxRepoRecord.json
          format: uri
          readOnly: true
          type: string
        active_golden_generation_id:
          type: string
        archived_at:
          format: date-time
          type: string
        clone_url:
          type: string
        compatibility_status:
          type: string
        compatibility_summary: {}
        created_at:
          format: date-time
          type: string
        default_branch:
          type: string
        full_name:
          type: string
        last_error:
          type: string
        last_ready_sha:
          type: string
        last_scanned_sha:
          type: string
        name:
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        owner:
          type: string
        provider:
          type: string
        provider_repo_id:
          type: string
        repo_id:
          type: string
        runner_profile_slug:
          type: string
        state:
          type: string
        updated_at:
          format: date-time
          type: string
      required:
        - repo_id
        - org_id
        - provider
        - provider_repo_id
        - owner
        - name
        - full_name
        - clone_url
        - default_branch
        - runner_profile_slug
        - state
        - compatibility_status
        - created_at
        - updated_at
      type: object
    SandboxSubmitExecutionResult:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/SandboxSubmitExecutionResult.json
          format: uri
          readOnly: true
          type: string
        attempt_id:
          type: string
        execution_id:
          type: string
        status:
          type: string
      required:
        - execution_id
        - attempt_id
        - status
      type: object
    SandboxSubmitRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4243/schemas/SandboxSubmitRequest.json
          format: uri
          readOnly: true
          type: string
        default_branch:
          type: string
        idempotency_key:
          type: string
        kind:
          type: string
        product_id:
          type: string
        provider:
          type: string
        provider_job_id:
          type: string
        provider_run_id:
          type: string
        ref:
          type: string
        repo:
          type: string
        repo_id:
          type: string
        repo_url:
          type: string
        run_command:
          type: string
        workflow_job_name:
          type: string
        workflow_path:
          type: string
      required:
        - kind
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: Zitadel-issued bearer token scoped to the sandbox-rental API audience.
      scheme: bearer
      type: http
info:
  title: Sandbox Rental Service
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/v1/billing/balance:
    get:
      operationId: get-billing-balance
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingBalance"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get org credit balance
      x-forge-metal-iam:
        action: read
        audit_event: billing.balance.read
        org_scope: token_org_id
        permission: billing:read
        rate_limit_class: read
        resource: billing_balance
  /api/v1/billing/checkout:
    post:
      operationId: create-billing-checkout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxBillingCheckoutRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingURLResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create Stripe checkout session for credit purchase
      x-forge-metal-iam:
        action: create
        audit_event: billing.checkout.create
        org_scope: token_org_id
        permission: billing:checkout
        rate_limit_class: billing_mutation
        resource: billing_checkout
  /api/v1/billing/grants:
    get:
      operationId: list-billing-grants
      parameters:
        - description: Filter by product
          explode: false
          in: query
          name: product_id
          schema:
            description: Filter by product
            type: string
        - description: Only active grants
          explode: false
          in: query
          name: active
          schema:
            description: Only active grants
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingGrants"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List org credit grants
      x-forge-metal-iam:
        action: list
        audit_event: billing.grant.list
        org_scope: token_org_id
        permission: billing:read
        rate_limit_class: read
        resource: billing_grant
  /api/v1/billing/subscribe:
    post:
      operationId: create-billing-subscription
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxBillingSubscriptionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingURLResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create Stripe subscription checkout
      x-forge-metal-iam:
        action: create
        audit_event: billing.subscription_checkout.create
        org_scope: token_org_id
        permission: billing:checkout
        rate_limit_class: billing_mutation
        resource: billing_subscription_checkout
  /api/v1/billing/subscriptions:
    get:
      operationId: list-billing-subscriptions
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSubscriptions"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List org subscriptions
      x-forge-metal-iam:
        action: list
        audit_event: billing.subscription.list
        org_scope: token_org_id
        permission: billing:read
        rate_limit_class: read
        resource: billing_subscription
  /api/v1/executions:
    post:
      operationId: submit-execution
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxSubmitRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxSubmitExecutionResult"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Submit a new execution
      x-forge-metal-iam:
        action: submit
        audit_event: sandbox.execution.submit
        idempotency: request_body_idempotency_key
        org_scope: token_org_id
        permission: sandbox:execution:submit
        rate_limit_class: execution_submit
        resource: execution
  /api/v1/executions/{execution_id}:
    get:
      operationId: get-execution
      parameters:
        - description: Execution UUID
          in: path
          name: execution_id
          required: true
          schema:
            description: Execution UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxExecutionRecord"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get execution status and latest attempt
      x-forge-metal-iam:
        action: read
        audit_event: sandbox.execution.read
        org_scope: token_org_id
        permission: sandbox:execution:read
        rate_limit_class: read
        resource: execution
  /api/v1/executions/{execution_id}/logs:
    get:
      operationId: get-execution-logs
      parameters:
        - description: Execution UUID
          in: path
          name: execution_id
          required: true
          schema:
            description: Execution UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxExecutionLogs"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get latest execution attempt log output
      x-forge-metal-iam:
        action: read
        audit_event: sandbox.execution.logs.read
        org_scope: token_org_id
        permission: sandbox:logs:read
        rate_limit_class: logs_read
        resource: execution_logs
  /api/v1/repos:
    get:
      operationId: list-repos
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SandboxRepoRecord"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List imported repos for the current org
      x-forge-metal-iam:
        action: list
        audit_event: sandbox.repo.list
        org_scope: token_org_id
        permission: sandbox:repo:read
        rate_limit_class: read
        resource: repo
    post:
      operationId: import-repo
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxImportRepoRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxRepoRecord"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Import or rescan a repo for forge-metal CI
      x-forge-metal-iam:
        action: import
        audit_event: sandbox.repo.import
        idempotency: provider_repo_id
        org_scope: token_org_id
        permission: sandbox:repo:write
        rate_limit_class: repo_mutation
        resource: repo
  /api/v1/repos/{repo_id}:
    get:
      operationId: get-repo
      parameters:
        - description: Repo UUID
          in: path
          name: repo_id
          required: true
          schema:
            description: Repo UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxRepoRecord"
          description: OK
        default:
          content:
