components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4263/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    InternalRegisterRunnerRepositoryRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4263/schemas/InternalRegisterRunnerRepositoryRequest.json
          format: uri
          readOnly: true
          type: string
        org_id:
          type: string
        provider:
          enum:
            - forgejo
          type: string
        provider_owner:
          maxLength: 255
          minLength: 1
          type: string
        provider_repo:
          maxLength: 255
          minLength: 1
          type: string
        provider_repository_id:
          type: string
        repository_full_name:
          maxLength: 512
          type: string
        source_repository_id:
          type: string
      required:
        - provider
        - org_id
        - provider_owner
        - provider_repo
        - provider_repository_id
      type: object
    InternalRunnerRepositoryRegistration:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4263/schemas/InternalRunnerRepositoryRegistration.json
          format: uri
          readOnly: true
          type: string
        provider:
          type: string
        provider_repository_id:
          type: string
        source_repository_id:
          type: string
        state:
          type: string
      required:
        - provider
        - provider_repository_id
        - state
      type: object
  securitySchemes:
    mutualTLS:
      description: SPIFFE X.509-SVID mutual TLS on the sandbox-rental-service internal listener.
      type: mutualTLS
info:
  title: Sandbox Rental Service Internal API
  version: 1.0.0
openapi: 3.0.3
paths:
  /internal/v1/runner/repositories:
    post:
      operationId: internal-register-runner-repository
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalRegisterRunnerRepositoryRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalRunnerRepositoryRegistration"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - mutualTLS: []
      summary: Register a repository with the runner product
      x-forge-metal-iam:
        action: register
        audit_event: sandbox.runner_repository.register
        data_classification: restricted
        event_category: sandbox
        operation_display: register runner repository
        operation_type: write
        org_scope: body_org_id
        permission: sandbox:runner_repository:register
        rate_limit_class: internal_mutation
        resource: runner_repository
        risk_level: high
        source_product_area: Runner
servers:
  - url: https://127.0.0.1:4263
