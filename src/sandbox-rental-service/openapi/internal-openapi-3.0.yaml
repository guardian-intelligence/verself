components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4263/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    InternalSourceCIRunSubmission:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4263/schemas/InternalSourceCIRunSubmission.json
          format: uri
          readOnly: true
          type: string
        attempt_id:
          type: string
        execution_id:
          type: string
        state:
          type: string
      required:
        - execution_id
        - attempt_id
        - state
      type: object
    InternalSubmitSourceCiRunRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4263/schemas/InternalSubmitSourceCiRunRequest.json
          format: uri
          readOnly: true
          type: string
        actor_id:
          maxLength: 255
          minLength: 1
          type: string
        ci_run_id:
          type: string
        commit_sha:
          maxLength: 255
          minLength: 1
          type: string
        idempotency_key:
          maxLength: 128
          minLength: 1
          type: string
        org_id:
          type: string
        ref_name:
          maxLength: 255
          minLength: 1
          type: string
        repo_id:
          type: string
        run_command:
          maxLength: 4096
          type: string
        runner_class:
          maxLength: 255
          type: string
      required:
        - org_id
        - actor_id
        - repo_id
        - ci_run_id
        - ref_name
        - commit_sha
        - idempotency_key
      type: object
  securitySchemes:
    mutualTLS:
      description: SPIFFE X.509-SVID mutual TLS on the sandbox-rental-service internal listener.
      type: mutualTLS
info:
  title: Sandbox Rental Service Internal API
  version: 1.0.0
openapi: 3.0.3
paths:
  /internal/v1/source-ci-runs:
    post:
      operationId: internal-submit-source-ci-run
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalSubmitSourceCiRunRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalSourceCIRunSubmission"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - mutualTLS: []
      summary: Submit a source-code-hosting CI run to the sandbox execution pipeline
      x-forge-metal-iam:
        action: submit
        audit_event: sandbox.source_ci.submit
        data_classification: restricted
        event_category: sandbox
        operation_display: submit source ci run
        operation_type: write
        org_scope: body_org_id
        permission: sandbox:source_ci:submit
        rate_limit_class: internal_mutation
        resource: source_ci_run
        risk_level: high
        source_product_area: Sandbox
servers:
  - url: https://127.0.0.1:4263
