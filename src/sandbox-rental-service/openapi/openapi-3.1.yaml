            minLength: 1
            type: string
        - in: path
          name: contract_id
          required: true
          schema:
            maxLength: 255
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxBillingContractChangeRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingURLResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create invoice-backed contract change
      x-forge-metal-iam:
        action: create
        audit_event: billing.contract_change.create
        data_classification: restricted
        event_category: billing
        idempotency: idempotency_key_header
        operation_display: create billing contract change
        operation_type: write
        org_scope: token_org_id
        permission: billing:checkout
        rate_limit_class: billing_mutation
        request_body_max_bytes: 8192
        resource: billing_contract_change
        risk_level: high
        source_product_area: Billing
  /api/v1/billing/entitlements:
    get:
      operationId: get-billing-entitlements
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingEntitlementsView"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get org entitlements view
      x-forge-metal-iam:
        action: read
        audit_event: billing.entitlements.read
        data_classification: restricted
        event_category: billing
        operation_display: get billing entitlements
        operation_type: read
        org_scope: token_org_id
        permission: billing:read
        rate_limit_class: read
        resource: billing_entitlements
        risk_level: low
        source_product_area: Billing
  /api/v1/billing/plans:
    get:
      operationId: list-billing-plans
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPlans"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
