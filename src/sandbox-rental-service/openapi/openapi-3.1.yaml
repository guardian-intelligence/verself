        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/SandboxBillingCheckoutRequest.json
          format: uri
          readOnly: true
          type: string
        amount_cents:
          description: Amount in cents
          format: int64
          maximum: 9007199254740991
          minimum: 1
          type: integer
        cancel_url:
          maxLength: 2048
          type: string
        product_id:
          description: Product context for checkout display and metadata; purchased top-ups are account-scoped
          maxLength: 255
          type: string
        success_url:
          maxLength: 2048
          type: string
      required:
        - product_id
        - amount_cents
        - success_url
        - cancel_url
