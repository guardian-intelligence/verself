info:
  title: Sandbox Rental Service
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/v1/billing/checkout:
    post:
      operationId: create-billing-checkout
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxBillingCheckoutRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingURLResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create Stripe checkout session for credit purchase
      x-forge-metal-iam:
        action: create
        audit_event: billing.checkout.create
        data_classification: restricted
        event_category: billing
        idempotency: idempotency_key_header
        operation_display: create billing checkout
        operation_type: write
        org_scope: token_org_id
        permission: billing:checkout
        rate_limit_class: billing_mutation
        request_body_max_bytes: 8192
        resource: billing_checkout
        risk_level: high
        source_product_area: Billing
  /api/v1/billing/contracts:
    get:
      operationId: list-billing-contracts
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingContracts"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List org billing contracts
      x-forge-metal-iam:
        action: list
        audit_event: billing.contract.list
        data_classification: restricted
        event_category: billing
        operation_display: list billing contracts
        operation_type: read
        org_scope: token_org_id
        permission: billing:read
        rate_limit_class: read
        resource: billing_contract
        risk_level: low
        source_product_area: Billing
    post:
      operationId: create-billing-contract
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxBillingContractRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingURLResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create self-serve contract checkout
      x-forge-metal-iam:
        action: create
        audit_event: billing.contract_checkout.create
        data_classification: restricted
        event_category: billing
        idempotency: idempotency_key_header
        operation_display: create billing contract
        operation_type: write
        org_scope: token_org_id
        permission: billing:checkout
        rate_limit_class: billing_mutation
        request_body_max_bytes: 8192
        resource: billing_contract_checkout
        risk_level: high
        source_product_area: Billing
  /api/v1/billing/contracts/{contract_id}/cancel:
    post:
      operationId: cancel-billing-contract
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
        - in: path
          name: contract_id
          required: true
          schema:
            maxLength: 255
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingCancelContractResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Schedule contract cancellation
      x-forge-metal-iam:
        action: cancel
        audit_event: billing.contract.cancel
        data_classification: restricted
        event_category: billing
        idempotency: idempotency_key_header
        operation_display: cancel billing contract
        operation_type: delete
        org_scope: token_org_id
        permission: billing:checkout
        rate_limit_class: billing_mutation
        request_body_max_bytes: 1024
        resource: billing_contract
        risk_level: high
        source_product_area: Billing
  /api/v1/billing/contracts/{contract_id}/changes:
    post:
      operationId: create-billing-contract-change
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
