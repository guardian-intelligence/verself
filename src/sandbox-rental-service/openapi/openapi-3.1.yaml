        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/BillingSubscriptions.json
          format: uri
          readOnly: true
          type: string
        subscriptions:
          items:
            $ref: "#/components/schemas/BillingSubscription"
