        cadence:
          type: string
        contract_id:
          type: string
        current_period_end:
          format: date-time
          type: string
        current_period_start:
          format: date-time
          type: string
        entitlement_state:
          type: string
        payment_state:
          type: string
        plan_id:
          type: string
        product_id:
          type: string
        status:
          type: string
        subscription_id:
          pattern: ^-?[0-9]+$
          type: string
