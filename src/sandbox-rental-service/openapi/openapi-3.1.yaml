components:
  schemas:
    BillingCancelSubscriptionResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/BillingCancelSubscriptionResponse.json
          format: uri
          readOnly: true
          type: string
        subscription:
          $ref: "#/components/schemas/BillingSubscription"
      required:
        - subscription
      type: object
    BillingEntitlementBucketSection:
      additionalProperties: false
      properties:
        bucket_id:
          type: string
        bucket_slot:
          $ref: "#/components/schemas/BillingEntitlementSlot"
        display_name:
          type: string
        sku_slots:
          items:
            $ref: "#/components/schemas/BillingEntitlementSlot"
          type:
            - array
            - "null"
      required:
        - bucket_id
        - display_name
        - sku_slots
      type: object
    BillingEntitlementProductSection:
      additionalProperties: false
      properties:
        buckets:
          items:
            $ref: "#/components/schemas/BillingEntitlementBucketSection"
          type:
            - array
            - "null"
        display_name:
          type: string
        product_id:
          type: string
        product_slot:
          $ref: "#/components/schemas/BillingEntitlementSlot"
      required:
        - product_id
        - display_name
        - buckets
      type: object
    BillingEntitlementSlot:
      additionalProperties: false
      properties:
        available_units:
          pattern: ^[0-9]+$
          type: string
        bucket_display:
          type: string
        bucket_id:
          type: string
        coverage_label:
          type: string
        pending_units:
          pattern: ^[0-9]+$
          type: string
        period_start_units:
          pattern: ^[0-9]+$
          type: string
        product_display:
          type: string
        product_id:
          type: string
        scope_type:
          enum:
            - account
            - product
            - bucket
            - sku
          type: string
        sku_display:
          type: string
        sku_id:
          type: string
        sources:
          items:
            $ref: "#/components/schemas/BillingEntitlementSourceTotal"
          type:
            - array
            - "null"
        spent_units:
          pattern: ^[0-9]+$
          type: string
      required:
        - scope_type
        - product_id
        - product_display
        - bucket_id
        - bucket_display
        - sku_id
        - sku_display
        - coverage_label
        - period_start_units
        - spent_units
        - pending_units
        - available_units
        - sources
      type: object
    BillingEntitlementSourceTotal:
      additionalProperties: false
      properties:
        available_units:
          pattern: ^[0-9]+$
          type: string
        inline_expires_at:
          format: date-time
          type: string
        label:
          type: string
        period_start_units:
          pattern: ^[0-9]+$
          type: string
        plan_id:
          type: string
        source:
          enum:
            - free_tier
            - subscription
            - purchase
            - promo
            - refund
          type: string
      required:
        - source
        - plan_id
        - label
        - period_start_units
        - available_units
      type: object
    BillingEntitlementsView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/BillingEntitlementsView.json
          format: uri
          readOnly: true
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        products:
          items:
            $ref: "#/components/schemas/BillingEntitlementProductSection"
          type:
            - array
            - "null"
        universal:
          $ref: "#/components/schemas/BillingEntitlementSlot"
      required:
        - org_id
        - universal
        - products
      type: object
    BillingPlan:
      additionalProperties: false
      properties:
        active:
          type: boolean
        annual_amount_cents:
          pattern: ^[0-9]+$
          type: string
        billing_mode:
          type: string
        currency:
          type: string
        display_name:
          type: string
        is_default:
          type: boolean
        monthly_amount_cents:
          pattern: ^[0-9]+$
          type: string
        plan_id:
          type: string
        product_id:
          type: string
        tier:
          type: string
      required:
        - plan_id
        - product_id
        - display_name
        - billing_mode
        - tier
        - currency
        - monthly_amount_cents
        - annual_amount_cents
        - active
        - is_default
      type: object
    BillingPlans:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/BillingPlans.json
          format: uri
          readOnly: true
          type: string
        plans:
          items:
            $ref: "#/components/schemas/BillingPlan"
          type:
            - array
            - "null"
      required:
        - plans
      type: object
    BillingStatement:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/BillingStatement.json
          format: uri
          readOnly: true
          type: string
        bucket_summaries:
          items:
            $ref: "#/components/schemas/BillingStatementBucketSummary"
          type:
            - array
            - "null"
        currency:
          type: string
        generated_at:
          format: date-time
          type: string
        grant_summaries:
          items:
            $ref: "#/components/schemas/BillingStatementGrantSummary"
          type:
            - array
            - "null"
        line_items:
          items:
            $ref: "#/components/schemas/BillingStatementLineItem"
          type:
            - array
            - "null"
        org_id:
          pattern: ^[0-9]+$
          type: string
        period_end:
          format: date-time
          type: string
        period_source:
          type: string
        period_start:
          format: date-time
          type: string
        product_id:
          type: string
        totals:
          $ref: "#/components/schemas/BillingStatementTotals"
        unit_label:
          type: string
      required:
        - org_id
        - product_id
        - period_start
        - period_end
        - period_source
        - generated_at
        - currency
        - unit_label
        - line_items
        - bucket_summaries
        - grant_summaries
        - totals
      type: object
    BillingStatementBucketSummary:
      additionalProperties: false
      properties:
        bucket_display_name:
          type: string
        bucket_id:
          type: string
        charge_units:
          pattern: ^[0-9]+$
          type: string
        free_tier_units:
          pattern: ^[0-9]+$
          type: string
        product_id:
          type: string
        promo_units:
          pattern: ^[0-9]+$
          type: string
        purchase_units:
          pattern: ^[0-9]+$
          type: string
        receivable_units:
          pattern: ^[0-9]+$
          type: string
        refund_units:
          pattern: ^[0-9]+$
          type: string
        reserved_units:
          pattern: ^[0-9]+$
          type: string
        subscription_units:
          pattern: ^[0-9]+$
          type: string
      required:
        - product_id
        - bucket_id
        - bucket_display_name
        - charge_units
        - free_tier_units
        - subscription_units
        - purchase_units
        - promo_units
        - refund_units
        - receivable_units
        - reserved_units
      type: object
    BillingStatementGrantSummary:
      additionalProperties: false
      properties:
        available:
          pattern: ^[0-9]+$
          type: string
        pending:
          pattern: ^[0-9]+$
          type: string
        scope_bucket_id:
          type: string
        scope_product_id:
          type: string
        scope_type:
          type: string
        source:
          type: string
      required:
        - scope_type
        - scope_product_id
        - scope_bucket_id
        - source
        - available
        - pending
      type: object
    BillingStatementLineItem:
      additionalProperties: false
      properties:
        bucket_display_name:
          type: string
        bucket_id:
          type: string
        charge_units:
          pattern: ^[0-9]+$
          type: string
        plan_id:
          type: string
        pricing_phase:
          type: string
        product_id:
          type: string
        quantity:
          format: double
          type: number
        quantity_unit:
          type: string
        sku_display_name:
          type: string
        sku_id:
          type: string
        unit_rate:
          pattern: ^[0-9]+$
          type: string
      required:
        - product_id
        - plan_id
        - bucket_id
        - bucket_display_name
        - sku_id
        - sku_display_name
        - quantity_unit
        - pricing_phase
        - quantity
        - unit_rate
        - charge_units
      type: object
    BillingStatementTotals:
      additionalProperties: false
      properties:
        charge_units:
          pattern: ^[0-9]+$
          type: string
        free_tier_units:
          pattern: ^[0-9]+$
          type: string
        promo_units:
          pattern: ^[0-9]+$
          type: string
        purchase_units:
          pattern: ^[0-9]+$
          type: string
        receivable_units:
          pattern: ^[0-9]+$
          type: string
        refund_units:
          pattern: ^[0-9]+$
          type: string
        reserved_units:
          pattern: ^[0-9]+$
          type: string
        subscription_units:
          pattern: ^[0-9]+$
          type: string
        total_due_units:
          pattern: ^[0-9]+$
          type: string
      required:
        - charge_units
        - free_tier_units
        - subscription_units
        - purchase_units
        - promo_units
        - refund_units
        - receivable_units
        - reserved_units
        - total_due_units
