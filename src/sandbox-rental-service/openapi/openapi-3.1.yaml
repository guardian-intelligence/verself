          format: uri
          readOnly: true
          type: string
        default_branch:
          type: string
        idempotency_key:
          maxLength: 128
          type: string
        kind:
          type: string
        product_id:
          type: string
        provider:
          type: string
        ref:
          type: string
        repo:
          type: string
        repo_id:
          type: string
        repo_url:
          type: string
        run_command:
          type: string
      required:
        - kind
        - idempotency_key
      type: object
    SandboxWebhookEndpointRecord:
      additionalProperties: false
      properties:
        active:
          type: boolean
        created_at:
          format: date-time
          type: string
        delivery_count:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        endpoint_id:
          type: string
        integration_id:
          type: string
        label:
          type: string
        last_delivery_at:
          format: date-time
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        provider:
          type: string
        provider_host:
          type: string
        secret_fingerprint:
          type: string
        updated_at:
          format: date-time
          type: string
      required:
        - endpoint_id
        - integration_id
        - org_id
        - provider
        - provider_host
        - label
        - active
        - created_at
        - updated_at
        - delivery_count
      type: object
    SchedulerProbeRequest:
      additionalProperties: false
      properties:
        message:
          description: Optional probe marker for verification runs.
          maxLength: 512
          type: string
      type: object
    SchedulerProbeResponse:
      additionalProperties: false
      properties:
        job_id:
          description: River job ID encoded as a decimal string for JavaScript-safe transport.
          type: string
        kind:
          type: string
        queue:
          type: string
        status:
          type: string
      required:
        - job_id
        - kind
        - queue
        - status
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: Zitadel-issued bearer token scoped to the sandbox-rental API audience.
      scheme: bearer
      type: http
info:
  title: Sandbox Rental Service
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/v1/billing/checkout:
    post:
      operationId: create-billing-checkout
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxBillingCheckoutRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingURLResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create Stripe checkout session for credit purchase
      x-forge-metal-iam:
        action: create
        audit_event: billing.checkout.create
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: billing:checkout
        rate_limit_class: billing_mutation
        request_body_max_bytes: 8192
        resource: billing_checkout
  /api/v1/billing/entitlements:
    get:
      operationId: get-billing-entitlements
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingEntitlementsView"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get org entitlements view
      x-forge-metal-iam:
        action: read
        audit_event: billing.entitlements.read
        org_scope: token_org_id
        permission: billing:read
        rate_limit_class: read
        resource: billing_entitlements
  /api/v1/billing/plans:
    get:
      operationId: list-billing-plans
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPlans"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List subscription plans
      x-forge-metal-iam:
        action: list
        audit_event: billing.plan.list
        org_scope: token_org_id
        permission: billing:read
        rate_limit_class: read
        resource: billing_plan
  /api/v1/billing/portal:
    post:
      operationId: create-billing-portal
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxBillingPortalRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingURLResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create Stripe billing portal session
      x-forge-metal-iam:
        action: create
        audit_event: billing.portal.create
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: billing:checkout
        rate_limit_class: billing_mutation
        request_body_max_bytes: 8192
        resource: billing_portal
  /api/v1/billing/statement:
    get:
      operationId: get-billing-statement
      parameters:
        - description: Product to preview
          explode: false
          in: query
          name: product_id
          required: true
          schema:
            description: Product to preview
            maxLength: 255
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingStatement"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get current billing statement
      x-forge-metal-iam:
        action: read
        audit_event: billing.statement.read
        org_scope: token_org_id
        permission: billing:read
        rate_limit_class: read
        resource: billing_statement
  /api/v1/billing/subscribe:
    post:
      operationId: create-billing-subscription
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxBillingSubscriptionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingURLResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create Stripe subscription checkout
      x-forge-metal-iam:
        action: create
        audit_event: billing.subscription_checkout.create
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: billing:checkout
        rate_limit_class: billing_mutation
        request_body_max_bytes: 8192
        resource: billing_subscription_checkout
  /api/v1/billing/subscriptions:
    get:
      operationId: list-billing-subscriptions
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSubscriptions"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List org subscriptions
      x-forge-metal-iam:
        action: list
        audit_event: billing.subscription.list
        org_scope: token_org_id
        permission: billing:read
        rate_limit_class: read
        resource: billing_subscription
  /api/v1/billing/subscriptions/{subscription_id}/cancel:
    post:
      operationId: cancel-billing-subscription
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
        - in: path
          name: subscription_id
          required: true
          schema:
            pattern: ^-?[0-9]+$
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingCancelSubscriptionResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Cancel a Stripe subscription
      x-forge-metal-iam:
        action: cancel
        audit_event: billing.subscription.cancel
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: billing:checkout
        rate_limit_class: billing_mutation
        request_body_max_bytes: 1024
        resource: billing_subscription
  /api/v1/executions:
    post:
      operationId: submit-execution
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxSubmitRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxSubmitExecutionResult"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Submit a new execution
      x-forge-metal-iam:
        action: submit
        audit_event: sandbox.execution.submit
        idempotency: request_body_idempotency_key
        org_scope: token_org_id
        permission: sandbox:execution:submit
        rate_limit_class: execution_submit
        request_body_max_bytes: 65536
        resource: execution
  /api/v1/executions/{execution_id}:
    get:
      operationId: get-execution
      parameters:
        - description: Execution UUID
          in: path
          name: execution_id
          required: true
          schema:
            description: Execution UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxExecutionRecord"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get execution status and latest attempt
      x-forge-metal-iam:
        action: read
        audit_event: sandbox.execution.read
        org_scope: token_org_id
        permission: sandbox:execution:read
        rate_limit_class: read
        resource: execution
  /api/v1/executions/{execution_id}/logs:
    get:
      operationId: get-execution-logs
      parameters:
        - description: Execution UUID
          in: path
          name: execution_id
          required: true
          schema:
            description: Execution UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxExecutionLogs"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get latest execution attempt log output
      x-forge-metal-iam:
        action: read
        audit_event: sandbox.execution.logs.read
        org_scope: token_org_id
        permission: sandbox:logs:read
        rate_limit_class: logs_read
        resource: execution_logs
  /api/v1/repos:
    get:
      operationId: list-repos
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SandboxRepoRecord"
                type:
                  - array
                  - "null"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List imported repos for the current org
      x-forge-metal-iam:
        action: list
        audit_event: sandbox.repo.list
        org_scope: token_org_id
        permission: sandbox:repo:read
        rate_limit_class: read
        resource: repo
    post:
      operationId: import-repo
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxImportRepoRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxRepoRecord"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Import or rescan repo metadata
      x-forge-metal-iam:
        action: import
        audit_event: sandbox.repo.import
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: sandbox:repo:write
        rate_limit_class: repo_mutation
        request_body_max_bytes: 32768
        resource: repo
  /api/v1/repos/{repo_id}:
    get:
      operationId: get-repo
      parameters:
        - description: Repo UUID
          in: path
          name: repo_id
          required: true
          schema:
            description: Repo UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxRepoRecord"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get repo state and compatibility details
      x-forge-metal-iam:
        action: read
        audit_event: sandbox.repo.read
        org_scope: token_org_id
        permission: sandbox:repo:read
        rate_limit_class: read
        resource: repo
  /api/v1/repos/{repo_id}/rescan:
    post:
      operationId: rescan-repo
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
        - description: Repo UUID
          in: path
          name: repo_id
          required: true
          schema:
            description: Repo UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxRepoRecord"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Rescan repo metadata
      x-forge-metal-iam:
        action: rescan
        audit_event: sandbox.repo.rescan
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: sandbox:repo:write
        rate_limit_class: repo_mutation
        request_body_max_bytes: 1024
        resource: repo
  /api/v1/webhook-endpoints:
    get:
      operationId: list-webhook-endpoints
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SandboxWebhookEndpointRecord"
                type:
                  - array
                  - "null"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List git webhook endpoints for the current org
      x-forge-metal-iam:
        action: list
        audit_event: sandbox.webhook_endpoint.list
        org_scope: token_org_id
        permission: sandbox:webhook_endpoint:read
        rate_limit_class: read
        resource: webhook_endpoint
    post:
      operationId: create-webhook-endpoint
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxCreateWebhookEndpointRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxCreateWebhookEndpointResponse"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
