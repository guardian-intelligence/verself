components:
  schemas:
    BillingCancelContractResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/BillingCancelContractResponse.json
          format: uri
          readOnly: true
          type: string
        contract:
          $ref: "#/components/schemas/BillingContract"
      required:
        - contract
      type: object
    BillingContract:
      additionalProperties: false
      properties:
        cadence_kind:
          type: string
        contract_id:
          type: string
        ends_at:
          format: date-time
          type: string
        entitlement_state:
          type: string
        payment_state:
          type: string
        pending_change_effective_at:
          format: date-time
          type: string
        pending_change_id:
          type: string
        pending_change_target_plan_id:
          type: string
        pending_change_type:
          type: string
        phase_end:
          format: date-time
          type: string
        phase_id:
          type: string
        phase_start:
          format: date-time
          type: string
        plan_id:
          type: string
        product_id:
          type: string
        starts_at:
          format: date-time
          type: string
        status:
          type: string
      required:
        - contract_id
        - product_id
        - plan_id
        - phase_id
        - cadence_kind
        - status
        - payment_state
        - entitlement_state
        - starts_at
      type: object
    BillingContracts:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/BillingContracts.json
          format: uri
          readOnly: true
          type: string
        contracts:
          items:
            $ref: "#/components/schemas/BillingContract"
          type:
            - array
            - "null"
      required:
        - contracts
      type: object
    BillingEntitlementBucketSection:
      additionalProperties: false
      properties:
        bucket_id:
          type: string
        bucket_slot:
          $ref: "#/components/schemas/BillingEntitlementSlot"
        display_name:
          type: string
        sku_slots:
          items:
            $ref: "#/components/schemas/BillingEntitlementSlot"
          type:
            - array
            - "null"
      required:
        - bucket_id
        - display_name
        - sku_slots
      type: object
    BillingEntitlementProductSection:
      additionalProperties: false
      properties:
        buckets:
          items:
            $ref: "#/components/schemas/BillingEntitlementBucketSection"
          type:
            - array
            - "null"
        display_name:
          type: string
        product_id:
          type: string
        product_slot:
          $ref: "#/components/schemas/BillingEntitlementSlot"
      required:
        - product_id
        - display_name
        - buckets
      type: object
    BillingEntitlementSlot:
      additionalProperties: false
      properties:
        available_units:
          pattern: ^[0-9]+$
          type: string
        bucket_display:
          type: string
        bucket_id:
          type: string
        coverage_label:
          type: string
        pending_units:
          pattern: ^[0-9]+$
          type: string
        period_start_units:
          pattern: ^[0-9]+$
          type: string
        product_display:
          type: string
        product_id:
          type: string
        scope_type:
          enum:
            - account
            - product
            - bucket
            - sku
          type: string
        sku_display:
          type: string
        sku_id:
          type: string
        sources:
          items:
            $ref: "#/components/schemas/BillingEntitlementSourceTotal"
          type:
            - array
            - "null"
        spent_units:
          pattern: ^[0-9]+$
          type: string
      required:
        - scope_type
        - product_id
        - product_display
        - bucket_id
        - bucket_display
        - sku_id
        - sku_display
        - coverage_label
        - period_start_units
        - spent_units
        - pending_units
        - available_units
        - sources
      type: object
    BillingEntitlementSourceTotal:
      additionalProperties: false
      properties:
        available_units:
          pattern: ^[0-9]+$
          type: string
        inline_expires_at:
          format: date-time
          type: string
        label:
          type: string
        pending_units:
          pattern: ^[0-9]+$
          type: string
        period_start_units:
          pattern: ^[0-9]+$
          type: string
        plan_id:
          type: string
        source:
          enum:
            - free_tier
            - contract
            - purchase
            - promo
            - refund
            - receivable
          type: string
      required:
        - source
        - plan_id
        - label
        - period_start_units
        - available_units
        - pending_units
      type: object
    BillingEntitlementsView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/BillingEntitlementsView.json
          format: uri
          readOnly: true
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        products:
          items:
            $ref: "#/components/schemas/BillingEntitlementProductSection"
          type:
            - array
            - "null"
        universal:
          $ref: "#/components/schemas/BillingEntitlementSlot"
      required:
        - org_id
        - universal
        - products
      type: object
    BillingPlan:
      additionalProperties: false
      properties:
        active:
          type: boolean
        annual_amount_cents:
          pattern: ^[0-9]+$
          type: string
        billing_mode:
          type: string
        currency:
          type: string
        display_name:
          type: string
        is_default:
          type: boolean
        monthly_amount_cents:
          pattern: ^[0-9]+$
          type: string
        plan_id:
          type: string
        product_id:
          type: string
        tier:
          type: string
      required:
        - plan_id
        - product_id
        - display_name
        - billing_mode
        - tier
        - currency
        - monthly_amount_cents
        - annual_amount_cents
        - active
        - is_default
      type: object
    BillingPlans:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/BillingPlans.json
          format: uri
          readOnly: true
          type: string
        plans:
          items:
            $ref: "#/components/schemas/BillingPlan"
          type:
            - array
            - "null"
      required:
        - plans
      type: object
    BillingStatement:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/BillingStatement.json
          format: uri
          readOnly: true
          type: string
        currency:
          type: string
        generated_at:
          format: date-time
          type: string
        grant_summaries:
          items:
            $ref: "#/components/schemas/BillingStatementGrantSummary"
          type:
            - array
            - "null"
        line_items:
          items:
            $ref: "#/components/schemas/BillingStatementLineItem"
          type:
            - array
            - "null"
        org_id:
          pattern: ^[0-9]+$
          type: string
        period_end:
          format: date-time
          type: string
        period_source:
          type: string
        period_start:
          format: date-time
          type: string
        product_id:
          type: string
        totals:
          $ref: "#/components/schemas/BillingStatementTotals"
        unit_label:
          type: string
      required:
        - org_id
        - product_id
        - period_start
        - period_end
        - period_source
        - generated_at
        - currency
        - unit_label
        - line_items
        - grant_summaries
        - totals
      type: object
    BillingStatementGrantSummary:
      additionalProperties: false
      properties:
        available:
          pattern: ^[0-9]+$
          type: string
        pending:
          pattern: ^[0-9]+$
          type: string
        scope_bucket_id:
          type: string
        scope_product_id:
          type: string
        scope_type:
          type: string
        source:
          type: string
      required:
        - scope_type
        - scope_product_id
        - scope_bucket_id
        - source
        - available
        - pending
      type: object
    BillingStatementLineItem:
      additionalProperties: false
      properties:
        bucket_display_name:
          type: string
        bucket_id:
          type: string
        charge_units:
          pattern: ^[0-9]+$
          type: string
        contract_units:
          pattern: ^[0-9]+$
          type: string
        free_tier_units:
          pattern: ^[0-9]+$
          type: string
        plan_id:
          type: string
        pricing_phase:
          type: string
        product_id:
          type: string
        promo_units:
          pattern: ^[0-9]+$
          type: string
        purchase_units:
          pattern: ^[0-9]+$
          type: string
        quantity:
          format: double
          type: number
        quantity_unit:
          type: string
        receivable_units:
          pattern: ^[0-9]+$
          type: string
        refund_units:
          pattern: ^[0-9]+$
          type: string
        reserved_units:
          pattern: ^[0-9]+$
          type: string
        sku_display_name:
          type: string
        sku_id:
          type: string
        unit_rate:
          pattern: ^[0-9]+$
          type: string
      required:
        - product_id
        - plan_id
        - bucket_id
        - bucket_display_name
        - sku_id
        - sku_display_name
        - quantity_unit
        - pricing_phase
        - quantity
        - unit_rate
        - charge_units
        - free_tier_units
        - contract_units
        - purchase_units
        - promo_units
        - refund_units
        - receivable_units
        - reserved_units
      type: object
    BillingStatementTotals:
      additionalProperties: false
      properties:
        charge_units:
          pattern: ^[0-9]+$
          type: string
        contract_units:
          pattern: ^[0-9]+$
          type: string
        free_tier_units:
          pattern: ^[0-9]+$
          type: string
        promo_units:
          pattern: ^[0-9]+$
          type: string
        purchase_units:
          pattern: ^[0-9]+$
          type: string
        receivable_units:
          pattern: ^[0-9]+$
          type: string
        refund_units:
          pattern: ^[0-9]+$
          type: string
        reserved_units:
          pattern: ^[0-9]+$
          type: string
        total_due_units:
          pattern: ^[0-9]+$
          type: string
      required:
        - charge_units
        - free_tier_units
        - contract_units
        - purchase_units
        - promo_units
        - refund_units
        - receivable_units
        - reserved_units
        - total_due_units
      type: object
    BillingURLResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/BillingURLResponse.json
          format: uri
          readOnly: true
          type: string
        url:
          type: string
      required:
        - url
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    SandboxAttemptRecord:
      additionalProperties: false
      properties:
        attempt_id:
          type: string
        attempt_seq:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        billing_job_id:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        completed_at:
          format: date-time
          type: string
        created_at:
          format: date-time
          type: string
        duration_ms:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        exec_id:
          type: string
        exit_code:
          format: int64
          maximum: 255
          minimum: 0
          type: integer
        failure_reason:
          type: string
        lease_id:
          type: string
        started_at:
          format: date-time
          type: string
        state:
          type: string
        stderr_bytes:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        stdout_bytes:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        trace_id:
          type: string
        updated_at:
          format: date-time
          type: string
        zfs_written:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
      required:
        - attempt_id
        - attempt_seq
        - state
        - created_at
        - updated_at
      type: object
    SandboxBillingCheckoutRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/SandboxBillingCheckoutRequest.json
          format: uri
          readOnly: true
          type: string
        amount_cents:
          description: Amount in cents
          format: int64
          maximum: 9007199254740991
          minimum: 1
          type: integer
        cancel_url:
          maxLength: 2048
          type: string
        product_id:
          description: Product context for checkout display and metadata; purchased top-ups are account-scoped
          maxLength: 255
          type: string
        success_url:
          maxLength: 2048
          type: string
      required:
        - product_id
        - amount_cents
        - success_url
        - cancel_url
      type: object
    SandboxBillingContractChangeRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/SandboxBillingContractChangeRequest.json
          format: uri
          readOnly: true
          type: string
        cancel_url:
          maxLength: 2048
          type: string
        success_url:
          maxLength: 2048
          type: string
        target_plan_id:
          description: Plan to upgrade into immediately
          maxLength: 255
          type: string
      required:
        - target_plan_id
        - success_url
        - cancel_url
      type: object
    SandboxBillingContractRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/SandboxBillingContractRequest.json
          format: uri
          readOnly: true
          type: string
        cadence:
          description: Billing cadence (default monthly)
          enum:
            - monthly
          type: string
        cancel_url:
          maxLength: 2048
          type: string
        plan_id:
          description: Plan to activate
          maxLength: 255
          type: string
        success_url:
          maxLength: 2048
          type: string
      required:
        - plan_id
        - success_url
        - cancel_url
      type: object
    SandboxBillingPortalRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/SandboxBillingPortalRequest.json
          format: uri
          readOnly: true
          type: string
        return_url:
          maxLength: 2048
          type: string
      required:
        - return_url
      type: object
    SandboxBillingWindow:
      additionalProperties: false
      properties:
        actual_quantity:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        attempt_id:
          type: string
        billing_window_id:
          type: string
        created_at:
          format: date-time
          type: string
        pricing_phase:
          type: string
        reservation_shape:
          type: string
        reserved_quantity:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        settled_at:
          format: date-time
          type: string
        state:
          type: string
        window_seq:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        window_start:
          format: date-time
          type: string
      required:
        - attempt_id
        - billing_window_id
        - window_seq
        - reservation_shape
        - reserved_quantity
        - state
        - window_start
        - created_at
      type: object
    SandboxExecutionLogs:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/SandboxExecutionLogs.json
          format: uri
          readOnly: true
          type: string
        attempt_id:
          type: string
        execution_id:
          type: string
        logs:
          type: string
      required:
        - execution_id
        - attempt_id
        - logs
      type: object
    SandboxExecutionRecord:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/SandboxExecutionRecord.json
          format: uri
          readOnly: true
          type: string
        actor_id:
          type: string
        billing_windows:
          items:
            $ref: "#/components/schemas/SandboxBillingWindow"
          type:
            - array
            - "null"
        correlation_id:
          type: string
        created_at:
          format: date-time
          type: string
        execution_id:
          type: string
        external_provider:
          type: string
        external_task_id:
          type: string
        idempotency_key:
          type: string
        kind:
          type: string
        latest_attempt:
          $ref: "#/components/schemas/SandboxAttemptRecord"
        org_id:
          pattern: ^[0-9]+$
          type: string
        product_id:
          type: string
        provider:
          type: string
        run_command:
          type: string
        runner_class:
          type: string
        source_kind:
          type: string
        source_ref:
          type: string
        status:
          type: string
        updated_at:
          format: date-time
          type: string
        workload_kind:
          type: string
      required:
        - execution_id
        - org_id
        - actor_id
        - kind
        - product_id
        - status
        - latest_attempt
        - created_at
        - updated_at
      type: object
    SandboxGitHubInstallationConnectResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/SandboxGitHubInstallationConnectResponse.json
          format: uri
          readOnly: true
          type: string
        expires_at:
          description: Time after which the setup URL state is no longer accepted.
          format: date-time
          type: string
        setup_url:
          description: GitHub App installation URL for the current Forge Metal organization.
          type: string
        state:
          description: Opaque installation state token embedded in the GitHub App setup URL.
          type: string
      required:
        - state
        - setup_url
        - expires_at
      type: object
    SandboxGitHubInstallationRecord:
      additionalProperties: false
      properties:
        account_login:
          type: string
        account_type:
          type: string
        active:
          type: boolean
        created_at:
          format: date-time
          type: string
        installation_id:
          description: GitHub App installation ID encoded as a string for JavaScript-safe transport.
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        updated_at:
          format: date-time
          type: string
      required:
        - installation_id
        - org_id
        - account_login
        - account_type
        - active
        - created_at
        - updated_at
      type: object
    SandboxSubmitExecutionResult:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/SandboxSubmitExecutionResult.json
          format: uri
          readOnly: true
          type: string
        attempt_id:
          type: string
        execution_id:
          type: string
        status:
          type: string
      required:
        - execution_id
        - attempt_id
        - status
      type: object
    SandboxSubmitRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/SandboxSubmitRequest.json
          format: uri
          readOnly: true
          type: string
        idempotency_key:
          maxLength: 128
          type: string
        kind:
          type: string
        max_wall_seconds:
          format: int64
          maximum: 9007199254740991
          minimum: 1
          type: integer
        product_id:
          type: string
        provider:
          type: string
        resources:
          $ref: "#/components/schemas/VMResources"
          description: Requested VM shape (vCPUs, memory, root disk). Omitted fields use the runner class defaults; out-of-bounds shapes are rejected with 400.
        run_command:
          type: string
        runner_class:
          description: Runner class label, for example metal-4vcpu-ubuntu-2404.
          type: string
      required:
        - kind
        - idempotency_key
      type: object
    SandboxVolumeCreateRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/SandboxVolumeCreateRequest.json
          format: uri
          readOnly: true
          type: string
        display_name:
          maxLength: 255
          type: string
        idempotency_key:
          maxLength: 128
          type: string
        product_id:
          maxLength: 255
          type: string
      required:
        - idempotency_key
      type: object
    SandboxVolumeMeterTickRecord:
      additionalProperties: false
      properties:
        actor_id:
          type: string
        allocation:
          additionalProperties:
            format: double
            type: number
          type: object
        billable_live_bytes:
          pattern: ^[0-9]+$
          type: string
        billable_retained_bytes:
          pattern: ^[0-9]+$
          type: string
        billed_charge_units:
          pattern: ^[0-9]+$
          type: string
        billing_failure_reason:
          type: string
        billing_window_id:
          type: string
        clickhouse_projected_at:
          format: date-time
          type: string
        created_at:
          format: date-time
          type: string
        meter_tick_id:
          type: string
        observed_at:
          format: date-time
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        product_id:
          type: string
        provisioned_bytes:
          pattern: ^[0-9]+$
          type: string
        source_ref:
          type: string
        source_type:
          type: string
        state:
          type: string
        updated_at:
          format: date-time
          type: string
        used_bytes:
          pattern: ^[0-9]+$
          type: string
        usedbysnapshots_bytes:
          pattern: ^[0-9]+$
          type: string
        volume_id:
          type: string
        window_end:
          format: date-time
          type: string
        window_millis:
          format: int32
          maximum: 4294967295
          minimum: 30000
          type: integer
        window_seq:
          format: int32
          maximum: 4294967295
          minimum: 0
          type: integer
        window_start:
          format: date-time
          type: string
        written_bytes:
          pattern: ^[0-9]+$
          type: string
      required:
        - meter_tick_id
        - volume_id
        - org_id
        - product_id
        - source_type
        - source_ref
        - window_seq
        - window_millis
        - state
        - observed_at
        - window_start
        - window_end
        - used_bytes
        - usedbysnapshots_bytes
        - billable_live_bytes
        - billable_retained_bytes
        - written_bytes
        - provisioned_bytes
        - allocation
        - billed_charge_units
        - created_at
        - updated_at
      type: object
    SandboxVolumeMeterTickRequest:
      additionalProperties: false
      properties:
        idempotency_key:
          maxLength: 128
          type: string
        observed_at:
          format: date-time
          type: string
        provisioned_bytes:
          pattern: ^[0-9]+$
          type: string
        used_bytes:
          pattern: ^[0-9]+$
          type: string
        usedbysnapshots_bytes:
          pattern: ^[0-9]+$
          type: string
        window_millis:
          format: int32
          maximum: 4294967295
          minimum: 30000
          type: integer
        written_bytes:
          pattern: ^[0-9]+$
          type: string
      required:
        - idempotency_key
        - used_bytes
        - usedbysnapshots_bytes
      type: object
    SandboxVolumeMeterTickResult:
      additionalProperties: false
      properties:
        job_id:
          description: River job ID encoded as a decimal string for JavaScript-safe transport.
          type: string
        kind:
          type: string
        meter_tick:
          $ref: "#/components/schemas/SandboxVolumeMeterTickRecord"
        queue:
          type: string
        status:
          type: string
      required:
        - meter_tick
      type: object
    SandboxVolumeRecord:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4243/schemas/SandboxVolumeRecord.json
          format: uri
          readOnly: true
          type: string
        actor_id:
          type: string
        billable_live_bytes:
          pattern: ^[0-9]+$
          type: string
        billable_retained_bytes:
          pattern: ^[0-9]+$
          type: string
        created_at:
          format: date-time
          type: string
        current_generation_id:
          type: string
        dataset_ref:
          type: string
        display_name:
          type: string
        last_metered_at:
          format: date-time
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        pool_id:
          type: string
        product_id:
          type: string
        provisioned_bytes:
          pattern: ^[0-9]+$
          type: string
        state:
          type: string
        storage_node_id:
          type: string
        updated_at:
          format: date-time
          type: string
        used_bytes:
          pattern: ^[0-9]+$
          type: string
        usedbysnapshots_bytes:
          pattern: ^[0-9]+$
          type: string
        volume_id:
          type: string
        written_bytes:
          pattern: ^[0-9]+$
          type: string
      required:
        - volume_id
        - org_id
        - product_id
        - state
        - storage_node_id
        - pool_id
        - dataset_ref
        - used_bytes
        - usedbysnapshots_bytes
        - billable_live_bytes
        - billable_retained_bytes
        - written_bytes
        - provisioned_bytes
        - created_at
        - updated_at
      type: object
    SchedulerProbeRequest:
      additionalProperties: false
      properties:
        message:
          description: Optional probe marker for verification runs.
          maxLength: 512
          type: string
      type: object
    SchedulerProbeResponse:
      additionalProperties: false
      properties:
        job_id:
          description: River job ID encoded as a decimal string for JavaScript-safe transport.
          type: string
        kind:
          type: string
        queue:
          type: string
        status:
          type: string
      required:
        - job_id
        - kind
        - queue
        - status
      type: object
    VMResources:
      additionalProperties: false
      properties:
        kernel_image:
          description: Named guest kernel image. Defaults to "default".
          type: string
        memory_mib:
          description: Guest RAM in MiB.
          format: int32
          maximum: 524288
          minimum: 128
          type: integer
        root_disk_gib:
          description: Root disk quota in GiB; enforced on the per-lease ZFS clone via refquota/refreservation.
          format: int32
          maximum: 2048
          minimum: 1
          type: integer
        vcpus:
          description: Number of vCPUs exposed to the guest.
          format: int32
          maximum: 128
          minimum: 1
          type: integer
      required:
        - vcpus
        - memory_mib
        - root_disk_gib
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: Zitadel-issued bearer token scoped to the sandbox-rental API audience.
      scheme: bearer
      type: http
