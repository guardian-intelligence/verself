        org_scope: token_org_id
        permission: sandbox:webhook_endpoint:write
        rate_limit_class: webhook_endpoint_mutation
        request_body_max_bytes: 8192
        resource: webhook_endpoint
  /api/v1/webhook-endpoints/{endpoint_id}:
