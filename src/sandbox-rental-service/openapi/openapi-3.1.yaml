        net_rx_bytes:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        net_tx_bytes:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        rootfs_provisioned_bytes:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        started_at:
          format: date-time
          type: string
        state:
          type: string
        stderr_bytes:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        stdout_bytes:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        trace_id:
          type: string
        updated_at:
          format: date-time
          type: string
        vcpu_exit_count:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        zfs_written:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
