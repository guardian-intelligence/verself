          maximum: 9007199254740991
          minimum: 0
          type: integer
        exit_code:
          format: int64
          maximum: 255
          minimum: 0
          type: integer
        failure_reason:
          type: string
        orchestrator_run_id:
          type: string
        started_at:
          format: date-time
          type: string
        state:
          type: string
        stderr_bytes:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        stdout_bytes:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        trace_id:
          type: string
        updated_at:
          format: date-time
          type: string
        zfs_written:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
      required:
        - attempt_id
        - attempt_seq
        - state
        - created_at
        - updated_at
      type: object
    SandboxBillingCheckoutRequest:
