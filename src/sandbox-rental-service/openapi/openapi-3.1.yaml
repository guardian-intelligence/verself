          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
        - description: Webhook endpoint UUID
          in: path
          name: endpoint_id
          required: true
          schema:
            description: Webhook endpoint UUID
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Deactivate a git webhook endpoint
      x-forge-metal-iam:
        action: delete
        audit_event: sandbox.webhook_endpoint.delete
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: sandbox:webhook_endpoint:write
        rate_limit_class: webhook_endpoint_mutation
        request_body_max_bytes: 1024
        resource: webhook_endpoint
  /api/v1/webhook-endpoints/{endpoint_id}/rotate:
    post:
      operationId: rotate-webhook-endpoint-secret
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
        - description: Webhook endpoint UUID
          in: path
          name: endpoint_id
          required: true
          schema:
            description: Webhook endpoint UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxRotateWebhookEndpointSecretResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Rotate a git webhook endpoint secret
      x-forge-metal-iam:
        action: rotate
        audit_event: sandbox.webhook_endpoint.secret.rotate
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: sandbox:webhook_endpoint:write
        rate_limit_class: webhook_endpoint_mutation
        request_body_max_bytes: 1024
        resource: webhook_endpoint_secret
servers:
  - url: http://127.0.0.1:4243
