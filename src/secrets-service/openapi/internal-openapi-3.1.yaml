openapi: 3.1.0
info:
    title: Forge Metal Secrets Service Internal API
    version: dev
servers:
    - url: https://127.0.0.1:4253
paths:
    /internal/v1/injections/resolve:
        post:
            summary: Resolve sandbox secret injection
            description: SPIFFE-mTLS internal endpoint for sandbox-rental-service to resolve execution secret injections.
            operationId: resolve-injection
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/InjectionResolveRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/InjectionResolveResponse'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
            security:
                - mutualTLS: []
components:
    schemas:
        ErrorDetail:
            type: object
            additionalProperties: false
            properties:
                location:
                    type: string
                    description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
                message:
                    type: string
                    description: Error message text
                value:
                    description: The value at the given location
        ErrorModel:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://127.0.0.1:4253/schemas/ErrorModel.json
                    readOnly: true
                detail:
                    type: string
                    description: A human-readable explanation specific to this occurrence of the problem.
                    examples:
                        - Property foo is required but is missing.
                errors:
                    type: array
                    description: Optional list of individual error details
                    items:
                        $ref: '#/components/schemas/ErrorDetail'
                instance:
                    type: string
                    description: A URI reference that identifies the specific occurrence of the problem.
                    format: uri
                    examples:
                        - https://example.com/error-log/abc123
                status:
                    type: integer
                    description: HTTP status code
                    format: int64
                    examples:
                        - 400
                    maximum: 599
                title:
                    type: string
                    description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
                    examples:
                        - Bad Request
                type:
                    type: string
                    description: A URI reference to human-readable documentation for the error.
                    format: uri
                    default: about:blank
                    examples:
                        - https://example.com/errors/example
        InjectionEnvValue:
            type: object
            additionalProperties: false
            properties:
                name:
                    type: string
                value:
                    type: string
            required:
                - name
                - value
        InjectionResolveRequest:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://127.0.0.1:4253/schemas/InjectionResolveRequest.json
                    readOnly: true
                actor_id:
                    type: string
                attempt_id:
                    type: string
                execution_id:
                    type: string
                org_id:
                    type: string
                secrets:
                    type: array
                    items:
                        $ref: '#/components/schemas/InjectionSecretRequest'
            required:
                - org_id
                - actor_id
                - execution_id
                - attempt_id
                - secrets
        InjectionResolveResponse:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://127.0.0.1:4253/schemas/InjectionResolveResponse.json
                    readOnly: true
                env:
                    type: array
                    items:
                        $ref: '#/components/schemas/InjectionEnvValue'
            required:
                - env
        InjectionSecretRequest:
            type: object
            additionalProperties: false
            properties:
                branch:
                    type: string
                env_id:
                    type: string
                env_name:
                    type: string
                grant_id:
                    type: string
                kind:
                    type: string
                scope_level:
                    type: string
                secret_name:
                    type: string
                source_id:
                    type: string
            required:
                - env_name
                - secret_name
                - grant_id
    securitySchemes:
        mutualTLS:
            type: mutualTLS
            description: SPIFFE X.509-SVID mutual TLS on the secrets-service internal listener.
