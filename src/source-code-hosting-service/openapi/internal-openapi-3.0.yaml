components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4262/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    InternalCreateWorkflowRunRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4262/schemas/InternalCreateWorkflowRunRequest.json
          format: uri
          readOnly: true
          type: string
        actor_id:
          maxLength: 255
          minLength: 1
          type: string
        idempotency_key:
          maxLength: 128
          minLength: 1
          type: string
        inputs:
          additionalProperties:
            type: string
          type: object
        org_id:
          type: string
        ref:
          maxLength: 255
          type: string
        repo_id:
          type: string
        workflow_path:
          maxLength: 512
          minLength: 1
          type: string
      required:
        - org_id
        - actor_id
        - repo_id
        - workflow_path
        - idempotency_key
      type: object
    WorkflowRun:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4262/schemas/WorkflowRun.json
          format: uri
          readOnly: true
          type: string
        actor_id:
          type: string
        created_at:
          format: date-time
          type: string
        dispatched_at:
          format: date-time
          type: string
        failure_reason:
          type: string
        inputs:
          additionalProperties:
            type: string
          type: object
        org_id:
          type: string
        provider:
          type: string
        provider_dispatch_id:
          type: string
        ref:
          type: string
        repo_id:
          type: string
        state:
          type: string
        trace_id:
          type: string
        updated_at:
          format: date-time
          type: string
        workflow_path:
          type: string
        workflow_run_id:
          type: string
      required:
        - workflow_run_id
        - org_id
        - repo_id
        - actor_id
        - provider
        - workflow_path
        - ref
        - inputs
        - state
        - created_at
        - updated_at
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: Zitadel OIDC access token for a human subject.
      scheme: bearer
      type: http
    mutualTLS:
      description: SPIFFE mTLS between Forge Metal workloads.
      type: mutualTLS
info:
  title: Source Code Hosting Service Internal API
  version: 1.0.0
openapi: 3.0.3
paths:
  /internal/v1/checkouts/{grant_id}/archive:
    get:
      operationId: download-source-checkout-archive
      parameters:
        - in: path
          name: grant_id
          required: true
          schema:
            format: uuid
            type: string
        - in: header
          name: X-Forge-Metal-Checkout-Token
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/gzip:
              schema:
                format: binary
                type: string
                x-contentMediaType: application/octet-stream
          description: tar.gz source archive
          headers:
            Content-Disposition:
              schema:
                type: string
            Content-Type:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - mutualTLS: []
      summary: Download an archive using a short-lived checkout grant
      x-forge-metal-iam:
        action: consume
        audit_event: source.archive.stream
        data_classification: customer_source_metadata
        event_category: source
        operation_display: download source archive
        operation_type: read
        org_scope: checkout_grant
        permission: source:checkout:write
        rate_limit_class: checkout_download
        resource: source_checkout_grant
        risk_level: high
        source_product_area: Source
  /internal/v1/workflow-runs:
    post:
      operationId: internal-create-source-workflow-run
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalCreateWorkflowRunRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRun"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - mutualTLS: []
      summary: Dispatch a source workflow on behalf of a service-owned schedule
      x-forge-metal-iam:
        action: create
        audit_event: source.workflow.dispatch.internal
        data_classification: customer_source_metadata
        event_category: source
        operation_display: dispatch source workflow internally
        operation_type: write
        org_scope: body_org_id
        permission: source:workflow:write
        rate_limit_class: internal_mutation
        resource: source_workflow_run
        risk_level: high
        source_product_area: Source
servers:
  - url: https://127.0.0.1:4262
