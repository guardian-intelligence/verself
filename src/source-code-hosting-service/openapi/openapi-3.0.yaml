components:
  schemas:
    Blob:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/Blob.json
          format: uri
          readOnly: true
          type: string
        content:
          type: string
        download_url:
          type: string
        encoding:
          type: string
        name:
          type: string
        path:
          type: string
        sha:
          type: string
        size:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
      required:
        - path
        - name
        - encoding
        - content
        - size
        - sha
      type: object
    CheckoutGrant:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/CheckoutGrant.json
          format: uri
          readOnly: true
          type: string
        expires_at:
          format: date-time
          type: string
        grant_id:
          type: string
        ref:
          type: string
        repo_id:
          type: string
        token:
          type: string
      required:
        - grant_id
        - repo_id
        - ref
        - token
        - expires_at
      type: object
    CreateCheckoutGrantRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/CreateCheckoutGrantRequest.json
          format: uri
          readOnly: true
          type: string
        path_prefix:
          maxLength: 1024
          type: string
        ref:
          maxLength: 255
          type: string
      type: object
    CreateGitCredentialRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/CreateGitCredentialRequest.json
          format: uri
          readOnly: true
          type: string
        expires_in_seconds:
          format: int64
          maximum: 7776000
          minimum: 60
          type: integer
        label:
          maxLength: 128
          type: string
      type: object
    CreateRepositoryRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/CreateRepositoryRequest.json
          format: uri
          readOnly: true
          type: string
        default_branch:
          maxLength: 128
          type: string
        description:
          maxLength: 1024
          type: string
        name:
          maxLength: 128
          minLength: 1
          type: string
        project_id:
          type: string
      required:
        - project_id
        - name
      type: object
    CreateWorkflowRunRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/CreateWorkflowRunRequest.json
          format: uri
          readOnly: true
          type: string
        inputs:
          additionalProperties:
            type: string
          type: object
        project_id:
          type: string
        ref:
          maxLength: 255
          type: string
        workflow_path:
          maxLength: 512
          minLength: 1
          type: string
      required:
        - project_id
        - workflow_path
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    GitCredential:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/GitCredential.json
          format: uri
          readOnly: true
          type: string
        created_at:
          format: date-time
          type: string
        credential_id:
          type: string
        expires_at:
          format: date-time
          type: string
        org_id:
          type: string
        org_path:
          type: string
        scopes:
          items:
            type: string
          nullable: true
          type: array
        token:
          type: string
        token_prefix:
          type: string
        username:
          type: string
      required:
        - credential_id
        - org_id
        - org_path
        - username
        - token
        - token_prefix
        - scopes
        - expires_at
        - created_at
      type: object
    Ref:
      additionalProperties: false
      properties:
        commit:
          type: string
        name:
          type: string
      required:
        - name
        - commit
      type: object
    RefList:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/RefList.json
          format: uri
          readOnly: true
          type: string
        refs:
          items:
            $ref: "#/components/schemas/Ref"
          nullable: true
          type: array
      required:
        - refs
      type: object
    Repository:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/Repository.json
          format: uri
          readOnly: true
          type: string
        backend:
          type: string
        created_at:
          format: date-time
          type: string
        default_branch:
          type: string
        description:
          type: string
        last_pushed_at:
          format: date-time
          type: string
        name:
          type: string
        org_id:
          type: string
        org_path:
          type: string
        project_id:
          type: string
        repo_id:
          type: string
        slug:
          type: string
        state:
          type: string
        updated_at:
          format: date-time
          type: string
        version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
        visibility:
          type: string
      required:
        - repo_id
        - org_id
        - project_id
        - org_path
        - name
        - slug
        - description
        - default_branch
        - backend
        - visibility
        - state
        - version
        - created_at
        - updated_at
      type: object
    RepositoryList:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/RepositoryList.json
          format: uri
          readOnly: true
          type: string
        repositories:
          items:
            $ref: "#/components/schemas/Repository"
          nullable: true
          type: array
      required:
        - repositories
      type: object
    Tree:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/Tree.json
          format: uri
          readOnly: true
          type: string
        entries:
          items:
            $ref: "#/components/schemas/TreeEntry"
          nullable: true
          type: array
      required:
        - entries
      type: object
    TreeEntry:
      additionalProperties: false
      properties:
        path:
          type: string
        sha:
          type: string
        size:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        type:
          type: string
      required:
        - path
        - type
        - size
        - sha
      type: object
    WorkflowRun:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/WorkflowRun.json
          format: uri
          readOnly: true
          type: string
        actor_id:
          type: string
        backend:
          type: string
        backend_dispatch_id:
          type: string
        created_at:
          format: date-time
          type: string
        dispatched_at:
          format: date-time
          type: string
        failure_reason:
          type: string
        inputs:
          additionalProperties:
            type: string
          type: object
        org_id:
          type: string
        project_id:
          type: string
        ref:
          type: string
        repo_id:
          type: string
        state:
          type: string
        trace_id:
          type: string
        updated_at:
          format: date-time
          type: string
        workflow_path:
          type: string
        workflow_run_id:
          type: string
      required:
        - workflow_run_id
        - org_id
        - project_id
        - repo_id
        - actor_id
        - backend
        - workflow_path
        - ref
        - inputs
        - state
        - created_at
        - updated_at
      type: object
    WorkflowRunList:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://source.api.anveio.com/schemas/WorkflowRunList.json
          format: uri
          readOnly: true
          type: string
        workflow_runs:
          items:
            $ref: "#/components/schemas/WorkflowRun"
          nullable: true
          type: array
      required:
        - workflow_runs
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: Zitadel OIDC access token for a human subject.
      scheme: bearer
      type: http
    mutualTLS:
      description: SPIFFE mTLS between Verself workloads.
      type: mutualTLS
info:
  title: Source Code Hosting Service
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/v1/git-credentials:
    post:
      operationId: create-source-git-credential
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGitCredentialRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitCredential"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create a scoped HTTPS Git credential
      x-verself-iam:
        action: create
        audit_event: source.git_credential.create
        data_classification: customer_source_metadata
        event_category: source
        operation_display: create source Git credential
        operation_type: write
        org_scope: token_org_id
        permission: source:git_credential:write
        rate_limit_class: source_mutation
        resource: source_git_credential
        risk_level: high
        source_product_area: Source
  /api/v1/repos:
    get:
      operationId: list-source-repositories
      parameters:
        - explode: false
          in: query
          name: project_id
          schema:
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryList"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List source repositories
      x-verself-iam:
        action: list
        audit_event: source.repo.list
        data_classification: customer_source_metadata
        event_category: source
        operation_display: list source repositories
        operation_type: read
        org_scope: token_org_id
        permission: source:repo:read
        rate_limit_class: read
        resource: source_repository
        risk_level: low
        source_product_area: Source
    post:
      operationId: create-source-repository
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRepositoryRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repository"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create a source repository
      x-verself-iam:
        action: create
        audit_event: source.repo.create
        data_classification: customer_source_metadata
        event_category: source
        operation_display: create source repository
        operation_type: write
        org_scope: token_org_id
        permission: source:repo:write
        rate_limit_class: source_mutation
        resource: source_repository
        risk_level: medium
        source_product_area: Source
  /api/v1/repos/{repo_id}:
    get:
      operationId: get-source-repository
      parameters:
        - in: path
          name: repo_id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repository"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get a source repository
      x-verself-iam:
        action: read
        audit_event: source.repo.read
        data_classification: customer_source_metadata
        event_category: source
        operation_display: read source repository
        operation_type: read
        org_scope: token_org_id
        permission: source:repo:read
        rate_limit_class: read
        resource: source_repository
        risk_level: low
        source_product_area: Source
  /api/v1/repos/{repo_id}/blob:
    get:
      operationId: get-source-blob
      parameters:
        - in: path
          name: repo_id
          required: true
          schema:
            format: uuid
            type: string
        - explode: false
          in: query
          name: ref
          schema:
            maxLength: 255
            type: string
        - explode: false
          in: query
          name: path
          required: true
          schema:
            maxLength: 2048
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blob"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get a repository blob
      x-verself-iam:
        action: read
        audit_event: source.blob.get
        data_classification: customer_source_metadata
        event_category: source
        operation_display: read source blob
        operation_type: read
        org_scope: token_org_id
        permission: source:repo:read
        rate_limit_class: read
        resource: source_blob
        risk_level: medium
