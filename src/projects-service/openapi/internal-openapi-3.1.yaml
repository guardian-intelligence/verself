components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://127.0.0.1:4265/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    Project:
      additionalProperties: false
      properties:
        archived_at:
          format: date-time
          type: string
        created_at:
          format: date-time
          type: string
        created_by:
          type: string
        description:
          type: string
        display_name:
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        project_id:
          format: uuid
          type: string
        redirected_from_slug:
          type: string
        slug:
          type: string
        state:
          type: string
        updated_at:
          format: date-time
          type: string
        updated_by:
          type: string
        version:
          pattern: ^-?[0-9]+$
          type: string
      required:
        - project_id
        - org_id
        - slug
        - display_name
        - description
        - state
        - version
        - created_by
        - updated_by
        - created_at
        - updated_at
      type: object
    ProjectEnvironment:
      additionalProperties: false
      properties:
        archived_at:
          format: date-time
          type: string
        created_at:
          format: date-time
          type: string
        created_by:
          type: string
        display_name:
          type: string
        environment_id:
          format: uuid
          type: string
        kind:
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        project_id:
          format: uuid
          type: string
        protection_policy:
          additionalProperties:
            type: string
          type: object
        slug:
          type: string
        state:
          type: string
        updated_at:
          format: date-time
          type: string
        updated_by:
          type: string
        version:
          pattern: ^-?[0-9]+$
          type: string
      required:
        - environment_id
        - project_id
        - org_id
        - slug
        - display_name
        - kind
        - state
        - version
        - created_by
        - updated_by
        - created_at
        - updated_at
      type: object
    ProjectEvent:
      additionalProperties: false
      properties:
        actor_id:
          type: string
        created_at:
          format: date-time
          type: string
        environment_id:
          format: uuid
          type: string
        event_id:
          format: uuid
          type: string
        event_type:
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        payload:
          additionalProperties:
            type: string
          type: object
        project_id:
          format: uuid
          type: string
        trace_id:
          type: string
      required:
        - event_id
        - org_id
        - project_id
        - event_type
        - actor_id
        - created_at
      type: object
    ProjectEventList:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://127.0.0.1:4265/schemas/ProjectEventList.json
          format: uri
          readOnly: true
          type: string
        events:
          items:
            $ref: "#/components/schemas/ProjectEvent"
          type:
            - array
            - "null"
        next_cursor:
          type: string
      required:
        - events
      type: object
    ResolveProjectEnvironmentRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://127.0.0.1:4265/schemas/ResolveProjectEnvironmentRequest.json
          format: uri
          readOnly: true
          type: string
        environment_id:
          format: uuid
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        project_id:
          format: uuid
          type: string
        require_active:
          type: boolean
        slug:
          maxLength: 80
          type: string
      required:
        - org_id
        - project_id
        - require_active
      type: object
    ResolveProjectEnvironmentResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://127.0.0.1:4265/schemas/ResolveProjectEnvironmentResponse.json
          format: uri
          readOnly: true
          type: string
        environment:
          $ref: "#/components/schemas/ProjectEnvironment"
      required:
        - environment
      type: object
    ResolveProjectRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://127.0.0.1:4265/schemas/ResolveProjectRequest.json
          format: uri
          readOnly: true
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        project_id:
          format: uuid
          type: string
        require_active:
          type: boolean
        slug:
          maxLength: 80
          type: string
      required:
        - org_id
        - require_active
      type: object
    ResolveProjectResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://127.0.0.1:4265/schemas/ResolveProjectResponse.json
          format: uri
          readOnly: true
          type: string
        project:
          $ref: "#/components/schemas/Project"
      required:
        - project
      type: object
  securitySchemes:
    mutualTLS:
      description: SPIFFE X.509-SVID mutual TLS on the projects-service internal listener.
      type: mutualTLS
info:
  title: Projects Service Internal API
  version: 1.0.0
openapi: 3.1.0
paths:
  /internal/v1/project-environments/resolve:
    post:
      operationId: resolve-project-environment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveProjectEnvironmentRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveProjectEnvironmentResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - mutualTLS: []
      summary: Resolve a project environment for a repo-owned service
      x-verself-iam:
        action: resolve
        audit_event: projects.environment.resolve
        data_classification: customer_project_metadata
        event_category: projects
        operation_display: resolve project environment
        operation_type: read
        org_scope: request_org_id
        permission: projects:resolve
        rate_limit_class: internal_read
        resource: project_environment
        risk_level: medium
  /internal/v1/project-events:
    get:
      operationId: list-project-events-internal
      parameters:
        - explode: false
          in: query
          name: org_id
          required: true
          schema:
            pattern: ^[0-9]+$
            type: string
        - explode: false
          in: query
          name: cursor
          schema:
            maxLength: 256
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            format: int64
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEventList"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - mutualTLS: []
      summary: List project domain events
      x-verself-iam:
        action: list
        audit_event: projects.event.list
        data_classification: customer_project_metadata
        event_category: projects
        operation_display: list project events
        operation_type: read
        org_scope: request_org_id
        permission: projects:event:read
        rate_limit_class: internal_read
        resource: project_event
        risk_level: medium
  /internal/v1/projects/resolve:
    post:
      operationId: resolve-project
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveProjectRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveProjectResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - mutualTLS: []
      summary: Resolve a project for a repo-owned service
      x-verself-iam:
        action: resolve
        audit_event: projects.project.resolve
        data_classification: customer_project_metadata
        event_category: projects
        operation_display: resolve project
        operation_type: read
        org_scope: request_org_id
        permission: projects:resolve
        rate_limit_class: internal_read
        resource: project
        risk_level: medium
servers:
  - url: https://127.0.0.1:4265
