---
# Install dev tools from generated topology catalog vars.
# Usage: aspect platform setup-dev
# (renders catalog.yml via cue-renderer and passes -e @<path>; the playbook
# itself takes no inventory and no vars_files because it runs pre-provision
# on a fresh controller).
- name: Set up verself development environment
  hosts: localhost
  connection: local
  become: true
  vars:
    # Use system Python, not Nix Python, so pip/apt modules work correctly.
    ansible_python_interpreter: /usr/bin/python3
  pre_tasks:
    - name: Require topology_versions from extra-vars (-e @catalog.yml)
      ansible.builtin.assert:
        that: topology_versions is defined
        fail_msg: >-
          topology_versions is not set. Run: aspect platform setup-dev
          (which renders catalog.yml and passes it via -e @<path>).
  roles:
    - role: dev_tools
      tags: [dev_tools]
