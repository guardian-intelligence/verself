---
# Bootstrap SOPS+Age encryption for verself secrets.
# Runs on localhost (the operator's machine). Idempotent.
#
# What it does:
#   1. Generates an Age keypair if one doesn't exist
#   2. Writes .sops.yaml with the Age public key
#   3. Installs the community.sops Ansible collection
#   4. Generates all service credentials
#   5. Writes and encrypts ansible/group_vars/all/secrets.sops.yml
#
# Usage:
#   aspect dev sops-init

- name: Bootstrap SOPS encryption
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    repo_root: "{{ playbook_dir }}/../../../.."
    secrets_file: "{{ playbook_dir }}/../group_vars/all/secrets.sops.yml"
    age_key_file: >-
      {{ lookup('env', 'SOPS_AGE_KEY_FILE')
         | default(lookup('env', 'HOME') ~ '/.config/sops/age/keys.txt', true) }}

  tasks:
    # --- Dependency checks ---

    - name: Assert age-keygen is installed
      ansible.builtin.command: which age-keygen
      changed_when: false
      failed_when: age_keygen_check.rc != 0
      register: age_keygen_check

    - name: Assert sops is installed
      ansible.builtin.command: which sops
      changed_when: false
      failed_when: sops_check.rc != 0
      register: sops_check

    # --- Age key generation ---

    - name: Check for existing Age key
      ansible.builtin.stat:
        path: "{{ age_key_file }}"
      register: age_key_stat

    - name: Create Age key directory
      ansible.builtin.file:
        path: "{{ age_key_file | dirname }}"
        state: directory
        mode: "0700"
      when: not age_key_stat.stat.exists

    - name: Generate Age keypair
      ansible.builtin.command:
        cmd: age-keygen -o {{ age_key_file }}
      when: not age_key_stat.stat.exists
      changed_when: true

    - name: Set Age key file permissions
      ansible.builtin.file:
        path: "{{ age_key_file }}"
        mode: "0600"

    - name: Extract Age public key
      ansible.builtin.shell:
        cmd: set -o pipefail && grep -o 'age1[a-z0-9]*' {{ age_key_file }} | head -1
      args:
        executable: /bin/bash
      register: age_pub_key
      changed_when: false

    - name: Display Age public key
      ansible.builtin.debug:
        msg: "Age public key: {{ age_pub_key.stdout }}"

    # --- .sops.yaml ---

    - name: Write .sops.yaml
      ansible.builtin.copy:
        content: |
          # sops configuration for verself secrets.
          # The age public key is written by: aspect dev sops-init
          #
          # Encrypted files (*.sops.yml) are safe to commit.
          # The age private key (~/.config/sops/age/keys.txt) is NOT.

          creation_rules:
            - path_regex: \.sops\.yml$
              age: >-
                {{ age_pub_key.stdout }}
        dest: "{{ repo_root }}/.sops.yaml"
        mode: "0644"

    # --- Ansible collection ---

    - name: Install community.sops Ansible collection
      ansible.builtin.command:
        cmd: >-
          ansible-galaxy collection install
          -r {{ playbook_dir }}/../requirements.yml
          --force-with-deps
      changed_when: true

    # --- Skip if already encrypted ---

    - name: Check for existing secrets.sops.yml
      ansible.builtin.stat:
        path: "{{ secrets_file }}"
      register: secrets_file_stat

    - name: End early if secrets.sops.yml already exists
      ansible.builtin.meta: end_play
      when: secrets_file_stat.stat.exists

    # --- Generate credentials ---

    - name: Generate random components
      ansible.builtin.set_fact:
        _rand32s: >-
          {{
            (_rand32s | default({}))
            | combine({
                item: lookup('community.general.random_string',
                             length=32, upper=true, lower=true,
                             numbers=true, special=false)
              })
          }}
      loop:
        - postgresql_admin_password
        - postgresql_billing_password
        - zitadel_db_password
        - zitadel_masterkey
        - zitadel_admin_password
        - postgresql_sandbox_rental_password
        - postgresql_identity_service_password
      loop_control:
        label: "{{ item }}"
      no_log: true

    # --- Write and encrypt ---

    - name: Write plaintext secrets file
      ansible.builtin.copy:
        content: |
          cloudflare_api_token: ""
          latitudesh_auth_token: ""
          postgresql_admin_password: "{{ _rand32s.postgresql_admin_password }}"
          postgresql_billing_password: "{{ _rand32s.postgresql_billing_password }}"
          zitadel_db_password: "{{ _rand32s.zitadel_db_password }}"
          zitadel_masterkey: "{{ _rand32s.zitadel_masterkey }}"
          zitadel_admin_password: "{{ _rand32s.zitadel_admin_password }}#@F1"
          zitadel_admin_pat: ""
          postgresql_sandbox_rental_password: "{{ _rand32s.postgresql_sandbox_rental_password }}"
          postgresql_identity_service_password: "{{ _rand32s.postgresql_identity_service_password }}"
          stripe_secret_key: ""
          stripe_webhook_secret: ""
          resend_api_key: ""
        dest: "{{ secrets_file }}"
        mode: "0600"
      no_log: true

    - name: Encrypt secrets file with SOPS
      ansible.builtin.command:
        cmd: sops encrypt -i {{ secrets_file }}
      changed_when: true

    # --- Summary ---

    - name: Report setup complete
      ansible.builtin.debug:
        msg: |
          SOPS encryption bootstrapped.
            Secrets file: {{ secrets_file }}
            Age key:      {{ age_key_file }}

            Next steps:
              Edit secrets:  sops src/substrate/ansible/group_vars/all/secrets.sops.yml
              Deploy:        aspect deploy --site=prod
