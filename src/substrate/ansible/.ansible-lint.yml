---
profile: production
use_default_rules: true
rulesdir:
  - rules/

exclude_paths:
  - .cache/
  - group_vars/all/secrets.sops.yml

enable_list:
  - no-default-ports
  - no-execstart-secrets
  - no-masterkey-cli
  - no-psql-object-state
  - no-secret-without-no-log
  - no-validate-certs-false
  - services-registry-contract

warn_list:
  - experimental
  - jinja[spacing]
  - fqcn[deep]

# Disable auto-fix so ansible-lint never modifies files during pre-commit.
# Without this, pre-commit sees modified files and fails the hook even when
# lint passes, which blocks partial commits.
write_list: []

offline: true
