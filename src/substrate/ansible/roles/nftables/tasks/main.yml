---
- name: Ensure nftables is installed
  ansible.builtin.apt:
    name: nftables
    state: present

- name: Create nftables config directory
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    mode: "0755"

- name: Resolve Firecracker uplink for existing generated ruleset
  ansible.builtin.set_fact:
    nftables_firecracker_uplink: >-
      {{
        firecracker_host_uplink_interface
        if (firecracker_host_uplink_interface | default('', true)) != ''
        else ansible_facts.default_ipv4.interface | default('')
      }}

# firecracker.nft is rendered from CUE but has one host runtime fact: the
# uplink interface. Repair any prior generic copy before this role reloads.
- name: Substitute uplink placeholder in existing Firecracker ruleset
  ansible.builtin.replace:
    path: /etc/nftables.d/firecracker.nft
    regexp: __VERSELF_UPLINK__
    replace: "{{ nftables_firecracker_uplink }}"
  when: nftables_firecracker_uplink | length > 0
  notify: reload nftables

- name: Deploy main nftables config
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/nftables.conf"
    dest: /etc/nftables.conf
    mode: "0644"
  notify: reload nftables

- name: Collect rendered nftables rulesets
  ansible.builtin.set_fact:
    nftables_rendered_rulesets: >-
      {{
        lookup('ansible.builtin.fileglob', platform_rendered_dir + '/etc/nftables.d/*.nft', wantlist=True)
        | reject('search', '/firecracker\\.nft$')
        | sort
        | list
      }}

- name: Deploy rendered nftables rulesets
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/nftables.d/{{ item | basename }}"
    mode: "0644"
  loop: "{{ nftables_rendered_rulesets }}"
  loop_control:
    label: "{{ item | basename }}"
  when: (item | basename) != "firecracker.nft"
  notify: reload nftables

- name: Enable and start nftables service
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
    daemon_reload: true

- name: Deploy verself-firewall target
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/systemd/system/verself-firewall.target"
    dest: /etc/systemd/system/verself-firewall.target
    mode: "0644"

- name: Enable verself-firewall target
  ansible.builtin.systemd:
    name: verself-firewall.target
    enabled: true
    state: started
    daemon_reload: true
