---
- name: Restart Caddy
  listen: restart caddy
  ansible.builtin.systemd:
    daemon_reload: true
    name: caddy
    state: restarted

- name: Update CA certificates
  listen: update ca certificates
  ansible.builtin.command:
    cmd: update-ca-certificates
  register: caddy_update_ca_certificates
  changed_when: >-
    '0 added, 0 removed' not in
    (caddy_update_ca_certificates.stdout ~ caddy_update_ca_certificates.stderr)
