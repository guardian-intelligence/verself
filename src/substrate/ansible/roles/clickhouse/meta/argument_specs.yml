---
argument_specs:
  main:
    short_description: "ClickHouse service and verself schema migrations"
    description:
      - "Deploys ClickHouse, configures the standalone"
      - "service unit, and applies verself migrations to the verself"
      - "database when the local migration fingerprint changes."
      - "Service ports come from CUE-rendered topology, not from this role."
    options:
      clickhouse_data_path:
        type: path
        default: /var/lib/clickhouse
        description: "ClickHouse data directory."

      verself_bin:
        type: path
        required: true
        description: "Path to the server binary directory."
