---
# Required
# zitadel_oauth_app_name: e.g. "verself-web"
# zitadel_oauth_app_project_name: e.g. "sandbox-rental"
# zitadel_oauth_app_redirect_uris: list of URLs
# zitadel_oauth_app_post_logout_redirect_uris: list of URLs
# zitadel_oauth_app_credstore_dir: e.g. "/etc/credstore/verself-web"
# zitadel_oauth_app_credstore_group: group that owns the credstore files

# Optional, with defaults
zitadel_oauth_app_auth_method_type: OIDC_AUTH_METHOD_TYPE_POST
zitadel_oauth_app_app_type: OIDC_APP_TYPE_WEB
zitadel_oauth_app_access_token_type: OIDC_TOKEN_TYPE_JWT
zitadel_oauth_app_grant_types:
  - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
  - OIDC_GRANT_TYPE_REFRESH_TOKEN
zitadel_oauth_app_response_types:
  - OIDC_RESPONSE_TYPE_CODE
zitadel_oauth_app_dev_mode: false
zitadel_oauth_app_role_assertions: false
zitadel_oauth_app_create_project_if_missing: false
zitadel_oauth_app_project_role_assertion: false
zitadel_oauth_app_project_role_check: false
zitadel_oauth_app_persist_client_secret: true
zitadel_oauth_app_credstore_owner: root
zitadel_oauth_app_credstore_mode: "0640"
zitadel_oauth_app_credstore_dir_mode: "0750"
zitadel_oauth_app_client_secret_filename: oidc-client-secret
zitadel_oauth_app_cutover_marker_filename: oidc-cutover
zitadel_oauth_app_admin_pat_file: /etc/zitadel/admin.pat
