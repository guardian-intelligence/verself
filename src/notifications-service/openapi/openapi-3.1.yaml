components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4260/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    Notification:
      additionalProperties: false
      properties:
        action_url:
          type: string
        body:
          type: string
        created_at:
          format: date-time
          type: string
        dismissed_at:
          format: date-time
          type: string
        expires_at:
          format: date-time
          type: string
        kind:
          type: string
        notification_id:
          description: Notification UUID.
          type: string
        org_id:
          type: string
        priority:
          enum:
            - low
            - normal
            - high
          type: string
        recipient_sequence:
          description: Per-recipient sequence, decimal-encoded for JavaScript safety.
          type: string
        recipient_subject_id:
          type: string
        resource_id:
          type: string
        resource_kind:
          type: string
        title:
          type: string
      required:
        - notification_id
        - org_id
        - recipient_subject_id
        - recipient_sequence
        - kind
        - priority
        - title
        - body
        - created_at
      type: object
    NotificationAccepted:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4260/schemas/NotificationAccepted.json
          format: uri
          readOnly: true
          type: string
        event_id:
          type: string
        traceparent:
          type: string
      required:
        - event_id
      type: object
    NotificationList:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4260/schemas/NotificationList.json
          format: uri
          readOnly: true
          type: string
        notifications:
          items:
            $ref: "#/components/schemas/Notification"
          type:
            - array
            - "null"
        summary:
          $ref: "#/components/schemas/NotificationSummary"
      required:
        - summary
        - notifications
      type: object
    NotificationMarkReadRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4260/schemas/NotificationMarkReadRequest.json
          format: uri
          readOnly: true
          type: string
        read_up_to_sequence:
          pattern: ^[0-9]+$
          type: string
      required:
        - read_up_to_sequence
      type: object
    NotificationPreferences:
      additionalProperties: false
      properties:
        enabled:
          type: boolean
        updated_at:
          format: date-time
          type: string
        updated_by:
          type: string
        version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
      required:
        - enabled
        - version
        - updated_at
        - updated_by
      type: object
    NotificationPutPreferencesRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4260/schemas/NotificationPutPreferencesRequest.json
          format: uri
          readOnly: true
          type: string
        enabled:
          type: boolean
        version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
      required:
        - version
        - enabled
      type: object
    NotificationSummary:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4260/schemas/NotificationSummary.json
          format: uri
          readOnly: true
          type: string
        latest_notification:
          $ref: "#/components/schemas/Notification"
        latest_sequence:
          description: Latest notification sequence, decimal-encoded for JavaScript safety.
          type: string
        org_id:
          description: Active organization ID from the validated token.
          type: string
        preferences:
          $ref: "#/components/schemas/NotificationPreferences"
        read_up_to_sequence:
          description: Read cursor sequence, decimal-encoded for JavaScript safety.
          type: string
        subject_id:
          description: Zitadel human subject ID.
          type: string
        unread_count:
          format: int32
          maximum: 999
          minimum: 0
          type: integer
      required:
        - org_id
        - subject_id
        - unread_count
        - latest_sequence
        - read_up_to_sequence
        - preferences
      type: object
    NotificationTestRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4260/schemas/NotificationTestRequest.json
          format: uri
          readOnly: true
          type: string
        action_url:
          maxLength: 500
          type: string
        body:
          maxLength: 500
          type: string
        title:
          maxLength: 120
          type: string
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: Zitadel OIDC access token for a human subject.
      scheme: bearer
      type: http
info:
  title: Notifications Service
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/v1/notifications:
    get:
      operationId: list-notifications
      parameters:
        - explode: false
          in: query
          name: limit
          schema:
            default: 20
            format: int64
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List current human notifications
      x-forge-metal-iam:
        action: read
        audit_event: notification.list.notifications
        data_classification: controller_personal_data
        event_category: notifications
        operation_display: List current human notifications
        operation_type: read
        org_scope: token_subject
        permission: notifications:self:read
        rate_limit_class: read
        resource: notification_subject
        risk_level: low
        source_product_area: Notifications
  /api/v1/notifications/clear:
    post:
      operationId: clear-notifications
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSummary"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Dismiss all current human notifications
      x-forge-metal-iam:
        action: write
        audit_event: notification.clear.notifications
        data_classification: controller_personal_data
        event_category: notifications
        operation_display: Dismiss all current human notifications
        operation_type: write
        org_scope: token_subject
        permission: notifications:self:write
        rate_limit_class: notification_mutation
        resource: notification_subject
        risk_level: medium
        source_product_area: Notifications
  /api/v1/notifications/preferences:
    put:
      operationId: put-notification-preferences
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPutPreferencesRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSummary"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Replace current human notification preferences
      x-forge-metal-iam:
        action: write
        audit_event: notification.put.notification.preferences
        data_classification: controller_personal_data
        event_category: notifications
        operation_display: Replace current human notification preferences
        operation_type: write
        org_scope: token_subject
        permission: notifications:self:preferences:write
        rate_limit_class: notification_mutation
        resource: notification_subject
        risk_level: medium
        source_product_area: Notifications
  /api/v1/notifications/read-cursor:
    post:
      operationId: advance-notification-read-cursor
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationMarkReadRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSummary"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Advance current human notification read cursor
      x-forge-metal-iam:
        action: write
        audit_event: notification.advance.notification.read.cursor
        data_classification: controller_personal_data
        event_category: notifications
        operation_display: Advance current human notification read cursor
        operation_type: write
        org_scope: token_subject
        permission: notifications:self:write
        rate_limit_class: notification_mutation
        resource: notification_subject
        risk_level: medium
        source_product_area: Notifications
  /api/v1/notifications/summary:
    get:
      operationId: get-notification-summary
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSummary"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get current human notification summary
      x-forge-metal-iam:
        action: read
        audit_event: notification.get.notification.summary
        data_classification: controller_personal_data
        event_category: notifications
        operation_display: Get current human notification summary
        operation_type: read
        org_scope: token_subject
        permission: notifications:self:read
        rate_limit_class: read
        resource: notification_subject
        risk_level: low
        source_product_area: Notifications
  /api/v1/notifications/test:
    post:
      operationId: publish-test-notification
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationTestRequest"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationAccepted"
          description: Accepted
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Publish a synthetic notification to the current human
      x-forge-metal-iam:
        action: write
        audit_event: notification.publish.test.notification
        data_classification: controller_personal_data
        event_category: notifications
        operation_display: Publish a synthetic notification to the current human
        operation_type: write
        org_scope: token_subject
        permission: notifications:self:test
        rate_limit_class: notification_mutation
        resource: notification_subject
        risk_level: medium
        source_product_area: Notifications
  /api/v1/notifications/{notification_id}/dismiss:
    post:
      operationId: dismiss-notification
      parameters:
        - in: path
          name: notification_id
          required: true
          schema:
            format: uuid
            type: string
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSummary"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Dismiss a current human notification
      x-forge-metal-iam:
        action: write
        audit_event: notification.dismiss.notification
        data_classification: controller_personal_data
        event_category: notifications
        operation_display: Dismiss a current human notification
        operation_type: write
        org_scope: token_subject
        permission: notifications:self:write
        rate_limit_class: notification_mutation
        resource: notification_subject
        risk_level: medium
        source_product_area: Notifications
servers:
  - url: http://127.0.0.1:4260
