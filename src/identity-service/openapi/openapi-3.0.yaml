components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    IdentityAPICredential:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityAPICredential.json
          format: uri
          readOnly: true
          type: string
        auth_method:
          type: string
        client_id:
          type: string
        created_at:
          format: date-time
          type: string
        created_by:
          type: string
        credential_id:
          type: string
        display_name:
          type: string
        expires_at:
          format: date-time
          type: string
        fingerprint:
          type: string
        last_used_at:
          format: date-time
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        permissions:
          items:
            type: string
          nullable: true
          type: array
        policy_version_at_issue:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
        revoked_at:
          format: date-time
          type: string
        revoked_by:
          type: string
        status:
          type: string
        subject_id:
          type: string
        updated_at:
          format: date-time
          type: string
      required:
        - credential_id
        - org_id
        - subject_id
        - client_id
        - display_name
        - status
        - auth_method
        - fingerprint
        - permissions
        - policy_version_at_issue
        - created_at
        - created_by
        - updated_at
      type: object
    IdentityAPICredentialIssuedMaterial:
      additionalProperties: false
      properties:
        auth_method:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        fingerprint:
          type: string
        key_content:
          type: string
        key_id:
          type: string
        token_url:
          type: string
      required:
        - auth_method
        - client_id
        - token_url
        - fingerprint
      type: object
    IdentityAPICredentials:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityAPICredentials.json
          format: uri
          readOnly: true
          type: string
        credentials:
          items:
            $ref: "#/components/schemas/IdentityAPICredential"
          nullable: true
          type: array
      required:
        - credentials
      type: object
    IdentityCreateAPICredentialRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityCreateAPICredentialRequest.json
          format: uri
          readOnly: true
          type: string
        auth_method:
          enum:
            - private_key_jwt
            - client_secret
          type: string
        display_name:
          maxLength: 200
          type: string
        expires_at:
          format: date-time
          type: string
        permissions:
          items:
            type: string
          maxItems: 256
          minItems: 1
          nullable: true
          type: array
      required:
        - display_name
        - permissions
      type: object
    IdentityCreateAPICredentialResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityCreateAPICredentialResponse.json
          format: uri
          readOnly: true
          type: string
        credential:
          $ref: "#/components/schemas/IdentityAPICredential"
        issued_material:
          $ref: "#/components/schemas/IdentityAPICredentialIssuedMaterial"
      required:
        - credential
        - issued_material
      type: object
    IdentityInviteMemberRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityInviteMemberRequest.json
          format: uri
          readOnly: true
          type: string
        email:
          maxLength: 320
          type: string
        family_name:
          maxLength: 100
          type: string
        given_name:
          maxLength: 100
          type: string
        role_keys:
          items:
            type: string
          maxItems: 16
          minItems: 1
          nullable: true
          type: array
      required:
        - email
        - role_keys
      type: object
    IdentityInviteMemberResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityInviteMemberResponse.json
          format: uri
          readOnly: true
          type: string
        email:
          type: string
        role_keys:
          items:
            type: string
          nullable: true
          type: array
        status:
          type: string
        user_id:
          type: string
      required:
        - user_id
        - email
        - role_keys
        - status
      type: object
    IdentityMember:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityMember.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        email:
          type: string
        login_name:
          type: string
        role_keys:
          items:
            type: string
          nullable: true
          type: array
        state:
          type: string
        user_id:
          type: string
      required:
        - user_id
        - email
        - login_name
        - display_name
        - state
        - role_keys
      type: object
    IdentityMembers:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityMembers.json
          format: uri
          readOnly: true
          type: string
        members:
          items:
            $ref: "#/components/schemas/IdentityMember"
          nullable: true
          type: array
      required:
        - members
      type: object
    IdentityOperation:
      additionalProperties: false
      properties:
        action:
          type: string
        operation_id:
          type: string
        org_scope:
          type: string
        permission:
          type: string
        resource:
          type: string
      required:
        - operation_id
        - permission
        - resource
        - action
        - org_scope
      type: object
    IdentityOperations:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityOperations.json
          format: uri
          readOnly: true
          type: string
        services:
          items:
            $ref: "#/components/schemas/IdentityServiceOperations"
          nullable: true
          type: array
      required:
        - services
      type: object
    IdentityOrganization:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityOrganization.json
          format: uri
          readOnly: true
          type: string
        caller:
          $ref: "#/components/schemas/IdentityMember"
        name:
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        permissions:
          items:
            type: string
          nullable: true
          type: array
        policy:
          $ref: "#/components/schemas/IdentityPolicyDocument"
      required:
        - org_id
        - name
        - caller
        - policy
        - permissions
      type: object
    IdentityPolicyDocument:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityPolicyDocument.json
          format: uri
          readOnly: true
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        roles:
          items:
            $ref: "#/components/schemas/IdentityPolicyRole"
          nullable: true
          type: array
        updated_at:
          format: date-time
          type: string
        updated_by:
          type: string
        version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
      required:
        - org_id
        - version
        - roles
        - updated_at
        - updated_by
      type: object
    IdentityPolicyRole:
      additionalProperties: false
      properties:
        display_name:
          maxLength: 200
          type: string
        permissions:
          items:
            type: string
          maxItems: 256
          minItems: 1
          nullable: true
          type: array
        role_key:
          maxLength: 100
          type: string
      required:
        - role_key
        - display_name
        - permissions
      type: object
    IdentityPutPolicyRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityPutPolicyRequest.json
          format: uri
          readOnly: true
          type: string
        roles:
          items:
            $ref: "#/components/schemas/IdentityPolicyRole"
          maxItems: 32
          minItems: 1
          nullable: true
          type: array
        version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
      required:
        - version
        - roles
      type: object
    IdentityRollAPICredentialRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityRollAPICredentialRequest.json
          format: uri
          readOnly: true
          type: string
        auth_method:
          enum:
            - private_key_jwt
            - client_secret
          type: string
      type: object
    IdentityRollAPICredentialResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityRollAPICredentialResponse.json
          format: uri
          readOnly: true
          type: string
        credential:
          $ref: "#/components/schemas/IdentityAPICredential"
        issued_material:
          $ref: "#/components/schemas/IdentityAPICredentialIssuedMaterial"
      required:
        - credential
        - issued_material
      type: object
    IdentityServiceOperations:
      additionalProperties: false
      properties:
        operations:
          items:
            $ref: "#/components/schemas/IdentityOperation"
          nullable: true
          type: array
        service:
          type: string
      required:
        - service
        - operations
      type: object
    IdentityUpdateMemberRolesRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4248/schemas/IdentityUpdateMemberRolesRequest.json
          format: uri
          readOnly: true
          type: string
        role_keys:
          items:
            type: string
          maxItems: 16
          minItems: 1
          nullable: true
          type: array
      required:
        - role_keys
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: Zitadel-issued bearer token scoped to the identity-service API audience.
      scheme: bearer
      type: http
info:
  title: Identity Service
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/v1/organization:
    get:
      operationId: get-organization
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityOrganization"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get organization identity state
      x-forge-metal-iam:
        action: read
        audit_event: identity.organization.read
        org_scope: token_org_id
        permission: identity:organization:read
        rate_limit_class: read
        resource: organization
  /api/v1/organization/api-credentials:
    get:
      operationId: list-api-credentials
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityAPICredentials"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List organization API credentials
      x-forge-metal-iam:
        action: list
        audit_event: identity.api_credential.list
        org_scope: token_org_id
        permission: identity:api_credentials:read
        rate_limit_class: read
        resource: api_credential
    post:
      operationId: create-api-credential
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityCreateAPICredentialRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityCreateAPICredentialResponse"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create an API credential
      x-forge-metal-iam:
        action: create
        audit_event: identity.api_credential.create
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: identity:api_credentials:create
        rate_limit_class: api_credential_mutation
        request_body_max_bytes: 16384
        resource: api_credential
  /api/v1/organization/api-credentials/{credential_id}:
    delete:
      operationId: revoke-api-credential
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
        - description: Forge Metal API credential ID
          in: path
          name: credential_id
          required: true
          schema:
            description: Forge Metal API credential ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityAPICredential"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Revoke an API credential
      x-forge-metal-iam:
        action: revoke
        audit_event: identity.api_credential.revoke
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: identity:api_credentials:revoke
        rate_limit_class: api_credential_mutation
        request_body_max_bytes: 1024
        resource: api_credential
    get:
      operationId: get-api-credential
      parameters:
        - description: Forge Metal API credential ID
          in: path
          name: credential_id
          required: true
          schema:
            description: Forge Metal API credential ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityAPICredential"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get API credential metadata
      x-forge-metal-iam:
        action: read
        audit_event: identity.api_credential.read
        org_scope: token_org_id
        permission: identity:api_credentials:read
        rate_limit_class: read
        resource: api_credential
  /api/v1/organization/api-credentials/{credential_id}/roll:
    post:
      operationId: roll-api-credential
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
        - description: Forge Metal API credential ID
          in: path
          name: credential_id
          required: true
          schema:
            description: Forge Metal API credential ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityRollAPICredentialRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityRollAPICredentialResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Roll API credential secret material
      x-forge-metal-iam:
        action: roll
        audit_event: identity.api_credential.roll
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: identity:api_credentials:roll
        rate_limit_class: api_credential_mutation
        request_body_max_bytes: 16384
        resource: api_credential
  /api/v1/organization/members:
    get:
      operationId: list-organization-members
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityMembers"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List organization members
      x-forge-metal-iam:
        action: list
        audit_event: identity.organization.member.list
        org_scope: token_org_id
        permission: identity:member:read
        rate_limit_class: read
        resource: organization_member
    post:
      operationId: invite-organization-member
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityInviteMemberRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityInviteMemberResponse"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Invite an organization member
      x-forge-metal-iam:
        action: invite
        audit_event: identity.organization.member.invite
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: identity:member:invite
        rate_limit_class: member_mutation
        request_body_max_bytes: 16384
        resource: organization_member
  /api/v1/organization/members/{user_id}/roles:
    put:
      operationId: update-organization-member-roles
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
        - description: Zitadel user ID
          in: path
          name: user_id
          required: true
          schema:
            description: Zitadel user ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityUpdateMemberRolesRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityMember"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Update organization member roles
      x-forge-metal-iam:
        action: write
        audit_event: identity.organization.member.roles.write
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: identity:member:roles:write
        rate_limit_class: member_mutation
        request_body_max_bytes: 16384
        resource: organization_member_roles
  /api/v1/organization/operations:
    get:
      operationId: list-organization-operations
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityOperations"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List service-declared operations available to policy documents
      x-forge-metal-iam:
        action: list
        audit_event: identity.organization.operations.list
        org_scope: token_org_id
        permission: identity:operations:read
        rate_limit_class: read
        resource: service_operation
  /api/v1/organization/policy:
    get:
      operationId: get-organization-policy
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityPolicyDocument"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get organization policy document
      x-forge-metal-iam:
        action: read
        audit_event: identity.organization.policy.read
        org_scope: token_org_id
        permission: identity:policy:read
        rate_limit_class: read
        resource: organization_policy
    put:
      operationId: put-organization-policy
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityPutPolicyRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityPolicyDocument"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Replace organization policy document
      x-forge-metal-iam:
        action: write
        audit_event: identity.organization.policy.write
        idempotency: idempotency_key_header
        org_scope: token_org_id
        permission: identity:policy:write
        rate_limit_class: policy_mutation
        request_body_max_bytes: 16384
        resource: organization_policy
servers:
  - url: http://127.0.0.1:4248
