components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    IdentityAPICredential:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityAPICredential.json
          format: uri
          readOnly: true
          type: string
        auth_method:
          type: string
        client_id:
          type: string
        created_at:
          format: date-time
          type: string
        created_by:
          type: string
        credential_id:
          type: string
        display_name:
          type: string
        expires_at:
          format: date-time
          type: string
        fingerprint:
          type: string
        last_used_at:
          format: date-time
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        permissions:
          items:
            type: string
          nullable: true
          type: array
        policy_version_at_issue:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
        revoked_at:
          format: date-time
          type: string
        revoked_by:
          type: string
        status:
          type: string
        subject_id:
          type: string
        updated_at:
          format: date-time
          type: string
      required:
        - credential_id
        - org_id
        - subject_id
        - client_id
        - display_name
        - status
        - auth_method
        - fingerprint
        - permissions
        - policy_version_at_issue
        - created_at
        - created_by
        - updated_at
      type: object
    IdentityAPICredentialIssuedMaterial:
      additionalProperties: false
      properties:
        auth_method:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        fingerprint:
          type: string
        key_content:
          type: string
        key_id:
          type: string
        token_url:
          type: string
      required:
        - auth_method
        - client_id
        - token_url
        - fingerprint
      type: object
    IdentityAPICredentials:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityAPICredentials.json
          format: uri
          readOnly: true
          type: string
        credentials:
          items:
            $ref: "#/components/schemas/IdentityAPICredential"
          nullable: true
          type: array
      required:
        - credentials
      type: object
    IdentityCreateAPICredentialRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityCreateAPICredentialRequest.json
          format: uri
          readOnly: true
          type: string
        auth_method:
          enum:
            - private_key_jwt
            - client_secret
          type: string
        display_name:
          maxLength: 200
          type: string
        expires_at:
          format: date-time
          type: string
        permissions:
          items:
            type: string
          maxItems: 256
          minItems: 1
          nullable: true
          type: array
      required:
        - display_name
        - permissions
      type: object
    IdentityCreateAPICredentialResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityCreateAPICredentialResponse.json
          format: uri
          readOnly: true
          type: string
        credential:
          $ref: "#/components/schemas/IdentityAPICredential"
        issued_material:
          $ref: "#/components/schemas/IdentityAPICredentialIssuedMaterial"
      required:
        - credential
        - issued_material
      type: object
    IdentityInviteMemberRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityInviteMemberRequest.json
          format: uri
          readOnly: true
          type: string
        email:
          maxLength: 320
          type: string
        family_name:
          maxLength: 100
          type: string
        given_name:
          maxLength: 100
          type: string
        role_keys:
          items:
            type: string
          maxItems: 16
          minItems: 1
          nullable: true
          type: array
      required:
        - email
        - role_keys
      type: object
    IdentityInviteMemberResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityInviteMemberResponse.json
          format: uri
          readOnly: true
          type: string
        email:
          type: string
        role_keys:
          items:
            type: string
          nullable: true
          type: array
        status:
          type: string
        user_id:
          type: string
      required:
        - user_id
        - email
        - role_keys
        - status
      type: object
    IdentityMember:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityMember.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        email:
          type: string
        login_name:
          type: string
        role_keys:
          items:
            type: string
          nullable: true
          type: array
        state:
          type: string
        user_id:
          type: string
      required:
        - user_id
        - email
        - login_name
        - display_name
        - state
        - role_keys
      type: object
    IdentityMemberCapabilities:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityMemberCapabilities.json
          format: uri
          readOnly: true
          type: string
        catalog:
          items:
            $ref: "#/components/schemas/IdentityMemberCapability"
          nullable: true
          type: array
        document:
          $ref: "#/components/schemas/IdentityMemberCapabilitiesDocument"
      required:
        - document
        - catalog
      type: object
    IdentityMemberCapabilitiesDocument:
      additionalProperties: false
      properties:
        enabled_keys:
          items:
            type: string
          nullable: true
          type: array
        org_id:
          pattern: ^[0-9]+$
          type: string
        updated_at:
          format: date-time
          type: string
        updated_by:
          type: string
        version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
      required:
        - org_id
        - version
        - enabled_keys
        - updated_at
        - updated_by
      type: object
    IdentityMemberCapability:
      additionalProperties: false
      properties:
        default_enabled:
          type: boolean
        description:
          type: string
        key:
          type: string
        label:
          type: string
        permissions:
          items:
            type: string
          nullable: true
          type: array
      required:
        - key
        - label
        - description
        - default_enabled
        - permissions
      type: object
    IdentityMembers:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityMembers.json
          format: uri
          readOnly: true
          type: string
        members:
          items:
            $ref: "#/components/schemas/IdentityMember"
          nullable: true
          type: array
      required:
        - members
      type: object
    IdentityOrganization:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityOrganization.json
          format: uri
          readOnly: true
          type: string
        caller:
          $ref: "#/components/schemas/IdentityMember"
        member_capabilities:
          $ref: "#/components/schemas/IdentityMemberCapabilitiesDocument"
        name:
          type: string
        org_acl_version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
        org_id:
          pattern: ^[0-9]+$
          type: string
        permissions:
          items:
            type: string
          nullable: true
          type: array
      required:
        - org_id
        - name
        - org_acl_version
        - caller
        - member_capabilities
        - permissions
      type: object
    IdentityPutMemberCapabilitiesRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityPutMemberCapabilitiesRequest.json
          format: uri
          readOnly: true
          type: string
        enabled_keys:
          items:
            type: string
          maxItems: 32
          minItems: 0
          nullable: true
          type: array
        version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
      required:
        - version
        - enabled_keys
      type: object
    IdentityRollAPICredentialRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityRollAPICredentialRequest.json
          format: uri
          readOnly: true
          type: string
        auth_method:
          enum:
            - private_key_jwt
            - client_secret
          type: string
      type: object
    IdentityRollAPICredentialResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityRollAPICredentialResponse.json
          format: uri
          readOnly: true
          type: string
        credential:
          $ref: "#/components/schemas/IdentityAPICredential"
        issued_material:
          $ref: "#/components/schemas/IdentityAPICredentialIssuedMaterial"
      required:
        - credential
        - issued_material
      type: object
    IdentityUpdateMemberRolesRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://identity.api.anveio.com/schemas/IdentityUpdateMemberRolesRequest.json
          format: uri
          readOnly: true
          type: string
        expected_org_acl_version:
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
        expected_role_keys:
          items:
            type: string
          maxItems: 16
          minItems: 1
          nullable: true
          type: array
        role_keys:
          items:
            type: string
          maxItems: 16
          minItems: 1
          nullable: true
          type: array
      required:
        - role_keys
        - expected_role_keys
        - expected_org_acl_version
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: Zitadel-issued bearer token scoped to the identity-service API audience.
      scheme: bearer
      type: http
info:
  title: Identity Service
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/v1/organization:
    get:
      operationId: get-organization
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityOrganization"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get organization identity state
      x-verself-iam:
        action: read
        audit_event: identity.organization.read
        data_classification: restricted
        event_category: identity
        operation_display: get organization
        operation_type: read
        org_scope: token_org_id
        permission: identity:organization:read
        rate_limit_class: read
        resource: organization
        risk_level: medium
        source_product_area: Identity
  /api/v1/organization/api-credentials:
    get:
      operationId: list-api-credentials
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityAPICredentials"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List organization API credentials
      x-verself-iam:
        action: list
        audit_event: identity.api_credential.list
        data_classification: restricted
        event_category: identity
        operation_display: list api credentials
        operation_type: read
        org_scope: token_org_id
        permission: identity:api_credentials:read
        rate_limit_class: read
        resource: api_credential
        risk_level: high
        source_product_area: Identity
    post:
      operationId: create-api-credential
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityCreateAPICredentialRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityCreateAPICredentialResponse"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create an API credential
      x-verself-iam:
        action: create
        audit_event: identity.api_credential.create
        data_classification: restricted
        event_category: identity
        idempotency: idempotency_key_header
        operation_display: create api credential
        operation_type: write
        org_scope: token_org_id
        permission: identity:api_credentials:create
        rate_limit_class: api_credential_mutation
        request_body_max_bytes: 16384
        resource: api_credential
        risk_level: high
        source_product_area: Identity
  /api/v1/organization/api-credentials/{credential_id}:
    delete:
      operationId: revoke-api-credential
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
        - description: Verself API credential ID
          in: path
          name: credential_id
          required: true
          schema:
            description: Verself API credential ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityAPICredential"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Revoke an API credential
      x-verself-iam:
        action: revoke
        audit_event: identity.api_credential.revoke
        data_classification: restricted
        event_category: identity
        idempotency: idempotency_key_header
        operation_display: revoke api credential
        operation_type: delete
        org_scope: token_org_id
        permission: identity:api_credentials:revoke
        rate_limit_class: api_credential_mutation
        request_body_max_bytes: 1024
        resource: api_credential
        risk_level: high
        source_product_area: Identity
    get:
      operationId: get-api-credential
      parameters:
        - description: Verself API credential ID
          in: path
          name: credential_id
          required: true
          schema:
            description: Verself API credential ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityAPICredential"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get API credential metadata
      x-verself-iam:
        action: read
        audit_event: identity.api_credential.read
        data_classification: restricted
        event_category: identity
        operation_display: get api credential
        operation_type: read
        org_scope: token_org_id
        permission: identity:api_credentials:read
        rate_limit_class: read
        resource: api_credential
        risk_level: high
        source_product_area: Identity
  /api/v1/organization/api-credentials/{credential_id}/roll:
    post:
      operationId: roll-api-credential
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
        - description: Verself API credential ID
          in: path
          name: credential_id
          required: true
          schema:
            description: Verself API credential ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityRollAPICredentialRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityRollAPICredentialResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Roll API credential secret material
      x-verself-iam:
        action: roll
        audit_event: identity.api_credential.roll
        data_classification: restricted
        event_category: identity
        idempotency: idempotency_key_header
        operation_display: roll api credential
        operation_type: write
        org_scope: token_org_id
        permission: identity:api_credentials:roll
        rate_limit_class: api_credential_mutation
        request_body_max_bytes: 16384
        resource: api_credential
        risk_level: high
        source_product_area: Identity
  /api/v1/organization/member-capabilities:
    get:
      operationId: get-organization-member-capabilities
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityMemberCapabilities"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get organization member capabilities and the static capability catalog
      x-verself-iam:
        action: read
        audit_event: identity.organization.member_capabilities.read
        data_classification: restricted
        event_category: identity
        operation_display: get organization member capabilities
        operation_type: read
        org_scope: token_org_id
        permission: identity:member_capabilities:read
        rate_limit_class: read
        resource: organization_member_capabilities
        risk_level: high
        source_product_area: Identity
    put:
      operationId: put-organization-member-capabilities
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityPutMemberCapabilitiesRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityMemberCapabilities"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Replace the organization's enabled member capability set
      x-verself-iam:
        action: write
        audit_event: identity.organization.member_capabilities.write
        data_classification: restricted
        event_category: identity
        idempotency: idempotency_key_header
        operation_display: put organization member capabilities
        operation_type: write
        org_scope: token_org_id
        permission: identity:member_capabilities:write
        rate_limit_class: member_capabilities_mutation
        request_body_max_bytes: 16384
        resource: organization_member_capabilities
        risk_level: high
        source_product_area: Identity
  /api/v1/organization/members:
    get:
      operationId: list-organization-members
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityMembers"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List organization members
      x-verself-iam:
        action: list
        audit_event: identity.organization.member.list
        data_classification: restricted
        event_category: identity
        operation_display: list organization members
        operation_type: read
        org_scope: token_org_id
        permission: identity:member:read
        rate_limit_class: read
        resource: organization_member
        risk_level: medium
        source_product_area: Identity
    post:
      operationId: invite-organization-member
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityInviteMemberRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityInviteMemberResponse"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Invite an organization member
      x-verself-iam:
        action: invite
        audit_event: identity.organization.member.invite
        data_classification: restricted
        event_category: identity
        idempotency: idempotency_key_header
        operation_display: invite organization member
        operation_type: write
        org_scope: token_org_id
        permission: identity:member:invite
        rate_limit_class: member_mutation
        request_body_max_bytes: 16384
        resource: organization_member
        risk_level: high
        source_product_area: Identity
  /api/v1/organization/members/{user_id}/roles:
    put:
      operationId: update-organization-member-roles
      parameters:
        - description: Stable caller-provided key used to make this mutation retry-safe.
          in: header
          name: Idempotency-Key
          required: true
          schema:
            maxLength: 128
            minLength: 1
            type: string
        - description: Zitadel user ID
          in: path
          name: user_id
          required: true
          schema:
            description: Zitadel user ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityUpdateMemberRolesRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityMember"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Update organization member roles
      x-verself-iam:
        action: write
        audit_event: identity.organization.member.roles.write
        data_classification: restricted
        event_category: identity
        idempotency: idempotency_key_header
        operation_display: update organization member roles
        operation_type: write
        org_scope: token_org_id
