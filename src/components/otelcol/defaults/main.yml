---
otelcol_system_user: otelcol
otelcol_system_group: otelcol
otelcol_otlp_grpc_port: 4317
otelcol_otlp_http_port: 4318
otelcol_statsd_address: 127.0.0.1:8125
otelcol_postgresql_address: "{{ postgresql_address }}"
otelcol_openbao_api_address: 127.0.0.1:8200
otelcol_temporal_metrics_address: 127.0.0.1:9001
otelcol_nomad_http_address: "{{ nomad_http_address }}"
otelcol_haproxy_metrics_address: 127.0.0.1:8404
otelcol_clickhouse_native_tls_address: 127.0.0.1:9440
otelcol_log_reader_groups:
  - adm
  - systemd-journal
otelcol_clickhouse_user: otelcol
otelcol_clickhouse_spiffe_dir: /var/lib/otelcol/clickhouse-spiffe
otelcol_clickhouse_server_ca_path: /etc/otelcol/clickhouse-server-ca.pem
otelcol_clickhouse_helper_config_path: /etc/otelcol/clickhouse-spiffe-helper.conf
