---
argument_specs:
  main:
    short_description: "OpenTelemetry Collector exporting directly to ClickHouse"
    description:
      - "Deploys otelcol-contrib, configures OTLP"
      - "receivers plus host and HAProxy scraping, and exports logs, traces,"
      - "and metrics into ClickHouse."
      - "Service ports are component defaults or Nomad service registrations."
    options:
      verself_bin:
        type: path
        required: true
        description: "Path to the server binary directory."
