---
- name: Read OpenBao root token for runtime-secret convergence
  ansible.builtin.slurp:
    src: "{{ openbao_credstore_dir }}/root-token"
  register: openbao_root_token_raw
  no_log: true

- name: Assert OpenBao platform runtime-secret inputs
  ansible.builtin.assert:
    that:
      - openbao_runtime_secret_platform_org_id | length > 0
      - openbao_runtime_secret_kv_mount_prefix | length > 0
      - openbao_runtime_secret_consumer_subject | length > 0
    fail_msg: "OpenBao runtime-secret convergence requires platform org, KV prefix, and consumer SPIFFE subject."

- name: Build OpenBao platform runtime-secret desired state
  ansible.builtin.set_fact:
    openbao_runtime_secret_kv_mount: >-
      {{ openbao_runtime_secret_kv_mount_prefix }}-{{ openbao_runtime_secret_platform_org_id }}
    openbao_runtime_secret_injection_policy: >-
      secrets-{{ openbao_runtime_secret_platform_org_id }}-injection-read
    openbao_runtime_secret_read_policy: >-
      secrets-{{ openbao_runtime_secret_platform_org_id }}-secret-read
    openbao_runtime_secret_write_policy: >-
      secrets-{{ openbao_runtime_secret_platform_org_id }}-secret-write
    openbao_runtime_secret_injection_role: >-
      secrets-injection-{{ openbao_runtime_secret_platform_org_id }}
    openbao_runtime_secret_write_role: >-
      secrets-runtime-write-{{ openbao_runtime_secret_platform_org_id }}

- name: Build OpenBao platform runtime-secret policy list
  ansible.builtin.set_fact:
    openbao_runtime_secret_policies:
      - name: "{{ openbao_runtime_secret_injection_policy }}"
        policy: >-
          path "{{ openbao_runtime_secret_kv_mount }}/data/secret/*" { capabilities = ["read"] }
          path "{{ openbao_runtime_secret_kv_mount }}/metadata/secret/*" { capabilities = ["read", "list"] }
      - name: "{{ openbao_runtime_secret_read_policy }}"
        policy: >-
          path "{{ openbao_runtime_secret_kv_mount }}/data/secret/org/*" { capabilities = ["read"] }
          path "{{ openbao_runtime_secret_kv_mount }}/metadata/secret/org/*" { capabilities = ["read", "list"] }
      - name: "{{ openbao_runtime_secret_write_policy }}"
        policy: >-
          path "{{ openbao_runtime_secret_kv_mount }}/data/secret/org/*" { capabilities = ["create", "update", "read", "delete"] }
          path "{{ openbao_runtime_secret_kv_mount }}/metadata/secret/org/*" { capabilities = ["read", "list", "delete"] }

- name: Build OpenBao platform runtime-secret role list
  ansible.builtin.set_fact:
    openbao_runtime_secret_roles:
      - name: "{{ openbao_runtime_secret_injection_role }}"
        token_policies:
          - "{{ openbao_runtime_secret_injection_policy }}"
      - name: "{{ openbao_runtime_secret_write_role }}"
        token_policies:
          - "{{ openbao_runtime_secret_read_policy }}"
          - "{{ openbao_runtime_secret_write_policy }}"

- name: Build OpenBao platform runtime-secret seed list
  ansible.builtin.set_fact:
    openbao_runtime_secret_seed_items:
      - name: billing-service.stripe.secret_key
        value: "{{ stripe_secret_key | default('', true) }}"
      - name: billing-service.stripe.webhook_secret
        value: "{{ stripe_webhook_secret | default('', true) }}"
      - name: mailbox-service.resend.api_key
        value: "{{ resend_api_key | default('', true) }}"
      - name: mailbox-service.stalwart.admin_password
        value: "{{ stalwart_admin_password | default('', true) }}"
      - name: sandbox-rental-service.github.private_key
        value: "{{ sandbox_rental_service_github_app_private_key | default('', true) }}"
      - name: sandbox-rental-service.github.webhook_secret
        value: "{{ sandbox_rental_service_github_app_webhook_secret | default('', true) }}"
      - name: sandbox-rental-service.github.client_secret
        value: "{{ sandbox_rental_service_github_app_client_secret | default('', true) }}"
  no_log: true

- name: Assert OpenBao platform runtime-secret seed values are present
  ansible.builtin.assert:
    that:
      - item.value | length > 0
    fail_msg: "Missing platform runtime-secret seed value for {{ item.name }}."
  loop: "{{ openbao_runtime_secret_seed_items }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Compute OpenBao platform runtime-secret fingerprint
  ansible.builtin.set_fact:
    openbao_runtime_secret_marker_path: >-
      {{ openbao_credstore_dir }}/runtime-secrets-{{ openbao_runtime_secret_platform_org_id }}.sha256
    openbao_runtime_secret_desired_fingerprint: >-
      {{
        {
          'schema': 1,
          'kv_mount': openbao_runtime_secret_kv_mount,
          'spiffe_jwt_mount': openbao_spiffe_jwt_mount,
          'workload_audience': openbao_workload_audience,
          'workload_token_ttl': openbao_workload_token_ttl,
          'workload_token_max_ttl': openbao_workload_token_max_ttl,
          'consumer_subject': openbao_runtime_secret_consumer_subject,
          'policies': openbao_runtime_secret_policies,
          'roles': openbao_runtime_secret_roles,
          'seed_items': openbao_runtime_secret_seed_items,
        } | to_json | hash('sha256')
      }}
  no_log: true

- name: Check OpenBao platform runtime-secret fingerprint marker
  ansible.builtin.stat:
    path: "{{ openbao_runtime_secret_marker_path }}"
  register: openbao_runtime_secret_marker
  no_log: true

- name: Read OpenBao platform runtime-secret fingerprint marker
  ansible.builtin.slurp:
    src: "{{ openbao_runtime_secret_marker_path }}"
  register: openbao_runtime_secret_marker_raw
  when: openbao_runtime_secret_marker.stat.exists
  no_log: true

- name: Decide whether OpenBao platform runtime-secret convergence can be skipped
  ansible.builtin.set_fact:
    openbao_runtime_secret_converged: >-
      {{
        not (openbao_runtime_secret_force | bool)
        and openbao_runtime_secret_marker.stat.exists
        and (
          openbao_runtime_secret_marker_raw.content
          | default('')
          | b64decode
          | trim
        ) == openbao_runtime_secret_desired_fingerprint
      }}
  no_log: true

- name: Converge OpenBao platform runtime-secret API state
  when: not (openbao_runtime_secret_converged | bool)
  block:
    - name: List OpenBao secret mounts for platform runtime secrets
      ansible.builtin.uri:
        url: "https://{{ openbao_api_address }}/v1/sys/mounts"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
        ca_path: "{{ openbao_tls_dir }}/cert.pem"
        status_code: 200
        return_content: true
      register: openbao_runtime_secret_mounts_response
      changed_when: false
      no_log: true

    - name: Mount platform runtime-secret KV v2
      ansible.builtin.uri:
        url: "https://{{ openbao_api_address }}/v1/sys/mounts/{{ openbao_runtime_secret_kv_mount }}"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
        body_format: json
        body:
          type: kv
          options:
            version: "2"
          description: "Verself platform runtime secrets"
        ca_path: "{{ openbao_tls_dir }}/cert.pem"
        status_code: 204
      when: (openbao_runtime_secret_kv_mount ~ '/') not in (openbao_runtime_secret_mounts_response.json.data.keys() | list)
      changed_when: true
      no_log: true

    - name: Read OpenBao platform runtime-secret policies
      ansible.builtin.uri:
        url: "https://{{ openbao_api_address }}/v1/sys/policies/acl/{{ item.name }}"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
        ca_path: "{{ openbao_tls_dir }}/cert.pem"
        status_code: [200, 404]
        return_content: true
      loop: "{{ openbao_runtime_secret_policies }}"
      loop_control:
        label: "{{ item.name }}"
      register: openbao_runtime_secret_policy_reads
      changed_when: false
      no_log: true

    - name: Write OpenBao platform runtime-secret policies
      ansible.builtin.uri:
        url: "https://{{ openbao_api_address }}/v1/sys/policies/acl/{{ item.name }}"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
        body_format: json
        body:
          policy: "{{ item.policy }}"
        ca_path: "{{ openbao_tls_dir }}/cert.pem"
        status_code: [200, 204]
      loop: "{{ openbao_runtime_secret_policies }}"
      loop_control:
        index_var: openbao_runtime_secret_policy_index
        label: "{{ item.name }}"
      when: >-
        openbao_runtime_secret_policy_reads.results[openbao_runtime_secret_policy_index].status == 404
        or (
          openbao_runtime_secret_policy_reads.results[openbao_runtime_secret_policy_index].json.data.policy
          | default('')
          | trim
        ) != (item.policy | trim)
      changed_when: true
      no_log: true

    - name: Read OpenBao platform runtime-secret roles
      ansible.builtin.uri:
        url: "https://{{ openbao_api_address }}/v1/auth/{{ openbao_spiffe_jwt_mount }}/role/{{ item.name }}"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
        ca_path: "{{ openbao_tls_dir }}/cert.pem"
        status_code: [200, 404]
        return_content: true
      loop: "{{ openbao_runtime_secret_roles }}"
      loop_control:
        label: "{{ item.name }}"
      register: openbao_runtime_secret_role_reads
      changed_when: false
      no_log: true

    - name: Configure OpenBao platform runtime-secret roles
      ansible.builtin.uri:
        url: "https://{{ openbao_api_address }}/v1/auth/{{ openbao_spiffe_jwt_mount }}/role/{{ item.name }}"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
        body_format: json
        body:
          role_type: jwt
          bound_audiences:
            - "{{ openbao_workload_audience }}"
          bound_subject: "{{ openbao_runtime_secret_consumer_subject }}"
          user_claim: sub
          token_policies: "{{ item.token_policies }}"
          token_ttl: "{{ openbao_workload_token_ttl }}"
          token_max_ttl: "{{ openbao_workload_token_max_ttl }}"
        ca_path: "{{ openbao_tls_dir }}/cert.pem"
        status_code: 204
      loop: "{{ openbao_runtime_secret_roles }}"
      loop_control:
        index_var: openbao_runtime_secret_role_index
        label: "{{ item.name }}"
      changed_when: >-
        openbao_runtime_secret_role_reads.results[openbao_runtime_secret_role_index].status == 404
        or (
          openbao_runtime_secret_role_reads.results[openbao_runtime_secret_role_index].json.data.bound_subject
          | default('')
        ) != openbao_runtime_secret_consumer_subject
        or (
          openbao_runtime_secret_role_reads.results[openbao_runtime_secret_role_index].json.data.bound_audiences
          | default([])
          | sort
        ) != ([openbao_workload_audience] | sort)
        or (
          openbao_runtime_secret_role_reads.results[openbao_runtime_secret_role_index].json.data.token_policies
          | default([])
          | sort
        ) != (item.token_policies | sort)
      no_log: true

    - name: Set OpenBao platform runtime-secret seed timestamp
      ansible.builtin.set_fact:
        openbao_runtime_secret_seed_now: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"
      no_log: true

    - name: Read OpenBao platform runtime-secret seed values
      ansible.builtin.uri:
        url: "https://{{ openbao_api_address }}/v1/{{ openbao_runtime_secret_kv_mount }}/data/secret/org/{{ item.name }}"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
        ca_path: "{{ openbao_tls_dir }}/cert.pem"
        status_code: [200, 404]
        return_content: true
      loop: "{{ openbao_runtime_secret_seed_items }}"
      loop_control:
        label: "{{ item.name }}"
      register: openbao_runtime_secret_seed_reads
      changed_when: false
      no_log: true

    - name: Write OpenBao platform runtime-secret seed values
      ansible.builtin.uri:
        url: "https://{{ openbao_api_address }}/v1/{{ openbao_runtime_secret_kv_mount }}/data/secret/org/{{ item.name }}"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
        body_format: json
        body:
          data:
            org_id: "{{ openbao_runtime_secret_platform_org_id }}"
            kind: secret
            name: "{{ item.name }}"
            scope_level: org
            source_id: ""
            env_id: ""
            branch: ""
            value: "{{ item.value }}"
            created_at: >-
              {{
                openbao_runtime_secret_seed_reads.results[openbao_runtime_secret_seed_index].json.data.data.created_at
                | default(openbao_runtime_secret_seed_now)
              }}
            updated_at: "{{ openbao_runtime_secret_seed_now }}"
        ca_path: "{{ openbao_tls_dir }}/cert.pem"
        status_code: [200, 204]
      loop: "{{ openbao_runtime_secret_seed_items }}"
      loop_control:
        index_var: openbao_runtime_secret_seed_index
        label: "{{ item.name }}"
      when: >-
        openbao_runtime_secret_seed_reads.results[openbao_runtime_secret_seed_index].status == 404
        or (
          openbao_runtime_secret_seed_reads.results[openbao_runtime_secret_seed_index].json.data.data.kind
          | default('')
        ) != 'secret'
        or (
          openbao_runtime_secret_seed_reads.results[openbao_runtime_secret_seed_index].json.data.data.name
          | default('')
        ) != item.name
        or (
          openbao_runtime_secret_seed_reads.results[openbao_runtime_secret_seed_index].json.data.data.scope_level
          | default('')
        ) != 'org'
        or (
          openbao_runtime_secret_seed_reads.results[openbao_runtime_secret_seed_index].json.data.data.value
          | default('')
        ) != item.value
      changed_when: true
      no_log: true

    - name: Record OpenBao platform runtime-secret fingerprint marker
      ansible.builtin.copy:
        dest: "{{ openbao_runtime_secret_marker_path }}"
        owner: root
        group: openbao
        mode: "0640"
        content: "{{ openbao_runtime_secret_desired_fingerprint }}\n"
      no_log: true
