---
- name: Create NATS system group
  ansible.builtin.group:
    name: nats
    system: true

- name: Create NATS system user
  ansible.builtin.user:
    name: nats
    group: nats
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    home: "{{ nats_data_dir }}"
    create_home: false

- name: Create NATS directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ nats_config_dir }}", owner: root, group: nats, mode: "0750" }
    - { path: "{{ nats_data_dir }}", owner: nats, group: nats, mode: "0750" }
    - { path: "{{ nats_jetstream_dir }}", owner: nats, group: nats, mode: "0750" }
    - { path: "{{ nats_spiffe_dir }}", owner: nats, group: nats, mode: "0700" }

- name: Deploy NATS nftables ruleset
  ansible.builtin.copy:
    src: "{{ platform_host_files_dir }}/etc/nftables.d/nats.nft"
    dest: /etc/nftables.d/nats.nft
    mode: "0644"
  notify: reload nftables

- name: Apply NATS nftables before proceeding
  ansible.builtin.meta: flush_handlers

- name: Deploy NATS SPIFFE helper config
  ansible.builtin.template:
    src: nats-spiffe-helper.conf.j2
    dest: "{{ nats_helper_config_path }}"
    owner: root
    group: nats
    mode: "0640"
  notify: restart nats-spiffe-helper

- name: Deploy NATS SPIFFE helper unit
  ansible.builtin.template:
    src: nats-spiffe-helper.service.j2
    dest: /etc/systemd/system/nats-spiffe-helper.service
    mode: "0644"
  notify: restart nats-spiffe-helper

- name: Enable and start NATS SPIFFE helper
  ansible.builtin.systemd:
    name: nats-spiffe-helper
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for NATS SPIFFE certificate
  ansible.builtin.wait_for:
    path: "{{ nats_spiffe_dir }}/svid.pem"
    timeout: 30

- name: Deploy NATS config
  ansible.builtin.template:
    src: nats-server.conf.j2
    dest: "{{ nats_config_dir }}/nats-server.conf"
    owner: root
    group: nats
    mode: "0640"
  notify: restart nats

- name: Deploy NATS systemd unit
  ansible.builtin.template:
    src: nats.service.j2
    dest: /etc/systemd/system/nats.service
    mode: "0644"
  notify: restart nats

- name: Enable and start NATS
  ansible.builtin.systemd:
    name: nats
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for NATS listener
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.nats.host }}"
    port: "{{ topology_endpoints.nats.endpoints.client.port }}"
    timeout: 30
