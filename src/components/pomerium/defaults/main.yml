---
# Pomerium operator access gateway.
pomerium_config_dir: /etc/pomerium
pomerium_config_path: "{{ pomerium_config_dir }}/config.yaml"
pomerium_credstore_dir: /etc/credstore/pomerium
pomerium_data_dir: /var/lib/pomerium
pomerium_log_dir: /var/log/pomerium

pomerium_listen_address: "{{ topology_endpoints.pomerium.endpoints.http.address }}"
pomerium_grpc_address: "127.0.0.1:5443"
pomerium_health_address: "127.0.0.1:28080"
pomerium_cookie_name: _pomerium_operator

pomerium_shared_secret_path: "{{ pomerium_credstore_dir }}/shared-secret"
pomerium_cookie_secret_path: "{{ pomerium_credstore_dir }}/cookie-secret"
pomerium_signing_key_path: "{{ pomerium_credstore_dir }}/signing-key"
pomerium_signing_key_raw_path: "{{ pomerium_credstore_dir }}/signing-key.pem"
pomerium_ssh_user_ca_key_path: "{{ pomerium_credstore_dir }}/ssh-user-ca"
pomerium_ssh_user_ca_pubkey_path: "{{ pomerium_ssh_user_ca_key_path }}.pub"
pomerium_ssh_host_key_path: "{{ pomerium_credstore_dir }}/ssh-host-ed25519"
pomerium_db_password_path: "{{ pomerium_credstore_dir }}/pg-password"
pomerium_db_connection_string_path: "{{ pomerium_credstore_dir }}/databroker-postgres-url"
pomerium_oidc_client_secret_path: "{{ pomerium_credstore_dir }}/oidc-client-secret"

pomerium_db_name: pomerium
pomerium_db_user: pomerium
pomerium_db_connection_limit: "{{ postgresql_role_connection_limits.pomerium | default(20) }}"

pomerium_oidc_project_name: operator-access
pomerium_oidc_app_name: pomerium-operator-access
pomerium_oidc_redirect_uri: "https://{{ pomerium_domain }}/oauth2/callback"
pomerium_oidc_post_logout_redirect_uri: "https://{{ pomerium_domain }}"
pomerium_oidc_scopes: "openid, profile, email, offline_access"

pomerium_operator_allowed_domains: []
pomerium_operator_allowed_emails:
  - "ceo@{{ verself_domain }}"

pomerium_ssh_address: "{{ ansible_host }}:22"
pomerium_ssh_route_name: prod
pomerium_ssh_upstream: "127.0.0.1:22"
pomerium_ssh_allowed_user: ubuntu
