---
# Grafana defaults.
grafana_subdomain: dashboard
grafana_domain: "{{ grafana_subdomain }}.{{ verself_domain }}"
grafana_host: 127.0.0.1
grafana_http_port: 4300
grafana_http_address: "{{ grafana_host }}:{{ grafana_http_port }}"
grafana_postgresql_address: "{{ postgresql_address }}"
grafana_clickhouse_host: 127.0.0.1
grafana_clickhouse_native_tls_port: 9440
grafana_clickhouse_datasource_version: 4.14.1

grafana_install_dir: /opt/verself/grafana
grafana_config_dir: /etc/grafana
grafana_data_dir: /var/lib/grafana
grafana_log_dir: /var/log/grafana
grafana_plugin_dir: "{{ grafana_data_dir }}/plugins"
grafana_provisioning_dir: "{{ grafana_config_dir }}/provisioning"
grafana_credstore_dir: /etc/credstore/grafana

grafana_db_name: grafana
grafana_db_user: grafana
grafana_db_connection_limit: 10

grafana_clickhouse_user: grafana_observer
grafana_clickhouse_spiffe_dir: "{{ grafana_data_dir }}/clickhouse-spiffe"
grafana_clickhouse_server_ca_cred: "{{ grafana_credstore_dir }}/clickhouse-server-ca.pem"
grafana_clickhouse_datasource_path: "{{ grafana_provisioning_dir }}/datasources/clickhouse.yml"
grafana_clickhouse_refresh_script_path: /usr/local/bin/refresh-grafana-clickhouse-datasource
grafana_clickhouse_helper_config_path: "{{ grafana_config_dir }}/clickhouse-spiffe-helper.conf"
grafana_datasource_uid: verself-clickhouse
grafana_datasource_name: Verself ClickHouse
grafana_jwt_jwks_url: "https://{{ grafana_domain }}/.well-known/pomerium/jwks.json"
grafana_signout_redirect_url: "https://{{ grafana_domain }}/.pomerium/sign_out"
