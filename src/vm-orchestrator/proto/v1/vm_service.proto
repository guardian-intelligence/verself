syntax = "proto3";

package forge_metal.vm_orchestrator.v1;

option go_package = "github.com/forge-metal/vm-orchestrator/proto/v1;vmrpc";

service VMService {
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse);
  rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
  rpc StreamJobLogs(StreamJobLogsRequest) returns (stream JobLogChunk);
  rpc StreamGuestEvents(StreamGuestEventsRequest) returns (stream JobGuestEvent);
  rpc WarmGolden(WarmGoldenRequest) returns (WarmGoldenResponse);
  rpc StreamTelemetry(StreamTelemetryRequest) returns (stream TelemetryEvent);
  rpc GetFleetSnapshot(GetFleetSnapshotRequest) returns (GetFleetSnapshotResponse);
  rpc GetCapacity(GetCapacityRequest) returns (GetCapacityResponse);
}

enum JobState {
  JOB_STATE_UNSPECIFIED = 0;
  JOB_STATE_PENDING = 1;
  JOB_STATE_RUNNING = 2;
  JOB_STATE_SUCCEEDED = 3;
  JOB_STATE_FAILED = 4;
  JOB_STATE_CANCELED = 5;
}

message JobConfig {
  string job_id = 1;
  repeated string prepare_command = 2;
  string prepare_work_dir = 3;
  repeated string run_command = 4;
  string run_work_dir = 5;
  repeated string services = 6;
  map<string, string> env = 7;
}

message RuntimeConfig {
  string pool = 1;
  string golden_zvol = 2;
  string ci_dataset = 3;
  string kernel_path = 4;
  string firecracker_bin = 5;
  string jailer_bin = 6;
  string jailer_root = 7;
  int32 jailer_uid = 8;
  int32 jailer_gid = 9;
  int32 vcpus = 10;
  int32 memory_mib = 11;
  string host_interface = 12;
  string guest_pool_cidr = 13;
  string network_lease_dir = 14;
  string host_service_ip = 15;
  int32 host_service_port = 16;
}

message PhaseResult {
  string name = 1;
  int32 exit_code = 2;
  int64 duration_ms = 3;
}

message VMMetrics {
  uint64 boot_time_us = 1;
  uint64 block_read_bytes = 2;
  uint64 block_write_bytes = 3;
  uint64 block_read_count = 4;
  uint64 block_write_count = 5;
  uint64 net_rx_bytes = 6;
  uint64 net_tx_bytes = 7;
  uint64 vcpu_exit_count = 8;
}

message RepoManifest {
  string kind = 1;
  string requested_ref = 2;
  string resolved_commit_sha = 3;
  string lockfile_rel_path = 4;
  string lockfile_sha256 = 5;
  string previous_lockfile_sha256 = 6;
  bool install_needed = 7;
}

message JobResult {
  int32 exit_code = 1;
  string logs = 2;
  string serial_logs = 3;
  int64 duration_ms = 4;
  int64 clone_time_ms = 5;
  int64 jail_setup_time_ms = 6;
  int64 vm_boot_time_ms = 7;
  int64 boot_to_ready_duration_ms = 8;
  int64 prepare_duration_ms = 9;
  int64 run_duration_ms = 10;
  int64 service_start_duration_ms = 11;
  int64 vm_exit_wait_duration_ms = 12;
  int64 cleanup_time_ms = 13;
  uint64 zfs_written = 14;
  uint64 stdout_bytes = 15;
  uint64 stderr_bytes = 16;
  uint64 dropped_log_bytes = 17;
  bool forced_shutdown = 18;
  repeated PhaseResult phase_results = 19;
  string failure_phase = 20;
  VMMetrics metrics = 21;
  RepoManifest repo_manifest = 22;
}

message DirectJobSpec {
  RuntimeConfig runtime_config = 1;
  JobConfig job = 2;
}

message RepoExecSpec {
  RuntimeConfig runtime_config = 1;
  string repo = 2;
  string repo_url = 3;
  string ref = 4;
  JobConfig job_template = 5;
  string lockfile_rel_path = 6;
}

message CreateJobRequest {
  oneof spec {
    DirectJobSpec direct_job = 1;
    RepoExecSpec repo_exec = 2;
  }
}

message CreateJobResponse {
  string job_id = 1;
  JobState state = 2;
}

message GetJobStatusRequest {
  string job_id = 1;
  bool include_output = 2;
}

message RepoExecMetadata {
  string repo = 1;
  string repo_url = 2;
  string ref = 3;
  string golden_snapshot = 4;
  int64 clone_duration_ms = 5;
  bool install_needed = 6;
  string commit_sha = 7;
}

message GetJobStatusResponse {
  string job_id = 1;
  JobState state = 2;
  bool terminal = 3;
  string error_message = 4;
  JobResult result = 5;
  RepoExecMetadata repo_exec = 6;
}

message CancelJobRequest {
  string job_id = 1;
}

message CancelJobResponse {
  bool canceled = 1;
}

message StreamJobLogsRequest {
  string job_id = 1;
  bool follow = 2;
}

message JobLogChunk {
  uint64 seq = 1;
  string chunk = 2;
  bool terminal = 3;
}

message StreamGuestEventsRequest {
  string job_id = 1;
  bool follow = 2;
}

message JobGuestEvent {
  uint64 seq = 1;
  string job_id = 2;
  string kind = 3;
  map<string, string> attrs = 4;
  bool terminal = 5;
}

message WarmGoldenRequest {
  RuntimeConfig runtime_config = 1;
  string repo = 2;
  string repo_url = 3;
  string default_branch = 4;
  JobConfig job = 5;
  string lockfile_rel_path = 6;
}

message WarmGoldenResponse {
  string target_dataset = 1;
  string previous_dataset = 2;
  bool promoted = 3;
  int64 clone_duration_ms = 5;
  int64 snapshot_promotion_duration_ms = 7;
  int64 previous_destroy_duration_ms = 8;
  string commit_sha = 9;
  JobResult job_result = 10;
  string error_message = 11;
}

enum TelemetryFrameKind {
  TELEMETRY_FRAME_KIND_UNSPECIFIED = 0;
  TELEMETRY_FRAME_KIND_HELLO = 1;
  TELEMETRY_FRAME_KIND_SAMPLE = 2;
}

message TelemetryHello {
  uint32 seq = 1;
  uint32 flags = 2;
  uint64 mono_ns = 3;
  uint64 wall_ns = 4;
  string boot_id = 5;
  uint64 mem_total_kb = 6;
}

message TelemetrySample {
  uint32 seq = 1;
  uint32 flags = 2;
  uint64 mono_ns = 3;
  uint64 wall_ns = 4;
  uint64 cpu_user_ticks = 5;
  uint64 cpu_system_ticks = 6;
  uint64 cpu_idle_ticks = 7;
  uint32 load1_centis = 8;
  uint32 load5_centis = 9;
  uint32 load15_centis = 10;
  uint32 procs_running = 11;
  uint32 procs_blocked = 12;
  uint64 mem_available_kb = 13;
  uint64 io_read_bytes = 14;
  uint64 io_write_bytes = 15;
  uint64 net_rx_bytes = 16;
  uint64 net_tx_bytes = 17;
  uint32 psi_cpu_pct100 = 18;
  uint32 psi_mem_pct100 = 19;
  uint32 psi_io_pct100 = 20;
}

message StreamTelemetryRequest {
  string job_id = 1;
}

message TelemetryEvent {
  string job_id = 1;
  uint64 received_at_unix_nano = 2;
  TelemetryFrameKind kind = 3;
  oneof frame {
    TelemetryHello hello = 4;
    TelemetrySample sample = 5;
  }
}

message FleetVM {
  string job_id = 1;
  JobState state = 2;
  uint64 last_update_unix_nano = 3;
  TelemetryHello hello = 4;
  TelemetrySample latest_sample = 5;
}

message GetFleetSnapshotRequest {}

message GetFleetSnapshotResponse {
  repeated FleetVM vms = 1;
}

message GetCapacityRequest {}

message GetCapacityResponse {
  string guest_pool_cidr = 1;
  uint32 total_slots = 2;
  uint32 active_jobs = 3;
  uint32 available_slots = 4;
  uint32 vcpus_per_vm = 5;
  uint32 memory_mib_per_vm = 6;
}
