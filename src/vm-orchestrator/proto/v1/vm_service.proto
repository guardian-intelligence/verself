syntax = "proto3";

package forge_metal.vm_orchestrator.v1;

option go_package = "github.com/forge-metal/vm-orchestrator/proto/v1;vmrpc";

service VMService {
  rpc EnsureRun(EnsureRunRequest) returns (EnsureRunResponse);
  rpc GetRun(GetRunRequest) returns (GetRunResponse);
  rpc StreamRunEvents(StreamRunEventsRequest) returns (stream HostRunEvent);
  rpc CancelRun(CancelRunRequest) returns (CancelRunResponse);
  rpc GetCapacity(GetCapacityRequest) returns (GetCapacityResponse);
}

enum RunState {
  RUN_STATE_UNSPECIFIED = 0;
  RUN_STATE_PENDING = 1;
  RUN_STATE_RUNNING = 2;
  RUN_STATE_SUCCEEDED = 3;
  RUN_STATE_FAILED = 4;
  RUN_STATE_CANCELED = 5;
}

message HostRunSpec {
  string run_id = 1;
  repeated string run_command = 2;
  string run_work_dir = 3;
  map<string, string> env = 4;
  repeated string billable_phases = 5;
  repeated string checkpoint_save_refs = 6;
  string attempt_id = 7;
  string segment_id = 8;
  string workload_kind = 9;
  string runner_class = 10;
  string workflow_yaml = 11;
  map<string, string> workflow_env = 12;
  map<string, string> workflow_secrets = 13;
  string workflow_event_name = 14;
  map<string, string> workflow_inputs = 15;
  string github_jit_config = 16;
}

message PhaseResult {
  string name = 1;
  int32 exit_code = 2;
  int64 duration_ms = 3;
}

message VMMetrics {
  uint64 boot_time_us = 1;
  uint64 block_read_bytes = 2;
  uint64 block_write_bytes = 3;
  uint64 block_read_count = 4;
  uint64 block_write_count = 5;
  uint64 net_rx_bytes = 6;
  uint64 net_tx_bytes = 7;
  uint64 vcpu_exit_count = 8;
}

message HostRunResult {
  int32 exit_code = 1;
  string logs = 2;
  string serial_logs = 3;
  int64 duration_ms = 4;
  int64 clone_time_ms = 5;
  int64 jail_setup_time_ms = 6;
  int64 vm_boot_time_ms = 7;
  int64 boot_to_ready_duration_ms = 8;
  int64 run_duration_ms = 9;
  int64 vm_exit_wait_duration_ms = 10;
  int64 cleanup_time_ms = 11;
  uint64 zfs_written = 12;
  uint64 rootfs_provisioned_bytes = 13;
  uint64 stdout_bytes = 14;
  uint64 stderr_bytes = 15;
  uint64 dropped_log_bytes = 16;
  bool forced_shutdown = 17;
  repeated PhaseResult phase_results = 18;
  string failure_phase = 19;
  VMMetrics metrics = 20;
}

message EnsureRunRequest {
  HostRunSpec spec = 1;
}

message EnsureRunResponse {
  string run_id = 1;
  RunState state = 2;
  bool created = 3;
}

message GetRunRequest {
  string run_id = 1;
  bool include_output = 2;
}

message GetRunResponse {
  string run_id = 1;
  RunState state = 2;
  bool terminal = 3;
  string terminal_reason = 4;
  HostRunResult result = 5;
  uint64 updated_at_unix_nano = 6;
}

message StreamRunEventsRequest {
  string run_id = 1;
  uint64 from_seq = 2;
  bool follow = 3;
  uint32 batch_size = 4;
}

message HostRunEvent {
  string run_id = 1;
  uint64 event_seq = 2;
  string event_type = 3;
  map<string, string> attrs = 4;
  uint64 created_at_unix_nano = 5;
}

message CancelRunRequest {
  string run_id = 1;
  string reason = 2;
}

message CancelRunResponse {
  bool accepted = 1;
}

message GetCapacityRequest {}

message GetCapacityResponse {
  string guest_pool_cidr = 1;
  uint32 total_slots = 2;
  uint32 active_runs = 3;
  uint32 available_slots = 4;
  uint32 vcpus_per_vm = 5;
  uint32 memory_mib_per_vm = 6;
  uint64 rootfs_provisioned_bytes = 7;
}
