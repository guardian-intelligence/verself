version: "2"
sql:
  - engine: postgresql
    schema:
      - migrations
    queries:
      - internal/store/queries
    gen:
      go:
        package: store
        out: internal/store
        sql_package: pgx/v5
        query_parameter_limit: 0
        emit_empty_slices: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        omit_unused_structs: true
