components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4246/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    MailboxAccount:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4246/schemas/MailboxAccount.json
          format: uri
          readOnly: true
          type: string
        account_id:
          type: string
        default_mailbox_id:
          type: string
        display_name:
          type: string
        email_address:
          type: string
      required:
        - account_id
        - email_address
        - display_name
      type: object
    MailboxBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4246/schemas/MailboxBody.json
          format: uri
          readOnly: true
          type: string
        account_id:
          type: string
        email_id:
          type: string
        fetched_at:
          type: string
        html_body:
          type: string
        text_body:
          type: string
      required:
        - account_id
        - email_id
        - text_body
        - html_body
        - fetched_at
      type: object
    MailboxForwarder:
      additionalProperties: false
      properties:
        enabled:
          type: boolean
        forward_target_configured:
          type: boolean
        last_error:
          type: string
        last_forwarded_at:
          format: date-time
          type: string
        last_forwarded_email_id:
          type: string
        last_sync_at:
          format: date-time
          type: string
        mailbox:
          type: string
        running:
          type: boolean
      required:
        - enabled
        - running
        - mailbox
        - forward_target_configured
      type: object
    MailboxMoveRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4246/schemas/MailboxMoveRequest.json
          format: uri
          readOnly: true
          type: string
        mailbox_id:
          type: string
      required:
        - mailbox_id
      type: object
    MailboxMutation:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4246/schemas/MailboxMutation.json
          format: uri
          readOnly: true
          type: string
        email_id:
          type: string
        status:
          type: string
      required:
        - status
        - email_id
      type: object
    MailboxOperatorAccount:
      additionalProperties: false
      properties:
        account_id:
          type: string
        display_name:
          type: string
        email_address:
          type: string
        jmap_account_id:
          type: string
        principal_type:
          type: string
        synced_at:
          type: string
      required:
        - account_id
        - jmap_account_id
        - email_address
        - display_name
        - principal_type
        - synced_at
      type: object
    MailboxOperatorAccounts:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4246/schemas/MailboxOperatorAccounts.json
          format: uri
          readOnly: true
          type: string
        accounts:
          items:
            $ref: "#/components/schemas/MailboxOperatorAccount"
          nullable: true
          type: array
      required:
        - accounts
      type: object
    MailboxOperatorAddress:
      additionalProperties: false
      properties:
        email:
          type: string
        name:
          type: string
      required:
        - name
        - email
      type: object
    MailboxOperatorEmail:
      additionalProperties: false
      properties:
        account_id:
          type: string
        cc:
          items:
            $ref: "#/components/schemas/MailboxOperatorAddress"
          nullable: true
          type: array
        email_id:
          type: string
        from_email:
          type: string
        from_name:
          type: string
        has_attachment:
          type: boolean
        is_answered:
          type: boolean
        is_draft:
          type: boolean
        is_flagged:
          type: boolean
        is_seen:
          type: boolean
        keywords:
          additionalProperties:
            type: boolean
          type: object
        mailbox_ids:
          items:
            type: string
          nullable: true
          type: array
        preview:
          type: string
        received_at:
          type: string
        reply_to:
          items:
            $ref: "#/components/schemas/MailboxOperatorAddress"
          nullable: true
          type: array
        sent_at:
          type: string
        size:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        subject:
          type: string
        synced_at:
          type: string
        thread_id:
          type: string
        to:
          items:
            $ref: "#/components/schemas/MailboxOperatorAddress"
          nullable: true
          type: array
      required:
        - account_id
        - email_id
        - thread_id
        - mailbox_ids
        - keywords
        - subject
        - from_name
        - from_email
        - to
        - cc
        - reply_to
        - preview
        - has_attachment
        - size
        - received_at
        - sent_at
        - is_seen
        - is_flagged
        - is_answered
        - is_draft
        - synced_at
      type: object
    MailboxOperatorEmailDetail:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4246/schemas/MailboxOperatorEmailDetail.json
          format: uri
          readOnly: true
          type: string
        account_id:
          type: string
        cc:
          items:
            $ref: "#/components/schemas/MailboxOperatorAddress"
          nullable: true
          type: array
        email_id:
          type: string
        fetched_at:
          type: string
        from_email:
          type: string
        from_name:
          type: string
        has_attachment:
          type: boolean
        html_body:
          type: string
        is_answered:
          type: boolean
        is_draft:
          type: boolean
        is_flagged:
          type: boolean
        is_seen:
          type: boolean
        keywords:
          additionalProperties:
            type: boolean
          type: object
        mailbox_ids:
          items:
            type: string
          nullable: true
          type: array
        preview:
          type: string
        received_at:
          type: string
        reply_to:
          items:
            $ref: "#/components/schemas/MailboxOperatorAddress"
          nullable: true
          type: array
        sent_at:
          type: string
        size:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        subject:
          type: string
        synced_at:
          type: string
        text_body:
          type: string
        thread_id:
          type: string
        to:
          items:
            $ref: "#/components/schemas/MailboxOperatorAddress"
          nullable: true
          type: array
      required:
        - account_id
        - email_id
        - thread_id
        - mailbox_ids
        - keywords
        - subject
        - from_name
        - from_email
        - to
        - cc
        - reply_to
        - preview
        - has_attachment
        - size
        - received_at
        - sent_at
        - is_seen
        - is_flagged
        - is_answered
        - is_draft
        - synced_at
        - text_body
        - html_body
        - fetched_at
      type: object
    MailboxOperatorEmails:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4246/schemas/MailboxOperatorEmails.json
          format: uri
          readOnly: true
          type: string
        emails:
          items:
            $ref: "#/components/schemas/MailboxOperatorEmail"
          nullable: true
          type: array
      required:
        - emails
      type: object
    MailboxOperatorMailbox:
      additionalProperties: false
      properties:
        account_id:
          type: string
        id:
          type: string
        name:
          type: string
        parent_id:
          type: string
        role:
          type: string
        sort_order:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        synced_at:
          type: string
        total_emails:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        total_threads:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        unread_emails:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        unread_threads:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
      required:
        - account_id
        - id
        - name
        - parent_id
        - role
        - sort_order
        - total_emails
        - unread_emails
        - total_threads
        - unread_threads
        - synced_at
      type: object
    MailboxOperatorMailboxes:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4246/schemas/MailboxOperatorMailboxes.json
          format: uri
          readOnly: true
          type: string
        mailboxes:
          items:
            $ref: "#/components/schemas/MailboxOperatorMailbox"
          nullable: true
          type: array
      required:
        - mailboxes
      type: object
    MailboxServiceStatus:
      additionalProperties: false
      properties:
        forwarder:
          $ref: "#/components/schemas/MailboxForwarder"
        mailbox_sync:
          $ref: "#/components/schemas/MailboxSync"
        public_base_url:
          type: string
        stalwart_base_url:
          type: string
        started_at:
          format: date-time
          type: string
      required:
        - started_at
        - stalwart_base_url
        - public_base_url
        - forwarder
        - mailbox_sync
      type: object
    MailboxServiceStatusResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4246/schemas/MailboxServiceStatusResponse.json
          format: uri
          readOnly: true
          type: string
        status:
          $ref: "#/components/schemas/MailboxServiceStatus"
      required:
        - status
      type: object
    MailboxSync:
      additionalProperties: false
      properties:
        accounts:
          additionalProperties:
            $ref: "#/components/schemas/MailboxSyncAccountStatus"
          type: object
        last_discovery_at:
          format: date-time
          type: string
        last_error:
          type: string
        running:
          type: boolean
      required:
        - running
        - accounts
      type: object
    MailboxSyncAccountStatus:
      additionalProperties: false
      properties:
        account_id:
          type: string
        connected:
          type: boolean
        last_connected_at:
          format: date-time
          type: string
        last_error:
          type: string
        last_event_at:
          format: date-time
          type: string
        last_sync_at:
          format: date-time
          type: string
        running:
          type: boolean
      required:
        - account_id
        - running
        - connected
      type: object
info:
  title: Mailbox Service
  version: dev
openapi: 3.0.3
paths:
  /api/v1/mail/account:
    get:
      operationId: mail-account
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxAccount"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get the authenticated user's bound mailbox account
  /api/v1/mail/emails/{email_id}/body:
    get:
      operationId: mail-body
      parameters:
        - in: path
          name: email_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Fetch and cache an email body
  /api/v1/mail/emails/{email_id}/flag:
    post:
      operationId: mail-flag
      parameters:
        - in: path
          name: email_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxMutation"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Flag an email
  /api/v1/mail/emails/{email_id}/move:
    post:
      operationId: mail-move
      parameters:
        - in: path
          name: email_id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MailboxMoveRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxMutation"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Move an email to another mailbox
  /api/v1/mail/emails/{email_id}/read:
    post:
      operationId: mail-mark-read
      parameters:
        - in: path
          name: email_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxMutation"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Mark an email as read
  /api/v1/mail/emails/{email_id}/trash:
    post:
      operationId: mail-trash
      parameters:
        - in: path
          name: email_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxMutation"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Move an email to trash
  /api/v1/mail/emails/{email_id}/unflag:
    post:
      operationId: mail-unflag
      parameters:
        - in: path
          name: email_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxMutation"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Unflag an email
  /api/v1/mail/emails/{email_id}/unread:
    post:
      operationId: mail-mark-unread
      parameters:
        - in: path
          name: email_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxMutation"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Mark an email as unread
  /api/v1/mail/sync/status:
    get:
      operationId: mail-sync-status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxServiceStatusResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Mailbox sync status
  /internal/mailbox/v1/accounts:
    get:
      operationId: operator-list-accounts
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxOperatorAccounts"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List synced mailbox accounts for operator tooling
  /internal/mailbox/v1/accounts/{account_id}/emails:
    get:
      operationId: operator-list-emails
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            format: int64
            maximum: 1000
            type: integer
        - explode: false
          in: query
          name: mailbox_id
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxOperatorEmails"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List synced emails for an account
  /internal/mailbox/v1/accounts/{account_id}/emails/{email_id}:
    get:
      operationId: operator-get-email
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
        - in: path
          name: email_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxOperatorEmailDetail"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Read an email body for an account
  /internal/mailbox/v1/accounts/{account_id}/mailboxes:
    get:
      operationId: operator-list-mailboxes
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailboxOperatorMailboxes"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List synced mailboxes for an account
servers:
  - url: http://127.0.0.1:4246
