components:
  schemas:
    AliasView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4257/schemas/AliasView.json
          format: uri
          readOnly: true
          type: string
        alias:
          type: string
        bucket_id:
          type: string
        created_at:
          type: string
        prefix:
          type: string
        service_tag:
          type: string
      required:
        - alias
        - bucket_id
        - prefix
        - service_tag
        - created_at
      type: object
    BucketView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4257/schemas/BucketView.json
          format: uri
          readOnly: true
          type: string
        bucket_id:
          type: string
        bucket_name:
          type: string
        created_at:
          type: string
        garage_bucket_id:
          type: string
        lifecycle_rules: {}
        org_id:
          type: string
        quota_bytes:
          pattern: ^[0-9]+$
          type: string
        quota_objects:
          pattern: ^[0-9]+$
          type: string
        updated_at:
          type: string
      required:
        - bucket_id
        - org_id
        - bucket_name
        - garage_bucket_id
        - lifecycle_rules
        - created_at
        - updated_at
      type: object
    CreateAliasInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4257/schemas/CreateAliasInputBody.json
          format: uri
          readOnly: true
          type: string
        alias:
          type: string
        prefix:
          type: string
        service_tag:
          type: string
      required:
        - alias
      type: object
    CreateBucketInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4257/schemas/CreateBucketInputBody.json
          format: uri
          readOnly: true
          type: string
        bucket_name:
          type: string
        lifecycle_rules: {}
        org_id:
          type: string
        quota_bytes:
          pattern: ^[0-9]+$
          type: string
        quota_objects:
          pattern: ^[0-9]+$
          type: string
      required:
        - org_id
        - bucket_name
      type: object
    CreateMTLSCredentialInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4257/schemas/CreateMTLSCredentialInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        spiffe_subject:
          type: string
      required:
        - display_name
        - spiffe_subject
      type: object
    CreateStaticCredentialInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4257/schemas/CreateStaticCredentialInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        expires_at:
          type: string
      required:
        - display_name
      type: object
    CredentialSecretView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4257/schemas/CredentialSecretView.json
          format: uri
          readOnly: true
          type: string
        access_key_id:
          type: string
        credential:
          $ref: "#/components/schemas/CredentialView"
        credential_fingerprint:
          type: string
        secret_access_key:
          type: string
      required:
        - access_key_id
        - secret_access_key
        - credential_fingerprint
        - credential
      type: object
    CredentialView:
      additionalProperties: false
      properties:
        access_key_id:
          type: string
        auth_mode:
          type: string
        bucket_id:
          type: string
        created_at:
          type: string
        credential_fingerprint:
          type: string
        credential_id:
          type: string
        display_name:
          type: string
        expires_at:
          type: string
        revoked_at:
          type: string
        spiffe_subject:
          type: string
        status:
          type: string
      required:
        - credential_id
        - bucket_id
        - auth_mode
        - display_name
        - status
        - created_at
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4257/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    UpdateBucketInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://127.0.0.1:4257/schemas/UpdateBucketInputBody.json
          format: uri
          readOnly: true
          type: string
        lifecycle_rules: {}
        quota_bytes:
          pattern: ^[0-9]+$
          type: string
        quota_objects:
          pattern: ^[0-9]+$
          type: string
      type: object
info:
  title: Object Storage Service
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/v1/access-keys/{access_key_id}:
    delete:
      operationId: delete-api-v1-access-keys-by-access-key-id
      parameters:
        - in: path
          name: access_key_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete API v1 access keys by access key ID
  /api/v1/access-keys/{access_key_id}/roll:
    post:
      operationId: post-api-v1-access-keys-by-access-key-id-roll
      parameters:
        - in: path
          name: access_key_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialSecretView"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Post API v1 access keys by access key ID roll
  /api/v1/buckets:
    get:
      operationId: list-api-v1-buckets
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/BucketView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List API v1 buckets
    post:
      operationId: post-api-v1-buckets
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBucketInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BucketView"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Post API v1 buckets
  /api/v1/buckets/{bucket_id}:
    delete:
      operationId: delete-api-v1-buckets-by-bucket-id
      parameters:
        - in: path
          name: bucket_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete API v1 buckets by bucket ID
    get:
      operationId: get-api-v1-buckets-by-bucket-id
      parameters:
        - in: path
          name: bucket_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BucketView"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get API v1 buckets by bucket ID
    put:
      operationId: put-api-v1-buckets-by-bucket-id
      parameters:
        - in: path
          name: bucket_id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBucketInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BucketView"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Put API v1 buckets by bucket ID
  /api/v1/buckets/{bucket_id}/access-keys:
    post:
      operationId: post-api-v1-buckets-by-bucket-id-access-keys
      parameters:
        - in: path
          name: bucket_id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaticCredentialInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialSecretView"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Post API v1 buckets by bucket ID access keys
  /api/v1/buckets/{bucket_id}/aliases:
    get:
      operationId: list-api-v1-buckets-by-bucket-id-aliases
      parameters:
        - in: path
          name: bucket_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/AliasView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List API v1 buckets by bucket ID aliases
    post:
      operationId: post-api-v1-buckets-by-bucket-id-aliases
      parameters:
        - in: path
          name: bucket_id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAliasInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AliasView"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Post API v1 buckets by bucket ID aliases
  /api/v1/buckets/{bucket_id}/aliases/{alias}:
    delete:
      operationId: delete-api-v1-buckets-by-bucket-id-aliases-by-alias
      parameters:
        - in: path
          name: bucket_id
          required: true
          schema:
            type: string
        - in: path
          name: alias
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete API v1 buckets by bucket ID aliases by alias
  /api/v1/buckets/{bucket_id}/credentials:
    get:
      operationId: list-api-v1-buckets-by-bucket-id-credentials
      parameters:
        - in: path
          name: bucket_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/CredentialView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List API v1 buckets by bucket ID credentials
  /api/v1/buckets/{bucket_id}/mtls-principals:
    post:
      operationId: post-api-v1-buckets-by-bucket-id-mtls-principals
      parameters:
        - in: path
          name: bucket_id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMTLSCredentialInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BucketView"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Post API v1 buckets by bucket ID mtls principals
servers:
  - url: https://127.0.0.1:4257
