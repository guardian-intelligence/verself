---
# Wipe verification-environment PostgreSQL state to a clean slate.
#
# Wipe-only: run box.yml separately after this playbook to reconfigure substrate. Pass
# temporal_force_schema_reset=true / clickhouse_force_schema_reset=true on
# the follow-up box.yml call when the wipe requires a schema rebuild.

- name: Wipe billing state for verification reset
  import_playbook: wipe-pg-db.yml
  vars:
    wipe_pg_db_name: billing

- name: Wipe sandbox-rental state for verification reset
  import_playbook: wipe-pg-db.yml
  vars:
    wipe_pg_db_name: sandbox_rental

- name: Wipe governance-service state for verification reset
  import_playbook: wipe-pg-db.yml
  vars:
    wipe_pg_db_name: governance_service
