---
- name: "Preflight: controller prerequisites"
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - preflight
    - controller
  tasks:
    - name: Run controller preflight checks
      ansible.builtin.import_tasks: tasks/controller-preflight.yml

- name: "Topology normalization"
  hosts: all
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - always
  tasks:
    - name: Normalize authored topology
      ansible.builtin.import_tasks: tasks/topology-normalize.yml
      tags:
        - always

- name: "Runtime accounts"
  hosts: all
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - runtime_accounts
  tasks:
    # nftables resolves symbolic skuid names while loading rules, so service users must exist before firewall convergence.
    - name: Configure runtime accounts
      ansible.builtin.import_tasks: tasks/runtime_accounts.yml
      tags:
        - runtime_accounts

- name: "Host foundation"
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - foundation
  roles:
    - role: substrate_profile
      tags:
        - profile
        - packages
    - role: base
      tags:
        - base
        - packages
    - role: nftables
      tags:
        - firewall
        - network
    - role: zfs
      tags:
        - zfs

- name: "Guest image staging"
  hosts: workers
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - worker
    - firecracker
    - guest_rootfs
  roles:
    - role: guest_rootfs
      tags:
        - guest_rootfs

- name: "Preflight: Firecracker worker prerequisites"
  hosts: workers
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  become: true
  tags:
    - preflight
    - worker
    - firecracker
  tasks:
    - name: Run Firecracker worker preflight checks
      ansible.builtin.import_tasks: tasks/firecracker-preflight.yml
      tags:
        - preflight
        - worker
        - firecracker

- name: "Worker substrate"
  hosts: workers
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - worker
  roles:
    - role: containerd
      tags:
        - containerd
    - role: wireguard
      tags:
        - network
        - wireguard
      vars:
        wireguard_tunnels: >-
          {{
            topology_wireguard.host_groups.workers
            | map('extract', topology_wireguard.tunnels)
            | list
          }}
    - role: firecracker
      tags:
        - firecracker

- name: "Infrastructure host networking"
  hosts: infra
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - infra
    - network
  roles:
    - role: wireguard
      tags:
        - wireguard
      vars:
        wireguard_tunnels: >-
          {{
            topology_wireguard.host_groups.infra
            | map('extract', topology_wireguard.tunnels)
            | list
          }}

- name: "Substrate daemons"
  hosts: infra
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - daemons
  roles:
    - role: spire
      tags:
        - spire
        - identity
    - role: garage
      tags:
        - garage
        - object-storage
    - role: zot
      tags:
        - zot
        - artifacts
        - oci-registry
    - role: bazel_remote
      tags:
        - bazel-remote
        - build-cache
    - role: nomad
      tags:
        - nomad
        - scheduler
    - role: clickhouse
      tags:
        - clickhouse
        - database
        - observability
    - role: tigerbeetle
      tags:
        - tigerbeetle
        - ledger
    - role: postgresql
      tags:
        - postgresql
        - database
    - role: spicedb
      tags:
        - spicedb
        - authz
        - database
    - role: zitadel
      tags:
        - zitadel
        - auth
    - role: openbao
      tags:
        - openbao
        - secrets

- name: "OpenBao platform bindings"
  hosts: infra
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - openbao-bindings
    - platform-bindings
  tasks:
    - name: Import OpenBao platform runtime-secret bindings
      ansible.builtin.import_tasks: tasks/openbao-runtime-secrets.yml
      tags:
        - openbao-runtime-secrets
        - secrets
        - components

- name: "Substrate edge daemons"
  hosts: infra
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - daemons
  roles:
    - role: wireguard
      tags:
        - network
        - wireguard
        - ops-network
      vars:
        wireguard_tunnels: >-
          {{
            ['ops']
            | map('extract', topology_wireguard.tunnels)
            | list
          }}
    - role: nats
      tags:
        - nats
        - messaging
    - role: temporal-platform
      tags:
        - temporal
        - workflow
    - role: stalwart
      tags:
        - stalwart
        - mail
    - role: electric
      tags:
        - electric
        - sync
        - notifications
      vars:
        electric_config: "{{ topology_electric_instances.notifications }}"
    - role: electric
      tags:
        - electric
        - sync
      vars:
        electric_config: "{{ topology_electric_instances.default }}"
    - role: otelcol
      tags:
        - otelcol
        - observability
    - role: grafana
      tags:
        - grafana
        - observability
    - role: pomerium
      tags:
        - pomerium
        - access
    - role: operator_ssh_access
      tags:
        - ssh
        - access
    - role: verdaccio
      tags:
        - verdaccio
        - package-registry
    - role: haproxy
      tags:
        - haproxy
        - ingress
    - role: forgejo
      tags:
        - forgejo
        - scm

- name: "External APIs and per-component substrate bindings"
  hosts: infra
  become: true
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - components
  roles:
    - role: resend
      tags:
        - resend
        - external-api
    - role: spire_registrations
      tags:
        - spire-registrations
        - identity

  tasks:
    - name: Configure Nomad application substrate bindings
      ansible.builtin.import_tasks: tasks/component-substrate.yml
      tags:
        - components

- name: "External reconciler: Cloudflare DNS"
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "../../sites/{{ verself_site | default('prod') }}/vars.yml"
  tags:
    - external-dns
    - cloudflare-dns
  tasks:
    - name: Run Cloudflare DNS reconciler
      ansible.builtin.import_tasks: tasks/cloudflare-dns.yml
      tags:
        - external-dns
        - cloudflare-dns
