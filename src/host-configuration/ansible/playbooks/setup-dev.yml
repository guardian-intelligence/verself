---
# Install dev tools from authored substrate catalog vars.
# Usage: aspect dev install
# (passes group_vars/all/catalog.yml via -e @<path>; the playbook itself takes
# no inventory because it runs pre-provision on a fresh controller).
- name: Set up verself development environment
  hosts: localhost
  connection: local
  become: true
  vars:
    # Use system Python, not Nix Python, so pip/apt modules work correctly.
    ansible_python_interpreter: /usr/bin/python3
  pre_tasks:
    - name: Require topology_versions from extra-vars (-e @catalog.yml)
      ansible.builtin.assert:
        that: topology_versions is defined
        fail_msg: >-
          topology_versions is not set. Run: aspect dev install
          (which passes group_vars/all/catalog.yml via -e @<path>).
  roles:
    - role: dev_tools
      tags: [dev_tools]
