---
- name: Build effective topology data
  ansible.builtin.set_fact:
    topology_effective: "{{ topology_components | verself_topology_effective(spire_trust_domain) }}"

- name: Publish effective topology facts
  ansible.builtin.set_fact:
    topology_components: "{{ topology_effective.components }}"
    topology_spiffe_ids: "{{ topology_effective.spiffe_ids }}"
    topology_spire: "{{ topology_spire | default({}) | combine({'identities': topology_effective.spire_identities}, recursive=True) }}"
