---
bare_metal_host_alias: fm-dev-w0
bare_metal_public_ipv4: 64.34.84.75
billing_service_domain: '{{ billing_service_subdomain }}.{{ verself_domain }}'
billing_service_subdomain: billing.api
company_domain: guardianintelligence.org
firecracker_guest_pool_cidr: 172.16.0.0/16
firecracker_seed_images:
  - filesystem_label: ""
    ref: substrate
    size_bytes: 2147483648
    source_path: /var/lib/verself/guest-images/substrate.ext4
    strategy: dd_from_file
    tier: substrate
    volblocksize: 16K
  - filesystem_label: ""
    ref: gh-actions-runner
    size_bytes: 1073741824
    source_path: /var/lib/verself/guest-images/toolchains/gh-actions-runner.ext4
    strategy: dd_from_file
    tier: platform_toolchain
    volblocksize: 16K
  - filesystem_label: ""
    ref: forgejo-runner
    size_bytes: 268435456
    source_path: /var/lib/verself/guest-images/toolchains/forgejo-runner.ext4
    strategy: dd_from_file
    tier: platform_toolchain
    volblocksize: 16K
  - filesystem_label: stickydisk
    ref: sticky-empty
    size_bytes: 8589934592
    source_path: ""
    strategy: mkfs_ext4
    tier: platform_toolchain
    volblocksize: 16K
forgejo_domain: '{{ forgejo_subdomain }}.{{ verself_domain }}'
forgejo_subdomain: git
governance_service_domain: '{{ governance_service_subdomain }}.{{ verself_domain }}'
governance_service_subdomain: governance.api
identity_service_domain: '{{ identity_service_subdomain }}.{{ verself_domain }}'
identity_service_subdomain: identity.api
known_cert_id_suffixes:
  - shovon-mbp
  - slot-0
  - slot-1
  - slot-2
  - slot-3
mailbox_service_domain: '{{ mailbox_service_subdomain }}.{{ verself_domain }}'
mailbox_service_subdomain: mail.api
notifications_service_domain: '{{ notifications_service_subdomain }}.{{ verself_domain }}'
notifications_service_subdomain: notifications.api
object_storage_admin_uid: 961
object_storage_service_uid: 960
openbao_spiffe_jwt_mount: spiffe-jwt
openbao_workload_audience: openbao
pomerium_domain: '{{ pomerium_subdomain }}.{{ verself_domain }}'
pomerium_subdomain: access
profile_service_domain: '{{ profile_service_subdomain }}.{{ verself_domain }}'
profile_service_subdomain: profile.api
projects_service_domain: '{{ projects_service_subdomain }}.{{ verself_domain }}'
projects_service_subdomain: projects.api
resend_domain: '{{ resend_subdomain }}.{{ verself_domain }}'
resend_sender_address: noreply@{{ resend_domain }}
resend_sender_name: verself
resend_subdomain: notify
sandbox_rental_service_domain: '{{ sandbox_rental_service_subdomain }}.{{ verself_domain }}'
sandbox_rental_service_subdomain: sandbox.api
secrets_service_domain: '{{ secrets_service_subdomain }}.{{ verself_domain }}'
secrets_service_subdomain: secrets.api
source_code_hosting_service_domain: '{{ source_code_hosting_service_subdomain }}.{{ verself_domain }}'
source_code_hosting_service_subdomain: source.api
stalwart_domain: '{{ stalwart_subdomain }}.{{ verself_domain }}'
stalwart_subdomain: mail
temporal_billing_namespace: billing-service
temporal_bootstrap_namespaces:
  - '{{ temporal_sandbox_namespace }}'
  - '{{ temporal_billing_namespace }}'
temporal_namespace_retention: 24h
temporal_namespace_role_bindings:
  - namespace: '{{ temporal_sandbox_namespace }}'
    role: admin
    spiffe_id: '{{ spire_sandbox_rental_id }}'
  - namespace: '{{ temporal_billing_namespace }}'
    role: admin
    spiffe_id: '{{ spire_billing_service_id }}'
temporal_sandbox_namespace: sandbox-rental-service
topology_artifacts:
  nomad:
    kind: garage_s3_private_origin
    nomad_getter:
      checksum_algorithm: sha256
      credentials:
        access_key_id_env: AWS_ACCESS_KEY_ID
        environment_file: /etc/nomad/nomad-artifacts.env
        secret_access_key_env: AWS_SECRET_ACCESS_KEY
        source: host_environment
      options:
        region: garage
      protocol: s3
      source_prefix: s3::https://artifacts.internal.verself.sh:9443/nomad-artifacts
    origin:
      hostname: artifacts.internal.verself.sh
      listen_host: 127.0.0.1
      placement: node_local
      port: 9443
      public_dns: false
      public_ingress: false
      resolution: per_node_hosts_file
      scheme: https
      tls:
        ca_bundle_path: /etc/verself/pki/nomad-artifacts-ca.pem
        server_name: artifacts.internal.verself.sh
    publisher:
      credentials:
        access_key_id_env: VERSELF_NOMAD_ARTIFACTS_AWS_ACCESS_KEY_ID
        environment_file: /etc/garage/nomad-artifacts/publisher.env
        secret_access_key_env: VERSELF_NOMAD_ARTIFACTS_AWS_SECRET_ACCESS_KEY
        source: controller_environment
    storage:
      bucket: nomad-artifacts
      key_prefix: sha256
      provider: garage
      region: garage
topology_electric_instances:
  default:
    electric_credstore_dir: /etc/credstore/electric
    electric_db: sandbox_rental
    electric_db_pool_size: 15
    electric_instance: default
    electric_nftables_file: /etc/nftables.d/electric.nft
    electric_nftables_table: verself_electric
    electric_pg_conn_limit: 25
    electric_pg_role: electric
    electric_publication_name: electric_publication_default
    electric_publication_tables:
      - executions
      - execution_logs
      - runner_provider_repositories
    electric_replication_stream_id: default
    electric_service_name: electric
    electric_service_port: 3010
    electric_storage_dir: /var/lib/electric
    electric_writer_role: sandbox_rental
  notifications:
    electric_credstore_dir: /etc/credstore/electric-notifications
    electric_db: notifications_service
    electric_db_pool_size: 8
    electric_instance: notifications
    electric_nftables_file: /etc/nftables.d/electric-notifications.nft
    electric_nftables_table: verself_electric_notifications
    electric_pg_conn_limit: 15
    electric_pg_role: electric_notifications
    electric_publication_name: electric_publication_notifications
    electric_publication_tables:
      - notification_inbox_state
    electric_replication_stream_id: notifications
    electric_service_name: electric-notifications
    electric_service_port: 3012
    electric_storage_dir: /var/lib/electric-notifications
    electric_writer_role: notifications_service
topology_operators:
  founder:
    devices:
      shovon-mbp:
        name: shovon-mbp
        wg_address: 10.66.66.2
        wg_pubkey: AoVgh4aWFK5Gi7HBdqIzTea37aa5SaemU4Pyk92Nglc=
    zitadel_user_id: ""
topology_ssh_ca:
  ca_name: verself-ssh-ca
  ca_pubkey_path: /etc/ssh/verself-ssh-ca.pub
  default_user: ubuntu
  mount: ssh-ca
  oidc:
    allowed_redirect_uris:
      - http://localhost:8250/oidc/callback
      - http://localhost:8251/oidc/callback
      - http://localhost:8252/oidc/callback
    discovery_url: https://auth.verself.sh
    operator_project_role: platform-operator
    project_name: verself-ssh-ca
  principals:
    breakglass:
      force_command: ""
      max_ttl_seconds: 86400
      name: breakglass
      permit_port_forwarding: false
      permit_pty: true
      role: breakglass
      source_address_cidrs:
        - 10.66.66.0/24
        - 0.0.0.0/0
    operator:
      force_command: ""
      max_ttl_seconds: 86400
      name: operator
      permit_port_forwarding: true
      permit_pty: true
      role: operator
      source_address_cidrs:
        - 10.66.66.0/24
    workload:
      force_command: ""
      max_ttl_seconds: 86400
      name: workload
      permit_port_forwarding: false
      permit_pty: true
      role: workload
      source_address_cidrs:
        - 10.66.66.0/24
  principals_file: /etc/ssh/principals/ubuntu
topology_wireguard:
  host_groups:
    infra:
      - worker
      - ops
    workers:
      - worker
  tunnels:
    ops:
      address: 10.66.66.1
      address_prefix: 24
      interface: wg-ops
      network: 10.66.66.0/24
      peers:
        - allowed_ips: 10.66.66.2/32
          public_key: AoVgh4aWFK5Gi7HBdqIzTea37aa5SaemU4Pyk92Nglc=
      port: 51821
    worker:
      address: 10.0.0.1
      address_prefix: 16
      interface: wg0
      network: 10.0.0.0/16
      peers: []
      port: 51820
topology_workload_pool:
  enroll_secret_id_ttl_seconds: 900
  slot_address_base: 10.66.66.100
  slot_count: 4
  workload_token_ttl_seconds: 86400
verself_bin: /opt/verself/profile/bin
verself_domain: verself.sh
verself_version: 0.1.0
zitadel_domain: '{{ zitadel_subdomain }}.{{ verself_domain }}'
zitadel_subdomain: auth
