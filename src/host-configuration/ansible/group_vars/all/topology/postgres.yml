# Authored substrate topology contract.
# Source: src/host-configuration/ansible/group_vars/all/topology
---
postgresql_max_connections: 300
postgresql_role_connection_limits:
  electric: 25
  electric_notifications: 15
  grafana: 10
  pomerium: 20
  spicedb: 20
  stalwart: 10
  temporal: 80
  zitadel: 15
postgresql_superuser_reserved_connections: 10
topology_postgres:
  databases:
    - component: grafana
      database: grafana
      owner: grafana
    - component: pomerium
      database: pomerium
      owner: pomerium
    - component: temporal
      database: temporal
      owner: temporal
    - component: temporal
      database: temporal_visibility
      owner: temporal
    - component: spicedb
      database: spicedb
      owner: spicedb
    - component: stalwart
      database: stalwart
      owner: stalwart
    - component: zitadel
      database: zitadel
      owner: zitadel
