      kind: secret_ref
      no_log: true
  workload:
    bootstrap:
    - class: storage_provider
      name: object_storage_tls
      phase: before_credentials
      reason: Creates the local S3 TLS CA, server certificate, and operator CA bundle for Garage proxy traffic.
    - class: storage_provider
      name: object_storage_garage_proxy
      reason: Creates Garage proxy credentials for object-storage-service S3 traffic.
    clickhouse:
      grants:
      - action: INSERT
        table: verself.object_access_events
      - action: SELECT
        table: verself.object_access_events
      spiffe_identity: service
      user: object_storage_service
    directories:
