        target: /etc/nftables.d/identity-service.nft
    order: 10
    postgres:
      connection_limit: 10
      database: identity_service
      owner: identity_service
      password_ref:
        kind: ansible_var
        name: postgresql_identity_service_password
        no_log: true
    workload:
      auth:
        audience: "370200564807548260"
        kind: owned_project
        project_name: identity-service
        project_role_assertion: true
        project_role_check: true
        roles:
          - display_name: Owner
            group: identity
            key: owner
          - display_name: Admin
            group: identity
            key: admin
          - display_name: Member
            group: identity
            key: member
      bootstrap:
        - class: identity_provider
          name: identity_zitadel_actions
          reason: Installs Zitadel Actions V2 targets and executions that are identity-provider control-plane state.
        - class: identity_provider
          name: browser_oidc
          reason: Reconciles the console OIDC application and persists runtime client credentials for identity-service browser auth.
      bootstrap_config:
        browser_oidc:
          app_name: verself-web
          credstore_dir: /etc/credstore/identity-service
          credstore_group: identity_service
          grant_types:
            - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
            - OIDC_GRANT_TYPE_REFRESH_TOKEN
            - OIDC_GRANT_TYPE_TOKEN_EXCHANGE
          post_logout_redirect_uris:
            - https://verself.sh
          project_name: sandbox-rental
          project_roles:
            - display_name: Owner
              group: sandbox
              key: owner
            - display_name: Admin
              group: sandbox
              key: admin
            - display_name: Member
              group: sandbox
              key: member
          redirect_uris:
            - https://verself.sh/api/v1/auth/callback
          role_assertions: true
      clickhouse:
        grants:
          - action: INSERT
            table: verself.domain_update_ledger
          - action: SELECT
            table: verself.domain_update_ledger
        spiffe_identity: default
        user: identity_service
      directories:
        - group: identity_service
          mode: "0750"
          owner: root
          path: /etc/credstore/identity-service
      order: 10
      secret_refs:
        - group: identity_service
          mode: "0640"
          name: clickhouse-ca-cert
          no_log: true
          owner: root
          path: /etc/credstore/identity-service/clickhouse-ca-cert
          restart_units: []
          source:
            kind: remote_src
            remote_src: /etc/clickhouse-server/tls/server-ca.pem
      units:
        - create_home: false
          group: identity_service
          home: ""
          load_credentials: []
          name: identity-service
          supplementary_groups:
            - '{{ spire_workload_group }}'
          user: identity_service
