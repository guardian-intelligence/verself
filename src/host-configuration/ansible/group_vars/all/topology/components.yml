      owner: root
      path: /etc/credstore/object-storage-service
    - group: object_storage_service
      mode: '0750'
      owner: root
      path: /etc/object-storage-service
    - group: object_storage_service
      mode: '0750'
      owner: root
      path: /etc/object-storage-service/tls
    - group: root
      mode: '0755'
      owner: root
      path: /etc/verself
    - group: root
      mode: '0755'
      owner: root
      path: /etc/verself/local-cas
    - group: object_storage_service
      mode: '0750'
      owner: object_storage_service
      path: /var/lib/object-storage-service
    - group: object_storage_admin
      mode: '0750'
      owner: object_storage_admin
      path: /var/lib/object-storage-admin
    secret_refs:
    - expose_as: postgres_password
      group: object_storage_service
      mode: '0640'
      name: pg-password
      no_log: true
      owner: root
      path: /etc/credstore/object-storage-service/pg-password
      restart_units: []
      source:
        generate:
          chars: ascii_letters,digits
          kind: password
          length: 64
        kind: generated
    - group: object_storage_service
      mode: '0640'
      name: credential-kek
      no_log: true
      owner: root
      path: /etc/credstore/object-storage-service/credential-kek
      restart_units: []
      source:
        generate:
          chars: hexdigits
          kind: password
          length: 64
        kind: generated
    - group: object_storage_service
      mode: '0640'
      name: clickhouse-ca-cert
      no_log: true
      owner: root
      path: /etc/credstore/object-storage-service/clickhouse-ca-cert
      restart_units: []
      source:
        kind: remote_src
        remote_src: /etc/clickhouse-server/tls/server-ca.pem
    - group: object_storage_service
      mode: '0640'
      name: s3-tls-cert
      no_log: true
      owner: root
      path: /etc/credstore/object-storage-service/s3-tls-cert
      restart_units: []
      source:
        kind: remote_src
        remote_src: /etc/object-storage-service/tls/server-cert.pem
    - group: object_storage_service
