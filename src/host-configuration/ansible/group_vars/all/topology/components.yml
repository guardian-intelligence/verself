      name: garage-admin-token
      no_log: true
      owner: root
      path: /etc/credstore/object-storage-service/garage-admin-token
      restart_units: []
      source:
        kind: remote_src
        remote_src: /etc/garage/admin-token
    units:
    - home: /var/lib/object-storage-service
      name: object-storage-service
      supplementary_groups:
      - '{{ spire_workload_group }}'
      uid: 960
      user: object_storage_service
    - home: /var/lib/object-storage-admin
      name: object-storage-admin
      supplementary_groups:
      - object_storage_service
      - '{{ spire_workload_group }}'
