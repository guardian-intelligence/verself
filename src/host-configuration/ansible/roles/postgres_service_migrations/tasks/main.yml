---
- name: Create service migration staging root
  ansible.builtin.file:
    path: "{{ postgres_service_migrations_root }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Apply service PostgreSQL migration sets
  ansible.builtin.include_tasks: apply.yml
  loop: "{{ postgres_service_migrations_sets }}"
  loop_control:
    loop_var: postgres_service_migrations_set
    label: "{{ postgres_service_migrations_set.service }}"
