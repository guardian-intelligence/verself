---
- name: "Collect PostgreSQL migration files for {{ postgres_service_migrations_set.service }}"
  ansible.builtin.set_fact:
    postgres_service_migrations_files: "{{ query('fileglob', postgres_service_migrations_set.source_dir + '/*.up.sql') | sort }}"

- name: "Assert PostgreSQL migration files exist for {{ postgres_service_migrations_set.service }}"
  ansible.builtin.assert:
    that:
      - postgres_service_migrations_files | length > 0
    fail_msg: "{{ postgres_service_migrations_set.source_dir }} has no *.up.sql files"

- name: "Create staging directory for {{ postgres_service_migrations_set.service }}"
  ansible.builtin.file:
    path: "{{ postgres_service_migrations_root }}/{{ postgres_service_migrations_set.service }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: "Stage PostgreSQL migration files for {{ postgres_service_migrations_set.service }}"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ postgres_service_migrations_root }}/{{ postgres_service_migrations_set.service }}/{{ item | basename }}"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ postgres_service_migrations_files }}"
  loop_control:
    label: "{{ item | basename }}"

- name: "Apply PostgreSQL migrations for {{ postgres_service_migrations_set.service }}"
  ansible.builtin.script: >-
    {{ playbook_dir }}/../files/postgres_migration_convergence.py
    --host {{ topology_endpoints.postgresql.host }}
    --port {{ topology_endpoints.postgresql.endpoints.postgres.port }}
    --admin-user postgres
    --database {{ postgres_service_migrations_set.database }}
    --owner {{ postgres_service_migrations_set.owner }}
    --service {{ postgres_service_migrations_set.service }}
    --dir {{ postgres_service_migrations_root }}/{{ postgres_service_migrations_set.service }}
  environment:
    POSTGRES_ADMIN_PASSWORD: "{{ postgresql_admin_password }}"
  register: postgres_service_migrations_result
  changed_when: >-
    (postgres_service_migrations_result.stdout | from_json).applied_versions | length > 0
  no_log: true
