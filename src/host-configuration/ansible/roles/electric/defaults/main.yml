---
# Shared across instances. Instance-specific topology is passed as
# electric_config comes from authored topology vars.
electric_version: "1.5.0"
electric_image: "docker.io/electricsql/electric:{{ electric_version }}"

# Handler names are templated when the role loads; expose only the value needed
# for handler registration here and load the rest from topology in tasks.
electric_service_name: "{{ electric_config.electric_service_name }}"

# Derived defaults — paths live under the caller's electric_credstore_dir.
electric_pg_password_file: "{{ electric_credstore_dir }}/pg-password"
electric_api_secret_file: "{{ electric_credstore_dir }}/api-secret"
electric_runtime_env_file: "{{ electric_credstore_dir }}/runtime.env"
electric_transient_pgpass_file: "/root/.pgpass-electric-{{ electric_instance }}-reconcile"
