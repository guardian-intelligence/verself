---
bazel_remote_state_dir: /var/lib/bazel-remote
bazel_remote_config_dir: /etc/bazel-remote
bazel_remote_user: bazel_remote
bazel_remote_group: bazel_remote
# 100 GiB lets the cache absorb a few full clean builds with headroom; ZFS
# compression (lz4 on vspool) further trims real disk use.
bazel_remote_max_size_gib: 100
# Hard limit a few percent above max_size; bazel-remote rejects writes
# beyond this watermark while the eviction queue drains.
bazel_remote_max_size_hard_limit_gib: 110
