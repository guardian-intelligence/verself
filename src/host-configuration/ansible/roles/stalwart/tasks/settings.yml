---
# Push database-scoped settings via the Stalwart CLI. Stalwart CLI 0.15.x
# accepts credentials via the CREDENTIALS env var (stalw.art/docs/management/cli);
# we use that instead of -c so the admin password is never on the argv.

- name: Push database settings via stalwart-cli
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/stalwart-cli"
      - -u
      - "http://{{ topology_endpoints.stalwart.endpoints.http.address }}"
      - server
      - add-config
      - "{{ item.key }}"
      - "{{ item.value }}"
  loop:
    # SMTP session — accept local, no open relay.
    - key: session.rcpt.relay
      value: "false"
    # We are not using ASN/Geo-enriched spam rules yet. Disable the periodic
    # CDN refresh path to keep startup and steady-state logs quiet until that
    # feature is wired into the product.
    - key: asn.type
      value: disabled
    # Metrics via OpenTelemetry.
    - key: metrics.open-telemetry.transport
      value: grpc
    - key: metrics.open-telemetry.endpoint
      value: "http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}"
    - key: metrics.open-telemetry.interval
      value: 30s
  environment:
    CREDENTIALS: "admin:{{ stalwart_admin_password }}"
  changed_when: false
  no_log: true

- name: Remove obsolete Stalwart relay and Sieve settings
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/stalwart-cli"
      - -u
      - "http://{{ topology_endpoints.stalwart.endpoints.http.address }}"
      - server
      - delete-config
      - "{{ item }}"
  loop:
    - queue.route.relay
    - queue.strategy.route
    - remote.resend
    - queue.outbound
    - session.rcpt.directory
    - session.data.script
    - sieve.trusted.scripts.operator_forward
    - sieve.trusted.scripts.operator_forward.contents
  environment:
    CREDENTIALS: "admin:{{ stalwart_admin_password }}"
  # stalwart-cli 0.15.5 returns 0 on delete-config of a missing key, so the
  # previous failed_when:false was load-bearing only for server-unreachable
  # errors — which we now want to surface.
  changed_when: false
  no_log: true

- name: Reload Stalwart configuration after settings update
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/stalwart-cli"
      - -u
      - "http://{{ topology_endpoints.stalwart.endpoints.http.address }}"
      - server
      - reload-config
  environment:
    CREDENTIALS: "admin:{{ stalwart_admin_password }}"
  changed_when: false
  no_log: true
