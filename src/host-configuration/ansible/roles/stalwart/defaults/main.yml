stalwart_webadmin_local_path: "{{ stalwart_data_dir }}/webadmin.zip"
stalwart_spam_filter_version: "2.0.5"
stalwart_spam_filter_url: "https://github.com/stalwartlabs/spam-filter/releases/download/v2.0.5/spam-filter.toml"
stalwart_spam_filter_sha256: "4ac035283240e5772ad1e422ba68a9cbcb985b8de86dc4c88dbb60061b51bd07"
stalwart_spam_filter_local_path: "{{ stalwart_data_dir }}/spam-filter.toml"

