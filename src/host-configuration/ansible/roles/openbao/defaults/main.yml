---
openbao_config_dir: /etc/openbao
openbao_hosts_file: "{{ openbao_config_dir }}/hosts"
openbao_tls_dir: /etc/openbao/tls
openbao_data_dir: /var/lib/openbao
openbao_raft_dir: /var/lib/openbao/raft
openbao_log_dir: /var/log/openbao
openbao_audit_log: /var/log/openbao/audit.log
openbao_credstore_dir: /etc/credstore/openbao
openbao_node_id: verself-single-node
openbao_rebootstrap: false
openbao_rebootstrap_confirm: ""
openbao_key_shares: 3
openbao_key_threshold: 2
openbao_oidc_loopback_hosts:
  - "auth.{{ verself_domain }}"
openbao_spiffe_jwt_mount: spiffe-jwt
openbao_spiffe_jwt_jwks_url: "{{ spire_jwt_bundle_endpoint_url }}"
openbao_spiffe_jwt_jwks_ca_pem_path: /etc/spire/bundle-endpoint/ca.pem
openbao_workload_audience: openbao
openbao_workload_token_ttl: 15m
openbao_workload_token_max_ttl: 1h
openbao_audit_request_headers:
  - name: X-Verself-Request-Id
    hmac: false

# Operator-OIDC Vault token lifetime knobs. token_period sets the
# auto-renewal cadence (14d → `aspect operator refresh` keeps the token
# alive across normal operator activity); token_explicit_max_ttl is the
# hard cap (30d) past which OIDC re-auth is mandatory.
openbao_ssh_ca_oidc_token_period: "1209600s"
openbao_ssh_ca_oidc_token_explicit_max_ttl: "2592000s"

# Workload-pool credstore + KV mount. KV stores per-slot wg priv keys;
# the credstore JSON file feeds the wireguard role at template render
# time so kernel WG state can include the slot peers without first
# fetching anything from the OpenBao API.
openbao_workload_pool_credstore_dir: /etc/credstore/workload-pool
openbao_workload_pool_kv_mount: kv-workload-pool
