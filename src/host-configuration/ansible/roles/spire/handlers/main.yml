---
- name: Restart spire-server
  listen: restart spire-server
  ansible.builtin.systemd:
    name: spire-server
    state: restarted
    daemon_reload: true

- name: Restart spire-agent
  listen: restart spire-agent
  ansible.builtin.systemd:
    name: spire-agent
    state: restarted
    daemon_reload: true
