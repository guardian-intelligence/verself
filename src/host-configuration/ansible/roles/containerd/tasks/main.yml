---
# containerd hosts OCI workloads that do not fit Nomad's artifact model.
# The runc v2 shim is part of the pinned containerd archive and is started on
# demand per container; it is not a separate host daemon.

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Configure containerd
  ansible.builtin.copy:
    content: |
      version = 2

      [plugins]
        [plugins."io.containerd.snapshotter.v1.zfs"]
          root_path = "/{{ zfs_pool }}"
    dest: /etc/containerd/config.toml
    mode: "0644"
  notify: restart containerd

- name: Deploy containerd systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=containerd container runtime
      After=verself-firewall.target network.target
      Requires=verself-firewall.target

      [Service]
      Type=notify
      Environment=PATH={{ verself_bin }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      ExecStart={{ verself_bin }}/containerd --config /etc/containerd/config.toml
      Restart=always
      RestartSec=5
      LimitNPROC=infinity
      LimitCORE=infinity
      LimitNOFILE=1048576
      TasksMax=infinity
      OOMScoreAdjust=-999

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/containerd.service
    mode: "0644"
  notify:
    - restart containerd

- name: Enable and start containerd
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started
    daemon_reload: true
