---
# PostgreSQL database server.
# Binary provided by substrate_profile role (apt from PGDG repo).

- name: Capture PostgreSQL version
  ansible.builtin.command:
    cmd: "{{ verself_bin }}/postgres --version"
  register: postgresql_version_output
  changed_when: false

- name: Assert PostgreSQL version matches expected
  ansible.builtin.assert:
    that: "'16.' in postgresql_version_output.stdout"
    fail_msg: >-
      Expected PostgreSQL 16.x, got: {{ postgresql_version_output.stdout }}.
      Update topology/catalog/versions.cue or adjust the version assertion.

# --- System user ---

- name: Create postgres system group
  ansible.builtin.group:
    name: postgres
    system: true

- name: Create postgres system user
  ansible.builtin.user:
    name: postgres
    group: postgres
    system: true
    home: /var/lib/postgresql
    shell: /bin/bash
    create_home: true

# --- Directories ---

- name: Create PostgreSQL directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"
  loop:
    - "{{ postgresql_data_dir }}"
    - "{{ postgresql_config_dir }}"

- name: Create PostgreSQL log directory
  ansible.builtin.file:
    # The setgid bit keeps new collector-readable log files in group adm even
    # though postgres runs with primary group postgres.
    path: "{{ postgresql_log_dir }}"
    state: directory
    owner: postgres
    group: adm
    mode: "2755"

- name: Create PostgreSQL run directory
  ansible.builtin.file:
    path: /var/run/postgresql
    state: directory
    owner: postgres
    group: postgres
    mode: "0755"

# --- Idempotent initdb ---

- name: Check if PostgreSQL data directory is initialized
  ansible.builtin.stat:
    path: "{{ postgresql_data_dir }}/PG_VERSION"
  register: postgresql_data_stat

- name: Write temporary password file for initdb
  ansible.builtin.copy:
    content: "{{ postgresql_admin_password }}"
    dest: /tmp/.pg_initdb_pw
    owner: postgres
    group: postgres
    mode: "0600"
  when: not postgresql_data_stat.stat.exists
  no_log: true

- name: Initialize PostgreSQL data directory
  ansible.builtin.command:
    cmd: >-
      {{ verself_bin }}/initdb
      --pgdata={{ postgresql_data_dir }}
      --auth=scram-sha-256
      --encoding=UTF8
      --locale=C.UTF-8
      --pwfile=/tmp/.pg_initdb_pw
  become: true
  become_user: postgres
  environment:
    HOME: /tmp
  changed_when: true
  when: not postgresql_data_stat.stat.exists

- name: Remove temporary password file
  ansible.builtin.file:
    path: /tmp/.pg_initdb_pw
    state: absent

# --- Configuration ---

- name: Deploy postgresql.conf
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: "{{ postgresql_config_dir }}/postgresql.conf"
    owner: postgres
    group: postgres
    mode: "0600"
  notify:
    - restart postgresql

- name: Deploy pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "{{ postgresql_config_dir }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0600"
  notify:
    - restart postgresql

- name: Deploy pg_ident.conf
  ansible.builtin.template:
    src: pg_ident.conf.j2
    dest: "{{ postgresql_config_dir }}/pg_ident.conf"
    owner: postgres
    group: postgres
    mode: "0600"
  notify:
    - restart postgresql

# --- systemd unit ---

- name: Deploy PostgreSQL systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=PostgreSQL
      After=verself-firewall.target network.target
      Requires=verself-firewall.target

      [Service]
      Type=simple
      User=postgres
      Group=postgres
      ExecStart={{ verself_bin }}/postgres -D {{ postgresql_data_dir }} -c config_file={{ postgresql_config_dir }}/postgresql.conf
      ExecReload=/bin/kill -HUP $MAINPID
      Restart=on-failure
      RestartSec=5
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/postgresql.service
    mode: "0644"
  notify:
    - restart postgresql

- name: Apply PostgreSQL unit changes before proceeding
  ansible.builtin.meta: flush_handlers

# --- Enable and start ---

- name: Enable and start PostgreSQL
  ansible.builtin.systemd:
    name: postgresql
    enabled: true
    state: started
    daemon_reload: true

# --- Readiness gate ---

- name: Wait for PostgreSQL to be ready
  ansible.builtin.wait_for:
    port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
    host: "{{ topology_endpoints.postgresql.host }}"
    timeout: 30

# --- Set admin password (idempotent — always update to match credential file) ---

- name: Set postgres superuser password
  community.postgresql.postgresql_user:
    name: postgres
    password: "{{ postgresql_admin_password }}"
    login_unix_socket: /var/run/postgresql
    login_user: postgres
    trust_input: false
  become: true
  become_user: postgres
  no_log: true

- name: Ensure PostgreSQL roles and databases match desired state
  vars:
    postgresql_role_passwords:
      billing: "{{ postgresql_billing_password }}"
      iam_service: "{{ postgresql_iam_service_password }}"
      mailbox_service: "{{ postgresql_mailbox_service_password }}"
      sandbox_rental: "{{ postgresql_sandbox_rental_password }}"
    postgresql_peer_only_roles:
      # These daemons authenticate only over Unix-socket peer auth. Leaving the
      # roles password-less keeps loopback SCRAM from becoming a second credential.
      - spicedb
      - stalwart
      - temporal
    postgresql_managed_role_names: "{{ topology_postgres.databases | map(attribute='owner') | unique | sort | list }}"
    postgresql_managed_databases: "{{ topology_postgres.databases | sort(attribute='database') | list }}"
  module_defaults:
    community.postgresql.postgresql_user:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      trust_input: false
    community.postgresql.postgresql_db:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      maintenance_db: postgres
      trust_input: false
    community.postgresql.postgresql_owner:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: postgres
      trust_input: false
    community.postgresql.postgresql_ping:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: postgres
    community.postgresql.postgresql_query:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: postgres
      trust_input: false
  block:
    - name: Ensure application PostgreSQL roles exist
      community.postgresql.postgresql_user:
        name: "{{ item }}"
        password: "{{ postgresql_role_passwords.get(item, omit) }}"
        role_attr_flags: LOGIN
        conn_limit: "{{ postgresql_role_connection_limits[item] }}"
      loop: "{{ postgresql_managed_role_names }}"
      loop_control:
        label: "{{ item }}"
      no_log: true

    # postgresql_user will not clear omitted passwords; query first so a clean
    # peer-auth-only role does not report changed forever.
    - name: Read peer-auth-only PostgreSQL roles with lingering passwords
      community.postgresql.postgresql_query:
        query: >-
          SELECT rolname
          FROM pg_authid
          WHERE rolname = ANY(%s)
            AND rolpassword IS NOT NULL
        positional_args:
          - "{{ postgresql_peer_only_roles }}"
      register: postgresql_peer_roles_with_password

    - name: Clear password on peer-auth-only PostgreSQL roles
      community.postgresql.postgresql_query:
        query: "ALTER ROLE {{ item.rolname }} PASSWORD NULL"
      loop: >-
        {{
          postgresql_peer_roles_with_password.query_result
          if (postgresql_peer_roles_with_password.rowcount | int) > 0
          else []
        }}
      loop_control:
        label: "{{ item.rolname }}"

    - name: Ensure application PostgreSQL databases exist
      community.postgresql.postgresql_db:
        name: "{{ item.database }}"
        owner: "{{ item.owner }}"
        state: present
      loop: "{{ postgresql_managed_databases }}"
      loop_control:
        label: "{{ item.database }}"
      no_log: true

    - name: Ensure application PostgreSQL database ownership
      community.postgresql.postgresql_owner:
        obj_name: "{{ item.database }}"
        obj_type: database
        new_owner: "{{ item.owner }}"
      loop: "{{ postgresql_managed_databases }}"
      loop_control:
        label: "{{ item.database }}"
      no_log: true
