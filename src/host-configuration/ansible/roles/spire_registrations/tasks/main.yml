---
- name: Wait for SPIRE server API socket before registering workloads
  ansible.builtin.wait_for:
    path: "{{ spire_server_socket_path }}"
    timeout: 30

- name: Load component-owned SPIRE identity registry
  ansible.builtin.set_fact:
    spire_registrations_registry: "{{ lookup('ansible.builtin.file', spire_registrations_file) | from_json }}"

- name: Assert SPIRE identity registry schema
  ansible.builtin.assert:
    that:
      - spire_registrations_registry.schema_version == 1
      - spire_registrations_registry.identities is iterable
    fail_msg: "SPIRE identity registry must be a schema_version=1 descriptor"

- name: Initialize SPIRE registration identity list
  ansible.builtin.set_fact:
    spire_registrations_identities: []

- name: Bind SPIRE registration identities to the site trust domain
  ansible.builtin.set_fact:
    spire_registrations_identities: >-
      {{ spire_registrations_identities + [
        spire_identity | combine({
          'spiffe_id': 'spiffe://' ~ spire_trust_domain ~ spire_identity.path,
        })
      ] }}
  loop: "{{ spire_registrations_registry.identities }}"
  loop_control:
    loop_var: spire_identity
    label: "{{ spire_identity.key }}"

- name: Probe SPIRE registration convergence once
  ansible.builtin.script: >-
    {{ role_path }}/files/spire_registration_convergence.py
    --spire-server {{ verself_bin }}/spire-server
    --socket-path {{ spire_server_socket_path }}
    --parent-id {{ spire_agent_id }}
    --workload-group {{ spire_workload_group }}
  environment:
    SPIRE_REGISTRATIONS_DESIRED: "{{ spire_registrations_identities | to_json }}"
  register: spire_registrations_convergence_raw
  changed_when: false

- name: Set SPIRE registration convergence plan
  ansible.builtin.set_fact:
    spire_registrations_convergence: "{{ spire_registrations_convergence_raw.stdout | from_json }}"
  changed_when: false

- name: Skip SPIRE registration reconciliation when already converged
  ansible.builtin.debug:
    msg: >-
      SPIRE registrations already converged for {{
      spire_registrations_convergence.desired_count }} managed identities; skipping
      group, user, per-entry read, create, update, and restart tasks.
  when: spire_registrations_convergence.converged | bool

- name: Reconcile SPIRE runtime users and workload registrations
  ansible.builtin.include_tasks: reconcile.yml
  when: not (spire_registrations_convergence.converged | bool)
