---
# Firecracker host setup: KVM, jailer user/dirs, host networking, the
# vm-orchestrator daemon, and the vm-orchestrator-seed oneshot unit that
# materializes composable image zvols (substrate + every platform_toolchain
# image) via the SeedImage RPC. The substrate ext4 + vmlinux + toolchain
# ext4s land at /var/lib/verself/guest-images/ via the guest_rootfs role
# that runs before this one.

- name: Load Firecracker version pins
  ansible.builtin.assert:
    that:
      - topology_guest_versions is defined
      - topology_guest_versions.firecracker.version is defined
      - topology_guest_versions.firecracker.sha256 is defined
    fail_msg: >-
      topology_guest_versions is missing from src/host-configuration/ansible/group_vars/all/catalog.yml.

- name: Set Firecracker version pins
  ansible.builtin.set_fact:
    firecracker_version_pins: "{{ topology_guest_versions }}"

- name: Set Firecracker release paths
  ansible.builtin.set_fact:
    firecracker_release_archive: "/tmp/firecracker-{{ firecracker_version_pins.firecracker.version }}-{{ firecracker_version_pins.firecracker.arch }}.tgz"
    firecracker_release_dir: "/tmp/firecracker-release-{{ firecracker_version_pins.firecracker.version }}-{{ firecracker_version_pins.firecracker.arch }}"

- name: Download pinned Firecracker release archive
  ansible.builtin.get_url:
    url: "{{ firecracker_version_pins.firecracker.url }}"
    dest: "{{ firecracker_release_archive }}"
    checksum: "sha256:{{ firecracker_version_pins.firecracker.sha256 }}"
    mode: "0644"

- name: Create Firecracker extraction directory
  ansible.builtin.file:
    path: "{{ firecracker_release_dir }}"
    state: directory
    mode: "0755"

- name: Extract Firecracker release archive
  ansible.builtin.unarchive:
    src: "{{ firecracker_release_archive }}"
    dest: "{{ firecracker_release_dir }}"
    remote_src: true

- name: Install pinned Firecracker binary
  ansible.builtin.copy:
    src: >-
      {{
        firecracker_release_dir
        ~ '/release-v'
        ~ firecracker_version_pins.firecracker.version
        ~ '-'
        ~ firecracker_version_pins.firecracker.arch
        ~ '/firecracker-v'
        ~ firecracker_version_pins.firecracker.version
        ~ '-'
        ~ firecracker_version_pins.firecracker.arch
      }}
    dest: /usr/local/bin/firecracker
    remote_src: true
    owner: root
    group: root
    mode: "0755"

- name: Install pinned jailer binary
  ansible.builtin.copy:
    src: >-
      {{
        firecracker_release_dir
        ~ '/release-v'
        ~ firecracker_version_pins.firecracker.version
        ~ '-'
        ~ firecracker_version_pins.firecracker.arch
        ~ '/jailer-v'
        ~ firecracker_version_pins.firecracker.version
        ~ '-'
        ~ firecracker_version_pins.firecracker.arch
      }}
    dest: /usr/local/bin/jailer
    remote_src: true
    owner: root
    group: root
    mode: "0755"

- name: Verify installed Firecracker version
  ansible.builtin.command: /usr/local/bin/firecracker --version
  register: firecracker_installed_version
  changed_when: false
  failed_when: "'v' + firecracker_version_pins.firecracker.version not in firecracker_installed_version.stdout"

# --- KVM ---

- name: Detect KVM module for CPU vendor
  ansible.builtin.set_fact:
    firecracker_kvm_module: >-
      {{
        'kvm_amd'
        if 'AuthenticAMD' in (ansible_facts.processor | default([]) | join(' '))
        else 'kvm_intel'
      }}

# modprobe can return non-zero when KVM is built-in (not a loadable module);
# we rely on the /dev/kvm stat below as the real check.
- name: Ensure KVM module is loaded ({{ firecracker_kvm_module }})
  community.general.modprobe:
    name: "{{ firecracker_kvm_module }}"
    state: present
  failed_when: false

- name: Verify /dev/kvm exists
  ansible.builtin.stat:
    path: /dev/kvm
  register: firecracker_dev_kvm

- name: Fail if KVM is not available
  ansible.builtin.fail:
    msg: >-
      /dev/kvm does not exist. Detected CPU vendor → {{ firecracker_kvm_module }}.
      Ensure KVM is enabled in BIOS and the correct module is loadable.
  when: not firecracker_dev_kvm.stat.exists

# --- ZFS ARC tuning ---

- name: Set ZFS ARC max to prevent VM OOM
  ansible.builtin.copy:
    content: "options zfs zfs_arc_max={{ firecracker_zfs_arc_max_bytes }}\n"
    dest: /etc/modprobe.d/zfs-arc.conf
    mode: "0644"
  notify: rebuild initramfs

# --- Jailer user and directories ---

- name: Create firecracker group
  ansible.builtin.group:
    name: "{{ firecracker_jailer_user }}"
    gid: "{{ firecracker_jailer_gid }}"
    state: present

- name: Create vm-orchestrator client group
  ansible.builtin.group:
    name: "{{ firecracker_vm_orchestrator_socket_group }}"
    system: true
    state: present

- name: Create firecracker user
  ansible.builtin.user:
    name: "{{ firecracker_jailer_user }}"
    uid: "{{ firecracker_jailer_uid }}"
    group: "{{ firecracker_jailer_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: false

- name: Create jailer root directory
  ansible.builtin.file:
    path: "{{ firecracker_jailer_root }}"
    state: directory
    mode: "0755"

- name: Create guest image directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /var/lib/verself
    - "{{ firecracker_guest_images_dir }}"
    - "{{ firecracker_guest_images_dir }}/toolchains"
    - "{{ firecracker_state_db_path | dirname }}"

- name: Ensure vm-orchestrator state directory ownership
  ansible.builtin.file:
    path: "{{ firecracker_state_db_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

# --- Host networking (native nftables) ---

- name: Resolve uplink interface for Firecracker NAT
  ansible.builtin.set_fact:
    firecracker_resolved_uplink: >-
      {{ firecracker_host_uplink_interface
         if firecracker_host_uplink_interface != ''
         else ansible_facts['default_ipv4']['interface'] }}

- name: Persist IP forwarding via sysctl
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-verself.conf
    reload: true

# Keep placeholder substitution controller-side; copy-then-replace rewrites
# the host file on every run and triggers needless network restarts.
- name: Stage rendered Firecracker nftables ruleset
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.file', platform_rendered_dir + '/etc/nftables.d/firecracker.nft', rstrip=False) | replace('__VERSELF_UPLINK__', firecracker_resolved_uplink) }}"
    dest: /etc/nftables.d/firecracker.nft
    mode: "0644"
  notify: restart firecracker networking

- name: Install Firecracker host networking setup script
  ansible.builtin.template:
    src: firecracker-network-setup.sh.j2
    dest: /usr/local/bin/verself-firecracker-network-setup
    mode: "0755"
  notify: restart firecracker networking

- name: Install Firecracker host networking service
  ansible.builtin.template:
    src: verself-firecracker-network.service.j2
    dest: /etc/systemd/system/verself-firecracker-network.service
    mode: "0644"
  notify: restart firecracker networking

- name: Ensure Firecracker host networking service is enabled and started
  ansible.builtin.systemd:
    name: verself-firecracker-network.service
    enabled: true
    state: started
    daemon_reload: true

- name: Install vm-orchestrator service
  ansible.builtin.template:
    src: vm-orchestrator.service.j2
    dest: /etc/systemd/system/vm-orchestrator.service
    mode: "0644"
  notify: restart vm-orchestrator

- name: Ensure vm-orchestrator service is enabled and started
  ansible.builtin.systemd:
    name: vm-orchestrator.service
    enabled: true
    state: started
    daemon_reload: true

- name: Flush vm-orchestrator handlers
  ansible.builtin.meta: flush_handlers

- name: Verify vm-orchestrator API socket is present
  ansible.builtin.command: test -S {{ firecracker_vm_orchestrator_api_socket }}
  register: firecracker_vm_orchestrator_socket
  changed_when: false
  retries: 30
  delay: 1
  until: firecracker_vm_orchestrator_socket.rc == 0

- name: Read vm-orchestrator API socket permissions
  ansible.builtin.command: stat -c '%a %G' {{ firecracker_vm_orchestrator_api_socket }}
  register: firecracker_vm_orchestrator_socket_stat
  changed_when: false

- name: Assert vm-orchestrator API socket ACLs
  ansible.builtin.assert:
    that:
      - firecracker_vm_orchestrator_socket_stat.stdout is search('^660 ')
      - firecracker_vm_orchestrator_socket_stat.stdout is search(' ' ~ firecracker_vm_orchestrator_socket_group ~ '$')
    fail_msg: >-
      vm-orchestrator socket must be mode 660 and group {{ firecracker_vm_orchestrator_socket_group }};
      got {{ firecracker_vm_orchestrator_socket_stat.stdout }}.

# --- Guest image verification ---
# Substrate built on the host by guest_rootfs role; toolchain images
# Bazel-built and staged by guest_rootfs role.

- name: Verify guest kernel exists
  ansible.builtin.stat:
    path: "{{ firecracker_kernel_path }}"
    # get_checksum defaults to true, which would sha1 the file. We only need existence + mtime.
    get_checksum: false
  register: firecracker_guest_kernel

- name: Verify substrate ext4 exists
  ansible.builtin.stat:
    path: "{{ firecracker_substrate_path }}"
    # Avoid the default sha1 checksum — substrate is multi-hundred-MB and
    # the seed RPC's vs:source_digest already tracks content drift.
    get_checksum: false
  register: firecracker_substrate

- name: Verify substrate manifest exists
  ansible.builtin.stat:
    path: "{{ firecracker_substrate_manifest_path }}"
    get_checksum: false
  register: firecracker_substrate_manifest

- name: Verify dd_from_file source artifacts referenced by the seed catalog exist
  ansible.builtin.stat:
    path: "{{ item }}"
    get_checksum: false
  register: firecracker_seed_source_stats
  loop: "{{ firecracker_seed_images | selectattr('strategy', 'equalto', 'dd_from_file') | map(attribute='source_path') | reject('equalto', '') | list }}"

- name: Fail if guest images or seed sources are missing
  ansible.builtin.fail:
    msg: >
      Guest images not found at {{ firecracker_kernel_path }},
      {{ firecracker_substrate_path }}, {{ firecracker_substrate_manifest_path }},
      and/or one or more seed source paths.
      The guest_rootfs role in the canonical site playbook must stage them
      before the firecracker role runs.
  when: >-
    not firecracker_guest_kernel.stat.exists
    or not firecracker_substrate.stat.exists
    or not firecracker_substrate_manifest.stat.exists
    or (firecracker_seed_source_stats.results | rejectattr('stat.exists') | list | length > 0)

# --- Composable image seeding ---
# vm-orchestrator-seed.service is a systemd oneshot that issues one
# SeedImage RPC per entry in firecracker_seed_images (sourced from authored topology
# config.firecracker.images). The daemon owns staging zvol creation,
# dd/mkfs, snapshot, dependent-clone teardown, and idempotency via
# vs:source_digest user properties on the @ready snapshot. Ansible
# carries no zfs(8)/dd/mkfs.ext4 invocations for these images.

- name: Install vm-orchestrator seed oneshot unit
  ansible.builtin.template:
    src: vm-orchestrator-seed.service.j2
    dest: /etc/systemd/system/vm-orchestrator-seed.service
    mode: "0644"
  register: firecracker_seed_unit

- name: Reload systemd if seed unit changed
  ansible.builtin.systemd:
    daemon_reload: true
  when: firecracker_seed_unit.changed  # noqa: no-handler

- name: Reset vm-orchestrator-seed when unit changed or images changed
  ansible.builtin.systemd:
    name: vm-orchestrator-seed.service
    state: stopped
  when: firecracker_seed_unit.changed  # noqa: no-handler

- name: Run vm-orchestrator-seed oneshot
  ansible.builtin.systemd:
    name: vm-orchestrator-seed.service
    state: started
    enabled: true

# The vm-orchestrator daemon owns ensure-of pool/<images> + pool/<workloads>
# at startup (see vm-orchestrator/zfs.VolumeLifecycle.EnsureRoots), and the
# seed oneshot above materializes every composable image — including the
# boot image (substrate) — through the SeedImage RPC. There are no Ansible
# tasks that issue zfs(8), dd, or mkfs commands directly anymore.
