---
haproxy_config_dir: /etc/haproxy
haproxy_cert_dir: /etc/haproxy/certs
haproxy_map_dir: /etc/haproxy/maps
haproxy_log_dir: /var/log/haproxy
haproxy_credstore_dir: /etc/credstore/haproxy
haproxy_lego_path: /var/lib/lego
haproxy_lego_email: "ceo@{{ verself_domain }}"
# lego's authoritative DNS checker can select Cloudflare IPv6 nameservers before host IPv6 egress is fully reliable.
haproxy_lego_dns_propagation_disable_ans: false
haproxy_lego_dns_propagation_wait: 60s
haproxy_lego_dns_resolvers: []
haproxy_aws_lc_library_path: /opt/aws-lc/lib/x86_64-linux-gnu
haproxy_cloudflare_token_path: "{{ haproxy_credstore_dir }}/cloudflare-dns-api-token"

haproxy_public_certificates:
  - name: "{{ verself_domain }}"
    domains:
      - "{{ verself_domain }}"
      - "*.{{ verself_domain }}"
      - "*.api.{{ verself_domain }}"
    pem_path: "{{ haproxy_cert_dir }}/{{ verself_domain }}.pem"
    split_cert_path: "{{ stalwart_tls_cert_dir | default('/etc/stalwart/certs') }}/cert.pem"
    split_key_path: "{{ stalwart_tls_cert_dir | default('/etc/stalwart/certs') }}/key.pem"
    split_group: stalwart
  - name: "{{ company_domain }}"
    domains:
      - "{{ company_domain }}"
    pem_path: "{{ haproxy_cert_dir }}/{{ company_domain }}.pem"

