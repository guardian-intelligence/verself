---
# Converge a single WireGuard tunnel. The role calls this once per entry in
# wireguard_tunnels so the bare-metal host runs both wg0 and wg-ops out of
# the same role.
#
# Restart logic is inlined rather than handler-based: handlers run after the
# loop ends, by which point the loop_var is unset, so the handler
# would lose the interface name. Inlining keeps each tunnel's restart bound to
# its own iteration and runs deterministically per change.

- name: Generate WireGuard private key file {{ wireguard_tunnel.interface }}
  ansible.builtin.shell: |
    set -euo pipefail
    umask 077
    {{ verself_bin }}/wg genkey > /etc/wireguard/{{ wireguard_tunnel.interface }}-private.key
  args:
    executable: /bin/bash
    creates: "/etc/wireguard/{{ wireguard_tunnel.interface }}-private.key"
  no_log: true

- name: Set WireGuard private key permissions {{ wireguard_tunnel.interface }}
  ansible.builtin.file:
    path: "/etc/wireguard/{{ wireguard_tunnel.interface }}-private.key"
    mode: "0600"
  no_log: true

- name: Read WireGuard private key {{ wireguard_tunnel.interface }}
  ansible.builtin.slurp:
    src: "/etc/wireguard/{{ wireguard_tunnel.interface }}-private.key"
  register: wireguard_tunnel_private_key_file
  no_log: true

- name: Set WireGuard private key fact {{ wireguard_tunnel.interface }}
  ansible.builtin.set_fact:
    wireguard_tunnel_private_key_material: "{{ wireguard_tunnel_private_key_file.content | b64decode | trim }}"
  no_log: true

- name: Validate WireGuard private key material {{ wireguard_tunnel.interface }}
  ansible.builtin.shell: |
    set -o pipefail
    {{ verself_bin }}/wg pubkey < /etc/wireguard/{{ wireguard_tunnel.interface }}-private.key >/dev/null
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Derive WireGuard public key {{ wireguard_tunnel.interface }}
  ansible.builtin.shell: |
    set -o pipefail
    {{ verself_bin }}/wg pubkey < /etc/wireguard/{{ wireguard_tunnel.interface }}-private.key
  args:
    executable: /bin/bash
  register: wireguard_tunnel_pubkey_raw
  changed_when: false
  no_log: true

# Workload-pool slot peers are topology-declared by count + address base, but
# their priv keys are generated by the openbao role at deploy time. The
# slot pubkeys + addresses are persisted to /etc/credstore/workload-pool/
# slots.json so we can append them as wg peers without putting runtime
# state into authored topology. Read it (when present) and feed into the
# template.
- name: Probe workload-pool slot credstore {{ wireguard_tunnel.interface }}
  ansible.builtin.stat:
    path: /etc/credstore/workload-pool/slots.json
  register: wireguard_tunnel_workload_pool_stat

- name: Read workload-pool slot credstore {{ wireguard_tunnel.interface }}
  ansible.builtin.slurp:
    src: /etc/credstore/workload-pool/slots.json
  register: wireguard_tunnel_workload_pool_raw
  when:
    - wireguard_tunnel.interface == 'wg-ops'
    - wireguard_tunnel_workload_pool_stat.stat.exists

- name: Set workload-pool slot fact {{ wireguard_tunnel.interface }}
  ansible.builtin.set_fact:
    wireguard_tunnel_workload_slots: >-
      {{
        (wireguard_tunnel_workload_pool_raw.content | b64decode | from_json).slots
        if (wireguard_tunnel.interface == 'wg-ops'
            and wireguard_tunnel_workload_pool_stat.stat.exists)
        else []
      }}

- name: Deploy WireGuard config {{ wireguard_tunnel.interface }}
  ansible.builtin.template:
    src: tunnel.conf.j2
    dest: "/etc/wireguard/{{ wireguard_tunnel.interface }}.conf"
    mode: "0600"
  vars:
    tunnel_private_key: "{{ wireguard_tunnel_private_key_material }}"
    tunnel_workload_slots: "{{ wireguard_tunnel_workload_slots }}"
  register: wireguard_tunnel_config

# Publish the wg-ops discovery JSON on the public discovery surface so a
# clean operator device can configure its local WireGuard interface
# without first SSHing into the host. The endpoint hostname / port are
# the only fields a fresh device needs alongside its own pre-registered
# pubkey + locally-generated priv key.
- name: Create wg-ops discovery directory
  ansible.builtin.file:
    path: /var/www/verself/.well-known
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: wireguard_tunnel.interface == 'wg-ops'

- name: Publish wg-ops discovery JSON under /.well-known
  ansible.builtin.copy:
    dest: /var/www/verself/.well-known/verself-wireguard.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "endpoint_host": "{{ bare_metal_public_ipv4 }}",
        "endpoint_port": {{ wireguard_tunnel.port }},
        "server_pubkey": "{{ wireguard_tunnel_pubkey_raw.stdout | trim }}",
        "network": "{{ wireguard_tunnel.network }}",
        "host_address": "{{ wireguard_tunnel.address }}"
      }
  when: wireguard_tunnel.interface == 'wg-ops'

- name: Enable and start WireGuard {{ wireguard_tunnel.interface }}
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_tunnel.interface }}"
    enabled: true
    state: started

- name: Restart WireGuard on config change {{ wireguard_tunnel.interface }} # noqa: no-handler
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_tunnel.interface }}"
    state: restarted
  when: wireguard_tunnel_config.changed
