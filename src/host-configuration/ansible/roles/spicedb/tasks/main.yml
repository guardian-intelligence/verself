---
- name: Capture SpiceDB version
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/spicedb"
      - version
  register: spicedb_version_output
  changed_when: false

- name: Assert SpiceDB version matches expected
  ansible.builtin.assert:
    that: spicedb_version_output.stdout | trim == "spicedb v" ~ (topology_versions.production.spicedb | string)
    fail_msg: >-
      Expected SpiceDB {{ topology_versions.production.spicedb }}, got: {{ spicedb_version_output.stdout }}.
      Update topology/catalog and the pinned server tool together.

- name: Capture zed version
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/zed"
      - version
  register: spicedb_zed_version_output
  changed_when: false

- name: Assert zed version matches expected
  ansible.builtin.assert:
    that: "'client: zed v' ~ (topology_versions.production.zed | string) in spicedb_zed_version_output.stdout"
    fail_msg: >-
      Expected zed {{ topology_versions.production.zed }}, got: {{ spicedb_zed_version_output.stdout }}.
      Update topology/catalog and the pinned server tool together.

- name: Create SpiceDB system group
  ansible.builtin.group:
    name: "{{ spicedb_system_group }}"
    system: true

- name: Create SpiceDB system user
  ansible.builtin.user:
    name: "{{ spicedb_system_user }}"
    group: "{{ spicedb_system_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ spicedb_state_dir }}"
    create_home: false

- name: Create SpiceDB directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ spicedb_config_dir }}", owner: root, group: "{{ spicedb_system_group }}", mode: "0750" }
    - { path: "{{ spicedb_credstore_dir }}", owner: root, group: "{{ spicedb_system_group }}", mode: "0750" }
    - { path: "{{ spicedb_state_dir }}", owner: "{{ spicedb_system_user }}", group: "{{ spicedb_system_group }}", mode: "0750" }
    - { path: "{{ spicedb_state_dir }}/.ansible/tmp", owner: "{{ spicedb_system_user }}", group: "{{ spicedb_system_group }}", mode: "0700" }
  loop_control:
    label: "{{ item.path }}"

- name: Check for existing SpiceDB gRPC preshared key
  ansible.builtin.stat:
    path: "{{ spicedb_preshared_key_file }}"
  register: spicedb_preshared_key_stat

- name: Generate SpiceDB gRPC preshared key
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: "{{ spicedb_preshared_key_file }}"
    owner: root
    group: "{{ spicedb_system_group }}"
    mode: "0640"
  when: not spicedb_preshared_key_stat.stat.exists
  no_log: true

- name: Read SpiceDB gRPC preshared key
  ansible.builtin.slurp:
    src: "{{ spicedb_preshared_key_file }}"
  register: spicedb_preshared_key_raw
  no_log: true

- name: Set SpiceDB credential facts
  ansible.builtin.set_fact:
    spicedb_grpc_preshared_key: "{{ spicedb_preshared_key_raw.content | b64decode | trim }}"
  no_log: true

- name: Deploy SpiceDB credential environment
  ansible.builtin.copy:
    content: |
      SPICEDB_GRPC_PRESHARED_KEY={{ spicedb_grpc_preshared_key }}
    dest: "{{ spicedb_env_file }}"
    owner: root
    group: "{{ spicedb_system_group }}"
    mode: "0640"
  notify: restart spicedb
  no_log: true

- name: Run SpiceDB datastore migrations
  become: true
  become_user: "{{ spicedb_system_user }}"
  vars:
    ansible_remote_tmp: "{{ spicedb_state_dir }}/.ansible/tmp"
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/spicedb"
      - datastore
      - migrate
      - head
      - --datastore-engine
      - postgres
      - --datastore-conn-uri
      - "{{ spicedb_datastore_conn_uri }}"
      - --log-format
      - json
      - --skip-release-check
  environment:
    HOME: /tmp
  changed_when: false

- name: Deploy SpiceDB systemd unit
  ansible.builtin.template:
    src: spicedb.service.j2
    dest: /etc/systemd/system/spicedb.service
    owner: root
    group: root
    mode: "0644"
  notify: restart spicedb

- name: Apply SpiceDB unit and credential changes before readiness
  ansible.builtin.meta: flush_handlers

- name: Enable and start SpiceDB
  ansible.builtin.systemd:
    name: spicedb
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for SpiceDB gRPC listener
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.spicedb.host }}"
    port: "{{ topology_endpoints.spicedb.endpoints.grpc.port }}"
    timeout: 30

- name: Wait for SpiceDB metrics listener
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.spicedb.host }}"
    port: "{{ topology_endpoints.spicedb.endpoints.metrics.port }}"
    timeout: 30

- name: Verify SpiceDB metrics endpoint
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.spicedb.endpoints.metrics.address }}/metrics"
    status_code: 200
  changed_when: false

# zed accepts tokens as CLI flags, which would expose the gRPC key in argv.
# iam-service will consume the key through a root-owned env/credential file.
