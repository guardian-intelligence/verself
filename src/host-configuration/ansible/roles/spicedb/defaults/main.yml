---
spicedb_system_user: spicedb
spicedb_system_group: spicedb

spicedb_config_dir: /etc/spicedb
spicedb_state_dir: /var/lib/spicedb
spicedb_credstore_dir: /etc/credstore/spicedb
spicedb_env_file: "{{ spicedb_config_dir }}/spicedb.env"
spicedb_preshared_key_file: "{{ spicedb_credstore_dir }}/grpc-preshared-key"

spicedb_postgresql_user: spicedb
spicedb_postgresql_database: spicedb
spicedb_postgresql_socket_dir: /var/run/postgresql
spicedb_datastore_conn_uri: >-
  postgres://{{ spicedb_postgresql_user }}@/{{ spicedb_postgresql_database }}?host={{ spicedb_postgresql_socket_dir }}&sslmode=disable&application_name=spicedb

spicedb_datastore_read_max_open: 8
spicedb_datastore_read_min_open: 1
spicedb_datastore_write_max_open: 4
spicedb_datastore_write_min_open: 1

spicedb_memory_max: 1G
