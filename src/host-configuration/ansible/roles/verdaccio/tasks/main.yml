---
# Sealed Verdaccio npm mirror for worker nodes.
# Installed via npm using Node.js from substrate_profile role into a writable
# prefix under /opt/verself (Verdaccio has no static binary).

- name: Create Verdaccio system user
  ansible.builtin.user:
    name: verdaccio
    system: true
    home: /var/lib/verdaccio
    shell: /usr/sbin/nologin
    create_home: true

- name: Create Verdaccio install prefix
  ansible.builtin.file:
    path: "{{ verdaccio_install_prefix }}"
    state: directory
    mode: "0755"

- name: Set Verdaccio storage ownership
  ansible.builtin.file:
    path: /var/lib/verdaccio/storage
    state: directory
    owner: verdaccio
    group: verdaccio
    mode: "0755"

- name: Check installed Verdaccio version
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/node"
      - "-p"
      - "require('{{ verdaccio_install_prefix }}/lib/node_modules/verdaccio/package.json').version"
  register: verdaccio_installed_version
  changed_when: false
  failed_when: false

- name: Install Verdaccio via npm
  ansible.builtin.command: >
    {{ verself_bin }}/npm install --global
    --prefix {{ verdaccio_install_prefix }}
    verdaccio@{{ verdaccio_version }}
    --registry https://registry.npmjs.org
  when: verdaccio_installed_version.stdout | default('') | trim != verdaccio_version
  changed_when: true
  environment:
    PATH: "{{ verself_bin }}:{{ ansible_facts['env']['PATH'] }}"
    HOME: /root
  notify: restart verdaccio

- name: Create Verdaccio config directory
  ansible.builtin.file:
    path: /etc/verdaccio
    state: directory
    mode: "0755"

# npm resolves globalconfig as $PREFIX/etc/npmrc, where PREFIX is the
# Node install root — not /etc/npmrc. With Node at /opt/verself/nodejs on
# workers, /etc/npmrc is a file npm never reads, so writing the registry=
# binding there leaves default `npm install` escaping to registry.npmjs.org.
- name: Ensure npm globalconfig directory exists
  ansible.builtin.file:
    path: "{{ verdaccio_nodejs_install_dir }}/etc"
    state: directory
    mode: "0755"

- name: Point npm at local Verdaccio
  ansible.builtin.copy:
    content: "registry=http://{{ topology_endpoints.verdaccio.endpoints.http.address }}\n"
    dest: "{{ verdaccio_nodejs_install_dir }}/etc/npmrc"
    mode: "0644"

- name: Ensure Verdaccio htpasswd file exists
  # copy with force: false is atomic (no umask-default window between
  # creation and chmod) — bcrypt hashes never sit at 0644 even for a moment.
  ansible.builtin.copy:
    content: ""
    dest: /etc/verdaccio/htpasswd
    owner: verdaccio
    group: verdaccio
    mode: "0640"
    force: false

- name: Deploy Verdaccio config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/verdaccio/config.yaml
    mode: "0644"
  notify: restart verdaccio

- name: Deploy Verdaccio systemd unit
  ansible.builtin.template:
    src: verdaccio.service.j2
    dest: /etc/systemd/system/verdaccio.service
    mode: "0644"
  notify:
    - restart verdaccio

- name: Enable and start Verdaccio
  ansible.builtin.systemd:
    name: verdaccio
    daemon_reload: true
    enabled: true
    state: started
