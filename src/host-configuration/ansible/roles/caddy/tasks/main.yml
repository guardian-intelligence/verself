---
# Caddy reverse proxy with automatic TLS.
# Binary provided by substrate_profile role via server_tools.tar.zst.

- name: Create Caddy system group
  ansible.builtin.group:
    name: caddy
    system: true

- name: Create Caddy system user
  ansible.builtin.user:
    name: caddy
    group: caddy
    groups: adm
    append: true
    system: true
    home: /var/lib/caddy
    shell: /usr/sbin/nologin
    create_home: false

- name: Create Caddy config directory
  ansible.builtin.file:
    path: /etc/caddy
    state: directory
    owner: root
    group: caddy
    mode: "0750"

- name: Create Caddy state directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: caddy
    group: caddy
    mode: "0750"
  loop:
    - /var/lib/caddy
    - /var/cache/caddy

- name: Create Caddy log directory
  ansible.builtin.file:
    path: /var/log/caddy
    state: directory
    owner: caddy
    group: adm
    mode: "2750"

# Public-by-design discovery surface for the verself.sh apex.
# `/var/www/verself/.well-known/` holds files that any operator-onboarding
# device fetches over public TLS before it has any other trust anchor:
#   - verself-ssh-ca.pub   (dropped by the ssh_ca role)
#   - verself-openbao-ca.pem  (dropped by the openbao role)
#   - verself-wireguard.json  (dropped by the wireguard role)
# The directory itself is world-readable, owned by root so a renegade
# service can't replace its contents. Caddy serves the contents from
# under https://verself.sh/.well-known/verself-*.
- name: Create well-known publication directory
  ansible.builtin.file:
    path: /var/www/verself/.well-known
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create Caddy access log with otelcol-readable permissions
  ansible.builtin.file:
    path: /var/log/caddy/access.log
    state: touch
    owner: caddy
    group: adm
    mode: "0640"

- name: Create Verself PKI directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/verself/pki, group: root, mode: "0755" }
    - { path: /etc/verself/pki/private, group: caddy, mode: "0750" }

- name: Map private Nomad artifact origin to loopback
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^.*\\s{{ topology_artifacts.nomad.origin.hostname | regex_escape }}$"
    line: "127.0.0.1 {{ topology_artifacts.nomad.origin.hostname }}"
    state: present

- name: Deploy Nomad artifact origin server certificate extensions
  ansible.builtin.copy:
    dest: /etc/verself/pki/nomad-artifacts-server.ext
    owner: root
    group: caddy
    mode: "0640"
    content: |
      basicConstraints=CA:FALSE
      keyUsage=digitalSignature,keyEncipherment
      extendedKeyUsage=serverAuth
      subjectAltName=DNS:{{ topology_artifacts.nomad.origin.hostname }},IP:127.0.0.1

- name: Generate Nomad artifact local CA private key
  ansible.builtin.command:
    argv:
      - openssl
      - genrsa
      - -out
      - /etc/verself/pki/private/nomad-artifacts-ca-key.pem
      - "4096"
    creates: /etc/verself/pki/private/nomad-artifacts-ca-key.pem

- name: Generate Nomad artifact local CA certificate
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -x509
      - -new
      - -nodes
      - -key
      - /etc/verself/pki/private/nomad-artifacts-ca-key.pem
      - -sha256
      - -days
      - "3650"
      - -out
      - "{{ topology_artifacts.nomad.origin.tls.ca_bundle_path }}"
      - -subj
      - /CN=Verself Nomad artifact local CA
    creates: "{{ topology_artifacts.nomad.origin.tls.ca_bundle_path }}"

- name: Inspect Nomad artifact server certificate SAN
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -in
      - /etc/verself/pki/nomad-artifacts-server.pem
      - -noout
      - -ext
      - subjectAltName
  register: caddy_nomad_artifacts_cert_san
  changed_when: false
  failed_when: false

- name: Remove stale Nomad artifact server certificate
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/verself/pki/nomad-artifacts-server.pem
    - /etc/verself/pki/nomad-artifacts-server.csr
    - /etc/verself/pki/private/nomad-artifacts-server-key.pem
  when: >-
    caddy_nomad_artifacts_cert_san.rc != 0
    or ('DNS:' ~ topology_artifacts.nomad.origin.hostname) not in caddy_nomad_artifacts_cert_san.stdout

- name: Generate Nomad artifact origin server private key and CSR
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -new
      - -newkey
      - rsa:2048
      - -nodes
      - -keyout
      - /etc/verself/pki/private/nomad-artifacts-server-key.pem
      - -out
      - /etc/verself/pki/nomad-artifacts-server.csr
      - -subj
      - "/CN={{ topology_artifacts.nomad.origin.hostname }}"
    creates: /etc/verself/pki/private/nomad-artifacts-server-key.pem

- name: Sign Nomad artifact origin server certificate
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -req
      - -in
      - /etc/verself/pki/nomad-artifacts-server.csr
      - -CA
      - "{{ topology_artifacts.nomad.origin.tls.ca_bundle_path }}"
      - -CAkey
      - /etc/verself/pki/private/nomad-artifacts-ca-key.pem
      - -CAcreateserial
      - -out
      - /etc/verself/pki/nomad-artifacts-server.pem
      - -days
      - "3650"
      - -sha256
      - -extfile
      - /etc/verself/pki/nomad-artifacts-server.ext
    creates: /etc/verself/pki/nomad-artifacts-server.pem

- name: Converge Nomad artifact TLS material ownership
  ansible.builtin.file:
    path: "/etc/verself/pki/{{ item.name }}"
    owner: root
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { name: nomad-artifacts-ca.pem, group: root, mode: "0644" }
    - { name: private/nomad-artifacts-ca-key.pem, group: root, mode: "0600" }
    - { name: nomad-artifacts-server.pem, group: caddy, mode: "0640" }
    - { name: private/nomad-artifacts-server-key.pem, group: caddy, mode: "0640" }
    - { name: nomad-artifacts-server.csr, group: caddy, mode: "0640" }
    - { name: nomad-artifacts-server.ext, group: caddy, mode: "0640" }

- name: Check Nomad artifact local CA serial file
  ansible.builtin.stat:
    path: /etc/verself/pki/nomad-artifacts-ca.srl
  register: caddy_nomad_artifacts_ca_serial

- name: Set Nomad artifact local CA serial ownership
  ansible.builtin.file:
    path: /etc/verself/pki/nomad-artifacts-ca.srl
    owner: root
    group: root
    mode: "0600"
  when: caddy_nomad_artifacts_ca_serial.stat.exists

- name: Install Nomad artifact local CA into system trust
  ansible.builtin.copy:
    src: "{{ topology_artifacts.nomad.origin.tls.ca_bundle_path }}"
    dest: /usr/local/share/ca-certificates/verself-nomad-artifacts.crt
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  notify: update ca certificates

- name: Require billing webhook DNS to remain DNS-only
  ansible.builtin.assert:
    that: not (cloudflare_proxied | default(false) | bool)
    fail_msg: >-
      billing webhook origin IP allowlisting requires billing DNS to remain
      DNS-only (cloudflare_proxied=false). Move the allowlist to the
      Cloudflare edge before enabling orange-cloud proxying.

- name: Assert Stripe webhook IP list parsed
  ansible.builtin.assert:
    that:
      - caddy_stripe_webhook_ips | length > 0
      - caddy_stripe_webhook_ips | select('string') | list | length == caddy_stripe_webhook_ips | length
    fail_msg: >-
      caddy_stripe_webhook_ips must contain the published Stripe webhook source IPs.

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: caddy
    mode: "0640"
    validate: "{{ verself_bin }}/caddy validate --config %s --adapter caddyfile"
  no_log: true
  notify: restart caddy

# /etc/caddy/upstreams.env carries one VERSELF_UPSTREAM_<COMP>_<EP> per
# Nomad-supervised Caddy upstream. The deploy controller rewrites it
# whenever a Nomad alloc moves; Caddy expands `{$VERSELF_UPSTREAM_*}`
# in the Caddyfile from this env at parse time. The placeholder file
# lets Caddy parse-and-start on a node that hasn't seen its first
# Nomad deploy yet — every upstream resolves to 127.0.0.1:1, which
# returns 502 until the controller writes real allocations.
- name: Initialise Caddy upstreams env file (placeholders)
  ansible.builtin.copy:
    content: |
      VERSELF_UPSTREAM_BILLING_PUBLIC_HTTP=127.0.0.1:1
      VERSELF_UPSTREAM_COMPANY_HTTP=127.0.0.1:1
      VERSELF_UPSTREAM_GOVERNANCE_SERVICE_PUBLIC_HTTP=127.0.0.1:1
      VERSELF_UPSTREAM_IDENTITY_SERVICE_PUBLIC_HTTP=127.0.0.1:1
      VERSELF_UPSTREAM_MAILBOX_SERVICE_PUBLIC_HTTP=127.0.0.1:1
      VERSELF_UPSTREAM_NOTIFICATIONS_SERVICE_PUBLIC_HTTP=127.0.0.1:1
      VERSELF_UPSTREAM_PROFILE_SERVICE_PUBLIC_HTTP=127.0.0.1:1
      VERSELF_UPSTREAM_PROJECTS_SERVICE_PUBLIC_HTTP=127.0.0.1:1
      VERSELF_UPSTREAM_SANDBOX_RENTAL_PUBLIC_HTTP=127.0.0.1:1
      VERSELF_UPSTREAM_SECRETS_SERVICE_PUBLIC_HTTP=127.0.0.1:1
      VERSELF_UPSTREAM_SOURCE_CODE_HOSTING_SERVICE_PUBLIC_HTTP=127.0.0.1:1
      VERSELF_UPSTREAM_VERSELF_WEB_HTTP=127.0.0.1:1
    dest: /etc/caddy/upstreams.env
    owner: root
    group: caddy
    mode: "0640"
    force: false  # never overwrite the controller-written file

- name: Deploy Caddy systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Caddy HTTP/2 web server
      After=verself-firewall.target network-online.target verself-firecracker-network.service
      Requires=verself-firewall.target
      Wants=network-online.target verself-firecracker-network.service

      [Service]
      Type=simple
      User=caddy
      Group=caddy
      SupplementaryGroups=adm
      Environment=HOME=/var/lib/caddy
      Environment=XDG_CONFIG_HOME=/etc/caddy
      Environment=XDG_DATA_HOME=/var/lib/caddy
      Environment=XDG_CACHE_HOME=/var/cache/caddy
      EnvironmentFile=/etc/caddy/upstreams.env
      ExecStart={{ verself_bin }}/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
      ExecReload={{ verself_bin }}/caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
      Restart=on-failure
      RestartSec=5
      AmbientCapabilities=CAP_NET_BIND_SERVICE
      CapabilityBoundingSet=CAP_NET_BIND_SERVICE
      LimitNOFILE=1048576
      NoNewPrivileges=true
      ProtectSystem=strict
      ProtectHome=true
      PrivateTmp=true
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectKernelLogs=true
      ProtectControlGroups=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      LockPersonality=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      ReadWritePaths=/var/lib/caddy /var/cache/caddy /var/log/caddy

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/caddy.service
    mode: "0644"
  notify:
    - restart caddy

- name: Enable and start Caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
    daemon_reload: true
