---
# ZFS pool and dataset setup for worker nodes.
# zfsutils-linux installed via apt in base role (kernel-dependent).
# ZFS pool creation is hardware-specific and cannot be baked into an image.

- name: Detect available disks for ZFS pool (skip root disk)
  ansible.builtin.shell: |
    set -o pipefail
    root_disk=$(lsblk -npo PKNAME $(findmnt -no SOURCE /) 2>/dev/null | head -1)
    lsblk -dnpo NAME,TYPE | awk -v root="$root_disk" '$2 == "disk" && $1 != root && $1 !~ "^/dev/zd" {print $1}' | head -1
  register: zfs_disk
  args:
    executable: /bin/bash
  changed_when: false

- name: Check if ZFS pool exists
  ansible.builtin.command: zpool status {{ zfs_pool }}
  register: zfs_pool_status
  changed_when: false
  failed_when: false

- name: Wipe old filesystem signatures on target disk
  ansible.builtin.command: wipefs -a {{ zfs_disk.stdout }}
  when:
    - zfs_pool_status.rc != 0
    - zfs_disk.stdout | length > 0
  changed_when: true

- name: Create ZFS pool
  ansible.builtin.command: >
    zpool create -f -o ashift=12
    -O compression=lz4
    -O atime=off
    -O xattr=sa
    {{ zfs_pool }} {{ zfs_disk.stdout }}
  when:
    - zfs_pool_status.rc != 0
    - zfs_disk.stdout | length > 0
  changed_when: true

- name: Create Verdaccio storage dataset
  community.general.zfs:
    name: "{{ zfs_pool }}/{{ zfs_verdaccio_dataset }}"
    state: present
    extra_zfs_properties:
      mountpoint: /var/lib/verdaccio/storage

- name: Create bazel-remote cache dataset
  community.general.zfs:
    name: "{{ zfs_pool }}/{{ zfs_bazel_remote_dataset }}"
    state: present
    extra_zfs_properties:
      mountpoint: /var/lib/bazel-remote
