---
# Batched user/group creation across the union of every Nomad-supervised
# component's workload.units. Replaces the per-component loop that previously
# walked tasks/component/users.yml inside component_substrate.yml. A single
# runtime-account probe gates the module loops so external drift still reconciles.
#
# Multiple units across multiple components can share one runtime user; we
# union supplementary_groups across all units that target the same user so
# later units do not drop required groups.

- name: Compute every Nomad-supervised component's workload units
  ansible.builtin.set_fact:
    all_application_components: >-
      {{
        topology_components
        | selectattr('deployment.supervisor', 'equalto', 'nomad')
        | selectattr('workload.units')
        | sort(attribute='workload.order')
        | list
      }}

- name: Compute the union of every component's units
  ansible.builtin.set_fact:
    all_component_units: >-
      {{
        all_application_components
        | map(attribute='workload.units')
        | flatten
        | list
      }}

- name: Probe component runtime account convergence once
  ansible.builtin.script: >-
    {{ playbook_dir }}/../files/runtime_accounts_convergence.py
    --workload-group {{ spire_workload_group }}
  environment:
    COMPONENT_RUNTIME_ACCOUNT_UNITS: "{{ all_component_units | to_json }}"
  register: component_runtime_accounts_convergence_raw
  changed_when: false

- name: Set component runtime account convergence plan
  ansible.builtin.set_fact:
    component_runtime_accounts_convergence: "{{ component_runtime_accounts_convergence_raw.stdout | from_json }}"
  changed_when: false

- name: Skip component runtime account reconciliation when already converged
  ansible.builtin.debug:
    msg: >-
      Component runtime accounts already converged for {{
      component_runtime_accounts_convergence.desired_user_count }} users and {{
      component_runtime_accounts_convergence.desired_group_count }} groups; skipping group and user tasks.
  when: component_runtime_accounts_convergence.converged | bool

- name: Reconcile component runtime accounts
  ansible.builtin.include_tasks: runtime_accounts_reconcile.yml
  when: not (component_runtime_accounts_convergence.converged | bool)
