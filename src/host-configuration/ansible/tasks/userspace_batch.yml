---
# Batched user/group creation across the union of every Nomad-supervised
# component's workload.units. Replaces the per-component loop that previously
# walked tasks/component/users.yml inside component_substrate.yml. A single
# userspace probe gates the module loops so external drift still reconciles.
#
# Multiple units across multiple components can share one runtime user; we
# union supplementary_groups across all units that target the same user so
# later units do not drop required groups.

- name: Compute every Nomad-supervised component's workload units
  ansible.builtin.set_fact:
    all_application_components: >-
      {{
        topology_components
        | selectattr('deployment.supervisor', 'equalto', 'nomad')
        | selectattr('workload.units')
        | sort(attribute='workload.order')
        | list
      }}

- name: Compute the union of every component's units
  ansible.builtin.set_fact:
    all_component_units: >-
      {{
        all_application_components
        | map(attribute='workload.units')
        | flatten
        | list
      }}

- name: Probe component userspace convergence once
  ansible.builtin.script: >-
    {{ playbook_dir }}/../files/userspace_convergence.py
    --workload-group {{ spire_workload_group }}
  environment:
    COMPONENT_USERSPACE_UNITS: "{{ all_component_units | to_json }}"
  register: component_userspace_convergence_raw
  changed_when: false

- name: Set component userspace convergence plan
  ansible.builtin.set_fact:
    component_userspace_convergence: "{{ component_userspace_convergence_raw.stdout | from_json }}"
  changed_when: false

- name: Skip component userspace reconciliation when already converged
  ansible.builtin.debug:
    msg: >-
      Component userspace already converged for {{
      component_userspace_convergence.desired_user_count }} runtime users and {{
      component_userspace_convergence.desired_group_count }} groups; skipping group and user tasks.
  when: component_userspace_convergence.converged | bool

- name: Reconcile component userspace
  ansible.builtin.include_tasks: userspace_reconcile.yml
  when: not (component_userspace_convergence.converged | bool)
