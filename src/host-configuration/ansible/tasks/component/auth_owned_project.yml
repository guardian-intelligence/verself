---
- name: Resolve owned component auth project ID
  ansible.builtin.set_fact:
    component_auth_project_id: "{{ component_auth_project_ids_by_name.get(component.workload.auth.project_name, '') }}"
  no_log: true

- name: Assert owned component auth project was reconciled
  ansible.builtin.assert:
    that:
      - component_auth_project_id | length > 0
    fail_msg: "Zitadel project {{ component.workload.auth.project_name }} was not reconciled before component substrate execution."
  no_log: true

- name: Write owned component auth audience credential
  ansible.builtin.copy:
    content: "{{ component_auth_project_id }}\n"
    dest: "/etc/credstore/{{ component.workload.auth.project_name }}/auth-audience"
    owner: root
    group: "{{ component.identities.default.group }}"
    mode: "0640"
  no_log: true
