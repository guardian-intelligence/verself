[defaults]
# Inventory is supplied by `verself-deploy` and passed to ansible-playbook
# via `verself-deploy ansible run --inventory=...`;
# setting a default here would mask configuration errors.
#
# Per-task spans and task-event rows are produced by the Go-side streaming
# parser in src/deployment-tools/internal/ansible (see parser.go), so no
# Python OTel callback is loaded here.
roles_path = roles
library = plugins/modules
action_plugins = plugins/action
callbacks_enabled = ansible.posix.profile_tasks
host_key_checking = False
timeout = 30
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .cache/facts
fact_caching_timeout = 86400
vars_plugins_enabled = host_group_vars,community.sops.sops

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=10m -o ControlPath=~/.ssh/sockets/%r@%h-%p -o IPQoS=none -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o ConnectTimeout=10
pipelining = True
