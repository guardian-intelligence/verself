---
- name: Create garage system group
  ansible.builtin.group:
    name: garage
    system: true

- name: Create garage system user
  ansible.builtin.user:
    name: garage
    group: garage
    append: false
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/garage-0
    create_home: false

- name: Create garage configuration directory
  ansible.builtin.file:
    path: /etc/garage
    state: directory
    owner: root
    group: garage
    mode: "0750"

- name: Create garage instance directories
  ansible.builtin.file:
    path: "{{ item.0 }}"
    state: directory
    owner: garage
    group: garage
    mode: "{{ item.1 }}"
  loop: >-
    {{
      [
        ['/var/lib/garage-0', '0750'],
        ['/var/lib/garage-0/data', '0750'],
        ['/var/lib/garage-0/meta', '0750'],
        ['/var/lib/garage-0/snapshots', '0750'],
        ['/var/lib/garage-1', '0750'],
        ['/var/lib/garage-1/data', '0750'],
        ['/var/lib/garage-1/meta', '0750'],
        ['/var/lib/garage-1/snapshots', '0750'],
        ['/var/lib/garage-2', '0750'],
        ['/var/lib/garage-2/data', '0750'],
        ['/var/lib/garage-2/meta', '0750'],
        ['/var/lib/garage-2/snapshots', '0750']
      ]
    }}

- name: Check garage secret files
  ansible.builtin.stat:
    path: "/etc/garage/{{ item }}"
  loop:
    - rpc-secret
    - admin-token
    - metrics-token
  register: garage_secret_files
  no_log: true

- name: Generate missing garage secret files
  ansible.builtin.copy:
    content: >-
      {{
        lookup(
          'password',
          '/dev/null length=64 chars=' ~
          (item.item == 'rpc-secret' | ternary('hexdigits', 'ascii_letters,digits'))
        ) | trim | lower
      }}
    dest: "/etc/garage/{{ item.item }}"
    owner: root
    group: garage
    mode: "0640"
  loop: "{{ garage_secret_files.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: not item.stat.exists
  no_log: true

- name: Converge garage secret ownership
  ansible.builtin.file:
    path: "/etc/garage/{{ item }}"
    owner: root
    group: garage
    mode: "0640"
  loop:
    - rpc-secret
    - admin-token
    - metrics-token

- name: Read garage RPC secret
  ansible.builtin.slurp:
    src: /etc/garage/rpc-secret
  register: garage_rpc_secret_raw
  no_log: true

- name: Regenerate invalid garage RPC secret format
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=hexdigits') | trim | lower }}"
    dest: /etc/garage/rpc-secret
    owner: root
    group: garage
    mode: "0640"
  when: not ((garage_rpc_secret_raw.content | b64decode | trim) is match('^[0-9a-f]{64}$'))
  no_log: true

- name: Re-read garage RPC secret after format repair
  ansible.builtin.slurp:
    src: /etc/garage/rpc-secret
  register: garage_rpc_secret_raw
  no_log: true

- name: Read garage admin token
  ansible.builtin.slurp:
    src: /etc/garage/admin-token
  register: garage_admin_token_raw
  no_log: true

- name: Read garage metrics token
  ansible.builtin.slurp:
    src: /etc/garage/metrics-token
  register: garage_metrics_token_raw
  no_log: true

- name: Set garage secret facts
  ansible.builtin.set_fact:
    garage_rpc_secret: "{{ garage_rpc_secret_raw.content | b64decode | trim }}"
    garage_admin_token: "{{ garage_admin_token_raw.content | b64decode | trim }}"
    garage_metrics_token: "{{ garage_metrics_token_raw.content | b64decode | trim }}"
  no_log: true

- name: Deploy garage nftables ruleset
  ansible.builtin.copy:
    src: "{{ platform_host_files_dir }}/etc/nftables.d/garage.nft"
    dest: /etc/nftables.d/garage.nft
    mode: "0644"
  notify: reload nftables

- name: Apply garage nftables before proceeding
  ansible.builtin.meta: flush_handlers

- name: Deploy garage instance configs
  ansible.builtin.template:
    src: garage.toml.j2
    dest: "/etc/garage/garage-{{ garage_node.instance }}.toml"
    owner: root
    group: garage
    mode: "0640"
  loop: "{{ topology_clusters.garage.nodes }}"
  loop_control:
    loop_var: garage_node
    label: "garage-{{ garage_node.instance }}"
  notify: restart garage instances

- name: Deploy garage systemd template
  ansible.builtin.copy:
    dest: /etc/systemd/system/garage@.service
    mode: "0644"
    content: |
      [Unit]
      Description=Garage instance %i
      After=verself-firewall.target network.target
      Requires=verself-firewall.target

      [Service]
      Type=simple
      User=garage
      Group=garage
      ExecStart={{ verself_bin }}/garage -c /etc/garage/garage-%i.toml server
      Restart=on-failure
      RestartSec=5
      LimitNOFILE=65536
      ProtectSystem=strict
      ProtectHome=true
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectControlGroups=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictNamespaces=true
      PrivateTmp=true
      ReadWritePaths=/var/lib/garage-%i
      UMask=0077

      [Install]
      WantedBy=multi-user.target
  notify: restart garage instances

- name: Apply garage unit changes before proceeding
  ansible.builtin.meta: flush_handlers

- name: Enable and start garage instances
  ansible.builtin.systemd:
    name: "garage@{{ item.instance }}"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ topology_clusters.garage.nodes }}"
  loop_control:
    label: "garage@{{ item.instance }}"

- name: Wait for garage admin ports
  ansible.builtin.wait_for:
    host: "{{ topology_clusters.garage.host }}"
    port: "{{ item.admin_port }}"
    timeout: 30
  loop: "{{ topology_clusters.garage.nodes }}"
  loop_control:
    label: "{{ topology_clusters.garage.host }}:{{ item.admin_port }}"

- name: Bootstrap garage cluster and layout
  ansible.builtin.command:
    cmd: python3 -
    stdin: |
      import json
      import pathlib
      import os
      import subprocess
      import sys
      import time
      import urllib.request

      host = os.environ["GARAGE_HOST"]
      garage_bin = os.environ["GARAGE_BIN"]
      nodes = json.loads(os.environ["GARAGE_NODES"])
      capacity = int(os.environ["GARAGE_CAPACITY_BYTES"])
      zone_redundancy = int(os.environ["GARAGE_ZONE_REDUNDANCY"])
      admin_port = int(nodes[0]["admin_port"])
      rpc_secret_path = pathlib.Path("/etc/garage/rpc-secret")
      admin_token = pathlib.Path("/etc/garage/admin-token").read_text(encoding="utf-8").strip()
      changed = False

      def request(path):
          data = None
          headers = {"Authorization": "Bearer " + admin_token}
          req = urllib.request.Request(f"http://{host}:{admin_port}{path}", data=data, headers=headers, method="GET")
          with urllib.request.urlopen(req, timeout=5) as response:
              payload = response.read()
              if not payload:
                  return None
              return json.loads(payload.decode())

      def cli(*args):
          cmd = ["sudo", "-u", "garage", garage_bin, *args]
          completed = subprocess.run(cmd, check=True, text=True, capture_output=True)
          return completed.stdout.strip()

      def garage_node_id(node):
          completed = subprocess.run(
              [garage_bin, "-c", f"/etc/garage/garage-{node['instance']}.toml", "node", "id", "-q"],
              check=True,
              text=True,
              capture_output=True,
          )
          full_id = completed.stdout.strip()
          node_id, node_addr = full_id.split("@", 1)
          return {"id": node_id, "addr": node_addr, "full": full_id}

      node_info = [garage_node_id(node) for node in nodes]
      rpc_host = node_info[0]["full"]
      desired_roles = sorted(
          [
              {
                  "capacity": capacity,
                  "id": info["id"],
                  "tags": sorted([f"garage-{node['instance']}", "single-node"]),
                  "zone": f"garage-{node['instance']}",
              }
              for info, node in zip(node_info, nodes)
          ],
          key=lambda item: item["id"],
      )
      desired_parameters = {"zoneRedundancy": {"atLeast": zone_redundancy}}

      status = request("/v2/GetClusterStatus")
      by_addr = {entry.get("addr"): entry for entry in status["nodes"]}
      for info in node_info[1:]:
          if info["addr"] not in by_addr:
              cli("-h", rpc_host, "--rpc-secret-file", str(rpc_secret_path), "node", "connect", info["full"])
              changed = True

      deadline = time.time() + 30
      while True:
          status = request("/v2/GetClusterStatus")
          by_addr = {entry.get("addr"): entry for entry in status["nodes"]}
          if all(by_addr.get(info["addr"], {}).get("isUp") for info in node_info):
              break
          if time.time() >= deadline:
              raise SystemExit(f"garage cluster did not converge: {status}")
          time.sleep(1)

      layout = request("/v2/GetClusterLayout")
      current_roles = sorted(
          [
              {
                  "id": role["id"],
                  "zone": role["zone"],
                  "capacity": role.get("capacity"),
                  "tags": sorted(role.get("tags", [])),
              }
              for role in layout["roles"]
          ],
          key=lambda item: item["id"],
      )
      if (
          current_roles == desired_roles
          and layout.get("parameters") == desired_parameters
          and not layout.get("stagedRoleChanges")
          and not layout.get("stagedParameters")
      ):
          print(json.dumps({"changed": False, "version": layout["version"], "roles": current_roles}))
          raise SystemExit(0)

      cli("-h", rpc_host, "--rpc-secret-file", str(rpc_secret_path), "layout", "revert")
      changed = True

      desired_ids = {role["id"] for role in desired_roles}
      for role in current_roles:
          if role["id"] not in desired_ids:
              cli("-h", rpc_host, "--rpc-secret-file", str(rpc_secret_path), "layout", "remove", role["id"])

      cli("-h", rpc_host, "--rpc-secret-file", str(rpc_secret_path), "layout", "config", "--redundancy", str(zone_redundancy))
      for role in desired_roles:
          args = [
              "-h",
              rpc_host,
              "--rpc-secret-file",
              str(rpc_secret_path),
              "layout",
              "assign",
              role["id"],
              "--zone",
              role["zone"],
              "--capacity",
              str(role["capacity"]),
          ]
          for tag in role["tags"]:
              args.extend(["--tag", tag])
          cli(*args)

      layout = request("/v2/GetClusterLayout")
      cli("-h", rpc_host, "--rpc-secret-file", str(rpc_secret_path), "layout", "apply", "--version", str(layout["version"] + 1))

      deadline = time.time() + 30
      while True:
          current = request("/v2/GetClusterLayout")
          current_roles = sorted(
              [
                  {
                      "id": role["id"],
                      "zone": role["zone"],
                      "capacity": role.get("capacity"),
                      "tags": sorted(role.get("tags", [])),
                  }
                  for role in current["roles"]
              ],
              key=lambda item: item["id"],
          )
          if (
              current_roles == desired_roles
              and current.get("parameters") == desired_parameters
              and not current.get("stagedRoleChanges")
              and not current.get("stagedParameters")
          ):
              print(json.dumps({"changed": changed, "version": current["version"], "roles": current_roles}))
              break
          if time.time() >= deadline:
              raise SystemExit(f"garage layout did not settle: {current}")
          time.sleep(1)
  environment:
    GARAGE_HOST: "{{ topology_clusters.garage.host }}"
    GARAGE_BIN: "{{ verself_bin }}/garage"
    GARAGE_NODES: "{{ topology_clusters.garage.nodes | to_json }}"
    GARAGE_CAPACITY_BYTES: "{{ garage_capacity_bytes | string }}"
    GARAGE_ZONE_REDUNDANCY: "{{ garage_zone_redundancy | string }}"
  register: garage_bootstrap
  changed_when: "(garage_bootstrap.stdout | from_json).changed"

- name: Create Nomad artifact credential directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/garage/nomad-artifacts, mode: "0700" }
    - { path: "{{ topology_artifacts.nomad.nomad_getter.credentials.environment_file | dirname }}", mode: "0750" }
    - { path: "{{ topology_artifacts.nomad.publisher.credentials.environment_file | dirname }}", mode: "0700" }

- name: Bootstrap private Nomad artifact bucket and keys
  ansible.builtin.command:
    cmd: python3 -
    stdin: |
      import json
      import os
      import re
      import sys
      import urllib.error
      import urllib.parse
      import urllib.request

      base = os.environ["GARAGE_ADMIN_URL"].rstrip("/")
      token = os.environ["GARAGE_ADMIN_TOKEN"]
      bucket_name = os.environ["GARAGE_ARTIFACT_BUCKET"]
      reader_name = "verself-nomad-artifacts-reader"
      publisher_name = "verself-nomad-artifacts-publisher"
      changed = False

      def api(method, endpoint, payload=None, query=None, missing_ok=False):
          url = f"{base}/v2/{endpoint}"
          if query:
              url += "?" + urllib.parse.urlencode(query)
          body = None
          headers = {"Authorization": "Bearer " + token}
          if payload is not None:
              body = json.dumps(payload).encode()
              headers["Content-Type"] = "application/json"
          req = urllib.request.Request(url, data=body, headers=headers, method=method)
          try:
              with urllib.request.urlopen(req, timeout=5) as response:
                  data = response.read()
          except urllib.error.HTTPError as exc:
              detail = exc.read().decode(errors="replace")
              if missing_ok and exc.code == 404:
                  return None
              raise SystemExit(f"{method} {endpoint} failed with HTTP {exc.code}: {detail}")
          if not data:
              return {}
          return json.loads(data.decode())

      def create_bucket_if_missing(name):
          global changed
          found = api("GET", "GetBucketInfo", query={"globalAlias": name}, missing_ok=True)
          if found is not None:
              return found
          changed = True
          return api("POST", "CreateBucket", payload={"globalAlias": name})

      def key_info(name):
          return api(
              "GET",
              "GetKeyInfo",
              query={"search": name, "showSecretKey": "true"},
              missing_ok=True,
          )

      def create_key_if_missing(name):
          global changed
          found = key_info(name)
          if found is not None:
              return found
          changed = True
          return api("POST", "CreateKey", payload={"name": name, "neverExpires": True})

      def ensure_key_permission(bucket, key, read, write, owner):
          global changed
          desired = {"read": read, "write": write, "owner": owner}
          for entry in bucket.get("keys", []):
              if entry.get("accessKeyId") == key["accessKeyId"]:
                  current = entry.get("permissions", {})
                  if all(bool(current.get(name)) == value for name, value in desired.items()):
                      return bucket
                  deny = {name: True for name, value in desired.items() if not value and bool(current.get(name))}
                  if deny:
                      changed = True
                      bucket = api(
                          "POST",
                          "DenyBucketKey",
                          payload={
                              "bucketId": bucket["id"],
                              "accessKeyId": key["accessKeyId"],
                              "permissions": deny,
                          },
                      )
                  break
          changed = True
          return api(
              "POST",
              "AllowBucketKey",
              payload={
                  "bucketId": bucket["id"],
                  "accessKeyId": key["accessKeyId"],
                  "permissions": desired,
              },
          )

      def assert_env_safe(key):
          for field in ("accessKeyId", "secretAccessKey"):
              value = key.get(field, "")
              if not re.fullmatch(r"[A-Za-z0-9/+=._:-]+", value):
                  raise SystemExit(f"Garage generated unsafe {field} for environment-file serialization")

      bucket = create_bucket_if_missing(bucket_name)
      reader = create_key_if_missing(reader_name)
      publisher = create_key_if_missing(publisher_name)
      assert_env_safe(reader)
      assert_env_safe(publisher)

      bucket = ensure_key_permission(bucket, reader, True, False, False)
      bucket = ensure_key_permission(bucket, publisher, True, True, False)

      print(json.dumps({"changed": changed, "reader": reader, "publisher": publisher}, sort_keys=True))
  environment:
    GARAGE_ADMIN_URL: "http://{{ topology_clusters.garage.host }}:{{ topology_clusters.garage.nodes[0].admin_port }}"
    GARAGE_ADMIN_TOKEN: "{{ garage_admin_token }}"
    GARAGE_ARTIFACT_BUCKET: "{{ topology_artifacts.nomad.storage.bucket }}"
  register: garage_artifact_bootstrap_raw
  changed_when: "(garage_artifact_bootstrap_raw.stdout | from_json).changed"
  no_log: true

- name: Set Nomad artifact credential facts
  ansible.builtin.set_fact:
    garage_artifact_bootstrap: "{{ garage_artifact_bootstrap_raw.stdout | from_json }}"
  no_log: true

- name: Deploy Nomad artifact reader environment
  ansible.builtin.copy:
    dest: "{{ topology_artifacts.nomad.nomad_getter.credentials.environment_file }}"
    owner: root
    group: root
    mode: "0600"
    content: |
      {{ topology_artifacts.nomad.nomad_getter.credentials.access_key_id_env }}={{ garage_artifact_bootstrap.reader.accessKeyId }}
      {{ topology_artifacts.nomad.nomad_getter.credentials.secret_access_key_env }}={{ garage_artifact_bootstrap.reader.secretAccessKey }}
      AWS_REGION={{ topology_artifacts.nomad.storage.region }}
      AWS_EC2_METADATA_DISABLED=true
  no_log: true

- name: Deploy Nomad artifact publisher environment
  ansible.builtin.copy:
    dest: "{{ topology_artifacts.nomad.publisher.credentials.environment_file }}"
    owner: root
    group: root
    mode: "0600"
    content: |
      {{ topology_artifacts.nomad.publisher.credentials.access_key_id_env }}={{ garage_artifact_bootstrap.publisher.accessKeyId }}
      {{ topology_artifacts.nomad.publisher.credentials.secret_access_key_env }}={{ garage_artifact_bootstrap.publisher.secretAccessKey }}
  no_log: true
