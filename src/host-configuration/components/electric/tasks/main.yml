---
- name: "Load Electric topology config"
  ansible.builtin.set_fact:
    electric_instance: "{{ electric_config.electric_instance }}"
    electric_service_name: "{{ electric_config.electric_service_name }}"
    electric_service_port: "{{ electric_config.electric_service_port }}"
    electric_pg_role: "{{ electric_config.electric_pg_role }}"
    electric_pg_conn_limit: "{{ electric_config.electric_pg_conn_limit }}"
    electric_db: "{{ electric_config.electric_db }}"
    electric_writer_role: "{{ electric_config.electric_writer_role }}"
    electric_publication_name: "{{ electric_config.electric_publication_name }}"
    electric_publication_tables: "{{ electric_config.electric_publication_tables }}"
    electric_storage_dir: "{{ electric_config.electric_storage_dir }}"
    electric_credstore_dir: "{{ electric_config.electric_credstore_dir }}"
    electric_nftables_table: "{{ electric_config.electric_nftables_table }}"
    electric_nftables_file: "{{ electric_config.electric_nftables_file }}"
    electric_db_pool_size: "{{ electric_config.electric_db_pool_size }}"
    electric_replication_stream_id: "{{ electric_config.electric_replication_stream_id }}"

- name: "Create storage directory for {{ electric_service_name }}"
  ansible.builtin.file:
    path: "{{ electric_storage_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: "Create credstore directory for {{ electric_service_name }}"
  ansible.builtin.file:
    path: "{{ electric_credstore_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: "Check for existing PG password for {{ electric_service_name }}"
  ansible.builtin.stat:
    path: "{{ electric_pg_password_file }}"
  register: electric_pg_password_stat

- name: "Generate PG password for {{ electric_service_name }}"
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    dest: "{{ electric_pg_password_file }}"
    owner: root
    group: root
    mode: "0640"
  when: not electric_pg_password_stat.stat.exists
  no_log: true

- name: "Check for existing API secret for {{ electric_service_name }}"
  ansible.builtin.stat:
    path: "{{ electric_api_secret_file }}"
  register: electric_api_secret_stat

- name: "Generate API secret for {{ electric_service_name }}"
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=48 chars=ascii_letters,digits') }}"
    dest: "{{ electric_api_secret_file }}"
    owner: root
    group: root
    mode: "0640"
  when: not electric_api_secret_stat.stat.exists
  no_log: true

- name: "Read PG password for {{ electric_service_name }}"
  ansible.builtin.slurp:
    src: "{{ electric_pg_password_file }}"
  register: electric_pg_password_raw
  no_log: true

- name: "Read API secret for {{ electric_service_name }}"
  ansible.builtin.slurp:
    src: "{{ electric_api_secret_file }}"
  register: electric_api_secret_raw
  no_log: true

- name: "Set credential facts for {{ electric_service_name }}"
  ansible.builtin.set_fact:
    electric_pg_password: "{{ electric_pg_password_raw.content | b64decode | trim }}"
    electric_api_secret: "{{ electric_api_secret_raw.content | b64decode | trim }}"
  no_log: true

- name: "Create PostgreSQL role and publication for {{ electric_service_name }}"
  ansible.builtin.include_tasks:
    file: pg_setup.yml
    apply:
      tags:
        - always

- name: "Deploy runtime credential environment for {{ electric_service_name }}"
  vars:
    electric_database_url: >-
      postgresql://{{ electric_pg_role }}:{{ electric_pg_password }}@{{ topology_endpoints.postgresql.endpoints.postgres.address }}/{{ electric_db }}
  ansible.builtin.copy:
    content: |
      DATABASE_URL={{ electric_database_url }}
      ELECTRIC_SECRET={{ electric_api_secret }}
    dest: "{{ electric_runtime_env_file }}"
    owner: root
    group: root
    mode: "0640"
  register: electric_runtime_env_result
  no_log: true

- name: "Check for local container image for {{ electric_service_name }}"
  ansible.builtin.command:
    cmd: "{{ verself_bin }}/ctr images inspect {{ electric_image }}"
  register: electric_image_probe
  changed_when: false
  failed_when: electric_image_probe.rc not in [0, 1]

# Systemd restarts must not pull from Docker Hub; unauthenticated rate limits
# can block recovery. Pre-pull here so ExecStart serves from containerd's
# local image store.
- name: "Pull container image for {{ electric_service_name }}"
  ansible.builtin.command:
    cmd: "{{ verself_bin }}/ctr images pull --platform linux/amd64 {{ electric_image }}"
  changed_when: true
  when: electric_image_probe.rc != 0

- name: "Deploy systemd unit for {{ electric_service_name }}"
  ansible.builtin.template:
    src: electric.service.j2
    dest: "/etc/systemd/system/{{ electric_service_name }}.service"
    mode: "0644"
  register: electric_systemd_unit_result

- name: "Deploy nftables rules for {{ electric_service_name }}"
  ansible.builtin.copy:
    src: "{{ platform_host_files_dir }}{{ electric_nftables_file }}"
    dest: "{{ electric_nftables_file }}"
    mode: "0644"
  notify: reload nftables

- name: "Enable and start {{ electric_service_name }}"
  ansible.builtin.systemd:
    name: "{{ electric_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  register: electric_start_result

- name: "Restart {{ electric_service_name }} after runtime input changes"
  ansible.builtin.systemd:
    name: "{{ electric_service_name }}"
    state: restarted
    daemon_reload: true
  when:
    - not electric_start_result.changed
    - electric_runtime_env_result.changed or electric_systemd_unit_result.changed

- name: "Reconcile PostgreSQL publication after startup for {{ electric_service_name }}"
  # Electric starts by restoring persisted shape filters; reconcile after restart
  # so the curated publication is the final database state.
  ansible.builtin.include_tasks:
    file: pg_setup.yml
    apply:
      tags:
        - always
