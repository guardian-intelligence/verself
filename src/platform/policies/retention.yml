version: 1
effective_at: 2026-04-17

state_machine:
  - key: active
    label: Active
    blurb: Your account is in good standing. All services run normally.
  - key: past_due
    label: Past due
    blurb: A payment has failed. Services continue while retries run, up to 14 days.
  - key: suspended
    label: Suspended
    blurb: Compute is stopped. Durable data is preserved and remains exportable.
  - key: pending_deletion
    label: Pending deletion
    blurb: Account has closed. A 90-day countdown begins before deletion.
  - key: deleted
    label: Deleted
    blurb: Durable data has been deleted. Billing records are retained.

transitions:
  - from: active
    to: past_due
    trigger: A payment attempt fails.
  - from: past_due
    to: suspended
    trigger: The Stripe retry schedule closes without payment. Fixed at 14 days from the first failed charge.
    days: 14
  - from: suspended
    to: pending_deletion
    trigger: The account is closed — by the customer, by the operator for non-payment, or by contract expiration.
  - from: pending_deletion
    to: deleted
    trigger: The retention window closes.
    days: 90

windows:
  - id: durable_data
    label: Durable data
    description: Persistent VM disks, workspace volumes, and any object you have created with the expectation that it survives between sessions. Engineering calls this "durable customer data."
    active: { kind: preserved }
    past_due: { kind: preserved }
    suspended: { kind: preserved }
    pending_deletion: { kind: delete_after, days: 90 }

  - id: volume_snapshots
    label: Per-volume snapshot generations
    description: Snapshot generations within each durable volume. Retained according to the volume's configured snapshot policy while the account is live; deleted with the parent volume at final deletion.
    active: { kind: per_user_policy }
    past_due: { kind: per_user_policy }
    suspended: { kind: per_user_policy }
    pending_deletion: { kind: delete_with_parent }

  - id: operational_logs
    label: Service logs
    description: Application and system logs emitted by the service mesh. Trimmed continuously by per-table TTL in the observability store.
    active: { kind: ttl_days, days: 30 }
    past_due: { kind: ttl_days, days: 30 }
    suspended: { kind: ttl_days, days: 30 }
    pending_deletion: { kind: ttl_days, days: 30 }

  - id: operational_traces
    label: Traces
    description: Distributed-tracing spans emitted as customer requests flow through the platform.
    active: { kind: ttl_days, days: 7 }
    past_due: { kind: ttl_days, days: 7 }
    suspended: { kind: ttl_days, days: 7 }
    pending_deletion: { kind: ttl_days, days: 7 }

  - id: operational_metrics
    label: Metrics
    description: Time-series metrics aggregated from every service on the platform.
    active: { kind: ttl_days, days: 90 }
    past_due: { kind: ttl_days, days: 90 }
    suspended: { kind: ttl_days, days: 90 }
    pending_deletion: { kind: ttl_days, days: 90 }

  - id: audit_events
    label: Audit events
    description: State transitions and administrative actions recorded on every account. Readable via the billing console's Activity tab and via the audit-events API endpoint.
    active: { kind: ttl_days, days: 365 }
    past_due: { kind: ttl_days, days: 365 }
    suspended: { kind: ttl_days, days: 365 }
    pending_deletion: { kind: ttl_days, days: 365 }

  - id: billing_records
    label: Billing records
    description: Invoices, payment events, ledger entries, and tax documents. Retained for at least seven years, and longer where applicable tax or accounting law in the customer's jurisdiction requires — for example Germany (10 years under HGB §257), France (10 years), and the United Kingdom (6 years for most records).
    active: { kind: retain_years, years: 7 }
    past_due: { kind: retain_years, years: 7 }
    suspended: { kind: retain_years, years: 7 }
    pending_deletion: { kind: retain_years, years: 7 }

  - id: security_incident_artifacts
    label: Incident and forensic artifacts
    description: Packet captures, binary artifacts, and forensic timelines associated with a declared security incident. Retained for two years regardless of account state so post-incident review and regulator requests can be served.
    active: { kind: retain_years, years: 2 }
    past_due: { kind: retain_years, years: 2 }
    suspended: { kind: retain_years, years: 2 }
    pending_deletion: { kind: retain_years, years: 2 }

  - id: backups
    label: Backups
    description: Forge Metal does not currently offer a backup product. Customers are responsible for their own backups unless a backup product is purchased. Export during the retention window is not a substitute for backups.
    active: { kind: not_provided }
    past_due: { kind: not_provided }
    suspended: { kind: not_provided }
    pending_deletion: { kind: not_provided }

export:
  available_during: [active, past_due, suspended]
  post_closure_days: 30
  resets_clock: false
  delivery: Signed URLs valid for 72 hours from issuance.
  formats:
    - class: Durable data
      format: tar.gz of the volume's filesystem contents
    - class: Service logs
      format: newline-delimited JSON
    - class: Traces
      format: newline-delimited JSON in OTLP/JSON encoding
    - class: Metrics
      format: newline-delimited JSON in OTLP/JSON encoding
    - class: Audit events
      format: newline-delimited JSON
    - class: Billing records
      format: CSV invoice line-item export plus the corresponding rendered PDF invoices

extensions:
  allow_multiple: true
  clock_behavior: An extension replaces the remaining retention window with the granted duration, starting from the extension's granted_at timestamp.
  decline_conditions: Extensions may be declined when repeated requests do not show a path to resolution.
  audited_fields:
    - requesting_principal
    - requested_duration
    - granted_duration
    - justification
    - granted_at

legal_hold:
  behavior: When Forge Metal receives valid legal process or issues a preservation hold, the retention clock is paused for the scope of the hold and resumes when the hold is lifted. A hold supersedes the account's state-transition schedule but does not restore compute.

deletion:
  soft_delete: false
  recoverable_after_execution: false
  methods:
    - Durable-volume destroy followed by pool free-space reclamation
    - Observability-store part drops driven by per-table TTL
    - Relational-store row deletes followed by compaction

anonymized_data:
  retained_indefinitely: true
  description: Aggregated statistics that cannot be re-associated with an individual or organization are retained indefinitely, per GDPR Recital 26.

changes:
  notice_days: 30
  notification_channel: Email to the administrators on each affected organization.
  prior_versions_surface: /policy/changelog
