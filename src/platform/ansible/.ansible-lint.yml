---
profile: production
use_default_rules: true
rulesdir:
  - rules/

exclude_paths:
  - .cache/

enable_list:
  - no-default-ports
  - no-masterkey-cli
  - no-psql-object-state

warn_list:
  - experimental
  - jinja[spacing]
  - fqcn[deep]

# Disable auto-fix so ansible-lint never modifies files during pre-commit.
# Without this, pre-commit sees modified files and fails the hook even when
# lint passes, which blocks partial commits.
write_list: []

offline: true
