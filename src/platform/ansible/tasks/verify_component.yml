---
- name: Assert component verification inputs are present
  ansible.builtin.assert:
    that:
      - component.name | length > 0
      - component.kind == "service"
      - component.converge.enabled | bool
      - component.converge.systemd.units | length > 0
    fail_msg: "verify_component.yml requires one enabled service component."

- name: Initialize component verification context
  ansible.builtin.set_fact:
    component_units: "{{ component.converge.systemd.units }}"

- name: Wait for component runtime invariants
  ansible.builtin.include_tasks:
    file: component/runtime.yml
    apply:
      tags: always
  tags: always

- name: Record component convergence probes
  ansible.builtin.include_tasks:
    file: component/probes.yml
    apply:
      tags: always
  tags: always
