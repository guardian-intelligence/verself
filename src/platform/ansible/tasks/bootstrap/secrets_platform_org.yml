---
- name: List Zitadel organizations for secrets-service internal runtime routing
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/v2/organizations/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ component_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body: {}
    return_content: true
  register: secrets_service_zitadel_orgs
  no_log: true

- name: Resolve platform organization ID for secrets-service runtime routing
  ansible.builtin.set_fact:
    component_secrets_platform_org_id: >-
      {{
        (
          secrets_service_zitadel_orgs.json.result
          | default([])
          | selectattr('name', 'equalto', openbao_tenancy_platform_org_name)
          | map(attribute='id')
          | list
          | first
        ) | default('')
      }}

- name: Assert platform organization exists for secrets-service runtime routing
  ansible.builtin.assert:
    that: component_secrets_platform_org_id | default('', true) | length > 0
    fail_msg: >-
      Platform organization {{ openbao_tenancy_platform_org_name }} was not found in Zitadel.

