---
- name: Read vm-orchestrator client socket group members
  ansible.builtin.getent:
    database: group
    key: vm-clients

- name: Read local users for vm-orchestrator socket group audit
  ansible.builtin.getent:
    database: passwd

- name: Assert vm-orchestrator socket group has only approved runtime callers
  ansible.builtin.assert:
    that:
      - >-
        (
          (
            (
              ansible_facts.getent_group['vm-clients'][2].split(',')
              | reject('equalto', '')
              | list
            )
            + (
              ansible_facts.getent_passwd
              | dict2items
              | selectattr('value.2', 'equalto', ansible_facts.getent_group['vm-clients'][1])
              | map(attribute='key')
              | list
            )
          )
          | unique
          | sort
        ) == ['sandbox_rental']
    fail_msg: vm-clients grants privileged vm-orchestrator access and must contain only sandbox_rental.

