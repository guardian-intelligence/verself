---
- name: Discover legacy component systemd units
  ansible.builtin.command:
    argv:
      - systemctl
      - show
      - "{{ unit.name }}.service"
      - --property=LoadState
      - --property=FragmentPath
      - --value
  changed_when: false
  loop: "{{ component_units }}"
  loop_control:
    loop_var: unit
    label: "{{ unit.name }}.service"
  register: legacy_component_systemd_units

- name: Stop and disable legacy component systemd units
  ansible.builtin.systemd:
    name: "{{ legacy_unit.item.name }}.service"
    state: stopped
    enabled: false
  loop: "{{ legacy_component_systemd_units.results }}"
  loop_control:
    loop_var: legacy_unit
    label: "{{ legacy_unit.item.name }}.service"
  when: legacy_unit.stdout_lines[0] != "not-found"

- name: Remove legacy component systemd unit files
  ansible.builtin.file:
    path: "{{ legacy_unit.stdout_lines[1] }}"
    state: absent
  loop: "{{ legacy_component_systemd_units.results }}"
  loop_control:
    loop_var: legacy_unit
    label: "{{ legacy_unit.item.name }}.service"
  register: legacy_component_systemd_unit_files
  when:
    - legacy_unit.stdout_lines[0] != "not-found"
    - legacy_unit.stdout_lines | length > 1
    - legacy_unit.stdout_lines[1] | length > 0
    - legacy_unit.stdout_lines[1].startswith('/etc/systemd/system/')

- name: Reload systemd after removing legacy component units
  ansible.builtin.systemd:
    daemon_reload: true
  when: legacy_component_systemd_unit_files.changed
