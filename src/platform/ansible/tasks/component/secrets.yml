---
- name: Generate missing component credentials
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=' ~ item.source.generate.length ~ ' chars=' ~ item.source.generate.chars) | trim }}\n"
    dest: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
    force: false
  loop: "{{ component.converge.secret_refs | selectattr('source.kind', 'equalto', 'generated') | list }}"
  loop_control:
    label: "{{ item.path }}"
  no_log: true

- name: Copy ansible-var component credentials
  ansible.builtin.copy:
    content: "{{ lookup('vars', item.source.ansible_var) }}\n"
    dest: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop: "{{ component.converge.secret_refs | selectattr('source.kind', 'equalto', 'ansible_var') | list }}"
  loop_control:
    label: "{{ item.path }}"
  no_log: true

- name: Copy remote component credentials
  ansible.builtin.copy:
    src: "{{ item.source.remote_src }}"
    dest: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
    remote_src: true
  loop: "{{ component.converge.secret_refs | selectattr('source.kind', 'equalto', 'remote_src') | list }}"
  loop_control:
    label: "{{ item.path }}"
  no_log: true

- name: Converge component credential permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop: "{{ component.converge.secret_refs }}"
  loop_control:
    label: "{{ item.path }}"
  no_log: true

- name: Read component exposed credentials
  ansible.builtin.slurp:
    src: "{{ item.path }}"
  loop: "{{ component.converge.secret_refs | selectattr('expose_as', 'defined') | list }}"
  loop_control:
    label: "{{ item.expose_as }}"
  register: component_exposed_credential_reads
  no_log: true

- name: Set component exposed credential facts
  ansible.builtin.set_fact:
    component_secret_values: >-
      {{
        component_secret_values
        | combine({item.item.expose_as: (item.content | b64decode | trim)})
      }}
  loop: "{{ component_exposed_credential_reads.results | default([]) }}"
  loop_control:
    label: "{{ item.item.expose_as }}"
  no_log: true
