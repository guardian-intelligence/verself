---
- name: List Zitadel projects for owned component auth
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ component_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body: {}
    return_content: true
  register: component_zitadel_projects
  no_log: true

- name: Select owned component Zitadel project
  ansible.builtin.set_fact:
    component_auth_project: >-
      {{
        (
          component_zitadel_projects.json.result
          | selectattr('name', 'equalto', component.converge.auth.project_name)
          | list
          | first
        ) | default({})
      }}
  no_log: true

- name: Create owned component Zitadel project if missing
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ component_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ component.converge.auth.project_name }}"
      projectRoleAssertion: "{{ component.converge.auth.project_role_assertion }}"
      projectRoleCheck: "{{ component.converge.auth.project_role_check }}"
    return_content: true
  register: component_auth_project_created
  when: component_auth_project == {}
  no_log: true

- name: Set owned component auth audience
  ansible.builtin.set_fact:
    component_auth_audience: >-
      {{
        component_auth_project.id
        | default(component_auth_project_created.json.id, true)
      }}

- name: Ensure owned component Zitadel project settings are current
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/{{ component_auth_audience }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ component_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ component.converge.auth.project_name }}"
      projectRoleAssertion: "{{ component.converge.auth.project_role_assertion }}"
      projectRoleCheck: "{{ component.converge.auth.project_role_check }}"
    status_code: 200
  when: component_auth_project != {}
  no_log: true

- name: Ensure owned component Zitadel project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ component_zitadel_admin_pat }}"
    zitadel_project_roles_project_id: "{{ component_auth_audience }}"
    zitadel_project_roles_definitions: "{{ component.converge.auth.roles }}"
  when: component.converge.auth.roles | length > 0
  no_log: true
