---
- name: Deploy component nftables rulesets
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}{{ item.target }}"
    dest: "{{ item.target }}"
    mode: "0644"
  loop: "{{ component.nftables_rulesets }}"
  loop_control:
    label: "{{ item.target }}"
  notify: reload nftables

- name: Deploy rendered component systemd units
  ansible.builtin.template:
    src: "{{ platform_rendered_dir }}/etc/systemd/system/{{ unit.name }}.service"
    dest: "/etc/systemd/system/{{ unit.name }}.service"
    mode: "0644"
  loop: "{{ component_units }}"
  loop_control:
    loop_var: unit
    label: "{{ unit.name }}"
