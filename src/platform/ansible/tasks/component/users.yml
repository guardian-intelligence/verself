---
- name: Verify component unit binaries exist in deploy profile
  ansible.builtin.stat:
    path: "{{ unit.exec }}"
  loop: "{{ component_units }}"
  loop_control:
    loop_var: unit
    label: "{{ unit.name }}"
  register: component_unit_binary_stats
  failed_when: not component_unit_binary_stats.stat.exists

- name: Ensure component primary groups exist
  ansible.builtin.group:
    name: "{{ unit.group }}"
    system: true
  loop: "{{ component_units }}"
  loop_control:
    loop_var: unit
    label: "{{ unit.group }}"

- name: Ensure SPIRE workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Ensure component supplementary groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    system: true
  loop: "{{ component_units | map(attribute='supplementary_groups') | flatten | unique | list }}"
  loop_control:
    label: "{{ item }}"

- name: Ensure component users exist
  ansible.builtin.user:
    name: "{{ unit.user }}"
    uid: "{{ unit.uid | default(omit) }}"
    group: "{{ unit.group }}"
    # Multiple units can share one runtime user; converge the union so later units do not drop required groups.
    groups: >-
      {{
        component_units
        | selectattr('user', 'equalto', unit.user)
        | map(attribute='supplementary_groups')
        | flatten
        | unique
        | list
      }}
    append: false
    system: true
    shell: /usr/sbin/nologin
    home: "{{ unit.home if (unit.home | default('', true) | length > 0) else omit }}"
    create_home: "{{ unit.create_home | default(false) }}"
  loop: "{{ component_units }}"
  loop_control:
    loop_var: unit
    label: "{{ unit.user }}"

- name: Create component directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop: "{{ component.converge.directories }}"
  loop_control:
    label: "{{ item.path }}"
