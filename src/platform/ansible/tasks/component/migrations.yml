---
- name: Run component-owned PostgreSQL migrator
  verself_service_migrate:
    command: "{{ component_units[0].exec }}"
    args:
      - migrate
      - up
    environment:
      # Match the runtime unit: service-owned migrations authenticate through the local peer socket.
      VERSELF_PG_DSN: >-
        {{
          'postgres://' ~ (component.postgres.owner | urlencode) ~ '@/' ~
          (component.postgres.database | urlencode) ~ '?host=/var/run/postgresql&sslmode=disable'
        }}
  become: true
  become_user: "{{ component_units[0].user }}"
