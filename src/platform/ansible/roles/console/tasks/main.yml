---
- name: Create console runtime group
  ansible.builtin.group:
    name: "{{ console_runtime_group }}"
    system: true

- name: Create console runtime user
  ansible.builtin.user:
    name: "{{ console_runtime_user }}"
    group: "{{ console_runtime_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ console_state_dir }}"
    create_home: false

- name: Create console state directory
  ansible.builtin.file:
    path: "{{ console_state_dir }}"
    state: directory
    owner: "{{ console_runtime_user }}"
    group: "{{ console_runtime_group }}"
    mode: "0700"

- name: Create console credstore directory
  ansible.builtin.file:
    path: /etc/credstore/console
    state: directory
    owner: root
    group: "{{ console_runtime_group }}"
    mode: "0750"

- name: Check for existing console auth session secret
  ansible.builtin.stat:
    path: /etc/credstore/console/auth-session-secret
  register: console_auth_session_secret_file

- name: Generate console auth session secret
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/console/auth-session-secret
    owner: root
    group: "{{ console_runtime_group }}"
    mode: "0640"
  when: not console_auth_session_secret_file.stat.exists
  no_log: true

- name: Converge console auth session secret permissions
  ansible.builtin.file:
    path: /etc/credstore/console/auth-session-secret
    owner: root
    group: "{{ console_runtime_group }}"
    mode: "0640"

- name: Read console auth session secret
  ansible.builtin.slurp:
    src: /etc/credstore/console/auth-session-secret
  register: console_auth_session_secret_raw
  no_log: true

- name: Set console auth session secret fact
  ansible.builtin.set_fact:
    console_auth_session_secret: "{{ console_auth_session_secret_raw.content | b64decode | trim }}"
  no_log: true

- name: Build console deploy bundle on controller
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    # --config=remote-writer pushes action results to the bazel-remote cache
    # for downstream consumers (e.g. CI runners). Mirrors deploy_profile's
    # Go-binary build flow.
    argv:
      - "{{ deploy_profile_bazelisk }}"
      - build
      - --config=remote-writer
      - "{{ console_bazel_label }}"
    chdir: "{{ deploy_profile_repo_root }}"
  changed_when: false

- name: Resolve console deploy bundle output path
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - "{{ deploy_profile_bazelisk }}"
      - cquery
      - --output=files
      - "{{ console_bazel_label }}"
    chdir: "{{ deploy_profile_repo_root }}"
  register: console_deploy_bundle_cquery
  changed_when: false

- name: Check whether console systemd unit exists
  ansible.builtin.stat:
    path: /etc/systemd/system/console.service
  register: console_systemd_unit_file

# Stop the live process before mutating console_install_dir so it never serves a partially deleted build.
- name: Stop live console before swapping deploy bundle
  ansible.builtin.systemd:
    name: console
    state: stopped
    daemon_reload: true
  when: console_systemd_unit_file.stat.exists

- name: Wipe previous console install
  ansible.builtin.file:
    path: "{{ console_install_dir }}"
    state: absent

- name: Recreate console install directory
  ansible.builtin.file:
    path: "{{ console_install_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ console_runtime_group }}"
    mode: "0755"

- name: Unpack console deploy bundle on node
  ansible.builtin.unarchive:
    src: "{{ deploy_profile_repo_root }}/{{ console_deploy_bundle_cquery.stdout | trim }}"
    dest: "{{ console_install_dir }}"
    owner: "{{ ansible_user }}"
    group: "{{ console_runtime_group }}"
    mode: u=rwX,g=rX,o=rX

- name: Set up Zitadel OIDC application
  ansible.builtin.include_role:
    name: zitadel_oauth_app
  vars:
    zitadel_oauth_app_name: console
    zitadel_oauth_app_project_name: "{{ console_auth_project_name }}"
    zitadel_oauth_app_redirect_uris:
      - "https://{{ console_domain }}/callback"
    zitadel_oauth_app_post_logout_redirect_uris:
      - "https://{{ console_domain }}"
    zitadel_oauth_app_credstore_dir: /etc/credstore/console
    zitadel_oauth_app_credstore_group: "{{ console_runtime_group }}"
    zitadel_oauth_app_auth_method_type: OIDC_AUTH_METHOD_TYPE_POST
    zitadel_oauth_app_grant_types:
      - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
      - OIDC_GRANT_TYPE_REFRESH_TOKEN
      - OIDC_GRANT_TYPE_TOKEN_EXCHANGE
    zitadel_oauth_app_role_assertions: true
    zitadel_oauth_app_cutover_marker_filename: oidc-web-cutover

- name: Export console OIDC app facts for templates
  ansible.builtin.set_fact:
    console_app_id: "{{ zitadel_oauth_app_out_id }}"
    console_project_id: "{{ zitadel_oauth_app_out_project_id }}"
    console_client_id: "{{ zitadel_oauth_app_out_client_id }}"
    console_client_secret: "{{ zitadel_oauth_app_out_client_secret }}"
  no_log: true

- name: Ensure sandbox-rental project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ zitadel_oauth_app_pat }}"
    zitadel_project_roles_project_id: "{{ console_project_id }}"
    zitadel_project_roles_definitions:
      - key: owner
        display_name: Owner
        group: sandbox
      - key: admin
        display_name: Admin
        group: sandbox
      - key: member
        display_name: Member
        group: sandbox

- name: Resolve identity-service project ID for console
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ zitadel_oauth_app_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ console_identity_project_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
  register: console_identity_project_search
  no_log: true

- name: Assert identity-service project exists for console
  ansible.builtin.assert:
    that: (console_identity_project_search.json.result | default([])) | length > 0
    fail_msg: >-
      Identity-service Zitadel project '{{ console_identity_project_name }}'
      not found. Run the identity_service role before console.

- name: Set console identity-service project ID fact
  ansible.builtin.set_fact:
    console_identity_project_id: "{{ console_identity_project_search.json.result[0].id }}"

- name: Ensure console env directory exists
  ansible.builtin.file:
    path: /etc/console
    state: directory
    owner: root
    group: "{{ console_runtime_group }}"
    mode: "0750"

- name: Deploy console environment file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/console/env
    mode: "0640"
    owner: root
    group: "{{ console_runtime_group }}"

- name: Deploy console systemd unit
  ansible.builtin.template:
    src: console.service.j2
    dest: /etc/systemd/system/console.service
    mode: "0644"

- name: Deploy console nftables rules
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/nftables.d/console.nft"
    dest: /etc/nftables.d/console.nft
    mode: "0644"
  notify: reload nftables

- name: Enable and start console
  ansible.builtin.systemd:
    name: console
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for console to be ready
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.console.host }}"
    port: "{{ topology_endpoints.console.endpoints.http.port }}"
    timeout: 30
