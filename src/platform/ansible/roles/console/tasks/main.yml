---
- name: Create console runtime group
  ansible.builtin.group:
    name: "{{ console_runtime_group }}"
    system: true

- name: Create console runtime user
  ansible.builtin.user:
    name: "{{ console_runtime_user }}"
    group: "{{ console_runtime_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ console_state_dir }}"
    create_home: false

- name: Create console state directory
  ansible.builtin.file:
    path: "{{ console_state_dir }}"
    state: directory
    owner: "{{ console_runtime_user }}"
    group: "{{ console_runtime_group }}"
    mode: "0700"

- name: Create console credstore directory
  ansible.builtin.file:
    path: /etc/credstore/console
    state: directory
    owner: root
    group: "{{ console_runtime_group }}"
    mode: "0750"

- name: Verify corepack exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/corepack"
  register: console_corepack
  failed_when: not console_corepack.stat.exists

- name: Check for existing console auth session secret
  ansible.builtin.stat:
    path: /etc/credstore/console/auth-session-secret
  register: console_auth_session_secret_file

- name: Generate console auth session secret
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/console/auth-session-secret
    owner: root
    group: "{{ console_runtime_group }}"
    mode: "0640"
  when: not console_auth_session_secret_file.stat.exists
  no_log: true

- name: Converge console auth session secret permissions
  ansible.builtin.file:
    path: /etc/credstore/console/auth-session-secret
    owner: root
    group: "{{ console_runtime_group }}"
    mode: "0640"

- name: Read console auth session secret
  ansible.builtin.slurp:
    src: /etc/credstore/console/auth-session-secret
  register: console_auth_session_secret_raw
  no_log: true

- name: Set console auth session secret fact
  ansible.builtin.set_fact:
    console_auth_session_secret: "{{ console_auth_session_secret_raw.content | b64decode | trim }}"
  no_log: true

- name: Create console install directory
  ansible.builtin.file:
    path: "{{ console_install_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ console_runtime_group }}"
    mode: "0755"

- name: Check whether console systemd unit exists
  ansible.builtin.stat:
    path: /etc/systemd/system/console.service
  register: console_systemd_unit_file

- name: Regenerate console API clients before source sync
  delegate_to: localhost
  become: false
  ansible.builtin.command:
    argv:
      - vp
      - run
      - "@verself/console#generate"
    chdir: "{{ playbook_dir }}/../../../viteplus-monorepo"
  changed_when: true

# Stop the live process before mutating .output so it never serves a partially deleted build.
- name: Stop live console before replacing build output
  ansible.builtin.systemd:
    name: console
    state: stopped
    daemon_reload: true
  when: console_systemd_unit_file.stat.exists

- name: Remove generated console artifacts before sync
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ console_install_dir }}/.output"
    - "{{ console_install_dir }}/.tanstack"
    - "{{ console_install_dir }}/apps/console/.output"
    - "{{ console_install_dir }}/apps/console/.tanstack"

# Opt-in clean rebuild: wipe node_modules and the install fingerprint so the
# next pnpm install runs from scratch instead of reusing the cached store.
# Trigger with `make deploy TAGS=console EXTRA_VARS='console_full_rebuild=true'`.
# Use when a prior install left a corrupted store or an upstream package
# linked the wrong version.
- name: Wipe console install for clean rebuild (FULL=1)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ console_install_dir }}/node_modules"
    - "{{ console_dependencies_fingerprint_path }}"
  when: console_full_rebuild | default(false) | bool

- name: Synchronize console source
  delegate_to: localhost
  become: false
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../../viteplus-monorepo/"
    dest: "{{ console_install_dir }}/"
    delete: true
    recursive: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.output"
      - "--exclude=dist"
      - "--exclude=.tanstack"
      - "--exclude=apps/company"
      - "--exclude=apps/company/**"
      - "--exclude=playwright-report"
      - "--exclude=test-results"
      - "--exclude=HANDOFF_PROMPT.md"
      # delete-excluded would wipe remote node_modules and defeat incremental deploys.
      - "--no-owner"
      - "--no-group"

- name: Compute console workspace dependency fingerprint
  delegate_to: localhost
  become: false
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        cd {{ playbook_dir }}/../../../viteplus-monorepo
        {
          printf '%s\0' package.json pnpm-lock.yaml pnpm-workspace.yaml apps/console/package.json
          find packages -mindepth 2 -maxdepth 2 -name package.json -print0
        } | sort -z | xargs -0 sha256sum | sha256sum
  register: console_workspace_dependency_fingerprint
  changed_when: false

- name: Check cached console install fingerprint
  ansible.builtin.stat:
    path: "{{ console_dependencies_fingerprint_path }}"
  register: console_install_fingerprint_file

- name: Read cached console install fingerprint
  ansible.builtin.slurp:
    src: "{{ console_dependencies_fingerprint_path }}"
  register: console_install_fingerprint_raw
  when: console_install_fingerprint_file.stat.exists

- name: Check cached console node_modules
  ansible.builtin.stat:
    path: "{{ console_install_dir }}/node_modules"
  register: console_node_modules_dir

- name: Install console workspace dependencies when manifests change
  become: false
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/corepack"
      - pnpm
      - install
    chdir: "{{ console_install_dir }}"
  environment:
    PATH: "{{ verself_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true
  when: >-
    (not console_node_modules_dir.stat.exists)
    or (not console_install_fingerprint_file.stat.exists)
    or (
      (console_install_fingerprint_raw.content | default('') | b64decode | trim)
      != (console_workspace_dependency_fingerprint.stdout.split()[0] | trim)
    )

- name: Record cached console install fingerprint
  ansible.builtin.copy:
    content: "{{ console_workspace_dependency_fingerprint.stdout.split()[0] | trim }}\n"
    dest: "{{ console_dependencies_fingerprint_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ console_runtime_group }}"
    mode: "0644"

- name: Build console package dependencies
  become: false
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/corepack"
      - pnpm
      - --filter
      - "@verself/console^..."
      - run
      - build
    chdir: "{{ console_install_dir }}"
  environment:
    PATH: "{{ verself_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true

- name: Build console app
  become: false
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/corepack"
      - pnpm
      - --filter
      - "@verself/console"
      - run
      - build
    chdir: "{{ console_install_dir }}"
  environment:
    PATH: "{{ verself_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true

- name: Set up Zitadel OIDC application
  ansible.builtin.include_role:
    name: zitadel_oauth_app
  vars:
    zitadel_oauth_app_name: console
    zitadel_oauth_app_project_name: "{{ console_auth_project_name }}"
    zitadel_oauth_app_redirect_uris:
      - "https://{{ console_domain }}/callback"
    zitadel_oauth_app_post_logout_redirect_uris:
      - "https://{{ console_domain }}"
    zitadel_oauth_app_credstore_dir: /etc/credstore/console
    zitadel_oauth_app_credstore_group: "{{ console_runtime_group }}"
    zitadel_oauth_app_auth_method_type: OIDC_AUTH_METHOD_TYPE_POST
    zitadel_oauth_app_grant_types:
      - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
      - OIDC_GRANT_TYPE_REFRESH_TOKEN
      - OIDC_GRANT_TYPE_TOKEN_EXCHANGE
    zitadel_oauth_app_role_assertions: true
    zitadel_oauth_app_cutover_marker_filename: oidc-web-cutover

- name: Export console OIDC app facts for templates
  ansible.builtin.set_fact:
    console_app_id: "{{ zitadel_oauth_app_out_id }}"
    console_project_id: "{{ zitadel_oauth_app_out_project_id }}"
    console_client_id: "{{ zitadel_oauth_app_out_client_id }}"
    console_client_secret: "{{ zitadel_oauth_app_out_client_secret }}"
  no_log: true

- name: Ensure sandbox-rental project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ zitadel_oauth_app_pat }}"
    zitadel_project_roles_project_id: "{{ console_project_id }}"
    zitadel_project_roles_definitions:
      - key: owner
        display_name: Owner
        group: sandbox
      - key: admin
        display_name: Admin
        group: sandbox
      - key: member
        display_name: Member
        group: sandbox

- name: Resolve identity-service project ID for console
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ zitadel_oauth_app_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ console_identity_project_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
  register: console_identity_project_search
  no_log: true

- name: Assert identity-service project exists for console
  ansible.builtin.assert:
    that: (console_identity_project_search.json.result | default([])) | length > 0
    fail_msg: >-
      Identity-service Zitadel project '{{ console_identity_project_name }}'
      not found. Run the identity_service role before console.

- name: Set console identity-service project ID fact
  ansible.builtin.set_fact:
    console_identity_project_id: "{{ console_identity_project_search.json.result[0].id }}"

- name: Ensure console env directory exists
  ansible.builtin.file:
    path: /etc/console
    state: directory
    owner: root
    group: "{{ console_runtime_group }}"
    mode: "0750"

- name: Deploy console environment file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/console/env
    mode: "0640"
    owner: root
    group: "{{ console_runtime_group }}"

- name: Deploy console systemd unit
  ansible.builtin.template:
    src: console.service.j2
    dest: /etc/systemd/system/console.service
    mode: "0644"

- name: Deploy console nftables rules
  ansible.builtin.template:
    src: console.nft.j2
    dest: /etc/nftables.d/console.nft
    mode: "0644"
  notify: Reload nftables

- name: Enable and start console
  ansible.builtin.systemd:
    name: console
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for console to be ready
  ansible.builtin.wait_for:
    host: "{{ services.console.host }}"
    port: "{{ services.console.port }}"
    timeout: 30
