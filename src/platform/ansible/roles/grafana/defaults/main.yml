---
# Grafana defaults.
grafana_subdomain: dashboard
grafana_domain: "{{ grafana_subdomain }}.{{ forge_metal_domain }}"

grafana_install_dir: /opt/forge-metal/grafana
grafana_config_dir: /etc/grafana
grafana_data_dir: /var/lib/grafana
grafana_log_dir: /var/log/grafana
grafana_plugin_dir: "{{ grafana_data_dir }}/plugins"
grafana_provisioning_dir: "{{ grafana_config_dir }}/provisioning"
grafana_credstore_dir: /etc/credstore/grafana

grafana_db_name: grafana
grafana_db_user: grafana

grafana_clickhouse_user: grafana_observer
grafana_datasource_uid: forge-metal-clickhouse
grafana_datasource_name: Forge Metal ClickHouse
grafana_auth_project_name: grafana
grafana_auth_app_name: grafana
grafana_oidc_redirect_uri: "https://{{ grafana_domain }}/login/generic_oauth"
grafana_oidc_post_logout_redirect_uri: "https://{{ grafana_domain }}"
grafana_oidc_scopes: "openid profile email offline_access"

grafana_unmanaged_plugin_dirs:
  - grafana-exploretraces-app
  - grafana-lokiexplore-app
  - grafana-metricsdrilldown-app
  - grafana-pyroscope-app
