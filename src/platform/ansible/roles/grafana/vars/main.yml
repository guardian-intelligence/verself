          >-
            SELECT formatDateTime(started_at, '%Y-%m-%d %H:%i:%S') AS time, org_id, product_id, cycle_id, pricing_contract_id,
            pricing_phase_id, pricing_plan_id, pricing_phase, charge_units, contract_units, adjustment_units, adjustment_reason,
            billable_quantity, cost_per_unit, actor_id, source_type, source_ref FROM verself.metering ORDER BY started_at DESC LIMIT 25
  - uid: "verself-postgresql"
    title: "PostgreSQL"
    tags:
      - "infrastructure"
    panels:
      - id: 1
        uid: "memory-rss"
        title: "Memory (RSS)"
        type: "timeseries"
        x: 0
        y: 0
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "bytes"
        raw_sql:
          >-
            SELECT $__timeInterval(TimeUnix) as time, avg(Value) as bytes FROM default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND
            MetricName = 'process.memory.usage' AND ResourceAttributes['process.executable.name'] = 'postgres' GROUP BY time ORDER BY time
      - id: 2
        uid: "cpu-cores"
        title: "CPU (cores)"
        type: "timeseries"
        x: 8
        y: 0
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT ts as time, round(sum(delta) / greatest(max(span), 1), 4) as cpu_cores FROM (SELECT $__timeInterval(TimeUnix) as ts,
            ResourceAttributes['process.pid'] as pid, Attributes['state'] as state, max(Value) - min(Value) as delta, dateDiff('second',
            min(TimeUnix), max(TimeUnix)) as span FROM default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND MetricName =
            'process.cpu.time' AND ResourceAttributes['process.executable.name'] = 'postgres' GROUP BY ts, pid, state) GROUP BY ts ORDER BY ts
      - id: 3
        uid: "active-connections"
        title: "Active Connections"
        type: "timeseries"
        x: 16
        y: 0
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT $__timeInterval(TimeUnix) as time, avg(Value) as connections FROM default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND
            MetricName = 'postgresql.backends' GROUP BY time ORDER BY time
      - id: 4
        uid: "transactions-s-commits-rollbacks"
        title: "Transactions/s (commits + rollbacks)"
        type: "timeseries"
        x: 0
        y: 9
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, greatest(round((commits_last - commits_prev + rollbacks_last - rollbacks_prev) / greatest(dateDiff('second', ts_prev,
            time), 1), 2), 0) as tps FROM (SELECT time, commits_last, rollbacks_last, lagInFrame(commits_last) OVER (ORDER BY time) as
            commits_prev, lagInFrame(rollbacks_last) OVER (ORDER BY time) as rollbacks_prev, lagInFrame(time) OVER (ORDER BY time) as ts_prev
            FROM (SELECT time, sumIf(last_value, metric = 'postgresql.commits') as commits_last, sumIf(last_value, metric =
            'postgresql.rollbacks') as rollbacks_last FROM (SELECT $__timeInterval(TimeUnix) as time, MetricName as metric, argMax(Value,
            TimeUnix) as last_value FROM default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND MetricName IN ('postgresql.commits',
            'postgresql.rollbacks') GROUP BY time, metric) GROUP BY time)) WHERE commits_prev IS NOT NULL ORDER BY time
      - id: 5
        uid: "cache-hit-ratio"
        title: "Cache Hit Ratio (%)"
        type: "timeseries"
        x: 8
        y: 9
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT $__timeInterval(TimeUnix) as time, round(sumIf(Value, MetricName = 'postgresql.blocks_read' AND Attributes['source'] =
            'heap_hit') / greatest(sumIf(Value, MetricName = 'postgresql.blocks_read'), 1) * 100, 2) as cache_hit_pct FROM
            default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND MetricName = 'postgresql.blocks_read' GROUP BY time ORDER BY time
      - id: 6
        uid: "database-size"
        title: "Database Size"
        type: "timeseries"
        x: 16
        y: 9
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "bytes"
        raw_sql:
          >-
            SELECT $__timeInterval(TimeUnix) as time, Attributes['postgresql.database.name'] as db, avg(Value) as bytes FROM
            default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND MetricName = 'postgresql.db_size' GROUP BY time, db ORDER BY time
      - id: 7
        uid: "row-operations-s"
        title: "Row Operations/s"
        type: "timeseries"
        x: 0
        y: 18
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, greatest(round((val_last - val_prev) / greatest(dateDiff('second', ts_prev, time), 1), 2), 0) as ops_per_sec, op FROM
            (SELECT $__timeInterval(TimeUnix) as time, Attributes['operation'] as op, argMax(Value, TimeUnix) as val_last,
            lagInFrame(argMax(Value, TimeUnix)) OVER (PARTITION BY Attributes['operation'] ORDER BY $__timeInterval(TimeUnix)) as val_prev,
            lagInFrame($__timeInterval(TimeUnix)) OVER (PARTITION BY Attributes['operation'] ORDER BY $__timeInterval(TimeUnix)) as ts_prev FROM
            default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND MetricName = 'postgresql.operations' GROUP BY time, op) WHERE val_prev IS
            NOT NULL ORDER BY time
      - id: 8
        uid: "log-errors-count-by-severity"
        title: "Log Errors (count by severity)"
        type: "timeseries"
        x: 8
        y: 18
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT $__timeInterval(Timestamp) as time, SeverityText as severity, count() as cnt FROM default.otel_logs WHERE
            $__timeFilter(Timestamp) AND ServiceName = 'postgresql' AND SeverityText IN ('WARN', 'ERROR') GROUP BY time, severity ORDER BY time
      - id: 9
        uid: "heartbeat"
        title: "Heartbeat (%)"
        type: "timeseries"
        x: 16
        y: 18
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, concat('uptime (avg: ', toString(round(avg_pct, 1)), '%)') as series, heartbeat_pct FROM (SELECT *, avg(heartbeat_pct)
            OVER () as avg_pct FROM (SELECT $__timeInterval(TimeUnix) as time, 100 as heartbeat_pct FROM default.otel_metrics_sum WHERE
            $__timeFilter(TimeUnix) AND MetricName = 'process.memory.usage' AND ResourceAttributes['process.executable.name'] = 'postgres' GROUP
            BY time)) ORDER BY time
  - uid: "verself-tigerbeetle"
    title: "TigerBeetle"
    tags:
      - "infrastructure"
    panels:
      - id: 1
        uid: "memory-rss"
        title: "Memory (RSS)"
        type: "timeseries"
        x: 0
        y: 0
        w: 12
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "bytes"
        raw_sql:
          >-
            SELECT $__timeInterval(TimeUnix) as time, avg(Value) as bytes FROM default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND
            MetricName = 'process.memory.usage' AND ResourceAttributes['process.executable.name'] = 'tigerbeetle' GROUP BY time ORDER BY time
      - id: 2
        uid: "cpu-cores"
        title: "CPU (cores)"
        type: "timeseries"
        x: 12
        y: 0
        w: 12
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT ts as time, round(sum(delta) / greatest(max(span), 1), 4) as cpu_cores FROM (SELECT $__timeInterval(TimeUnix) as ts,
            ResourceAttributes['process.pid'] as pid, Attributes['state'] as state, max(Value) - min(Value) as delta, dateDiff('second',
            min(TimeUnix), max(TimeUnix)) as span FROM default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND MetricName =
            'process.cpu.time' AND ResourceAttributes['process.executable.name'] = 'tigerbeetle' GROUP BY ts, pid, state) GROUP BY ts ORDER BY
            ts
      - id: 3
        uid: "committed-ops-s"
        title: "Committed Ops/s"
        type: "timeseries"
        x: 0
        y: 9
        w: 12
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, greatest(round((op_last - op_prev) / greatest(dateDiff('second', ts_prev, time), 1), 1), 0) as ops_per_sec FROM (SELECT
            $__timeInterval(TimeUnix) as time, argMax(Value, TimeUnix) as op_last, lagInFrame(argMax(Value, TimeUnix)) OVER (ORDER BY
            $__timeInterval(TimeUnix)) as op_prev, lagInFrame($__timeInterval(TimeUnix)) OVER (ORDER BY $__timeInterval(TimeUnix)) as ts_prev
            FROM default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'tb.replica_op' GROUP BY time) WHERE op_prev IS NOT
            NULL ORDER BY time
      - id: 4
        uid: "request-latency-p100-ms"
        title: "Request Latency p100 (ms)"
        type: "timeseries"
        x: 12
        y: 9
        w: 12
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT $__timeInterval(TimeUnix) as time, replaceAll(Attributes['operation'], 'Operation.', '') as operation, round(max(Value) /
            1000, 2) as latency_ms FROM default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'tb.replica_request_us.max'
            AND Attributes['operation'] NOT IN ('Operation.register', 'Operation.pulse') GROUP BY time, operation ORDER BY time
      - id: 5
        uid: "grid-cache-hit-rate"
        title: "Grid Cache Hit Rate"
        type: "timeseries"
        x: 0
        y: 18
        w: 12
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "percentunit"
        raw_sql:
          >-
            SELECT $__timeInterval(TimeUnix) as time, round(sumIf(Value, MetricName = 'tb.grid_cache_hits') / greatest(sumIf(Value, MetricName =
            'tb.grid_cache_hits') + sumIf(Value, MetricName = 'tb.grid_cache_misses'), 1), 4) as hit_rate FROM default.otel_metrics_gauge WHERE
            $__timeFilter(TimeUnix) AND MetricName IN ('tb.grid_cache_hits', 'tb.grid_cache_misses') GROUP BY time ORDER BY time
      - id: 6
        uid: "all-statsd-metrics-tb"
        title: "All StatsD Metrics (tb.*)"
        type: "table"
        x: 12
        y: 18
        w: 12
        h: 9
        query_type: "table"
        query_format: 1
        unit: "short"
        raw_sql:
          >-
            SELECT MetricName, count() as samples, round(avg(Value), 2) as avg_value, round(max(Value), 2) as max_value FROM
            default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName LIKE 'tb.%' GROUP BY MetricName ORDER BY MetricName
  - uid: "verself-zitadel"
    title: "Zitadel"
    tags:
      - "infrastructure"
    panels:
      - id: 1
        uid: "oidc-latency-p95-p99"
        title: "OIDC Latency (p95 / p99)"
        type: "timeseries"
        x: 0
        y: 0
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, concat(series, ' (avg: ', toString(round(series_avg, 1)), ' ms)') as series, ms FROM (SELECT *, avg(ms) OVER (PARTITION
            BY series) as series_avg FROM (SELECT $__timeInterval(Timestamp) as time, 'p95' as series, quantile(0.95)(Duration / 1000000) as ms
            FROM default.otel_traces WHERE $__timeFilter(Timestamp) AND ServiceName = 'zitadel' AND (SpanName LIKE '%/oauth/%' OR SpanName LIKE
            '%/oidc/%') AND Duration > 0 GROUP BY time UNION ALL SELECT $__timeInterval(Timestamp) as time, 'p99' as series,
            quantile(0.99)(Duration / 1000000) as ms FROM default.otel_traces WHERE $__timeFilter(Timestamp) AND ServiceName = 'zitadel' AND
            (SpanName LIKE '%/oauth/%' OR SpanName LIKE '%/oidc/%') AND Duration > 0 GROUP BY time)) ORDER BY time
      - id: 2
        uid: "oidc-error-rate"
        title: "OIDC Error Rate (%)"
        type: "timeseries"
        x: 8
        y: 0
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, concat('error rate (avg: ', toString(round(avg_pct, 2)), '%)') as series, error_pct FROM (SELECT *, avg(error_pct) OVER
            () as avg_pct FROM (SELECT $__timeInterval(Timestamp) as time, round(countIf(StatusCode = 'Error') / greatest(count(), 1) * 100, 2)
            as error_pct FROM default.otel_traces WHERE $__timeFilter(Timestamp) AND ServiceName = 'zitadel' AND (SpanName LIKE '%/oauth/%' OR
            SpanName LIKE '%/oidc/%') GROUP BY time)) ORDER BY time
      - id: 3
        uid: "zitadel-heartbeat"
        title: "Zitadel Heartbeat (%)"
        type: "timeseries"
        x: 16
        y: 0
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, concat('uptime (avg: ', toString(round(avg_pct, 1)), '%)') as series, heartbeat_pct FROM (SELECT *, avg(heartbeat_pct)
            OVER () as avg_pct FROM (SELECT $__timeInterval(TimeUnix) as time, 100 as heartbeat_pct FROM default.otel_metrics_sum WHERE
            $__timeFilter(TimeUnix) AND MetricName = 'process.memory.usage' AND ResourceAttributes['process.executable.name'] = 'zitadel' GROUP
            BY time)) ORDER BY time
  - uid: "verself-secrets"
    title: "Secrets & OpenBao"
    tags:
      - "security"
    panels:
      - id: 1
        uid: "seal-and-active"
        title: "Seal Status & Active Node"
        type: "timeseries"
        x: 0
        y: 0
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, series, v FROM (SELECT $__timeInterval(TimeUnix) AS time, 'unsealed (1=ok)' AS series, avg(Value) AS v FROM
            default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_core_unsealed' GROUP BY time UNION ALL SELECT
            $__timeInterval(TimeUnix) AS time, 'active-node (1=leader)' AS series, avg(Value) AS v FROM default.otel_metrics_gauge WHERE
            $__timeFilter(TimeUnix) AND MetricName = 'vault_core_active' GROUP BY time) ORDER BY time
      - id: 2
        uid: "raft-and-autopilot"
        title: "Raft Peers & Autopilot Health"
        type: "timeseries"
        x: 8
        y: 0
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, series, v FROM (SELECT $__timeInterval(TimeUnix) AS time, 'raft_peers' AS series, max(Value) AS v FROM
            default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_raft_peers' GROUP BY time UNION ALL SELECT
            $__timeInterval(TimeUnix) AS time, 'autopilot_healthy (1=ok)' AS series, avg(Value) AS v FROM default.otel_metrics_gauge WHERE
            $__timeFilter(TimeUnix) AND MetricName = 'vault_autopilot_healthy' GROUP BY time UNION ALL SELECT $__timeInterval(TimeUnix) AS
            time, 'failure_tolerance' AS series, avg(Value) AS v FROM default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND
            MetricName = 'vault_autopilot_failure_tolerance' GROUP BY time) ORDER BY time
      - id: 3
        uid: "audit-log-failures"
        title: "Audit Log Failures (any non-zero = P1)"
        type: "timeseries"
        x: 16
        y: 0
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, series, failures FROM (SELECT time, 'request_failures' AS series, greatest(val_last - val_prev, 0) AS failures FROM
            (SELECT $__timeInterval(TimeUnix) AS time, argMax(Value, TimeUnix) AS val_last, lagInFrame(argMax(Value, TimeUnix)) OVER (ORDER BY
            $__timeInterval(TimeUnix)) AS val_prev FROM default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND MetricName =
            'vault_audit_log_request_failure' GROUP BY time) WHERE val_prev IS NOT NULL UNION ALL SELECT time, 'response_failures' AS series,
            greatest(val_last - val_prev, 0) AS failures FROM (SELECT $__timeInterval(TimeUnix) AS time, argMax(Value, TimeUnix) AS val_last,
            lagInFrame(argMax(Value, TimeUnix)) OVER (ORDER BY $__timeInterval(TimeUnix)) AS val_prev FROM default.otel_metrics_sum WHERE
            $__timeFilter(TimeUnix) AND MetricName = 'vault_audit_log_response_failure' GROUP BY time) WHERE val_prev IS NOT NULL) ORDER BY time
      - id: 4
        uid: "api-latency-p95"
        title: "API Latency p95 (ms) by operation"
        type: "timeseries"
        x: 0
        y: 9
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "ms"
        raw_sql:
          >-
            SELECT $__timeInterval(Timestamp) AS time, replaceOne(SpanName, 'secrets.', '') AS operation,
            round(quantile(0.95)(Duration / 1000000), 2) AS p95_ms FROM default.otel_traces WHERE $__timeFilter(Timestamp) AND ServiceName =
            'secrets-service' AND SpanName LIKE 'secrets.%' AND SpanName NOT LIKE 'secrets.bao.%' AND SpanName != 'secrets.ready' AND
            Duration > 0 GROUP BY time, operation ORDER BY time
      - id: 5
        uid: "backend-rtt-p95"
        title: "OpenBao Backend RTT p95 (ms)"
        type: "timeseries"
        x: 8
        y: 9
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "ms"
        raw_sql:
          >-
            SELECT $__timeInterval(Timestamp) AS time, replaceOne(SpanName, 'secrets.bao.', '') AS backend_op,
            round(quantile(0.95)(Duration / 1000000), 2) AS p95_ms FROM default.otel_traces WHERE $__timeFilter(Timestamp) AND ServiceName =
            'secrets-service' AND SpanName LIKE 'secrets.bao.%' AND SpanName != 'secrets.bao.ready' AND Duration > 0 GROUP BY time,
            backend_op ORDER BY time
      - id: 6
        uid: "api-error-rate"
        title: "API Error Rate (%)"
        type: "timeseries"
        x: 16
        y: 9
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, concat('error rate (avg: ', toString(round(avg_pct, 2)), '%)') AS series, error_pct FROM (SELECT *, avg(error_pct)
            OVER () AS avg_pct FROM (SELECT $__timeInterval(Timestamp) AS time, round(countIf(StatusCode = 'Error') / greatest(count(), 1) *
            100, 2) AS error_pct FROM default.otel_traces WHERE $__timeFilter(Timestamp) AND ServiceName = 'secrets-service' AND SpanName
            LIKE 'secrets.%' AND SpanName NOT LIKE 'secrets.bao.%' GROUP BY time)) ORDER BY time
      - id: 7
        uid: "requests-by-operation"
        title: "Requests by Operation"
        type: "timeseries"
        x: 0
        y: 18
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT $__timeInterval(Timestamp) AS time, replaceOne(SpanName, 'secrets.', '') AS operation, toFloat64(count()) AS reqs FROM
            default.otel_traces WHERE $__timeFilter(Timestamp) AND ServiceName = 'secrets-service' AND SpanName LIKE 'secrets.%' AND
            SpanName NOT LIKE 'secrets.bao.%' AND SpanName != 'secrets.ready' GROUP BY time, operation ORDER BY time
      - id: 8
        uid: "in-flight-requests"
        title: "OpenBao In-Flight Requests"
        type: "timeseries"
        x: 8
        y: 18
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT $__timeInterval(TimeUnix) AS time, 'in_flight' AS series, avg(Value) AS v FROM default.otel_metrics_gauge WHERE
            $__timeFilter(TimeUnix) AND MetricName = 'vault_core_in_flight_requests' GROUP BY time ORDER BY time
      - id: 9
        uid: "locked-users-and-logins"
        title: "Locked Users & JWT Logins"
        type: "timeseries"
        x: 16
        y: 18
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, series, v FROM (SELECT $__timeInterval(TimeUnix) AS time, 'locked_users' AS series, max(Value) AS v FROM
            default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_core_locked_users' GROUP BY time UNION ALL
            SELECT $__timeInterval(Timestamp) AS time, 'jwt_login_ok' AS series, toFloat64(countIf(StatusCode != 'Error')) AS v FROM
            default.otel_traces WHERE $__timeFilter(Timestamp) AND ServiceName = 'secrets-service' AND SpanName = 'secrets.bao.jwt.login'
            GROUP BY time UNION ALL SELECT $__timeInterval(Timestamp) AS time, 'jwt_login_err' AS series, toFloat64(countIf(StatusCode =
            'Error')) AS v FROM default.otel_traces WHERE $__timeFilter(Timestamp) AND ServiceName = 'secrets-service' AND SpanName =
            'secrets.bao.jwt.login' GROUP BY time) ORDER BY time
      - id: 10
        uid: "kv-and-token-count"
        title: "KV Secrets & Tokens"
        type: "timeseries"
        x: 0
        y: 27
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, series, v FROM (SELECT $__timeInterval(TimeUnix) AS time, 'kv_secrets' AS series, max(Value) AS v FROM
            default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_secret_kv_count' GROUP BY time UNION ALL SELECT
            $__timeInterval(TimeUnix) AS time, 'tokens_total' AS series, max(Value) AS v FROM default.otel_metrics_gauge WHERE
            $__timeFilter(TimeUnix) AND MetricName = 'vault_token_count' GROUP BY time UNION ALL SELECT $__timeInterval(TimeUnix) AS time,
            'identity_entities' AS series, max(Value) AS v FROM default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName =
            'vault_identity_entity_count' GROUP BY time) ORDER BY time
      - id: 11
        uid: "leases"
        title: "Leases (active vs irrevocable)"
        type: "timeseries"
        x: 8
        y: 27
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, series, v FROM (SELECT $__timeInterval(TimeUnix) AS time, 'leases_active' AS series, max(Value) AS v FROM
            default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_expire_num_leases' GROUP BY time UNION ALL
            SELECT $__timeInterval(TimeUnix) AS time, 'leases_irrevocable (should=0)' AS series, max(Value) AS v FROM
            default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_expire_num_irrevocable_leases' GROUP BY time)
            ORDER BY time
      - id: 12
        uid: "transit-ops"
        title: "Transit Ops (encrypt/decrypt/sign/verify)"
        type: "timeseries"
        x: 16
        y: 27
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT $__timeInterval(Timestamp) AS time, replaceOne(SpanName, 'secrets.transit.', '') AS op, toFloat64(count()) AS ops FROM
            default.otel_traces WHERE $__timeFilter(Timestamp) AND ServiceName = 'secrets-service' AND SpanName LIKE 'secrets.transit.%' AND
            SpanName NOT LIKE 'secrets.transit.key.%' GROUP BY time, op ORDER BY time
      - id: 13
        uid: "raft-commit-lag"
        title: "Raft Commit Lag (applied vs commit index)"
        type: "timeseries"
        x: 0
        y: 36
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, max(commit_idx - applied_idx) AS lag FROM (SELECT $__timeInterval(TimeUnix) AS time, maxIf(Value, MetricName =
            'vault_raft_storage_stats_commit_index') AS commit_idx, maxIf(Value, MetricName = 'vault_raft_storage_stats_applied_index') AS
            applied_idx FROM default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName IN
            ('vault_raft_storage_stats_commit_index', 'vault_raft_storage_stats_applied_index') GROUP BY time) GROUP BY time ORDER BY time
      - id: 14
        uid: "fsm-and-rollback"
        title: "FSM Pending & Rollback Queue"
        type: "timeseries"
        x: 8
        y: 36
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, series, v FROM (SELECT $__timeInterval(TimeUnix) AS time, 'fsm_pending' AS series, max(Value) AS v FROM
            default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_raft_storage_stats_fsm_pending' GROUP BY time
            UNION ALL SELECT $__timeInterval(TimeUnix) AS time, 'rollback_inflight' AS series, max(Value) AS v FROM
            default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_rollback_inflight' GROUP BY time UNION ALL
            SELECT $__timeInterval(TimeUnix) AS time, 'rollback_queued' AS series, max(Value) AS v FROM default.otel_metrics_gauge WHERE
            $__timeFilter(TimeUnix) AND MetricName = 'vault_rollback_queued' GROUP BY time UNION ALL SELECT $__timeInterval(TimeUnix) AS
            time, 'expire_job_queue' AS series, max(Value) AS v FROM default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName
            = 'vault_expire_job_manager_queue_length' GROUP BY time) ORDER BY time
      - id: 15
        uid: "raft-apply-and-boltdb"
        title: "Raft Apply Rate & BoltDB Bytes"
        type: "timeseries"
        x: 16
        y: 36
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, series, v FROM (SELECT time, 'raft_apply/s' AS series, greatest(round((val_last - val_prev) /
            greatest(dateDiff('second', ts_prev, time), 1), 2), 0) AS v FROM (SELECT $__timeInterval(TimeUnix) AS time, argMax(Value,
            TimeUnix) AS val_last, lagInFrame(argMax(Value, TimeUnix)) OVER (ORDER BY $__timeInterval(TimeUnix)) AS val_prev,
            lagInFrame($__timeInterval(TimeUnix)) OVER (ORDER BY $__timeInterval(TimeUnix)) AS ts_prev FROM default.otel_metrics_sum WHERE
            $__timeFilter(TimeUnix) AND MetricName = 'vault_raft_apply' GROUP BY time) WHERE val_prev IS NOT NULL UNION ALL SELECT
            $__timeInterval(TimeUnix) AS time, 'boltdb_bytes (MB)' AS series, round(max(Value) / 1048576, 2) AS v FROM
            default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_raft_storage_bolt_page_bytes_allocated' GROUP BY
            time) ORDER BY time
      - id: 16
        uid: "bao-memory"
        title: "OpenBao Memory (RSS + Go heap)"
        type: "timeseries"
        x: 0
        y: 45
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "bytes"
        raw_sql:
          >-
            SELECT time, series, bytes FROM (SELECT $__timeInterval(TimeUnix) AS time, 'rss' AS series, avg(Value) AS bytes FROM
            default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND MetricName = 'process.memory.usage' AND
            ResourceAttributes['process.executable.name'] = 'bao' GROUP BY time UNION ALL SELECT $__timeInterval(TimeUnix) AS time, 'go_heap_alloc'
            AS series, avg(Value) AS bytes FROM default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName =
            'vault_runtime_alloc_bytes' GROUP BY time UNION ALL SELECT $__timeInterval(TimeUnix) AS time, 'go_sys' AS series, avg(Value) AS
            bytes FROM default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_runtime_sys_bytes' GROUP BY time)
            ORDER BY time
      - id: 17
        uid: "bao-goroutines"
        title: "OpenBao Goroutines & GC"
        type: "timeseries"
        x: 8
        y: 45
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, series, v FROM (SELECT $__timeInterval(TimeUnix) AS time, 'goroutines' AS series, avg(Value) AS v FROM
            default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_runtime_num_goroutines' GROUP BY time UNION ALL
            SELECT $__timeInterval(TimeUnix) AS time, 'heap_objects (k)' AS series, avg(Value) / 1000 AS v FROM default.otel_metrics_gauge
            WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_runtime_heap_objects' GROUP BY time UNION ALL SELECT time, 'gc_pause_ms/min'
            AS series, greatest(round((val_last - val_prev) / 1000000, 2), 0) AS v FROM (SELECT $__timeInterval(TimeUnix) AS time,
            argMax(Value, TimeUnix) AS val_last, lagInFrame(argMax(Value, TimeUnix)) OVER (ORDER BY $__timeInterval(TimeUnix)) AS val_prev
            FROM default.otel_metrics_gauge WHERE $__timeFilter(TimeUnix) AND MetricName = 'vault_runtime_total_gc_pause_ns' GROUP BY time)
            WHERE val_prev IS NOT NULL) ORDER BY time
      - id: 18
        uid: "secrets-service-process"
        title: "secrets-service RSS & CPU"
        type: "timeseries"
        x: 16
        y: 45
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT time, series, v FROM (SELECT $__timeInterval(TimeUnix) AS time, 'rss_mb' AS series, round(avg(Value) / 1048576, 1) AS v
            FROM default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND MetricName = 'process.memory.usage' AND
            ResourceAttributes['process.executable.name'] = 'secrets-service' GROUP BY time UNION ALL SELECT ts AS time, 'cpu_cores' AS
            series, round(sum(delta) / greatest(max(span), 1), 4) AS v FROM (SELECT $__timeInterval(TimeUnix) AS ts,
            ResourceAttributes['process.pid'] AS pid, Attributes['state'] AS state, max(Value) - min(Value) AS delta, dateDiff('second',
            min(TimeUnix), max(TimeUnix)) AS span FROM default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND MetricName =
            'process.cpu.time' AND ResourceAttributes['process.executable.name'] = 'secrets-service' GROUP BY ts, pid, state) GROUP BY ts) ORDER BY time
      - id: 19
        uid: "recent-errors"
        title: "Recent secrets-service Errors"
        type: "table"
        x: 0
        y: 54
        w: 12
        h: 9
        query_type: "table"
        query_format: 1
        unit: "short"
        raw_sql:
          >-
            SELECT formatDateTime(Timestamp, '%Y-%m-%d %H:%i:%S') AS time, SpanName AS operation, StatusMessage AS error,
            SpanAttributes['verself.org_id'] AS org, SpanAttributes['verself.secret_kind'] AS kind,
            SpanAttributes['verself.secret_id'] AS secret_id, substring(TraceId, 1, 16) AS trace_id FROM default.otel_traces WHERE
            ServiceName = 'secrets-service' AND StatusCode = 'Error' AND SpanName LIKE 'secrets.%' ORDER BY Timestamp DESC LIMIT 20
      - id: 20
        uid: "top-operations"
        title: "Top Operations by Volume (last window)"
        type: "table"
        x: 12
        y: 54
        w: 12
        h: 9
        query_type: "table"
        query_format: 1
        unit: "short"
        raw_sql:
          >-
            SELECT SpanName AS operation, count() AS calls, countIf(StatusCode = 'Error') AS errors, round(quantile(0.5)(Duration /
            1000000), 2) AS p50_ms, round(quantile(0.95)(Duration / 1000000), 2) AS p95_ms, round(max(Duration / 1000000), 2) AS max_ms FROM
            default.otel_traces WHERE $__timeFilter(Timestamp) AND ServiceName = 'secrets-service' AND SpanName LIKE 'secrets.%' AND
            SpanName != 'secrets.ready' GROUP BY operation ORDER BY calls DESC LIMIT 30
  - uid: "verself-temporal"
    title: "Temporal"
    tags:
      - "infrastructure"
      - "temporal"
    panels:
      - id: 1
        uid: "temporal-auth-decisions"
        title: "Auth Decisions"
        type: "timeseries"
        x: 0
        y: 0
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT $__timeInterval(Timestamp) AS time, if(SpanAttributes['temporal.authz.decision'] = '', StatusCode,
            SpanAttributes['temporal.authz.decision']) AS series, toFloat64(count()) AS decisions FROM default.otel_traces WHERE
            $__timeFilter(Timestamp) AND ServiceName = 'temporal-server' AND SpanName = 'temporal.auth.authorize' GROUP BY time, series ORDER
            BY time, series
      - id: 2
        uid: "temporal-bootstrap-operations"
        title: "Web + Bootstrap Operations"
        type: "timeseries"
        x: 8
        y: 0
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT $__timeInterval(Timestamp) AS time, concat(ServiceName, ': ', SpanName) AS series, toFloat64(count()) AS calls FROM
            default.otel_traces WHERE $__timeFilter(Timestamp) AND ((ServiceName = 'temporal-web' AND (SpanAttributes['http.request.method']
            != '' OR SpanAttributes['http.method'] != '')) OR (ServiceName = 'temporal-bootstrap')) GROUP BY time, series ORDER BY time,
            series
      - id: 3
        uid: "temporal-process-memory"
        title: "Process Memory"
        type: "timeseries"
        x: 16
        y: 0
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "bytes"
        raw_sql:
          >-
            SELECT $__timeInterval(TimeUnix) AS time, ResourceAttributes['process.executable.name'] AS series, avg(Value) AS bytes FROM
            default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND MetricName = 'process.memory.usage' AND
            ResourceAttributes['process.executable.name'] IN ('verself-temporal-server', 'verself-temporal-web') GROUP BY time, series ORDER BY
            time, series
      - id: 4
        uid: "temporal-process-cpu"
        title: "Process CPU (cores)"
        type: "timeseries"
        x: 0
        y: 9
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT ts AS time, process AS series, round(sum(delta) / greatest(max(span), 1), 2) AS cpu_cores FROM (SELECT
            $__timeInterval(TimeUnix) AS ts, ResourceAttributes['process.executable.name'] AS process, ResourceAttributes['process.pid'] AS
            pid, Attributes['state'] AS state, max(Value) - min(Value) AS delta, dateDiff('second', min(TimeUnix), max(TimeUnix)) AS span FROM
            default.otel_metrics_sum WHERE $__timeFilter(TimeUnix) AND MetricName = 'process.cpu.time' AND
            ResourceAttributes['process.executable.name'] IN ('verself-temporal-server', 'verself-temporal-web') GROUP BY ts, process, pid, state)
            GROUP BY ts, process ORDER BY time, series
      - id: 5
        uid: "temporal-recent-authz"
        title: "Recent Authz"
        type: "table"
        x: 8
        y: 9
        w: 8
        h: 9
        query_type: "table"
        query_format: 1
        unit: "short"
        raw_sql:
          >-
            SELECT Timestamp, ServiceName AS service, SpanName AS span, SpanAttributes['spiffe.peer_id'] AS peer_id,
            SpanAttributes['temporal.namespace'] AS namespace, SpanAttributes['rpc.method'] AS rpc_method,
            SpanAttributes['temporal.authz.decision'] AS decision, SpanAttributes['temporal.authz.reason'] AS reason, StatusCode, TraceId FROM
            default.otel_traces WHERE $__timeFilter(Timestamp) AND ServiceName IN ('temporal-server', 'temporal-bootstrap') AND SpanName IN
            ('auth.spiffe.mtls.server', 'auth.spiffe.mtls.client', 'temporal.auth.authorize') ORDER BY Timestamp DESC LIMIT 100
      - id: 6
        uid: "temporal-bootstrap-runs"
        title: "Recent Bootstrap Runs"
        type: "table"
        x: 16
        y: 9
        w: 8
        h: 9
        query_type: "table"
        query_format: 1
        unit: "short"
        raw_sql:
          >-
            SELECT Timestamp, ServiceName AS service, SpanName AS span, StatusCode, SpanAttributes['temporal.namespace'] AS namespace,
            SpanAttributes['rpc.method'] AS rpc_method, round(Duration / 1000000, 2) AS ms, TraceId FROM default.otel_traces WHERE
            $__timeFilter(Timestamp) AND (ServiceName = 'temporal-bootstrap' OR (ServiceName = 'temporal-server' AND
            SpanAttributes['temporal.namespace'] != '')) ORDER BY Timestamp DESC LIMIT 100
      - id: 7
        uid: "temporal-logs"
        title: "Recent Logs"
        type: "table"
        x: 0
        y: 18
        w: 12
        h: 9
        query_type: "table"
        query_format: 1
        unit: "short"
        raw_sql:
          >-
            SELECT Timestamp, ServiceName AS service, SeverityText AS level, Body AS message, TraceId FROM default.otel_logs WHERE
            $__timeFilter(Timestamp) AND ServiceName IN ('temporal-server', 'temporal-web', 'temporal-bootstrap') ORDER BY Timestamp DESC
            LIMIT 100
      - id: 8
        uid: "temporal-metric-latest"
        title: "Latest Temporal Metrics"
        type: "table"
        x: 12
        y: 18
        w: 12
        h: 9
        query_type: "table"
        query_format: 1
        unit: "short"
        raw_sql:
          >-
            SELECT ServiceName AS service, MetricName AS metric, MetricKind AS kind, MetricUnit AS unit, round(CurrentValue, 4) AS value,
            SampledAt FROM default.otel_metric_latest WHERE $__timeFilter(SampledAt) AND (startsWith(ServiceName, 'temporal-server') OR
            ServiceName = 'temporal-web') ORDER BY SampledAt DESC, service, metric LIMIT 100
  - uid: "verself-observability-query-model"
    title: "Observability Query Vocabulary"
    tags:
      - "infrastructure"
    panels:
      - id: 1
        uid: "live-metric-catalog"
        title: "Metric Namespace Catalog"
        type: "table"
        x: 0
        y: 0
        w: 12
        h: 9
        query_type: "table"
        query_format: 1
        unit: "short"
        raw_sql:
          >-
            SELECT if(position(MetricName, '.') = 0, concat(MetricName, '.*'), concat(arrayElement(splitByChar('.', MetricName), 1), '.*')) AS
            Namespace, countDistinct(MetricName) AS Metrics, arrayStringConcat(arraySort(groupUniqArray(MetricKind)), ', ') AS Kinds,
            arrayStringConcat(arraySlice(arraySort(groupUniqArray(if(ServiceName = '', '<resource-only>', ServiceName))), 1, 8), ', ') AS
            Services FROM default.otel_metric_catalog_live WHERE $__timeFilter(LastSeenAt) GROUP BY Namespace ORDER BY Namespace LIMIT 100
      - id: 2
        uid: "latest-scalar-metrics"
        title: "Metric Names"
        type: "table"
        x: 12
        y: 0
        w: 12
        h: 9
        query_type: "table"
        query_format: 1
        unit: "short"
        raw_sql:
          >-
            SELECT MetricName, arrayStringConcat(arraySort(groupUniqArray(MetricKind)), ', ') AS Kinds, any(MetricUnit) AS Unit,
            arrayStringConcat(arraySlice(arraySort(groupUniqArray(if(ServiceName = '', '<resource-only>', ServiceName))), 1, 8), ', ') AS
            Services, sum(Samples) AS Samples, sum(AttributeSets) AS AttributeSets FROM default.otel_metric_catalog_live WHERE
            $__timeFilter(LastSeenAt) GROUP BY MetricName ORDER BY MetricName LIMIT 100
      - id: 3
        uid: "recent-signal-errors"
        title: "Recent Signal Errors"
        type: "table"
        x: 0
        y: 9
        w: 12
        h: 9
        query_type: "table"
        query_format: 1
        unit: "short"
        raw_sql:
          >-
            SELECT Timestamp, SignalKind, ServiceName, Severity, HttpStatus, Path, Name, TraceId FROM default.otel_signal_errors WHERE
            $__timeFilter(Timestamp) ORDER BY Timestamp DESC LIMIT 100
      - id: 4
        uid: "observe-command-spans"
        title: "Observe Command Spans"
        type: "table"
        x: 12
        y: 9
        w: 12
        h: 9
        query_type: "table"
        query_format: 1
        unit: "short"
        raw_sql:
          >-
            SELECT Timestamp, SpanName, StatusCode, SpanAttributes['observe.what'] AS Surface, SpanAttributes['observe.signal'] AS Signal,
            SpanAttributes['observe.query_id'] AS QueryID, SpanAttributes['observe.query_family'] AS Family,
            SpanAttributes['clickhouse.query_name'] AS QueryName, SpanAttributes['observe.run_id'] AS RunID, TraceId FROM default.otel_traces
            WHERE $__timeFilter(Timestamp) AND ServiceName = 'observe' ORDER BY Timestamp DESC LIMIT 100
