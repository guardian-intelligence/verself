        raw_sql:
          >-
            SELECT time, series, units FROM (SELECT toStartOfDay(started_at) AS time, 'free_tier' AS series, toFloat64(sum(free_tier_units)) AS
            units FROM verself.metering WHERE started_at >= now() - INTERVAL 30 DAY GROUP BY time UNION ALL SELECT toStartOfDay(started_at)
            AS time, 'contract' AS series, toFloat64(sum(contract_units)) AS units FROM verself.metering WHERE started_at >= now() -
            INTERVAL 30 DAY GROUP BY time UNION ALL SELECT toStartOfDay(started_at) AS time, 'purchase' AS series,
            toFloat64(sum(purchase_units)) AS units FROM verself.metering WHERE started_at >= now() - INTERVAL 30 DAY GROUP BY time UNION
            ALL SELECT toStartOfDay(started_at) AS time, 'promo' AS series, toFloat64(sum(promo_units)) AS units FROM verself.metering WHERE
            started_at >= now() - INTERVAL 30 DAY GROUP BY time UNION ALL SELECT toStartOfDay(started_at) AS time, 'receivable' AS series,
            toFloat64(sum(receivable_units)) AS units FROM verself.metering WHERE started_at >= now() - INTERVAL 30 DAY GROUP BY time) ORDER BY
            time
      - id: 6
        uid: "recent-metering-activity"
