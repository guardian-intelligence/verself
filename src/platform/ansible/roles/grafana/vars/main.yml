        type: "timeseries"
        x: 0
        y: 9
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT toStartOfDay(started_at) AS time, 'rows' AS series, toFloat64(count()) AS row_count FROM verself.metering WHERE
            started_at >= now() - INTERVAL 30 DAY GROUP BY time ORDER BY time
      - id: 4
        uid: "charge-units-by-product"
        title: "Charge Units by Product"
        type: "timeseries"
        x: 8
        y: 9
        w: 8
        h: 9
        query_type: "timeseries"
        query_format: 0
        unit: "short"
        raw_sql:
          >-
            SELECT toStartOfDay(started_at) AS time, product_id AS series, toFloat64(sum(charge_units)) AS units FROM verself.metering WHERE
            started_at >= now() - INTERVAL 30 DAY GROUP BY time, series ORDER BY time
      - id: 5
        uid: "funding-source-breakdown"
        title: "Funding Source Breakdown"
        type: "timeseries"
