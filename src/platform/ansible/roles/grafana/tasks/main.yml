---
# Grafana observability UI against the existing ClickHouse store.

- name: Verify Grafana binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/grafana"
  register: grafana_binary
  failed_when: not grafana_binary.stat.exists

- name: Create Grafana system group
  ansible.builtin.group:
    name: grafana
    system: true

- name: Ensure SPIRE workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create Grafana system user
  ansible.builtin.user:
    name: grafana
    group: grafana
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    home: "{{ grafana_data_dir }}"
    shell: /usr/sbin/nologin
    create_home: false

- name: Create Grafana directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('grafana') }}"
    group: "{{ item.group | default('grafana') }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ grafana_config_dir }}"
      owner: root
      group: grafana
      mode: "0750"
    - path: "{{ grafana_provisioning_dir }}"
      owner: root
      group: grafana
      mode: "0750"
    - path: "{{ grafana_provisioning_dir }}/datasources"
      owner: grafana
      group: grafana
      mode: "0750"
    - path: "{{ grafana_provisioning_dir }}/dashboards"
      owner: root
      group: grafana
      mode: "0750"
    - path: "{{ grafana_config_dir }}/dashboards"
      owner: root
      group: grafana
      mode: "0750"
    - path: "{{ grafana_data_dir }}"
      mode: "0750"
    - path: "{{ grafana_clickhouse_spiffe_dir }}"
      mode: "0700"
    - path: "{{ grafana_plugin_dir }}"
      mode: "0750"
    - path: "{{ grafana_log_dir }}"
      mode: "0750"
    - path: "{{ grafana_credstore_dir }}"
      owner: root
      group: grafana
      mode: "0750"

- name: Ensure Grafana generated secrets exist
  ansible.builtin.copy:
    content: "{{ item.value }}"
    dest: "{{ grafana_credstore_dir }}/{{ item.name }}"
    owner: root
    group: grafana
    mode: "0640"
    force: false
  loop:
    - name: admin-password
      value: "{{ lookup('community.general.random_string', length=32, upper=true, lower=true, numbers=true, special=false) }}"
    - name: db-password
      value: "{{ lookup('community.general.random_string', length=32, upper=true, lower=true, numbers=true, special=false) }}"
    - name: secret-key
      value: "{{ lookup('community.general.random_string', length=64, upper=true, lower=true, numbers=true, special=false) }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Read Grafana generated secrets
  ansible.builtin.slurp:
    src: "{{ grafana_credstore_dir }}/{{ item }}"
  loop:
    - admin-password
    - db-password
    - secret-key
  register: grafana_secret_files
  no_log: true

- name: Set Grafana secret facts
  ansible.builtin.set_fact:
    grafana_admin_password: "{{ (grafana_secret_files.results | selectattr('item', 'equalto', 'admin-password') | first).content | b64decode | trim }}"
    grafana_db_password: "{{ (grafana_secret_files.results | selectattr('item', 'equalto', 'db-password') | first).content | b64decode | trim }}"
    grafana_secret_key: "{{ (grafana_secret_files.results | selectattr('item', 'equalto', 'secret-key') | first).content | b64decode | trim }}"
  no_log: true

- name: Configure Grafana Zitadel OIDC application
  ansible.builtin.include_role:
    name: zitadel_oauth_app
  vars:
    zitadel_oauth_app_name: "{{ grafana_auth_app_name }}"
    zitadel_oauth_app_project_name: "{{ grafana_auth_project_name }}"
    zitadel_oauth_app_redirect_uris:
      - "{{ grafana_oidc_redirect_uri }}"
    zitadel_oauth_app_post_logout_redirect_uris:
      - "{{ grafana_oidc_post_logout_redirect_uri }}"
    zitadel_oauth_app_credstore_dir: "{{ grafana_credstore_dir }}"
    zitadel_oauth_app_credstore_group: grafana
    zitadel_oauth_app_auth_method_type: OIDC_AUTH_METHOD_TYPE_POST
    zitadel_oauth_app_grant_types:
      - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
      - OIDC_GRANT_TYPE_REFRESH_TOKEN
    zitadel_oauth_app_create_project_if_missing: true
    zitadel_oauth_app_role_assertions: false

- name: Export Grafana OIDC app facts for templates
  ansible.builtin.set_fact:
    grafana_app_id: "{{ zitadel_oauth_app_out_id }}"
    grafana_oidc_client_id: "{{ zitadel_oauth_app_out_client_id }}"
    grafana_oidc_client_secret: "{{ zitadel_oauth_app_out_client_secret }}"
  no_log: true

- name: Store Grafana OIDC client ID
  ansible.builtin.copy:
    dest: "{{ grafana_credstore_dir }}/oidc-client-id"
    content: "{{ grafana_oidc_client_id }}\n"
    owner: root
    group: grafana
    mode: "0640"
  no_log: true

- name: Ensure Grafana PostgreSQL role and database exist
  module_defaults:
    community.postgresql.postgresql_user:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      trust_input: false
    community.postgresql.postgresql_db:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      maintenance_db: postgres
      trust_input: false
    community.postgresql.postgresql_owner:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: postgres
      trust_input: false
  block:
    - name: Ensure Grafana PostgreSQL user exists
      community.postgresql.postgresql_user:
        name: "{{ grafana_db_user }}"
        password: "{{ grafana_db_password }}"
        role_attr_flags: LOGIN
        conn_limit: "{{ postgresql_role_connection_limits.grafana }}"
      no_log: true

    - name: Ensure Grafana PostgreSQL database exists
      community.postgresql.postgresql_db:
        name: "{{ grafana_db_name }}"
        owner: "{{ grafana_db_user }}"
        state: present
      no_log: true

    - name: Ensure Grafana PostgreSQL database ownership
      community.postgresql.postgresql_owner:
        obj_name: "{{ grafana_db_name }}"
        obj_type: database
        new_owner: "{{ grafana_db_user }}"
      no_log: true

- name: Copy ClickHouse server CA into Grafana credstore
  ansible.builtin.copy:
    src: /etc/clickhouse-server/tls/server-ca.pem
    dest: "{{ grafana_clickhouse_server_ca_cred }}"
    remote_src: true
    owner: root
    group: grafana
    mode: "0640"
  notify:
    - restart grafana-clickhouse-spiffe-helper
    - restart grafana

- name: Ensure Grafana ClickHouse user exists with read-only certificate grants
  ansible.builtin.shell: |
    set -euo pipefail
    {{ clickhouse_operator_client_command }} --multiquery <<'SQL'
    CREATE USER IF NOT EXISTS {{ grafana_clickhouse_user }} IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_grafana_id }}' HOST LOCAL;
    ALTER USER {{ grafana_clickhouse_user }} IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_grafana_id }}' HOST LOCAL;
    GRANT SELECT ON default.* TO {{ grafana_clickhouse_user }};
    GRANT SELECT ON verself.* TO {{ grafana_clickhouse_user }};
    GRANT SELECT ON system.query_log TO {{ grafana_clickhouse_user }};
    GRANT SELECT ON system.settings TO {{ grafana_clickhouse_user }};
    GRANT SELECT ON system.tables TO {{ grafana_clickhouse_user }};
    GRANT SELECT ON system.columns TO {{ grafana_clickhouse_user }};
    GRANT SELECT ON system.databases TO {{ grafana_clickhouse_user }};
    SQL
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true
- name: Read installed ClickHouse datasource plugin marker
  ansible.builtin.slurp:
    src: "{{ grafana_plugin_dir }}/.grafana-clickhouse-datasource-version"
  register: grafana_clickhouse_plugin_marker
  failed_when: false

- name: Check installed ClickHouse datasource plugin directory
  ansible.builtin.stat:
    path: "{{ grafana_plugin_dir }}/grafana-clickhouse-datasource"
  register: grafana_clickhouse_plugin_dir

- name: Verify Bazel-provided ClickHouse datasource plugin
  ansible.builtin.assert:
    that:
      - grafana_clickhouse_plugin_marker is succeeded
      - grafana_clickhouse_plugin_dir.stat.exists
      - (grafana_clickhouse_plugin_marker.content | b64decode | trim) == topology_versions.production.grafanaClickhouseDatasource
    quiet: true
    fail_msg: >-
      Grafana ClickHouse datasource plugin is missing or stale. Run deploy_profile so Bazel unpacks server_tools.tar.zst.

- name: Set ClickHouse datasource plugin ownership
  ansible.builtin.file:
    path: "{{ grafana_plugin_dir }}/grafana-clickhouse-datasource"
    state: directory
    owner: grafana
    group: grafana
    mode: "0750"
    recurse: true
  notify: restart grafana

- name: Set ClickHouse datasource plugin marker ownership
  ansible.builtin.file:
    path: "{{ grafana_plugin_dir }}/.grafana-clickhouse-datasource-version"
    owner: grafana
    group: grafana
    mode: "0640"
  notify: restart grafana

- name: Remove Grafana unmanaged preinstalled plugins
  ansible.builtin.file:
    path: "{{ grafana_plugin_dir }}/{{ item }}"
    state: absent
  loop: "{{ grafana_unmanaged_plugin_dirs }}"
  notify: restart grafana

- name: Deploy Grafana configuration
  ansible.builtin.template:
    src: grafana.ini.j2
    dest: "{{ grafana_config_dir }}/grafana.ini"
    owner: root
    group: grafana
    mode: "0640"
  notify: restart grafana

- name: Deploy Grafana secret environment
  ansible.builtin.template:
    src: grafana.env.j2
    dest: "{{ grafana_credstore_dir }}/grafana.env"
    owner: root
    group: grafana
    mode: "0640"
  notify: restart grafana
  no_log: true

- name: Deploy Grafana ClickHouse datasource refresh script
  ansible.builtin.template:
    src: grafana-clickhouse-refresh.sh.j2
    dest: "{{ grafana_clickhouse_refresh_script_path }}"
    owner: root
    group: root
    mode: "0755"
  notify:
    - restart grafana-clickhouse-spiffe-helper
    - restart grafana

- name: Deploy Grafana ClickHouse SPIFFE helper config
  ansible.builtin.template:
    src: grafana-clickhouse-spiffe-helper.conf.j2
    dest: "{{ grafana_clickhouse_helper_config_path }}"
    owner: root
    group: grafana
    mode: "0640"
  notify: restart grafana-clickhouse-spiffe-helper

- name: Deploy Grafana dashboard provider
  ansible.builtin.template:
    src: dashboards-provider.yml.j2
    dest: "{{ grafana_provisioning_dir }}/dashboards/verself.yml"
    owner: root
    group: grafana
    mode: "0640"
  notify: restart grafana

- name: Set expected Grafana dashboard filenames
  ansible.builtin.set_fact:
    grafana_dashboard_filenames: >-
      {{ grafana_dashboards | map(attribute='uid') | map('regex_replace', '$', '.json') | list }}

- name: List existing provisioned Grafana dashboards
  ansible.builtin.find:
    paths: "{{ grafana_config_dir }}/dashboards"
    patterns: "*.json"
    file_type: file
  register: grafana_existing_dashboard_files

- name: Remove stale provisioned Grafana dashboards
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ grafana_existing_dashboard_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: (item.path | basename) not in grafana_dashboard_filenames
  notify: restart grafana

- name: Deploy Grafana dashboards
  ansible.builtin.template:
    src: dashboard.json.j2
    dest: "{{ grafana_config_dir }}/dashboards/{{ dashboard.uid }}.json"
    owner: root
    group: grafana
    mode: "0640"
  loop: "{{ grafana_dashboards }}"
  loop_control:
    label: "{{ dashboard.title }}"
    loop_var: dashboard
  notify: restart grafana

- name: Deploy Grafana systemd unit
  ansible.builtin.template:
    src: grafana.service.j2
    dest: /etc/systemd/system/grafana.service
    mode: "0644"
  notify: restart grafana

- name: Deploy Grafana ClickHouse SPIFFE helper systemd unit
  ansible.builtin.template:
    src: grafana-clickhouse-spiffe-helper.service.j2
    dest: /etc/systemd/system/grafana-clickhouse-spiffe-helper.service
    mode: "0644"
  notify: restart grafana-clickhouse-spiffe-helper

- name: Apply Grafana unit and config changes before readiness
  ansible.builtin.meta: flush_handlers

- name: Enable and start Grafana ClickHouse SPIFFE helper
  ansible.builtin.systemd:
    name: grafana-clickhouse-spiffe-helper
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start Grafana
  ansible.builtin.systemd:
    name: grafana
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Grafana HTTP health
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.grafana.endpoints.http.address }}/api/health"
    status_code: 200
  register: grafana_health
  until: grafana_health.status == 200
  retries: 30
  delay: 1

- name: Converge Grafana admin password
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/grafana"
      - cli
      - --homepath
      - "{{ grafana_install_dir }}"
      - --config
      - "{{ grafana_config_dir }}/grafana.ini"
      - admin
      - reset-admin-password
      - "{{ grafana_admin_password }}"
  environment:
    GF_DATABASE_PASSWORD: "{{ grafana_db_password }}"
    GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
    GF_SECURITY_SECRET_KEY: "{{ grafana_secret_key }}"
  changed_when: false
  no_log: true
