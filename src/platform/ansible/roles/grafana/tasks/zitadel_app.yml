---
# Create a confidential Zitadel OIDC app for Grafana's generic OAuth provider.

- name: Wait for Zitadel readiness
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/healthz"
    status_code: 200
  register: grafana_zitadel_health
  until: grafana_zitadel_health.status == 200
  retries: 30
  delay: 2

- name: Read Zitadel admin PAT
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: grafana_zitadel_pat_raw
  no_log: true

- name: Set Zitadel PAT fact
  ansible.builtin.set_fact:
    grafana_zitadel_pat: "{{ grafana_zitadel_pat_raw.content | b64decode | trim }}"
  no_log: true

- name: List Zitadel projects for Grafana auth
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ grafana_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ grafana_auth_project_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
    return_content: true
  register: grafana_zitadel_projects
  no_log: true

- name: Find Grafana auth project
  ansible.builtin.set_fact:
    grafana_auth_project: "{{ grafana_zitadel_projects.json.result | default([]) | first | default({}) }}"
  no_log: true

- name: Create Grafana auth project if missing
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ grafana_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      name: "{{ grafana_auth_project_name }}"
      projectRoleAssertion: false
      projectRoleCheck: false
    status_code: 200
    return_content: true
  register: grafana_auth_project_created
  when: grafana_auth_project == {}
  no_log: true

- name: Set Grafana auth project ID fact
  ansible.builtin.set_fact:
    grafana_auth_project_id: >-
      {{
        grafana_auth_project.id
        | default(grafana_auth_project_created.json.id, true)
      }}
  no_log: true

- name: Assert Grafana auth project ID is set
  ansible.builtin.assert:
    that: grafana_auth_project_id | default('', true) | length > 0
    fail_msg: grafana_auth_project_id could not be resolved from Zitadel.

- name: Search for existing Grafana app in project
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ grafana_auth_project_id }}/apps/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ grafana_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ grafana_auth_app_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
  register: grafana_app_search
  no_log: true

- name: Check Grafana OIDC cutover marker
  ansible.builtin.stat:
    path: "{{ grafana_credstore_dir }}/oidc-cutover"
  register: grafana_oidc_cutover_marker

- name: Check Grafana OIDC client secret file
  ansible.builtin.stat:
    path: "{{ grafana_credstore_dir }}/oidc-client-secret"
  register: grafana_oidc_secret_file

- name: Set existing Grafana app facts
  ansible.builtin.set_fact:
    grafana_existing_app: "{{ grafana_app_search.json.result | default([]) | first | default({}) }}"
    grafana_app_exists: "{{ grafana_app_search.json.result is defined and grafana_app_search.json.result | length > 0 }}"
    grafana_app_id: "{{ (grafana_app_search.json.result | default([]) | first | default({})).id | default('') }}"
    grafana_oidc_client_id: "{{ (grafana_app_search.json.result | default([]) | first | default({})).oidcConfig.clientId | default('') }}"
    grafana_app_requires_recreate: >-
      {{
        (
          grafana_app_search.json.result is defined
          and grafana_app_search.json.result | length > 0
        )
        and
        (
          not grafana_oidc_cutover_marker.stat.exists
          or not grafana_oidc_secret_file.stat.exists
          or (
            (grafana_app_search.json.result | default([]) | first | default({})).oidcConfig.authMethodType
            | default('')
          ) != 'OIDC_AUTH_METHOD_TYPE_POST'
          or (
            ((grafana_app_search.json.result | default([]) | first | default({})).oidcConfig.redirectUris
            | default([]) | sort)
            != ([grafana_oidc_redirect_uri] | sort)
          )
          or (
            ((grafana_app_search.json.result | default([]) | first | default({})).oidcConfig.responseTypes
            | default([]) | sort)
            != (['OIDC_RESPONSE_TYPE_CODE'] | sort)
          )
          or (
            ((grafana_app_search.json.result | default([]) | first | default({})).oidcConfig.grantTypes
            | default([]) | sort)
            != (['OIDC_GRANT_TYPE_AUTHORIZATION_CODE', 'OIDC_GRANT_TYPE_REFRESH_TOKEN'] | sort)
          )
          or (
            ((grafana_app_search.json.result | default([]) | first | default({})).oidcConfig.postLogoutRedirectUris
            | default([]) | sort)
            != ([grafana_oidc_post_logout_redirect_uri] | sort)
          )
          or (
            (grafana_app_search.json.result | default([]) | first | default({})).oidcConfig.accessTokenType
            | default('')
          ) != 'OIDC_TOKEN_TYPE_JWT'
        )
      }}
  no_log: true

- name: Remove incompatible Grafana OIDC application
  ansible.builtin.uri:
    url: >-
      http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{
      grafana_auth_project_id }}/apps/{{ grafana_app_id }}
    method: DELETE
    headers:
      Authorization: "Bearer {{ grafana_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    status_code: 200
  when:
    - grafana_app_exists | bool
    - grafana_app_requires_recreate | default(false) | bool
    - grafana_app_id | default('', true) | length > 0
  no_log: true

- name: Create Grafana OIDC application
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ grafana_auth_project_id }}/apps/oidc"
    method: POST
    headers:
      Authorization: "Bearer {{ grafana_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      name: "{{ grafana_auth_app_name }}"
      redirectUris:
        - "{{ grafana_oidc_redirect_uri }}"
      responseTypes:
        - "OIDC_RESPONSE_TYPE_CODE"
      grantTypes:
        - "OIDC_GRANT_TYPE_AUTHORIZATION_CODE"
        - "OIDC_GRANT_TYPE_REFRESH_TOKEN"
      appType: "OIDC_APP_TYPE_WEB"
      authMethodType: "OIDC_AUTH_METHOD_TYPE_POST"
      postLogoutRedirectUris:
        - "{{ grafana_oidc_post_logout_redirect_uri }}"
      devMode: false
      accessTokenType: "OIDC_TOKEN_TYPE_JWT"
    status_code: 200
    return_content: true
  register: grafana_app_created
  when: >-
    not grafana_app_exists | bool
    or grafana_app_requires_recreate | default(false) | bool
  no_log: true

- name: Set created Grafana app credentials
  ansible.builtin.set_fact:
    grafana_app_id: "{{ grafana_app_created.json.appId }}"
    grafana_oidc_client_id: "{{ grafana_app_created.json.clientId }}"
    grafana_oidc_client_secret: "{{ grafana_app_created.json.clientSecret }}"
  when: grafana_app_created is not skipped
  no_log: true

- name: Re-query Grafana OIDC application
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ grafana_auth_project_id }}/apps/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ grafana_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ grafana_auth_app_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
  register: grafana_final_app_search
  when: grafana_app_created is skipped
  no_log: true

- name: Set final Grafana app facts
  ansible.builtin.set_fact:
    grafana_app_id: "{{ (grafana_final_app_search.json.result | default([]) | first | default({})).id | default('') }}"
    grafana_oidc_client_id: "{{ (grafana_final_app_search.json.result | default([]) | first | default({})).oidcConfig.clientId | default('') }}"
  when: grafana_app_created is skipped and grafana_final_app_search is not skipped
  no_log: true

- name: Read stored Grafana client secret
  ansible.builtin.slurp:
    src: "{{ grafana_credstore_dir }}/oidc-client-secret"
  register: grafana_stored_secret_raw
  when:
    - grafana_app_created is skipped
    - grafana_oidc_secret_file.stat.exists
  no_log: true

- name: Set stored Grafana client secret fact
  ansible.builtin.set_fact:
    grafana_oidc_client_secret: "{{ grafana_stored_secret_raw.content | b64decode | trim }}"
  when:
    - grafana_app_created is skipped
    - grafana_oidc_secret_file.stat.exists
  no_log: true

- name: Assert Grafana OIDC credentials are set
  ansible.builtin.assert:
    that:
      - grafana_app_id | default('', true) | length > 0
      - grafana_oidc_client_id | default('', true) | length > 0
      - grafana_oidc_client_secret | default('', true) | length > 0
    fail_msg: Grafana OIDC app credentials could not be resolved.

- name: Store Grafana OIDC client ID
  ansible.builtin.copy:
    dest: "{{ grafana_credstore_dir }}/oidc-client-id"
    content: "{{ grafana_oidc_client_id }}\n"
    owner: root
    group: grafana
    mode: "0640"
  no_log: true

- name: Store Grafana OIDC client secret
  ansible.builtin.copy:
    dest: "{{ grafana_credstore_dir }}/oidc-client-secret"
    content: "{{ grafana_oidc_client_secret }}"
    owner: root
    group: grafana
    mode: "0640"
  no_log: true

- name: Persist Grafana OIDC cutover marker
  ansible.builtin.copy:
    dest: "{{ grafana_credstore_dir }}/oidc-cutover"
    owner: root
    group: grafana
    mode: "0640"
    content: |
      app_id={{ grafana_app_id }}
      client_id={{ grafana_oidc_client_id }}
      redirect_uri={{ grafana_oidc_redirect_uri }}
      auth_method=OIDC_AUTH_METHOD_TYPE_POST
  no_log: true
