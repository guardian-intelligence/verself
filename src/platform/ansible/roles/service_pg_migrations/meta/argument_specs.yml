---
argument_specs:
  main:
    short_description: Apply Postgres migrations for one service.
    description:
      - >-
        Hashes the caller's `.up.sql` files, compares against the fingerprint
        stored on the target at
        `{{ service_pg_migrations_staging_root }}/{{ service_pg_migrations_service }}-migrations/.applied-hash`,
        and runs the reset + replay block when drift is detected or the
        `force_reset` flag is set. Optional `pre_reset_tasks` and
        `post_reset_tasks` include hooks let the caller export/restore data
        that survives the schema wipe.
    options:
      service_pg_migrations_service:
        type: str
        required: true
        description: Service name (used for the staging directory name).
      service_pg_migrations_db:
        type: str
        required: true
      service_pg_migrations_db_user:
        type: str
        required: true
      service_pg_migrations_db_password:
        type: str
        required: true
        description: Password for the service role (used with PGPASSWORD).
      service_pg_migrations_db_owner:
        type: str
        required: true
        description: Role that will own the database after reset.
      service_pg_migrations_source_dir:
        type: str
        required: true
        description: Absolute path to the directory containing NNN_*.up.sql.
      service_pg_migrations_probe_table:
        type: str
        required: true
      service_pg_migrations_stop_units:
        type: list
        elements: str
        required: true
      service_pg_migrations_force_reset:
        type: bool
        default: false
      service_pg_migrations_pre_reset_tasks:
        type: str
        default: ""
        description: Absolute path to a tasks file to include after the migrations directory is staged and before the db reset.
      service_pg_migrations_post_reset_tasks:
        type: str
        default: ""
        description: Absolute path to a tasks file to include after the db reset and before migration files are applied.
      service_pg_migrations_staging_root:
        type: str
        default: /opt/forge-metal
