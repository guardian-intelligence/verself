---
dependencies: []

galaxy_info:
  author: verself
  description: >-
    Apply Postgres migrations for a Go service — hash the local .up.sql
    set, compare against the fingerprint on the target, reset + replay if
    drift is detected. Optional pre/post-reset include hooks let callers
    export/restore data that survives the wipe.
  role_name: service_pg_migrations
  license: UNLICENSED
  min_ansible_version: "2.18"
  platforms:
    - name: Ubuntu
      versions:
        - noble
  galaxy_tags:
    - postgresql
    - migrations
