---
# Required by callers:
# service_pg_migrations_service: e.g. "billing-service"
# service_pg_migrations_db: e.g. "billing"
# service_pg_migrations_db_user: e.g. "billing"
# service_pg_migrations_db_password: e.g. "{{ postgresql_billing_password }}"
# service_pg_migrations_source_dir: e.g. "{{ playbook_dir }}/../../../billing-service/migrations"
# service_pg_migrations_probe_table: e.g. "orgs"
# service_pg_migrations_stop_units: list of systemd unit names passed to postgresql_db_reset
# service_pg_migrations_db_owner: owner for the database (typically same as db_user)

# Optional:
service_pg_migrations_force_reset: false
service_pg_migrations_pre_reset_tasks: ""
service_pg_migrations_post_reset_tasks: ""
service_pg_migrations_staging_root: /opt/verself
