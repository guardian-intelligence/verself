---
- name: Apply mailbox-service PostgreSQL migrations
  ansible.builtin.include_role:
    name: service_pg_migrations
  vars:
    service_pg_migrations_service: mailbox-service
    service_pg_migrations_db: mailbox_service
    service_pg_migrations_db_user: mailbox_service
    service_pg_migrations_db_owner: mailbox_service
    service_pg_migrations_db_password: "{{ postgresql_mailbox_service_password }}"
    service_pg_migrations_source_dir: "{{ playbook_dir }}/../../../mailbox-service/migrations"
    service_pg_migrations_probe_table: mailbox_accounts
    service_pg_migrations_stop_units:
      - mailbox-service
      - electric-mail
    service_pg_migrations_force_reset: "{{ mailbox_service_force_schema_reset | default(false) | bool }}"

- name: Reconcile mailbox-service object ownership and privileges
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres
      -d mailbox_service
      -v ON_ERROR_STOP=1
    stdin: |
      -- Electric Mail must own shape tables; mailbox_service writes via explicit table grants.
      DO $$
      BEGIN
        IF to_regclass('public.mailbox_bindings') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.mailbox_bindings OWNER TO mailbox_service';
        END IF;
        IF to_regclass('public.sync_state') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.sync_state OWNER TO mailbox_service';
        END IF;
      END
      $$;
      GRANT USAGE, CREATE ON SCHEMA public TO mailbox_service;
      GRANT ALL PRIVILEGES ON TABLE
        public.mailbox_accounts,
        public.mailbox_bindings,
        public.sync_state,
        public.mailboxes,
        public.emails,
        public.email_mailboxes,
        public.email_bodies,
        public.threads
      TO mailbox_service;
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  changed_when: false
  no_log: true
