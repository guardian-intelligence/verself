---
- name: Create credstore directory for mailbox-service
  ansible.builtin.file:
    path: /etc/credstore/mailbox-service
    state: directory
    owner: root
    group: mailbox_service
    mode: "0750"

- name: Deploy Resend API key credential for mailbox-service
  ansible.builtin.copy:
    content: "{{ resend_api_key }}"
    dest: /etc/credstore/mailbox-service/resend-api-key
    owner: root
    group: mailbox_service
    mode: "0640"
  no_log: true
  notify: restart mailbox-service

- name: Deploy mailbox-service PG DSN credential
  vars:
    mailbox_service_pg_dsn: >-
      postgres://mailbox_service:{{ postgresql_mailbox_service_password
      }}@{{ services.postgresql.host }}:{{ services.postgresql.port
      }}/mailbox_service?sslmode=disable
  ansible.builtin.copy:
    content: "{{ mailbox_service_pg_dsn }}"
    dest: /etc/credstore/mailbox-service/pg-dsn
    owner: root
    group: mailbox_service
    mode: "0640"
  no_log: true
  notify: restart mailbox-service

- name: Deploy Stalwart admin password credential for mailbox-service
  ansible.builtin.copy:
    content: "{{ stalwart_admin_password }}"
    dest: /etc/credstore/mailbox-service/stalwart-admin-password
    owner: root
    group: mailbox_service
    mode: "0640"
  no_log: true
  notify: restart mailbox-service

- name: Deploy Stalwart ceo password credential
  ansible.builtin.copy:
    content: "{{ stalwart_ceo_password }}"
    dest: /etc/credstore/mailbox-service/stalwart-ceo-password
    owner: root
    group: mailbox_service
    mode: "0640"
  no_log: true
  notify: restart mailbox-service

- name: Deploy Stalwart agents password credential
  ansible.builtin.copy:
    content: "{{ stalwart_agents_password }}"
    dest: /etc/credstore/mailbox-service/stalwart-agents-password
    owner: root
    group: mailbox_service
    mode: "0640"
  no_log: true
  notify: restart mailbox-service

- name: Deploy forward-to credential for mailbox-service
  ansible.builtin.copy:
    content: "{{ stalwart_operator_forward_to }}"
    dest: /etc/credstore/mailbox-service/forward-to
    owner: root
    group: mailbox_service
    mode: "0640"
  no_log: true
  notify: restart mailbox-service

- name: Remove legacy credential files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/credstore/mailbox-service/ceo-password
    - /etc/credstore/mailbox-service/stalwart-agent-password
    - /etc/credstore/mailbox-service/stalwart-mailbox-password
    - /etc/credstore/inbound-mail-forwarder
  notify: restart mailbox-service
