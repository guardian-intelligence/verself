---
- name: Create credstore directory for mailbox-service
  ansible.builtin.file:
    path: /etc/credstore/mailbox-service
    state: directory
    owner: root
    group: mailbox_service
    mode: "0750"

- name: Deploy Resend API key credential for mailbox-service
  ansible.builtin.copy:
    content: "{{ resend_api_key }}"
    dest: /etc/credstore/mailbox-service/resend-api-key
    owner: root
    group: mailbox_service
    mode: "0640"
  no_log: true
  notify: restart mailbox-service

- name: Check legacy inbound-mail ceo-password credential
  ansible.builtin.stat:
    path: /etc/credstore/inbound-mail-forwarder/ceo-password
  register: mailbox_service_legacy_ceo_password
  no_log: true

- name: Check mailbox-service ceo-password credential
  ansible.builtin.stat:
    path: /etc/credstore/mailbox-service/ceo-password
  register: mailbox_service_ceo_password
  no_log: true

- name: Migrate legacy ceo-password credential to mailbox-service
  ansible.builtin.copy:
    src: /etc/credstore/inbound-mail-forwarder/ceo-password
    dest: /etc/credstore/mailbox-service/ceo-password
    remote_src: true
    owner: root
    group: mailbox_service
    mode: "0640"
  when:
    - mailbox_service_legacy_ceo_password.stat.exists
    - not mailbox_service_ceo_password.stat.exists
  no_log: true
  notify: restart mailbox-service

- name: Create empty ceo-password credential placeholder
  ansible.builtin.copy:
    content: ""
    dest: /etc/credstore/mailbox-service/ceo-password
    owner: root
    group: mailbox_service
    mode: "0640"
    force: false
  when:
    - not mailbox_service_legacy_ceo_password.stat.exists
    - not mailbox_service_ceo_password.stat.exists
  no_log: true
  notify: restart mailbox-service

- name: Check legacy inbound-mail forward target credential
  ansible.builtin.stat:
    path: /etc/credstore/inbound-mail-forwarder/forward-to
  register: mailbox_service_legacy_forward_to
  no_log: true

- name: Check mailbox-service forward target credential
  ansible.builtin.stat:
    path: /etc/credstore/mailbox-service/forward-to
  register: mailbox_service_forward_to
  no_log: true

- name: Migrate legacy forward target credential to mailbox-service
  ansible.builtin.copy:
    src: /etc/credstore/inbound-mail-forwarder/forward-to
    dest: /etc/credstore/mailbox-service/forward-to
    remote_src: true
    owner: root
    group: mailbox_service
    mode: "0640"
  when:
    - mailbox_service_legacy_forward_to.stat.exists
    - not mailbox_service_forward_to.stat.exists
  no_log: true
  notify: restart mailbox-service

- name: Create empty forward target credential placeholder
  ansible.builtin.copy:
    content: ""
    dest: /etc/credstore/mailbox-service/forward-to
    owner: root
    group: mailbox_service
    mode: "0640"
    force: false
  when:
    - not mailbox_service_legacy_forward_to.stat.exists
    - not mailbox_service_forward_to.stat.exists
  no_log: true
  notify: restart mailbox-service
