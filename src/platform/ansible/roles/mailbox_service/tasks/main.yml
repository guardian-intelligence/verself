---
- name: Verify mailbox-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/mailbox-service"
  register: mailbox_service_binary
  failed_when: not mailbox_service_binary.stat.exists

- name: Create mailbox_service system group
  ansible.builtin.group:
    name: mailbox_service
    system: true

- name: Ensure spire workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create mailbox_service system user
  ansible.builtin.user:
    name: mailbox_service
    group: mailbox_service
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Deploy mailbox-service nftables ruleset
  ansible.builtin.template:
    src: mailbox-service.nft.j2
    dest: /etc/nftables.d/mailbox-service.nft
    mode: "0644"
  notify: reload nftables

- name: Apply mailbox-service nftables before proceeding
  ansible.builtin.meta: flush_handlers

- name: Include mailbox-service PostgreSQL database tasks
  ansible.builtin.include_tasks: database.yml

- name: Include mailbox-service PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

- name: Include mailbox-service credential tasks
  ansible.builtin.include_tasks: credentials.yml

- name: Create mailbox-service state directory
  ansible.builtin.file:
    path: /var/lib/mailbox-service
    state: directory
    owner: mailbox_service
    group: mailbox_service
    mode: "0750"

- name: Check mailbox-service state file
  ansible.builtin.stat:
    path: /var/lib/mailbox-service/forwarder-state.json
  register: mailbox_service_state

- name: Wait for Zitadel before configuring mailbox-service auth
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.zitadel.host }}"
    port: "{{ topology_endpoints.zitadel.endpoints.http.port }}"
    timeout: 60

- name: Read Zitadel admin PAT for mailbox-service auth setup
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: mailbox_service_zitadel_admin_pat_raw
  no_log: true

- name: List Zitadel projects for mailbox-service auth
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ mailbox_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body: {}
    return_content: true
  register: mailbox_service_zitadel_projects
  no_log: true

- name: Find mailbox-service auth project
  ansible.builtin.set_fact:
    mailbox_service_auth_project: >-
      {{
        (
          mailbox_service_zitadel_projects.json.result
          | selectattr('name', 'equalto', mailbox_service_auth_project_name)
          | list
          | first
        ) | default({})
      }}

- name: Create mailbox-service auth project if missing
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ mailbox_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ mailbox_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    return_content: true
  register: mailbox_service_auth_project_created
  when: mailbox_service_auth_project == {}
  no_log: true

- name: Set mailbox-service auth audience
  ansible.builtin.set_fact:
    mailbox_service_auth_audience: >-
      {{
        mailbox_service_auth_project.id
        | default(mailbox_service_auth_project_created.json.id, true)
      }}

- name: Assert mailbox-service auth audience is set
  ansible.builtin.assert:
    that: mailbox_service_auth_audience | default('', true) | length > 0
    fail_msg: mailbox_service_auth_audience could not be resolved from Zitadel.

- name: Ensure mailbox-service project has role assertion enabled
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/{{ mailbox_service_auth_audience }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ mailbox_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ mailbox_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    status_code: 200
  when: mailbox_service_auth_project != {}
  no_log: true

- name: Ensure mailbox-service project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ mailbox_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
    zitadel_project_roles_project_id: "{{ mailbox_service_auth_audience }}"
    zitadel_project_roles_definitions:
      - key: mailbox_user
        display_name: Mailbox User
        group: mailbox
  when: mailbox_service_auth_audience | default('', true) | length > 0

- name: Deploy mailbox-service systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Mailbox Service
      After=verself-firewall.target network.target postgresql.service stalwart.service zitadel.service spire-agent.service secrets-service.service
      Requires=verself-firewall.target
      Wants=postgresql.service stalwart.service zitadel.service spire-agent.service secrets-service.service

      [Service]
      Type=simple
      User=mailbox_service
      Group=mailbox_service
      SupplementaryGroups={{ spire_workload_group }}
      BindReadOnlyPaths=/etc/verself/auth-discovery-hosts:/etc/hosts
      LoadCredential=stalwart-ceo-password:/etc/credstore/mailbox-service/stalwart-ceo-password
      LoadCredential=stalwart-agents-password:/etc/credstore/mailbox-service/stalwart-agents-password
      LoadCredential=forward-to:/etc/credstore/mailbox-service/forward-to
      Environment=MAILBOX_SERVICE_LISTEN_ADDR={{ topology_endpoints.mailbox_service.endpoints.public_http.address }}
      Environment=MAILBOX_SERVICE_PG_DSN=postgres://mailbox_service@/mailbox_service?host=/var/run/postgresql&sslmode=disable
      Environment=MAILBOX_SERVICE_STALWART_BASE_URL=http://{{ topology_endpoints.stalwart.endpoints.http.address }}
      Environment=MAILBOX_SERVICE_STALWART_PUBLIC_BASE_URL=https://{{ stalwart_domain }}
      Environment=MAILBOX_SERVICE_STALWART_MAILBOX=ceo
      Environment=MAILBOX_SERVICE_STALWART_LOCAL_DOMAIN={{ verself_domain }}
      Environment=MAILBOX_SERVICE_SECRETS_URL=https://{{ topology_endpoints.secrets_service.endpoints.internal_https.address }}
      Environment=MAILBOX_SERVICE_SYNC_DISCOVERY_INTERVAL=2m
      Environment=MAILBOX_SERVICE_SYNC_RECONCILE_INTERVAL=10m
      Environment=MAILBOX_SERVICE_AUTH_ISSUER_URL={{ mailbox_service_auth_issuer_url }}
      Environment=MAILBOX_SERVICE_AUTH_AUDIENCE={{ mailbox_service_auth_audience }}
      Environment=MAILBOX_SERVICE_FORWARDER_FROM_ADDRESS={{ resend_sender_address }}
      Environment=MAILBOX_SERVICE_FORWARDER_FROM_NAME={{ resend_sender_name }}
      Environment=MAILBOX_SERVICE_FORWARDER_POLL_INTERVAL=5s
      Environment=MAILBOX_SERVICE_FORWARDER_STATE_PATH=/var/lib/mailbox-service/forwarder-state.json
      Environment=SPIFFE_ENDPOINT_SOCKET=unix://{{ spire_agent_socket_path }}
      Environment=OTEL_EXPORTER_OTLP_ENDPOINT=http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}
      ExecStart={{ verself_bin }}/mailbox-service
      Restart=always
      RestartSec=5
      ProtectSystem=strict
      ProtectHome=true
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectControlGroups=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictNamespaces=true
      LockPersonality=true
      ReadWritePaths=/var/lib/mailbox-service
      PrivateTmp=true

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/mailbox-service.service
    mode: "0644"
  notify: restart mailbox-service

- name: Apply mailbox-service unit changes before proceeding
  ansible.builtin.meta: flush_handlers

- name: Enable and start mailbox-service
  ansible.builtin.systemd:
    name: mailbox-service
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for mailbox-service listener to be present
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.mailbox_service.host }}"
    port: "{{ topology_endpoints.mailbox_service.endpoints.public_http.port }}"
    timeout: 60

- name: Wait for mailbox-service readiness
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.mailbox_service.endpoints.public_http.address }}/readyz"
    method: GET
    status_code: 200
  register: mailbox_service_readyz
  retries: 30
  delay: 1
  until: mailbox_service_readyz.status == 200
