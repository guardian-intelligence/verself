---
argument_specs:
  main:
    short_description: "Firecracker host setup: KVM, jailer, golden zvol, vm-orchestrator"
    description:
      - "Installs Firecracker + jailer from guest/versions.json, configures KVM,"
      - "creates the jailer user/group, sets up the golden zvol lifecycle,"
      - "builds and deploys vm-orchestrator, and verifies guest artifacts."
    options:
      firecracker_zfs_pool:
        type: str
        default: vspool
        description: "ZFS pool for golden zvols and ephemeral VM job clones."

      firecracker_golden_zvol:
        type: str
        default: golden-zvol
        description: "Name of the golden zvol within firecracker_zfs_pool."

      firecracker_golden_zvol_size:
        type: str
        default: "8G"
        description: "Size of the golden zvol. Must include unit (e.g. 4G, 8G)."

      firecracker_image_dataset:
        type: str
        default: images
        description: "ZFS dataset under firecracker_zfs_pool for composable image zvols."

      firecracker_viteplus_image_ref:
        type: str
        default: viteplus
        description: "Composable image reference for the Vite+ toolchain zvol."

      firecracker_viteplus_zvol_size:
        type: str
        default: "1G"
        description: "Size of the Vite+ toolchain zvol. Must include unit (e.g. 1G)."

      firecracker_viteplus_image_path:
        type: path
        default: /var/lib/verself/guest-artifacts/viteplus.ext4
        description: "Path to the Vite+ ext4 image staged by build-guest-rootfs.sh."

      firecracker_viteplus_hash_record:
        type: path
        default: /var/lib/verself/guest-artifacts/viteplus-zvol.sha256
        description: "File recording the SHA256 of the Vite+ image written to the composable zvol."

      firecracker_sticky_empty_image_ref:
        type: str
        default: sticky-empty
        description: "Composable image reference for an empty writable sticky disk base zvol."

      firecracker_sticky_empty_zvol_size:
        type: str
        default: "8G"
        description: "Size of each sticky disk zvol generation. Must include unit (e.g. 8G)."

      firecracker_workload_dataset:
        type: str
        default: workloads
        description: "ZFS dataset under firecracker_zfs_pool for ephemeral VM job clones."

      firecracker_jailer_root:
        type: path
        default: /srv/jailer
        description: "Root directory for Firecracker jailer chroots."

      firecracker_jailer_uid:
        type: int
        default: 10000
        description: "UID for the jailer system user. Must be a positive integer."

      firecracker_jailer_gid:
        type: int
        default: 10000
        description: "GID for the jailer system group. Must be a positive integer."

      firecracker_jailer_user:
        type: str
        default: firecracker
        description: "System username for the jailer process."

      firecracker_kernel_path:
        type: path
        default: /var/lib/verself/guest-artifacts/vmlinux
        description: "Path to the guest kernel. Pre-staged by build-guest-rootfs.sh."

      firecracker_rootfs_path:
        type: path
        default: /var/lib/verself/guest-artifacts/rootfs.ext4
        description: "Path to the guest ext4 rootfs. Pre-staged by build-guest-rootfs.sh."

      firecracker_guest_artifact_manifest_path:
        type: path
        default: /var/lib/verself/guest-artifacts/guest-artifacts.json
        description: "Path to the guest artifact manifest JSON."

      firecracker_rootfs_hash_record:
        type: path
        default: /var/lib/verself/guest-artifacts/golden-zvol.rootfs.sha256
        description: "File recording the SHA256 of the rootfs written to the golden zvol."

      firecracker_refresh_base_golden:
        type: bool
        default: false
        description: >-
          Force golden zvol refresh even if the rootfs hash matches.
          WARNING: destroys ephemeral VM job clones.

      firecracker_zfs_arc_max_bytes:
        type: int
        default: 8589934592
        description: "ZFS ARC max size in bytes (default 8 GiB). Prevents VM OOM."

      firecracker_guest_pool_cidr:
        type: str
        default: "172.16.0.0/16"
        description: "CIDR block for guest VM IP allocation."

      firecracker_state_db_path:
        type: path
        default: /var/lib/verself/vm-orchestrator/state.db
        description: "SQLite WAL ledger path for vm-orchestrator host runs and network slots."

      firecracker_host_uplink_interface:
        type: str
        default: ""
        description: "Host network interface for guest NAT. Auto-detected if empty."

      firecracker_host_service_interface:
        type: str
        default: verself-host0
        description: "Dummy host-only interface exposing selected platform services to Firecracker guests."

      firecracker_host_service_ip:
        type: str
        default: "10.255.0.1"
        description: "Host-only IPv4 address exposed on firecracker_host_service_interface."

      firecracker_vm_orchestrator_binary_path:
        type: path
        default: /usr/local/bin/vm-orchestrator
        description: "Install path for the vm-orchestrator host daemon binary."

      firecracker_vm_orchestrator_api_socket:
        type: path
        default: /run/vm-orchestrator/api.sock
        description: "Unix domain socket for the vm-orchestrator API."

      firecracker_vm_orchestrator_socket_group:
        type: str
        default: vm-clients
        description: "System group granted rw access to the vm-orchestrator Unix socket."
