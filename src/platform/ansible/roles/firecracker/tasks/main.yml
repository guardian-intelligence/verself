---
# Firecracker host setup: KVM, jailer directories, golden zvol, kernel.
# Guest artifacts (vmlinux, rootfs.ext4) are built by scripts/build-guest-rootfs.sh
# and pre-staged before this role runs.

- name: Load Firecracker version pins from repo
  ansible.builtin.set_fact:
    firecracker_version_pins: "{{ lookup('ansible.builtin.file', playbook_dir + '/../../guest/versions.json') | from_json }}"

- name: Set Firecracker release paths
  ansible.builtin.set_fact:
    firecracker_release_archive: "/tmp/firecracker-{{ firecracker_version_pins.firecracker.version }}-{{ firecracker_version_pins.firecracker.arch }}.tgz"
    firecracker_release_dir: "/tmp/firecracker-release-{{ firecracker_version_pins.firecracker.version }}-{{ firecracker_version_pins.firecracker.arch }}"

- name: Download pinned Firecracker release archive
  ansible.builtin.get_url:
    url: "{{ firecracker_version_pins.firecracker.url }}"
    dest: "{{ firecracker_release_archive }}"
    checksum: "sha256:{{ firecracker_version_pins.firecracker.sha256 }}"
    mode: "0644"

- name: Create Firecracker extraction directory
  ansible.builtin.file:
    path: "{{ firecracker_release_dir }}"
    state: directory
    mode: "0755"

- name: Extract Firecracker release archive
  ansible.builtin.unarchive:
    src: "{{ firecracker_release_archive }}"
    dest: "{{ firecracker_release_dir }}"
    remote_src: true

- name: Install pinned Firecracker binary
  ansible.builtin.copy:
    src: >-
      {{
        firecracker_release_dir
        ~ '/release-v'
        ~ firecracker_version_pins.firecracker.version
        ~ '-'
        ~ firecracker_version_pins.firecracker.arch
        ~ '/firecracker-v'
        ~ firecracker_version_pins.firecracker.version
        ~ '-'
        ~ firecracker_version_pins.firecracker.arch
      }}
    dest: /usr/local/bin/firecracker
    remote_src: true
    owner: root
    group: root
    mode: "0755"

- name: Install pinned jailer binary
  ansible.builtin.copy:
    src: >-
      {{
        firecracker_release_dir
        ~ '/release-v'
        ~ firecracker_version_pins.firecracker.version
        ~ '-'
        ~ firecracker_version_pins.firecracker.arch
        ~ '/jailer-v'
        ~ firecracker_version_pins.firecracker.version
        ~ '-'
        ~ firecracker_version_pins.firecracker.arch
      }}
    dest: /usr/local/bin/jailer
    remote_src: true
    owner: root
    group: root
    mode: "0755"

- name: Verify installed Firecracker version
  ansible.builtin.command: /usr/local/bin/firecracker --version
  register: firecracker_installed_version
  changed_when: false
  failed_when: "'v' + firecracker_version_pins.firecracker.version not in firecracker_installed_version.stdout"

# --- KVM ---

- name: Detect KVM module for CPU vendor
  ansible.builtin.set_fact:
    firecracker_kvm_module: >-
      {{
        'kvm_amd'
        if 'AuthenticAMD' in (ansible_facts.processor | default([]) | join(' '))
        else 'kvm_intel'
      }}

# modprobe can return non-zero when KVM is built-in (not a loadable module);
# we rely on the /dev/kvm stat below as the real check.
- name: Ensure KVM module is loaded ({{ firecracker_kvm_module }})
  community.general.modprobe:
    name: "{{ firecracker_kvm_module }}"
    state: present
  failed_when: false

- name: Verify /dev/kvm exists
  ansible.builtin.stat:
    path: /dev/kvm
  register: firecracker_dev_kvm

- name: Fail if KVM is not available
  ansible.builtin.fail:
    msg: >-
      /dev/kvm does not exist. Detected CPU vendor → {{ firecracker_kvm_module }}.
      Ensure KVM is enabled in BIOS and the correct module is loadable.
  when: not firecracker_dev_kvm.stat.exists

# --- ZFS ARC tuning ---

- name: Set ZFS ARC max to prevent VM OOM
  ansible.builtin.copy:
    content: "options zfs zfs_arc_max={{ firecracker_zfs_arc_max_bytes }}\n"
    dest: /etc/modprobe.d/zfs-arc.conf
    mode: "0644"
  notify: rebuild initramfs

# --- Jailer user and directories ---

- name: Create firecracker group
  ansible.builtin.group:
    name: "{{ firecracker_jailer_user }}"
    gid: "{{ firecracker_jailer_gid }}"
    state: present

- name: Create vm-orchestrator client group
  ansible.builtin.group:
    name: "{{ firecracker_vm_orchestrator_socket_group }}"
    system: true
    state: present

- name: Create firecracker user
  ansible.builtin.user:
    name: "{{ firecracker_jailer_user }}"
    uid: "{{ firecracker_jailer_uid }}"
    group: "{{ firecracker_jailer_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: false

- name: Create jailer root directory
  ansible.builtin.file:
    path: "{{ firecracker_jailer_root }}"
    state: directory
    mode: "0755"

- name: Create guest artifact directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /var/lib/verself
    - /var/lib/verself/guest-artifacts
    - /var/lib/verself/guest-artifacts/net
    - "{{ firecracker_state_db_path | dirname }}"

- name: Ensure vm-orchestrator state directory ownership
  ansible.builtin.file:
    path: "{{ firecracker_state_db_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

# The state ledger shape changed in the VMResources cutover (runtime_profile
# column dropped). vm-orchestrator's ensureLeasesShape will detect the old
# shape and drop the leases/execs/lease_events tables on next start, but we
# wipe the whole file preemptively so a restart cannot race a half-migrated
# schema. In-flight leases would already be marked crashed on service restart
# by markUnownedActiveLeasesCrashed; nothing of value lives in this file.
- name: Wipe pre-vmresources vm-orchestrator state ledger
  ansible.builtin.file:
    path: "{{ firecracker_state_db_path }}"
    state: absent
  notify: restart vm-orchestrator

# --- Host networking (native nftables) ---

- name: Resolve uplink interface for Firecracker NAT
  ansible.builtin.set_fact:
    firecracker_resolved_uplink: >-
      {{ firecracker_host_uplink_interface
         if firecracker_host_uplink_interface != ''
         else ansible_default_ipv4.interface }}

- name: Persist IP forwarding via sysctl
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-verself.conf
    reload: true

- name: Deploy Firecracker nftables ruleset
  ansible.builtin.template:
    src: firecracker-network.nft.j2
    dest: /etc/nftables.d/firecracker.nft
    mode: "0644"
  notify: restart firecracker networking

- name: Install Firecracker host networking setup script
  ansible.builtin.template:
    src: firecracker-network-setup.sh.j2
    dest: /usr/local/bin/verself-firecracker-network-setup
    mode: "0755"
  notify: restart firecracker networking

- name: Install Firecracker host networking service
  ansible.builtin.template:
    src: verself-firecracker-network.service.j2
    dest: /etc/systemd/system/verself-firecracker-network.service
    mode: "0644"
  notify: restart firecracker networking

- name: Ensure Firecracker host networking service is enabled and started
  ansible.builtin.systemd:
    name: verself-firecracker-network.service
    enabled: true
    state: started
    daemon_reload: true

- name: Verify Go is available on controller for vm-orchestrator build
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command: go version
  changed_when: false

- name: Build vm-orchestrator binary on controller
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - go
      - build
      - -ldflags=-s -w
      - -o
      - /tmp/vm-orchestrator
      - ./src/vm-orchestrator/cmd/vm-orchestrator
    chdir: "{{ playbook_dir }}/../../../.."
  changed_when: false

- name: Install vm-orchestrator binary
  ansible.builtin.copy:
    src: /tmp/vm-orchestrator
    dest: "{{ firecracker_vm_orchestrator_binary_path }}"
    owner: root
    group: root
    mode: "0755"
  notify: restart vm-orchestrator

- name: Install vm-orchestrator service
  ansible.builtin.template:
    src: vm-orchestrator.service.j2
    dest: /etc/systemd/system/vm-orchestrator.service
    mode: "0644"
  notify: restart vm-orchestrator

- name: Ensure vm-orchestrator service is enabled and started
  ansible.builtin.systemd:
    name: vm-orchestrator.service
    enabled: true
    state: started
    daemon_reload: true

- name: Flush vm-orchestrator handlers
  ansible.builtin.meta: flush_handlers

- name: Verify vm-orchestrator API socket is present
  ansible.builtin.command: test -S {{ firecracker_vm_orchestrator_api_socket }}
  register: firecracker_vm_orchestrator_socket
  changed_when: false
  retries: 30
  delay: 1
  until: firecracker_vm_orchestrator_socket.rc == 0

- name: Read vm-orchestrator API socket permissions
  ansible.builtin.command: stat -c '%a %G' {{ firecracker_vm_orchestrator_api_socket }}
  register: firecracker_vm_orchestrator_socket_stat
  changed_when: false

- name: Assert vm-orchestrator API socket ACLs
  ansible.builtin.assert:
    that:
      - firecracker_vm_orchestrator_socket_stat.stdout is search('^660 ')
      - firecracker_vm_orchestrator_socket_stat.stdout is search(' ' ~ firecracker_vm_orchestrator_socket_group ~ '$')
    fail_msg: >-
      vm-orchestrator socket must be mode 660 and group {{ firecracker_vm_orchestrator_socket_group }};
      got {{ firecracker_vm_orchestrator_socket_stat.stdout }}.

# --- Guest artifact verification ---
# Artifacts built by scripts/build-guest-rootfs.sh and staged by deploy_guest_artifacts.

- name: Verify guest kernel exists
  ansible.builtin.stat:
    path: "{{ firecracker_kernel_path }}"
    # get_checksum defaults to true, which would sha1 the file. We only need existence + mtime.
    get_checksum: false
  register: firecracker_guest_kernel

- name: Verify guest rootfs exists
  ansible.builtin.stat:
    path: "{{ firecracker_rootfs_path }}"
    # get_checksum defaults to true, which would sha1 the multi-GB rootfs every run (~4s). We only need existence + mtime.
    get_checksum: false
  register: firecracker_guest_rootfs

- name: Verify guest artifact manifest exists
  ansible.builtin.stat:
    path: "{{ firecracker_guest_artifact_manifest_path }}"
    get_checksum: false
  register: firecracker_guest_artifacts

- name: Verify Vite+ composed image exists
  ansible.builtin.stat:
    path: "{{ firecracker_viteplus_image_path }}"
    get_checksum: false
  register: firecracker_viteplus_image

- name: Fail if guest artifacts are missing
  ansible.builtin.fail:
    msg: >
      Guest artifacts not found at {{ firecracker_kernel_path }},
      {{ firecracker_rootfs_path }}, {{ firecracker_viteplus_image_path }},
      and/or {{ firecracker_guest_artifact_manifest_path }}.
      Stage them with: cd ansible && ansible-playbook playbooks/guest-rootfs.yml
  when: >-
    not firecracker_guest_kernel.stat.exists
    or not firecracker_guest_rootfs.stat.exists
    or not firecracker_viteplus_image.stat.exists
    or not firecracker_guest_artifacts.stat.exists

# --- Composable image zvols ---

- name: Ensure composable image dataset exists
  community.general.zfs:
    name: "{{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}"
    state: present

- name: Check if empty sticky disk image zvol exists
  ansible.builtin.command: "zfs list -H {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_sticky_empty_image_ref }}"
  register: firecracker_sticky_empty_zvol_check
  changed_when: false
  failed_when: false

- name: Check if empty sticky disk image snapshot exists
  ansible.builtin.command: "zfs list -H {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_sticky_empty_image_ref }}@ready"
  register: firecracker_sticky_empty_snapshot_check
  changed_when: false
  failed_when: false

- name: Decide whether the empty sticky disk image needs refresh
  ansible.builtin.set_fact:
    firecracker_refresh_sticky_empty_image_needed: >-
      {{
        firecracker_sticky_empty_zvol_check.rc != 0
        or firecracker_sticky_empty_snapshot_check.rc != 0
      }}

- name: Destroy stale empty sticky disk image zvol
  ansible.builtin.command: "zfs destroy -R {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_sticky_empty_image_ref }}"
  register: firecracker_sticky_empty_destroy
  when: firecracker_refresh_sticky_empty_image_needed
  changed_when: firecracker_sticky_empty_destroy.rc == 0
  failed_when:
    - firecracker_sticky_empty_destroy.rc != 0
    - "'dataset does not exist' not in (firecracker_sticky_empty_destroy.stderr | default(''))"

- name: Create empty sticky disk image zvol
  ansible.builtin.command: >
    zfs create -V {{ firecracker_sticky_empty_zvol_size }}
    -o volblocksize=16K
    -o compression=lz4
    {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_sticky_empty_image_ref }}
  when: firecracker_refresh_sticky_empty_image_needed
  changed_when: true

- name: Wait for empty sticky disk image zvol device node
  ansible.builtin.wait_for:
    path: "/dev/zvol/{{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_sticky_empty_image_ref }}"
    state: present
    timeout: 10
  when: firecracker_refresh_sticky_empty_image_needed

- name: Format empty sticky disk image zvol
  ansible.builtin.command: >
    mkfs.ext4 -F -L stickydisk
    /dev/zvol/{{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_sticky_empty_image_ref }}
  when: firecracker_refresh_sticky_empty_image_needed
  changed_when: true

- name: Snapshot empty sticky disk image zvol
  ansible.builtin.command: "zfs snapshot {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_sticky_empty_image_ref }}@ready"
  when: firecracker_refresh_sticky_empty_image_needed
  changed_when: true

- name: Check if Vite+ image zvol exists
  ansible.builtin.command: "zfs list -H {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_viteplus_image_ref }}"
  register: firecracker_viteplus_zvol_check
  changed_when: false
  failed_when: false

- name: Check if Vite+ image snapshot exists
  ansible.builtin.command: "zfs list -H {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_viteplus_image_ref }}@ready"
  register: firecracker_viteplus_snapshot_check
  changed_when: false
  failed_when: false

- name: Stat recorded Vite+ image hash marker
  ansible.builtin.stat:
    path: "{{ firecracker_viteplus_hash_record }}"
    get_checksum: false
  register: firecracker_viteplus_hash_stat

- name: Decide whether the Vite+ image needs refresh
  ansible.builtin.set_fact:
    firecracker_refresh_viteplus_image_needed: >-
      {{
        firecracker_viteplus_zvol_check.rc != 0
        or firecracker_viteplus_snapshot_check.rc != 0
        or not firecracker_viteplus_hash_stat.stat.exists
        or (firecracker_viteplus_image.stat.mtime | float) > (firecracker_viteplus_hash_stat.stat.mtime | default(0) | float)
      }}

- name: Compute Vite+ image checksum
  ansible.builtin.command: "sha256sum {{ firecracker_viteplus_image_path }}"
  register: firecracker_viteplus_image_sha256
  changed_when: false
  when: firecracker_refresh_viteplus_image_needed

- name: Destroy leftover Vite+ staging zvol
  ansible.builtin.command: "zfs destroy -r {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_viteplus_image_ref }}-staging"
  register: firecracker_viteplus_staging_destroy
  when: firecracker_refresh_viteplus_image_needed
  changed_when: firecracker_viteplus_staging_destroy.rc == 0
  failed_when:
    - firecracker_viteplus_staging_destroy.rc != 0
    - "'dataset does not exist' not in (firecracker_viteplus_staging_destroy.stderr | default(''))"

- name: Create Vite+ staging zvol
  ansible.builtin.command: >
    zfs create -V {{ firecracker_viteplus_zvol_size }}
    -o volblocksize=16K
    -o compression=lz4
    {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_viteplus_image_ref }}-staging
  when: firecracker_refresh_viteplus_image_needed
  changed_when: true

- name: Wait for Vite+ staging zvol device node
  ansible.builtin.wait_for:
    path: "/dev/zvol/{{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_viteplus_image_ref }}-staging"
    state: present
    timeout: 10
  when: firecracker_refresh_viteplus_image_needed

- name: Write Vite+ ext4 image to staging zvol
  ansible.builtin.command: >
    dd if={{ firecracker_viteplus_image_path }}
    of=/dev/zvol/{{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_viteplus_image_ref }}-staging
    bs=1M conv=fsync status=progress
  when: firecracker_refresh_viteplus_image_needed
  changed_when: true

- name: Snapshot Vite+ staging zvol
  ansible.builtin.command: "zfs snapshot {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_viteplus_image_ref }}-staging@ready"
  when: firecracker_refresh_viteplus_image_needed
  changed_when: true

- name: Destroy old Vite+ image zvol
  ansible.builtin.command: "zfs destroy -R {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_viteplus_image_ref }}"
  register: firecracker_viteplus_old_destroy
  when: firecracker_refresh_viteplus_image_needed
  changed_when: firecracker_viteplus_old_destroy.rc == 0
  failed_when:
    - firecracker_viteplus_old_destroy.rc != 0
    - "'dataset does not exist' not in (firecracker_viteplus_old_destroy.stderr | default(''))"

- name: Promote Vite+ staging zvol
  ansible.builtin.command: >
    zfs rename
    {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_viteplus_image_ref }}-staging
    {{ firecracker_zfs_pool }}/{{ firecracker_image_dataset }}/{{ firecracker_viteplus_image_ref }}
  when: firecracker_refresh_viteplus_image_needed
  changed_when: true

- name: Record Vite+ image checksum
  ansible.builtin.copy:
    content: "{{ firecracker_viteplus_image_sha256.stdout.split()[0] }}\n"
    dest: "{{ firecracker_viteplus_hash_record }}"
    mode: "0644"
  when: firecracker_refresh_viteplus_image_needed

# --- Golden zvol ---

- name: Check if golden zvol exists
  ansible.builtin.command: "zfs list -H {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}"
  register: firecracker_golden_zvol_check
  changed_when: false
  failed_when: false

- name: Create golden zvol
  ansible.builtin.command: >
    zfs create -V {{ firecracker_golden_zvol_size }}
    -o volblocksize=16K
    -o compression=lz4
    {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}
  when: firecracker_golden_zvol_check.rc != 0
  changed_when: true

- name: Wait for zvol device node
  ansible.builtin.wait_for:
    path: "/dev/zvol/{{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}"
    state: present
    timeout: 10
  when: firecracker_golden_zvol_check.rc != 0

- name: Check if golden snapshot exists
  ansible.builtin.command: "zfs list -H {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}@ready"
  register: firecracker_golden_snapshot_check
  changed_when: false
  failed_when: false

- name: Stat recorded golden rootfs hash marker
  ansible.builtin.stat:
    path: "{{ firecracker_rootfs_hash_record }}"
    get_checksum: false
  register: firecracker_golden_rootfs_hash_stat

# Staleness is determined by mtime, not by re-hashing the rootfs. The marker file is
# touched after each successful golden refresh, so a rootfs mtime newer than the marker
# mtime means the on-disk rootfs is newer than whatever was last promoted.
- name: Decide whether the base golden needs refresh
  ansible.builtin.set_fact:
    firecracker_refresh_base_golden_needed: >-
      {{
        firecracker_refresh_base_golden | bool
        or firecracker_golden_zvol_check.rc != 0
        or firecracker_golden_snapshot_check.rc != 0
        or not firecracker_golden_rootfs_hash_stat.stat.exists
        or (firecracker_guest_rootfs.stat.mtime | float) > (firecracker_golden_rootfs_hash_stat.stat.mtime | default(0) | float)
      }}

- name: Compute guest rootfs checksum
  ansible.builtin.command: "sha256sum {{ firecracker_rootfs_path }}"
  register: firecracker_guest_rootfs_sha256
  changed_when: false
  when: firecracker_refresh_base_golden_needed

# --- Atomic golden zvol refresh ---
# Write to a staging zvol first. Only tear down the old golden after the
# staging write + snapshot succeed, so a failed dd never leaves the pool
# without a usable golden.

- name: Destroy leftover staging zvol from previous failed run
  ansible.builtin.command: "zfs destroy -r {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}-staging"
  register: firecracker_staging_zvol_destroy
  when: firecracker_refresh_base_golden_needed
  changed_when: firecracker_staging_zvol_destroy.rc == 0
  failed_when:
    - firecracker_staging_zvol_destroy.rc != 0
    - "'dataset does not exist' not in (firecracker_staging_zvol_destroy.stderr | default(''))"

- name: Confirm leftover staging zvol is gone
  ansible.builtin.command: "zfs list -H {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}-staging"
  register: firecracker_staging_zvol_probe
  retries: 10
  delay: 1
  until:
    - firecracker_staging_zvol_probe.rc == 1
    - "'dataset does not exist' in (firecracker_staging_zvol_probe.stderr | default(''))"
  when: firecracker_refresh_base_golden_needed
  changed_when: false
  failed_when:
    - firecracker_staging_zvol_probe.rc != 0
    - "'dataset does not exist' not in (firecracker_staging_zvol_probe.stderr | default(''))"

- name: Create staging zvol
  ansible.builtin.command: >
    zfs create -V {{ firecracker_golden_zvol_size }}
    -o volblocksize=16K
    -o compression=lz4
    {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}-staging
  when: firecracker_refresh_base_golden_needed
  changed_when: true

- name: Wait for staging zvol device node
  ansible.builtin.wait_for:
    path: "/dev/zvol/{{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}-staging"
    state: present
    timeout: 10
  when: firecracker_refresh_base_golden_needed

- name: Write ext4 rootfs to staging zvol
  ansible.builtin.command: >
    dd if={{ firecracker_rootfs_path }}
    of=/dev/zvol/{{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}-staging
    bs=1M conv=fsync status=progress
  when: firecracker_refresh_base_golden_needed
  changed_when: true

- name: Snapshot staging zvol
  ansible.builtin.command: "zfs snapshot {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}-staging@ready"
  when: firecracker_refresh_base_golden_needed
  changed_when: true

# Staging is proven good — now tear down the old golden and its dependents.
# Unmount stale ext4-over-zvol VFS mounts first: ZFS destroy -f only
# force-unmounts ZFS-native mounts, not regular VFS mounts on /dev/zvol/*
# block devices, so without this step the destroy fails silently.

- name: Unmount stale VFS mounts on zvol block devices
  ansible.builtin.shell: |
    set -euo pipefail
    mounts=$(awk '$1 ~ "^/dev/zvol/{{ firecracker_zfs_pool }}/" { print $2 }' /proc/mounts)
    [ -z "$mounts" ] && exit 0
    echo "$mounts" | xargs -n1 umount -l
  args:
    executable: /bin/bash
  register: firecracker_stale_vfs_unmount
  when: firecracker_refresh_base_golden_needed
  changed_when: firecracker_stale_vfs_unmount.stdout_lines | length > 0

- name: Prune VM job clones derived from old golden
  ansible.builtin.shell: |
    set -euo pipefail
    if ! zfs list -H {{ firecracker_zfs_pool }}/{{ firecracker_workload_dataset }} >/dev/null 2>&1; then
      exit 0
    fi
    zfs list -H -o name -r {{ firecracker_zfs_pool }}/{{ firecracker_workload_dataset }} | tail -n +2 | xargs -r -n1 zfs destroy -R
  args:
    executable: /bin/bash
  when: firecracker_refresh_base_golden_needed
  changed_when: true

- name: Destroy old golden zvol (cascade removes @ready snapshot)
  ansible.builtin.command: "zfs destroy -R {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}"
  register: firecracker_old_golden_destroy
  when: firecracker_refresh_base_golden_needed
  changed_when: firecracker_old_golden_destroy.rc == 0
  failed_when:
    - firecracker_old_golden_destroy.rc != 0
    - "'dataset does not exist' not in (firecracker_old_golden_destroy.stderr | default(''))"

- name: Promote staging zvol to golden
  ansible.builtin.command: >
    zfs rename
    {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}-staging
    {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}
  when: firecracker_refresh_base_golden_needed
  changed_when: true

- name: Record golden rootfs checksum
  ansible.builtin.copy:
    content: "{{ firecracker_guest_rootfs_sha256.stdout.split()[0] }}\n"
    dest: "{{ firecracker_rootfs_hash_record }}"
    mode: "0644"
  when: firecracker_refresh_base_golden_needed

# --- Workload dataset for job clones ---

- name: Ensure workload dataset exists
  community.general.zfs:
    name: "{{ firecracker_zfs_pool }}/{{ firecracker_workload_dataset }}"
    state: present
