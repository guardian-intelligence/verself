---
# Firecracker host setup defaults.
firecracker_zfs_pool: forgepool
firecracker_golden_zvol: golden-zvol
firecracker_golden_zvol_size: 4G
firecracker_ci_dataset: ci
firecracker_jailer_root: /srv/jailer
firecracker_jailer_uid: 10000
firecracker_jailer_gid: 10000
firecracker_jailer_user: firecracker
firecracker_kernel_path: /var/lib/ci/vmlinux
firecracker_rootfs_path: /var/lib/ci/rootfs.ext4
firecracker_guest_artifact_manifest_path: /var/lib/ci/guest-artifacts.json
firecracker_rootfs_hash_record: /var/lib/ci/golden-zvol.rootfs.sha256
firecracker_refresh_base_golden: false
firecracker_zfs_arc_max_bytes: 8589934592  # 8 GiB
firecracker_guest_pool_cidr: 172.16.0.0/16
firecracker_net_lease_dir: /var/lib/ci/net/leases
firecracker_host_uplink_interface: ""
firecracker_vm_orchestrator_binary_path: /usr/local/bin/vm-orchestrator
firecracker_vm_orchestrator_api_socket: /run/vm-orchestrator/api.sock
