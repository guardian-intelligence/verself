---
argument_specs:
  main:
    short_description: "OpenBao per-organization tenancy reconciler"
    description:
      - "Reconciles Zitadel organizations into OpenBao mounts, policies, and JWT auth roles."
      - "The deployed OpenBao build exposes namespace commands but returns 405 for namespace APIs,"
      - "so this role uses the documented mount-per-org fallback until namespace support is usable."
    options:
      openbao_tenancy_oidc_discovery_url:
        type: str
      openbao_tenancy_bound_issuer:
        type: str
      openbao_tenancy_secrets_project_name:
        type: str
      openbao_tenancy_token_ttl:
        type: str
      openbao_tenancy_token_max_ttl:
        type: str
      openbao_tenancy_layout:
        type: str
        choices: [auto, root_mounts]
      openbao_tenancy_skip_jwks_validation:
        type: bool
      openbao_tenancy_kv_mount_prefix:
        type: str
      openbao_tenancy_transit_mount_prefix:
        type: str
      openbao_tenancy_jwt_mount_prefix:
        type: str
