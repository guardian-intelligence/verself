---
- name: Assert OpenBao tenancy inputs are set
  ansible.builtin.assert:
    that:
      - openbao_tenancy_oidc_discovery_url | default('', true) | length > 0
      - openbao_tenancy_bound_issuer | default('', true) | length > 0
      - openbao_tenancy_secrets_project_name | default('', true) | length > 0
      - openbao_tenancy_token_ttl | default('', true) | length > 0
      - openbao_tenancy_token_max_ttl | default('', true) | length > 0
    fail_msg: OpenBao tenancy requires OIDC issuer, secrets-service project name, and token TTLs.

- name: Read OpenBao root token for tenancy reconciliation
  ansible.builtin.slurp:
    src: "{{ openbao_credstore_dir }}/root-token"
  register: openbao_tenancy_root_token_raw
  no_log: true

- name: Read Zitadel admin PAT for OpenBao tenancy
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: openbao_tenancy_zitadel_admin_pat_raw
  no_log: true

- name: Read governance internal audit token for OpenBao tenancy
  ansible.builtin.slurp:
    src: /etc/credstore/governance-service/internal-audit-token
  register: openbao_tenancy_governance_audit_token_raw
  no_log: true

- name: Read secrets-service OpenBao service account user id
  ansible.builtin.slurp:
    src: "{{ openbao_tenancy_service_account_user_id_path }}"
  register: openbao_tenancy_service_account_user_id_raw
  no_log: true

- name: Set OpenBao tenancy credential facts
  ansible.builtin.set_fact:
    openbao_tenancy_root_token: "{{ openbao_tenancy_root_token_raw.content | b64decode | trim }}"
    openbao_tenancy_zitadel_admin_pat: "{{ openbao_tenancy_zitadel_admin_pat_raw.content | b64decode | trim }}"
    openbao_tenancy_governance_audit_token: "{{ openbao_tenancy_governance_audit_token_raw.content | b64decode | trim }}"
    openbao_tenancy_service_account_user_id: "{{ openbao_tenancy_service_account_user_id_raw.content | b64decode | trim }}"
  no_log: true

- name: Assert secrets-service OpenBao service account user id is set
  ansible.builtin.assert:
    that: openbao_tenancy_service_account_user_id | default('', true) | length > 0
    fail_msg: OpenBao tenancy requires the secrets-service OpenBao service account user id.

- name: Create OpenBao tenancy audit marker directory
  ansible.builtin.file:
    path: "{{ openbao_tenancy_audit_marker_dir }}"
    state: directory
    owner: root
    group: openbao
    mode: "0750"

- name: Probe OpenBao namespace API
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/namespaces"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    validate_certs: false
    status_code: [200, 405]
    return_content: true
  register: openbao_tenancy_namespace_probe
  changed_when: false
  no_log: true

- name: Resolve OpenBao tenancy layout
  ansible.builtin.set_fact:
    openbao_tenancy_resolved_layout: >-
      {{
        'root_mounts'
        if openbao_tenancy_layout == 'root_mounts'
          or lookup('env', 'BAO_NAMESPACES_DISABLED') in ['1', 'true', 'TRUE', 'yes', 'YES']
          or openbao_tenancy_namespace_probe.status == 405
        else 'namespaces'
      }}

- name: Assert namespace-capable layout is not selected on this OpenBao build
  ansible.builtin.assert:
    that: openbao_tenancy_resolved_layout == 'root_mounts'
    fail_msg: >-
      The deployed OpenBao build accepted namespace API probing, but this role has only
      been verified against the mount-per-org fallback. Set BAO_NAMESPACES_DISABLED=1
      until namespace reconciliation is implemented and proven end-to-end.

- name: List Zitadel organizations
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/v2/organizations/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ openbao_tenancy_zitadel_admin_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body: {}
    return_content: true
    status_code: 200
  register: openbao_tenancy_org_search
  no_log: true

- name: Select active Zitadel organizations
  ansible.builtin.set_fact:
    openbao_tenancy_orgs: >-
      {{
        openbao_tenancy_org_search.json.result
        | default([])
        | selectattr('state', 'equalto', 'ORGANIZATION_STATE_ACTIVE')
        | list
      }}

- name: Assert at least one Zitadel organization exists
  ansible.builtin.assert:
    that: openbao_tenancy_orgs | length > 0
    fail_msg: OpenBao tenancy reconciliation found no active Zitadel organizations.

- name: List Zitadel projects for secrets-service audience
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ openbao_tenancy_zitadel_admin_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ openbao_tenancy_secrets_project_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    return_content: true
    status_code: 200
  register: openbao_tenancy_project_search
  no_log: true

- name: Set OpenBao tenancy secrets-service audience
  ansible.builtin.set_fact:
    openbao_tenancy_secrets_project_id: >-
      {{
        (
          openbao_tenancy_project_search.json.result
          | default([])
          | selectattr('name', 'equalto', openbao_tenancy_secrets_project_name)
          | map(attribute='id')
          | list
          | first
        ) | default('')
      }}

- name: Assert secrets-service Zitadel project exists
  ansible.builtin.assert:
    that: openbao_tenancy_secrets_project_id | default('', true) | length > 0
    fail_msg: >-
      Zitadel project '{{ openbao_tenancy_secrets_project_name }}' was not found.
      Run the secrets_service deploy role before reconciling OpenBao tenancy.

- name: Ensure secrets-service project roles exist for OpenBao JWT claims
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ openbao_tenancy_zitadel_admin_pat }}"
    zitadel_project_roles_project_id: "{{ openbao_tenancy_secrets_project_id }}"
    zitadel_project_roles_definitions:
      - key: owner
        display_name: Owner
        group: secrets
      - key: admin
        display_name: Admin
        group: secrets
      - key: member
        display_name: Member
        group: secrets
  no_log: true

- name: List OpenBao secret mounts before tenancy reconciliation
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/mounts"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: openbao_tenancy_mounts_response
  changed_when: false
  no_log: true

- name: List OpenBao auth mounts before tenancy reconciliation
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/auth"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: openbao_tenancy_auth_response
  changed_when: false
  no_log: true

- name: Set OpenBao mount inventory facts
  ansible.builtin.set_fact:
    openbao_tenancy_existing_mounts: "{{ openbao_tenancy_mounts_response.json.data.keys() | list }}"
    openbao_tenancy_existing_auth_mounts: "{{ openbao_tenancy_auth_response.json.data.keys() | list }}"

- name: Reconcile OpenBao tenancy for active organizations
  ansible.builtin.include_tasks: reconcile_org.yml
  loop: "{{ openbao_tenancy_orgs }}"
  loop_control:
    loop_var: openbao_tenancy_org
    label: "{{ openbao_tenancy_org.id }} {{ openbao_tenancy_org.name }}"
