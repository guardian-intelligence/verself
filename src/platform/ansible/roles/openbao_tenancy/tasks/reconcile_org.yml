---
- name: Set OpenBao tenancy organization facts
  ansible.builtin.set_fact:
    openbao_tenancy_org_id: "{{ openbao_tenancy_org.id }}"
    openbao_tenancy_org_name: "{{ openbao_tenancy_org.name }}"
    openbao_tenancy_org_domain: "{{ openbao_tenancy_org.primaryDomain | default('') }}"
    openbao_tenancy_kv_mount: "{{ openbao_tenancy_kv_mount_prefix }}-{{ openbao_tenancy_org.id }}"
    openbao_tenancy_transit_mount: "{{ openbao_tenancy_transit_mount_prefix }}-{{ openbao_tenancy_org.id }}"
    openbao_tenancy_jwt_mount: "{{ openbao_tenancy_jwt_mount_prefix }}-{{ openbao_tenancy_org.id }}"
    openbao_tenancy_read_only_policy: "secrets-{{ openbao_tenancy_org.id }}-read-only"
    openbao_tenancy_read_write_policy: "secrets-{{ openbao_tenancy_org.id }}-read-write"
    openbao_tenancy_injection_policy: "secrets-{{ openbao_tenancy_org.id }}-injection-read"
    openbao_tenancy_secret_write_policy: "secrets-{{ openbao_tenancy_org.id }}-secret-write"
    openbao_tenancy_secret_read_policy: "secrets-{{ openbao_tenancy_org.id }}-secret-read"
    openbao_tenancy_secret_list_policy: "secrets-{{ openbao_tenancy_org.id }}-secret-list"
    openbao_tenancy_secret_delete_policy: "secrets-{{ openbao_tenancy_org.id }}-secret-delete"
    openbao_tenancy_transit_key_create_policy: "secrets-{{ openbao_tenancy_org.id }}-transit-key-create"
    openbao_tenancy_transit_key_rotate_policy: "secrets-{{ openbao_tenancy_org.id }}-transit-key-rotate"
    openbao_tenancy_transit_encrypt_policy: "secrets-{{ openbao_tenancy_org.id }}-transit-encrypt"
    openbao_tenancy_transit_decrypt_policy: "secrets-{{ openbao_tenancy_org.id }}-transit-decrypt"
    openbao_tenancy_transit_sign_policy: "secrets-{{ openbao_tenancy_org.id }}-transit-sign"
    openbao_tenancy_transit_verify_policy: "secrets-{{ openbao_tenancy_org.id }}-transit-verify"
    openbao_tenancy_spiffe_injection_role_url: >-
      https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/auth/{{
      openbao_spiffe_jwt_mount }}/role/secrets-injection-{{ openbao_tenancy_org.id }}
    openbao_tenancy_spiffe_runtime_write_role_url: >-
      https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/auth/{{
      openbao_spiffe_jwt_mount }}/role/secrets-runtime-write-{{ openbao_tenancy_org.id }}

- name: Render OpenBao tenancy policy documents
  ansible.builtin.set_fact:
    openbao_tenancy_policies:
      - name: "{{ openbao_tenancy_read_only_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'read-only.hcl.j2') }}"
      - name: "{{ openbao_tenancy_read_write_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'read-write.hcl.j2') }}"
      - name: "{{ openbao_tenancy_injection_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'injection-read.hcl.j2') }}"
      - name: "{{ openbao_tenancy_secret_write_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'secret-write.hcl.j2') }}"
      - name: "{{ openbao_tenancy_secret_read_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'secret-read.hcl.j2') }}"
      - name: "{{ openbao_tenancy_secret_list_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'secret-list.hcl.j2') }}"
      - name: "{{ openbao_tenancy_secret_delete_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'secret-delete.hcl.j2') }}"
      - name: "{{ openbao_tenancy_transit_key_create_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'transit-key-create.hcl.j2') }}"
      - name: "{{ openbao_tenancy_transit_key_rotate_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'transit-key-rotate.hcl.j2') }}"
      - name: "{{ openbao_tenancy_transit_encrypt_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'transit-encrypt.hcl.j2') }}"
      - name: "{{ openbao_tenancy_transit_decrypt_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'transit-decrypt.hcl.j2') }}"
      - name: "{{ openbao_tenancy_transit_sign_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'transit-sign.hcl.j2') }}"
      - name: "{{ openbao_tenancy_transit_verify_policy }}"
        document: "{{ lookup('ansible.builtin.template', 'transit-verify.hcl.j2') }}"

- name: Enable OpenBao KV v2 mount for organization
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/mounts/{{ openbao_tenancy_kv_mount }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    body_format: json
    body:
      type: kv
      description: "Forge Metal secrets KV for Zitadel org {{ openbao_tenancy_org_id }}"
      options:
        version: "2"
    validate_certs: false
    status_code: 204
  register: openbao_tenancy_kv_enable
  changed_when: true
  when: (openbao_tenancy_kv_mount ~ '/') not in openbao_tenancy_existing_mounts
  no_log: true

- name: Enable OpenBao Transit mount for organization
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/mounts/{{ openbao_tenancy_transit_mount }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    body_format: json
    body:
      type: transit
      description: "Forge Metal transit keys for Zitadel org {{ openbao_tenancy_org_id }}"
    validate_certs: false
    status_code: 204
  register: openbao_tenancy_transit_enable
  changed_when: true
  when: (openbao_tenancy_transit_mount ~ '/') not in openbao_tenancy_existing_mounts
  no_log: true

- name: Enable OpenBao JWT auth mount for organization
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/auth/{{ openbao_tenancy_jwt_mount }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    body_format: json
    body:
      type: jwt
      description: "Forge Metal Zitadel JWT auth for org {{ openbao_tenancy_org_id }}"
    validate_certs: false
    status_code: 204
  register: openbao_tenancy_auth_enable
  changed_when: true
  when: (openbao_tenancy_jwt_mount ~ '/') not in openbao_tenancy_existing_auth_mounts
  no_log: true

- name: Read OpenBao JWT auth config for organization
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/auth/{{ openbao_tenancy_jwt_mount }}/config"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    validate_certs: false
    status_code: [200, 404]
    return_content: true
  register: openbao_tenancy_auth_config_response
  changed_when: false
  no_log: true

- name: Configure OpenBao JWT discovery for organization
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/auth/{{ openbao_tenancy_jwt_mount }}/config"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    body_format: json
    body:
      oidc_discovery_url: "{{ openbao_tenancy_oidc_discovery_url }}"
      bound_issuer: "{{ openbao_tenancy_bound_issuer }}"
      skip_jwks_validation: "{{ openbao_tenancy_skip_jwks_validation | bool }}"
    validate_certs: false
    status_code: 204
  register: openbao_tenancy_auth_config_write
  changed_when: true
  when: >-
    openbao_tenancy_auth_config_response.status == 404
    or (openbao_tenancy_auth_config_response.json.data | default({})).oidc_discovery_url | default('') != openbao_tenancy_oidc_discovery_url
    or (openbao_tenancy_auth_config_response.json.data | default({})).bound_issuer | default('') != openbao_tenancy_bound_issuer
  no_log: true

- name: Read OpenBao tenancy policies
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/policies/acl/{{ item.name }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    validate_certs: false
    status_code: [200, 404]
    return_content: true
  loop: "{{ openbao_tenancy_policies }}"
  loop_control:
    label: "{{ item.name }}"
  register: openbao_tenancy_policy_reads
  changed_when: false
  no_log: true

- name: Write changed OpenBao tenancy policies
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/policies/acl/{{ item.item.name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    body_format: json
    body:
      policy: "{{ item.item.document }}"
    validate_certs: false
    status_code: 204
  loop: "{{ openbao_tenancy_policy_reads.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: openbao_tenancy_policy_writes
  changed_when: true
  when: >-
    item.status == 404
    or (((item.json.data | default({})).policy | default(item.json.policy | default(''))) | trim) != (item.item.document | trim)
  no_log: true

- name: Set OpenBao JWT role definitions for organization
  ansible.builtin.set_fact:
    openbao_tenancy_jwt_roles:
      - name: secrets-owner
        project_role: owner
        token_policies:
          - "{{ openbao_tenancy_read_write_policy }}"
      - name: secrets-admin
        project_role: admin
        token_policies:
          - "{{ openbao_tenancy_read_write_policy }}"
      - name: secrets-member
        project_role: member
        token_policies:
          - "{{ openbao_tenancy_read_only_policy }}"
      - name: secrets-direct-put-secret
        direct_claim_role: secrets-direct-put-secret
        permission: "secrets:secret:write"
        token_policies:
          - "{{ openbao_tenancy_secret_write_policy }}"
      - name: secrets-direct-read-secret
        direct_claim_role: secrets-direct-read-secret
        permission: "secrets:secret:read"
        token_policies:
          - "{{ openbao_tenancy_secret_read_policy }}"
      - name: secrets-direct-list-secrets
        direct_claim_role: secrets-direct-list-secrets
        permission: "secrets:secret:list"
        token_policies:
          - "{{ openbao_tenancy_secret_list_policy }}"
      - name: secrets-direct-delete-secret
        direct_claim_role: secrets-direct-delete-secret
        permission: "secrets:secret:delete"
        token_policies:
          - "{{ openbao_tenancy_secret_delete_policy }}"
      - name: secrets-direct-create-transit-key
        direct_claim_role: secrets-direct-create-transit-key
        permission: "secrets:transit_key:create"
        token_policies:
          - "{{ openbao_tenancy_transit_key_create_policy }}"
      - name: secrets-direct-rotate-transit-key
        direct_claim_role: secrets-direct-rotate-transit-key
        permission: "secrets:transit_key:rotate"
        token_policies:
          - "{{ openbao_tenancy_transit_key_rotate_policy }}"
      - name: secrets-direct-encrypt-with-transit-key
        direct_claim_role: secrets-direct-encrypt-with-transit-key
        permission: "secrets:transit:encrypt"
        token_policies:
          - "{{ openbao_tenancy_transit_encrypt_policy }}"
      - name: secrets-direct-decrypt-with-transit-key
        direct_claim_role: secrets-direct-decrypt-with-transit-key
        permission: "secrets:transit:decrypt"
        token_policies:
          - "{{ openbao_tenancy_transit_decrypt_policy }}"
      - name: secrets-direct-sign-with-transit-key
        direct_claim_role: secrets-direct-sign-with-transit-key
        permission: "secrets:transit:sign"
        token_policies:
          - "{{ openbao_tenancy_transit_sign_policy }}"
      - name: secrets-direct-verify-with-transit-key
        direct_claim_role: secrets-direct-verify-with-transit-key
        permission: "secrets:transit:verify"
        token_policies:
          - "{{ openbao_tenancy_transit_verify_policy }}"

- name: Read OpenBao JWT roles for organization
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/auth/{{ openbao_tenancy_jwt_mount }}/role/{{ item.name }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    validate_certs: false
    status_code: [200, 404]
    return_content: true
  loop: "{{ openbao_tenancy_jwt_roles }}"
  loop_control:
    label: "{{ item.name }}"
  register: openbao_tenancy_role_reads
  changed_when: false
  no_log: true

- name: Read OpenBao SPIFFE workload injection role for organization
  ansible.builtin.uri:
    url: "{{ openbao_tenancy_spiffe_injection_role_url }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    validate_certs: false
    status_code: [200, 404]
    return_content: true
  register: openbao_tenancy_spiffe_injection_role_read
  changed_when: false
  no_log: true

- name: Write OpenBao SPIFFE workload injection role for organization
  ansible.builtin.uri:
    url: "{{ openbao_tenancy_spiffe_injection_role_url }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    body_format: json
    body:
      role_type: jwt
      bound_audiences:
        - openbao
      user_claim: sub
      bound_claims:
        sub: "{{ spire_secrets_service_id }}"
      token_policies:
        - "{{ openbao_tenancy_injection_policy }}"
      token_ttl: "{{ openbao_tenancy_token_ttl }}"
      token_max_ttl: "{{ openbao_tenancy_token_max_ttl }}"
      token_no_default_policy: true
      token_num_uses: 0
    validate_certs: false
    status_code: 204
  register: openbao_tenancy_spiffe_injection_role_write
  changed_when: true
  when: >-
    openbao_tenancy_spiffe_injection_role_read.status == 404
    or (
      ((openbao_tenancy_spiffe_injection_role_read.json.data | default({})).bound_claims | default({})).sub
      | default('')
    ) != spire_secrets_service_id
    or (
      ((openbao_tenancy_spiffe_injection_role_read.json.data | default({})).token_policies | default([]) | sort)
      != ([openbao_tenancy_injection_policy] | sort)
    )
  no_log: true

- name: Read OpenBao SPIFFE workload runtime-write role for organization
  ansible.builtin.uri:
    url: "{{ openbao_tenancy_spiffe_runtime_write_role_url }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    validate_certs: false
    status_code: [200, 404]
    return_content: true
  register: openbao_tenancy_spiffe_runtime_write_role_read
  changed_when: false
  no_log: true

- name: Write OpenBao SPIFFE workload runtime-write role for organization
  ansible.builtin.uri:
    url: "{{ openbao_tenancy_spiffe_runtime_write_role_url }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    body_format: json
    body:
      role_type: jwt
      bound_audiences:
        - openbao
      user_claim: sub
      bound_claims:
        sub: "{{ spire_secrets_service_id }}"
      token_policies:
        - "{{ openbao_tenancy_secret_read_policy }}"
        - "{{ openbao_tenancy_secret_write_policy }}"
      token_ttl: "{{ openbao_tenancy_token_ttl }}"
      token_max_ttl: "{{ openbao_tenancy_token_max_ttl }}"
      token_no_default_policy: true
      token_num_uses: 0
    validate_certs: false
    status_code: 204
  register: openbao_tenancy_spiffe_runtime_write_role_write
  changed_when: true
  when: >-
    openbao_tenancy_spiffe_runtime_write_role_read.status == 404
    or (
      ((openbao_tenancy_spiffe_runtime_write_role_read.json.data | default({})).bound_claims | default({})).sub
      | default('')
    ) != spire_secrets_service_id
    or (
      ((openbao_tenancy_spiffe_runtime_write_role_read.json.data | default({})).token_policies | default([]) | sort)
      != ([openbao_tenancy_secret_read_policy, openbao_tenancy_secret_write_policy] | sort)
    )
  no_log: true

- name: Write missing OpenBao JWT roles for organization
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/auth/{{ openbao_tenancy_jwt_mount }}/role/{{ item.item.name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    body_format: json
    body:
      role_type: jwt
      bound_audiences:
        - "{{ openbao_tenancy_secrets_project_id }}"
      user_claim: sub
      bound_claims_type: glob
      bound_claims: >-
        {{
          {
            'org_id': openbao_tenancy_org_id,
            'forge_metal:credential_id': '*',
            'forge_metal:openbao_roles': item.item.direct_claim_role,
            'permissions': item.item.permission
          }
          if (item.item.direct_claim_role | default('') | length > 0)
          else {
            'urn:zitadel:iam:user:resourceowner:id': openbao_tenancy_org_id,
            ('/urn:zitadel:iam:org:project:' ~ openbao_tenancy_secrets_project_id ~ ':roles/' ~ item.item.project_role ~ '/' ~ openbao_tenancy_org_id): '*'
          }
        }}
      claim_mappings:
        "urn:zitadel:iam:user:resourceowner:id": forge_metal_org_id
        "urn:zitadel:iam:user:resourceowner:name": forge_metal_org_name
      token_policies: "{{ item.item.token_policies }}"
      token_ttl: "{{ openbao_tenancy_token_ttl }}"
      token_max_ttl: "{{ openbao_tenancy_token_max_ttl }}"
      token_no_default_policy: false
      token_num_uses: 0
    validate_certs: false
    status_code: 204
  loop: "{{ openbao_tenancy_role_reads.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: openbao_tenancy_role_writes
  changed_when: true
  when: >-
    item.status == 404
    or (((item.json.data | default({})).token_policies | default([]) | sort) != (item.item.token_policies | sort))
    or (
      (item.item.direct_claim_role | default('') | length == 0)
      and ('/urn:zitadel:iam:org:project:' ~ openbao_tenancy_secrets_project_id ~ ':roles/' ~ item.item.project_role ~ '/' ~ openbao_tenancy_org_id)
        not in ((item.json.data | default({})).bound_claims | default({})).keys()
    )
    or (
      (item.item.direct_claim_role | default('') | length > 0)
      and (
        ((item.json.data | default({})).bound_claims | default({})).get('forge_metal:openbao_roles', '') != item.item.direct_claim_role
        or ((item.json.data | default({})).bound_claims | default({})).get('permissions', '') != item.item.permission
        or ((item.json.data | default({})).bound_claims | default({})).get('forge_metal:credential_id', '') != '*'
        or ((item.json.data | default({})).bound_claims | default({})).get('org_id', '') != openbao_tenancy_org_id
      )
    )
  no_log: true

- name: Record whether OpenBao organization tenancy changed
  ansible.builtin.set_fact:
    openbao_tenancy_org_changed: >-
      {{
        openbao_tenancy_kv_enable.changed | default(false)
        or openbao_tenancy_transit_enable.changed | default(false)
        or openbao_tenancy_auth_enable.changed | default(false)
        or openbao_tenancy_auth_config_write.changed | default(false)
        or (openbao_tenancy_policy_writes.results | default([]) | selectattr('changed', 'equalto', true) | list | length > 0)
        or (openbao_tenancy_role_writes.results | default([]) | selectattr('changed', 'equalto', true) | list | length > 0)
        or (openbao_tenancy_spiffe_injection_role_write.changed | default(false))
      }}

- name: Reconcile platform runtime provider secrets for the platform organization
  ansible.builtin.include_tasks: platform_runtime_secrets.yml
  when: openbao_tenancy_org_name == openbao_tenancy_platform_org_name
