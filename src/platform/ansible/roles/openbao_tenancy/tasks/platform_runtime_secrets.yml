---
- name: Set platform runtime secret definitions
  ansible.builtin.set_fact:
    openbao_tenancy_platform_runtime_secret_items:
      - name: billing-service.stripe.secret_key
        value: "{{ stripe_secret_key }}"
      - name: billing-service.stripe.webhook_secret
        value: "{{ stripe_webhook_secret }}"
      - name: mailbox-service.resend.api_key
        value: "{{ resend_api_key }}"
      - name: mailbox-service.stalwart.admin_password
        value: "{{ stalwart_admin_password }}"
  no_log: true

- name: Set sandbox-rental GitHub App configuration state for platform secrets
  ansible.builtin.set_fact:
    openbao_tenancy_sandbox_github_app_configured: >-
      {{
        (sandbox_rental_service_github_app_enabled | default(false, true) | bool)
        or (sandbox_rental_service_github_app_id | default(0, true) | int > 0)
        or (sandbox_rental_service_github_app_slug | default('', true) | trim | length > 0)
        or (sandbox_rental_service_github_app_client_id | default('', true) | trim | length > 0)
      }}

- name: Read legacy OpenBao platform GitHub App provider secret
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/platform/data/providers/github/sandbox-rental-service"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [200, 404]
    return_content: true
  register: openbao_tenancy_legacy_github_provider_existing
  when: openbao_tenancy_sandbox_github_app_configured | bool
  changed_when: false
  no_log: true

- name: Read current platform-org GitHub App private key
  ansible.builtin.uri:
    url: >-
      https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/{{
      openbao_tenancy_kv_mount }}/data/secret/org/sandbox-rental-service.github.private_key
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [200, 404]
    return_content: true
  register: openbao_tenancy_current_github_private_key_existing
  when: openbao_tenancy_sandbox_github_app_configured | bool
  changed_when: false
  no_log: true

- name: Read current platform-org GitHub App webhook secret
  ansible.builtin.uri:
    url: >-
      https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/{{
      openbao_tenancy_kv_mount }}/data/secret/org/sandbox-rental-service.github.webhook_secret
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [200, 404]
    return_content: true
  register: openbao_tenancy_current_github_webhook_secret_existing
  when: openbao_tenancy_sandbox_github_app_configured | bool
  changed_when: false
  no_log: true

- name: Read current platform-org GitHub App client secret
  ansible.builtin.uri:
    url: >-
      https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/{{
      openbao_tenancy_kv_mount }}/data/secret/org/sandbox-rental-service.github.client_secret
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [200, 404]
    return_content: true
  register: openbao_tenancy_current_github_client_secret_existing
  when: openbao_tenancy_sandbox_github_app_configured | bool
  changed_when: false
  no_log: true

- name: Inspect legacy sandbox-rental GitHub App private key
  ansible.builtin.stat:
    path: /etc/credstore/sandbox-rental/github-app-private-key
  register: openbao_tenancy_github_private_key_stat
  when: openbao_tenancy_sandbox_github_app_configured | bool
  no_log: true

- name: Inspect legacy sandbox-rental GitHub App webhook secret
  ansible.builtin.stat:
    path: /etc/credstore/sandbox-rental/github-app-webhook-secret
  register: openbao_tenancy_github_webhook_secret_stat
  when: openbao_tenancy_sandbox_github_app_configured | bool
  no_log: true

- name: Inspect legacy sandbox-rental GitHub App client secret
  ansible.builtin.stat:
    path: /etc/credstore/sandbox-rental/github-app-client-secret
  register: openbao_tenancy_github_client_secret_stat
  when: openbao_tenancy_sandbox_github_app_configured | bool
  no_log: true

- name: Inspect OpenBao rebootstrap staged GitHub App private key
  ansible.builtin.stat:
    path: "{{ openbao_rebootstrap_stage_dir }}/github-app-private-key"
  register: openbao_tenancy_rebootstrap_github_private_key_stat
  when: openbao_tenancy_sandbox_github_app_configured | bool
  no_log: true

- name: Inspect OpenBao rebootstrap staged GitHub App webhook secret
  ansible.builtin.stat:
    path: "{{ openbao_rebootstrap_stage_dir }}/github-app-webhook-secret"
  register: openbao_tenancy_rebootstrap_github_webhook_secret_stat
  when: openbao_tenancy_sandbox_github_app_configured | bool
  no_log: true

- name: Inspect OpenBao rebootstrap staged GitHub App client secret
  ansible.builtin.stat:
    path: "{{ openbao_rebootstrap_stage_dir }}/github-app-client-secret"
  register: openbao_tenancy_rebootstrap_github_client_secret_stat
  when: openbao_tenancy_sandbox_github_app_configured | bool
  no_log: true

- name: Read OpenBao rebootstrap staged GitHub App private key
  ansible.builtin.slurp:
    src: "{{ openbao_rebootstrap_stage_dir }}/github-app-private-key"
  register: openbao_tenancy_rebootstrap_github_private_key_raw
  when:
    - openbao_tenancy_sandbox_github_app_configured | bool
    - openbao_tenancy_rebootstrap_github_private_key_stat.stat.exists | default(false) | bool
    - openbao_tenancy_rebootstrap_github_private_key_stat.stat.size | default(0) | int > 0
  no_log: true

- name: Read OpenBao rebootstrap staged GitHub App webhook secret
  ansible.builtin.slurp:
    src: "{{ openbao_rebootstrap_stage_dir }}/github-app-webhook-secret"
  register: openbao_tenancy_rebootstrap_github_webhook_secret_raw
  when:
    - openbao_tenancy_sandbox_github_app_configured | bool
    - openbao_tenancy_rebootstrap_github_webhook_secret_stat.stat.exists | default(false) | bool
    - openbao_tenancy_rebootstrap_github_webhook_secret_stat.stat.size | default(0) | int > 0
  no_log: true

- name: Read OpenBao rebootstrap staged GitHub App client secret
  ansible.builtin.slurp:
    src: "{{ openbao_rebootstrap_stage_dir }}/github-app-client-secret"
  register: openbao_tenancy_rebootstrap_github_client_secret_raw
  when:
    - openbao_tenancy_sandbox_github_app_configured | bool
    - openbao_tenancy_rebootstrap_github_client_secret_stat.stat.exists | default(false) | bool
    - openbao_tenancy_rebootstrap_github_client_secret_stat.stat.size | default(0) | int > 0
  no_log: true

- name: Read legacy sandbox-rental GitHub App private key for platform-org secret migration
  ansible.builtin.slurp:
    src: /etc/credstore/sandbox-rental/github-app-private-key
  register: openbao_tenancy_github_private_key_raw
  when:
    - openbao_tenancy_sandbox_github_app_configured | bool
    - openbao_tenancy_github_private_key_stat.stat.exists | default(false) | bool
    - openbao_tenancy_github_private_key_stat.stat.size | default(0) | int > 0
  no_log: true

- name: Read legacy sandbox-rental GitHub App webhook secret for platform-org secret migration
  ansible.builtin.slurp:
    src: /etc/credstore/sandbox-rental/github-app-webhook-secret
  register: openbao_tenancy_github_webhook_secret_raw
  when:
    - openbao_tenancy_sandbox_github_app_configured | bool
    - openbao_tenancy_github_webhook_secret_stat.stat.exists | default(false) | bool
    - openbao_tenancy_github_webhook_secret_stat.stat.size | default(0) | int > 0
  no_log: true

- name: Read legacy sandbox-rental GitHub App client secret for platform-org secret migration
  ansible.builtin.slurp:
    src: /etc/credstore/sandbox-rental/github-app-client-secret
  register: openbao_tenancy_github_client_secret_raw
  when:
    - openbao_tenancy_sandbox_github_app_configured | bool
    - openbao_tenancy_github_client_secret_stat.stat.exists | default(false) | bool
    - openbao_tenancy_github_client_secret_stat.stat.size | default(0) | int > 0
  no_log: true

- name: Set GitHub App bootstrap secret values for platform-org migration
  ansible.builtin.set_fact:
    openbao_tenancy_github_provider_bootstrap_data:
      private_key: >-
        {{
          openbao_tenancy_current_github_private_key_existing.json.data.data.value
          | default(
              (
                openbao_tenancy_legacy_github_provider_existing.json.data.data.private_key
                | default(
                    (
                      openbao_tenancy_rebootstrap_github_private_key_raw.content
                      | default('', true)
                      | b64decode
                      | trim
                    ),
                    true
                  )
                | default((openbao_tenancy_github_private_key_raw.content | default('', true) | b64decode | trim), true)
              ),
              true
            )
        }}
      webhook_secret: >-
        {{
          openbao_tenancy_current_github_webhook_secret_existing.json.data.data.value
          | default(
              (
                openbao_tenancy_legacy_github_provider_existing.json.data.data.webhook_secret
                | default(
                    (
                      openbao_tenancy_rebootstrap_github_webhook_secret_raw.content
                      | default('', true)
                      | b64decode
                      | trim
                    ),
                    true
                  )
                | default((openbao_tenancy_github_webhook_secret_raw.content | default('', true) | b64decode | trim), true)
              ),
              true
            )
        }}
      client_secret: >-
        {{
          openbao_tenancy_current_github_client_secret_existing.json.data.data.value
          | default(
              (
                openbao_tenancy_legacy_github_provider_existing.json.data.data.client_secret
                | default(
                    (
                      openbao_tenancy_rebootstrap_github_client_secret_raw.content
                      | default('', true)
                      | b64decode
                      | trim
                    ),
                    true
                  )
                | default((openbao_tenancy_github_client_secret_raw.content | default('', true) | b64decode | trim), true)
              ),
              true
            )
        }}
  when: openbao_tenancy_sandbox_github_app_configured | bool
  no_log: true

- name: Assert configured GitHub App has migratable or current credentials
  ansible.builtin.assert:
    that:
      - openbao_tenancy_github_provider_bootstrap_data.private_key | default('', true) | length > 0
      - openbao_tenancy_github_provider_bootstrap_data.webhook_secret | default('', true) | length > 0
      - openbao_tenancy_github_provider_bootstrap_data.client_secret | default('', true) | length > 0
    fail_msg: >-
      GitHub runner integration is configured, but the platform-org secrets do
      not have a complete sandbox-rental GitHub App credential set and there is
      no legacy OpenBao or credstore material to migrate. Populate the
      platform-org secrets first or restore the old credential source for one
      cutover deploy.
  when: openbao_tenancy_sandbox_github_app_configured | bool
  no_log: true

- name: Add GitHub App provider secrets to platform runtime secret definitions
  ansible.builtin.set_fact:
    openbao_tenancy_platform_runtime_secret_items: >-
      {{
        openbao_tenancy_platform_runtime_secret_items
        + [
          {'name': 'sandbox-rental-service.github.private_key', 'value': openbao_tenancy_github_provider_bootstrap_data.private_key},
          {'name': 'sandbox-rental-service.github.webhook_secret', 'value': openbao_tenancy_github_provider_bootstrap_data.webhook_secret},
          {'name': 'sandbox-rental-service.github.client_secret', 'value': openbao_tenancy_github_provider_bootstrap_data.client_secret}
        ]
      }}
  when: openbao_tenancy_sandbox_github_app_configured | bool
  no_log: true

- name: Read existing platform-org runtime secrets
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/{{ openbao_tenancy_kv_mount }}/data/secret/org/{{ item.name }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [200, 404]
    return_content: true
  loop: "{{ openbao_tenancy_platform_runtime_secret_items }}"
  loop_control:
    label: "{{ item.name }}"
  register: openbao_tenancy_platform_runtime_secret_reads
  changed_when: false
  no_log: true

- name: Write changed platform-org runtime secrets
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/{{ openbao_tenancy_kv_mount }}/data/secret/org/{{ item.item.name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    body_format: json
    body:
      data:
        kind: secret
        name: "{{ item.item.name }}"
        scope_level: org
        value: "{{ item.item.value }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [200, 204]
  loop: "{{ openbao_tenancy_platform_runtime_secret_reads.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: openbao_tenancy_platform_runtime_secret_writes
  changed_when: true
  when: >-
    item.status == 404
    or ((item.json.data.data | default({})).value | default('')) != item.item.value
  no_log: true

- name: Remove OpenBao rebootstrap staged GitHub App runtime secrets
  ansible.builtin.file:
    path: "{{ openbao_rebootstrap_stage_dir }}"
    state: absent
  when: openbao_tenancy_sandbox_github_app_configured | bool
  no_log: true

- name: Read legacy OpenBao platform mount inventory
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/mounts"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: 200
    return_content: true
  register: openbao_tenancy_legacy_mounts
  changed_when: false
  no_log: true

- name: Remove legacy OpenBao platform runtime mount after migration
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/mounts/platform"
    method: DELETE
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [204, 404]
  when: "'platform/' in (openbao_tenancy_legacy_mounts.json.data.keys() | list)"
  changed_when: true
  no_log: true

- name: Read OpenBao SPIFFE JWT workload auth roles for legacy platform direct readers
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/auth/{{ openbao_spiffe_jwt_mount }}/role/{{ item }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [200, 404]
    return_content: true
  loop:
    - platform-billing-service
    - platform-sandbox-rental-service
    - platform-mailbox-service
  loop_control:
    label: "{{ item }}"
  register: openbao_tenancy_legacy_platform_role_reads
  changed_when: false
  no_log: true

- name: Delete legacy OpenBao SPIFFE JWT workload auth roles
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/auth/{{ openbao_spiffe_jwt_mount }}/role/{{ item.item }}"
    method: DELETE
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [204, 404]
  loop: "{{ openbao_tenancy_legacy_platform_role_reads.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.status == 200
  changed_when: true
  no_log: true

- name: Read legacy OpenBao platform workload policies
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/policies/acl/{{ item }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [200, 404]
    return_content: true
  loop:
    - platform-billing-service
    - platform-sandbox-rental-service
    - platform-mailbox-service
  loop_control:
    label: "{{ item }}"
  register: openbao_tenancy_legacy_platform_policy_reads
  changed_when: false
  no_log: true

- name: Delete legacy OpenBao platform workload policies
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/policies/acl/{{ item.item }}"
    method: DELETE
    headers:
      X-Vault-Token: "{{ openbao_tenancy_root_token }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [204, 404]
  loop: "{{ openbao_tenancy_legacy_platform_policy_reads.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.status == 200
  changed_when: true
  no_log: true
