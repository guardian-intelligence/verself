---
# TigerBeetle financial ledger.
# Binary provided by deploy_profile role (pinned static binary).

# --- System user (least-privilege) ---

- name: Create tigerbeetle system group
  ansible.builtin.group:
    name: tigerbeetle
    system: true

- name: Create tigerbeetle system user
  ansible.builtin.user:
    name: tigerbeetle
    group: tigerbeetle
    system: true
    home: "{{ tigerbeetle_data_dir }}"
    shell: /usr/sbin/nologin
    create_home: false

# --- Binary presence ---

- name: Verify TigerBeetle binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/tigerbeetle"
  register: tigerbeetle_binary
  failed_when: not tigerbeetle_binary.stat.exists

# --- Version pin ---

- name: Capture TigerBeetle version
  ansible.builtin.command:
    cmd: "{{ verself_bin }}/tigerbeetle version"
  register: tigerbeetle_version_output
  changed_when: false

- name: Assert TigerBeetle version matches expected
  ansible.builtin.assert:
    that: "tigerbeetle_expected_version in tigerbeetle_version_output.stdout"
    fail_msg: >-
      Expected TigerBeetle {{ tigerbeetle_expected_version }}, got: {{ tigerbeetle_version_output.stdout }}.
      Update topology/catalog/versions.cue or adjust the version assertion.

# --- Data directory ---

- name: Create TigerBeetle data directory
  ansible.builtin.file:
    path: "{{ tigerbeetle_data_dir }}"
    state: directory
    owner: tigerbeetle
    group: tigerbeetle
    mode: "0700"

# --- Idempotent format ---

- name: Check if TigerBeetle data file exists
  ansible.builtin.stat:
    path: "{{ tigerbeetle_data_file }}"
  register: tigerbeetle_data_stat

- name: Format TigerBeetle data file
  ansible.builtin.command:
    cmd: >-
      {{ verself_bin }}/tigerbeetle format
      --cluster={{ tigerbeetle_cluster_id }}
      --replica={{ tigerbeetle_replica_id }}
      --replica-count={{ tigerbeetle_replica_count }}
      {{ tigerbeetle_data_file }}
  become: true
  become_user: tigerbeetle
  changed_when: true
  when: not tigerbeetle_data_stat.stat.exists

# --- systemd unit ---

- name: Deploy TigerBeetle systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=TigerBeetle
      After=verself-firewall.target network.target
      Requires=verself-firewall.target

      [Service]
      Type=simple
      User=tigerbeetle
      Group=tigerbeetle
      ExecStart={{ verself_bin }}/tigerbeetle start \
        --addresses={{ topology_endpoints.tigerbeetle.endpoints.client.address }} \
        --experimental \
        --statsd={{ topology_endpoints.otelcol.endpoints.statsd.address }} \
        {{ tigerbeetle_data_file }}
      Restart=on-failure
      RestartSec=5
      AmbientCapabilities=CAP_IPC_LOCK
      LimitMEMLOCK=infinity
      DevicePolicy=closed
      LockPersonality=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectHome=true
      ProtectHostname=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      ProtectProc=noaccess
      ProtectSystem=strict
      RestrictAddressFamilies=AF_INET AF_INET6
      RestrictNamespaces=true
      RestrictRealtime=true
      RestrictSUIDSGID=true
      ReadWritePaths={{ tigerbeetle_data_dir }}

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/tigerbeetle.service
    mode: "0644"
  notify:
    - restart tigerbeetle

- name: Apply TigerBeetle unit changes before proceeding
  ansible.builtin.meta: flush_handlers

# --- Enable and start ---

- name: Enable and start TigerBeetle
  ansible.builtin.systemd:
    name: tigerbeetle
    enabled: true
    state: started
    daemon_reload: true

# --- Readiness gate ---

- name: Wait for TigerBeetle to be ready
  ansible.builtin.wait_for:
    port: "{{ topology_endpoints.tigerbeetle.endpoints.client.port }}"
    host: "{{ topology_endpoints.tigerbeetle.host }}"
    timeout: 30

# --- Connection smoke test ---
# The REPL requires a full TTY, so we verify client-level connectivity
# via a Python PTY wrapper that spawns the REPL and checks for the
# successful connection log line.

- name: Deploy TigerBeetle connection test script
  ansible.builtin.copy:
    content: |
      #!/usr/bin/env python3
      import subprocess, pty, os, time, select, sys
      master, slave = pty.openpty()
      proc = subprocess.Popen(
          [sys.argv[1], "repl",
           "--cluster=" + sys.argv[2],
           "--addresses=" + sys.argv[3]],
          stdin=slave, stdout=slave, stderr=slave, close_fds=True)
      os.close(slave)
      output = b""
      deadline = time.time() + 8
      while time.time() < deadline:
          if select.select([master], [], [], 0.2)[0]:
              output += os.read(master, 4096)
          if b"on_connect: connected" in output:
              break
      proc.terminate()
      proc.wait()
      os.close(master)
      if b"on_connect: connected" in output:
          print("OK: REPL client connected to TigerBeetle server")
          sys.exit(0)
      print("FAIL: REPL client did not connect within 8s")
      print(output.decode("utf-8", errors="replace"))
      sys.exit(1)
    dest: /opt/verself/tigerbeetle-health.py
    mode: "0755"

- name: Verify REPL client can connect to TigerBeetle server
  ansible.builtin.command:
    cmd: >-
      python3 /opt/verself/tigerbeetle-health.py
      {{ verself_bin }}/tigerbeetle
      {{ tigerbeetle_cluster_id }}
      {{ topology_endpoints.tigerbeetle.endpoints.client.address }}
  register: tigerbeetle_connection_test
  changed_when: false
  failed_when: tigerbeetle_connection_test.rc != 0
