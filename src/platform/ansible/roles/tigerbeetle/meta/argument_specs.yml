---
argument_specs:
  main:
    short_description: "TigerBeetle financial ledger service"
    description:
      - "Deploys TigerBeetle. Formats the data file"
      - "(idempotent), configures the systemd unit with CAP_IPC_LOCK,"
      - "and verifies health via a transaction smoke test."
      - "Service ports come from the generated topology vars (group_vars/all/generated/topology.yml)."
    options:
      tigerbeetle_data_dir:
        type: path
        default: /var/lib/tigerbeetle
        description: "TigerBeetle data directory."

      tigerbeetle_data_file:
        type: path
        default: /var/lib/tigerbeetle/data.tigerbeetle
        description: "TigerBeetle data file path."

      tigerbeetle_cluster_id:
        type: int
        default: 0
        description: "TigerBeetle cluster ID."

      tigerbeetle_replica_id:
        type: int
        default: 0
        description: "TigerBeetle replica ID (0-indexed)."

      tigerbeetle_replica_count:
        type: int
        default: 1
        description: "Total replica count. Immutable after format."

      verself_bin:
        type: path
        required: true
        description: "Path to the server binary directory."
