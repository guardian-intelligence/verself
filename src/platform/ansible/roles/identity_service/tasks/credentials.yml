---
- name: Create credstore directory for identity-service
  ansible.builtin.file:
    path: /etc/credstore/identity-service
    state: directory
    owner: root
    group: identity_service
    mode: "0750"

- name: Deploy identity-service PG DSN credential
  vars:
    identity_service_pg_dsn: >-
      postgres://identity_service@{{ services.postgresql.host }}:{{ services.postgresql.port
      }}/identity_service?sslmode=disable&password={{ postgresql_identity_service_password | urlencode }}
  ansible.builtin.copy:
    content: "{{ identity_service_pg_dsn }}"
    dest: /etc/credstore/identity-service/pg-dsn
    owner: root
    group: identity_service
    mode: "0640"
  no_log: true
  notify: restart identity-service

- name: Deploy identity-service Zitadel admin token credential
  ansible.builtin.copy:
    content: "{{ identity_service_zitadel_admin_pat }}"
    dest: /etc/credstore/identity-service/zitadel-admin-token
    owner: root
    group: identity_service
    mode: "0640"
  no_log: true
  notify: restart identity-service

- name: Deploy identity-service Zitadel action signing key credential
  ansible.builtin.copy:
    content: "{{ identity_service_zitadel_action_signing_key }}"
    dest: /etc/credstore/identity-service/zitadel-action-signing-key
    owner: root
    group: identity_service
    mode: "0640"
  no_log: true
  notify: restart identity-service
