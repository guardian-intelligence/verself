---
- name: Apply identity-service PostgreSQL migrations
  ansible.builtin.include_role:
    name: service_pg_migrations
  vars:
    service_pg_migrations_service: identity-service
    service_pg_migrations_db: identity_service
    service_pg_migrations_db_user: identity_service
    service_pg_migrations_db_owner: identity_service
    service_pg_migrations_db_password: "{{ postgresql_identity_service_password }}"
    service_pg_migrations_source_dir: "{{ playbook_dir }}/../../../identity-service/migrations"
    service_pg_migrations_probe_table: identity_member_capabilities
    service_pg_migrations_stop_units:
      - identity-service
    service_pg_migrations_force_reset: "{{ identity_service_force_schema_reset | default(false) | bool }}"

- name: Reconcile identity-service object ownership and privileges
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres
      -d identity_service
      -v ON_ERROR_STOP=1
    stdin: |
      DO $$
      BEGIN
        IF to_regclass('public.identity_member_capabilities') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.identity_member_capabilities OWNER TO identity_service';
        END IF;
        IF to_regclass('public.identity_api_credentials') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.identity_api_credentials OWNER TO identity_service';
        END IF;
        IF to_regclass('public.identity_api_credential_permissions') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.identity_api_credential_permissions OWNER TO identity_service';
        END IF;
        IF to_regclass('public.identity_api_credential_secrets') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.identity_api_credential_secrets OWNER TO identity_service';
        END IF;
      END
      $$;
      GRANT USAGE, CREATE ON SCHEMA public TO identity_service;
      GRANT ALL PRIVILEGES ON TABLE
        public.identity_member_capabilities,
        public.identity_api_credentials,
        public.identity_api_credential_permissions,
        public.identity_api_credential_secrets
      TO identity_service;
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  changed_when: false
  no_log: true
