---
- name: Verify identity-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/identity-service"
  register: identity_service_binary
  failed_when: not identity_service_binary.stat.exists

- name: Create identity_service system group
  ansible.builtin.group:
    name: identity_service
    system: true

- name: Ensure spire workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create identity_service system user
  ansible.builtin.user:
    name: identity_service
    group: identity_service
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Deploy identity-service nftables ruleset
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/nftables.d/identity-service.nft"
    dest: /etc/nftables.d/identity-service.nft
    mode: "0644"
  notify: Reload nftables for identity-service

- name: Apply identity-service nftables before proceeding
  ansible.builtin.meta: flush_handlers

- name: Include identity-service PostgreSQL database tasks
  ansible.builtin.include_tasks: database.yml

- name: Include identity-service PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

- name: Ensure identity-service ClickHouse user exists with domain ledger grants
  ansible.builtin.shell: |
    set -euo pipefail
    {{ clickhouse_operator_client_command }} --multiquery <<'SQL'
    CREATE USER IF NOT EXISTS identity_service IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_identity_service_id }}' HOST LOCAL;
    ALTER USER identity_service IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_identity_service_id }}' HOST LOCAL;
    GRANT INSERT ON verself.domain_update_ledger TO identity_service;
    GRANT SELECT ON verself.domain_update_ledger TO identity_service;
    SQL
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Wait for Zitadel before configuring identity-service auth
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.zitadel.host }}"
    port: "{{ topology_endpoints.zitadel.endpoints.http.port }}"
    timeout: 60

- name: Read Zitadel admin PAT for identity-service auth setup
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: identity_service_zitadel_admin_pat_raw
  no_log: true

- name: Set identity-service Zitadel admin PAT fact
  ansible.builtin.set_fact:
    identity_service_zitadel_admin_pat: "{{ identity_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
  no_log: true

- name: List Zitadel projects for identity-service auth
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ identity_service_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body: {}
    return_content: true
  register: identity_service_zitadel_projects
  no_log: true

- name: Find identity-service auth project
  ansible.builtin.set_fact:
    identity_service_auth_project: >-
      {{
        (
          identity_service_zitadel_projects.json.result
          | selectattr('name', 'equalto', identity_service_auth_project_name)
          | list
          | first
        ) | default({})
      }}

- name: Create identity-service auth project if missing
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ identity_service_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ identity_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    return_content: true
  register: identity_service_auth_project_created
  when: identity_service_auth_project == {}
  no_log: true

- name: Set identity-service auth audience
  ansible.builtin.set_fact:
    identity_service_auth_audience: >-
      {{
        identity_service_auth_project.id
        | default(identity_service_auth_project_created.json.id, true)
      }}

- name: Assert identity-service auth audience is set
  ansible.builtin.assert:
    that: identity_service_auth_audience | default('', true) | length > 0
    fail_msg: identity_service_auth_audience could not be resolved from Zitadel.

- name: Ensure identity-service project has role assertion enabled
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/{{ identity_service_auth_audience }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ identity_service_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ identity_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    status_code: 200
  when: identity_service_auth_project != {}
  no_log: true

- name: Ensure identity-service project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ identity_service_zitadel_admin_pat }}"
    zitadel_project_roles_project_id: "{{ identity_service_auth_audience }}"
    zitadel_project_roles_definitions:
      - key: owner
        display_name: Owner
        group: identity
      - key: admin
        display_name: Admin
        group: identity
      - key: member
        display_name: Member
        group: identity
  when: identity_service_auth_audience | default('', true) | length > 0

- name: List Zitadel Actions V2 targets for identity-service API credentials
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/v2/actions/targets/search"
    method: POST
    headers:
      Authorization: "Bearer {{ identity_service_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      pagination:
        limit: 100
    return_content: true
    status_code: 200
  register: identity_service_zitadel_action_targets
  no_log: true

- name: Select identity-service API credential Actions V2 target
  ansible.builtin.set_fact:
    identity_service_zitadel_action_target: >-
      {{
        (
          identity_service_zitadel_action_targets.json.targets | default([])
          | selectattr('name', 'equalto', 'verself-api-credential-claims')
          | list
          | first
        ) | default({})
      }}
  no_log: true

- name: Create identity-service API credential Actions V2 target if missing
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/v2/actions/targets"
    method: POST
    headers:
      Authorization: "Bearer {{ identity_service_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: verself-api-credential-claims
      endpoint: "https://{{ zitadel_domain }}/internal/zitadel/actions/api-credential-claims"
      timeout: "1s"
      payloadType: PAYLOAD_TYPE_JSON
      restCall:
        interruptOnError: false
    return_content: true
    status_code: [200, 201]
  register: identity_service_zitadel_action_target_created
  when: identity_service_zitadel_action_target == {}
  no_log: true

- name: Set identity-service API credential Actions V2 target state
  ansible.builtin.set_fact:
    identity_service_zitadel_action_target_id: >-
      {{
        identity_service_zitadel_action_target.id
        | default(identity_service_zitadel_action_target_created.json.id, true)
      }}
    identity_service_zitadel_action_signing_key: >-
      {{
        identity_service_zitadel_action_target.signingKey
        | default(identity_service_zitadel_action_target_created.json.signingKey, true)
      }}
  no_log: true

- name: Assert identity-service API credential Actions V2 target state is complete
  ansible.builtin.assert:
    that:
      - identity_service_zitadel_action_target_id | default('', true) | length > 0
      - identity_service_zitadel_action_signing_key | default('', true) | length > 0
    fail_msg: identity-service API credential Zitadel Actions V2 target did not return id and signingKey.

- name: Wire identity-service API credential target into pre-access-token execution
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/v2/actions/executions"
    method: PUT
    headers:
      Authorization: "Bearer {{ identity_service_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      condition:
        function:
          name: preaccesstoken
      targets:
        - "{{ identity_service_zitadel_action_target_id }}"
    status_code: 200
  no_log: true

- name: Include identity-service credential tasks
  ansible.builtin.include_tasks: credentials.yml

- name: Deploy identity-service systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Identity Service
      After=verself-firewall.target network.target postgresql.service clickhouse-server.service zitadel.service spire-agent.service
      Requires=verself-firewall.target
      Wants=postgresql.service clickhouse-server.service zitadel.service spire-agent.service

      [Service]
      Type=simple
      User=identity_service
      Group=identity_service
      SupplementaryGroups={{ spire_workload_group }}
      BindReadOnlyPaths=/etc/verself/auth-discovery-hosts:/etc/hosts
      LoadCredential=zitadel-admin-token:/etc/credstore/identity-service/zitadel-admin-token
      LoadCredential=zitadel-action-signing-key:/etc/credstore/identity-service/zitadel-action-signing-key
      LoadCredential=clickhouse-ca-cert:/etc/clickhouse-server/tls/server-ca.pem
      Environment=IDENTITY_LISTEN_ADDR={{ topology_endpoints.identity_service.endpoints.public_http.address }}
      Environment=IDENTITY_INTERNAL_LISTEN_ADDR={{ topology_endpoints.identity_service.endpoints.internal_https.address }}
      Environment=IDENTITY_PG_DSN=postgres://identity_service@/identity_service?host=/var/run/postgresql&sslmode=disable
      Environment=IDENTITY_CH_ADDRESS={{ topology_endpoints.clickhouse.endpoints.native_tls.address }}
      Environment=IDENTITY_CH_USER=identity_service
      Environment=IDENTITY_GOVERNANCE_AUDIT_URL={{ identity_service_governance_audit_url }}
      Environment=IDENTITY_AUTH_ISSUER_URL={{ identity_service_auth_issuer_url }}
      Environment=IDENTITY_AUTH_AUDIENCE={{ identity_service_auth_audience }}
      Environment=IDENTITY_ZITADEL_BASE_URL={{ identity_service_zitadel_base_url }}
      Environment=IDENTITY_ZITADEL_HOST={{ identity_service_zitadel_host }}
      Environment=SPIFFE_ENDPOINT_SOCKET=unix://{{ spire_agent_socket_path }}
      Environment=OTEL_SERVICE_NAME=identity-service
      Environment=OTEL_EXPORTER_OTLP_ENDPOINT=http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}
      ExecStart={{ verself_bin }}/identity-service
      Restart=on-failure
      RestartSec=5
      CapabilityBoundingSet=
      ProtectHome=true
      ProtectSystem=strict
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0077

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/identity-service.service
    mode: "0644"
  vars:
    identity_service_governance_audit_url: >-
      https://{{ topology_endpoints.governance_service.endpoints.internal_https.address }}
  notify: restart identity-service

- name: Apply identity-service unit changes before proceeding
  ansible.builtin.meta: flush_handlers

- name: Enable and start identity-service
  ansible.builtin.systemd:
    name: identity-service
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for identity-service listener to be present
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.identity_service.host }}"
    port: "{{ topology_endpoints.identity_service.endpoints.public_http.port }}"
    timeout: 60

- name: Wait for identity-service internal listener to be present
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.identity_service.host }}"
    port: "{{ topology_endpoints.identity_service.endpoints.internal_https.port }}"
    timeout: 60

- name: Wait for identity-service readiness
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.identity_service.endpoints.public_http.address }}/readyz"
    method: GET
    status_code: 200
  register: identity_service_readyz
  retries: 30
  delay: 1
  until: identity_service_readyz.status == 200
