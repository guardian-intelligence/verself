---
- name: List OpenBao secret mounts for platform runtime secrets
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/mounts"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: openbao_platform_mounts_response
  changed_when: false
  no_log: true

- name: Enable OpenBao platform KV v2 mount
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/mounts/{{ openbao_platform_kv_mount }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    body_format: json
    body:
      type: kv
      description: Forge Metal platform runtime provider secrets
      options:
        version: "2"
    validate_certs: false
    status_code: 204
  when: (openbao_platform_kv_mount ~ '/') not in (openbao_platform_mounts_response.json.data.keys() | list)
  changed_when: true
  no_log: true

- name: Set OpenBao platform secret definitions
  ansible.builtin.set_fact:
    openbao_platform_secret_items:
      - path: providers/stripe/billing-service
        data:
          secret_key: "{{ stripe_secret_key }}"
          webhook_secret: "{{ stripe_webhook_secret }}"
      - path: providers/resend/mailbox-service
        data:
          api_key: "{{ resend_api_key }}"
      - path: providers/stalwart/mailbox-service
        data:
          admin_password: "{{ stalwart_admin_password }}"
  no_log: true

- name: Set sandbox-rental GitHub App configuration state for OpenBao
  ansible.builtin.set_fact:
    openbao_sandbox_github_app_configured: >-
      {{
        (sandbox_rental_service_github_app_enabled | default(false, true) | bool)
        or (sandbox_rental_service_github_app_id | default(0, true) | int > 0)
        or (sandbox_rental_service_github_app_slug | default('', true) | trim | length > 0)
        or (sandbox_rental_service_github_app_client_id | default('', true) | trim | length > 0)
      }}

- name: Inspect legacy sandbox-rental GitHub App private key
  ansible.builtin.stat:
    path: /etc/credstore/sandbox-rental/github-app-private-key
  register: openbao_github_private_key_stat
  when: openbao_sandbox_github_app_configured | bool
  no_log: true

- name: Inspect legacy sandbox-rental GitHub App webhook secret
  ansible.builtin.stat:
    path: /etc/credstore/sandbox-rental/github-app-webhook-secret
  register: openbao_github_webhook_secret_stat
  when: openbao_sandbox_github_app_configured | bool
  no_log: true

- name: Inspect legacy sandbox-rental GitHub App client secret
  ansible.builtin.stat:
    path: /etc/credstore/sandbox-rental/github-app-client-secret
  register: openbao_github_client_secret_stat
  when: openbao_sandbox_github_app_configured | bool
  no_log: true

- name: Read legacy sandbox-rental GitHub App private key for OpenBao migration
  ansible.builtin.slurp:
    src: /etc/credstore/sandbox-rental/github-app-private-key
  register: openbao_github_private_key_raw
  when:
    - openbao_sandbox_github_app_configured | bool
    - openbao_github_private_key_stat.stat.exists | default(false) | bool
    - openbao_github_private_key_stat.stat.size | default(0) | int > 0
  no_log: true

- name: Read legacy sandbox-rental GitHub App webhook secret for OpenBao migration
  ansible.builtin.slurp:
    src: /etc/credstore/sandbox-rental/github-app-webhook-secret
  register: openbao_github_webhook_secret_raw
  when:
    - openbao_sandbox_github_app_configured | bool
    - openbao_github_webhook_secret_stat.stat.exists | default(false) | bool
    - openbao_github_webhook_secret_stat.stat.size | default(0) | int > 0
  no_log: true

- name: Read legacy sandbox-rental GitHub App client secret for OpenBao migration
  ansible.builtin.slurp:
    src: /etc/credstore/sandbox-rental/github-app-client-secret
  register: openbao_github_client_secret_raw
  when:
    - openbao_sandbox_github_app_configured | bool
    - openbao_github_client_secret_stat.stat.exists | default(false) | bool
    - openbao_github_client_secret_stat.stat.size | default(0) | int > 0
  no_log: true

- name: Read existing OpenBao sandbox-rental GitHub App provider secret
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/{{ openbao_platform_kv_mount }}/data/providers/github/sandbox-rental-service"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    validate_certs: false
    status_code: [200, 404]
    return_content: true
  register: openbao_github_provider_existing
  when: openbao_sandbox_github_app_configured | bool
  changed_when: false
  no_log: true

- name: Set OpenBao GitHub App bootstrap secret values
  ansible.builtin.set_fact:
    openbao_github_provider_bootstrap_data:
      private_key: "{{ (openbao_github_private_key_raw.content | default('', true) | b64decode | trim) }}"
      webhook_secret: "{{ (openbao_github_webhook_secret_raw.content | default('', true) | b64decode | trim) }}"
      client_secret: "{{ (openbao_github_client_secret_raw.content | default('', true) | b64decode | trim) }}"
  when: openbao_sandbox_github_app_configured | bool
  no_log: true

- name: Assert configured GitHub App has OpenBao or migratable credentials
  ansible.builtin.assert:
    that:
      - >-
        openbao_github_provider_existing.status | default(404) == 200
        or (
          openbao_github_provider_bootstrap_data.private_key | default('', true) | length > 0
          and openbao_github_provider_bootstrap_data.webhook_secret | default('', true) | length > 0
          and openbao_github_provider_bootstrap_data.client_secret | default('', true) | length > 0
        )
    fail_msg: >-
      GitHub runner integration is configured, but no complete sandbox-rental
      GitHub App provider secret exists in OpenBao and no complete legacy
      /etc/credstore/sandbox-rental credential set is available to migrate.
      Populate OpenBao path {{ openbao_platform_kv_mount }}/providers/github/sandbox-rental-service
      or restore the legacy files for one cutover deploy.
  when: openbao_sandbox_github_app_configured | bool
  no_log: true

- name: Add migratable GitHub App provider secret to OpenBao definitions
  ansible.builtin.set_fact:
    openbao_platform_secret_items: >-
      {{
        openbao_platform_secret_items
        + [
          {
            'path': 'providers/github/sandbox-rental-service',
            'data': openbao_github_provider_bootstrap_data
          }
        ]
      }}
  when:
    - openbao_sandbox_github_app_configured | bool
    - openbao_github_provider_bootstrap_data.private_key | default('', true) | length > 0
    - openbao_github_provider_bootstrap_data.webhook_secret | default('', true) | length > 0
    - openbao_github_provider_bootstrap_data.client_secret | default('', true) | length > 0
  no_log: true

- name: Read OpenBao platform runtime provider secrets
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/{{ openbao_platform_kv_mount }}/data/{{ item.path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    validate_certs: false
    status_code: [200, 404]
    return_content: true
  loop: "{{ openbao_platform_secret_items }}"
  loop_control:
    label: "{{ item.path }}"
  register: openbao_platform_secret_reads
  changed_when: false
  no_log: true

- name: Write changed OpenBao platform runtime provider secrets
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/{{ openbao_platform_kv_mount }}/data/{{ item.item.path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    body_format: json
    body:
      data: "{{ item.item.data }}"
    validate_certs: false
    status_code: [200, 204]
  loop: "{{ openbao_platform_secret_reads.results }}"
  loop_control:
    label: "{{ item.item.path }}"
  register: openbao_platform_secret_writes
  changed_when: true
  when: >-
    item.status == 404
    or ((item.json.data.data | default({})) != item.item.data)
  no_log: true

- name: Set OpenBao platform workload role definitions
  ansible.builtin.set_fact:
    openbao_platform_workload_roles:
      - role: platform-billing-service
        spiffe_id: "{{ spire_billing_service_id }}"
        paths:
          - providers/stripe/billing-service
      - role: platform-sandbox-rental-service
        spiffe_id: "{{ spire_sandbox_rental_id }}"
        paths:
          - providers/github/sandbox-rental-service
      - role: platform-mailbox-service
        spiffe_id: "{{ spire_mailbox_service_id }}"
        paths:
          - providers/resend/mailbox-service
          - providers/stalwart/mailbox-service

- name: Render OpenBao platform workload policy documents
  ansible.builtin.set_fact:
    openbao_platform_policies: >-
      {{
        (openbao_platform_policies | default([]))
        + [
          {
            'name': item.role,
            'document': lookup('ansible.builtin.template', 'platform-read.hcl.j2')
          }
        ]
      }}
  loop: "{{ openbao_platform_workload_roles }}"
  loop_control:
    label: "{{ item.role }}"

- name: Read OpenBao platform workload policies
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/policies/acl/{{ item.name }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    validate_certs: false
    status_code: [200, 404]
    return_content: true
  loop: "{{ openbao_platform_policies }}"
  loop_control:
    label: "{{ item.name }}"
  register: openbao_platform_policy_reads
  changed_when: false
  no_log: true

- name: Write changed OpenBao platform workload policies
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/policies/acl/{{ item.item.name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    body_format: json
    body:
      policy: "{{ item.item.document }}"
    validate_certs: false
    status_code: 204
  loop: "{{ openbao_platform_policy_reads.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: openbao_platform_policy_writes
  changed_when: true
  when: >-
    item.status == 404
    or (((item.json.data | default({})).policy | default(item.json.policy | default(''))) | trim) != (item.item.document | trim)
  no_log: true

- name: Read OpenBao platform SPIFFE JWT workload roles
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/auth/{{ openbao_spiffe_jwt_mount }}/role/{{ item.role }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    validate_certs: false
    status_code: [200, 404]
    return_content: true
  loop: "{{ openbao_platform_workload_roles }}"
  loop_control:
    label: "{{ item.role }}"
  register: openbao_platform_role_reads
  changed_when: false
  no_log: true

- name: Write changed OpenBao platform SPIFFE JWT workload roles
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/auth/{{ openbao_spiffe_jwt_mount }}/role/{{ item.item.role }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    body_format: json
    body:
      role_type: jwt
      bound_audiences:
        - "{{ openbao_workload_audience }}"
      user_claim: sub
      bound_claims:
        sub: "{{ item.item.spiffe_id }}"
      token_policies:
        - "{{ item.item.role }}"
      token_ttl: "{{ openbao_workload_token_ttl }}"
      token_max_ttl: "{{ openbao_workload_token_max_ttl }}"
      token_no_default_policy: true
      token_num_uses: 0
    validate_certs: false
    status_code: 204
  loop: "{{ openbao_platform_role_reads.results }}"
  loop_control:
    label: "{{ item.item.role }}"
  register: openbao_platform_role_writes
  changed_when: true
  when: >-
    item.status == 404
    or (
      ((item.json.data | default({})).token_policies | default([]) | sort)
      != ([item.item.role] | sort)
    )
    or (
      ((item.json.data | default({})).bound_audiences | default([]) | sort)
      != ([openbao_workload_audience] | sort)
    )
    or (
      ((item.json.data | default({})).bound_claims | default({})).sub | default('')
    ) != item.item.spiffe_id
    or not ((item.json.data | default({})).token_no_default_policy | default(false) | bool)
  no_log: true
