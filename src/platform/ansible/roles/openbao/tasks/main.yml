---
# OpenBao single-node Raft bootstrap. OpenBao configuration references the
# historic Vault env/header names (`VAULT_*`, `X-Vault-*`) for compatibility.

- name: Verify OpenBao binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/bao"
  register: openbao_binary
  failed_when: not openbao_binary.stat.exists

- name: Capture OpenBao version
  ansible.builtin.command:
    cmd: "{{ verself_bin }}/bao version"
  register: openbao_version_output
  changed_when: false

- name: Assert OpenBao version matches server-tools pin
  ansible.builtin.assert:
    that: "'OpenBao v2.5.2' in openbao_version_output.stdout"
    fail_msg: "Expected OpenBao v2.5.2, got: {{ openbao_version_output.stdout }}"

- name: Create openbao system group
  ansible.builtin.group:
    name: openbao
    system: true

- name: Create openbao system user
  ansible.builtin.user:
    name: openbao
    group: openbao
    system: true
    home: "{{ openbao_data_dir }}"
    shell: /usr/sbin/nologin
    create_home: false

- name: Create OpenBao directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ openbao_config_dir }}", owner: root, group: openbao, mode: "0750" }
    - { path: "{{ openbao_tls_dir }}", owner: root, group: openbao, mode: "0750" }
    - { path: "{{ openbao_data_dir }}", owner: openbao, group: openbao, mode: "0700" }
    - { path: "{{ openbao_raft_dir }}", owner: openbao, group: openbao, mode: "0700" }
    - { path: "{{ openbao_log_dir }}", owner: openbao, group: openbao, mode: "0700" }
    - { path: "{{ openbao_credstore_dir }}", owner: root, group: openbao, mode: "0750" }

- name: Confirm destructive OpenBao rebootstrap request
  ansible.builtin.assert:
    that:
      - openbao_rebootstrap_confirm == 'wipe-openbao'
    fail_msg: >-
      openbao_rebootstrap=true requires
      openbao_rebootstrap_confirm=wipe-openbao because it deletes the Raft
      datastore and root/unseal credentials before bootstrapping a new node.
  when: openbao_rebootstrap | bool

- name: Set OpenBao rebootstrap GitHub App preservation state
  ansible.builtin.set_fact:
    openbao_rebootstrap_sandbox_github_app_configured: >-
      {{
        (sandbox_rental_service_github_app_enabled | default(false, true) | bool)
        or (sandbox_rental_service_github_app_id | default(0, true) | int > 0)
        or (sandbox_rental_service_github_app_slug | default('', true) | trim | length > 0)
        or (sandbox_rental_service_github_app_client_id | default('', true) | trim | length > 0)
      }}
  when: openbao_rebootstrap | bool

- name: Read Zitadel admin PAT before OpenBao rebootstrap
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: openbao_rebootstrap_zitadel_admin_pat_raw
  when:
    - openbao_rebootstrap | bool
    - openbao_rebootstrap_sandbox_github_app_configured | bool
  no_log: true

- name: Resolve platform organization before OpenBao rebootstrap
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/v2/organizations/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ openbao_rebootstrap_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body: {}
    return_content: true
    status_code: 200
  register: openbao_rebootstrap_org_search
  when:
    - openbao_rebootstrap | bool
    - openbao_rebootstrap_sandbox_github_app_configured | bool
  no_log: true

- name: Set platform organization ID before OpenBao rebootstrap
  ansible.builtin.set_fact:
    openbao_rebootstrap_platform_org_id: >-
      {{
        (
          openbao_rebootstrap_org_search.json.result
          | default([])
          | selectattr('name', 'equalto', openbao_tenancy_platform_org_name | default('verself', true))
          | map(attribute='id')
          | list
          | first
        ) | default('')
      }}
  when:
    - openbao_rebootstrap | bool
    - openbao_rebootstrap_sandbox_github_app_configured | bool
  no_log: true

- name: Assert platform organization was resolved before OpenBao rebootstrap
  ansible.builtin.assert:
    that: openbao_rebootstrap_platform_org_id | default('', true) | length > 0
    fail_msg: >-
      OpenBao rebootstrap needs the platform organization ID to preserve
      sandbox-rental GitHub App runtime secrets before wiping Raft state.
  when:
    - openbao_rebootstrap | bool
    - openbao_rebootstrap_sandbox_github_app_configured | bool

- name: Resolve GitHub App runtime secret source organization before OpenBao rebootstrap
  ansible.builtin.set_fact:
    openbao_rebootstrap_github_source_org_id_resolved: >-
      {{
        openbao_rebootstrap_github_source_org_id
        | default(openbao_rebootstrap_platform_org_id, true)
      }}
  when:
    - openbao_rebootstrap | bool
    - openbao_rebootstrap_sandbox_github_app_configured | bool
  no_log: true

- name: Read current OpenBao root token before rebootstrap
  ansible.builtin.slurp:
    src: "{{ openbao_credstore_dir }}/root-token"
  register: openbao_rebootstrap_root_token_raw
  when:
    - openbao_rebootstrap | bool
    - openbao_rebootstrap_sandbox_github_app_configured | bool
  no_log: true

- name: Read current sandbox-rental GitHub App runtime secrets before rebootstrap
  ansible.builtin.uri:
    url: >-
      https://{{ topology_endpoints.openbao.endpoints.api.address }}/v1/{{
      openbao_tenancy_kv_mount_prefix | default('kv', true) }}-{{ openbao_rebootstrap_github_source_org_id_resolved
      }}/data/secret/org/{{ item.name }}
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_rebootstrap_root_token_raw.content | b64decode | trim }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [200, 404]
    return_content: true
  loop:
    - name: sandbox-rental-service.github.private_key
      stage_path: "{{ openbao_rebootstrap_stage_dir }}/github-app-private-key"
    - name: sandbox-rental-service.github.webhook_secret
      stage_path: "{{ openbao_rebootstrap_stage_dir }}/github-app-webhook-secret"
    - name: sandbox-rental-service.github.client_secret
      stage_path: "{{ openbao_rebootstrap_stage_dir }}/github-app-client-secret"
  loop_control:
    label: "{{ item.name }}"
  register: openbao_rebootstrap_github_secret_reads
  when:
    - openbao_rebootstrap | bool
    - openbao_rebootstrap_sandbox_github_app_configured | bool
  changed_when: false
  no_log: true

- name: Assert GitHub App runtime secrets are preserved before OpenBao rebootstrap
  ansible.builtin.assert:
    that:
      - >-
        openbao_rebootstrap_github_secret_reads.results
        | selectattr('status', 'equalto', 200)
        | list
        | length == 3
    fail_msg: >-
      GitHub runner integration is configured, but the current OpenBao store
      does not contain the three sandbox-rental GitHub App runtime secrets.
      Refusing to wipe OpenBao because sandbox would lose a configured external
      integration. If this is an org-id rebrand cutover, set
      openbao_rebootstrap_github_source_org_id to the old org id whose
      kv-<org_id> mount currently contains those three secrets.
  when:
    - openbao_rebootstrap | bool
    - openbao_rebootstrap_sandbox_github_app_configured | bool
  no_log: true

- name: Create OpenBao rebootstrap credential staging directory
  ansible.builtin.file:
    path: "{{ openbao_rebootstrap_stage_dir }}"
    state: directory
    owner: root
    group: openbao
    mode: "0750"
  when:
    - openbao_rebootstrap | bool
    - openbao_rebootstrap_sandbox_github_app_configured | bool

- name: Stage sandbox-rental GitHub App runtime secrets for post-wipe migration
  ansible.builtin.copy:
    content: "{{ item.json.data.data.value }}"
    dest: "{{ item.item.stage_path }}"
    owner: root
    group: openbao
    mode: "0640"
  loop: "{{ openbao_rebootstrap_github_secret_reads.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - openbao_rebootstrap | bool
    - openbao_rebootstrap_sandbox_github_app_configured | bool
    - item.status == 200
  no_log: true

- name: Stop OpenBao before rebootstrap wipe
  ansible.builtin.systemd:
    name: openbao
    state: stopped
  failed_when: false
  when: openbao_rebootstrap | bool

- name: Remove OpenBao bootstrap state
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ openbao_raft_dir }}"
    - "{{ openbao_credstore_dir }}/root-token"
    - "{{ openbao_credstore_dir }}/unseal-key-1"
    - "{{ openbao_credstore_dir }}/unseal-key-2"
    - "{{ openbao_credstore_dir }}/unseal-key-3"
    - "{{ openbao_audit_log }}"
  when: openbao_rebootstrap | bool

- name: Recreate OpenBao Raft directory after rebootstrap wipe
  ansible.builtin.file:
    path: "{{ openbao_raft_dir }}"
    state: directory
    owner: openbao
    group: openbao
    mode: "0700"
  when: openbao_rebootstrap | bool

- name: Check if OpenBao TLS cert already exists
  ansible.builtin.stat:
    path: "{{ openbao_tls_dir }}/cert.pem"
  register: openbao_cert_check

- name: Generate OpenBao loopback TLS certificate
  ansible.builtin.command:
    cmd: >-
      openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1
      -days 3650 -nodes
      -keyout {{ openbao_tls_dir }}/key.pem
      -out {{ openbao_tls_dir }}/cert.pem
      -subj "/CN=127.0.0.1"
      -addext "subjectAltName=IP:127.0.0.1,DNS:localhost"
    creates: "{{ openbao_tls_dir }}/cert.pem"
  when: not openbao_cert_check.stat.exists
  changed_when: true

- name: Set OpenBao TLS certificate ownership
  ansible.builtin.file:
    path: "{{ openbao_tls_dir }}/{{ item.name }}"
    owner: root
    group: openbao
    mode: "{{ item.mode }}"
  loop:
    - { name: cert.pem, mode: "0640" }
    - { name: key.pem, mode: "0640" }

- name: Deploy OpenBao private hosts file
  ansible.builtin.copy:
    dest: "{{ openbao_hosts_file }}"
    owner: root
    group: openbao
    mode: "0640"
    content: |
      127.0.0.1 localhost
      ::1 localhost ip6-localhost ip6-loopback
      # OpenBao needs Zitadel's issuer URL to match tokens while staying local.
      {% for host in openbao_oidc_loopback_hosts %}
      127.0.0.1 {{ host }}
      {% endfor %}
  notify: restart openbao

- name: Deploy OpenBao nftables ruleset
  ansible.builtin.template:
    src: openbao.nft.j2
    dest: /etc/nftables.d/openbao.nft
    mode: "0644"
  notify: reload nftables

- name: Apply OpenBao nftables before proceeding
  ansible.builtin.meta: flush_handlers

- name: Deploy OpenBao configuration
  ansible.builtin.template:
    src: openbao.hcl.j2
    dest: "{{ openbao_config_dir }}/openbao.hcl"
    owner: root
    group: openbao
    mode: "0640"
  notify: restart openbao

- name: Deploy OpenBao systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=OpenBao
      After=verself-firewall.target network.target
      Requires=verself-firewall.target

      [Service]
      Type=simple
      User=openbao
      Group=openbao
      BindReadOnlyPaths={{ openbao_hosts_file }}:/etc/hosts
      Environment=BAO_ADDR=https://{{ topology_endpoints.openbao.endpoints.api.address }}
      Environment=BAO_CACERT={{ openbao_tls_dir }}/cert.pem
      Environment=VAULT_ADDR=https://{{ topology_endpoints.openbao.endpoints.api.address }}
      Environment=VAULT_CACERT={{ openbao_tls_dir }}/cert.pem
      ExecStart={{ verself_bin }}/bao server -config={{ openbao_config_dir }}/openbao.hcl
      ExecReload=/bin/kill -HUP $MAINPID
      Restart=on-failure
      RestartSec=5
      AmbientCapabilities=CAP_IPC_LOCK
      CapabilityBoundingSet=CAP_IPC_LOCK
      LimitMEMLOCK=infinity
      ProtectHome=true
      ProtectSystem=strict
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictNamespaces=true
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0077
      ReadOnlyPaths={{ openbao_config_dir }}
      ReadWritePaths={{ openbao_data_dir }} {{ openbao_log_dir }}

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/openbao.service
    mode: "0644"
  notify: restart openbao

- name: Apply OpenBao unit and config changes before proceeding
  ansible.builtin.meta: flush_handlers

- name: Enable and start OpenBao
  ansible.builtin.systemd:
    name: openbao
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for OpenBao listener
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.openbao.host }}"
    port: "{{ topology_endpoints.openbao.endpoints.api.port }}"
    timeout: 45

- name: Check OpenBao status
  ansible.builtin.command:
    cmd: "{{ verself_bin }}/bao status -format=json"
  environment:
    BAO_ADDR: "https://{{ topology_endpoints.openbao.endpoints.api.address }}"
    BAO_CACERT: "{{ openbao_tls_dir }}/cert.pem"
  register: openbao_status_raw
  changed_when: false
  failed_when: false

- name: Parse OpenBao status
  ansible.builtin.set_fact:
    openbao_status: "{{ openbao_status_raw.stdout | default('{}', true) | from_json }}"

- name: Record whether this run owns OpenBao initialization
  ansible.builtin.set_fact:
    openbao_bootstrap_initialized: "{{ not (openbao_status.initialized | default(false) | bool) }}"

- name: Initialize OpenBao when needed
  ansible.builtin.command:
    cmd: >-
      {{ verself_bin }}/bao operator init
      -key-shares={{ openbao_key_shares }}
      -key-threshold={{ openbao_key_threshold }}
      -format=json
  environment:
    BAO_ADDR: "https://{{ topology_endpoints.openbao.endpoints.api.address }}"
    BAO_CACERT: "{{ openbao_tls_dir }}/cert.pem"
  register: openbao_init_raw
  changed_when: true
  when: openbao_bootstrap_initialized | bool
  no_log: true

- name: Persist OpenBao initial root token
  ansible.builtin.copy:
    content: "{{ (openbao_init_raw.stdout | from_json).root_token }}"
    dest: "{{ openbao_credstore_dir }}/root-token"
    owner: root
    group: openbao
    mode: "0640"
  when: openbao_bootstrap_initialized | bool
  no_log: true

- name: Persist OpenBao unseal keys
  vars:
    openbao_init_payload: "{{ openbao_init_raw.stdout | from_json }}"
    openbao_unseal_keys: "{{ openbao_init_payload.unseal_keys_b64 | default(openbao_init_payload.keys_base64) }}"
  ansible.builtin.copy:
    content: "{{ item }}"
    dest: "{{ openbao_credstore_dir }}/unseal-key-{{ openbao_unseal_key_index + 1 }}"
    owner: root
    group: openbao
    mode: "0640"
  loop: "{{ openbao_unseal_keys }}"
  loop_control:
    index_var: openbao_unseal_key_index
    label: "unseal-key-{{ openbao_unseal_key_index + 1 }}"
  when: openbao_bootstrap_initialized | bool
  no_log: true

- name: Check persisted OpenBao credentials
  ansible.builtin.stat:
    path: "{{ openbao_credstore_dir }}/{{ item }}"
  loop:
    - root-token
    - unseal-key-1
    - unseal-key-2
    - unseal-key-3
  register: openbao_credential_files
  no_log: true

- name: Assert OpenBao credentials exist
  ansible.builtin.assert:
    that:
      - openbao_credential_files.results | selectattr('stat.exists', 'equalto', true) | list | length == 4
    fail_msg: >-
      OpenBao is initialized but required root/unseal credstore files are missing.
      Restore them from the operator secret backup before continuing.
  no_log: true

- name: Converge OpenBao credential permissions
  ansible.builtin.file:
    path: "{{ openbao_credstore_dir }}/{{ item }}"
    owner: root
    group: openbao
    mode: "0640"
  loop:
    - root-token
    - unseal-key-1
    - unseal-key-2
    - unseal-key-3
  no_log: true

- name: Re-check OpenBao status after initialization
  ansible.builtin.command:
    cmd: "{{ verself_bin }}/bao status -format=json"
  environment:
    BAO_ADDR: "https://{{ topology_endpoints.openbao.endpoints.api.address }}"
    BAO_CACERT: "{{ openbao_tls_dir }}/cert.pem"
  register: openbao_status_after_init_raw
  changed_when: false
  failed_when: false

- name: Parse OpenBao post-init status
  ansible.builtin.set_fact:
    openbao_status: "{{ openbao_status_after_init_raw.stdout | default('{}', true) | from_json }}"

- name: Read OpenBao unseal keys for sealed node
  ansible.builtin.slurp:
    src: "{{ openbao_credstore_dir }}/unseal-key-{{ item }}"
  loop: "{{ range(1, openbao_key_threshold + 1) | list }}"
  register: openbao_unseal_key_reads
  when: openbao_status.sealed | default(true) | bool
  no_log: true

- name: Submit OpenBao unseal keys
  ansible.builtin.uri:
    url: "https://{{ topology_endpoints.openbao.endpoints.api.address }}/v1/sys/unseal"
    method: POST
    body_format: json
    body:
      key: "{{ item.content | b64decode | trim }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: 200
    return_content: true
  loop: "{{ openbao_unseal_key_reads.results | default([]) }}"
  loop_control:
    label: "unseal-key"
  when: openbao_status.sealed | default(true) | bool
  no_log: true

- name: Read OpenBao root token
  ansible.builtin.slurp:
    src: "{{ openbao_credstore_dir }}/root-token"
  register: openbao_root_token_raw
  no_log: true

- name: List OpenBao auth mounts for SPIFFE JWT auth
  ansible.builtin.uri:
    url: "https://{{ topology_endpoints.openbao.endpoints.api.address }}/v1/sys/auth"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: 200
    return_content: true
  register: openbao_auth_mounts_response
  changed_when: false
  no_log: true

- name: Enable OpenBao SPIFFE JWT auth mount
  ansible.builtin.uri:
    url: "https://{{ topology_endpoints.openbao.endpoints.api.address }}/v1/sys/auth/{{ openbao_spiffe_jwt_mount }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    body_format: json
    body:
      type: jwt
      description: Verself SPIRE JWT-SVID workload auth
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: 204
  when: (openbao_spiffe_jwt_mount ~ '/') not in (openbao_auth_mounts_response.json.data.keys() | list)
  changed_when: true
  no_log: true

- name: Read OpenBao SPIFFE JWT auth config
  ansible.builtin.uri:
    url: "https://{{ topology_endpoints.openbao.endpoints.api.address }}/v1/auth/{{ openbao_spiffe_jwt_mount }}/config"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [200, 404]
    return_content: true
  register: openbao_spiffe_jwt_config_response
  changed_when: false
  no_log: true

- name: Read SPIRE bundle endpoint CA for OpenBao JWT auth
  ansible.builtin.slurp:
    src: "{{ openbao_spiffe_jwt_jwks_ca_pem_path }}"
  register: openbao_spiffe_jwt_jwks_ca
  no_log: true

- name: Configure OpenBao SPIFFE JWT auth JWKS validation
  ansible.builtin.uri:
    url: "https://{{ topology_endpoints.openbao.endpoints.api.address }}/v1/auth/{{ openbao_spiffe_jwt_mount }}/config"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    body_format: json
    body:
      jwks_url: "{{ openbao_spiffe_jwt_jwks_url }}"
      jwks_ca_pem: "{{ openbao_spiffe_jwt_jwks_ca.content | b64decode }}"
      bound_issuer: "{{ spire_jwt_issuer_url }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: 204
  when: >-
    openbao_spiffe_jwt_config_response.status == 404
    or (openbao_spiffe_jwt_config_response.json.data | default({})).jwks_url | default('') != openbao_spiffe_jwt_jwks_url
    or (openbao_spiffe_jwt_config_response.json.data | default({})).bound_issuer | default('') != spire_jwt_issuer_url
    or (openbao_spiffe_jwt_config_response.json.data | default({})).jwks_ca_pem | default([]) | length == 0
    or (openbao_spiffe_jwt_config_response.json.data | default({})).oidc_discovery_url | default('') != ''
  changed_when: true
  no_log: true

- name: Verify OpenBao health
  ansible.builtin.uri:
    url: "https://{{ topology_endpoints.openbao.endpoints.api.address }}/v1/sys/health"
    method: GET
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: 200
    return_content: true
  register: openbao_health

- name: Configure OpenBao audited request headers
  ansible.builtin.uri:
    url: "https://{{ topology_endpoints.openbao.endpoints.api.address }}/v1/sys/config/auditing/request-headers/{{ item.name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
    body_format: json
    body: "{{ {'hmac': (item.hmac | bool)} }}"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: [200, 204]
  loop: "{{ openbao_audit_request_headers }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Probe OpenBao authenticated sys/mounts to exercise audit device
  ansible.builtin.uri:
    url: "https://{{ topology_endpoints.openbao.endpoints.api.address }}/v1/sys/mounts"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_root_token_raw.content | b64decode | trim }}"
      X-Verself-Request-Id: "openbao-bootstrap-probe"
    ca_path: "{{ openbao_tls_dir }}/cert.pem"
    status_code: 200
    return_content: true
  no_log: true

- name: Wait for OpenBao audit log
  ansible.builtin.wait_for:
    path: "{{ openbao_audit_log }}"
    state: present
    timeout: 15

- name: Set OpenBao audit log permissions
  ansible.builtin.file:
    path: "{{ openbao_audit_log }}"
    owner: openbao
    group: openbao
    mode: "0600"
