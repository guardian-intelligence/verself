---
argument_specs:
  main:
    short_description: "OpenBao single-node Raft KMS and secrets backend"
    description:
      - "Deploys OpenBao with a loopback TLS listener, integrated Raft storage,"
      - "declarative file audit device, manual Shamir unseal keys in credstore,"
      - "and nftables confinement. Service ports come from group_vars/all/services.yml."
    options:
      openbao_config_dir:
        type: path
        default: /etc/openbao
      openbao_tls_dir:
        type: path
        default: /etc/openbao/tls
      openbao_data_dir:
        type: path
        default: /var/lib/openbao
      openbao_raft_dir:
        type: path
        default: /var/lib/openbao/raft
      openbao_log_dir:
        type: path
        default: /var/log/openbao
      openbao_audit_log:
        type: path
        default: /var/log/openbao/audit.log
      openbao_credstore_dir:
        type: path
        default: /etc/credstore/openbao
      openbao_node_id:
        type: str
        default: forge-metal-single-node
      openbao_key_shares:
        type: int
        default: 3
      openbao_key_threshold:
        type: int
        default: 2
      openbao_oidc_loopback_hosts:
        type: list
        elements: str
      openbao_spiffe_jwt_mount:
        type: str
        default: spiffe-jwt
      openbao_platform_kv_mount:
        type: str
        default: platform
      openbao_workload_audience:
        type: str
        default: openbao
      openbao_workload_token_ttl:
        type: str
        default: 15m
      openbao_workload_token_max_ttl:
        type: str
        default: 1h
      openbao_audit_request_headers:
        type: list
        elements: dict
        options:
          name:
            type: str
            required: true
          hmac:
            type: bool
            required: true
      fm_bin:
        type: path
        required: true
