---
# Manage Cloudflare DNS records declared by the CUE topology.

- name: Validate Cloudflare API token is configured
  ansible.builtin.fail:
    msg: >-
      cloudflare_api_token is empty. Set it in the encrypted Ansible group vars before deploying.
  when: cloudflare_api_token | default('', true) | length == 0

# DNS records publish the bare-metal node's *public* IP, sourced from
# CUE (config.bare_metal.public_ipv4 → bare_metal_public_ipv4 in
# generated/ops.yml). Ansible's inventory ansible_host is the wg-ops IP
# (used for SSH only); historically these two were coupled and a
# cutover that bound sshd to wg-ops silently re-pointed every public
# *.verself.sh A record at 10.66.66.1. Reading the public IPv4 from
# the CUE projection breaks that coupling at the schema level — there
# is no inventory shadow to drift.
- name: Validate Cloudflare DNS target IP is configured
  ansible.builtin.assert:
    that:
      - bare_metal_public_ipv4 is defined
      - bare_metal_public_ipv4 | length > 0
      - bare_metal_public_ipv4 is match('^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$')
      - not (bare_metal_public_ipv4 is match('^10\.|^192\.168\.|^172\.(1[6-9]|2[0-9]|3[01])\.|^127\.'))
    fail_msg: >-
      bare_metal_public_ipv4 is missing or points at an RFC 1918 / loopback
      address. Set config.bare_metal.public_ipv4 in
      src/cue-renderer/instances/prod/config.cue and re-render before
      deploying.

- name: Create or update topology DNS records
  community.general.cloudflare_dns:
    zone: "{{ verself_domain if item.zone == 'product' else company_domain }}"
    record: >-
      {{
        (verself_domain if item.zone == 'product' else company_domain)
        if item.record == '@'
        else item.record ~ '.' ~ (verself_domain if item.zone == 'product' else company_domain)
      }}
    type: "{{ cloudflare_dns_record_type }}"
    value: "{{ bare_metal_public_ipv4 }}"
    ttl: "{{ cloudflare_dns_ttl }}"
    proxied: "{{ cloudflare_proxied | default(false) }}"
    solo: true
    api_token: "{{ cloudflare_api_token }}"
  loop: "{{ topology_dns_records | unique }}"
  loop_control:
    label: "{{ item.zone }}:{{ item.record }}"
  delegate_to: localhost
  become: false
