---
# Manage Cloudflare DNS records declared by the CUE topology.

- name: Validate Cloudflare API token is configured
  ansible.builtin.fail:
    msg: >-
      cloudflare_api_token is empty. Set it in the encrypted Ansible group vars before deploying.
  when: cloudflare_api_token | default('', true) | length == 0

- name: Create or update topology DNS records
  community.general.cloudflare_dns:
    zone: "{{ verself_domain if item.zone == 'product' else company_domain }}"
    record: >-
      {{
        (verself_domain if item.zone == 'product' else company_domain)
        if item.record == '@'
        else item.record ~ '.' ~ (verself_domain if item.zone == 'product' else company_domain)
      }}
    type: "{{ cloudflare_dns_record_type }}"
    value: "{{ ansible_host }}"
    ttl: "{{ cloudflare_dns_ttl }}"
    proxied: "{{ cloudflare_proxied | default(false) }}"
    solo: true
    api_token: "{{ cloudflare_api_token }}"
  loop: "{{ topology_dns_records | unique }}"
  loop_control:
    label: "{{ item.zone }}:{{ item.record }}"
  delegate_to: localhost
  become: false
