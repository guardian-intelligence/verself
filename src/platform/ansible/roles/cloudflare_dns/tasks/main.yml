---
# Manage Cloudflare DNS records for product service subdomains plus the
# separate Guardian company apex.

- name: Validate Cloudflare API token is configured
  ansible.builtin.fail:
    msg: >-
      cloudflare_api_token is empty. Set it in the encrypted Ansible group vars before deploying.
  when: cloudflare_api_token | default('', true) | length == 0

- name: Create or update product DNS records
  community.general.cloudflare_dns:
    zone: "{{ verself_domain }}"
    record: "{{ item }}.{{ verself_domain }}"
    type: "{{ cloudflare_dns_record_type }}"
    value: "{{ ansible_host }}"
    ttl: "{{ cloudflare_dns_ttl }}"
    proxied: "{{ cloudflare_proxied | default(false) }}"
    solo: true
    api_token: "{{ cloudflare_api_token }}"
  loop: "{{ cloudflare_dns_records }}"
  delegate_to: localhost
  become: false

# Apex record for the product docs/platform site. community.general.cloudflare_dns
# accepts the bare zone as `record:` for apex entries.
- name: Create or update product apex DNS record
  community.general.cloudflare_dns:
    zone: "{{ verself_domain }}"
    record: "{{ verself_domain }}"
    type: "{{ cloudflare_dns_record_type }}"
    value: "{{ ansible_host }}"
    ttl: "{{ cloudflare_dns_ttl }}"
    proxied: "{{ cloudflare_proxied | default(false) }}"
    solo: true
    api_token: "{{ cloudflare_api_token }}"
  delegate_to: localhost
  become: false

# Apex record for the Guardian company site. Bulk Redirects or Page Rules must
# still be managed in the Cloudflare dashboard; the DNS module only manages the
# A/AAAA record.
- name: Create or update company apex DNS record
  community.general.cloudflare_dns:
    zone: "{{ company_domain }}"
    record: "{{ company_domain }}"
    type: "{{ cloudflare_dns_record_type }}"
    value: "{{ ansible_host }}"
    ttl: "{{ cloudflare_dns_ttl }}"
    proxied: "{{ cloudflare_proxied | default(false) }}"
    solo: true
    api_token: "{{ cloudflare_api_token }}"
  delegate_to: localhost
  become: false
