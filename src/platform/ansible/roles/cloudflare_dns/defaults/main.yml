---
# cloudflare_dns defaults.

# Root domain (required, inherited from group_vars). Also used as the Cloudflare zone.

# Service subdomains to create A records for.
# Each role defines its own subdomain (e.g. grafana_subdomain: dashboard).
# This list is the union of all subdomains that need DNS records.
cloudflare_dns_records:
  - "{{ grafana_subdomain | default('dashboard') }}"
  - "{{ temporal_web_subdomain | default('temporal') }}"
  - "{{ forgejo_subdomain | default('git') }}"
  - "{{ zitadel_subdomain | default('auth') }}"
  - "{{ billing_service_subdomain | default('billing') }}"
  - "{{ rent_a_sandbox_subdomain | default('rentasandbox') }}"
  - "{{ stalwart_subdomain | default('mail') }}"
  - "{{ platform_subdomain | default('platform') }}"

# DNS record type. Override to AAAA for IPv6-only hosts.
cloudflare_dns_record_type: A

# TTL in seconds. 1 = Cloudflare automatic.
cloudflare_dns_ttl: 1

# Whether to proxy traffic through Cloudflare (CDN/WAF).
# false = DNS-only (grey cloud) — Caddy handles TLS directly via Let's Encrypt.
# true  = proxied (orange cloud) — Cloudflare terminates TLS.
# cloudflare_proxied: false
