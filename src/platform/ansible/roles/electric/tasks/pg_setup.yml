---
# Uses postgresql_admin_password from SOPS-decrypted group_vars (same as the postgresql role).

- name: Manage Electric PostgreSQL replication state
  vars:
    electric_publication_tables:
      - executions
      - execution_logs
  module_defaults:
    community.postgresql.postgresql_user:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      trust_input: false
    community.postgresql.postgresql_privs:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: sandbox_rental
      trust_input: false
    community.postgresql.postgresql_query:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: sandbox_rental
    community.postgresql.postgresql_publication:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: sandbox_rental
      trust_input: false
  block:
    - name: Create Electric PostgreSQL role
      community.postgresql.postgresql_user:
        name: electric
        password: "{{ electric_pg_password }}"
        role_attr_flags: REPLICATION,LOGIN
        conn_limit: "{{ postgresql_role_connection_limits.electric }}"
      no_log: true

    - name: Grant Electric role read access to sandbox_rental tables
      community.postgresql.postgresql_privs:
        privs: SELECT
        type: table
        objs: "{{ electric_publication_tables | join(',') }}"
        schema: public
        roles: electric
      no_log: true

    - name: Ensure Electric owns sandbox_rental shape tables
      community.postgresql.postgresql_query:
        query: "ALTER TABLE public.{{ item }} OWNER TO electric"
      loop: "{{ electric_publication_tables }}"
      no_log: true

    - name: Grant sandbox_rental full access to Electric-owned shape tables
      community.postgresql.postgresql_privs:
        privs: ALL
        type: table
        objs: "{{ electric_publication_tables | join(',') }}"
        schema: public
        roles: sandbox_rental
      no_log: true

    - name: Discover Electric tables missing REPLICA IDENTITY FULL
      community.postgresql.postgresql_query:
        query: >-
          SELECT c.relname
          FROM pg_class AS c
          JOIN pg_namespace AS n ON n.oid = c.relnamespace
          WHERE n.nspname = 'public'
            AND c.relname = ANY(%s)
            AND c.relreplident <> 'f'
          ORDER BY c.relname
        positional_args:
          - "{{ electric_publication_tables }}"
      register: electric_replica_identity_probe
      changed_when: false
      no_log: true

    - name: Ensure Electric-synced tables use REPLICA IDENTITY FULL
      community.postgresql.postgresql_query:
        query: "ALTER TABLE public.{{ item.relname }} REPLICA IDENTITY FULL"
      loop: >-
        {{
          []
          if electric_replica_identity_probe.query_result is mapping
          else (electric_replica_identity_probe.query_result | default([]))
        }}
      loop_control:
        label: "{{ item.relname }}"
      no_log: true

    - name: Ensure publication for Electric exists
      community.postgresql.postgresql_publication:
        name: electric_publication_default
        owner: electric
        tables: "{{ electric_publication_tables }}"
      no_log: true
