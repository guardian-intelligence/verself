---
# Electric's publication, shape-table ownership, and REPLICA IDENTITY FULL must
# stay configured in lockstep: a half-reconciled state (publication missing a
# table, or a table without REPLICA IDENTITY FULL) crash-loops Electric on
# startup with "Publication not found" or silently drops rows. sandbox_rental's
# migrations path drops and recreates the database whenever the schema
# fingerprint changes, which wipes all of this; we need to replay it
# idempotently every time the electric role runs.
#
# Earlier versions of this file used community.postgresql.postgresql_query with
# positional_args to discover tables missing REPLICA IDENTITY FULL. The module
# serialises a list argument into a double-quoted Postgres array literal of the
# form {'executions','execution_logs'} — Postgres then parses the single
# quotes as *part of the string values*, so ANY() compares against
# "'executions'" (with literal quotes) and matches nothing. The loop silently
# skipped every run and tables stayed on relreplident='d'. We now fold the
# whole reconcile into a single psql DO block so partial success is impossible
# and no collection module quirks can intervene.

- name: Create Electric PostgreSQL role
  community.postgresql.postgresql_user:
    login_host: "{{ services.postgresql.host }}"
    login_port: "{{ services.postgresql.port }}"
    login_user: postgres
    login_password: "{{ postgresql_admin_password }}"
    name: electric
    password: "{{ electric_pg_password }}"
    role_attr_flags: REPLICATION,LOGIN
    conn_limit: "{{ postgresql_role_connection_limits.electric }}"
    trust_input: false
  no_log: true

- name: Stage transient pgpass for Electric reconcile
  ansible.builtin.copy:
    content: "{{ services.postgresql.host }}:{{ services.postgresql.port }}:sandbox_rental:postgres:{{ postgresql_admin_password }}\n"
    dest: /root/.pgpass-electric-reconcile
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Reconcile Electric publication, ownership, and replica identity
  # Keep the whole reconcile in a single DO block so partial success is
  # impossible. PGPASSFILE keeps the password off /proc/<pid>/environ.
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres
      -d sandbox_rental
      -v ON_ERROR_STOP=1
    stdin: |
      DO $$
      DECLARE
        tbl  TEXT;
        tables TEXT[] := ARRAY['executions', 'execution_logs'];
      BEGIN
        FOREACH tbl IN ARRAY tables LOOP
          EXECUTE format('ALTER TABLE public.%I OWNER TO electric', tbl);
          EXECUTE format('ALTER TABLE public.%I REPLICA IDENTITY FULL', tbl);
          EXECUTE format('GRANT SELECT ON public.%I TO electric', tbl);
          EXECUTE format('GRANT ALL PRIVILEGES ON public.%I TO sandbox_rental', tbl);
        END LOOP;

        IF NOT EXISTS (
          SELECT 1 FROM pg_publication WHERE pubname = 'electric_publication_default'
        ) THEN
          CREATE PUBLICATION electric_publication_default
            FOR TABLE public.executions, public.execution_logs;
        ELSE
          ALTER PUBLICATION electric_publication_default
            SET TABLE public.executions, public.execution_logs;
        END IF;

        EXECUTE 'ALTER PUBLICATION electric_publication_default OWNER TO electric';
      END
      $$;
  environment:
    PGPASSFILE: /root/.pgpass-electric-reconcile
  changed_when: true

- name: Remove transient pgpass after Electric reconcile
  ansible.builtin.file:
    path: /root/.pgpass-electric-reconcile
    state: absent
