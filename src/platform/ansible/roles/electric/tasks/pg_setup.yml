---
# Uses postgresql_admin_password from SOPS-decrypted group_vars (same as the postgresql role).

- name: Create Electric PostgreSQL role
  community.postgresql.postgresql_user:
    name: electric
    password: "{{ electric_pg_password }}"
    role_attr_flags: REPLICATION,LOGIN
    login_host: "{{ services.postgresql.host }}"
    login_port: "{{ services.postgresql.port }}"
    login_user: postgres
    login_password: "{{ postgresql_admin_password }}"

- name: Grant Electric role read access to sandbox_rental tables
  community.postgresql.postgresql_privs:
    database: sandbox_rental
    privs: SELECT
    type: table
    objs: jobs,job_logs
    schema: public
    role: electric
    login_host: "{{ services.postgresql.host }}"
    login_port: "{{ services.postgresql.port }}"
    login_user: postgres
    login_password: "{{ postgresql_admin_password }}"

- name: Set REPLICA IDENTITY FULL on Electric-synced tables
  community.postgresql.postgresql_query:
    db: sandbox_rental
    query: >-
      ALTER TABLE jobs REPLICA IDENTITY FULL;
      ALTER TABLE job_logs REPLICA IDENTITY FULL;
    login_host: "{{ services.postgresql.host }}"
    login_port: "{{ services.postgresql.port }}"
    login_user: postgres
    login_password: "{{ postgresql_admin_password }}"

- name: Create publication for Electric on sandbox_rental database
  community.postgresql.postgresql_query:
    db: sandbox_rental
    query: >-
      DO $$
      BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_publication WHERE pubname = 'electric_publication_default') THEN
          CREATE PUBLICATION electric_publication_default FOR TABLE jobs, job_logs;
        END IF;
      END $$;
    login_host: "{{ services.postgresql.host }}"
    login_port: "{{ services.postgresql.port }}"
    login_user: postgres
    login_password: "{{ postgresql_admin_password }}"
