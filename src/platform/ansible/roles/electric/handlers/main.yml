---
# Handler name resolves at handler-load time, so each include_role
# invocation produces a distinct handler — "Restart electric" and
# "Restart electric-mail" coexist without collision. Tasks notify the
# concrete name via `notify: "Restart {{ electric_service_name }}"`.
- name: "Restart {{ electric_service_name }}"
  ansible.builtin.systemd:
    name: "{{ electric_service_name }}"
    state: restarted
    daemon_reload: true

- name: Reload nftables
  ansible.builtin.systemd:
    name: nftables
    state: reloaded
