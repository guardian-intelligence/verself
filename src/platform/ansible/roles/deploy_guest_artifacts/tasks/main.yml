---
# Stage built guest artifacts from /tmp/guest/output/ to the Firecracker host artifact directory.

- name: Ensure guest artifacts directory exists
  ansible.builtin.file:
    path: "{{ deploy_guest_artifacts_dest_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Stage guest artifacts
  ansible.builtin.copy:
    src: "{{ deploy_guest_artifacts_source_dir }}/{{ item }}"
    dest: "{{ deploy_guest_artifacts_dest_dir }}/{{ item }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  loop: "{{ deploy_guest_artifacts_files }}"

- name: Verify staged artifacts
  ansible.builtin.stat:
    path: "{{ deploy_guest_artifacts_dest_dir }}/{{ item }}"
  loop: "{{ deploy_guest_artifacts_files }}"
  register: deploy_guest_artifacts_staged_check
  failed_when: not deploy_guest_artifacts_staged_check.stat.exists
