---
- name: Verify projects-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/projects-service"
  register: projects_service_binary
  failed_when: not projects_service_binary.stat.exists

- name: Create projects_service system group
  ansible.builtin.group:
    name: projects_service
    system: true

- name: Ensure spire workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create projects_service system user
  ansible.builtin.user:
    name: projects_service
    group: projects_service
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Resolve projects-service uid for SPIRE registration
  ansible.builtin.command:
    cmd: id -u projects_service
  register: projects_service_uid
  changed_when: false

- name: Read projects-service SPIRE registration
  ansible.builtin.command:
    cmd: >-
      {{ verself_bin }}/spire-server entry show
      -socketPath {{ spire_server_socket_path }}
      -entryID verself-projects-service
      -output json
  register: projects_service_spire_entry
  failed_when: false
  changed_when: false

- name: Register projects-service SPIFFE workload
  ansible.builtin.command:
    cmd: >-
      {{ verself_bin }}/spire-server entry create
      -socketPath {{ spire_server_socket_path }}
      -entryID verself-projects-service
      -parentID {{ spire_agent_id }}
      -spiffeID {{ spire_projects_service_id }}
      -selector unix:uid:{{ projects_service_uid.stdout | trim }}
      -x509SVIDTTL 3600
  when: projects_service_spire_entry.rc != 0 or 'verself-projects-service' not in projects_service_spire_entry.stdout
  changed_when: true
  notify: restart projects-service

- name: Update projects-service SPIRE workload selector drift
  ansible.builtin.command:
    cmd: >-
      {{ verself_bin }}/spire-server entry update
      -socketPath {{ spire_server_socket_path }}
      -entryID verself-projects-service
      -parentID {{ spire_agent_id }}
      -spiffeID {{ spire_projects_service_id }}
      -selector unix:uid:{{ projects_service_uid.stdout | trim }}
      -x509SVIDTTL 3600
  when:
    - projects_service_spire_entry.rc == 0
    - "'uid:' ~ (projects_service_uid.stdout | trim) not in projects_service_spire_entry.stdout"
  changed_when: true
  notify: restart projects-service

- name: Deploy projects-service nftables ruleset
  ansible.builtin.template:
    src: projects-service.nft.j2
    dest: /etc/nftables.d/projects-service.nft
    mode: "0644"
  notify: reload nftables

- name: Apply projects-service nftables before proceeding
  ansible.builtin.meta: flush_handlers

- name: Include projects-service generated credential tasks
  ansible.builtin.include_tasks: credentials.yml

- name: Include projects-service PostgreSQL database tasks
  ansible.builtin.include_tasks: database.yml

- name: Include projects-service PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

- name: Wait for Zitadel before resolving projects-service auth audience
  ansible.builtin.wait_for:
    host: "{{ services.zitadel.host }}"
    port: "{{ services.zitadel.port }}"
    timeout: 60

- name: Read Zitadel admin PAT for projects-service auth setup
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: projects_service_zitadel_admin_pat_raw
  no_log: true

- name: Set projects-service Zitadel admin PAT fact
  ansible.builtin.set_fact:
    projects_service_zitadel_admin_pat: "{{ projects_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
  no_log: true

- name: Find identity-service auth project for projects-service bearer validation
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ projects_service_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ projects_service_identity_project_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
    return_content: true
  register: projects_service_identity_project_search
  no_log: true

- name: Assert identity-service auth project exists for projects-service
  ansible.builtin.assert:
    that: (projects_service_identity_project_search.json.result | default([])) | length > 0
    fail_msg: >-
      Identity-service Zitadel project '{{ projects_service_identity_project_name }}'
      not found. Run the identity_service role before projects_service.

- name: Set projects-service auth audience fact
  ansible.builtin.set_fact:
    projects_service_auth_audience: "{{ projects_service_identity_project_search.json.result[0].id }}"

- name: Deploy projects-service systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Projects Service
      After=verself-firewall.target network.target
      After=postgresql.service zitadel.service spire-agent.service
      Requires=verself-firewall.target
      Wants=postgresql.service zitadel.service spire-agent.service

      [Service]
      Type=simple
      User=projects_service
      Group=projects_service
      SupplementaryGroups={{ spire_workload_group }}
      BindReadOnlyPaths=/etc/verself/auth-discovery-hosts:/etc/hosts
      Environment=PROJECTS_LISTEN_ADDR={{ services.projects_service.host }}:{{ services.projects_service.port }}
      Environment=PROJECTS_INTERNAL_LISTEN_ADDR={{ services.projects_service.host }}:{{ services.projects_service.internal_port }}
      Environment=PROJECTS_PG_DSN=postgres://projects_service@/projects_service?host=/var/run/postgresql&sslmode=disable
      Environment=PROJECTS_PG_MAX_CONNS=8
      Environment=PROJECTS_AUTH_ISSUER_URL={{ projects_service_auth_issuer_url }}
      Environment=PROJECTS_AUTH_AUDIENCE={{ projects_service_auth_audience }}
      Environment=SPIFFE_ENDPOINT_SOCKET=unix://{{ spire_agent_socket_path }}
      Environment=OTEL_SERVICE_NAME=projects-service
      Environment=OTEL_EXPORTER_OTLP_ENDPOINT=http://{{ services.otelcol.host }}:{{ services.otelcol.grpc_port }}
      ExecStart={{ verself_bin }}/projects-service
      Restart=on-failure
      RestartSec=5
      CapabilityBoundingSet=
      ProtectHome=true
      ProtectSystem=strict
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0077

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/projects-service.service
    mode: "0644"
  notify: restart projects-service

- name: Apply projects-service unit changes before proceeding
  ansible.builtin.meta: flush_handlers

- name: Enable and start projects-service
  ansible.builtin.systemd:
    name: projects-service
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for projects-service listener to be present
  ansible.builtin.wait_for:
    host: "{{ services.projects_service.host }}"
    port: "{{ services.projects_service.port }}"
    timeout: 60

- name: Wait for projects-service readiness
  ansible.builtin.uri:
    url: "http://{{ services.projects_service.host }}:{{ services.projects_service.port }}/readyz"
    method: GET
    status_code: 200
  register: projects_service_readyz
  retries: 30
  delay: 1
  until: projects_service_readyz.status == 200
