---
- name: Apply projects-service PostgreSQL migrations
  ansible.builtin.include_role:
    name: service_pg_migrations
  vars:
    service_pg_migrations_service: projects-service
    service_pg_migrations_db: projects_service
    service_pg_migrations_db_user: projects_service
    service_pg_migrations_db_owner: projects_service
    service_pg_migrations_db_password: "{{ projects_service_pg_password }}"
    service_pg_migrations_source_dir: "{{ playbook_dir }}/../../../projects-service/migrations"
    service_pg_migrations_probe_table: projects
    service_pg_migrations_stop_units:
      - projects-service
    service_pg_migrations_force_reset: "{{ projects_service_force_schema_reset | default(false) | bool }}"
