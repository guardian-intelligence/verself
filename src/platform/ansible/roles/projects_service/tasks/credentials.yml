---
- name: Create credstore directory for projects-service
  ansible.builtin.file:
    path: /etc/credstore/projects-service
    state: directory
    owner: root
    group: projects_service
    mode: "0750"

- name: Check projects-service generated credentials
  ansible.builtin.stat:
    path: "/etc/credstore/projects-service/{{ item }}"
  loop:
    - pg-password
  register: projects_service_generated_credential_files
  no_log: true

- name: Generate projects-service missing credentials
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: "/etc/credstore/projects-service/{{ item.item }}"
    owner: root
    group: projects_service
    mode: "0640"
  loop: "{{ projects_service_generated_credential_files.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: not item.stat.exists
  no_log: true

- name: Converge projects-service generated credential permissions
  ansible.builtin.file:
    path: "/etc/credstore/projects-service/{{ item }}"
    owner: root
    group: projects_service
    mode: "0640"
  loop:
    - pg-password

- name: Read projects-service generated PostgreSQL password
  ansible.builtin.slurp:
    src: /etc/credstore/projects-service/pg-password
  register: projects_service_pg_password_raw
  no_log: true

- name: Set projects-service generated PostgreSQL password fact
  ansible.builtin.set_fact:
    projects_service_pg_password: "{{ projects_service_pg_password_raw.content | b64decode | trim }}"
  no_log: true
