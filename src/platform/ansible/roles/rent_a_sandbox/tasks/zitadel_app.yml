---
- name: Wait for Zitadel readiness
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/healthz"
    status_code: 200
  register: rent_a_sandbox_zitadel_health
  until: rent_a_sandbox_zitadel_health.status == 200
  retries: 30
  delay: 2

- name: Read Zitadel admin PAT
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: rent_a_sandbox_zitadel_pat_raw

- name: Set Zitadel PAT fact
  ansible.builtin.set_fact:
    rent_a_sandbox_zitadel_pat: "{{ rent_a_sandbox_zitadel_pat_raw.content | b64decode | trim }}"

- name: Search for sandbox-rental project
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ rent_a_sandbox_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ rent_a_sandbox_auth_project_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
  register: rent_a_sandbox_project_search

- name: Set project ID fact
  ansible.builtin.set_fact:
    rent_a_sandbox_project_id: "{{ rent_a_sandbox_project_search.json.result[0].id }}"
  when: rent_a_sandbox_project_search.json.result is defined and rent_a_sandbox_project_search.json.result | length > 0

- name: Ensure sandbox-rental project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ rent_a_sandbox_zitadel_pat }}"
    zitadel_project_roles_project_id: "{{ rent_a_sandbox_project_id }}"
    zitadel_project_roles_definitions:
      - key: sandbox_org_admin
        display_name: Sandbox Org Admin
        group: sandbox
      - key: sandbox_org_member
        display_name: Sandbox Org Member
        group: sandbox
  when: rent_a_sandbox_project_id is defined

- name: Search for existing rent-a-sandbox app in project
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ rent_a_sandbox_project_id }}/apps/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ rent_a_sandbox_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: rent-a-sandbox
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
  register: rent_a_sandbox_app_search
  when: rent_a_sandbox_project_id is defined

- name: Ensure rent-a-sandbox credstore directory exists
  ansible.builtin.file:
    path: /etc/credstore/rent-a-sandbox
    state: directory
    owner: root
    group: "{{ ansible_user }}"
    mode: "0750"

- name: Check rent-a-sandbox OIDC Web cutover marker
  ansible.builtin.stat:
    path: /etc/credstore/rent-a-sandbox/oidc-web-cutover
  register: rent_a_sandbox_oidc_web_cutover_marker

- name: Set existing app fact
  ansible.builtin.set_fact:
    rent_a_sandbox_existing_app: "{{ rent_a_sandbox_app_search.json.result | default([]) | first | default({}) }}"
    rent_a_sandbox_app_exists: "{{ rent_a_sandbox_app_search.json.result is defined and rent_a_sandbox_app_search.json.result | length > 0 }}"
    rent_a_sandbox_app_id: "{{ (rent_a_sandbox_app_search.json.result | default([]) | first | default({})).id | default('') }}"
    rent_a_sandbox_client_id: "{{ (rent_a_sandbox_app_search.json.result | default([]) | first | default({})).oidcConfig.clientId | default('') }}"
    rent_a_sandbox_app_requires_recreate: >-
      {{
        (
          rent_a_sandbox_app_search.json.result is defined
          and rent_a_sandbox_app_search.json.result | length > 0
        )
        and
        (
          not rent_a_sandbox_oidc_web_cutover_marker.stat.exists
          or (
            (rent_a_sandbox_app_search.json.result | default([]) | first | default({})).oidcConfig.authMethodType
            | default('')
          ) != 'OIDC_AUTH_METHOD_TYPE_NONE'
          or (
            ((rent_a_sandbox_app_search.json.result | default([]) | first | default({})).oidcConfig.redirectUris
            | default([]) | sort)
            != (["https://" ~ rent_a_sandbox_domain ~ "/callback"] | sort)
          )
          or (
            ((rent_a_sandbox_app_search.json.result | default([]) | first | default({})).oidcConfig.responseTypes
            | default([]) | sort)
            != (["OIDC_RESPONSE_TYPE_CODE"] | sort)
          )
          or (
            ((rent_a_sandbox_app_search.json.result | default([]) | first | default({})).oidcConfig.grantTypes
            | default([]) | sort)
            != (["OIDC_GRANT_TYPE_AUTHORIZATION_CODE", "OIDC_GRANT_TYPE_REFRESH_TOKEN"] | sort)
          )
          or (
            ((rent_a_sandbox_app_search.json.result | default([]) | first | default({})).oidcConfig.postLogoutRedirectUris
            | default([]) | sort)
            != (["https://" ~ rent_a_sandbox_domain] | sort)
          )
          or (
            (rent_a_sandbox_app_search.json.result | default([]) | first | default({})).oidcConfig.accessTokenType
            | default('')
          ) != 'OIDC_TOKEN_TYPE_JWT'
        )
      }}
  when: rent_a_sandbox_app_search is not skipped

- name: Remove incompatible rent-a-sandbox OIDC application
  ansible.builtin.uri:
    url: >-
      http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{
      rent_a_sandbox_project_id }}/apps/{{ rent_a_sandbox_app_id }}
    method: DELETE
    headers:
      Authorization: "Bearer {{ rent_a_sandbox_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    status_code: 200
  when:
    - rent_a_sandbox_app_exists is defined
    - rent_a_sandbox_app_exists | bool
    - rent_a_sandbox_app_requires_recreate | default(false) | bool
    - rent_a_sandbox_app_id | default('', true) | length > 0
  no_log: true

- name: Create rent-a-sandbox OIDC application
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ rent_a_sandbox_project_id }}/apps/oidc"
    method: POST
    headers:
      Authorization: "Bearer {{ rent_a_sandbox_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      name: rent-a-sandbox
      redirectUris:
        - "https://{{ rent_a_sandbox_domain }}/callback"
      responseTypes:
        - "OIDC_RESPONSE_TYPE_CODE"
      grantTypes:
        - "OIDC_GRANT_TYPE_AUTHORIZATION_CODE"
        - "OIDC_GRANT_TYPE_REFRESH_TOKEN"
      appType: "OIDC_APP_TYPE_WEB"
      authMethodType: "OIDC_AUTH_METHOD_TYPE_NONE"
      postLogoutRedirectUris:
        - "https://{{ rent_a_sandbox_domain }}"
      devMode: false
      accessTokenType: "OIDC_TOKEN_TYPE_JWT"
    status_code: 200
  register: rent_a_sandbox_app_created
  when: >-
    rent_a_sandbox_app_exists is defined
    and (
      not rent_a_sandbox_app_exists | bool
      or rent_a_sandbox_app_requires_recreate | default(false) | bool
    )
  no_log: true

- name: Re-query rent-a-sandbox OIDC application
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ rent_a_sandbox_project_id }}/apps/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ rent_a_sandbox_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: rent-a-sandbox
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
  register: rent_a_sandbox_final_app_search
  when: rent_a_sandbox_project_id is defined

- name: Set final rent-a-sandbox app facts
  ansible.builtin.set_fact:
    rent_a_sandbox_app_id: "{{ (rent_a_sandbox_final_app_search.json.result | default([]) | first | default({})).id | default('') }}"
    rent_a_sandbox_client_id: "{{ (rent_a_sandbox_final_app_search.json.result | default([]) | first | default({})).oidcConfig.clientId | default('') }}"
  when: rent_a_sandbox_final_app_search is not skipped

- name: Ensure rent-a-sandbox OIDC app includes roles in access tokens
  ansible.builtin.uri:
    url: >-
      http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{
      rent_a_sandbox_project_id }}/apps/{{ rent_a_sandbox_app_id }}/oidc_config
    method: PUT
    headers:
      Authorization: "Bearer {{ rent_a_sandbox_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      redirectUris:
        - "https://{{ rent_a_sandbox_domain }}/callback"
      responseTypes:
        - "OIDC_RESPONSE_TYPE_CODE"
      grantTypes:
        - "OIDC_GRANT_TYPE_AUTHORIZATION_CODE"
        - "OIDC_GRANT_TYPE_REFRESH_TOKEN"
      appType: "OIDC_APP_TYPE_WEB"
      authMethodType: "OIDC_AUTH_METHOD_TYPE_NONE"
      postLogoutRedirectUris:
        - "https://{{ rent_a_sandbox_domain }}"
      devMode: false
      accessTokenType: "OIDC_TOKEN_TYPE_JWT"
      accessTokenRoleAssertion: true
      idTokenRoleAssertion: true
      idTokenUserinfoAssertion: true
    status_code: [200, 400]
  register: rent_a_sandbox_oidc_config_converged
  failed_when: >-
    rent_a_sandbox_oidc_config_converged.status == 400
    and 'No changes' not in (rent_a_sandbox_oidc_config_converged.json.message | default(''))
  changed_when: rent_a_sandbox_oidc_config_converged.status == 200
  when: rent_a_sandbox_app_id | default('', true) | length > 0
  no_log: true

- name: Persist rent-a-sandbox OIDC Web cutover marker
  ansible.builtin.copy:
    dest: /etc/credstore/rent-a-sandbox/oidc-web-cutover
    owner: root
    group: "{{ ansible_user }}"
    mode: "0640"
    content: |
      app_id={{ rent_a_sandbox_app_id }}
      client_id={{ rent_a_sandbox_client_id }}
      auth_method=OIDC_AUTH_METHOD_TYPE_NONE
  when: rent_a_sandbox_client_id | default('', true) | length > 0

- name: Ensure env directory exists
  ansible.builtin.file:
    path: /etc/rent-a-sandbox
    state: directory
    owner: root
    group: "{{ ansible_user }}"
    mode: "0750"
