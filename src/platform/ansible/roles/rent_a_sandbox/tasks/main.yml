---
- name: Create rent-a-sandbox runtime group
  ansible.builtin.group:
    name: "{{ rent_a_sandbox_runtime_group }}"
    system: true

- name: Create rent-a-sandbox runtime user
  ansible.builtin.user:
    name: "{{ rent_a_sandbox_runtime_user }}"
    group: "{{ rent_a_sandbox_runtime_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ rent_a_sandbox_state_dir }}"
    create_home: false

- name: Create rent-a-sandbox state directory
  ansible.builtin.file:
    path: "{{ rent_a_sandbox_state_dir }}"
    state: directory
    owner: "{{ rent_a_sandbox_runtime_user }}"
    group: "{{ rent_a_sandbox_runtime_group }}"
    mode: "0700"

- name: Create rent-a-sandbox credstore directory
  ansible.builtin.file:
    path: /etc/credstore/rent-a-sandbox
    state: directory
    owner: root
    group: "{{ rent_a_sandbox_runtime_group }}"
    mode: "0750"

- name: Verify corepack exists in profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/corepack"
  register: rent_a_sandbox_corepack
  failed_when: not rent_a_sandbox_corepack.stat.exists

- name: Check for existing rent-a-sandbox auth session secret
  ansible.builtin.stat:
    path: /etc/credstore/rent-a-sandbox/auth-session-secret
  register: rent_a_sandbox_auth_session_secret_file

- name: Generate rent-a-sandbox auth session secret
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/rent-a-sandbox/auth-session-secret
    owner: root
    group: "{{ rent_a_sandbox_runtime_group }}"
    mode: "0640"
  when: not rent_a_sandbox_auth_session_secret_file.stat.exists
  no_log: true

- name: Converge rent-a-sandbox auth session secret permissions
  ansible.builtin.file:
    path: /etc/credstore/rent-a-sandbox/auth-session-secret
    owner: root
    group: "{{ rent_a_sandbox_runtime_group }}"
    mode: "0640"

- name: Read rent-a-sandbox auth session secret
  ansible.builtin.slurp:
    src: /etc/credstore/rent-a-sandbox/auth-session-secret
  register: rent_a_sandbox_auth_session_secret_raw
  no_log: true

- name: Set rent-a-sandbox auth session secret fact
  ansible.builtin.set_fact:
    rent_a_sandbox_auth_session_secret: "{{ rent_a_sandbox_auth_session_secret_raw.content | b64decode | trim }}"
  no_log: true

- name: Create rent-a-sandbox install directory
  ansible.builtin.file:
    path: "{{ rent_a_sandbox_install_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ rent_a_sandbox_runtime_group }}"
    mode: "0755"

- name: Check whether rent-a-sandbox systemd unit exists
  ansible.builtin.stat:
    path: /etc/systemd/system/rent-a-sandbox.service
  register: rent_a_sandbox_systemd_unit_file

- name: Regenerate rent-a-sandbox API clients before source sync
  delegate_to: localhost
  become: false
  ansible.builtin.command:
    argv:
      - vp
      - run
      - "@forge-metal/rent-a-sandbox#generate"
    chdir: "{{ playbook_dir }}/../../../viteplus-monorepo"
  changed_when: true

# Stop the live process before mutating .output so it never serves a partially deleted build.
- name: Stop live rent-a-sandbox before replacing build output
  ansible.builtin.systemd:
    name: rent-a-sandbox
    state: stopped
    daemon_reload: true
  when: rent_a_sandbox_systemd_unit_file.stat.exists

- name: Remove generated rent-a-sandbox artifacts before sync
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ rent_a_sandbox_install_dir }}/.output"
    - "{{ rent_a_sandbox_install_dir }}/.tanstack"
    - "{{ rent_a_sandbox_install_dir }}/apps/rent-a-sandbox/.output"
    - "{{ rent_a_sandbox_install_dir }}/apps/rent-a-sandbox/.tanstack"

# Opt-in clean rebuild: wipe node_modules and the install fingerprint so the
# next pnpm install runs from scratch instead of reusing the cached store.
# Trigger with `ansible-playbook ... --tags rent_a_sandbox --extra-vars rent_a_sandbox_full_rebuild=true`.
# Use when a prior install left a corrupted store or an upstream package
# linked the wrong version.
- name: Wipe rent-a-sandbox install for clean rebuild (FULL=1)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ rent_a_sandbox_install_dir }}/node_modules"
    - "{{ rent_a_sandbox_dependencies_fingerprint_path }}"
  when: rent_a_sandbox_full_rebuild | default(false) | bool

- name: Synchronize rent-a-sandbox source
  delegate_to: localhost
  become: false
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../../viteplus-monorepo/"
    dest: "{{ rent_a_sandbox_install_dir }}/"
    delete: true
    recursive: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.output"
      - "--exclude=dist"
      - "--exclude=.tanstack"
      - "--exclude=apps/company"
      - "--exclude=apps/company/**"
      - "--exclude=playwright-report"
      - "--exclude=test-results"
      - "--exclude=HANDOFF_PROMPT.md"
      # delete-excluded would wipe remote node_modules and defeat incremental deploys.
      - "--no-owner"
      - "--no-group"

- name: Compute rent-a-sandbox workspace dependency fingerprint
  delegate_to: localhost
  become: false
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        cd {{ playbook_dir }}/../../../viteplus-monorepo
        {
          printf '%s\0' package.json pnpm-lock.yaml pnpm-workspace.yaml apps/rent-a-sandbox/package.json
          find packages -mindepth 2 -maxdepth 2 -name package.json -print0
        } | sort -z | xargs -0 sha256sum | sha256sum
  register: rent_a_sandbox_workspace_dependency_fingerprint
  changed_when: false

- name: Check cached rent-a-sandbox install fingerprint
  ansible.builtin.stat:
    path: "{{ rent_a_sandbox_dependencies_fingerprint_path }}"
  register: rent_a_sandbox_install_fingerprint_file

- name: Read cached rent-a-sandbox install fingerprint
  ansible.builtin.slurp:
    src: "{{ rent_a_sandbox_dependencies_fingerprint_path }}"
  register: rent_a_sandbox_install_fingerprint_raw
  when: rent_a_sandbox_install_fingerprint_file.stat.exists

- name: Check cached rent-a-sandbox node_modules
  ansible.builtin.stat:
    path: "{{ rent_a_sandbox_install_dir }}/node_modules"
  register: rent_a_sandbox_node_modules_dir

- name: Install rent-a-sandbox workspace dependencies when manifests change
  become: false
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/corepack"
      - pnpm
      - install
    chdir: "{{ rent_a_sandbox_install_dir }}"
  environment:
    PATH: "{{ fm_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true
  when: >-
    (not rent_a_sandbox_node_modules_dir.stat.exists)
    or (not rent_a_sandbox_install_fingerprint_file.stat.exists)
    or (
      (rent_a_sandbox_install_fingerprint_raw.content | default('') | b64decode | trim)
      != (rent_a_sandbox_workspace_dependency_fingerprint.stdout.split()[0] | trim)
    )

- name: Record cached rent-a-sandbox install fingerprint
  ansible.builtin.copy:
    content: "{{ rent_a_sandbox_workspace_dependency_fingerprint.stdout.split()[0] | trim }}\n"
    dest: "{{ rent_a_sandbox_dependencies_fingerprint_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ rent_a_sandbox_runtime_group }}"
    mode: "0644"

- name: Build rent-a-sandbox package dependencies
  become: false
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/corepack"
      - pnpm
      - --filter
      - "@forge-metal/rent-a-sandbox^..."
      - run
      - build
    chdir: "{{ rent_a_sandbox_install_dir }}"
  environment:
    PATH: "{{ fm_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true

- name: Build rent-a-sandbox app
  become: false
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/corepack"
      - pnpm
      - --filter
      - "@forge-metal/rent-a-sandbox"
      - run
      - build
    chdir: "{{ rent_a_sandbox_install_dir }}"
  environment:
    PATH: "{{ fm_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true

- name: Set up Zitadel OIDC application
  ansible.builtin.include_role:
    name: zitadel_oauth_app
  vars:
    zitadel_oauth_app_name: rent-a-sandbox
    zitadel_oauth_app_project_name: "{{ rent_a_sandbox_auth_project_name }}"
    zitadel_oauth_app_redirect_uris:
      - "https://{{ rent_a_sandbox_domain }}/callback"
    zitadel_oauth_app_post_logout_redirect_uris:
      - "https://{{ rent_a_sandbox_domain }}"
    zitadel_oauth_app_credstore_dir: /etc/credstore/rent-a-sandbox
    zitadel_oauth_app_credstore_group: "{{ rent_a_sandbox_runtime_group }}"
    zitadel_oauth_app_auth_method_type: OIDC_AUTH_METHOD_TYPE_POST
    zitadel_oauth_app_grant_types:
      - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
      - OIDC_GRANT_TYPE_REFRESH_TOKEN
      - OIDC_GRANT_TYPE_TOKEN_EXCHANGE
    zitadel_oauth_app_role_assertions: true
    zitadel_oauth_app_cutover_marker_filename: oidc-web-cutover

- name: Export rent-a-sandbox OIDC app facts for templates
  ansible.builtin.set_fact:
    rent_a_sandbox_app_id: "{{ zitadel_oauth_app_out_id }}"
    rent_a_sandbox_project_id: "{{ zitadel_oauth_app_out_project_id }}"
    rent_a_sandbox_client_id: "{{ zitadel_oauth_app_out_client_id }}"
    rent_a_sandbox_client_secret: "{{ zitadel_oauth_app_out_client_secret }}"
  no_log: true

- name: Ensure sandbox-rental project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ zitadel_oauth_app_pat }}"
    zitadel_project_roles_project_id: "{{ rent_a_sandbox_project_id }}"
    zitadel_project_roles_definitions:
      - key: owner
        display_name: Owner
        group: sandbox
      - key: admin
        display_name: Admin
        group: sandbox
      - key: member
        display_name: Member
        group: sandbox

- name: Resolve identity-service project ID for rent-a-sandbox
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ zitadel_oauth_app_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ rent_a_sandbox_identity_project_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
  register: rent_a_sandbox_identity_project_search
  no_log: true

- name: Assert identity-service project exists for rent-a-sandbox
  ansible.builtin.assert:
    that: (rent_a_sandbox_identity_project_search.json.result | default([])) | length > 0
    fail_msg: >-
      Identity-service Zitadel project '{{ rent_a_sandbox_identity_project_name }}'
      not found. Run the identity_service role before rent_a_sandbox.

- name: Set rent-a-sandbox identity-service project ID fact
  ansible.builtin.set_fact:
    rent_a_sandbox_identity_project_id: "{{ rent_a_sandbox_identity_project_search.json.result[0].id }}"

- name: Ensure rent-a-sandbox env directory exists
  ansible.builtin.file:
    path: /etc/rent-a-sandbox
    state: directory
    owner: root
    group: "{{ rent_a_sandbox_runtime_group }}"
    mode: "0750"

- name: Deploy rent-a-sandbox environment file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/rent-a-sandbox/env
    mode: "0640"
    owner: root
    group: "{{ rent_a_sandbox_runtime_group }}"

- name: Deploy rent-a-sandbox systemd unit
  ansible.builtin.template:
    src: rent-a-sandbox.service.j2
    dest: /etc/systemd/system/rent-a-sandbox.service
    mode: "0644"

- name: Deploy rent-a-sandbox nftables rules
  ansible.builtin.template:
    src: rent-a-sandbox.nft.j2
    dest: /etc/nftables.d/rent-a-sandbox.nft
    mode: "0644"
  notify: Reload nftables

- name: Enable and start rent-a-sandbox
  ansible.builtin.systemd:
    name: rent-a-sandbox
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for rent-a-sandbox to be ready
  ansible.builtin.wait_for:
    host: "{{ services.rent_a_sandbox.host }}"
    port: "{{ services.rent_a_sandbox.port }}"
    timeout: 30
