---
- name: Check if sandbox-rental-service unit exists
  listen: restart sandbox-rental-service
  ansible.builtin.stat:
    path: /etc/systemd/system/sandbox-rental-service.service
  register: sandbox_rental_service_unit_file

- name: Restart sandbox-rental-service
  listen: restart sandbox-rental-service
  ansible.builtin.systemd:
    daemon_reload: true
    name: sandbox-rental-service
    state: restarted
  when: sandbox_rental_service_unit_file.stat.exists

- name: Check if sandbox-rental-recurring-worker unit exists
  listen: restart sandbox-rental-recurring-worker
  ansible.builtin.stat:
    path: /etc/systemd/system/sandbox-rental-recurring-worker.service
  register: sandbox_rental_recurring_worker_unit_file

- name: Restart sandbox-rental-recurring-worker
  listen: restart sandbox-rental-recurring-worker
  ansible.builtin.systemd:
    daemon_reload: true
    name: sandbox-rental-recurring-worker
    state: restarted
  when: sandbox_rental_recurring_worker_unit_file.stat.exists

- name: Reload nftables for sandbox-rental-service
  listen: reload nftables
  ansible.builtin.systemd:
    name: nftables
    state: reloaded

- name: Check if secrets-service unit exists for secret injection grant restart
  listen: restart secrets-service
  ansible.builtin.stat:
    path: /etc/systemd/system/secrets-service.service
  register: sandbox_rental_service_secrets_unit_file

- name: Restart secrets-service after secret injection grant verifier update
  listen: restart secrets-service
  ansible.builtin.systemd:
    daemon_reload: true
    name: secrets-service
    state: restarted
  when: sandbox_rental_service_secrets_unit_file.stat.exists
