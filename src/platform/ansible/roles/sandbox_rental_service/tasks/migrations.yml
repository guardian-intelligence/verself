---
- name: Compute local sandbox-rental PostgreSQL migrations fingerprint
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.shell:
    cmd: "set -o pipefail && find . -name '[0-9][0-9][0-9]_*.up.sql' -exec sha256sum {} + | sort | sha256sum"
    chdir: "{{ playbook_dir }}/../../../sandbox-rental-service/migrations"
    executable: /bin/bash
  register: sandbox_rental_service_pg_migrations_local_hash
  changed_when: false

- name: Read remote sandbox-rental PostgreSQL migrations fingerprint
  ansible.builtin.slurp:
    src: /opt/forge-metal/sandbox-rental-migrations/.applied-hash
  register: sandbox_rental_service_pg_migrations_remote_hash
  failed_when: false

- name: Probe for expected sandbox-rental tables
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres
      -d sandbox_rental
      -tAc
      "SELECT count(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_name = 'executions';"
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  register: sandbox_rental_service_pg_table_probe
  failed_when: false
  changed_when: false
  no_log: true

- name: Apply sandbox-rental PostgreSQL migrations
  when: >-
    sandbox_rental_service_force_schema_reset
    or sandbox_rental_service_pg_migrations_remote_hash is failed
    or (sandbox_rental_service_pg_migrations_remote_hash.content | default('') | b64decode | trim)
       != (sandbox_rental_service_pg_migrations_local_hash.stdout.split()[0] | trim)
    or (sandbox_rental_service_pg_table_probe.stdout | default('0', true) | trim) == '0'
  block:
    - name: Remove deployed sandbox-rental migrations directory
      ansible.builtin.file:
        path: /opt/forge-metal/sandbox-rental-migrations
        state: absent

    - name: Create deployed sandbox-rental migrations directory
      ansible.builtin.file:
        path: /opt/forge-metal/sandbox-rental-migrations
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Upload sandbox-rental PostgreSQL migrations
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../sandbox-rental-service/migrations/"
        dest: /opt/forge-metal/sandbox-rental-migrations/
        mode: "0644"

    - name: Reset sandbox_rental PostgreSQL database
      ansible.builtin.include_role:
        name: postgresql_db_reset
      vars:
        postgresql_db_reset_name: sandbox_rental
        postgresql_db_reset_owner: sandbox_rental
        postgresql_db_reset_stop_units:
          - electric
          - sandbox-rental-service

    - name: Apply sandbox-rental PostgreSQL migration files
      ansible.builtin.command:
        cmd: >-
          {{ fm_bin }}/psql
          -h {{ services.postgresql.host }}
          -p {{ services.postgresql.port }}
          -U sandbox_rental
          -d sandbox_rental
          -v ON_ERROR_STOP=1
          -f /opt/forge-metal/sandbox-rental-migrations/{{ item }}
      environment:
        PGPASSWORD: "{{ postgresql_sandbox_rental_password }}"
      loop: >-
        {{
          query('ansible.builtin.fileglob', playbook_dir + '/../../../sandbox-rental-service/migrations/[0-9][0-9][0-9]_*.up.sql')
          | map('basename')
          | sort
        }}
      loop_control:
        label: "{{ item }}"
      changed_when: false
      no_log: true

    - name: Record sandbox-rental PostgreSQL migrations fingerprint
      ansible.builtin.copy:
        content: "{{ sandbox_rental_service_pg_migrations_local_hash.stdout.split()[0] }}\n"
        dest: /opt/forge-metal/sandbox-rental-migrations/.applied-hash
        mode: "0644"

- name: Reconcile sandbox-rental object ownership and privileges
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres
      -d sandbox_rental
      -v ON_ERROR_STOP=1
    stdin: |
      DO $$
      BEGIN
        IF to_regclass('public.execution_attempts') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.execution_attempts OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.execution_billing_windows') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.execution_billing_windows OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.execution_events') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.execution_events OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.runner_classes') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.runner_classes OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.github_workflow_jobs') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.github_workflow_jobs OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.github_installations') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.github_installations OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.github_installation_states') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.github_installation_states OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.github_runner_allocations') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.github_runner_allocations OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.github_runner_job_bindings') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.github_runner_job_bindings OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.execution_billing_job_seq') IS NOT NULL THEN
          EXECUTE 'ALTER SEQUENCE public.execution_billing_job_seq OWNER TO sandbox_rental';
        END IF;
      END
      $$;
      GRANT USAGE, CREATE ON SCHEMA public TO sandbox_rental;
      GRANT ALL PRIVILEGES ON TABLE
        public.executions,
        public.execution_attempts,
        public.execution_billing_windows,
        public.execution_logs,
        public.execution_events,
        public.runner_classes,
        public.github_installations,
        public.github_installation_states,
        public.github_workflow_jobs,
        public.github_runner_allocations,
        public.github_runner_job_bindings
      TO sandbox_rental;
      GRANT ALL PRIVILEGES ON SEQUENCE
        public.execution_billing_job_seq
      TO sandbox_rental;
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  changed_when: false
  no_log: true
