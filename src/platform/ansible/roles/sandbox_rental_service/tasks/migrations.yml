---
# role_path rebinds inside include_role, so capture the sandbox_rental_service
# role's own path eagerly and pass absolute pre/post-reset hook file paths
# into the shared migrations role.
- name: Capture sandbox_rental_service role path for hook files
  ansible.builtin.set_fact:
    sandbox_rental_service_role_dir: "{{ role_path }}"

- name: Apply sandbox-rental PostgreSQL migrations
  ansible.builtin.include_role:
    name: service_pg_migrations
  vars:
    service_pg_migrations_service: sandbox-rental
    service_pg_migrations_db: sandbox_rental
    service_pg_migrations_db_user: sandbox_rental
    service_pg_migrations_db_owner: sandbox_rental
    service_pg_migrations_db_password: "{{ postgresql_sandbox_rental_password }}"
    service_pg_migrations_source_dir: "{{ playbook_dir }}/../../../sandbox-rental-service/migrations"
    service_pg_migrations_probe_table: executions
    service_pg_migrations_stop_units:
      - electric
      - sandbox-rental-service
    service_pg_migrations_force_reset: "{{ sandbox_rental_service_force_schema_reset | default(false) | bool }}"
    service_pg_migrations_pre_reset_tasks: "{{ sandbox_rental_service_role_dir }}/tasks/migrations_pre_reset.yml"
    service_pg_migrations_post_reset_tasks: "{{ sandbox_rental_service_role_dir }}/tasks/migrations_post_reset.yml"

- name: Restore sandbox-rental GitHub installations after schema reset
  ansible.builtin.command:
    cmd: >-
      {{ verself_bin }}/psql
      -h {{ topology_endpoints.postgresql.host }}
      -p {{ topology_endpoints.postgresql.endpoints.postgres.port }}
      -U sandbox_rental
      -d sandbox_rental
      -v ON_ERROR_STOP=1
    stdin: |
      COPY public.github_installations (
        installation_id, org_id, account_login, account_type, active, created_at, updated_at
      ) FROM STDIN WITH (FORMAT csv, HEADER true);
      {{ sandbox_rental_service_github_installations_export.stdout }}
      \.
  environment:
    PGPASSWORD: "{{ postgresql_sandbox_rental_password }}"
  changed_when: true
  no_log: true
  when:
    - service_pg_migrations_should_reset | default(false) | bool
    - sandbox_rental_service_restore_github_installations_on_schema_reset | bool
    - sandbox_rental_service_github_installations_export is defined
    - sandbox_rental_service_github_installations_export.rc == 0
    - (sandbox_rental_service_github_installations_export.stdout | trim) != ''

- name: Reconcile sandbox-rental object ownership and privileges
  ansible.builtin.command:
    cmd: >-
      {{ verself_bin }}/psql
      -h {{ topology_endpoints.postgresql.host }}
      -p {{ topology_endpoints.postgresql.endpoints.postgres.port }}
      -U postgres
      -d sandbox_rental
      -v ON_ERROR_STOP=1
    stdin: |
      DO $$
      BEGIN
        IF to_regclass('public.execution_attempts') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.execution_attempts OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.execution_billing_windows') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.execution_billing_windows OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.execution_events') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.execution_events OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.runner_classes') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.runner_classes OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.runner_class_filesystem_mounts') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.runner_class_filesystem_mounts OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.execution_filesystem_mounts') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.execution_filesystem_mounts OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.runner_sticky_disk_generations') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.runner_sticky_disk_generations OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.execution_sticky_disk_mounts') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.execution_sticky_disk_mounts OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.runner_provider_repositories') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.runner_provider_repositories OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.runner_jobs') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.runner_jobs OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.github_installations') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.github_installations OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.github_installation_states') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.github_installation_states OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.runner_allocations') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.runner_allocations OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.runner_job_bindings') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.runner_job_bindings OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.runner_bootstrap_configs') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.runner_bootstrap_configs OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.execution_schedules') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.execution_schedules OWNER TO sandbox_rental';
        END IF;
        IF to_regclass('public.execution_schedule_dispatches') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.execution_schedule_dispatches OWNER TO sandbox_rental';
        END IF;
      END
      $$;
      GRANT USAGE, CREATE ON SCHEMA public TO sandbox_rental;
      GRANT ALL PRIVILEGES ON TABLE
        public.executions,
        public.execution_attempts,
        public.execution_billing_windows,
        public.execution_logs,
        public.execution_events,
        public.execution_filesystem_mounts,
        public.runner_sticky_disk_generations,
        public.execution_sticky_disk_mounts,
        public.runner_classes,
        public.runner_class_filesystem_mounts,
        public.github_installations,
        public.github_installation_states,
        public.runner_provider_repositories,
        public.runner_jobs,
        public.runner_allocations,
        public.runner_bootstrap_configs,
        public.runner_job_bindings,
        public.execution_schedules,
        public.execution_schedule_dispatches
      TO sandbox_rental;
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  changed_when: false
  no_log: true
