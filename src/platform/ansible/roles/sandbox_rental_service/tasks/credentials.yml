---
- name: Create credstore directory for sandbox-rental
  ansible.builtin.file:
    path: /etc/credstore/sandbox-rental
    state: directory
    owner: root
    group: sandbox_rental
    mode: "0750"

- name: Remove legacy sandbox-rental shared auth credentials
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/credstore/sandbox-rental/billing-client-secret
    - /etc/credstore/sandbox-rental/secret-injection-grant-ed25519.pem
    - /etc/credstore/secrets-service/sandbox-injection-grant-ed25519.pub.pem
  notify:
    - restart sandbox-rental-service
    - restart secrets-service

- name: Remove legacy sandbox-rental PG DSN credential
  ansible.builtin.file:
    path: /etc/credstore/sandbox-rental/pg-dsn
    state: absent
  notify: restart sandbox-rental-service

- name: Set sandbox-rental GitHub App configuration state
  ansible.builtin.set_fact:
    sandbox_rental_service_github_app_configured: >-
      {{
        (sandbox_rental_service_github_app_enabled | bool)
        or (sandbox_rental_service_github_app_id | int > 0)
        or (sandbox_rental_service_github_app_slug | trim | length > 0)
        or (sandbox_rental_service_github_app_client_id | trim | length > 0)
      }}

- name: Set sandbox-rental GitHub App settings URL
  ansible.builtin.set_fact:
    sandbox_rental_service_resolved_github_app_settings_url: >-
      {{
        sandbox_rental_service_github_app_settings_url
        | default('https://github.com/settings/apps/' ~ sandbox_rental_service_github_app_slug, true)
      }}

- name: Assert sandbox-rental GitHub App public settings are complete
  ansible.builtin.assert:
    that:
      - sandbox_rental_service_github_app_id | int > 0
      - sandbox_rental_service_github_app_slug | trim | length > 0
      - sandbox_rental_service_github_app_client_id | trim | length > 0
    fail_msg: >-
      GitHub runner integration is enabled, but the public GitHub App settings
      are incomplete. Go to https://github.com/settings/apps/new to create the
      GitHub App, or {{
      sandbox_rental_service_resolved_github_app_settings_url }} to edit the
      current one. This integration currently requires installation on a GitHub
      Organization, not a personal account. Set
      sandbox_rental_service_github_app_id, sandbox_rental_service_github_app_slug,
      and sandbox_rental_service_github_app_client_id in Ansible vars. The private
      key, webhook secret, and client secret are read from OpenBao path
      {{ openbao_platform_kv_mount }}/providers/github/sandbox-rental-service.
  when: sandbox_rental_service_github_app_configured | bool

- name: Remove legacy sandbox-rental runtime provider credentials
  ansible.builtin.file:
    path: "/etc/credstore/sandbox-rental/{{ item }}"
    state: absent
  loop:
    - ch-password
    - github-app-private-key
    - github-app-webhook-secret
    - github-app-client-secret
  notify: restart sandbox-rental-service
