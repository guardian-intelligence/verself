---
- name: Create credstore directory for sandbox-rental
  ansible.builtin.file:
    path: /etc/credstore/sandbox-rental
    state: directory
    owner: root
    group: sandbox_rental
    mode: "0750"

# Individual credential files consumed via systemd LoadCredential=.
# The service reads from $CREDENTIALS_DIRECTORY, not from these paths directly.

- name: Deploy sandbox-rental PG DSN credential
  vars:
    sandbox_rental_service_pg_host: "{{ services.postgresql.host }}"
    sandbox_rental_service_pg_port: "{{ services.postgresql.port }}"
    sandbox_rental_service_pg_dsn: >-
      postgres://sandbox_rental:{{ postgresql_sandbox_rental_password
      }}@{{ sandbox_rental_service_pg_host
      }}:{{ sandbox_rental_service_pg_port }}/sandbox_rental?sslmode=disable
  ansible.builtin.copy:
    content: "{{ sandbox_rental_service_pg_dsn }}"
    dest: /etc/credstore/sandbox-rental/pg-dsn
    owner: root
    group: sandbox_rental
    mode: "0640"
  no_log: true
  notify: restart sandbox-rental-service

- name: Deploy sandbox-rental ClickHouse password credential
  ansible.builtin.copy:
    content: "{{ clickhouse_password }}"
    dest: /etc/credstore/sandbox-rental/ch-password
    owner: root
    group: sandbox_rental
    mode: "0640"
  no_log: true
  notify: restart sandbox-rental-service

- name: Create shared governance-service credstore directory for audit token
  ansible.builtin.file:
    path: /etc/credstore/governance-service
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check shared governance internal audit token
  ansible.builtin.stat:
    path: /etc/credstore/governance-service/internal-audit-token
  register: sandbox_rental_service_governance_audit_token_file
  no_log: true

- name: Generate shared governance internal audit token
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/governance-service/internal-audit-token
    owner: root
    group: root
    mode: "0640"
  when: not sandbox_rental_service_governance_audit_token_file.stat.exists
  no_log: true
  notify: restart sandbox-rental-service

- name: Ensure optional sandbox-rental GitHub App credentials exist
  ansible.builtin.copy:
    content: ""
    dest: "/etc/credstore/sandbox-rental/{{ item }}"
    owner: root
    group: sandbox_rental
    mode: "0640"
    force: false
  loop:
    - github-app-private-key
    - github-app-webhook-secret
    - github-app-client-secret
  no_log: true

- name: Set sandbox-rental GitHub App configuration state
  ansible.builtin.set_fact:
    sandbox_rental_service_github_app_configured: >-
      {{
        (sandbox_rental_service_github_app_enabled | bool)
        or (sandbox_rental_service_github_app_id | int > 0)
        or (sandbox_rental_service_github_app_slug | trim | length > 0)
        or (sandbox_rental_service_github_app_client_id | trim | length > 0)
      }}

- name: Set sandbox-rental GitHub App settings URL
  ansible.builtin.set_fact:
    sandbox_rental_service_resolved_github_app_settings_url: >-
      {{
        sandbox_rental_service_github_app_settings_url
        | default('https://github.com/settings/apps/' ~ sandbox_rental_service_github_app_slug, true)
      }}

- name: Assert sandbox-rental GitHub App public settings are complete
  ansible.builtin.assert:
    that:
      - sandbox_rental_service_github_app_id | int > 0
      - sandbox_rental_service_github_app_slug | trim | length > 0
      - sandbox_rental_service_github_app_client_id | trim | length > 0
    fail_msg: >-
      GitHub runner integration is enabled, but the public GitHub App settings
      are incomplete. Go to https://github.com/settings/apps/new to create the
      GitHub App, or {{
      sandbox_rental_service_resolved_github_app_settings_url }} to edit the
      current one. This integration currently requires installation on a GitHub
      Organization, not a personal account. Set
      sandbox_rental_service_github_app_id, sandbox_rental_service_github_app_slug,
      and sandbox_rental_service_github_app_client_id in Ansible vars.
  when: sandbox_rental_service_github_app_configured | bool

- name: Inspect sandbox-rental GitHub App credentials
  ansible.builtin.stat:
    path: "/etc/credstore/sandbox-rental/{{ item }}"
  register: sandbox_rental_service_github_app_credentials
  loop:
    - github-app-private-key
    - github-app-webhook-secret
    - github-app-client-secret
  loop_control:
    label: "{{ item }}"
  when: sandbox_rental_service_github_app_configured | bool

- name: Collect missing sandbox-rental GitHub App credentials
  ansible.builtin.set_fact:
    sandbox_rental_service_missing_github_app_credentials: >-
      {{
        (sandbox_rental_service_missing_github_app_credentials | default([]))
        + [item.item]
      }}
  loop: "{{ sandbox_rental_service_github_app_credentials.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - sandbox_rental_service_github_app_configured | bool
    - (not (item.stat.exists | bool)) or (item.stat.size | default(0) | int == 0)

- name: Assert sandbox-rental GitHub App credentials are populated
  ansible.builtin.assert:
    that:
      - sandbox_rental_service_missing_github_app_credentials | default([]) | length == 0
    fail_msg: >-
      GitHub runner integration is configured for
      {{ sandbox_rental_service_resolved_github_app_settings_url }},
      but these credential files are missing or empty under
      /etc/credstore/sandbox-rental: {{
      sandbox_rental_service_missing_github_app_credentials | default([]) | join(', ')
      }}. Populate the credentials, then rerun the deploy. Required GitHub App
      settings: callback URL https://{{ sandbox_rental_service_domain }}/github/installations/callback,
      webhook URL https://{{ sandbox_rental_service_domain }}/webhooks/github/actions,
      webhook event workflow_job, repository Actions read permission, repository
      Contents read permission, and organization Self-hosted runners write permission.
  when: sandbox_rental_service_github_app_configured | bool
