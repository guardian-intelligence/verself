---
- name: Create credstore directory for sandbox-rental
  ansible.builtin.file:
    path: /etc/credstore/sandbox-rental
    state: directory
    owner: root
    group: sandbox_rental
    mode: "0750"

# Individual credential files consumed via systemd LoadCredential=.
# The service reads from $CREDENTIALS_DIRECTORY, not from these paths directly.

- name: Deploy sandbox-rental PG DSN credential
  vars:
    sandbox_rental_service_pg_host: "{{ services.postgresql.host }}"
    sandbox_rental_service_pg_port: "{{ services.postgresql.port }}"
    sandbox_rental_service_pg_dsn: >-
      postgres://sandbox_rental:{{ postgresql_sandbox_rental_password
      }}@{{ sandbox_rental_service_pg_host
      }}:{{ sandbox_rental_service_pg_port }}/sandbox_rental?sslmode=disable
  ansible.builtin.copy:
    content: "{{ sandbox_rental_service_pg_dsn }}"
    dest: /etc/credstore/sandbox-rental/pg-dsn
    owner: root
    group: sandbox_rental
    mode: "0640"
  no_log: true
  notify: restart sandbox-rental-service

- name: Deploy sandbox-rental ClickHouse password credential
  ansible.builtin.copy:
    content: "{{ clickhouse_password }}"
    dest: /etc/credstore/sandbox-rental/ch-password
    owner: root
    group: sandbox_rental
    mode: "0640"
  no_log: true
  notify: restart sandbox-rental-service

- name: Check for existing sandbox-rental webhook secret KEK
  ansible.builtin.stat:
    path: /etc/credstore/sandbox-rental/webhook-secret-kek
  register: sandbox_rental_service_webhook_secret_kek_file

- name: Generate sandbox-rental webhook secret KEK
  ansible.builtin.command:
    argv:
      - openssl
      - rand
      - -base64
      - "32"
  register: sandbox_rental_service_webhook_secret_kek_raw
  changed_when: false
  when: not sandbox_rental_service_webhook_secret_kek_file.stat.exists
  no_log: true

- name: Deploy sandbox-rental webhook secret KEK credential
  ansible.builtin.copy:
    content: "{{ sandbox_rental_service_webhook_secret_kek_raw.stdout | trim }}"
    dest: /etc/credstore/sandbox-rental/webhook-secret-kek
    owner: root
    group: sandbox_rental
    mode: "0640"
  when: not sandbox_rental_service_webhook_secret_kek_file.stat.exists
  no_log: true
  notify: restart sandbox-rental-service
