---
# --- Verify binary ---

- name: Verify sandbox-rental-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/sandbox-rental-service"
  register: sandbox_rental_service_binary
  failed_when: not sandbox_rental_service_binary.stat.exists

- name: Verify sandbox-rental-recurring-worker binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/sandbox-rental-recurring-worker"
  register: sandbox_rental_service_recurring_worker_binary
  failed_when: not sandbox_rental_service_recurring_worker_binary.stat.exists

# --- System user ---

- name: Create sandbox_rental system group
  ansible.builtin.group:
    name: sandbox_rental
    system: true

- name: Ensure vm-orchestrator client socket group exists
  ansible.builtin.group:
    name: "{{ sandbox_rental_service_vm_orchestrator_socket_group }}"
    system: true
    state: present

- name: Ensure spire workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true
    state: present

- name: Create sandbox_rental system user
  ansible.builtin.user:
    name: sandbox_rental
    group: sandbox_rental
    groups:
      - "{{ sandbox_rental_service_vm_orchestrator_socket_group }}"
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Read vm-orchestrator client socket group members
  ansible.builtin.getent:
    database: group
    key: "{{ sandbox_rental_service_vm_orchestrator_socket_group }}"

- name: Read local users for vm-orchestrator socket group audit
  ansible.builtin.getent:
    database: passwd

- name: Assert vm-orchestrator socket group has only approved runtime callers
  ansible.builtin.assert:
    that:
      - >-
        (
          (
            (
              ansible_facts.getent_group[sandbox_rental_service_vm_orchestrator_socket_group][2].split(',')
              | reject('equalto', '')
              | list
            )
            + (
              ansible_facts.getent_passwd
              | dict2items
              | selectattr('value.2', 'equalto', ansible_facts.getent_group[sandbox_rental_service_vm_orchestrator_socket_group][1])
              | map(attribute='key')
              | list
            )
          )
          | unique
          | sort
        ) == (sandbox_rental_service_vm_orchestrator_allowed_socket_users | sort)
    fail_msg: >-
      {{ sandbox_rental_service_vm_orchestrator_socket_group }} grants privileged
      vm-orchestrator access and must contain only
      {{ sandbox_rental_service_vm_orchestrator_allowed_socket_users | join(', ') }}.

- name: Resolve sandbox-rental uid for SPIRE registration
  ansible.builtin.command:
    cmd: id -u sandbox_rental
  register: sandbox_rental_service_uid
  changed_when: false

- name: Read sandbox-rental SPIRE registration
  ansible.builtin.command:
    cmd: >-
      {{ verself_bin }}/spire-server entry show
      -socketPath {{ spire_server_socket_path }}
      -entryID verself-sandbox-rental-service
      -output json
  register: sandbox_rental_service_spire_entry
  failed_when: false
  changed_when: false

- name: Register sandbox-rental SPIFFE workload
  ansible.builtin.command:
    cmd: >-
      {{ verself_bin }}/spire-server entry create
      -socketPath {{ spire_server_socket_path }}
      -entryID verself-sandbox-rental-service
      -parentID {{ spire_agent_id }}
      -spiffeID {{ spire_sandbox_rental_id }}
      -selector unix:uid:{{ sandbox_rental_service_uid.stdout | trim }}
      -x509SVIDTTL 3600
  when: sandbox_rental_service_spire_entry.rc != 0 or 'verself-sandbox-rental-service' not in sandbox_rental_service_spire_entry.stdout
  changed_when: true
  notify: restart sandbox-rental-service

- name: Update sandbox-rental SPIRE workload selector drift
  ansible.builtin.command:
    cmd: >-
      {{ verself_bin }}/spire-server entry update
      -socketPath {{ spire_server_socket_path }}
      -entryID verself-sandbox-rental-service
      -parentID {{ spire_agent_id }}
      -spiffeID {{ spire_sandbox_rental_id }}
      -selector unix:uid:{{ sandbox_rental_service_uid.stdout | trim }}
      -x509SVIDTTL 3600
  when:
    - sandbox_rental_service_spire_entry.rc == 0
    - "'uid:' ~ (sandbox_rental_service_uid.stdout | trim) not in sandbox_rental_service_spire_entry.stdout"
  changed_when: true
  notify: restart sandbox-rental-service

- name: Create sandbox-rental GitHub checkout cache directory
  ansible.builtin.file:
    path: "{{ sandbox_rental_service_github_checkout_cache_dir }}"
    state: directory
    owner: sandbox_rental
    group: sandbox_rental
    mode: "0700"

# --- nftables egress rules ---

- name: Deploy sandbox-rental-service nftables ruleset
  ansible.builtin.template:
    src: sandbox-rental.nft.j2
    dest: /etc/nftables.d/sandbox-rental.nft
    mode: "0644"
  notify: reload nftables

- name: Apply sandbox-rental-service nftables before proceeding
  ansible.builtin.meta: flush_handlers

# --- Schema migrations ---

- name: Include sandbox-rental PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

# --- Credentials ---

- name: Include sandbox-rental credential tasks
  ansible.builtin.include_tasks: credentials.yml

# --- ClickHouse auth ---

- name: Ensure sandbox-rental-service ClickHouse user exists with projection grants
  ansible.builtin.shell: |
    set -euo pipefail
    {{ clickhouse_operator_client_command }} --multiquery <<'SQL'
    CREATE USER IF NOT EXISTS sandbox_rental IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_sandbox_rental_id }}' HOST LOCAL;
    ALTER USER sandbox_rental IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_sandbox_rental_id }}' HOST LOCAL;
    GRANT INSERT ON verself.job_logs TO sandbox_rental;
    GRANT INSERT ON verself.job_events TO sandbox_rental;
    GRANT SELECT ON verself.job_logs TO sandbox_rental;
    GRANT SELECT ON verself.job_events TO sandbox_rental;
    GRANT SELECT ON verself.job_cache_events TO sandbox_rental;
    SQL
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

# --- Auth configuration ---

- name: Wait for Zitadel before configuring sandbox-rental auth
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.zitadel.host }}"
    port: "{{ topology_endpoints.zitadel.endpoints.http.port }}"
    timeout: 60

- name: Read Zitadel admin PAT for sandbox-rental auth setup
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: sandbox_rental_service_zitadel_admin_pat_raw
  no_log: true

- name: List Zitadel projects for sandbox-rental auth
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ sandbox_rental_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body: {}
    return_content: true
  register: sandbox_rental_service_zitadel_projects
  no_log: true

- name: Find sandbox-rental auth project
  ansible.builtin.set_fact:
    sandbox_rental_service_auth_project: >-
      {{
        (
          sandbox_rental_service_zitadel_projects.json.result
          | selectattr('name', 'equalto', sandbox_rental_service_auth_project_name)
          | list
          | first
        ) | default({})
      }}

- name: Create sandbox-rental auth project if missing
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ sandbox_rental_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ sandbox_rental_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    return_content: true
  register: sandbox_rental_service_auth_project_created
  when: sandbox_rental_service_auth_project == {}
  no_log: true

- name: Set sandbox-rental auth audience
  ansible.builtin.set_fact:
    sandbox_rental_service_auth_audience: >-
      {{
        sandbox_rental_service_auth_project.id
        | default(sandbox_rental_service_auth_project_created.json.id, true)
      }}

- name: Assert sandbox-rental auth audience is set
  ansible.builtin.assert:
    that: sandbox_rental_service_auth_audience | default('', true) | length > 0
    fail_msg: sandbox_rental_service_auth_audience could not be resolved from Zitadel.

- name: Ensure sandbox-rental project has role assertion enabled
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/{{ sandbox_rental_service_auth_audience }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ sandbox_rental_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ sandbox_rental_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    status_code: 200
  # Zitadel omits projectRoleAssertion from GET responses when false,
  # so always PUT to converge — the call is idempotent.
  when: sandbox_rental_service_auth_project != {}
  no_log: true

- name: Ensure sandbox-rental project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ sandbox_rental_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
    zitadel_project_roles_project_id: "{{ sandbox_rental_service_auth_audience }}"
    zitadel_project_roles_definitions:
      - key: owner
        display_name: Owner
        group: sandbox
      - key: admin
        display_name: Admin
        group: sandbox
      - key: member
        display_name: Member
        group: sandbox
  when: sandbox_rental_service_auth_audience | default('', true) | length > 0

# --- systemd unit ---

- name: Deploy sandbox-rental-service systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Sandbox Rental Service
      After=verself-firewall.target network.target postgresql.service clickhouse-server.service
      After=spire-agent.service secrets-service.service source-code-hosting-service.service
      Requires=verself-firewall.target
      Wants=postgresql.service clickhouse-server.service spire-agent.service
      Wants=secrets-service.service source-code-hosting-service.service

      [Service]
      Type=simple
      User=sandbox_rental
      Group=sandbox_rental
      SupplementaryGroups={{ sandbox_rental_service_vm_orchestrator_socket_group }} {{ spire_workload_group }}
      BindReadOnlyPaths=/etc/verself/auth-discovery-hosts:/etc/hosts
      LoadCredential=clickhouse-ca-cert:/etc/clickhouse-server/tls/server-ca.pem
      LoadCredential=forgejo-token:/etc/credstore/forgejo/automation-token
      LoadCredential=forgejo-webhook-secret:/etc/credstore/sandbox-rental/forgejo-webhook-secret
      LoadCredential=forgejo-bootstrap-secret:/etc/credstore/sandbox-rental/forgejo-bootstrap-secret
      Environment=SANDBOX_LISTEN_ADDR={{ topology_endpoints.sandbox_rental.endpoints.public_http.address }}
      Environment=SANDBOX_INTERNAL_LISTEN_ADDR={{ topology_endpoints.sandbox_rental.endpoints.internal_https.address }}
      Environment=SANDBOX_PG_DSN=postgres://sandbox_rental@/sandbox_rental?host=/var/run/postgresql&sslmode=disable
      Environment=SANDBOX_GOVERNANCE_AUDIT_URL={{ sandbox_rental_governance_audit_url }}
      Environment=SANDBOX_SECRETS_URL=https://{{ topology_endpoints.secrets_service.endpoints.internal_https.address }}
      Environment=SANDBOX_SOURCE_INTERNAL_URL=https://{{ topology_endpoints.source_code_hosting_service.endpoints.internal_https.address }}
      Environment=SANDBOX_TEMPORAL_FRONTEND_ADDRESS={{ topology_endpoints.temporal.endpoints.frontend_grpc.address }}
      Environment=SANDBOX_TEMPORAL_NAMESPACE={{ sandbox_rental_service_temporal_namespace }}
      Environment=SANDBOX_TEMPORAL_TASK_QUEUE_RECURRING={{ sandbox_rental_service_temporal_task_queue_recurring }}
      Environment=SANDBOX_CH_ADDRESS={{ topology_endpoints.clickhouse.endpoints.native_tls.address }}
      Environment=SANDBOX_CH_USER=sandbox_rental
      Environment=SANDBOX_BILLING_URL=https://{{ topology_endpoints.billing.endpoints.internal_https.address }}
      Environment=SANDBOX_BILLING_RETURN_ORIGINS=https://{{ console_domain }}
      Environment=SANDBOX_PUBLIC_BASE_URL=https://{{ sandbox_rental_service_domain }}
      Environment=SANDBOX_AUTH_ISSUER_URL={{ sandbox_rental_service_auth_issuer_url }}
      Environment=SANDBOX_AUTH_AUDIENCE={{ sandbox_rental_service_auth_audience }}
      Environment=SANDBOX_VM_ORCHESTRATOR_SOCKET={{ sandbox_rental_service_vm_orchestrator_socket }}
      Environment=SANDBOX_PG_MAX_OPEN_CONNS={{ sandbox_rental_service_pg_max_open_conns }}
      Environment=SANDBOX_PG_MAX_IDLE_CONNS={{ sandbox_rental_service_pg_max_idle_conns }}
      Environment=SANDBOX_PG_CONN_MAX_LIFETIME_SECONDS={{ sandbox_rental_service_pg_conn_max_lifetime_seconds }}
      Environment=SANDBOX_PG_CONN_MAX_IDLE_SECONDS={{ sandbox_rental_service_pg_conn_max_idle_seconds }}
      Environment=SANDBOX_RIVER_PG_MAX_CONNS={{ sandbox_rental_service_river_pg_max_conns }}
      Environment=SANDBOX_RIVER_PG_MIN_CONNS={{ sandbox_rental_service_river_pg_min_conns }}
      Environment=SANDBOX_RIVER_PG_CONN_MAX_LIFETIME_SECONDS={{ sandbox_rental_service_river_pg_conn_max_lifetime_seconds }}
      Environment=SANDBOX_RIVER_PG_CONN_MAX_IDLE_SECONDS={{ sandbox_rental_service_river_pg_conn_max_idle_seconds }}
      Environment=SANDBOX_EXECUTION_MAX_WORKERS={{ sandbox_rental_service_execution_max_workers }}
      Environment=SANDBOX_GITHUB_APP_ENABLED={{ sandbox_rental_service_github_app_enabled | bool | ternary('true', 'false') }}
      Environment=SANDBOX_GITHUB_APP_ID={{ sandbox_rental_service_github_app_id }}
      Environment=SANDBOX_GITHUB_APP_SLUG={{ sandbox_rental_service_github_app_slug }}
      Environment=SANDBOX_GITHUB_APP_CLIENT_ID={{ sandbox_rental_service_github_app_client_id }}
      Environment=SANDBOX_GITHUB_API_BASE_URL={{ sandbox_rental_service_github_api_base_url }}
      Environment=SANDBOX_GITHUB_WEB_BASE_URL={{ sandbox_rental_service_github_web_base_url }}
      Environment=SANDBOX_GITHUB_RUNNER_GROUP_ID={{ sandbox_rental_service_github_runner_group_id }}
      Environment=SANDBOX_GITHUB_CHECKOUT_CACHE_DIR={{ sandbox_rental_service_github_checkout_cache_dir }}
      Environment=SANDBOX_FORGEJO_API_BASE_URL={{ sandbox_rental_service_forgejo_api_base_url }}
      Environment=SANDBOX_FORGEJO_RUNNER_BASE_URL={{ sandbox_rental_service_forgejo_runner_base_url }}
      Environment=SANDBOX_FORGEJO_WEBHOOK_BASE_URL={{ sandbox_rental_service_forgejo_webhook_base_url }}
      Environment=SPIFFE_ENDPOINT_SOCKET=unix://{{ spire_agent_socket_path }}
      ExecStart={{ verself_bin }}/sandbox-rental-service
      Restart=on-failure
      RestartSec=5
      CapabilityBoundingSet=
      ProtectHome=true
      ProtectSystem=full
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0077

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/sandbox-rental-service.service
    mode: "0644"
  vars:
    sandbox_rental_governance_audit_url: >-
      https://{{ topology_endpoints.governance_service.endpoints.internal_https.address }}
  notify:
    - restart sandbox-rental-service
    - restart sandbox-rental-recurring-worker

- name: Deploy sandbox-rental recurring worker systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Sandbox Rental Recurring Worker
      After=verself-firewall.target network.target postgresql.service temporal-server.service
      After=spire-agent.service otelcol.service source-code-hosting-service.service
      Requires=verself-firewall.target
      Wants=postgresql.service temporal-server.service spire-agent.service otelcol.service
      Wants=source-code-hosting-service.service

      [Service]
      Type=simple
      User=sandbox_rental
      Group=sandbox_rental
      SupplementaryGroups={{ spire_workload_group }}
      Environment=SANDBOX_PG_DSN=postgres://sandbox_rental@/sandbox_rental?host=/var/run/postgresql&sslmode=disable
      Environment=SANDBOX_SOURCE_INTERNAL_URL=https://{{ topology_endpoints.source_code_hosting_service.endpoints.internal_https.address }}
      Environment=SANDBOX_RIVER_PG_MAX_CONNS={{ sandbox_rental_service_river_pg_max_conns }}
      Environment=SANDBOX_RIVER_PG_MIN_CONNS={{ sandbox_rental_service_river_pg_min_conns }}
      Environment=SANDBOX_RIVER_PG_CONN_MAX_LIFETIME_SECONDS={{ sandbox_rental_service_river_pg_conn_max_lifetime_seconds }}
      Environment=SANDBOX_RIVER_PG_CONN_MAX_IDLE_SECONDS={{ sandbox_rental_service_river_pg_conn_max_idle_seconds }}
      Environment=SANDBOX_TEMPORAL_FRONTEND_ADDRESS={{ topology_endpoints.temporal.endpoints.frontend_grpc.address }}
      Environment=SANDBOX_TEMPORAL_NAMESPACE={{ sandbox_rental_service_temporal_namespace }}
      Environment=SANDBOX_TEMPORAL_TASK_QUEUE_RECURRING={{ sandbox_rental_service_temporal_task_queue_recurring }}
      Environment=SPIFFE_ENDPOINT_SOCKET=unix://{{ spire_agent_socket_path }}
      ExecStart={{ verself_bin }}/sandbox-rental-recurring-worker
      Restart=on-failure
      RestartSec=5
      CapabilityBoundingSet=
      ProtectHome=true
      ProtectSystem=full
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0077

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/sandbox-rental-recurring-worker.service
    mode: "0644"
  notify:
    - restart sandbox-rental-recurring-worker

- name: Apply sandbox-rental-service unit changes before proceeding
  ansible.builtin.meta: flush_handlers

# --- Enable and start ---

- name: Enable and start sandbox-rental-service
  ansible.builtin.systemd:
    name: sandbox-rental-service
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start sandbox-rental-recurring-worker
  ansible.builtin.systemd:
    name: sandbox-rental-recurring-worker
    enabled: true
    state: started
    daemon_reload: true

# --- Readiness gate ---

- name: Set sandbox-rental listen port fact
  ansible.builtin.set_fact:
    sandbox_rental_service_listen_port: "{{ topology_endpoints.sandbox_rental.endpoints.public_http.port }}"
    sandbox_rental_service_internal_listen_port: "{{ topology_endpoints.sandbox_rental.endpoints.internal_https.port }}"

- name: Wait for sandbox-rental-service listener to be present
  ansible.builtin.command:
    cmd: "ss -ltn '( sport = :{{ sandbox_rental_service_listen_port }} )'"
  register: sandbox_rental_service_listener
  changed_when: false
  retries: 30
  delay: 1
  until: sandbox_rental_service_listener.stdout is search(':' ~ (sandbox_rental_service_listen_port | string))

- name: Wait for sandbox-rental-service internal listener to be present
  ansible.builtin.command:
    cmd: "ss -ltn '( sport = :{{ sandbox_rental_service_internal_listen_port }} )'"
  register: sandbox_rental_service_internal_listener
  changed_when: false
  retries: 30
  delay: 1
  until: sandbox_rental_service_internal_listener.stdout is search(':' ~ (sandbox_rental_service_internal_listen_port | string))

- name: Wait for sandbox-rental-recurring-worker to be active
  verself_systemd_status:
    unit: sandbox-rental-recurring-worker.service
  register: sandbox_rental_service_recurring_worker_status
  retries: 30
  delay: 1
  until: sandbox_rental_service_recurring_worker_status.active
