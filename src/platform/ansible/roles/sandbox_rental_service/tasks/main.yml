---
# --- Verify binary ---

- name: Verify sandbox-rental-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/sandbox-rental-service"
  register: sandbox_rental_service_binary
  failed_when: not sandbox_rental_service_binary.stat.exists

# --- System user ---

- name: Create sandbox_rental system group
  ansible.builtin.group:
    name: sandbox_rental
    system: true

- name: Ensure vm-orchestrator client socket group exists
  ansible.builtin.group:
    name: "{{ sandbox_rental_service_vm_orchestrator_socket_group }}"
    system: true
    state: present

- name: Create sandbox_rental system user
  ansible.builtin.user:
    name: sandbox_rental
    group: sandbox_rental
    groups:
      - "{{ sandbox_rental_service_vm_orchestrator_socket_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Read vm-orchestrator client socket group members
  ansible.builtin.getent:
    database: group
    key: "{{ sandbox_rental_service_vm_orchestrator_socket_group }}"

- name: Read local users for vm-orchestrator socket group audit
  ansible.builtin.getent:
    database: passwd

- name: Assert vm-orchestrator socket group has only approved runtime callers
  ansible.builtin.assert:
    that:
      - >-
        (
          (
            (
              ansible_facts.getent_group[sandbox_rental_service_vm_orchestrator_socket_group][2].split(',')
              | reject('equalto', '')
              | list
            )
            + (
              ansible_facts.getent_passwd
              | dict2items
              | selectattr('value.2', 'equalto', ansible_facts.getent_group[sandbox_rental_service_vm_orchestrator_socket_group][1])
              | map(attribute='key')
              | list
            )
          )
          | unique
          | sort
        ) == (sandbox_rental_service_vm_orchestrator_allowed_socket_users | sort)
    fail_msg: >-
      {{ sandbox_rental_service_vm_orchestrator_socket_group }} grants privileged
      vm-orchestrator access and must contain only
      {{ sandbox_rental_service_vm_orchestrator_allowed_socket_users | join(', ') }}.

- name: Create sandbox-rental GitHub checkout cache directory
  ansible.builtin.file:
    path: "{{ sandbox_rental_service_github_checkout_cache_dir }}"
    state: directory
    owner: sandbox_rental
    group: sandbox_rental
    mode: "0700"

# --- nftables egress rules ---

- name: Deploy sandbox-rental-service nftables ruleset
  ansible.builtin.template:
    src: sandbox-rental.nft.j2
    dest: /etc/nftables.d/sandbox-rental.nft
    mode: "0644"
  notify: reload nftables

- name: Apply sandbox-rental-service nftables before proceeding
  ansible.builtin.meta: flush_handlers

# --- Schema migrations ---

- name: Include sandbox-rental PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

# --- Credentials ---

- name: Include sandbox-rental credential tasks
  ansible.builtin.include_tasks: credentials.yml

# --- Auth configuration ---

- name: Wait for Zitadel before configuring sandbox-rental auth
  ansible.builtin.wait_for:
    host: "{{ services.zitadel.host }}"
    port: "{{ services.zitadel.port }}"
    timeout: 60

- name: Read Zitadel admin PAT for sandbox-rental auth setup
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: sandbox_rental_service_zitadel_admin_pat_raw
  no_log: true

- name: List Zitadel projects for sandbox-rental auth
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ sandbox_rental_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body: {}
    return_content: true
  register: sandbox_rental_service_zitadel_projects
  no_log: true

- name: Find sandbox-rental auth project
  ansible.builtin.set_fact:
    sandbox_rental_service_auth_project: >-
      {{
        (
          sandbox_rental_service_zitadel_projects.json.result
          | selectattr('name', 'equalto', sandbox_rental_service_auth_project_name)
          | list
          | first
        ) | default({})
      }}

- name: Create sandbox-rental auth project if missing
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ sandbox_rental_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      name: "{{ sandbox_rental_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    return_content: true
  register: sandbox_rental_service_auth_project_created
  when: sandbox_rental_service_auth_project == {}
  no_log: true

- name: Set sandbox-rental auth audience
  ansible.builtin.set_fact:
    sandbox_rental_service_auth_audience: >-
      {{
        sandbox_rental_service_auth_project.id
        | default(sandbox_rental_service_auth_project_created.json.id, true)
      }}

- name: Assert sandbox-rental auth audience is set
  ansible.builtin.assert:
    that: sandbox_rental_service_auth_audience | default('', true) | length > 0
    fail_msg: sandbox_rental_service_auth_audience could not be resolved from Zitadel.

- name: Ensure sandbox-rental project has role assertion enabled
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ sandbox_rental_service_auth_audience }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ sandbox_rental_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      name: "{{ sandbox_rental_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    status_code: 200
  # Zitadel omits projectRoleAssertion from GET responses when false,
  # so always PUT to converge — the call is idempotent.
  when: sandbox_rental_service_auth_project != {}
  no_log: true

- name: Ensure sandbox-rental project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ sandbox_rental_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
    zitadel_project_roles_project_id: "{{ sandbox_rental_service_auth_audience }}"
    zitadel_project_roles_definitions:
      - key: sandbox_org_admin
        display_name: Sandbox Org Admin
        group: sandbox
      - key: sandbox_org_member
        display_name: Sandbox Org Member
        group: sandbox
  when: sandbox_rental_service_auth_audience | default('', true) | length > 0

- name: Find billing auth project for sandbox-rental billing client
  ansible.builtin.set_fact:
    sandbox_rental_service_billing_auth_project: >-
      {{
        (
          sandbox_rental_service_zitadel_projects.json.result
          | selectattr('name', 'equalto', sandbox_rental_service_billing_auth_project_name)
          | list
          | first
        ) | default({})
      }}

- name: Assert billing auth project exists for sandbox-rental billing client
  ansible.builtin.assert:
    that: sandbox_rental_service_billing_auth_project != {}
    fail_msg: >-
      billing auth project {{ sandbox_rental_service_billing_auth_project_name }} is missing.

- name: Set sandbox-rental billing auth audience
  ansible.builtin.set_fact:
    sandbox_rental_service_billing_auth_audience: "{{ sandbox_rental_service_billing_auth_project.id }}"

- name: Check sandbox-rental billing client secret credential
  ansible.builtin.stat:
    path: /etc/credstore/sandbox-rental/billing-client-secret
  register: sandbox_rental_service_billing_client_secret_file

- name: List Zitadel users for sandbox-rental billing client
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/v2/users"
    method: POST
    headers:
      Authorization: "Bearer {{ sandbox_rental_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body: {}
    return_content: true
    status_code: 200
  register: sandbox_rental_service_zitadel_users
  no_log: true

- name: Find sandbox-rental billing machine user
  ansible.builtin.set_fact:
    sandbox_rental_service_billing_machine_user: >-
      {{
        (
          sandbox_rental_service_zitadel_users.json.result
          | selectattr('username', 'equalto', sandbox_rental_service_billing_client_id)
          | list
          | first
        ) | default({})
      }}

- name: Create sandbox-rental billing machine user if missing
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/users/machine"
    method: POST
    headers:
      Authorization: "Bearer {{ sandbox_rental_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      userName: "{{ sandbox_rental_service_billing_client_id }}"
      name: "sandbox rental billing {{ inventory_hostname }}"
      accessTokenType: ACCESS_TOKEN_TYPE_JWT
    return_content: true
  register: sandbox_rental_service_billing_machine_user_created
  when: sandbox_rental_service_billing_machine_user == {}
  no_log: true

- name: Set sandbox-rental billing machine user id
  ansible.builtin.set_fact:
    sandbox_rental_service_billing_machine_user_id: >-
      {{
        sandbox_rental_service_billing_machine_user.userId
        | default(sandbox_rental_service_billing_machine_user_created.json.userId, true)
      }}

- name: Create sandbox-rental billing machine user secret when needed
  ansible.builtin.uri:
    url: >-
      http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/v2/users/{{
      sandbox_rental_service_billing_machine_user_id }}/secret
    method: POST
    headers:
      Authorization: "Bearer {{ sandbox_rental_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    status_code: 200
    return_content: true
  register: sandbox_rental_service_billing_machine_user_secret
  when:
    - sandbox_rental_service_billing_machine_user_created is not skipped
      or not sandbox_rental_service_billing_client_secret_file.stat.exists
  no_log: true

- name: Store sandbox-rental billing client secret
  ansible.builtin.copy:
    content: "{{ sandbox_rental_service_billing_machine_user_secret.json.clientSecret }}"
    dest: /etc/credstore/sandbox-rental/billing-client-secret
    owner: root
    group: sandbox_rental
    mode: "0640"
  when:
    - sandbox_rental_service_billing_machine_user_created is not skipped
      or not sandbox_rental_service_billing_client_secret_file.stat.exists
  no_log: true
  notify: restart sandbox-rental-service

- name: Grant sandbox-rental billing machine user access to billing project
  ansible.builtin.uri:
    url: >-
      http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/users/{{
      sandbox_rental_service_billing_machine_user_id }}/grants
    method: POST
    headers:
      Authorization: "Bearer {{ sandbox_rental_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      projectId: "{{ sandbox_rental_service_billing_auth_audience }}"
      roleKeys:
        - "{{ sandbox_rental_service_billing_internal_role }}"
    status_code: [200, 409]
  no_log: true

# --- systemd unit ---

- name: Deploy sandbox-rental-service systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Sandbox Rental Service
      After=forge-metal-firewall.target network.target postgresql.service
      Requires=forge-metal-firewall.target
      Wants=postgresql.service

      [Service]
      Type=simple
      User=sandbox_rental
      Group=sandbox_rental
      SupplementaryGroups={{ sandbox_rental_service_vm_orchestrator_socket_group }}
      LoadCredential=pg-dsn:/etc/credstore/sandbox-rental/pg-dsn
      LoadCredential=ch-password:/etc/credstore/sandbox-rental/ch-password
      LoadCredential=billing-client-secret:/etc/credstore/sandbox-rental/billing-client-secret
      LoadCredential=github-app-private-key:/etc/credstore/sandbox-rental/github-app-private-key
      LoadCredential=github-app-webhook-secret:/etc/credstore/sandbox-rental/github-app-webhook-secret
      LoadCredential=github-app-client-secret:/etc/credstore/sandbox-rental/github-app-client-secret
      LoadCredential=governance-internal-audit-token:/etc/credstore/governance-service/internal-audit-token
      Environment=SANDBOX_LISTEN_ADDR={{ services.sandbox_rental.host }}:{{ services.sandbox_rental.port }}
      Environment=SANDBOX_GOVERNANCE_AUDIT_URL=http://{{ services.governance_service.host }}:{{ services.governance_service.port }}/internal/v1/audit/events
      Environment=SANDBOX_CH_ADDRESS={{ services.clickhouse.host }}:{{ services.clickhouse.native_port }}
      Environment=SANDBOX_BILLING_URL=http://{{ services.billing.host }}:{{ services.billing.port }}
      Environment=SANDBOX_BILLING_CLIENT_ID={{ sandbox_rental_service_billing_client_id }}
      Environment=SANDBOX_BILLING_TOKEN_URL={{ sandbox_rental_service_billing_token_url }}
      Environment=SANDBOX_BILLING_AUTH_AUDIENCE={{ sandbox_rental_service_billing_auth_audience }}
      Environment=SANDBOX_BILLING_RETURN_ORIGINS=https://{{ sandbox_rental_service_domain }}
      Environment=SANDBOX_PUBLIC_BASE_URL=https://{{ sandbox_rental_service_domain }}
      Environment=SANDBOX_AUTH_ISSUER_URL={{ sandbox_rental_service_auth_issuer_url }}
      Environment=SANDBOX_AUTH_JWKS_URL={{ sandbox_rental_service_auth_jwks_url }}
      Environment=SANDBOX_AUTH_AUDIENCE={{ sandbox_rental_service_auth_audience }}
      Environment=SANDBOX_VM_ORCHESTRATOR_SOCKET={{ sandbox_rental_service_vm_orchestrator_socket }}
      Environment=SANDBOX_PG_MAX_OPEN_CONNS={{ sandbox_rental_service_pg_max_open_conns }}
      Environment=SANDBOX_PG_MAX_IDLE_CONNS={{ sandbox_rental_service_pg_max_idle_conns }}
      Environment=SANDBOX_PG_CONN_MAX_LIFETIME_SECONDS={{ sandbox_rental_service_pg_conn_max_lifetime_seconds }}
      Environment=SANDBOX_PG_CONN_MAX_IDLE_SECONDS={{ sandbox_rental_service_pg_conn_max_idle_seconds }}
      Environment=SANDBOX_RIVER_PG_MAX_CONNS={{ sandbox_rental_service_river_pg_max_conns }}
      Environment=SANDBOX_RIVER_PG_MIN_CONNS={{ sandbox_rental_service_river_pg_min_conns }}
      Environment=SANDBOX_RIVER_PG_CONN_MAX_LIFETIME_SECONDS={{ sandbox_rental_service_river_pg_conn_max_lifetime_seconds }}
      Environment=SANDBOX_RIVER_PG_CONN_MAX_IDLE_SECONDS={{ sandbox_rental_service_river_pg_conn_max_idle_seconds }}
      Environment=SANDBOX_EXECUTION_MAX_WORKERS={{ sandbox_rental_service_execution_max_workers }}
      Environment=SANDBOX_GITHUB_APP_ENABLED={{ sandbox_rental_service_github_app_enabled | bool | ternary('true', 'false') }}
      Environment=SANDBOX_GITHUB_APP_ID={{ sandbox_rental_service_github_app_id }}
      Environment=SANDBOX_GITHUB_APP_SLUG={{ sandbox_rental_service_github_app_slug }}
      Environment=SANDBOX_GITHUB_APP_CLIENT_ID={{ sandbox_rental_service_github_app_client_id }}
      Environment=SANDBOX_GITHUB_API_BASE_URL={{ sandbox_rental_service_github_api_base_url }}
      Environment=SANDBOX_GITHUB_WEB_BASE_URL={{ sandbox_rental_service_github_web_base_url }}
      Environment=SANDBOX_GITHUB_RUNNER_GROUP_ID={{ sandbox_rental_service_github_runner_group_id }}
      Environment=SANDBOX_GITHUB_CHECKOUT_CACHE_DIR={{ sandbox_rental_service_github_checkout_cache_dir }}
      ExecStart={{ fm_bin }}/sandbox-rental-service
      Restart=on-failure
      RestartSec=5
      CapabilityBoundingSet=
      ProtectHome=true
      ProtectSystem=full
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0077

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/sandbox-rental-service.service
    mode: "0644"
  notify:
    - restart sandbox-rental-service

- name: Remove stale sandbox-rental-service systemd override
  ansible.builtin.file:
    path: /etc/systemd/system/sandbox-rental-service.service.d/override.conf
    state: absent
  notify:
    - restart sandbox-rental-service

- name: Apply sandbox-rental-service unit changes before proceeding
  ansible.builtin.meta: flush_handlers

# --- Enable and start ---

- name: Enable and start sandbox-rental-service
  ansible.builtin.systemd:
    name: sandbox-rental-service
    enabled: true
    state: started
    daemon_reload: true

# --- Readiness gate ---

- name: Set sandbox-rental listen port fact
  ansible.builtin.set_fact:
    sandbox_rental_service_listen_port: "{{ services.sandbox_rental.port }}"

- name: Wait for sandbox-rental-service listener to be present
  ansible.builtin.command:
    cmd: "ss -ltn '( sport = :{{ sandbox_rental_service_listen_port }} )'"
  register: sandbox_rental_service_listener
  changed_when: false
  retries: 30
  delay: 1
  until: sandbox_rental_service_listener.stdout is search(':' ~ (sandbox_rental_service_listen_port | string))
