---
- name: Create credstore directory for governance-service
  ansible.builtin.file:
    path: /etc/credstore/governance-service
    state: directory
    owner: root
    group: governance_service
    mode: "0750"

- name: Check governance-service generated credentials
  ansible.builtin.stat:
    path: "/etc/credstore/governance-service/{{ item }}"
  loop:
    - pg-password
    - audit-hmac-key
    - internal-audit-token
  register: governance_service_generated_credential_files
  no_log: true

- name: Generate governance-service missing credentials
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: "/etc/credstore/governance-service/{{ item.item }}"
    owner: root
    group: governance_service
    mode: "0640"
  loop: "{{ governance_service_generated_credential_files.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: not item.stat.exists
  no_log: true

- name: Converge governance-service generated credential permissions
  ansible.builtin.file:
    path: "/etc/credstore/governance-service/{{ item }}"
    owner: root
    group: governance_service
    mode: "0640"
  loop:
    - pg-password
    - audit-hmac-key
    - internal-audit-token

- name: Read governance-service generated PostgreSQL password
  ansible.builtin.slurp:
    src: /etc/credstore/governance-service/pg-password
  register: governance_service_pg_password_raw
  no_log: true

- name: Set governance-service generated PostgreSQL password fact
  ansible.builtin.set_fact:
    governance_service_pg_password: "{{ governance_service_pg_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Deploy governance-service PG DSN credential
  vars:
    governance_service_pg_dsn: >-
      postgres://governance_service:{{ governance_service_pg_password | urlencode
      }}@{{ services.postgresql.host }}:{{ services.postgresql.port }}/governance_service?sslmode=disable
  ansible.builtin.copy:
    content: "{{ governance_service_pg_dsn }}"
    dest: /etc/credstore/governance-service/pg-dsn
    owner: root
    group: governance_service
    mode: "0640"
  no_log: true
  notify: restart governance-service

- name: Deploy governance-service service database reader credentials
  vars:
    governance_service_reader_dsns:
      identity-pg-dsn: >-
        postgres://identity_service@{{ services.postgresql.host }}:{{ services.postgresql.port
        }}/identity_service?sslmode=disable&password={{ postgresql_identity_service_password | urlencode }}
      billing-pg-dsn: >-
        postgres://billing:{{ postgresql_billing_password | urlencode
        }}@{{ services.postgresql.host }}:{{ services.postgresql.port }}/billing?sslmode=disable
      sandbox-pg-dsn: >-
        postgres://sandbox_rental:{{ postgresql_sandbox_rental_password | urlencode
        }}@{{ services.postgresql.host }}:{{ services.postgresql.port }}/sandbox_rental?sslmode=disable
  ansible.builtin.copy:
    content: "{{ item.value }}"
    dest: "/etc/credstore/governance-service/{{ item.key }}"
    owner: root
    group: governance_service
    mode: "0640"
  loop: "{{ governance_service_reader_dsns | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true
  notify: restart governance-service

- name: Deploy governance-service ClickHouse password credential
  ansible.builtin.copy:
    content: "{{ clickhouse_password }}"
    dest: /etc/credstore/governance-service/ch-password
    owner: root
    group: governance_service
    mode: "0640"
  no_log: true
  notify: restart governance-service
