---
- name: Create credstore directory for governance-service
  ansible.builtin.file:
    path: /etc/credstore/governance-service
    state: directory
    owner: root
    group: governance_service
    mode: "0750"

- name: Check governance-service generated credentials
  ansible.builtin.stat:
    path: "/etc/credstore/governance-service/{{ item }}"
  loop:
    - pg-password
    - audit-hmac-key
  register: governance_service_generated_credential_files
  no_log: true

- name: Generate governance-service missing credentials
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: "/etc/credstore/governance-service/{{ item.item }}"
    owner: root
    group: governance_service
    mode: "0640"
  loop: "{{ governance_service_generated_credential_files.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: not item.stat.exists
  no_log: true

- name: Converge governance-service generated credential permissions
  ansible.builtin.file:
    path: "/etc/credstore/governance-service/{{ item }}"
    owner: root
    group: governance_service
    mode: "0640"
  loop:
    - pg-password
    - audit-hmac-key

- name: Read governance-service generated PostgreSQL password
  ansible.builtin.slurp:
    src: /etc/credstore/governance-service/pg-password
  register: governance_service_pg_password_raw
  no_log: true

- name: Set governance-service generated PostgreSQL password fact
  ansible.builtin.set_fact:
    governance_service_pg_password: "{{ governance_service_pg_password_raw.content | b64decode | trim }}"
  no_log: true
