---
- name: Apply governance-service PostgreSQL migrations
  ansible.builtin.include_role:
    name: service_pg_migrations
  vars:
    service_pg_migrations_service: governance-service
    service_pg_migrations_db: governance_service
    service_pg_migrations_db_user: governance_service
    service_pg_migrations_db_owner: governance_service
    service_pg_migrations_db_password: "{{ governance_service_pg_password }}"
    service_pg_migrations_source_dir: "{{ playbook_dir }}/../../../governance-service/migrations"
    service_pg_migrations_probe_table: governance_export_jobs
    service_pg_migrations_stop_units:
      - governance-service
    service_pg_migrations_force_reset: "{{ governance_service_force_schema_reset | default(false) | bool }}"

- name: Reconcile governance-service object ownership and privileges
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres
      -d governance_service
      -v ON_ERROR_STOP=1
    stdin: |
      DO $$
      BEGIN
        IF to_regclass('public.governance_audit_chain_state') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.governance_audit_chain_state OWNER TO governance_service';
        END IF;
        IF to_regclass('public.governance_export_jobs') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.governance_export_jobs OWNER TO governance_service';
        END IF;
        IF to_regclass('public.governance_export_files') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.governance_export_files OWNER TO governance_service';
        END IF;
      END
      $$;
      GRANT USAGE, CREATE ON SCHEMA public TO governance_service;
      GRANT ALL PRIVILEGES ON TABLE
        public.governance_audit_chain_state,
        public.governance_export_jobs,
        public.governance_export_files
      TO governance_service;
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  changed_when: false
  no_log: true
