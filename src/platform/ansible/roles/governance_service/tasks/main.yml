---
- name: Verify governance-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/governance-service"
  register: governance_service_binary
  failed_when: not governance_service_binary.stat.exists

- name: Create governance_service system group
  ansible.builtin.group:
    name: governance_service
    system: true

- name: Ensure spire workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create governance_service system user
  ansible.builtin.user:
    name: governance_service
    group: governance_service
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    home: "{{ governance_service_state_dir }}"
    create_home: false

- name: Resolve governance-service uid for SPIRE registration
  ansible.builtin.command:
    cmd: id -u governance_service
  register: governance_service_uid
  changed_when: false

- name: Read governance-service SPIRE registration
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server entry show
      -socketPath {{ spire_server_socket_path }}
      -entryID forge-metal-governance-service
      -output json
  register: governance_service_spire_entry
  failed_when: false
  changed_when: false

- name: Register governance-service SPIFFE workload
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server entry create
      -socketPath {{ spire_server_socket_path }}
      -entryID forge-metal-governance-service
      -parentID {{ spire_agent_id }}
      -spiffeID {{ spire_governance_service_id }}
      -selector unix:uid:{{ governance_service_uid.stdout | trim }}
      -x509SVIDTTL 3600
  when: governance_service_spire_entry.rc != 0 or 'forge-metal-governance-service' not in governance_service_spire_entry.stdout
  changed_when: true
  notify: restart governance-service

- name: Update governance-service SPIRE workload selector drift
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server entry update
      -socketPath {{ spire_server_socket_path }}
      -entryID forge-metal-governance-service
      -parentID {{ spire_agent_id }}
      -spiffeID {{ spire_governance_service_id }}
      -selector unix:uid:{{ governance_service_uid.stdout | trim }}
      -x509SVIDTTL 3600
  when:
    - governance_service_spire_entry.rc == 0
    - "'uid:' ~ (governance_service_uid.stdout | trim) not in governance_service_spire_entry.stdout"
  changed_when: true
  notify: restart governance-service

- name: Create governance-service state directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: governance_service
    group: governance_service
    mode: "0750"
  loop:
    - "{{ governance_service_state_dir }}"
    - "{{ governance_service_export_dir }}"

- name: Deploy governance-service nftables ruleset
  ansible.builtin.template:
    src: governance-service.nft.j2
    dest: /etc/nftables.d/governance-service.nft
    mode: "0644"
  notify: reload nftables

- name: Apply governance-service nftables before proceeding
  ansible.builtin.meta: flush_handlers

- name: Include governance-service generated credential tasks
  ansible.builtin.include_tasks: credentials.yml

- name: Include governance-service PostgreSQL database tasks
  ansible.builtin.include_tasks: database.yml

- name: Include governance-service PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

- name: Wait for Zitadel before resolving governance-service auth audience
  ansible.builtin.wait_for:
    host: "{{ services.zitadel.host }}"
    port: "{{ services.zitadel.port }}"
    timeout: 60

- name: Read Zitadel admin PAT for governance-service auth setup
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: governance_service_zitadel_admin_pat_raw
  no_log: true

- name: Set governance-service Zitadel admin PAT fact
  ansible.builtin.set_fact:
    governance_service_zitadel_admin_pat: "{{ governance_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
  no_log: true

- name: Find identity-service auth project for governance-service bearer validation
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ governance_service_zitadel_admin_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ governance_service_identity_project_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
    return_content: true
  register: governance_service_identity_project_search
  no_log: true

- name: Assert identity-service auth project exists for governance-service
  ansible.builtin.assert:
    that: (governance_service_identity_project_search.json.result | default([])) | length > 0
    fail_msg: >-
      Identity-service Zitadel project '{{ governance_service_identity_project_name }}'
      not found. Run the identity_service role before governance_service.

- name: Set governance-service auth audience fact
  ansible.builtin.set_fact:
    governance_service_auth_audience: "{{ governance_service_identity_project_search.json.result[0].id }}"

- name: Deploy governance-service systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Governance Service
      After=forge-metal-firewall.target network.target postgresql.service clickhouse-server.service zitadel.service spire-agent.service openbao.service
      Requires=forge-metal-firewall.target
      Wants=postgresql.service clickhouse-server.service zitadel.service spire-agent.service openbao.service

      [Service]
      Type=simple
      User=governance_service
      Group=governance_service
      SupplementaryGroups={{ spire_workload_group }}
      LoadCredential=audit-hmac-key:/etc/credstore/governance-service/audit-hmac-key
      LoadCredential=openbao-ca-cert:/etc/openbao/tls/cert.pem
      Environment=GOVERNANCE_LISTEN_ADDR={{ services.governance_service.host }}:{{ services.governance_service.port }}
      Environment=GOVERNANCE_INTERNAL_LISTEN_ADDR={{ services.governance_service.host }}:{{ services.governance_service.internal_port }}
      Environment=GOVERNANCE_INTERNAL_CLIENT_SPIFFE_IDS={{ spire_identity_service_id }},{{ spire_sandbox_rental_id }},{{ spire_secrets_service_id }}
      Environment=GOVERNANCE_SPIFFE_ID={{ spire_governance_service_id }}
      Environment=GOVERNANCE_OPENBAO_ADDR=https://{{ services.openbao.host }}:{{ services.openbao.port }}
      Environment=GOVERNANCE_OPENBAO_PLATFORM_MOUNT={{ openbao_platform_kv_mount }}
      Environment=GOVERNANCE_OPENBAO_SPIFFE_JWT_MOUNT={{ openbao_spiffe_jwt_mount }}
      Environment=GOVERNANCE_OPENBAO_WORKLOAD_AUDIENCE={{ openbao_workload_audience }}
      Environment=GOVERNANCE_OPENBAO_ROLE=platform-governance-service
      Environment=GOVERNANCE_PG_DSN=postgres://governance_service@/governance_service?host=/var/run/postgresql&sslmode=disable
      Environment=GOVERNANCE_IDENTITY_PG_DSN=postgres://identity_service@/identity_service?host=/var/run/postgresql&sslmode=disable
      Environment=GOVERNANCE_BILLING_PG_DSN=postgres://billing@/billing?host=/var/run/postgresql&sslmode=disable
      Environment=GOVERNANCE_SANDBOX_PG_DSN=postgres://sandbox_rental@/sandbox_rental?host=/var/run/postgresql&sslmode=disable
      Environment=GOVERNANCE_CH_ADDRESS={{ services.clickhouse.host }}:{{ services.clickhouse.native_port }}
      Environment=GOVERNANCE_AUTH_ISSUER_URL={{ governance_service_auth_issuer_url }}
      Environment=GOVERNANCE_AUTH_JWKS_URL={{ governance_service_auth_jwks_url }}
      Environment=GOVERNANCE_AUTH_AUDIENCE={{ governance_service_auth_audience }}
      Environment=GOVERNANCE_EXPORT_DIR={{ governance_service_export_dir }}
      Environment=SPIFFE_ENDPOINT_SOCKET=unix://{{ spire_agent_socket_path }}
      Environment=OTEL_SERVICE_NAME=governance-service
      Environment=OTEL_EXPORTER_OTLP_ENDPOINT=http://{{ services.otelcol.host }}:{{ services.otelcol.grpc_port }}
      ExecStart={{ fm_bin }}/governance-service
      Restart=on-failure
      RestartSec=5
      CapabilityBoundingSet=
      ProtectHome=true
      ProtectSystem=strict
      ReadWritePaths={{ governance_service_state_dir }}
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0077

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/governance-service.service
    mode: "0644"
  notify: restart governance-service

- name: Enable and start governance-service
  ansible.builtin.systemd:
    name: governance-service
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for governance-service to be ready
  ansible.builtin.wait_for:
    host: "{{ services.governance_service.host }}"
    port: "{{ services.governance_service.port }}"
    timeout: 30
