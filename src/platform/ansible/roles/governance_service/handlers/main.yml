---
- name: Check if governance-service unit exists
  listen: restart governance-service
  ansible.builtin.stat:
    path: /etc/systemd/system/governance-service.service
  register: governance_service_unit_file

- name: Restart governance-service
  listen: restart governance-service
  ansible.builtin.systemd:
    daemon_reload: true
    name: governance-service
    state: restarted
  when: governance_service_unit_file.stat.exists
