---
- name: Create verself-web runtime group
  ansible.builtin.group:
    name: "{{ verself_web_runtime_group }}"
    system: true

- name: Create verself-web runtime user
  ansible.builtin.user:
    name: "{{ verself_web_runtime_user }}"
    group: "{{ verself_web_runtime_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ verself_web_state_dir }}"
    create_home: false

- name: Create verself-web state directory
  ansible.builtin.file:
    path: "{{ verself_web_state_dir }}"
    state: directory
    owner: "{{ verself_web_runtime_user }}"
    group: "{{ verself_web_runtime_group }}"
    mode: "0700"

- name: Create verself-web credstore directory
  ansible.builtin.file:
    path: /etc/credstore/verself-web
    state: directory
    owner: root
    group: "{{ verself_web_runtime_group }}"
    mode: "0750"

- name: Verify corepack exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/corepack"
  register: verself_web_corepack
  failed_when: not verself_web_corepack.stat.exists

- name: Check for existing verself-web auth session secret
  ansible.builtin.stat:
    path: /etc/credstore/verself-web/auth-session-secret
  register: verself_web_auth_session_secret_file

- name: Generate verself-web auth session secret
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/verself-web/auth-session-secret
    owner: root
    group: "{{ verself_web_runtime_group }}"
    mode: "0640"
  when: not verself_web_auth_session_secret_file.stat.exists
  no_log: true

- name: Converge verself-web auth session secret permissions
  ansible.builtin.file:
    path: /etc/credstore/verself-web/auth-session-secret
    owner: root
    group: "{{ verself_web_runtime_group }}"
    mode: "0640"

- name: Read verself-web auth session secret
  ansible.builtin.slurp:
    src: /etc/credstore/verself-web/auth-session-secret
  register: verself_web_auth_session_secret_raw
  no_log: true

- name: Set verself-web auth session secret fact
  ansible.builtin.set_fact:
    verself_web_auth_session_secret: "{{ verself_web_auth_session_secret_raw.content | b64decode | trim }}"
  no_log: true

- name: Create verself-web install directory
  ansible.builtin.file:
    path: "{{ verself_web_install_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ verself_web_runtime_group }}"
    mode: "0755"

- name: Check whether verself-web systemd unit exists
  ansible.builtin.stat:
    path: /etc/systemd/system/verself-web.service
  register: verself_web_systemd_unit_file

- name: Regenerate verself-web API clients before source sync
  delegate_to: localhost
  become: false
  ansible.builtin.command:
    argv:
      - "{{ deploy_profile_bazelisk }}"
      - run
      - //src/viteplus-monorepo/apps/verself-web:openapi_clients
    chdir: "{{ deploy_profile_repo_root }}"
  changed_when: true

# Stop the live process before mutating .output so it never serves a partially deleted build.
- name: Stop live verself-web before replacing build output
  ansible.builtin.systemd:
    name: verself-web
    state: stopped
    daemon_reload: true
  when: verself_web_systemd_unit_file.stat.exists

- name: Remove generated verself-web artifacts before sync
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ verself_web_install_dir }}/.output"
    - "{{ verself_web_install_dir }}/.tanstack"
    - "{{ verself_web_install_dir }}/apps/verself-web/.output"
    - "{{ verself_web_install_dir }}/apps/verself-web/.tanstack"

# Opt-in clean rebuild: wipe node_modules and the install fingerprint so the
# next pnpm install runs from scratch instead of reusing the cached store.
# Trigger with `ansible-playbook ... --tags verself_web --extra-vars verself_web_full_rebuild=true`.
# Use when a prior install left a corrupted store or an upstream package
# linked the wrong version.
- name: Wipe verself-web install for clean rebuild (FULL=1)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ verself_web_install_dir }}/node_modules"
    - "{{ verself_web_dependencies_fingerprint_path }}"
  when: verself_web_full_rebuild | default(false) | bool

- name: Synchronize verself-web source
  delegate_to: localhost
  become: false
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../../viteplus-monorepo/"
    dest: "{{ verself_web_install_dir }}/"
    delete: true
    recursive: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.output"
      - "--exclude=dist"
      - "--exclude=.tanstack"
      - "--exclude=apps/company"
      - "--exclude=apps/company/**"
      - "--exclude=playwright-report"
      - "--exclude=test-results"
      - "--exclude=HANDOFF_PROMPT.md"
      # delete-excluded would wipe remote node_modules and defeat incremental deploys.
      - "--no-owner"
      - "--no-group"

- name: Compute verself-web workspace dependency fingerprint
  delegate_to: localhost
  become: false
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        cd {{ playbook_dir }}/../../../viteplus-monorepo
        {
          printf '%s\0' package.json pnpm-lock.yaml pnpm-workspace.yaml apps/verself-web/package.json
          find packages -mindepth 2 -maxdepth 2 -name package.json -print0
        } | sort -z | xargs -0 sha256sum | sha256sum
  register: verself_web_workspace_dependency_fingerprint
  changed_when: false

- name: Check cached verself-web install fingerprint
  ansible.builtin.stat:
    path: "{{ verself_web_dependencies_fingerprint_path }}"
  register: verself_web_install_fingerprint_file

- name: Read cached verself-web install fingerprint
  ansible.builtin.slurp:
    src: "{{ verself_web_dependencies_fingerprint_path }}"
  register: verself_web_install_fingerprint_raw
  when: verself_web_install_fingerprint_file.stat.exists

- name: Check cached verself-web node_modules
  ansible.builtin.stat:
    path: "{{ verself_web_install_dir }}/node_modules"
  register: verself_web_node_modules_dir

- name: Install verself-web workspace dependencies when manifests change
  become: false
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/corepack"
      - pnpm
      - install
    chdir: "{{ verself_web_install_dir }}"
  environment:
    PATH: "{{ verself_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true
  when: >-
    (not verself_web_node_modules_dir.stat.exists)
    or (not verself_web_install_fingerprint_file.stat.exists)
    or (
      (verself_web_install_fingerprint_raw.content | default('') | b64decode | trim)
      != (verself_web_workspace_dependency_fingerprint.stdout.split()[0] | trim)
    )

- name: Record cached verself-web install fingerprint
  ansible.builtin.copy:
    content: "{{ verself_web_workspace_dependency_fingerprint.stdout.split()[0] | trim }}\n"
    dest: "{{ verself_web_dependencies_fingerprint_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ verself_web_runtime_group }}"
    mode: "0644"

- name: Build verself-web package dependencies
  become: false
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/corepack"
      - pnpm
      - --filter
      - "@verself/verself-web^..."
      - run
      - build
    chdir: "{{ verself_web_install_dir }}"
  environment:
    PATH: "{{ verself_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true

- name: Build verself-web app
  become: false
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/corepack"
      - pnpm
      - --filter
      - "@verself/verself-web"
      - run
      - build
    chdir: "{{ verself_web_install_dir }}"
  environment:
    PATH: "{{ verself_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true

- name: Set up Zitadel OIDC application
  ansible.builtin.include_role:
    name: zitadel_oauth_app
  vars:
    zitadel_oauth_app_name: verself-web
    zitadel_oauth_app_project_name: "{{ verself_web_auth_project_name }}"
    zitadel_oauth_app_redirect_uris:
      - "https://{{ verself_domain }}/callback"
    zitadel_oauth_app_post_logout_redirect_uris:
      - "https://{{ verself_domain }}"
    zitadel_oauth_app_credstore_dir: /etc/credstore/verself-web
    zitadel_oauth_app_credstore_group: "{{ verself_web_runtime_group }}"
    zitadel_oauth_app_auth_method_type: OIDC_AUTH_METHOD_TYPE_POST
    zitadel_oauth_app_grant_types:
      - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
      - OIDC_GRANT_TYPE_REFRESH_TOKEN
      - OIDC_GRANT_TYPE_TOKEN_EXCHANGE
    zitadel_oauth_app_role_assertions: true
    zitadel_oauth_app_cutover_marker_filename: oidc-web-cutover

- name: Export verself-web OIDC app facts for templates
  ansible.builtin.set_fact:
    verself_web_app_id: "{{ zitadel_oauth_app_out_id }}"
    verself_web_project_id: "{{ zitadel_oauth_app_out_project_id }}"
    verself_web_client_id: "{{ zitadel_oauth_app_out_client_id }}"
    verself_web_client_secret: "{{ zitadel_oauth_app_out_client_secret }}"
  no_log: true

- name: Ensure sandbox-rental project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ zitadel_oauth_app_pat }}"
    zitadel_project_roles_project_id: "{{ verself_web_project_id }}"
    zitadel_project_roles_definitions:
      - key: owner
        display_name: Owner
        group: sandbox
      - key: admin
        display_name: Admin
        group: sandbox
      - key: member
        display_name: Member
        group: sandbox

- name: Resolve identity-service project ID for verself-web
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ zitadel_oauth_app_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ verself_web_identity_project_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
  register: verself_web_identity_project_search
  no_log: true

- name: Assert identity-service project exists for verself-web
  ansible.builtin.assert:
    that: (verself_web_identity_project_search.json.result | default([])) | length > 0
    fail_msg: >-
      Identity-service Zitadel project '{{ verself_web_identity_project_name }}'
      not found. Run the identity_service role before verself-web.

- name: Set verself-web identity-service project ID fact
  ansible.builtin.set_fact:
    verself_web_identity_project_id: "{{ verself_web_identity_project_search.json.result[0].id }}"

- name: Ensure verself-web env directory exists
  ansible.builtin.file:
    path: /etc/verself-web
    state: directory
    owner: root
    group: "{{ verself_web_runtime_group }}"
    mode: "0750"

- name: Deploy verself-web environment file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/verself-web/env
    mode: "0640"
    owner: root
    group: "{{ verself_web_runtime_group }}"

- name: Deploy verself-web systemd unit
  ansible.builtin.template:
    src: verself-web.service.j2
    dest: /etc/systemd/system/verself-web.service
    mode: "0644"

- name: Deploy verself-web nftables rules
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/nftables.d/verself-web.nft"
    dest: /etc/nftables.d/verself-web.nft
    mode: "0644"
  notify: reload nftables

- name: Enable and start verself-web
  ansible.builtin.systemd:
    name: verself-web
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for verself-web to be ready
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.verself_web.host }}"
    port: "{{ topology_endpoints.verself_web.endpoints.http.port }}"
    timeout: 30
