---
# Build the verself-web deploy_bundle on the controller (Bazel produces a
# self-contained tarball: `app-entry.mjs` at root + `.output/{server,public}/`).
# Land it under /opt/verself-web/releases/<deploy_id>/, atomically swap the
# `current` symlink, then restart the systemd unit. No on-host pnpm install,
# no on-host vite build, no rsync of the monorepo.

- name: Create verself-web runtime group
  ansible.builtin.group:
    name: "{{ verself_web_runtime_group }}"
    system: true

- name: Create verself-web runtime user
  ansible.builtin.user:
    name: "{{ verself_web_runtime_user }}"
    group: "{{ verself_web_runtime_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ verself_web_state_dir }}"
    create_home: false

- name: Create verself-web state directory
  ansible.builtin.file:
    path: "{{ verself_web_state_dir }}"
    state: directory
    owner: "{{ verself_web_runtime_user }}"
    group: "{{ verself_web_runtime_group }}"
    mode: "0700"

- name: Create verself-web credstore directory
  ansible.builtin.file:
    path: /etc/credstore/verself-web
    state: directory
    owner: root
    group: "{{ verself_web_runtime_group }}"
    mode: "0750"

- name: Check for existing verself-web auth session secret
  ansible.builtin.stat:
    path: /etc/credstore/verself-web/auth-session-secret
  register: verself_web_auth_session_secret_file

- name: Generate verself-web auth session secret
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/verself-web/auth-session-secret
    owner: root
    group: "{{ verself_web_runtime_group }}"
    mode: "0640"
  when: not verself_web_auth_session_secret_file.stat.exists
  no_log: true

- name: Converge verself-web auth session secret permissions
  ansible.builtin.file:
    path: /etc/credstore/verself-web/auth-session-secret
    owner: root
    group: "{{ verself_web_runtime_group }}"
    mode: "0640"

- name: Read verself-web auth session secret
  ansible.builtin.slurp:
    src: /etc/credstore/verself-web/auth-session-secret
  register: verself_web_auth_session_secret_raw
  no_log: true

- name: Set verself-web auth session secret fact
  ansible.builtin.set_fact:
    verself_web_auth_session_secret: "{{ verself_web_auth_session_secret_raw.content | b64decode | trim }}"
  no_log: true

- name: Ensure verself-web release directory tree exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: "{{ verself_web_runtime_group }}"
    mode: "0755"
  loop:
    - "{{ verself_web_install_dir }}"
    - "{{ verself_web_release_dir }}"

- name: Regenerate verself-web API clients before bundle build
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - "{{ deploy_profile_bazelisk }}"
      - run
      - //src/viteplus-monorepo/apps/verself-web:openapi_clients
    chdir: "{{ deploy_profile_repo_root }}"
  changed_when: true

- name: Build verself-web deploy_bundle on controller
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    # --config=remote-writer matches deploy_profile's Go-build config so
    # cache hits accumulate across consecutive deploys. The .tar output is
    # the self-contained payload (app-entry.mjs + .output/), no node_modules.
    argv:
      - "{{ deploy_profile_bazelisk }}"
      - build
      - --config=remote-writer
      - "{{ verself_web_bazel_target }}"
    chdir: "{{ deploy_profile_repo_root }}"
  changed_when: true

- name: Resolve verself-web deploy_bundle output path
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - "{{ deploy_profile_bazelisk }}"
      - cquery
      - --output=files
      - "{{ verself_web_bazel_target }}"
    chdir: "{{ deploy_profile_repo_root }}"
  register: verself_web_bundle_cquery
  changed_when: false

- name: Validate verself-web deploy_bundle output path
  ansible.builtin.assert:
    that:
      - verself_web_bundle_cquery.stdout_lines | length == 1
      - verself_web_bundle_cquery.stdout | trim is match('^bazel-out/.*deploy_bundle\\.tar$')
    quiet: true
    fail_msg: >-
      Bazel cquery did not resolve exactly one .tar output for
      {{ verself_web_bazel_target }}.

- name: Set verself-web deploy_bundle local path fact
  ansible.builtin.set_fact:
    verself_web_bundle_local_path: "{{ deploy_profile_repo_root }}/{{ verself_web_bundle_cquery.stdout | trim }}"

- name: Create verself-web release directory for this deploy
  ansible.builtin.file:
    path: "{{ verself_web_release_path }}"
    state: directory
    owner: "{{ verself_web_runtime_user }}"
    group: "{{ verself_web_runtime_group }}"
    mode: "0755"

- name: Extract verself-web deploy_bundle into the release directory
  ansible.builtin.unarchive:
    src: "{{ verself_web_bundle_local_path }}"
    dest: "{{ verself_web_release_path }}"
    owner: "{{ verself_web_runtime_user }}"
    group: "{{ verself_web_runtime_group }}"
    remote_src: false

- name: Assert app-entry.mjs landed in the release directory
  ansible.builtin.stat:
    path: "{{ verself_web_release_path }}/app-entry.mjs"
  register: verself_web_release_entry
  failed_when: not verself_web_release_entry.stat.exists

- name: Atomically swap verself-web current symlink
  # `ln -sfn` rewrites the symlink in-place; the file replace is atomic on
  # POSIX filesystems, so the systemd unit always reads either the previous
  # or the new release — never a half-extracted tree.
  ansible.builtin.file:
    src: "{{ verself_web_release_path }}"
    dest: "{{ verself_web_current_link }}"
    state: link
    force: true
    owner: "{{ verself_web_runtime_user }}"
    group: "{{ verself_web_runtime_group }}"
    follow: false

- name: Set up Zitadel OIDC application
  ansible.builtin.include_role:
    name: zitadel_oauth_app
  vars:
    zitadel_oauth_app_name: verself-web
    zitadel_oauth_app_project_name: "{{ verself_web_auth_project_name }}"
    zitadel_oauth_app_redirect_uris:
      - "https://{{ verself_domain }}/callback"
    zitadel_oauth_app_post_logout_redirect_uris:
      - "https://{{ verself_domain }}"
    zitadel_oauth_app_credstore_dir: /etc/credstore/verself-web
    zitadel_oauth_app_credstore_group: "{{ verself_web_runtime_group }}"
    zitadel_oauth_app_auth_method_type: OIDC_AUTH_METHOD_TYPE_POST
    zitadel_oauth_app_grant_types:
      - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
      - OIDC_GRANT_TYPE_REFRESH_TOKEN
      - OIDC_GRANT_TYPE_TOKEN_EXCHANGE
    zitadel_oauth_app_role_assertions: true
    zitadel_oauth_app_cutover_marker_filename: oidc-web-cutover

- name: Export verself-web OIDC app facts for templates
  ansible.builtin.set_fact:
    verself_web_app_id: "{{ zitadel_oauth_app_out_id }}"
    verself_web_project_id: "{{ zitadel_oauth_app_out_project_id }}"
    verself_web_client_id: "{{ zitadel_oauth_app_out_client_id }}"
    verself_web_client_secret: "{{ zitadel_oauth_app_out_client_secret }}"
  no_log: true

- name: Ensure sandbox-rental project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ zitadel_oauth_app_pat }}"
    zitadel_project_roles_project_id: "{{ verself_web_project_id }}"
    zitadel_project_roles_definitions:
      - key: owner
        display_name: Owner
        group: sandbox
      - key: admin
        display_name: Admin
        group: sandbox
      - key: member
        display_name: Member
        group: sandbox

- name: Resolve identity-service project ID for verself-web
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ zitadel_oauth_app_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ verself_web_identity_project_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
  register: verself_web_identity_project_search
  no_log: true

- name: Assert identity-service project exists for verself-web
  ansible.builtin.assert:
    that: (verself_web_identity_project_search.json.result | default([])) | length > 0
    fail_msg: >-
      Identity-service Zitadel project '{{ verself_web_identity_project_name }}'
      not found. Run the identity_service role before verself-web.

- name: Set verself-web identity-service project ID fact
  ansible.builtin.set_fact:
    verself_web_identity_project_id: "{{ verself_web_identity_project_search.json.result[0].id }}"

- name: Ensure verself-web env directory exists
  ansible.builtin.file:
    path: /etc/verself-web
    state: directory
    owner: root
    group: "{{ verself_web_runtime_group }}"
    mode: "0750"

- name: Deploy verself-web environment file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/verself-web/env
    mode: "0640"
    owner: root
    group: "{{ verself_web_runtime_group }}"

- name: Deploy verself-web systemd unit
  ansible.builtin.template:
    src: verself-web.service.j2
    dest: /etc/systemd/system/verself-web.service
    mode: "0644"

- name: Deploy verself-web nftables rules
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/nftables.d/verself-web.nft"
    dest: /etc/nftables.d/verself-web.nft
    mode: "0644"
  notify: reload nftables

- name: Enable and (re)start verself-web
  # Always restart so the unit picks up the symlink swap. systemd is fast
  # enough that the cost is dominated by Node startup; idempotency comes
  # from `state: started` for first deploys + the always-restart pattern.
  ansible.builtin.systemd:
    name: verself-web
    enabled: true
    state: restarted
    daemon_reload: true

- name: Wait for verself-web to be ready
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.verself_web.host }}"
    port: "{{ topology_endpoints.verself_web.endpoints.http.port }}"
    timeout: 30

- name: Find verself-web release directories on host
  ansible.builtin.find:
    paths: "{{ verself_web_release_dir }}"
    file_type: directory
    excludes: "{{ verself_web_deploy_id }}"
  register: verself_web_releases_on_host

- name: Prune older verself-web release directories
  # Keep one rollback target — the most recent prior release. Older releases
  # are dropped so the node doesn't accumulate stale tarballs over time.
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ (verself_web_releases_on_host.files | sort(attribute='mtime') | list)[:-1] | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
