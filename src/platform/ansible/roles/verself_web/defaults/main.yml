---
console_subdomain: console
console_domain: "{{ console_subdomain }}.{{ verself_domain }}"
console_install_dir: /opt/console
console_app_dir: "{{ console_install_dir }}/apps/console"
console_dependencies_fingerprint_path: "{{ console_install_dir }}/.pnpm-install-fingerprint"
console_runtime_user: console
console_runtime_group: console
console_state_dir: /var/lib/console
console_auth_issuer_url: "https://auth.{{ verself_domain }}"
console_auth_project_name: sandbox-rental
console_identity_project_name: "{{ identity_service_auth_project_name | default('identity-service') }}"
