---
- name: Restart secrets-service
  listen: restart secrets-service
  ansible.builtin.systemd:
    name: secrets-service
    state: restarted
    daemon_reload: true

- name: Check if sandbox-rental-service unit exists for secret injection grant restart
  listen: restart sandbox-rental-service
  ansible.builtin.stat:
    path: /etc/systemd/system/sandbox-rental-service.service
  register: secrets_service_sandbox_rental_unit_file

- name: Restart sandbox-rental-service after secret injection grant rotation
  listen: restart sandbox-rental-service
  ansible.builtin.systemd:
    name: sandbox-rental-service
    state: restarted
    daemon_reload: true
  when: secrets_service_sandbox_rental_unit_file.stat.exists
