---
- name: Verify secrets-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/secrets-service"
  register: secrets_service_binary
  failed_when: not secrets_service_binary.stat.exists

- name: Create secrets_service system group
  ansible.builtin.group:
    name: secrets_service
    system: true

- name: Create secrets_service system user
  ansible.builtin.user:
    name: secrets_service
    group: secrets_service
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Deploy secrets-service nftables ruleset
  ansible.builtin.template:
    src: secrets-service.nft.j2
    dest: /etc/nftables.d/secrets-service.nft
    mode: "0644"
  notify: reload nftables

- name: Apply secrets-service nftables before proceeding
  ansible.builtin.meta: flush_handlers

- name: Include secrets-service generated credential tasks
  ansible.builtin.include_tasks: credentials.yml

- name: Include secrets-service PostgreSQL database tasks
  ansible.builtin.include_tasks: database.yml

- name: Include secrets-service PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

- name: Wait for Zitadel before configuring secrets-service auth
  ansible.builtin.wait_for:
    host: "{{ services.zitadel.host }}"
    port: "{{ services.zitadel.port }}"
    timeout: 60

- name: Read Zitadel admin PAT for secrets-service auth setup
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: secrets_service_zitadel_admin_pat_raw
  no_log: true

- name: List Zitadel projects for secrets-service auth
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ secrets_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body: {}
    return_content: true
  register: secrets_service_zitadel_projects
  no_log: true

- name: Find secrets-service auth project
  ansible.builtin.set_fact:
    secrets_service_auth_project: >-
      {{
        (
          secrets_service_zitadel_projects.json.result
          | selectattr('name', 'equalto', secrets_service_auth_project_name)
          | list
          | first
        ) | default({})
      }}

- name: Create secrets-service auth project if missing
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ secrets_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      name: "{{ secrets_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    return_content: true
  register: secrets_service_auth_project_created
  when: secrets_service_auth_project == {}
  no_log: true

- name: Set secrets-service auth audience
  ansible.builtin.set_fact:
    secrets_service_auth_audience: >-
      {{
        secrets_service_auth_project.id
        | default(secrets_service_auth_project_created.json.id, true)
      }}

- name: Assert secrets-service auth audience is set
  ansible.builtin.assert:
    that: secrets_service_auth_audience | default('', true) | length > 0
    fail_msg: secrets_service_auth_audience could not be resolved from Zitadel.

- name: Ensure secrets-service project has role assertion enabled
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ secrets_service_auth_audience }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ secrets_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      name: "{{ secrets_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    status_code: 200
  when: secrets_service_auth_project != {}
  no_log: true

- name: Ensure secrets-service project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ secrets_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
    zitadel_project_roles_project_id: "{{ secrets_service_auth_audience }}"
    zitadel_project_roles_definitions:
      - key: owner
        display_name: Owner
        group: secrets
      - key: admin
        display_name: Admin
        group: secrets
      - key: member
        display_name: Member
        group: secrets
  when: secrets_service_auth_audience | default('', true) | length > 0

- name: Deploy secrets-service systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Secrets Service
      After=forge-metal-firewall.target network.target postgresql.service zitadel.service governance-service.service
      Requires=forge-metal-firewall.target
      Wants=postgresql.service zitadel.service governance-service.service

      [Service]
      Type=simple
      User=secrets_service
      Group=secrets_service
      LoadCredential=pg-dsn:/etc/credstore/secrets-service/pg-dsn
      LoadCredential=envelope-key:/etc/credstore/secrets-service/envelope-key
      LoadCredential=internal-injection-token:/etc/credstore/secrets-service/internal-injection-token
      LoadCredential=governance-internal-audit-token:/etc/credstore/governance-service/internal-audit-token
      Environment=SECRETS_LISTEN_ADDR={{ services.secrets_service.host }}:{{ services.secrets_service.port }}
      Environment=SECRETS_GOVERNANCE_AUDIT_URL=http://{{ services.governance_service.host }}:{{ services.governance_service.port }}/internal/v1/audit/events
      Environment=SECRETS_AUTH_ISSUER_URL={{ secrets_service_auth_issuer_url }}
      Environment=SECRETS_AUTH_JWKS_URL={{ secrets_service_auth_jwks_url }}
      Environment=SECRETS_AUTH_AUDIENCE={{ secrets_service_auth_audience }}
      Environment=SECRETS_AUTH_PROJECT_ID={{ secrets_service_auth_audience }}
      Environment=SECRETS_PG_MAX_CONNS={{ secrets_service_pg_max_conns }}
      Environment=OTEL_SERVICE_NAME=secrets-service
      Environment=OTEL_EXPORTER_OTLP_ENDPOINT=http://{{ services.otelcol.host }}:{{ services.otelcol.grpc_port }}
      ExecStart={{ fm_bin }}/secrets-service
      Restart=on-failure
      RestartSec=5
      CapabilityBoundingSet=
      ProtectHome=true
      ProtectSystem=strict
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0077

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/secrets-service.service
    mode: "0644"
  notify: restart secrets-service

- name: Enable and start secrets-service
  ansible.builtin.systemd:
    name: secrets-service
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for secrets-service to be ready
  ansible.builtin.wait_for:
    host: "{{ services.secrets_service.host }}"
    port: "{{ services.secrets_service.port }}"
    timeout: 30
