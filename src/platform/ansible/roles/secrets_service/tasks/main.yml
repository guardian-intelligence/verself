---
- name: Verify secrets-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/secrets-service"
  register: secrets_service_binary
  failed_when: not secrets_service_binary.stat.exists

- name: Create secrets_service system group
  ansible.builtin.group:
    name: secrets_service
    system: true

- name: Ensure spire workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create secrets_service system user
  ansible.builtin.user:
    name: secrets_service
    group: secrets_service
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Deploy secrets-service nftables ruleset
  ansible.builtin.template:
    src: secrets-service.nft.j2
    dest: /etc/nftables.d/secrets-service.nft
    mode: "0644"
  notify: reload nftables

- name: Apply secrets-service nftables before proceeding
  ansible.builtin.meta: flush_handlers

- name: Include secrets-service generated credential tasks
  ansible.builtin.include_tasks: credentials.yml

- name: Wait for Zitadel before configuring secrets-service auth
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.zitadel.host }}"
    port: "{{ topology_endpoints.zitadel.endpoints.http.port }}"
    timeout: 60

- name: Read Zitadel admin PAT for secrets-service auth setup
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: secrets_service_zitadel_admin_pat_raw
  no_log: true

- name: List Zitadel projects for secrets-service auth
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ secrets_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body: {}
    return_content: true
  register: secrets_service_zitadel_projects
  no_log: true

- name: Find secrets-service auth project
  ansible.builtin.set_fact:
    secrets_service_auth_project: >-
      {{
        (
          secrets_service_zitadel_projects.json.result
          | selectattr('name', 'equalto', secrets_service_auth_project_name)
          | list
          | first
        ) | default({})
      }}

- name: Create secrets-service auth project if missing
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ secrets_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ secrets_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    return_content: true
  register: secrets_service_auth_project_created
  when: secrets_service_auth_project == {}
  no_log: true

- name: Set secrets-service auth audience
  ansible.builtin.set_fact:
    secrets_service_auth_audience: >-
      {{
        secrets_service_auth_project.id
        | default(secrets_service_auth_project_created.json.id, true)
      }}

- name: Assert secrets-service auth audience is set
  ansible.builtin.assert:
    that: secrets_service_auth_audience | default('', true) | length > 0
    fail_msg: secrets_service_auth_audience could not be resolved from Zitadel.

- name: Ensure secrets-service project has role assertion enabled
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/{{ secrets_service_auth_audience }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ secrets_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ secrets_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    status_code: 200
  when: secrets_service_auth_project != {}
  no_log: true

- name: Ensure secrets-service project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ secrets_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
    zitadel_project_roles_project_id: "{{ secrets_service_auth_audience }}"
    zitadel_project_roles_definitions:
      - key: owner
        display_name: Owner
        group: secrets
      - key: admin
        display_name: Admin
        group: secrets
      - key: member
        display_name: Member
        group: secrets
  when: secrets_service_auth_audience | default('', true) | length > 0

- name: List Zitadel organizations for secrets-service internal runtime routing
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/v2/organizations/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ secrets_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body: {}
    return_content: true
  register: secrets_service_zitadel_orgs
  no_log: true

- name: Resolve platform organization ID for secrets-service runtime routing
  ansible.builtin.set_fact:
    secrets_service_platform_org_id: >-
      {{
        (
          secrets_service_zitadel_orgs.json.result
          | default([])
          | selectattr('name', 'equalto', secrets_service_platform_org_name)
          | map(attribute='id')
          | list
          | first
        ) | default('')
      }}

- name: Assert platform organization exists for secrets-service runtime routing
  ansible.builtin.assert:
    that: secrets_service_platform_org_id | default('', true) | length > 0
    fail_msg: >-
      Platform organization {{ secrets_service_platform_org_name }} was not
      found in Zitadel. Re-run the full deploy or restore Zitadel bootstrap.

- name: Deploy secrets-service systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Secrets Service
      After=verself-firewall.target network.target openbao.service zitadel.service governance-service.service spire-agent.service
      Requires=verself-firewall.target
      Wants=openbao.service zitadel.service governance-service.service spire-agent.service

      [Service]
      Type=simple
      User=secrets_service
      Group=secrets_service
      SupplementaryGroups={{ spire_workload_group }}
      BindReadOnlyPaths=/etc/verself/auth-discovery-hosts:/etc/hosts
      LoadCredential=openbao-ca-cert:/etc/openbao/tls/cert.pem
      Environment=SECRETS_LISTEN_ADDR={{ topology_endpoints.secrets_service.endpoints.public_http.address }}
      Environment=SECRETS_INTERNAL_LISTEN_ADDR={{ topology_endpoints.secrets_service.endpoints.internal_https.address }}
      Environment=SECRETS_PLATFORM_ORG_ID={{ secrets_service_platform_org_id }}
      Environment=SECRETS_GOVERNANCE_AUDIT_URL={{ secrets_service_governance_audit_url }}
      Environment=SECRETS_AUTH_ISSUER_URL={{ secrets_service_auth_issuer_url }}
      Environment=SECRETS_AUTH_AUDIENCE={{ secrets_service_auth_audience }}
      Environment=SECRETS_OPENBAO_ADDR={{ secrets_service_openbao_addr }}
      Environment=SECRETS_OPENBAO_KV_PREFIX={{ secrets_service_openbao_kv_prefix }}
      Environment=SECRETS_OPENBAO_TRANSIT_PREFIX={{ secrets_service_openbao_transit_prefix }}
      Environment=SECRETS_OPENBAO_JWT_PREFIX={{ secrets_service_openbao_jwt_prefix }}
      Environment=SECRETS_OPENBAO_SPIFFE_JWT_PREFIX=spiffe-jwt
      Environment=SECRETS_OPENBAO_WORKLOAD_AUDIENCE=openbao
      Environment=SECRETS_BILLING_URL={{ secrets_service_billing_url }}
      Environment=SPIFFE_ENDPOINT_SOCKET=unix://{{ spire_agent_socket_path }}
      Environment=OTEL_SERVICE_NAME=secrets-service
      Environment=OTEL_EXPORTER_OTLP_ENDPOINT=http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}
      ExecStart={{ verself_bin }}/secrets-service
      Restart=on-failure
      RestartSec=5
      CapabilityBoundingSet=
      ProtectHome=true
      ProtectSystem=strict
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0077

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/secrets-service.service
    mode: "0644"
  vars:
    secrets_service_governance_audit_url: >-
      https://{{ topology_endpoints.governance_service.endpoints.internal_https.address }}
  notify: restart secrets-service

- name: Enable and start secrets-service
  ansible.builtin.systemd:
    name: secrets-service
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for secrets-service to be ready
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.secrets_service.host }}"
    port: "{{ topology_endpoints.secrets_service.endpoints.public_http.port }}"
    timeout: 30
