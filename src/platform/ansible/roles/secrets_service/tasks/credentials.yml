---
- name: Create credstore directory for secrets-service
  ansible.builtin.file:
    path: /etc/credstore/secrets-service
    state: directory
    owner: root
    group: secrets_service
    mode: "0750"

- name: Ensure sandbox_rental group exists for injection grant issuer key
  ansible.builtin.group:
    name: sandbox_rental
    system: true

- name: Create credstore directory for sandbox-rental injection grant issuer key
  ansible.builtin.file:
    path: /etc/credstore/sandbox-rental
    state: directory
    owner: root
    group: sandbox_rental
    mode: "0750"

- name: Generate sandbox-rental secret injection grant signing key
  ansible.builtin.command:
    cmd: >-
      openssl genpkey -algorithm Ed25519
      -out /etc/credstore/sandbox-rental/secret-injection-grant-ed25519.pem
    creates: /etc/credstore/sandbox-rental/secret-injection-grant-ed25519.pem
  no_log: true
  notify:
    - restart sandbox-rental-service
    - restart secrets-service

- name: Harden sandbox-rental secret injection grant signing key
  ansible.builtin.file:
    path: /etc/credstore/sandbox-rental/secret-injection-grant-ed25519.pem
    owner: root
    group: sandbox_rental
    mode: "0640"
  no_log: true

- name: Derive sandbox-rental secret injection grant public key
  ansible.builtin.command:
    cmd: >-
      openssl pkey
      -in /etc/credstore/sandbox-rental/secret-injection-grant-ed25519.pem
      -pubout
  register: secrets_service_sandbox_injection_grant_public_key
  changed_when: false
  no_log: true

- name: Deploy sandbox-rental secret injection grant verifier key
  ansible.builtin.copy:
    content: "{{ secrets_service_sandbox_injection_grant_public_key.stdout }}\n"
    dest: /etc/credstore/secrets-service/sandbox-injection-grant-ed25519.pub.pem
    owner: root
    group: secrets_service
    mode: "0640"
  notify: restart secrets-service

- name: Remove legacy secrets-service PostgreSQL, envelope, and shared injection credentials
  ansible.builtin.file:
    path: "/etc/credstore/secrets-service/{{ item }}"
    state: absent
  loop:
    - pg-password
    - pg-dsn
    - envelope-key
    - internal-injection-token
  notify: restart secrets-service

- name: Ensure governance_service group exists for shared audit token
  ansible.builtin.group:
    name: governance_service
    system: true

- name: Create shared governance-service credstore directory for audit token
  ansible.builtin.file:
    path: /etc/credstore/governance-service
    state: directory
    owner: root
    group: governance_service
    mode: "0750"

- name: Check shared governance internal audit token
  ansible.builtin.stat:
    path: /etc/credstore/governance-service/internal-audit-token
  register: secrets_service_governance_audit_token_file
  no_log: true

- name: Generate shared governance internal audit token
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/governance-service/internal-audit-token
    owner: root
    group: governance_service
    mode: "0640"
  when: not secrets_service_governance_audit_token_file.stat.exists
  no_log: true
  notify: restart secrets-service
