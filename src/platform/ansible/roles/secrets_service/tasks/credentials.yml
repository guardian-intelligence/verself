---
- name: Create credstore directory for secrets-service
  ansible.builtin.file:
    path: /etc/credstore/secrets-service
    state: directory
    owner: root
    group: secrets_service
    mode: "0750"

- name: Check secrets-service generated credentials
  ansible.builtin.stat:
    path: "/etc/credstore/secrets-service/{{ item }}"
  loop:
    - pg-password
    - envelope-key
    - internal-injection-token
  register: secrets_service_generated_credential_files
  no_log: true

- name: Generate secrets-service missing password credentials
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: "/etc/credstore/secrets-service/{{ item.item }}"
    owner: root
    group: secrets_service
    mode: "0640"
  loop: "{{ secrets_service_generated_credential_files.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - not item.stat.exists
    - item.item != 'envelope-key'
  no_log: true

- name: Generate secrets-service missing envelope key
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/secrets-service/envelope-key
    owner: root
    group: secrets_service
    mode: "0640"
  when: >-
    not (
      (
        secrets_service_generated_credential_files.results
        | selectattr('item', 'equalto', 'envelope-key')
        | map(attribute='stat.exists')
        | first
      ) | bool
    )
  no_log: true

- name: Converge secrets-service generated credential permissions
  ansible.builtin.file:
    path: "/etc/credstore/secrets-service/{{ item }}"
    owner: root
    group: secrets_service
    mode: "0640"
  loop:
    - pg-password
    - envelope-key
    - internal-injection-token

- name: Read secrets-service envelope key
  ansible.builtin.slurp:
    src: /etc/credstore/secrets-service/envelope-key
  register: secrets_service_envelope_key_raw
  no_log: true

- name: Assert secrets-service envelope key is raw 32 bytes
  ansible.builtin.assert:
    that:
      - (secrets_service_envelope_key_raw.content | b64decode | trim | length) == 32
    fail_msg: >-
      /etc/credstore/secrets-service/envelope-key must be a 32-byte raw key.
      Remove the generated file and rerun the role if this is a first-deploy artifact.
  no_log: true

- name: Read secrets-service generated PostgreSQL password
  ansible.builtin.slurp:
    src: /etc/credstore/secrets-service/pg-password
  register: secrets_service_pg_password_raw
  no_log: true

- name: Set secrets-service generated PostgreSQL password fact
  ansible.builtin.set_fact:
    secrets_service_pg_password: "{{ secrets_service_pg_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Deploy secrets-service PG DSN credential
  vars:
    secrets_service_pg_dsn: >-
      postgres://secrets_service:{{ secrets_service_pg_password | urlencode
      }}@{{ services.postgresql.host }}:{{ services.postgresql.port }}/secrets_service?sslmode=disable
  ansible.builtin.copy:
    content: "{{ secrets_service_pg_dsn }}"
    dest: /etc/credstore/secrets-service/pg-dsn
    owner: root
    group: secrets_service
    mode: "0640"
  no_log: true
  notify: restart secrets-service

- name: Ensure governance_service group exists for shared audit token
  ansible.builtin.group:
    name: governance_service
    system: true

- name: Create shared governance-service credstore directory for audit token
  ansible.builtin.file:
    path: /etc/credstore/governance-service
    state: directory
    owner: root
    group: governance_service
    mode: "0750"

- name: Check shared governance internal audit token
  ansible.builtin.stat:
    path: /etc/credstore/governance-service/internal-audit-token
  register: secrets_service_governance_audit_token_file
  no_log: true

- name: Generate shared governance internal audit token
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/governance-service/internal-audit-token
    owner: root
    group: governance_service
    mode: "0640"
  when: not secrets_service_governance_audit_token_file.stat.exists
  no_log: true
  notify: restart secrets-service
