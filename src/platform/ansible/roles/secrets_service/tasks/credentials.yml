---
- name: Create credstore directory for secrets-service
  ansible.builtin.file:
    path: /etc/credstore/secrets-service
    state: directory
    owner: root
    group: secrets_service
    mode: "0750"

- name: Remove legacy secrets-service PostgreSQL, envelope, and shared auth credentials
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/credstore/secrets-service/pg-password
    - /etc/credstore/secrets-service/pg-dsn
    - /etc/credstore/secrets-service/envelope-key
    - /etc/credstore/secrets-service/internal-injection-token
    - /etc/credstore/secrets-service/service-account-client-secret
    - /etc/credstore/secrets-service/service-account-user-id
    - /etc/credstore/secrets-service/billing-client-secret
    - /etc/credstore/secrets-service/sandbox-injection-grant-ed25519.pub.pem
    - /etc/credstore/sandbox-rental/secret-injection-grant-ed25519.pem
  notify: restart secrets-service
