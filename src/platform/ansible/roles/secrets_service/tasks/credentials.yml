---
- name: Create credstore directory for secrets-service
  ansible.builtin.file:
    path: /etc/credstore/secrets-service
    state: directory
    owner: root
    group: secrets_service
    mode: "0750"

- name: Read OpenBao root token for secrets-service credential materialization
  ansible.builtin.slurp:
    src: /etc/credstore/openbao/root-token
  register: secrets_service_openbao_root_token_raw
  no_log: true

- name: Set secrets-service OpenBao credential materialization facts
  ansible.builtin.set_fact:
    secrets_service_openbao_root_token: "{{ secrets_service_openbao_root_token_raw.content | b64decode | trim }}"
    secrets_service_internal_credential_mount: platform-internal
    secrets_service_internal_injection_token_path: service-credentials/secrets-service/internal-injection-token
  no_log: true

- name: List OpenBao mounts for secrets-service credential materialization
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/mounts"
    method: GET
    headers:
      X-Vault-Token: "{{ secrets_service_openbao_root_token }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: secrets_service_openbao_mounts
  changed_when: false
  no_log: true

- name: Enable OpenBao internal service credential KV mount
  ansible.builtin.uri:
    url: "https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/sys/mounts/{{ secrets_service_internal_credential_mount }}"
    method: POST
    headers:
      X-Vault-Token: "{{ secrets_service_openbao_root_token }}"
    body_format: json
    body:
      type: kv
      description: Forge Metal internal service credential materialization
      options:
        version: "2"
    validate_certs: false
    status_code: 204
  register: secrets_service_openbao_internal_mount_enable
  changed_when: true
  when: (secrets_service_internal_credential_mount ~ '/') not in secrets_service_openbao_mounts.json.data.keys()
  no_log: true

- name: Read OpenBao internal injection token document
  ansible.builtin.uri:
    url: >-
      https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/{{
      secrets_service_internal_credential_mount }}/data/{{
      secrets_service_internal_injection_token_path }}
    method: GET
    headers:
      X-Vault-Token: "{{ secrets_service_openbao_root_token }}"
    validate_certs: false
    status_code: [200, 404]
    return_content: true
  register: secrets_service_openbao_injection_token_read
  changed_when: false
  no_log: true

- name: Check secrets-service materialized internal injection token
  ansible.builtin.stat:
    path: /etc/credstore/secrets-service/internal-injection-token
  register: secrets_service_internal_injection_token_file
  no_log: true

- name: Read materialized secrets-service internal injection token
  ansible.builtin.slurp:
    src: /etc/credstore/secrets-service/internal-injection-token
  register: secrets_service_internal_injection_token_materialized
  when: secrets_service_internal_injection_token_file.stat.exists
  no_log: true

- name: Resolve secrets-service internal injection token value
  ansible.builtin.set_fact:
    secrets_service_internal_injection_token_value: >-
      {{
        (
          secrets_service_openbao_injection_token_read.json.data.data.value
          if secrets_service_openbao_injection_token_read.status == 200
          else (
            secrets_service_internal_injection_token_materialized.content | b64decode | trim
            if secrets_service_internal_injection_token_file.stat.exists
            else lookup('password', '/dev/null length=64 chars=ascii_letters,digits')
          )
        )
      }}
  no_log: true

- name: Write secrets-service internal injection token to OpenBao
  ansible.builtin.uri:
    url: >-
      https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/{{
      secrets_service_internal_credential_mount }}/data/{{
      secrets_service_internal_injection_token_path }}
    method: POST
    headers:
      X-Vault-Token: "{{ secrets_service_openbao_root_token }}"
    body_format: json
    body:
      data:
        value: "{{ secrets_service_internal_injection_token_value }}"
        owner: secrets-service
        purpose: sandbox-rental secret injection resolver
    validate_certs: false
    status_code: [200, 204]
  register: secrets_service_openbao_injection_token_write
  changed_when: >-
    secrets_service_openbao_injection_token_read.status == 404
    or (secrets_service_openbao_injection_token_read.json.data.data.value | default('')) != secrets_service_internal_injection_token_value
  when: >-
    secrets_service_openbao_injection_token_read.status == 404
    or (secrets_service_openbao_injection_token_read.json.data.data.value | default('')) != secrets_service_internal_injection_token_value
  no_log: true

- name: Materialize secrets-service internal injection token from OpenBao
  ansible.builtin.copy:
    content: "{{ secrets_service_internal_injection_token_value }}"
    dest: /etc/credstore/secrets-service/internal-injection-token
    owner: root
    group: secrets_service
    mode: "0640"
  no_log: true
  notify: restart secrets-service

- name: Remove legacy secrets-service PostgreSQL and envelope credentials
  ansible.builtin.file:
    path: "/etc/credstore/secrets-service/{{ item }}"
    state: absent
  loop:
    - pg-password
    - pg-dsn
    - envelope-key
  notify: restart secrets-service

- name: Ensure governance_service group exists for shared audit token
  ansible.builtin.group:
    name: governance_service
    system: true

- name: Create shared governance-service credstore directory for audit token
  ansible.builtin.file:
    path: /etc/credstore/governance-service
    state: directory
    owner: root
    group: governance_service
    mode: "0750"

- name: Check shared governance internal audit token
  ansible.builtin.stat:
    path: /etc/credstore/governance-service/internal-audit-token
  register: secrets_service_governance_audit_token_file
  no_log: true

- name: Generate shared governance internal audit token
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/governance-service/internal-audit-token
    owner: root
    group: governance_service
    mode: "0640"
  when: not secrets_service_governance_audit_token_file.stat.exists
  no_log: true
  notify: restart secrets-service
