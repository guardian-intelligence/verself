---
- name: Create credstore directory for source-code-hosting-service
  ansible.builtin.file:
    path: /etc/credstore/source-code-hosting-service
    state: directory
    owner: root
    group: source_code_hosting_service
    mode: "0750"

- name: Check source-code-hosting-service generated credentials
  ansible.builtin.stat:
    path: "/etc/credstore/source-code-hosting-service/{{ item }}"
  loop:
    - pg-password
    - webhook-secret
  register: source_code_hosting_service_generated_credential_files
  no_log: true

- name: Generate source-code-hosting-service missing credentials
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: "/etc/credstore/source-code-hosting-service/{{ item.item }}"
    owner: root
    group: source_code_hosting_service
    mode: "0640"
  loop: "{{ source_code_hosting_service_generated_credential_files.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: not item.stat.exists
  no_log: true

- name: Converge source-code-hosting-service generated credential permissions
  ansible.builtin.file:
    path: "/etc/credstore/source-code-hosting-service/{{ item }}"
    owner: root
    group: source_code_hosting_service
    mode: "0640"
  loop:
    - pg-password
    - webhook-secret

- name: Read source-code-hosting-service generated PostgreSQL password
  ansible.builtin.slurp:
    src: /etc/credstore/source-code-hosting-service/pg-password
  register: source_code_hosting_service_pg_password_raw
  no_log: true

- name: Set source-code-hosting-service generated PostgreSQL password fact
  ansible.builtin.set_fact:
    source_code_hosting_service_pg_password: "{{ source_code_hosting_service_pg_password_raw.content | b64decode | trim }}"
  no_log: true
