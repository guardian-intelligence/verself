---
# Build the Firecracker guest rootfs: compile local binaries, upload to the
# remote host, and run the Ubuntu rootfs builder.

# ── Controller-side builds ──────────────────────────────────────────────────

- name: Assert zig is available
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command: zig version
  changed_when: false

- name: Build vm-guest-telemetry (Zig)
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv: [zig, build, -Doptimize=ReleaseSafe]
    chdir: "{{ guest_rootfs_vm_guest_telemetry_dir }}"
  changed_when: true

- name: Create local guest binary artifact directory
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.file:
    path: "{{ guest_rootfs_build_artifact_dir }}"
    state: directory
    mode: "0755"

- name: Build vm-bridge (static, linux/amd64)
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv: [go, build, "-ldflags=-s -w", -o, "{{ guest_rootfs_build_artifact_dir }}/vm-bridge", ./cmd/vm-bridge]
    chdir: "{{ guest_rootfs_monorepo_root }}/src/vm-orchestrator"
  environment:
    CGO_ENABLED: "0"
    GOOS: linux
    GOARCH: amd64
  changed_when: true

# ── Upload to remote ───────────────────────────────────────────────────────

- name: Upload build script
  ansible.builtin.copy:
    src: "{{ guest_rootfs_build_script }}"
    dest: "{{ guest_rootfs_remote_tmp }}/build-guest-rootfs.sh"
    mode: "0755"

- name: Validate generated guest version pins are loaded
  ansible.builtin.assert:
    that:
      - topology_guest_versions is defined
      - topology_guest_versions.firecracker.version is defined
      - topology_guest_versions.guest_kernel.sha256 is defined
    fail_msg: >-
      topology_guest_versions is missing. Run make topology-generate before guest-rootfs.

- name: Upload version pins
  ansible.builtin.copy:
    content: "{{ topology_guest_versions | to_nice_json }}\n"
    dest: "{{ guest_rootfs_remote_tmp }}/versions.json"
    mode: "0644"

- name: Upload vm-bridge
  ansible.builtin.copy:
    src: "{{ guest_rootfs_build_artifact_dir }}/vm-bridge"
    dest: "{{ guest_rootfs_remote_tmp }}/vm-bridge"
    mode: "0755"

- name: Upload vm-guest-telemetry
  ansible.builtin.copy:
    src: "{{ guest_rootfs_vm_guest_telemetry_dir }}/zig-out/bin/vm-guest-telemetry"
    dest: "{{ guest_rootfs_remote_tmp }}/vm-guest-telemetry"
    mode: "0755"

# ── Build rootfs on remote ─────────────────────────────────────────────────

- name: Run guest rootfs builder
  ansible.builtin.command:
    cmd: bash /tmp/build-guest-rootfs.sh
    chdir: /tmp
  environment:
    PATH: "{{ guest_rootfs_remote_path }}"
  changed_when: true

# ── Validate output ────────────────────────────────────────────────────────

- name: Verify rootfs output artifacts exist
  ansible.builtin.stat:
    path: "/tmp/guest/output/{{ item }}"
  loop:
    - rootfs.ext4
    - viteplus.ext4
    - vmlinux
    - sbom.txt
    - guest-artifacts.json
  register: guest_rootfs_output_check
  failed_when: not guest_rootfs_output_check.stat.exists
