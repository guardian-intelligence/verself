---
# Build the Firecracker guest rootfs: materialize the Bazel-owned guest input
# bundle, upload it to the remote host, and run the Ubuntu rootfs builder.

# ── Controller-side builds ──────────────────────────────────────────────────

- name: Assert bazelisk is available
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command: bazelisk version
  changed_when: false

- name: Build guest artifact input bundle
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv: [bazelisk, build, "{{ guest_rootfs_bazel_bundle_label }}"]
    chdir: "{{ guest_rootfs_monorepo_root }}"
  changed_when: true

- name: Verify guest artifact input bundle exists
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.stat:
    path: "{{ guest_rootfs_bazel_bundle_path }}"
    get_checksum: false
  register: guest_rootfs_bazel_bundle
  failed_when: not guest_rootfs_bazel_bundle.stat.exists

# ── Upload to remote ───────────────────────────────────────────────────────

- name: Upload guest artifact input bundle
  ansible.builtin.copy:
    src: "{{ guest_rootfs_bazel_bundle_path }}"
    dest: "{{ guest_rootfs_remote_bundle }}"
    mode: "0644"

- name: Extract guest artifact input bundle
  ansible.builtin.unarchive:
    src: "{{ guest_rootfs_remote_bundle }}"
    dest: "{{ guest_rootfs_remote_tmp }}"
    remote_src: true
    owner: root
    group: root

- name: Verify extracted guest artifact inputs exist
  ansible.builtin.stat:
    path: "{{ guest_rootfs_remote_tmp }}/{{ item }}"
    get_checksum: false
  loop:
    - build-guest-rootfs.sh
    - versions.json
    - vm-bridge
    - vm-guest-telemetry
  register: guest_rootfs_extracted_input_check
  failed_when: not guest_rootfs_extracted_input_check.stat.exists

# ── Build rootfs on remote ─────────────────────────────────────────────────

- name: Run guest rootfs builder
  ansible.builtin.command:
    cmd: bash /tmp/build-guest-rootfs.sh
    chdir: /tmp
  environment:
    PATH: "{{ guest_rootfs_remote_path }}"
  changed_when: true

# ── Validate output ────────────────────────────────────────────────────────

- name: Verify rootfs output artifacts exist
  ansible.builtin.stat:
    path: "/tmp/guest/output/{{ item }}"
  loop:
    - rootfs.ext4
    - viteplus.ext4
    - vmlinux
    - sbom.txt
    - guest-artifacts.json
  register: guest_rootfs_output_check
  failed_when: not guest_rootfs_output_check.stat.exists
