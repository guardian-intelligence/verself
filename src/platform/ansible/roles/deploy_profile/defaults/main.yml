  - name: notifications-service
    package: ./src/notifications-service/cmd/notifications-service
    output_path: artifacts/deploy/bin/notifications-service
    cgo_enabled: "0"
    version_ldflags: true
    restart_handlers:
      - deploy-profile restart notifications-service
  - name: projects-service
