---
# deploy_profile: populate /opt/verself/profile/bin/ with generated topology artifacts.

# Repo root on the Ansible controller (contains go.work, src/, etc.)
deploy_profile_repo_root: "{{ playbook_dir }}/../../../.."

# Staging directory for downloaded archives on the remote host.
deploy_profile_staging_dir: /opt/verself/staging

# PostgreSQL major version (determines apt package and binary paths).
deploy_profile_postgresql_version: "16"
