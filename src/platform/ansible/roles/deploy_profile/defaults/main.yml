---
# deploy_profile: populate /opt/verself/profile/bin/ with all server binaries.

# Repo root on the Ansible controller.
deploy_profile_repo_root: "{{ playbook_dir }}/../../../.."

# Staging directory for downloaded archives on the remote host
deploy_profile_staging_dir: /opt/verself/staging

# PostgreSQL major version (determines apt package and binary paths)
deploy_profile_postgresql_version: "16"

deploy_profile_go_binaries:
  - name: billing-service
    module_dir: src/billing-service
    package: ./cmd/billing-service
    output_path: artifacts/deploy/bin/billing-service
    cgo_enabled: "1"
    version_ldflags: true
    restart_handlers:
      - deploy-profile restart billing-service
  - name: tb-inspect
    module_dir: src/billing-service
    package: ./cmd/tb-inspect
    output_path: artifacts/deploy/bin/tb-inspect
    cgo_enabled: "1"
    version_ldflags: false
    restart_handlers: []
  - name: sandbox-rental-service
    module_dir: src/sandbox-rental-service
    package: ./cmd/sandbox-rental-service
    output_path: artifacts/deploy/bin/sandbox-rental-service
    cgo_enabled: "0"
    version_ldflags: true
    restart_handlers:
      - deploy-profile restart sandbox-rental-service
  - name: sandbox-rental-recurring-worker
    module_dir: src/sandbox-rental-service
    package: ./cmd/sandbox-rental-recurring-worker
