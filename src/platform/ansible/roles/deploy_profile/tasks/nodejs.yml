---
# Install Node.js from the official binary tarball and symlink into fm_bin.

- name: Download Node.js tarball
  ansible.builtin.get_url:
    url: "{{ deploy_profile_server_tools_pins.nodejs.url }}"
    dest: "{{ deploy_profile_staging_dir }}/node-v{{ deploy_profile_server_tools_pins.nodejs.version }}.tar.xz"
    checksum: "sha256:{{ deploy_profile_server_tools_pins.nodejs.sha256 }}"
    mode: "0644"

- name: Create Node.js install directory
  ansible.builtin.file:
    path: "{{ deploy_profile_server_tools_pins.nodejs.install_dir }}"
    state: directory
    mode: "0755"

- name: Extract Node.js tarball
  ansible.builtin.unarchive:
    src: "{{ deploy_profile_staging_dir }}/node-v{{ deploy_profile_server_tools_pins.nodejs.version }}.tar.xz"
    dest: "{{ deploy_profile_server_tools_pins.nodejs.install_dir }}"
    remote_src: true
    extra_opts:
      - --strip-components=1
    creates: "{{ deploy_profile_server_tools_pins.nodejs.install_dir }}/bin/node"

- name: Symlink Node.js binaries into fm_bin
  ansible.builtin.file:
    src: "{{ deploy_profile_server_tools_pins.nodejs.install_dir }}/bin/{{ item }}"
    dest: "{{ fm_bin }}/{{ item }}"
    state: link
    force: true
  loop: "{{ deploy_profile_server_tools_pins.nodejs.bin_symlinks }}"
