---
# Execute the generated server tool install plan. Topology/codegen owns tool
# layout; Ansible only applies the already-materialized download/extract/copy
# actions with checksum enforcement.

- name: Require generated server tool install plan
  ansible.builtin.assert:
    that:
      - topology_server_tool_install_plan is defined
      - topology_server_tool_install_plan.downloads is defined
      - topology_server_tool_install_plan.proof_spans is defined
    quiet: true
    fail_msg: >-
      topology_server_tool_install_plan is missing. Run make topology-generate before deploying.

- name: Set deploy profile server tool install plan
  ansible.builtin.set_fact:
    deploy_profile_server_tool_install_plan: "{{ topology_server_tool_install_plan }}"

- name: Create generated server tool install directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop: "{{ deploy_profile_server_tool_install_plan.directories }}"
  loop_control:
    label: "{{ item.path }}"

- name: Download generated server tool artifacts
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.dest }}"
    checksum: "{{ item.checksum }}"
    mode: "{{ item.mode }}"
  register: deploy_profile_server_tool_downloads
  loop: "{{ deploy_profile_server_tool_install_plan.downloads }}"
  loop_control:
    label: "{{ item.key }}"

- name: Extract generated server tool archives
  ansible.builtin.unarchive:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    remote_src: true
    creates: "{{ item.creates }}"
    extra_opts: "{{ item.extra_opts | default(omit) }}"
  register: deploy_profile_server_tool_extracts
  loop: "{{ deploy_profile_server_tool_install_plan.extracts }}"
  loop_control:
    label: "{{ item.key }}"

- name: Extract generated server tool Debian packages
  ansible.builtin.command:
    argv:
      - dpkg-deb
      - -x
      - "{{ item.src }}"
      - "{{ item.dest }}"
    creates: "{{ item.creates }}"
  register: deploy_profile_server_tool_deb_extracts
  loop: "{{ deploy_profile_server_tool_install_plan.deb_extracts }}"
  loop_control:
    label: "{{ item.key }}"

- name: Copy generated server tool outputs
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    remote_src: true
    mode: "{{ item.mode }}"
  register: deploy_profile_server_tool_copies
  loop: "{{ deploy_profile_server_tool_install_plan.copies }}"
  loop_control:
    label: "{{ item.key }} -> {{ item.dest }}"

- name: Link generated server tool outputs
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: "{{ item.force }}"
  register: deploy_profile_server_tool_links
  loop: "{{ deploy_profile_server_tool_install_plan.links }}"
  loop_control:
    label: "{{ item.key }} -> {{ item.dest }}"

- name: Emit generated server install-plan proof spans
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    cmd: go run ./cmd/proof-span
    chdir: "{{ deploy_profile_repo_root }}/src/otel"
  environment:
    PROOF_SPAN_SERVICE: proof-runner
    PROOF_SPANS_JSON: "{{ deploy_profile_server_tool_install_plan.proof_spans | to_json }}"
  changed_when: false
