---
# Download, verify, and install pinned static binaries from server-tools.json.
# Each binary is cached in the staging directory; get_url skips re-download
# when the checksum matches.

# ── ClickHouse (multi-call binary + symlinks) ────────────────────────────────

- name: Download ClickHouse archive
  ansible.builtin.get_url:
    url: "{{ deploy_profile_server_tools_pins.clickhouse.url }}"
    dest: "{{ deploy_profile_staging_dir }}/clickhouse-{{ deploy_profile_server_tools_pins.clickhouse.version }}.tgz"
    checksum: "sha256:{{ deploy_profile_server_tools_pins.clickhouse.sha256 }}"
    mode: "0644"

- name: Extract ClickHouse binary
  ansible.builtin.unarchive:
    src: "{{ deploy_profile_staging_dir }}/clickhouse-{{ deploy_profile_server_tools_pins.clickhouse.version }}.tgz"
    dest: "{{ deploy_profile_staging_dir }}"
    remote_src: true
    creates: "{{ deploy_profile_staging_dir }}/{{ deploy_profile_server_tools_pins.clickhouse.extract_binary }}"

- name: Install ClickHouse binary
  ansible.builtin.copy:
    src: "{{ deploy_profile_staging_dir }}/{{ deploy_profile_server_tools_pins.clickhouse.extract_binary }}"
    dest: "{{ fm_bin }}/clickhouse"
    remote_src: true
    mode: "0755"

- name: Create ClickHouse multi-call symlinks
  ansible.builtin.file:
    src: "{{ fm_bin }}/clickhouse"
    dest: "{{ fm_bin }}/{{ item }}"
    state: link
    force: true
  loop: "{{ deploy_profile_server_tools_pins.clickhouse.symlinks }}"

