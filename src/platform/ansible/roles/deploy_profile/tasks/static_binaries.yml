---
# Download, verify, and install selected pinned static binaries from generated topology.

- name: Install selected static server tools
  ansible.builtin.include_tasks: install_server_tool.yml
  loop: "{{ deploy_profile_selected_static_server_tool_names }}"
  loop_control:
    loop_var: deploy_profile_tool_name
    label: "{{ deploy_profile_tool_name }}"
