---
# Build Go binaries on the Ansible controller and copy to the server.
# Follows the delegate_to: localhost pattern from guest_rootfs and smelter-dev.

- name: Build forge-metal binary
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - go
      - build
      - -ldflags=-s -w -X main.version={{ forge_metal_version | default('dev') }}
      - -o
      - "{{ deploy_profile_repo_root }}/src/platform/forge-metal"
      - ./src/platform/cmd/forge-metal
    chdir: "{{ deploy_profile_repo_root }}"
  environment:
    CGO_ENABLED: "0"
    GOOS: linux
    GOARCH: amd64
  changed_when: true

- name: Build billing-service binary
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - go
      - build
      - -ldflags=-s -w -X main.version={{ forge_metal_version | default('dev') }}
      - -o
      - "{{ deploy_profile_repo_root }}/src/billing-service/billing-service"
      - ./src/billing-service/cmd/billing-service
    chdir: "{{ deploy_profile_repo_root }}"
  environment:
    CGO_ENABLED: "0"
    GOOS: linux
    GOARCH: amd64
  changed_when: true

- name: Build tb-inspect binary
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - go
      - build
      - -ldflags=-s -w
      - -o
      - "{{ deploy_profile_repo_root }}/src/billing-service/tb-inspect"
      - ./src/billing-service/cmd/tb-inspect
    chdir: "{{ deploy_profile_repo_root }}"
  environment:
    CGO_ENABLED: "0"
    GOOS: linux
    GOARCH: amd64
  changed_when: true

- name: Copy Go binaries to server
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ fm_bin }}/{{ item.name }}"
    mode: "0755"
  loop:
    - { src: "{{ deploy_profile_repo_root }}/src/platform/forge-metal", name: forge-metal }
    - { src: "{{ deploy_profile_repo_root }}/src/billing-service/billing-service", name: billing-service }
    - { src: "{{ deploy_profile_repo_root }}/src/billing-service/tb-inspect", name: tb-inspect }
