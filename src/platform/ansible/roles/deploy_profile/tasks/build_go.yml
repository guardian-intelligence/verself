---
# Build Go service binaries on the Ansible controller and copy to the server.
# Follows the delegate_to: localhost pattern from guest_rootfs.

- name: Build billing-service binary
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - go
      - build
      - -ldflags=-s -w -X main.version={{ forge_metal_version | default('dev') }}
      - -o
      - "{{ deploy_profile_repo_root }}/src/billing-service/billing-service"
      - ./src/billing-service/cmd/billing-service
    chdir: "{{ deploy_profile_repo_root }}"
  environment:
    CGO_ENABLED: "1"
    GOOS: linux
    GOARCH: amd64
  changed_when: false

- name: Build tb-inspect binary
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - go
      - build
