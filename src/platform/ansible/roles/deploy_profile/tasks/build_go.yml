---
# Build topology-owned Go binaries on the controller and copy them to the
# profile directory on each node.

- name: Validate generated topology deploy vars are loaded
  ansible.builtin.assert:
    that:
      - topology_deploy is defined
      - topology_deploy.artifacts is defined
      - topology_processes is defined
    quiet: true
    fail_msg: >-
      topology_deploy or topology_processes is missing. Run make topology-generate before deploying.

- name: Collect topology Go deploy artifacts
  ansible.builtin.set_fact:
    deploy_profile_go_artifacts: "{{ topology_deploy.artifacts | selectattr('artifact.kind', 'equalto', 'go_binary') | list }}"

- name: Collect topology Go artifact labels and outputs
  ansible.builtin.set_fact:
    deploy_profile_go_artifact_labels: "{{ deploy_profile_go_artifacts | map(attribute='artifact.bazel_label') | list }}"
    deploy_profile_go_artifact_outputs: "{{ deploy_profile_go_artifacts | map(attribute='artifact.output') | list }}"

- name: Validate topology Go deploy artifacts
  ansible.builtin.assert:
    that:
      - deploy_profile_go_artifacts | length > 0
      - deploy_profile_go_artifact_labels | length == deploy_profile_go_artifacts | length
      - deploy_profile_go_artifact_labels | unique | list | length == deploy_profile_go_artifact_labels | length
      - deploy_profile_go_artifact_outputs | unique | list | length == deploy_profile_go_artifact_outputs | length
      - deploy_profile_go_artifact_labels | select('match', '^//') | list | length == deploy_profile_go_artifact_labels | length
      - deploy_profile_go_artifact_outputs | reject('equalto', '') | list | length == deploy_profile_go_artifact_outputs | length
    quiet: true
    fail_msg: >-
      topology_deploy.artifacts must contain unique Go artifacts with non-empty Bazel labels and output names.

- name: Build topology Go artifacts with Bazel
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    # --config=remote-writer pushes action results to the bazel-remote cache
    # over the wg-ops mesh. The host running this play is the trusted writer
    # for the shared cache; laptop dev workflows use --config=remote (read-
    # only) to avoid poisoning the cache with local builds.
    argv: "{{ [deploy_profile_bazelisk, 'build', '--config=remote-writer'] + deploy_profile_go_artifact_labels }}"
    chdir: "{{ deploy_profile_repo_root }}"
  changed_when: false

- name: Resolve topology Go artifact output paths
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - "{{ deploy_profile_bazelisk }}"
      - cquery
      - --output=files
      - "{{ item.artifact.bazel_label }}"
    chdir: "{{ deploy_profile_repo_root }}"
  changed_when: false
  register: deploy_profile_go_bazel_outputs
  loop: "{{ deploy_profile_go_artifacts }}"
  loop_control:
    label: "{{ item.artifact.output }}"

- name: Validate topology Go artifact output paths
  ansible.builtin.assert:
    that:
      - item.stdout_lines | length == 1
      - item.stdout | trim is match('^bazel-out/')
    quiet: true
    fail_msg: "Bazel cquery did not resolve exactly one output file for {{ item.item.artifact.bazel_label }}."
  loop: "{{ deploy_profile_go_bazel_outputs.results }}"
  loop_control:
    label: "{{ item.item.artifact.output }}"

- name: Copy topology Go binaries to server
  ansible.builtin.copy:
    src: "{{ deploy_profile_repo_root }}/{{ item.stdout | trim }}"
    dest: "{{ verself_bin }}/{{ item.item.artifact.output }}"
    mode: "0755"
  register: deploy_profile_go_binary_copy_results
  loop: "{{ deploy_profile_go_bazel_outputs.results }}"
  loop_control:
    label: "{{ item.item.artifact.output }}"

- name: Publish topology Go binary copy result facts
  ansible.builtin.set_fact:
    "{{ deploy_profile_binary_copy_fact_name }}": "{{ item }}"
  vars:
    deploy_profile_binary_copy_fact_name: >-
      deploy_profile_{{ item.item.item.artifact.output | replace('-', '_') }}_binary_copy
  loop: "{{ deploy_profile_go_binary_copy_results.results }}"
  loop_control:
    label: "{{ item.item.item.artifact.output }}"

- name: Collect changed topology Go artifact outputs
  ansible.builtin.set_fact:
    deploy_profile_changed_go_outputs: >-
      {{
        deploy_profile_go_binary_copy_results.results
        | selectattr('changed')
        | map(attribute='item.item.artifact.output')
        | list
      }}

- name: Initialize changed topology Go restart units
  ansible.builtin.set_fact:
    deploy_profile_changed_go_restart_units: []

- name: Collect restart units for changed topology Go binaries
  ansible.builtin.set_fact:
    deploy_profile_changed_go_restart_units: >-
      {{
        deploy_profile_changed_go_restart_units
        + (item.restart_units | default([]))
      }}
  loop: "{{ topology_processes }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - item.artifact.kind == 'go_binary'
    - item.artifact.output in deploy_profile_changed_go_outputs

- name: Deduplicate changed topology Go restart units
  ansible.builtin.set_fact:
    deploy_profile_changed_go_restart_units: "{{ deploy_profile_changed_go_restart_units | unique | list }}"

- name: Inspect changed topology Go systemd units before restart
  ansible.builtin.stat:
    path: "/etc/systemd/system/{{ item }}.service"
  register: deploy_profile_changed_go_unit_files
  loop: "{{ deploy_profile_changed_go_restart_units }}"
  loop_control:
    label: "{{ item }}.service"

- name: Restart existing systemd units for changed topology Go binaries
  ansible.builtin.systemd:
    daemon_reload: true
    name: "{{ item.item }}"
    state: restarted
  loop: "{{ deploy_profile_changed_go_unit_files.results }}"
  loop_control:
    label: "{{ item.item }}.service"
  when: item.stat.exists
