---
# Build Go binaries on the Ansible controller and copy to the server.
# Follows the delegate_to: localhost pattern from guest_rootfs and smelter-dev.

- name: Build forge-metal binary
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - go
      - build
      - -ldflags=-s -w -X main.version={{ forge_metal_version | default('dev') }}
      - -o
      - "{{ deploy_profile_repo_root }}/src/platform/forge-metal"
      - ./src/platform/cmd/forge-metal
    chdir: "{{ deploy_profile_repo_root }}"
  environment:
    CGO_ENABLED: "0"
    GOOS: linux
    GOARCH: amd64
  changed_when: true

- name: Build billing-service binary
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - go
      - build
      - -ldflags=-s -w -X main.version={{ forge_metal_version | default('dev') }}
      - -o
      - "{{ deploy_profile_repo_root }}/src/billing-service/billing-service"
      - ./src/billing-service/cmd/billing-service
    chdir: "{{ deploy_profile_repo_root }}"
  environment:
    CGO_ENABLED: "1"
    GOOS: linux
    GOARCH: amd64
  changed_when: true

- name: Build tb-inspect binary
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - go
      - build
      - -ldflags=-s -w
      - -o
      - "{{ deploy_profile_repo_root }}/src/billing-service/tb-inspect"
      - ./src/billing-service/cmd/tb-inspect
    chdir: "{{ deploy_profile_repo_root }}"
  environment:
    CGO_ENABLED: "1"
    GOOS: linux
    GOARCH: amd64
  changed_when: true

- name: Build sandbox-rental-service binary
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - go
      - build
      - -ldflags=-s -w -X main.version={{ forge_metal_version | default('dev') }}
      - -o
      - "{{ deploy_profile_repo_root }}/src/sandbox-rental-service/sandbox-rental-service"
      - ./src/sandbox-rental-service/cmd/sandbox-rental-service
    chdir: "{{ deploy_profile_repo_root }}"
  environment:
    CGO_ENABLED: "0"
    GOOS: linux
    GOARCH: amd64
  changed_when: true

- name: Copy Go binaries to server
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ fm_bin }}/{{ item.name }}"
    mode: "0755"
  register: deploy_profile_go_binary_copy_results
  loop:
    - { src: "{{ deploy_profile_repo_root }}/src/platform/forge-metal", name: forge-metal }
    - { src: "{{ deploy_profile_repo_root }}/src/billing-service/billing-service", name: billing-service }
    - { src: "{{ deploy_profile_repo_root }}/src/billing-service/tb-inspect", name: tb-inspect }
    - { src: "{{ deploy_profile_repo_root }}/src/sandbox-rental-service/sandbox-rental-service", name: sandbox-rental-service }

- name: Set billing-service binary copy fact
  ansible.builtin.set_fact:
    deploy_profile_billing_service_binary_copy: >-
      {{
        (
          deploy_profile_go_binary_copy_results.results
          | selectattr('item.name', 'equalto', 'billing-service')
          | list
          | first
        ) | default({})
      }}

- name: Trigger billing-service restart when binary changed
  ansible.builtin.command: /bin/true
  changed_when: deploy_profile_billing_service_binary_copy.changed | default(false)
  notify: restart billing-service

- name: Set sandbox-rental-service binary copy fact
  ansible.builtin.set_fact:
    deploy_profile_sandbox_rental_service_binary_copy: >-
      {{
        (
          deploy_profile_go_binary_copy_results.results
          | selectattr('item.name', 'equalto', 'sandbox-rental-service')
          | list
          | first
        ) | default({})
      }}

- name: Trigger sandbox-rental-service restart when binary changed
  ansible.builtin.command: /bin/true
  changed_when: deploy_profile_sandbox_rental_service_binary_copy.changed | default(false)
  notify: restart sandbox-rental-service
