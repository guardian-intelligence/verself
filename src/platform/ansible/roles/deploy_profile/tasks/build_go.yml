---
# Build Go service binaries on the Ansible controller and copy to the server.
# Follows the delegate_to: localhost pattern from guest_rootfs.

- name: Validate Go binary manifest item schema
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | length > 0
      - item.module_dir is defined
      - item.module_dir | length > 0
      - item.package is defined
      - item.package | length > 0
      - item.output_path is defined
      - item.output_path | length > 0
      - item.cgo_enabled is defined
      - item.cgo_enabled in ['0', '1']
      - item.version_ldflags is defined
      - item.version_ldflags | type_debug == 'bool'
      - item.restart_handlers is defined
      - item.restart_handlers | type_debug == 'list'
    fail_msg: "deploy_profile_go_binaries entries must define name, module_dir, package, output_path, cgo_enabled, version_ldflags, and restart_handlers"
  loop: "{{ deploy_profile_go_binaries }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"

- name: Collect Go binary manifest names
  ansible.builtin.set_fact:
    deploy_profile_go_binary_names: "{{ deploy_profile_go_binaries | map(attribute='name') | list }}"
    deploy_profile_go_binary_output_paths: "{{ deploy_profile_go_binaries | map(attribute='output_path') | list }}"

- name: Validate Go binary manifest coverage
  ansible.builtin.assert:
    that:
      - deploy_profile_go_binary_names | length == 18
      - deploy_profile_go_binary_names | unique | list | length == deploy_profile_go_binary_names | length
      - deploy_profile_go_binary_output_paths | unique | list | length == deploy_profile_go_binary_output_paths | length
      - >-
        deploy_profile_go_binary_output_paths
        | select('match', '^artifacts/deploy/bin/[^/]+$')
        | list
        | length == deploy_profile_go_binary_output_paths | length
      - deploy_profile_go_binaries | map(attribute='module_dir') | select('match', '^src/[^/]+$') | list | length == deploy_profile_go_binaries | length
      - deploy_profile_go_binary_names | sort == [
          'billing-service',
          'governance-service',
          'identity-service',
          'mailbox-service',
          'notifications-service',
          'object-storage-secret-sync',
          'object-storage-service',
          'profile-service',
          'projects-service',
          'sandbox-rental-recurring-worker',
          'sandbox-rental-service',
          'secrets-service',
          'source-code-hosting-service',
          'tb-inspect',
          'temporal-bootstrap',
          'temporal-schema',
          'verself-temporal-server',
          'verself-temporal-web'
        ]
    fail_msg: "deploy_profile_go_binaries must include each current Go binary exactly once with a unique output_path"

- name: Create local Go binary artifact directory
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.file:
    path: "{{ deploy_profile_repo_root }}/artifacts/deploy/bin"
    state: directory
    mode: "0755"

- name: Build Go binaries
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - go
      - build
      - "{{ '-ldflags=-s -w -X main.version=' ~ (verself_version | default('dev')) if item.version_ldflags else '-ldflags=-s -w' }}"
      - -o
      - "{{ deploy_profile_repo_root }}/{{ item.output_path }}"
      - "{{ item.package }}"
    chdir: "{{ deploy_profile_repo_root }}/{{ item.module_dir }}"
  environment:
    CGO_ENABLED: "{{ item.cgo_enabled }}"
    GOOS: linux
    GOARCH: amd64
  changed_when: false
  loop: "{{ deploy_profile_go_binaries }}"
  loop_control:
    label: "{{ item.name }}"

- name: Copy Go binaries to server
  ansible.builtin.copy:
    src: "{{ deploy_profile_repo_root }}/{{ item.output_path }}"
    dest: "{{ verself_bin }}/{{ item.name }}"
    mode: "0755"
  register: deploy_profile_go_binary_copy_results
  loop: "{{ deploy_profile_go_binaries }}"
  loop_control:
    label: "{{ item.name }}"

- name: Trigger restarts when copied Go binaries changed
  ansible.builtin.command: /bin/true
  changed_when: item.changed | default(false)
  notify: "{{ item.item.restart_handlers }}"
  loop: "{{ deploy_profile_go_binary_copy_results.results | selectattr('item.restart_handlers') }}"
  loop_control:
    label: "{{ item.item.name }}"
