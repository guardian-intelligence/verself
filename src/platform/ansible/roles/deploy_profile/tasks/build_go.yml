- name: Copy Go binaries to server
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ fm_bin }}/{{ item.name }}"
    mode: "0755"
  register: deploy_profile_go_binary_copy_results
  loop:
    - { src: "{{ deploy_profile_repo_root }}/src/mailbox-service/mailbox-service", name: mailbox-service }
    - { src: "{{ deploy_profile_repo_root }}/src/billing-service/billing-service", name: billing-service }
    - { src: "{{ deploy_profile_repo_root }}/src/billing-service/tb-inspect", name: tb-inspect }
    - { src: "{{ deploy_profile_repo_root }}/src/sandbox-rental-service/sandbox-rental-service", name: sandbox-rental-service }
    - { src: "{{ deploy_profile_repo_root }}/src/sandbox-rental-service/sandbox-rental-recurring-worker", name: sandbox-rental-recurring-worker }
    - { src: "{{ deploy_profile_repo_root }}/src/identity-service/identity-service", name: identity-service }
    - { src: "{{ deploy_profile_repo_root }}/src/governance-service/governance-service", name: governance-service }
    - { src: "{{ deploy_profile_repo_root }}/src/profile-service/profile-service", name: profile-service }
    - { src: "{{ deploy_profile_repo_root }}/src/secrets-service/secrets-service", name: secrets-service }
    - { src: "{{ deploy_profile_repo_root }}/src/object-storage-service/object-storage-service", name: object-storage-service }
    - { src: "{{ deploy_profile_repo_root }}/src/object-storage-service/object-storage-secret-sync", name: object-storage-secret-sync }
    - { src: "{{ deploy_profile_repo_root }}/src/temporal-platform/forge-temporal-server", name: forge-temporal-server }
    - { src: "{{ deploy_profile_repo_root }}/src/temporal-platform/forge-temporal-web", name: forge-temporal-web }
    - { src: "{{ deploy_profile_repo_root }}/src/temporal-platform/temporal-bootstrap", name: temporal-bootstrap }
    - { src: "{{ deploy_profile_repo_root }}/src/temporal-platform/temporal-schema", name: temporal-schema }

- name: Remove retired proof binaries from server profile
  ansible.builtin.file:
    path: "{{ fm_bin }}/{{ item }}"
    state: absent
  loop:
    - object-storage-proof
    - temporal-proof

- name: Set billing-service binary copy fact
  ansible.builtin.set_fact:
    deploy_profile_billing_service_binary_copy: >-
      {{
        (
          deploy_profile_go_binary_copy_results.results
          | selectattr('item.name', 'equalto', 'billing-service')
          | list
          | first
        ) | default({})
      }}

- name: Trigger billing-service restart when binary changed
  ansible.builtin.command: /bin/true
  changed_when: deploy_profile_billing_service_binary_copy.changed | default(false)
  notify: deploy-profile restart billing-service

