---
# Populate /opt/verself/profile/bin/ with all server binaries.
# Builds Go/Caddy on the controller and downloads static binaries from generated topology catalog vars.

- name: Validate generated server tool pins are loaded
  ansible.builtin.assert:
    that:
      - topology_server_tools is defined
      - topology_server_tools.clickhouse.version is defined
      - topology_server_tools.caddy.xcaddy_version is defined
    fail_msg: >-
      topology_server_tools is missing. Run make topology-generate before deploying.

- name: Set deploy profile server tool pins
  ansible.builtin.set_fact:
    deploy_profile_server_tools_pins: "{{ topology_server_tools }}"

- name: Create profile directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/verself
    - "{{ verself_bin }}"
    - "{{ deploy_profile_staging_dir }}"

- name: Include path setup
  ansible.builtin.include_tasks: path_setup.yml

- name: Include apt packages
  ansible.builtin.include_tasks: apt_packages.yml

- name: Include Go binary builds
  ansible.builtin.include_tasks: build_go.yml

- name: Include Caddy build
  ansible.builtin.include_tasks: build_caddy.yml

- name: Include static binary downloads
  ansible.builtin.include_tasks: static_binaries.yml

- name: Include Node.js installation
  ansible.builtin.include_tasks: nodejs.yml
