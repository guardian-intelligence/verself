---
# Build Caddy with Coraza WAF plugin on the Ansible controller using xcaddy.
# The resulting static binary is copied to the server.

- name: Build Caddy with Coraza WAF plugin
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - go
      - run
      - "github.com/caddyserver/xcaddy/cmd/xcaddy@v{{ topology_versions.production.xcaddy }}"
      - build
      - "v{{ topology_versions.production.caddy }}"
      - --with
      - "github.com/corazawaf/coraza-caddy/v2@v{{ topology_versions.production.corazaCaddy }}"
      - --output
      - "{{ deploy_profile_repo_root }}/.build/caddy"
    chdir: "{{ deploy_profile_repo_root }}"
  environment:
    CGO_ENABLED: "0"
    GOOS: linux
    GOARCH: amd64
  changed_when: false

- name: Copy Caddy binary to server
  ansible.builtin.copy:
    src: "{{ deploy_profile_repo_root }}/.build/caddy"
    dest: "{{ verself_bin }}/caddy"
    mode: "0755"
