---
- name: Check if identity-service unit exists for deploy profile restart
  listen: deploy-profile restart identity-service
  ansible.builtin.stat:
    path: /etc/systemd/system/identity-service.service
  register: deploy_profile_identity_service_unit_file

- name: Restart identity-service from deploy profile
  listen: deploy-profile restart identity-service
  ansible.builtin.systemd:
    daemon_reload: true
    name: identity-service
    state: restarted
  when: deploy_profile_identity_service_unit_file.stat.exists

- name: Check if mailbox-service unit exists for deploy profile restart
  listen: deploy-profile restart mailbox-service
  ansible.builtin.stat:
    path: /etc/systemd/system/mailbox-service.service
  register: deploy_profile_mailbox_service_unit_file

- name: Restart mailbox-service from deploy profile
  listen: deploy-profile restart mailbox-service
  ansible.builtin.systemd:
    daemon_reload: true
    name: mailbox-service
    state: restarted
  when: deploy_profile_mailbox_service_unit_file.stat.exists

- name: Check if sandbox-rental-service unit exists for deploy profile restart
