---
# WireGuard mesh networking. Handles every tunnel attached to this host:
# wg0 (worker mesh between platform nodes) and wg-ops (operator mesh for
# private substrate access). Driven by `wireguard_tunnels`, a list of
# tunnel definitions sourced from topology_wireguard.
#
# wireguard-tools is laid down by deploy_profile (apt). The kernel module
# is built-in on Linux 6.8+, so the role only needs to manage userspace
# config + systemd units.

- name: Validate wireguard_tunnels input
  ansible.builtin.assert:
    that:
      - wireguard_tunnels is defined
      - wireguard_tunnels | length > 0
    quiet: true
    fail_msg: >-
      wireguard_tunnels must be a non-empty list of tunnel definitions.
      Plays should pass the appropriate slice of topology_wireguard.tunnels.

- name: Create WireGuard config directory
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    mode: "0700"

- name: Configure each WireGuard tunnel
  ansible.builtin.include_tasks: tunnel.yml
  loop: "{{ wireguard_tunnels }}"
  loop_control:
    loop_var: wireguard_tunnel
    label: "{{ wireguard_tunnel.interface }}"
