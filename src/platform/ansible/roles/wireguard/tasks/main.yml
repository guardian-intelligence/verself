---
# WireGuard mesh networking setup.
# wireguard-tools provided by deploy_profile role (apt).
# Kernel module is built-in on Linux 6.8+.

- name: Create WireGuard config directory
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    mode: "0700"

- name: Generate WireGuard private key
  ansible.builtin.command: "{{ fm_bin }}/wg genkey"
  register: wireguard_private_key
  args:
    creates: /etc/wireguard/private.key
  no_log: true

- name: Save private key
  ansible.builtin.copy:
    content: "{{ wireguard_private_key.stdout }}"
    dest: /etc/wireguard/private.key
    mode: "0600"
  when: wireguard_private_key.stdout | length > 0
  no_log: true

- name: Read WireGuard private key
  ansible.builtin.slurp:
    src: /etc/wireguard/private.key
  register: wireguard_private_key_file
  no_log: true

- name: Set WireGuard private key fact
  ansible.builtin.set_fact:
    wireguard_private_key_material: >-
      {{
        (wireguard_private_key.stdout | trim)
        if (wireguard_private_key.stdout | length > 0)
        else (wireguard_private_key_file.content | b64decode | trim)
      }}
  no_log: true

- name: Generate WireGuard public key
  ansible.builtin.shell: |
    set -o pipefail
    cat /etc/wireguard/private.key | {{ fm_bin }}/wg pubkey
  register: wireguard_public_key
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Deploy WireGuard config
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: "/etc/wireguard/{{ wireguard_interface }}.conf"
    mode: "0600"
  notify: restart wireguard

- name: Enable and start WireGuard
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_interface }}"
    enabled: true
    state: started
