---
- name: Assert PostgreSQL database reset inputs are safe
  ansible.builtin.assert:
    that:
      - (postgresql_db_reset_name | default('')) is match('^[a-z_][a-z0-9_]*$')
      - (postgresql_db_reset_owner | default('')) is match('^[a-z_][a-z0-9_]*$')
      - postgresql_db_reset_stop_units is defined
      - postgresql_db_reset_stop_units is not string
    fail_msg: >-
      postgresql_db_reset_name and postgresql_db_reset_owner must be lowercase
      PostgreSQL identifiers matching ^[a-z_][a-z0-9_]*$, and
      postgresql_db_reset_stop_units must be a list.

- name: Initialize PostgreSQL database reset recovery state
  ansible.builtin.set_fact:
    postgresql_db_reset_connections_restricted: false
    postgresql_db_reset_database_was_dropped: false

- name: Probe PostgreSQL database reset client unit state
  verself_systemd_status:
    unit: "{{ item }}"
  loop: "{{ postgresql_db_reset_stop_units }}"
  loop_control:
    label: "{{ item }}"
  register: postgresql_db_reset_client_states

- name: Stop PostgreSQL database reset clients
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop: "{{ postgresql_db_reset_stop_units }}"
  loop_control:
    label: "{{ item }}"
  failed_when: false

- name: Reset PostgreSQL database
  module_defaults:
    community.postgresql.postgresql_query:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: postgres
      trust_input: false
    community.postgresql.postgresql_db:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      maintenance_db: postgres
      trust_input: false
  block:
    - name: Probe target PostgreSQL database existence
      community.postgresql.postgresql_query:
        query: SELECT datname FROM pg_database WHERE datname = %s
        positional_args:
          - "{{ postgresql_db_reset_name }}"
      register: postgresql_db_reset_database_probe
      changed_when: false

    - name: Set target PostgreSQL database existence fact
      ansible.builtin.set_fact:
        postgresql_db_reset_database_exists: >-
          {{ (postgresql_db_reset_database_probe.query_result | default({}) | length) > 0 }}

    - name: Terminate remaining PostgreSQL target database connections
      community.postgresql.postgresql_query:
        query: >-
          SELECT pg_terminate_backend(pid)
          FROM pg_stat_activity
          WHERE datname = %s
            AND pid <> pg_backend_pid()
        positional_args:
          - "{{ postgresql_db_reset_name }}"
      when: postgresql_db_reset_database_exists | bool
      changed_when: false

    - name: Probe active logical replication slots blocking PostgreSQL reset
      community.postgresql.postgresql_query:
        query: >-
          SELECT slot_name, plugin, active_pid
          FROM pg_replication_slots
          WHERE database = %s
            AND active
          ORDER BY slot_name
        positional_args:
          - "{{ postgresql_db_reset_name }}"
      register: postgresql_db_reset_active_slots
      changed_when: false

    - name: Probe subscriptions blocking PostgreSQL reset
      community.postgresql.postgresql_query:
        query: >-
          SELECT s.subname, d.datname AS database_name, s.subenabled
          FROM pg_subscription AS s
          JOIN pg_database AS d ON d.oid = s.subdbid
          WHERE d.datname = %s
          ORDER BY s.subname
        positional_args:
          - "{{ postgresql_db_reset_name }}"
      register: postgresql_db_reset_subscriptions
      changed_when: false

    - name: Probe prepared transactions blocking PostgreSQL reset
      community.postgresql.postgresql_query:
        query: >-
          SELECT gid, database, owner, prepared
          FROM pg_prepared_xacts
          WHERE database = %s
          ORDER BY prepared
        positional_args:
          - "{{ postgresql_db_reset_name }}"
      register: postgresql_db_reset_prepared_transactions
      changed_when: false

    - name: Normalize PostgreSQL reset blocker probe rows
      ansible.builtin.set_fact:
        postgresql_db_reset_active_slot_rows: >-
          {{
            []
            if postgresql_db_reset_active_slots.query_result is mapping
            else (postgresql_db_reset_active_slots.query_result | default([]))
          }}
        postgresql_db_reset_subscription_rows: >-
          {{
            []
            if postgresql_db_reset_subscriptions.query_result is mapping
            else (postgresql_db_reset_subscriptions.query_result | default([]))
          }}
        postgresql_db_reset_prepared_transaction_rows: >-
          {{
            []
            if postgresql_db_reset_prepared_transactions.query_result is mapping
            else (postgresql_db_reset_prepared_transactions.query_result | default([]))
          }}

    - name: Assert PostgreSQL reset blockers are absent
      ansible.builtin.assert:
        that:
          - postgresql_db_reset_active_slot_rows | length == 0
          - postgresql_db_reset_subscription_rows | length == 0
          - postgresql_db_reset_prepared_transaction_rows | length == 0
        fail_msg: >-
          Cannot reset PostgreSQL database {{ postgresql_db_reset_name }}:
          active logical replication slots={{ postgresql_db_reset_active_slot_rows | to_json }},
          subscriptions={{ postgresql_db_reset_subscription_rows | to_json }},
          prepared_transactions={{ postgresql_db_reset_prepared_transaction_rows | to_json }}.

    # Identifier interpolation is safe because the database name is regex-validated above.
    - name: Block new PostgreSQL connections during database reset
      community.postgresql.postgresql_query:
        query: ALTER DATABASE "{{ postgresql_db_reset_name }}" WITH ALLOW_CONNECTIONS false
        autocommit: true
      when: postgresql_db_reset_database_exists | bool

    - name: Record restricted PostgreSQL connection state
      ansible.builtin.set_fact:
        postgresql_db_reset_connections_restricted: true
      when: postgresql_db_reset_database_exists | bool

    - name: Terminate late PostgreSQL target database connections
      community.postgresql.postgresql_query:
        query: >-
          SELECT pg_terminate_backend(pid)
          FROM pg_stat_activity
          WHERE datname = %s
            AND pid <> pg_backend_pid()
        positional_args:
          - "{{ postgresql_db_reset_name }}"
      when: postgresql_db_reset_database_exists | bool
      changed_when: false

    - name: Drop PostgreSQL database before schema recreate
      community.postgresql.postgresql_db:
        name: "{{ postgresql_db_reset_name }}"
        state: absent
        force: true
      when: postgresql_db_reset_database_exists | bool

    - name: Record dropped PostgreSQL database state
      ansible.builtin.set_fact:
        postgresql_db_reset_database_was_dropped: true
      when: postgresql_db_reset_database_exists | bool

    - name: Create PostgreSQL database after schema reset
      community.postgresql.postgresql_db:
        name: "{{ postgresql_db_reset_name }}"
        owner: "{{ postgresql_db_reset_owner }}"
        state: present
  rescue:
    - name: Re-enable PostgreSQL connections after failed pre-drop reset
      community.postgresql.postgresql_query:
        query: ALTER DATABASE "{{ postgresql_db_reset_name }}" WITH ALLOW_CONNECTIONS true
        autocommit: true
      when:
        - postgresql_db_reset_connections_restricted | bool
        - not (postgresql_db_reset_database_was_dropped | bool)
      failed_when: false

    - name: Restart previously active PostgreSQL database reset clients after failed pre-drop reset
      ansible.builtin.systemd:
        name: "{{ item.item }}"
        state: started
      loop: >-
        {{
          postgresql_db_reset_client_states.results
          | default([])
          | selectattr('active')
          | list
        }}
      loop_control:
        label: "{{ item.item }}"
      when:
        - postgresql_db_reset_database_exists | default(true) | bool
        - not (postgresql_db_reset_database_was_dropped | bool)
      failed_when: false

    - name: Fail PostgreSQL database reset after recovery attempt
      ansible.builtin.fail:
        msg: >-
          PostgreSQL reset of {{ postgresql_db_reset_name }} failed.
          database_was_dropped={{ postgresql_db_reset_database_was_dropped | bool }},
          connections_restricted={{ postgresql_db_reset_connections_restricted | bool }}.
