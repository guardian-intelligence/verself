---
- name: Verify profile-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/profile-service"
  register: profile_service_binary
  failed_when: not profile_service_binary.stat.exists

- name: Create profile_service system group
  ansible.builtin.group:
    name: profile_service
    system: true

- name: Ensure spire workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create profile_service system user
  ansible.builtin.user:
    name: profile_service
    group: profile_service
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Deploy profile-service nftables ruleset
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/nftables.d/profile-service.nft"
    dest: /etc/nftables.d/profile-service.nft
    mode: "0644"
  notify: Reload nftables for profile-service

- name: Apply profile-service nftables before proceeding
  ansible.builtin.meta: flush_handlers

- name: Include profile-service generated credential tasks
  ansible.builtin.include_tasks: credentials.yml

- name: Include profile-service PostgreSQL database tasks
  ansible.builtin.include_tasks: database.yml

- name: Include profile-service PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

- name: Wait for Zitadel before resolving profile-service auth audience
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.zitadel.host }}"
    port: "{{ topology_endpoints.zitadel.endpoints.http.port }}"
    timeout: 60

- name: Read Zitadel admin PAT for profile-service auth setup
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: profile_service_zitadel_admin_pat_raw
  no_log: true

- name: Set profile-service Zitadel admin PAT fact
  ansible.builtin.set_fact:
    profile_service_zitadel_admin_pat: "{{ profile_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
  no_log: true

- name: Find identity-service auth project for profile-service bearer validation
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ profile_service_zitadel_admin_pat }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ profile_service_identity_project_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
    return_content: true
  register: profile_service_identity_project_search
  no_log: true

- name: Assert identity-service auth project exists for profile-service
  ansible.builtin.assert:
    that: (profile_service_identity_project_search.json.result | default([])) | length > 0
    fail_msg: >-
      Identity-service Zitadel project '{{ profile_service_identity_project_name }}'
      not found. Run the identity_service role before profile_service.

- name: Set profile-service auth audience fact
  ansible.builtin.set_fact:
    profile_service_auth_audience: "{{ profile_service_identity_project_search.json.result[0].id }}"

- name: Deploy profile-service systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Profile Service
      After=verself-firewall.target network.target
      After=postgresql.service zitadel.service spire-agent.service
      After=identity-service.service governance-service.service
      Requires=verself-firewall.target
      Wants=postgresql.service zitadel.service spire-agent.service identity-service.service governance-service.service

      [Service]
      Type=simple
      User=profile_service
      Group=profile_service
      SupplementaryGroups={{ spire_workload_group }}
      BindReadOnlyPaths=/etc/verself/auth-discovery-hosts:/etc/hosts
      Environment=PROFILE_LISTEN_ADDR={{ topology_endpoints.profile_service.endpoints.public_http.address }}
      Environment=PROFILE_INTERNAL_LISTEN_ADDR={{ topology_endpoints.profile_service.endpoints.internal_https.address }}
      Environment=PROFILE_PG_DSN=postgres://profile_service@/profile?host=/var/run/postgresql&sslmode=disable
      Environment=PROFILE_PG_MAX_CONNS=8
      Environment=PROFILE_AUTH_ISSUER_URL={{ profile_service_auth_issuer_url }}
      Environment=PROFILE_AUTH_AUDIENCE={{ profile_service_auth_audience }}
      Environment=PROFILE_IDENTITY_INTERNAL_URL=https://{{ topology_endpoints.identity_service.endpoints.internal_https.address }}
      Environment=PROFILE_GOVERNANCE_AUDIT_URL=https://{{ topology_endpoints.governance_service.endpoints.internal_https.address }}
      Environment=SPIFFE_ENDPOINT_SOCKET=unix://{{ spire_agent_socket_path }}
      Environment=OTEL_SERVICE_NAME=profile-service
      Environment=OTEL_EXPORTER_OTLP_ENDPOINT=http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}
      ExecStart={{ verself_bin }}/profile-service
      Restart=on-failure
      RestartSec=5
      CapabilityBoundingSet=
      ProtectHome=true
      ProtectSystem=strict
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0077

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/profile-service.service
    mode: "0644"
  notify: restart profile-service

- name: Apply profile-service unit changes before proceeding
  ansible.builtin.meta: flush_handlers

- name: Enable and start profile-service
  ansible.builtin.systemd:
    name: profile-service
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for profile-service listener to be present
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.profile_service.host }}"
    port: "{{ topology_endpoints.profile_service.endpoints.public_http.port }}"
    timeout: 60

- name: Wait for profile-service readiness
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.profile_service.endpoints.public_http.address }}/readyz"
    method: GET
    status_code: 200
  register: profile_service_readyz
  retries: 30
  delay: 1
  until: profile_service_readyz.status == 200
