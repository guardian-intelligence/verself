---
- name: Apply profile-service PostgreSQL migrations
  ansible.builtin.include_role:
    name: service_pg_migrations
  vars:
    service_pg_migrations_service: profile-service
    service_pg_migrations_db: profile
    service_pg_migrations_db_user: profile_service
    service_pg_migrations_db_owner: profile_service
    service_pg_migrations_db_password: "{{ profile_service_pg_password }}"
    service_pg_migrations_source_dir: "{{ playbook_dir }}/../../../profile-service/migrations"
    service_pg_migrations_probe_table: profile_subjects
    service_pg_migrations_stop_units:
      - profile-service
    service_pg_migrations_force_reset: "{{ profile_service_force_schema_reset | default(false) | bool }}"
