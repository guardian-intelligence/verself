---
- name: Create credstore directory for profile-service
  ansible.builtin.file:
    path: /etc/credstore/profile-service
    state: directory
    owner: root
    group: profile_service
    mode: "0750"

- name: Check profile-service generated credentials
  ansible.builtin.stat:
    path: "/etc/credstore/profile-service/{{ item }}"
  loop:
    - pg-password
  register: profile_service_generated_credential_files
  no_log: true

- name: Generate profile-service missing credentials
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: "/etc/credstore/profile-service/{{ item.item }}"
    owner: root
    group: profile_service
    mode: "0640"
  loop: "{{ profile_service_generated_credential_files.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: not item.stat.exists
  no_log: true

- name: Converge profile-service generated credential permissions
  ansible.builtin.file:
    path: "/etc/credstore/profile-service/{{ item }}"
    owner: root
    group: profile_service
    mode: "0640"
  loop:
    - pg-password

- name: Read profile-service generated PostgreSQL password
  ansible.builtin.slurp:
    src: /etc/credstore/profile-service/pg-password
  register: profile_service_pg_password_raw
  no_log: true

- name: Set profile-service generated PostgreSQL password fact
  ansible.builtin.set_fact:
    profile_service_pg_password: "{{ profile_service_pg_password_raw.content | b64decode | trim }}"
  no_log: true
