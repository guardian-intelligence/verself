---
# Public-facing TCP ports (accessible from the internet).
nftables_public_tcp_ports:
  - 25
  - 80
  - 443

# Public-facing UDP ports — every WireGuard tunnel's listen port must ingress.
# Sourced from topology_wireguard so adding a tunnel is one CUE edit, not a
# split between topology and firewall defaults.
nftables_public_udp_ports: >-
  {{
    topology_wireguard.tunnels.values()
    | map(attribute='port')
    | list
  }}

# Interfaces where all inbound traffic is accepted without port filtering.
# wg0 is the worker mesh; wg-ops is the operator mesh that fronts private
# substrate (bazel-remote, future operator UIs). Both are authenticated by
# WireGuard public-key cryptography so anything that lands on these
# interfaces is a verified peer.
nftables_trusted_interfaces: >-
  {{
    ['lo'] +
    (topology_wireguard.tunnels.values()
     | map(attribute='interface')
     | list)
  }}

# Firecracker guests reach selected host-local services via the host gateway.
nftables_firecracker_guest_cidr: "{{ firecracker_guest_pool_cidr | default('172.16.0.0/16') }}"
nftables_firecracker_host_service_ip: "{{ topology_endpoints.firecracker_host_service.host }}"
nftables_firecracker_guest_tcp_ports:
  - "{{ topology_endpoints.verdaccio.endpoints.http.port }}"
  - "{{ topology_endpoints.firecracker_host_service.endpoints.host_http.port }}"


# Allow SSH (port 22) from the public internet with per-source-IP rate limiting.
# Set to false to restrict SSH to trusted interfaces only (WireGuard).
nftables_ssh_public: true

# Per-source-IP new-connection rate limit for public SSH.
nftables_ssh_rate: "3/minute"
nftables_ssh_burst: 5

# Tables from the pre-rebrand namespace can keep base-chain drop rules active
# even after their replacement files have been removed from /etc/nftables.d.
nftables_remove_legacy_tables: true
nftables_legacy_table_name_pattern: "^forge_metal_"
