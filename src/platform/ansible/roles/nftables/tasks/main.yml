---
- name: Ensure nftables is installed
  ansible.builtin.apt:
    name: nftables
    state: present

- name: Create nftables config directory
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    mode: "0755"

- name: Deploy main nftables config
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/nftables.conf"
    dest: /etc/nftables.conf
    mode: "0644"
  notify: reload nftables

- name: Collect rendered nftables rulesets
  ansible.builtin.set_fact:
    nftables_rendered_rulesets: >-
      {{
        lookup('ansible.builtin.fileglob', platform_rendered_dir + '/etc/nftables.d/*.nft', wantlist=True)
        | reject('search', '/firecracker\\.nft$')
        | sort
        | list
      }}

- name: Deploy rendered nftables rulesets
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/nftables.d/{{ item | basename }}"
    mode: "0644"
  loop: "{{ nftables_rendered_rulesets }}"
  loop_control:
    label: "{{ item | basename }}"
  notify: reload nftables

- name: Enable and start nftables service
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
    daemon_reload: true

- name: Deploy verself-firewall target
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/systemd/system/verself-firewall.target"
    dest: /etc/systemd/system/verself-firewall.target
    mode: "0644"

- name: Enable verself-firewall target
  ansible.builtin.systemd:
    name: verself-firewall.target
    enabled: true
    state: started
    daemon_reload: true
