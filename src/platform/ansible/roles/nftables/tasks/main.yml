---
- name: Ensure nftables is installed
  ansible.builtin.apt:
    name: nftables
    state: present

- name: Create nftables config directory
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    mode: "0755"

- name: Deploy main nftables config
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/nftables.conf"
    dest: /etc/nftables.conf
    mode: "0644"
  notify: reload nftables

- name: Deploy host firewall ruleset
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/nftables.d/host-firewall.nft"
    dest: /etc/nftables.d/host-firewall.nft
    mode: "0644"
  notify: reload nftables

- name: Enable and start nftables service
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
    daemon_reload: true

- name: List active nftables tables
  ansible.builtin.command:
    argv:
      - nft
      - -j
      - list
      - tables
  register: nftables_active_tables
  changed_when: false
  when: nftables_remove_legacy_tables | bool

- name: Remove legacy nftables tables
  ansible.builtin.command:
    argv:
      - nft
      - delete
      - table
      - "{{ item.table.family }}"
      - "{{ item.table.name }}"
  loop: "{{ (nftables_active_tables.stdout | default('{\"nftables\": []}') | from_json).nftables }}"
  when:
    - nftables_remove_legacy_tables | bool
    - item.table is defined
    - item.table.name is match(nftables_legacy_table_name_pattern)
  changed_when: true

- name: Deploy verself-firewall target
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/systemd/system/verself-firewall.target"
    dest: /etc/systemd/system/verself-firewall.target
    mode: "0644"

- name: Enable verself-firewall target
  ansible.builtin.systemd:
    name: verself-firewall.target
    enabled: true
    state: started
    daemon_reload: true
