---
- name: Create webmail credstore directory
  ansible.builtin.file:
    path: /etc/credstore/webmail
    state: directory
    owner: root
    group: "{{ ansible_user }}"
    mode: "0750"

- name: Check for existing webmail auth session secret
  ansible.builtin.stat:
    path: /etc/credstore/webmail/auth-session-secret
  register: webmail_auth_session_secret_file

- name: Generate webmail auth session secret
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/webmail/auth-session-secret
    owner: root
    group: "{{ ansible_user }}"
    mode: "0640"
  when: not webmail_auth_session_secret_file.stat.exists
  no_log: true

- name: Read webmail auth session secret
  ansible.builtin.slurp:
    src: /etc/credstore/webmail/auth-session-secret
  register: webmail_auth_session_secret_raw

- name: Set webmail auth session secret fact
  ansible.builtin.set_fact:
    webmail_auth_session_secret: "{{ webmail_auth_session_secret_raw.content | b64decode | trim }}"

- name: Create webmail install directory
  ansible.builtin.file:
    path: "{{ webmail_install_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Verify corepack exists in profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/corepack"
  register: webmail_corepack
  failed_when: not webmail_corepack.stat.exists

- name: Remove generated webmail artifacts before sync
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ webmail_install_dir }}/.output"
    - "{{ webmail_install_dir }}/.tanstack"
    - "{{ webmail_install_dir }}/apps/mail/.output"
    - "{{ webmail_install_dir }}/apps/mail/.tanstack"
    - "{{ webmail_install_dir }}/packages/ui/dist"

- name: Synchronize webmail source
  delegate_to: localhost
  become: false
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../../viteplus-monorepo/"
    dest: "{{ webmail_install_dir }}/"
    delete: true
    recursive: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.output"
      - "--exclude=dist"
      - "--exclude=.tanstack"
      - "--exclude=apps/rent-a-sandbox"
      - "--exclude=apps/rent-a-sandbox/**"
      - "--exclude=apps/letters"
      - "--exclude=apps/letters/**"
      - "--exclude=playwright-report"
      - "--exclude=test-results"
      - "--exclude=HANDOFF_PROMPT.md"
      - "--no-owner"
      - "--no-group"

- name: Compute webmail workspace dependency fingerprint
  delegate_to: localhost
  become: false
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        cd {{ playbook_dir }}/../../../viteplus-monorepo
        {
          printf '%s\0' package.json pnpm-lock.yaml pnpm-workspace.yaml apps/mail/package.json
          find packages -mindepth 2 -maxdepth 2 -name package.json -print0
        } | sort -z | xargs -0 sha256sum | sha256sum
  register: webmail_workspace_dependency_fingerprint
  changed_when: false

- name: Check cached webmail install fingerprint
  ansible.builtin.stat:
    path: "{{ webmail_dependencies_fingerprint_path }}"
  register: webmail_install_fingerprint_file

- name: Read cached webmail install fingerprint
  ansible.builtin.slurp:
    src: "{{ webmail_dependencies_fingerprint_path }}"
  register: webmail_install_fingerprint_raw
  when: webmail_install_fingerprint_file.stat.exists

- name: Check cached webmail node_modules
  ansible.builtin.stat:
    path: "{{ webmail_install_dir }}/node_modules"
  register: webmail_node_modules_dir

- name: Install webmail workspace dependencies when manifests change
  become: false
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/corepack"
      - pnpm
      - install
    chdir: "{{ webmail_install_dir }}"
  environment:
    PATH: "{{ fm_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true
  when: >-
    (not webmail_node_modules_dir.stat.exists)
    or (not webmail_install_fingerprint_file.stat.exists)
    or (
      (webmail_install_fingerprint_raw.content | default('') | b64decode | trim)
      != (webmail_workspace_dependency_fingerprint.stdout.split()[0] | trim)
    )

- name: Record cached webmail install fingerprint
  ansible.builtin.copy:
    content: "{{ webmail_workspace_dependency_fingerprint.stdout.split()[0] | trim }}\n"
    dest: "{{ webmail_dependencies_fingerprint_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Build webmail package dependencies
  become: false
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/corepack"
      - pnpm
      - --filter
      - "@forge-metal/mail^..."
      - run
      - build
    chdir: "{{ webmail_install_dir }}"
  environment:
    PATH: "{{ fm_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true
  notify: Restart webmail

- name: Build webmail app
  become: false
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/corepack"
      - pnpm
      - --filter
      - "@forge-metal/mail"
      - run
      - build
    chdir: "{{ webmail_install_dir }}"
  environment:
    PATH: "{{ fm_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true
  notify: Restart webmail

- name: Set up Zitadel OIDC application
  ansible.builtin.include_role:
    name: zitadel_oauth_app
  vars:
    zitadel_oauth_app_name: webmail
    zitadel_oauth_app_project_name: "{{ webmail_auth_project_name }}"
    zitadel_oauth_app_redirect_uris:
      - "https://{{ webmail_domain }}/callback"
    zitadel_oauth_app_post_logout_redirect_uris:
      - "https://{{ webmail_domain }}"
    zitadel_oauth_app_credstore_dir: /etc/credstore/webmail
    zitadel_oauth_app_credstore_group: "{{ ansible_user }}"
    zitadel_oauth_app_auth_method_type: OIDC_AUTH_METHOD_TYPE_NONE
    zitadel_oauth_app_persist_client_secret: false
    zitadel_oauth_app_role_assertions: true
    zitadel_oauth_app_cutover_marker_filename: oidc-web-cutover

- name: Export webmail OIDC app facts for templates
  ansible.builtin.set_fact:
    webmail_app_id: "{{ zitadel_oauth_app_out_id }}"
    webmail_project_id: "{{ zitadel_oauth_app_out_project_id }}"
    webmail_client_id: "{{ zitadel_oauth_app_out_client_id }}"
  no_log: true

- name: Deploy webmail environment file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/webmail/env
    mode: "0640"
    owner: root
    group: "{{ ansible_user }}"
  notify: Restart webmail

- name: Deploy webmail systemd unit
  ansible.builtin.template:
    src: webmail.service.j2
    dest: /etc/systemd/system/webmail.service
    mode: "0644"
  notify: Restart webmail

- name: Deploy webmail nftables rules
  ansible.builtin.template:
    src: webmail.nft.j2
    dest: /etc/nftables.d/webmail.nft
    mode: "0644"
  notify: Reload nftables

- name: Enable and start webmail
  ansible.builtin.systemd:
    name: webmail
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for webmail to be ready
  ansible.builtin.wait_for:
    host: "{{ services.webmail.host }}"
    port: "{{ services.webmail.port }}"
    timeout: 30
