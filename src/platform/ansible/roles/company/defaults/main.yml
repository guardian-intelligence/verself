---
# The company app owns Guardian Intelligence's public company domain. Product
# docs and policy live on the Verself product domain.
company_install_dir: /opt/company
company_release_dir: "{{ company_install_dir }}/releases"
company_current_link: "{{ company_install_dir }}/current"
company_runtime_user: company
company_runtime_group: company
company_state_dir: /var/lib/company
company_deploy_id: "{{ lookup('env', 'VERSELF_DEPLOY_ID') | default(lookup('pipe', 'cat /proc/sys/kernel/random/uuid'), true) }}"
company_release_path: "{{ company_release_dir }}/{{ company_deploy_id }}"
company_app_source_dir: "{{ deploy_profile_repo_root }}/src/viteplus-monorepo/apps/company"
company_app_entry_bazel_target: "//src/viteplus-monorepo/apps/company:app_entry_bundle"
