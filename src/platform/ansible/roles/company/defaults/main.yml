---
# The company app owns the root domain — unlike platform/letters/webmail which
# live on subdomains, anveio.com (or whatever forge_metal_domain is set to)
# resolves directly to this service. The Caddy block in roles/caddy/templates
# /Caddyfile.j2 routes `{{ company_domain }}` here.
company_domain: "{{ forge_metal_domain }}"
company_install_dir: /opt/company
company_app_dir: "{{ company_install_dir }}/apps/company"
company_dependencies_fingerprint_path: "{{ company_install_dir }}/.pnpm-install-fingerprint"
company_runtime_user: company
company_runtime_group: company
company_state_dir: /var/lib/company
