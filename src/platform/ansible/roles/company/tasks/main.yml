---
- name: Create company runtime group
  ansible.builtin.group:
    name: "{{ company_runtime_group }}"
    system: true

- name: Create company runtime user
  ansible.builtin.user:
    name: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ company_state_dir }}"
    create_home: false

- name: Create company state directory
  ansible.builtin.file:
    path: "{{ company_state_dir }}"
    state: directory
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0700"

- name: Create company install directory
  ansible.builtin.file:
    path: "{{ company_install_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0755"

- name: Verify corepack exists in profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/corepack"
  register: company_corepack
  failed_when: not company_corepack.stat.exists

- name: Remove generated company artifacts before sync
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ company_install_dir }}/.output"
    - "{{ company_install_dir }}/.tanstack"
    - "{{ company_install_dir }}/apps/company/.output"
    - "{{ company_install_dir }}/apps/company/.tanstack"
    - "{{ company_install_dir }}/packages/ui/dist"

- name: Synchronize company source
  delegate_to: localhost
  become: false
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../../viteplus-monorepo/"
    dest: "{{ company_install_dir }}/"
    delete: true
    recursive: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.output"
      - "--exclude=dist"
      - "--exclude=.tanstack"
      - "--exclude=apps/rent-a-sandbox"
      - "--exclude=apps/rent-a-sandbox/**"
      - "--exclude=apps/platform"
      - "--exclude=apps/platform/**"
      - "--exclude=playwright-report"
      - "--exclude=test-results"
      - "--exclude=HANDOFF_PROMPT.md"
      - "--no-owner"
      - "--no-group"

- name: Compute company workspace dependency fingerprint
  delegate_to: localhost
  become: false
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        cd {{ playbook_dir }}/../../../viteplus-monorepo
        {
          printf '%s\0' package.json pnpm-lock.yaml pnpm-workspace.yaml apps/company/package.json
          find packages -mindepth 2 -maxdepth 2 -name package.json -print0
        } | sort -z | xargs -0 sha256sum | sha256sum
  register: company_workspace_dependency_fingerprint
  changed_when: false

- name: Check cached company install fingerprint
  ansible.builtin.stat:
    path: "{{ company_dependencies_fingerprint_path }}"
  register: company_install_fingerprint_file

- name: Read cached company install fingerprint
  ansible.builtin.slurp:
    src: "{{ company_dependencies_fingerprint_path }}"
  register: company_install_fingerprint_raw
  when: company_install_fingerprint_file.stat.exists

- name: Check cached company node_modules
  ansible.builtin.stat:
    path: "{{ company_install_dir }}/node_modules"
  register: company_node_modules_dir

- name: Install company workspace dependencies when manifests change
  become: false
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/corepack"
      - pnpm
      - install
    chdir: "{{ company_install_dir }}"
  environment:
    PATH: "{{ fm_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true
  when: >-
    (not company_node_modules_dir.stat.exists)
    or (not company_install_fingerprint_file.stat.exists)
    or (
      (company_install_fingerprint_raw.content | default('') | b64decode | trim)
      != (company_workspace_dependency_fingerprint.stdout.split()[0] | trim)
    )

- name: Record cached company install fingerprint
  ansible.builtin.copy:
    content: "{{ company_workspace_dependency_fingerprint.stdout.split()[0] | trim }}\n"
    dest: "{{ company_dependencies_fingerprint_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0644"

- name: Ensure company /.well-known directory exists in synced source
  ansible.builtin.file:
    path: "{{ company_install_dir }}/apps/company/public/.well-known"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0755"

# Templated against forge_metal_domain so the file always carries the real
# operator domain without checking a deployment-specific value into git. Note:
# the company site serves the root domain, so its Canonical: line resolves at
# https://{{ forge_metal_domain }}/.well-known/security.txt.
- name: Template company security.txt (RFC 9116)
  ansible.builtin.template:
    src: security.txt.j2
    dest: "{{ company_install_dir }}/apps/company/public/.well-known/security.txt"
    owner: "{{ ansible_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0644"
  notify: Restart company

- name: Build company package dependencies
  become: false
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/corepack"
      - pnpm
      - --filter
      - "@forge-metal/company^..."
      - run
      - build
    chdir: "{{ company_install_dir }}"
  environment:
    PATH: "{{ fm_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true
  notify: Restart company

- name: Build company app
  become: false
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/corepack"
      - pnpm
      - --filter
      - "@forge-metal/company"
      - run
      - build
    chdir: "{{ company_install_dir }}"
  environment:
    PATH: "{{ fm_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true
  notify: Restart company

- name: Ensure company env directory exists
  ansible.builtin.file:
    path: /etc/company
    state: directory
    owner: root
    group: "{{ company_runtime_group }}"
    mode: "0750"

- name: Deploy company environment file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/company/env
    mode: "0640"
    owner: root
    group: "{{ company_runtime_group }}"
  notify: Restart company

- name: Deploy company systemd unit
  ansible.builtin.template:
    src: company.service.j2
    dest: /etc/systemd/system/company.service
    mode: "0644"
  notify: Restart company

- name: Deploy company nftables rules
  ansible.builtin.template:
    src: company.nft.j2
    dest: /etc/nftables.d/company.nft
    mode: "0644"
  notify: Reload nftables

- name: Enable and start company
  ansible.builtin.systemd:
    name: company
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for company to be ready
  ansible.builtin.wait_for:
    host: "{{ services.company.host }}"
    port: "{{ services.company.port }}"
    timeout: 30
