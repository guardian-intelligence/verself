---
# Build company on the controller, ship `.output/` + `instrumentation.mjs`
# to the host, restart systemd. `vp build` runs in the source tree (Bazel
# sandboxing breaks TanStack Start's route-level code splitting); Bazel only
# builds the small hermetic OTel preload (`:instrumentation_bundle`).

- name: Create company runtime group
  ansible.builtin.group:
    name: "{{ company_runtime_group }}"
    system: true

- name: Create company runtime user
  ansible.builtin.user:
    name: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ company_state_dir }}"
    create_home: false

- name: Create company state directory
  ansible.builtin.file:
    path: "{{ company_state_dir }}"
    state: directory
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0700"

- name: Ensure company release directory tree exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: "{{ company_runtime_group }}"
    mode: "0755"
  loop:
    - "{{ company_install_dir }}"
    - "{{ company_release_dir }}"

- name: Build company .output/ via vp build (source tree)
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv: [vp, build]
    chdir: "{{ company_app_source_dir }}"
  changed_when: true

- name: Build company OTel preload bundle
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - "{{ deploy_profile_bazelisk }}"
      - build
      - --config=remote-writer
      - "{{ company_instrumentation_bazel_target }}"
    chdir: "{{ deploy_profile_repo_root }}"
  changed_when: true

- name: Resolve company OTel preload output path
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - "{{ deploy_profile_bazelisk }}"
      - cquery
      - --output=files
      - "{{ company_instrumentation_bazel_target }}"
    chdir: "{{ deploy_profile_repo_root }}"
  register: company_instrumentation_cquery
  changed_when: false

- name: Set company OTel preload local path fact
  ansible.builtin.set_fact:
    company_instrumentation_local_path: "{{ deploy_profile_repo_root }}/{{ company_instrumentation_cquery.stdout | trim }}"

- name: Create company release directory for this deploy
  ansible.builtin.file:
    path: "{{ company_release_path }}"
    state: directory
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0755"

- name: Sync company .output/ to release directory
  ansible.posix.synchronize:
    src: "{{ company_app_source_dir }}/.output/"
    dest: "{{ company_release_path }}/.output/"
    delete: true
    recursive: true
    rsync_opts:
      - "--no-owner"
      - "--no-group"

- name: Copy company instrumentation.mjs into release directory
  ansible.builtin.copy:
    src: "{{ company_instrumentation_local_path }}"
    dest: "{{ company_release_path }}/instrumentation.mjs"
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0644"

- name: Ensure company /.well-known directory exists in release tree
  # security.txt is a per-host artefact (carries public company_domain),
  # not part of the build output — write it next to .output/public/.
  ansible.builtin.file:
    path: "{{ company_release_path }}/.output/public/.well-known"
    state: directory
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0755"

- name: Template company security.txt (RFC 9116) into release tree
  ansible.builtin.template:
    src: security.txt.j2
    dest: "{{ company_release_path }}/.output/public/.well-known/security.txt"
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0644"

- name: Atomically swap company current symlink
  ansible.builtin.file:
    src: "{{ company_release_path }}"
    dest: "{{ company_current_link }}"
    state: link
    force: true
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    follow: false

- name: Ensure company env directory exists
  ansible.builtin.file:
    path: /etc/company
    state: directory
    owner: root
    group: "{{ company_runtime_group }}"
    mode: "0750"

- name: Deploy company environment file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/company/env
    mode: "0640"
    owner: root
    group: "{{ company_runtime_group }}"

- name: Deploy company systemd unit
  ansible.builtin.template:
    src: company.service.j2
    dest: /etc/systemd/system/company.service
    mode: "0644"

- name: Deploy company nftables rules
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/nftables.d/company.nft"
    dest: /etc/nftables.d/company.nft
    mode: "0644"
  notify: reload nftables

- name: Enable and (re)start company
  ansible.builtin.systemd:
    name: company
    enabled: true
    state: restarted
    daemon_reload: true

- name: Wait for company to be ready
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.company.host }}"
    port: "{{ topology_endpoints.company.endpoints.http.port }}"
    timeout: 30

- name: Find older company release directories
  ansible.builtin.find:
    paths: "{{ company_release_dir }}"
    file_type: directory
    excludes: "{{ company_deploy_id }}"
  register: company_releases_on_host

- name: Prune older company release directories (keep one rollback target)
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ (company_releases_on_host.files | sort(attribute='mtime') | list)[:-1] | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
