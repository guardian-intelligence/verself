---
# Build the company deploy_bundle on the controller (Bazel produces a
# self-contained tarball: app-entry.mjs + .output/{server,public}/), land it
# under /opt/company/releases/<deploy_id>/, atomically swap the `current`
# symlink, then restart the systemd unit.

- name: Create company runtime group
  ansible.builtin.group:
    name: "{{ company_runtime_group }}"
    system: true

- name: Create company runtime user
  ansible.builtin.user:
    name: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ company_state_dir }}"
    create_home: false

- name: Create company state directory
  ansible.builtin.file:
    path: "{{ company_state_dir }}"
    state: directory
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0700"

- name: Ensure company release directory tree exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: "{{ company_runtime_group }}"
    mode: "0755"
  loop:
    - "{{ company_install_dir }}"
    - "{{ company_release_dir }}"

- name: Build company deploy_bundle on controller
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - "{{ deploy_profile_bazelisk }}"
      - build
      - --config=remote-writer
      - "{{ company_bazel_target }}"
    chdir: "{{ deploy_profile_repo_root }}"
  changed_when: true

- name: Resolve company deploy_bundle output path
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command:
    argv:
      - "{{ deploy_profile_bazelisk }}"
      - cquery
      - --output=files
      - "{{ company_bazel_target }}"
    chdir: "{{ deploy_profile_repo_root }}"
  register: company_bundle_cquery
  changed_when: false

- name: Validate company deploy_bundle output path
  ansible.builtin.assert:
    that:
      - company_bundle_cquery.stdout_lines | length == 1
      - company_bundle_cquery.stdout | trim is match('^bazel-out/.*deploy_bundle\\.tar$')
    quiet: true
    fail_msg: >-
      Bazel cquery did not resolve exactly one .tar output for
      {{ company_bazel_target }}.

- name: Set company deploy_bundle local path fact
  ansible.builtin.set_fact:
    company_bundle_local_path: "{{ deploy_profile_repo_root }}/{{ company_bundle_cquery.stdout | trim }}"

- name: Create company release directory for this deploy
  ansible.builtin.file:
    path: "{{ company_release_path }}"
    state: directory
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0755"

- name: Extract company deploy_bundle into the release directory
  ansible.builtin.unarchive:
    src: "{{ company_bundle_local_path }}"
    dest: "{{ company_release_path }}"
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    remote_src: false

- name: Assert app-entry.mjs landed in the release directory
  ansible.builtin.stat:
    path: "{{ company_release_path }}/app-entry.mjs"
  register: company_release_entry
  failed_when: not company_release_entry.stat.exists

- name: Ensure company /.well-known directory exists in the release tree
  # Templated /.well-known/security.txt is a per-host artefact (carries
  # public company_domain), not a Bazel build input — write it into the
  # release tree so .output/public/ keeps serving it.
  ansible.builtin.file:
    path: "{{ company_release_path }}/.output/public/.well-known"
    state: directory
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0755"

- name: Template company security.txt (RFC 9116) into the release tree
  ansible.builtin.template:
    src: security.txt.j2
    dest: "{{ company_release_path }}/.output/public/.well-known/security.txt"
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    mode: "0644"

- name: Atomically swap company current symlink
  ansible.builtin.file:
    src: "{{ company_release_path }}"
    dest: "{{ company_current_link }}"
    state: link
    force: true
    owner: "{{ company_runtime_user }}"
    group: "{{ company_runtime_group }}"
    follow: false

- name: Ensure company env directory exists
  ansible.builtin.file:
    path: /etc/company
    state: directory
    owner: root
    group: "{{ company_runtime_group }}"
    mode: "0750"

- name: Deploy company environment file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/company/env
    mode: "0640"
    owner: root
    group: "{{ company_runtime_group }}"

- name: Deploy company systemd unit
  ansible.builtin.template:
    src: company.service.j2
    dest: /etc/systemd/system/company.service
    mode: "0644"

- name: Deploy company nftables rules
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/nftables.d/company.nft"
    dest: /etc/nftables.d/company.nft
    mode: "0644"
  notify: reload nftables

- name: Enable and (re)start company
  ansible.builtin.systemd:
    name: company
    enabled: true
    state: restarted
    daemon_reload: true

- name: Wait for company to be ready
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.company.host }}"
    port: "{{ topology_endpoints.company.endpoints.http.port }}"
    timeout: 30

- name: Find company release directories on host
  ansible.builtin.find:
    paths: "{{ company_release_dir }}"
    file_type: directory
    excludes: "{{ company_deploy_id }}"
  register: company_releases_on_host

- name: Prune older company release directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ (company_releases_on_host.files | sort(attribute='mtime') | list)[:-1] | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
