---
- name: Create Electric Letters storage directory
  ansible.builtin.file:
    path: "{{ electric_letters_storage_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create Electric Letters credstore directory
  ansible.builtin.file:
    path: /etc/credstore/electric-letters
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Check for existing Electric Letters PG password
  ansible.builtin.stat:
    path: /etc/credstore/electric-letters/pg-password
  register: electric_letters_pg_password_file

- name: Generate Electric Letters PG password
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/electric-letters/pg-password
    owner: root
    group: root
    mode: "0640"
  when: not electric_letters_pg_password_file.stat.exists
  no_log: true

- name: Check for existing Electric Letters API secret
  ansible.builtin.stat:
    path: /etc/credstore/electric-letters/api-secret
  register: electric_letters_api_secret_file

- name: Generate Electric Letters API secret
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=48 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/electric-letters/api-secret
    owner: root
    group: root
    mode: "0640"
  when: not electric_letters_api_secret_file.stat.exists
  no_log: true

- name: Read Electric Letters PG password
  ansible.builtin.slurp:
    src: /etc/credstore/electric-letters/pg-password
  register: electric_letters_pg_password_raw

- name: Read Electric Letters API secret
  ansible.builtin.slurp:
    src: /etc/credstore/electric-letters/api-secret
  register: electric_letters_api_secret_raw

- name: Set Electric Letters credential facts
  ansible.builtin.set_fact:
    electric_letters_pg_password: "{{ electric_letters_pg_password_raw.content | b64decode | trim }}"
    electric_letters_api_secret: "{{ electric_letters_api_secret_raw.content | b64decode | trim }}"

- name: Create Electric Letters PostgreSQL role and publication
  ansible.builtin.include_tasks: pg_setup.yml

- name: Pull Electric Letters container image
  ansible.builtin.command:
    cmd: "podman pull {{ electric_letters_image }}"
  changed_when: true

- name: Deploy Electric Letters systemd unit
  ansible.builtin.template:
    src: electric-letters.service.j2
    dest: /etc/systemd/system/electric-letters.service
    mode: "0644"
  notify: Restart electric-letters

- name: Deploy Electric Letters nftables rules
  ansible.builtin.template:
    src: electric-letters.nft.j2
    dest: /etc/nftables.d/electric-letters.nft
    mode: "0644"
  notify: Reload nftables

- name: Enable and start Electric Letters
  ansible.builtin.systemd:
    name: electric-letters
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Electric Letters to become healthy
  ansible.builtin.uri:
    url: "http://{{ services.electric_letters.host }}:{{ services.electric_letters.port }}/v1/health"
    status_code: [200, 202]
  register: electric_letters_health
  until: electric_letters_health.status in [200, 202]
  retries: 30
  delay: 2
