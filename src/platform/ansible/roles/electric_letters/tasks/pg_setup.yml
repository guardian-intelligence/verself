---
# Uses postgresql_admin_password from SOPS-decrypted group_vars (same as the postgresql role).

- name: Manage Electric Letters PostgreSQL replication state
  vars:
    electric_letters_publication_tables:
      - posts
  module_defaults:
    community.postgresql.postgresql_user:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      trust_input: false
    community.postgresql.postgresql_privs:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: letters
      trust_input: false
    community.postgresql.postgresql_query:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: letters
    community.postgresql.postgresql_publication:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: letters
      trust_input: false
  block:
    - name: Create Electric Letters PostgreSQL role
      community.postgresql.postgresql_user:
        name: electric_letters
        password: "{{ electric_letters_pg_password }}"
        role_attr_flags: REPLICATION,LOGIN
      no_log: true

    - name: Grant letters role membership to electric_letters
      community.postgresql.postgresql_query:
        query: "GRANT letters TO electric_letters"
        login_db: letters
      no_log: true

    - name: Grant Electric Letters role read access to letters tables
      community.postgresql.postgresql_privs:
        privs: SELECT
        type: table
        objs: "{{ electric_letters_publication_tables | join(',') }}"
        schema: public
        roles: electric_letters
      no_log: true

    - name: Discover Electric Letters tables missing REPLICA IDENTITY FULL
      community.postgresql.postgresql_query:
        query: >-
          SELECT c.relname
          FROM pg_class AS c
          JOIN pg_namespace AS n ON n.oid = c.relnamespace
          WHERE n.nspname = 'public'
            AND c.relname = ANY(%s)
            AND c.relreplident <> 'f'
          ORDER BY c.relname
        positional_args:
          - "{{ electric_letters_publication_tables }}"
      register: electric_letters_replica_identity_probe
      changed_when: false
      no_log: true

    - name: Ensure Electric Letters-synced tables use REPLICA IDENTITY FULL
      community.postgresql.postgresql_query:
        query: "ALTER TABLE public.{{ item.relname }} REPLICA IDENTITY FULL"
      loop: >-
        {{
          []
          if electric_letters_replica_identity_probe.query_result is mapping
          else (electric_letters_replica_identity_probe.query_result | default([]))
        }}
      loop_control:
        label: "{{ item.relname }}"
      no_log: true

    - name: Ensure publication for Electric Letters exists
      community.postgresql.postgresql_publication:
        name: electric_publication_letters
        owner: electric_letters
        tables: "{{ electric_letters_publication_tables }}"
      no_log: true

    - name: Ensure all Electric Letters tables are in publication
      community.postgresql.postgresql_query:
        query: >-
          DO $$
          BEGIN
            IF NOT EXISTS (
              SELECT 1 FROM pg_publication_tables
              WHERE pubname = 'electric_publication_letters'
              AND tablename = '{{ item }}'
            ) THEN
              ALTER PUBLICATION electric_publication_letters ADD TABLE public.{{ item }};
            END IF;
          END $$;
      loop: "{{ electric_letters_publication_tables }}"
      loop_control:
        label: "{{ item }}"
      no_log: true
