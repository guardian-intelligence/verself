---
# Push database-scoped settings via the Stalwart CLI. These settings are stored
# in Stalwart's database config layer, not in the local TOML bootstrap file.

- name: Push database settings via stalwart-cli
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/stalwart-cli"
      - -u
      - "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}"
      - -c
      - "admin:{{ stalwart_admin_password }}"
      - server
      - add-config
      - "{{ item.key }}"
      - "{{ item.value }}"
  loop:
    # SMTP session — accept local, no open relay.
    - key: session.rcpt.relay
      value: "false"
    # We are not using ASN/Geo-enriched spam rules yet. Disable the periodic
    # CDN refresh path to keep startup and steady-state logs quiet until that
    # feature is wired into the product.
    - key: asn.type
      value: disabled
    # Metrics via OpenTelemetry.
    - key: metrics.open-telemetry.transport
      value: grpc
    - key: metrics.open-telemetry.endpoint
      value: "http://{{ services.otelcol.host }}:{{ services.otelcol.grpc_port }}"
    - key: metrics.open-telemetry.interval
      value: 30s
  changed_when: false
  no_log: true

- name: Remove obsolete Stalwart relay and Sieve settings
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/stalwart-cli"
      - -u
      - "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}"
      - -c
      - "admin:{{ stalwart_admin_password }}"
      - server
      - delete-config
      - "{{ item }}"
  loop:
    - queue.route.relay
    - queue.strategy.route
    - remote.resend
    - queue.outbound
    - session.rcpt.directory
    - session.data.script
    - sieve.trusted.scripts.operator_forward
    - sieve.trusted.scripts.operator_forward.contents
  changed_when: false
  failed_when: false
  no_log: true

- name: Reload Stalwart configuration after settings update
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/stalwart-cli"
      - -u
      - "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}"
      - -c
      - "admin:{{ stalwart_admin_password }}"
      - server
      - reload-config
  changed_when: false
  no_log: true
