---
- name: Create credstore directory for stalwart
  ansible.builtin.file:
    path: /etc/credstore/stalwart
    state: directory
    owner: root
    group: stalwart
    mode: "0750"

- name: Deploy stalwart admin password credential
  ansible.builtin.copy:
    content: "{{ stalwart_admin_password }}"
    dest: /etc/credstore/stalwart/admin-password
    owner: root
    group: stalwart
    mode: "0640"
  no_log: true
  notify: restart stalwart

- name: Remove legacy stalwart PG password credential
  ansible.builtin.file:
    path: /etc/credstore/stalwart/pg-password
    state: absent
  notify: restart stalwart
