---
# Base system configuration for all nodes.
# No package installs — all software comes from the deploy_profile role.
# This role only handles system-level configuration (ZFS, users, sudoers, etc.).

- name: Install ZFS and ext4 utilities
  ansible.builtin.apt:
    name:
      - zfsutils-linux
      - e2fsprogs
    state: present
    update_cache: true

- name: Create credstore parent directory
  ansible.builtin.file:
    path: /etc/credstore
    state: directory
    owner: root
    group: root
    mode: "0711"

- name: Create forge-metal system config directory
  ansible.builtin.file:
    path: /etc/forge-metal
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Remove stale forge-metal system config
  ansible.builtin.file:
    path: /etc/forge-metal/config.toml
    state: absent

- name: Disable unsupported GSSAPIAuthentication in ssh_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/ssh_config
    regexp: '^\s*GSSAPIAuthentication'
    line: "    # GSSAPIAuthentication yes  # disabled — not supported by this SSH build"
    backrefs: false
  register: base_ssh_gssapi_update
  failed_when: false

- name: Harden sshd configuration
  ansible.builtin.template:
    src: sshd-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/50-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sshd
