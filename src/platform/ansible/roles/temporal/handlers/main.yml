---
- name: Restart temporal-server
  listen: restart temporal-server
  ansible.builtin.systemd:
    name: temporal-server
    state: restarted
    daemon_reload: true
  failed_when: false

- name: Restart temporal-web
  listen: restart temporal-web
  ansible.builtin.systemd:
    name: temporal-web
    state: restarted
    daemon_reload: true
  failed_when: false
