---
- name: Verify verself-temporal-server binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/verself-temporal-server"
  register: temporal_server_binary
  failed_when: not temporal_server_binary.stat.exists

- name: Verify verself-temporal-web binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/verself-temporal-web"
  register: temporal_web_binary
  failed_when: not temporal_web_binary.stat.exists

- name: Verify temporal-bootstrap binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/temporal-bootstrap"
  register: temporal_bootstrap_binary
  failed_when: not temporal_bootstrap_binary.stat.exists

- name: Verify temporal-schema binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/temporal-schema"
  register: temporal_schema_binary
  failed_when: not temporal_schema_binary.stat.exists

- name: Ensure spire workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create Temporal system groups
  ansible.builtin.group:
    name: "{{ item }}"
    system: true
  loop:
    - "{{ temporal_system_group }}"
    - "{{ temporal_web_group }}"

- name: Create Temporal system users
  ansible.builtin.user:
    name: "{{ item.name }}"
    group: "{{ item.group }}"
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    home: "{{ item.home }}"
    create_home: false
  loop:
    - { name: "{{ temporal_system_user }}", group: "{{ temporal_system_group }}", home: "{{ temporal_state_dir }}" }
    - { name: "{{ temporal_web_user }}", group: "{{ temporal_web_group }}", home: "{{ temporal_web_state_dir }}" }
  loop_control:
    label: "{{ item.name }}"

- name: Create Temporal state directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ temporal_config_dir }}", owner: root, group: "{{ temporal_system_group }}", mode: "0750" }
    - { path: "{{ temporal_state_dir }}", owner: "{{ temporal_system_user }}", group: "{{ temporal_system_group }}", mode: "0750" }
    - { path: "{{ temporal_state_dir }}/.ansible/tmp", owner: "{{ temporal_system_user }}", group: "{{ temporal_system_group }}", mode: "0700" }
    - { path: "{{ temporal_web_config_dir }}", owner: root, group: "{{ temporal_web_group }}", mode: "0750" }
    - { path: "{{ temporal_web_state_dir }}", owner: "{{ temporal_web_user }}", group: "{{ temporal_web_group }}", mode: "0750" }
    - { path: "{{ temporal_web_state_dir }}/.ansible/tmp", owner: "{{ temporal_web_user }}", group: "{{ temporal_web_group }}", mode: "0700" }
    - { path: "{{ temporal_web_credstore_dir }}", owner: root, group: "{{ temporal_web_group }}", mode: "0750" }
  loop_control:
    label: "{{ item.path }}"

- name: Reset Temporal persistence database when requested
  ansible.builtin.include_role:
    name: postgresql_db_reset
  vars:
    postgresql_db_reset_name: "{{ temporal_postgresql_database }}"
    postgresql_db_reset_owner: "{{ temporal_postgresql_user }}"
    postgresql_db_reset_stop_units:
      - temporal-server.service
      - temporal-web.service
  when: temporal_force_schema_reset | bool

- name: Reset Temporal visibility database when requested
  ansible.builtin.include_role:
    name: postgresql_db_reset
  vars:
    postgresql_db_reset_name: "{{ temporal_visibility_database }}"
    postgresql_db_reset_owner: "{{ temporal_postgresql_user }}"
    postgresql_db_reset_stop_units:
      - temporal-server.service
      - temporal-web.service
  when: temporal_force_schema_reset | bool

- name: Ensure Temporal web OAuth application exists
  ansible.builtin.include_role:
    name: zitadel_oauth_app
  vars:
    zitadel_oauth_app_name: "{{ temporal_web_auth_app_name }}"
    zitadel_oauth_app_project_name: "{{ temporal_web_auth_project_name }}"
    zitadel_oauth_app_redirect_uris:
      - "{{ temporal_web_oidc_redirect_uri }}"
    zitadel_oauth_app_post_logout_redirect_uris:
      - "{{ temporal_web_oidc_post_logout_redirect_uri }}"
    zitadel_oauth_app_credstore_dir: "{{ temporal_web_credstore_dir }}"
    zitadel_oauth_app_credstore_group: "{{ temporal_web_group }}"
    zitadel_oauth_app_create_project_if_missing: true
    zitadel_oauth_app_role_assertions: false
  no_log: true

- name: Persist Temporal web OAuth application facts
  ansible.builtin.set_fact:
    temporal_web_app_id: "{{ zitadel_oauth_app_out_id }}"
    temporal_web_oidc_client_id: "{{ zitadel_oauth_app_out_client_id }}"
    temporal_web_oidc_client_secret: "{{ zitadel_oauth_app_out_client_secret }}"
  no_log: true

- name: Write Temporal web OAuth client ID
  ansible.builtin.copy:
    dest: "{{ temporal_web_credstore_dir }}/oidc-client-id"
    content: "{{ temporal_web_oidc_client_id }}\n"
    owner: root
    group: "{{ temporal_web_group }}"
    mode: "0640"
  no_log: true

- name: Deploy Temporal dynamic config
  ansible.builtin.template:
    src: temporal-dynamicconfig.yaml.j2
    dest: "{{ temporal_dynamic_config_path }}"
    owner: root
    group: "{{ temporal_system_group }}"
    mode: "0640"
  notify: restart temporal-server

- name: Deploy Temporal server config
  ansible.builtin.template:
    src: temporal-config.yaml.j2
    dest: "{{ temporal_config_path }}"
    owner: root
    group: "{{ temporal_system_group }}"
    mode: "0640"
  notify: restart temporal-server

- name: Deploy Temporal web config
  ansible.builtin.template:
    src: temporal-web-config.yaml.j2
    dest: "{{ temporal_web_config_path }}"
    owner: root
    group: "{{ temporal_web_group }}"
    mode: "0640"
  no_log: true
  notify: restart temporal-web

- name: Setup Temporal schema version tables and base schema
  become: true
  become_user: "{{ temporal_system_user }}"
  vars:
    ansible_remote_tmp: "{{ temporal_state_dir }}/.ansible/tmp"
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/temporal-schema"
      - setup
      - --config
      - "{{ temporal_config_path }}"
      - --store
      - postgres-default
      - --version
      - "0.0"
  environment:
    HOME: /tmp
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}"
  changed_when: false

- name: Update Temporal schema to latest embedded version
  become: true
  become_user: "{{ temporal_system_user }}"
  vars:
    ansible_remote_tmp: "{{ temporal_state_dir }}/.ansible/tmp"
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/temporal-schema"
      - update
      - --config
      - "{{ temporal_config_path }}"
      - --store
      - postgres-default
      - --schema-name
      - "{{ temporal_schema_name }}"
  environment:
    HOME: /tmp
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}"
  changed_when: false

- name: Setup Temporal visibility schema version tables and base schema
  become: true
  become_user: "{{ temporal_system_user }}"
  vars:
    ansible_remote_tmp: "{{ temporal_state_dir }}/.ansible/tmp"
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/temporal-schema"
      - setup
      - --config
      - "{{ temporal_config_path }}"
      - --store
      - postgres-visibility
      - --version
      - "0.0"
  environment:
    HOME: /tmp
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}"
  changed_when: false

- name: Update Temporal visibility schema to latest embedded version
  become: true
  become_user: "{{ temporal_system_user }}"
  vars:
    ansible_remote_tmp: "{{ temporal_state_dir }}/.ansible/tmp"
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/temporal-schema"
      - update
      - --config
      - "{{ temporal_config_path }}"
      - --store
      - postgres-visibility
      - --schema-name
      - "{{ temporal_visibility_schema_name }}"
  environment:
    HOME: /tmp
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}"
  changed_when: false

- name: Deploy temporal-server systemd unit
  ansible.builtin.template:
    src: temporal-server.service.j2
    dest: /etc/systemd/system/temporal-server.service
    owner: root
    group: root
    mode: "0644"
  notify: restart temporal-server

- name: Deploy temporal-web systemd unit
  ansible.builtin.template:
    src: temporal-web.service.j2
    dest: /etc/systemd/system/temporal-web.service
    owner: root
    group: root
    mode: "0644"
  notify: restart temporal-web

- name: Apply Temporal unit and config changes before readiness
  ansible.builtin.meta: flush_handlers

- name: Enable and start temporal-server
  ansible.builtin.systemd:
    name: temporal-server
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Temporal frontend gRPC listener
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.temporal.host }}"
    port: "{{ topology_endpoints.temporal.endpoints.frontend_grpc.port }}"
    timeout: 30

- name: Wait for Temporal metrics listener
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.temporal.host }}"
    port: "{{ topology_endpoints.temporal.endpoints.metrics.port }}"
    timeout: 30

- name: Bootstrap Temporal namespaces with server identity
  become: true
  become_user: "{{ temporal_system_user }}"
  vars:
    ansible_remote_tmp: "{{ temporal_state_dir }}/.ansible/tmp"
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/temporal-bootstrap"
  environment:
    HOME: /tmp
    SPIFFE_ENDPOINT_SOCKET: "unix://{{ spire_agent_socket_path }}"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}"
    VERSELF_TEMPORAL_FRONTEND_ADDRESS: "{{ topology_endpoints.temporal.endpoints.frontend_grpc.address }}"
    VERSELF_TEMPORAL_BOOTSTRAP_NAMESPACES: "{{ temporal_bootstrap_namespaces | join(',') }}"
    VERSELF_TEMPORAL_BOOTSTRAP_NAMESPACE_RETENTION: "{{ temporal_namespace_retention }}"
  changed_when: false

- name: Enable and start temporal-web
  ansible.builtin.systemd:
    name: temporal-web
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Temporal web listener
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.temporal_web.host }}"
    port: "{{ topology_endpoints.temporal_web.endpoints.http.port }}"
    timeout: 30

- name: Wait for Temporal web health
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.temporal_web.endpoints.http.address }}/healthz"
    status_code: 200
  register: temporal_web_health
  until: temporal_web_health.status == 200
  retries: 15
  delay: 2
