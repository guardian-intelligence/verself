---
- name: Create Temporal system group
  ansible.builtin.group:
    name: "{{ temporal_system_group }}"
    system: true

- name: Create Temporal system user
  ansible.builtin.user:
    name: "{{ temporal_system_user }}"
    group: "{{ temporal_system_group }}"
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    home: "{{ temporal_state_dir }}"
    create_home: false

- name: Create Temporal state directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ temporal_config_dir }}", owner: root, group: "{{ temporal_system_group }}", mode: "0750" }
    - { path: "{{ temporal_state_dir }}", owner: "{{ temporal_system_user }}", group: "{{ temporal_system_group }}", mode: "0750" }
    - { path: "{{ temporal_state_dir }}/.ansible/tmp", owner: "{{ temporal_system_user }}", group: "{{ temporal_system_group }}", mode: "0700" }
  loop_control:
    label: "{{ item.path }}"

- name: Reset Temporal persistence database when requested
  ansible.builtin.include_role:
    name: postgresql_db_reset
  vars:
    postgresql_db_reset_name: "{{ temporal_postgresql_database }}"
    postgresql_db_reset_owner: "{{ temporal_postgresql_user }}"
    postgresql_db_reset_stop_units:
      - temporal-server.service
  when: temporal_force_schema_reset | bool

- name: Reset Temporal visibility database when requested
  ansible.builtin.include_role:
    name: postgresql_db_reset
  vars:
    postgresql_db_reset_name: "{{ temporal_visibility_database }}"
    postgresql_db_reset_owner: "{{ temporal_postgresql_user }}"
    postgresql_db_reset_stop_units:
      - temporal-server.service
  when: temporal_force_schema_reset | bool

- name: Deploy Temporal dynamic config
  ansible.builtin.template:
    src: temporal-dynamicconfig.yaml.j2
    dest: "{{ temporal_dynamic_config_path }}"
    owner: root
    group: "{{ temporal_system_group }}"
    mode: "0640"
  notify: restart temporal-server

- name: Deploy Temporal server config
  ansible.builtin.template:
    src: temporal-config.yaml.j2
    dest: "{{ temporal_config_path }}"
    owner: root
    group: "{{ temporal_system_group }}"
    mode: "0640"
  notify: restart temporal-server

- name: Setup Temporal schema version tables and base schema
  become: true
  become_user: "{{ temporal_system_user }}"
  vars:
    ansible_remote_tmp: "{{ temporal_state_dir }}/.ansible/tmp"
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/temporal-schema"
      - setup
      - --config
      - "{{ temporal_config_path }}"
      - --store
      - postgres-default
      - --version
      - "0.0"
  environment:
    HOME: /tmp
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}"
  changed_when: false

- name: Update Temporal schema to latest embedded version
  become: true
  become_user: "{{ temporal_system_user }}"
  vars:
    ansible_remote_tmp: "{{ temporal_state_dir }}/.ansible/tmp"
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/temporal-schema"
      - update
      - --config
      - "{{ temporal_config_path }}"
      - --store
      - postgres-default
      - --schema-name
      - "{{ temporal_schema_name }}"
  environment:
    HOME: /tmp
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}"
  changed_when: false

- name: Setup Temporal visibility schema version tables and base schema
  become: true
  become_user: "{{ temporal_system_user }}"
  vars:
    ansible_remote_tmp: "{{ temporal_state_dir }}/.ansible/tmp"
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/temporal-schema"
      - setup
      - --config
      - "{{ temporal_config_path }}"
      - --store
      - postgres-visibility
      - --version
      - "0.0"
  environment:
    HOME: /tmp
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}"
  changed_when: false

- name: Update Temporal visibility schema to latest embedded version
  become: true
  become_user: "{{ temporal_system_user }}"
  vars:
    ansible_remote_tmp: "{{ temporal_state_dir }}/.ansible/tmp"
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/temporal-schema"
      - update
      - --config
      - "{{ temporal_config_path }}"
      - --store
      - postgres-visibility
      - --schema-name
      - "{{ temporal_visibility_schema_name }}"
  environment:
    HOME: /tmp
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}"
  changed_when: false

- name: Deploy temporal-server systemd unit
  ansible.builtin.template:
    src: temporal-server.service.j2
    dest: /etc/systemd/system/temporal-server.service
    owner: root
    group: root
    mode: "0644"
  notify: restart temporal-server

- name: Apply Temporal unit and config changes before readiness
  ansible.builtin.meta: flush_handlers

- name: Enable and start temporal-server
  ansible.builtin.systemd:
    name: temporal-server
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Temporal frontend gRPC listener
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.temporal.host }}"
    port: "{{ topology_endpoints.temporal.endpoints.frontend_grpc.port }}"
    timeout: 30

- name: Wait for Temporal metrics listener
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.temporal.host }}"
    port: "{{ topology_endpoints.temporal.endpoints.metrics.port }}"
    timeout: 30

- name: Bootstrap Temporal namespaces with server identity
  become: true
  become_user: "{{ temporal_system_user }}"
  vars:
    ansible_remote_tmp: "{{ temporal_state_dir }}/.ansible/tmp"
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/temporal-bootstrap"
  environment:
    HOME: /tmp
    SPIFFE_ENDPOINT_SOCKET: "unix://{{ spire_agent_socket_path }}"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}"
    VERSELF_TEMPORAL_FRONTEND_ADDRESS: "{{ topology_endpoints.temporal.endpoints.frontend_grpc.address }}"
    VERSELF_TEMPORAL_BOOTSTRAP_NAMESPACES: "{{ temporal_bootstrap_namespaces | join(',') }}"
    VERSELF_TEMPORAL_BOOTSTRAP_NAMESPACE_RETENTION: "{{ temporal_namespace_retention }}"
  changed_when: false
