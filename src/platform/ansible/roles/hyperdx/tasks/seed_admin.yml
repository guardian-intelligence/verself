---
# Seed HyperDX admin user on first run via registration API.
# Credentials come from SOPS-decrypted variables (derived_secrets.yml).

- name: Check if a team already exists (via MongoDB)
  ansible.builtin.command: >
    mongosh --quiet --eval "db.teams.countDocuments()" hyperdx
  register: hyperdx_team_count
  changed_when: false

- name: Set seeding needed fact
  ansible.builtin.set_fact:
    hyperdx_needs_seed: "{{ hyperdx_team_count.stdout | trim | int == 0 }}"

- name: Create HyperDX credentials directory
  ansible.builtin.file:
    path: "{{ hyperdx_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: hyperdx_needs_seed | bool

- name: Seed admin user via registration API
  ansible.builtin.uri:
    url: "http://{{ services.hyperdx.host }}:{{ services.hyperdx.app_port }}/api/register/password"
    method: POST
    body_format: json
    body:
      email: "{{ hyperdx_admin_email }}"
      password: "{{ hyperdx_admin_password }}"
      confirmPassword: "{{ hyperdx_admin_password }}"
    status_code: [200]
    headers:
      Content-Type: application/json
  when: hyperdx_needs_seed | bool
  no_log: true
  retries: 5
  delay: 3
  register: hyperdx_seed_result
  until: hyperdx_seed_result is not failed

- name: Reconcile Forge Metal ClickHouse connection credentials
  ansible.builtin.command:
    argv:
      - mongosh
      - --quiet
      - --eval
      - |
        const connectionName = "forge-metal";
        const desired = {
          host: {{ ("http://" ~ services.clickhouse.host ~ ":" ~ services.clickhouse.http_port) | to_json }},
          username: "default",
          password: {{ clickhouse_password | to_json }},
        };
        const matchingConnections = db.connections.countDocuments({ name: connectionName });
        if (matchingConnections === 0) {
          throw new Error(`No ${connectionName} HyperDX connection exists to reconcile`);
        }
        const result = db.connections.updateMany(
          {
            name: connectionName,
            $or: [
              { host: { $ne: desired.host } },
              { username: { $ne: desired.username } },
              { password: { $ne: desired.password } },
            ],
          },
          {
            $set: {
              ...desired,
              updatedAt: new Date(),
            },
          },
        );
        print(`matched=${matchingConnections} modified=${result.modifiedCount}`);
      - hyperdx
  # HyperDX's ClickHouse proxy reads these fields, not URL userinfo in host.
  no_log: true
  register: hyperdx_clickhouse_connection_reconcile
  changed_when: "'modified=0' not in hyperdx_clickhouse_connection_reconcile.stdout"
