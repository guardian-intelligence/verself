---
# HyperDX observability UI — built from source at deploy time.
#
# Built from source at deploy time (~140s) using Node.js from deploy_profile role.
# Cannot be distributed as a static binary due to native node_modules addons and
# next-runtime-env requiring a writable public/ directory at startup.

- name: Enable corepack for yarn
  ansible.builtin.command: "{{ fm_bin }}/corepack enable"
  environment:
    PATH: "{{ fm_bin }}:{{ ansible_facts['env']['PATH'] }}"
  changed_when: false

- name: Create HyperDX install directory
  ansible.builtin.file:
    path: "{{ hyperdx_install_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0755"

- name: Create HyperDX configuration directory
  ansible.builtin.file:
    path: "{{ hyperdx_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Check whether HyperDX repository exists
  ansible.builtin.stat:
    path: "{{ hyperdx_install_dir }}/.git"
  register: hyperdx_git_dir

- name: Record current HyperDX revision
  ansible.builtin.command: git rev-parse HEAD
  args:
    chdir: "{{ hyperdx_install_dir }}"
  become: false
  register: hyperdx_head_before
  changed_when: false
  failed_when: false
  when: hyperdx_git_dir.stat.exists

- name: Initialize HyperDX repository  # noqa: command-instead-of-module
  ansible.builtin.command: git init
  args:
    chdir: "{{ hyperdx_install_dir }}"
  become: false
  when: not hyperdx_git_dir.stat.exists
  changed_when: true

- name: Configure HyperDX origin remote  # noqa: command-instead-of-module
  ansible.builtin.command: git remote add origin {{ hyperdx_repo }}
  args:
    chdir: "{{ hyperdx_install_dir }}"
  become: false
  when: not hyperdx_git_dir.stat.exists
  changed_when: true

- name: Normalize HyperDX origin remote URL  # noqa: command-instead-of-module
  ansible.builtin.command: git remote set-url origin {{ hyperdx_repo }}
  args:
    chdir: "{{ hyperdx_install_dir }}"
  become: false
  changed_when: false

- name: Fetch HyperDX branch history
  ansible.builtin.shell: |
    set -euo pipefail
    if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
      git fetch --unshallow --prune origin \
        +refs/heads/{{ hyperdx_branch }}:refs/remotes/origin/{{ hyperdx_branch }}
    else
      git fetch --prune origin \
        +refs/heads/{{ hyperdx_branch }}:refs/remotes/origin/{{ hyperdx_branch }}
    fi
  args:
    chdir: "{{ hyperdx_install_dir }}"
    executable: /bin/bash
  become: false
  changed_when: false

- name: Check out pinned HyperDX revision  # noqa: command-instead-of-module
  ansible.builtin.command: git checkout --force --detach {{ hyperdx_version }}
  args:
    chdir: "{{ hyperdx_install_dir }}"
  become: false
  register: hyperdx_checkout
  changed_when: (hyperdx_head_before.stdout | default('')) != hyperdx_version

- name: Record whether the HyperDX source changed
  ansible.builtin.set_fact:
    hyperdx_source_changed: >-
      {{
        (hyperdx_head_before.stdout | default(''))
        !=
        hyperdx_version
      }}
  changed_when: false

- name: Clean stale build artifacts on source change
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ hyperdx_install_dir }}/packages/api/build"
    - "{{ hyperdx_install_dir }}/packages/app/.next"
    - "{{ hyperdx_install_dir }}/packages/common-utils/dist"
    - "{{ hyperdx_install_dir }}/.nx"
  when: hyperdx_source_changed

- name: Install HyperDX dependencies
  ansible.builtin.command: yarn install
  args:
    chdir: "{{ hyperdx_install_dir }}"
  become: false
  environment:
    PATH: "{{ fm_bin }}:{{ ansible_facts['env']['PATH'] }}"
  when: hyperdx_source_changed
  changed_when: true

- name: Install HyperDX dependencies (first run)
  ansible.builtin.command: yarn install
  args:
    chdir: "{{ hyperdx_install_dir }}"
    creates: "{{ hyperdx_install_dir }}/node_modules"
  become: false
  environment:
    PATH: "{{ fm_bin }}:{{ ansible_facts['env']['PATH'] }}"

- name: Build common-utils
  ansible.builtin.command: yarn build:common-utils
  args:
    chdir: "{{ hyperdx_install_dir }}"
    creates: "{{ hyperdx_install_dir }}/packages/common-utils/dist"
  become: false
  environment:
    PATH: "{{ fm_bin }}:{{ ansible_facts['env']['PATH'] }}"
    NX_DAEMON: "false"

- name: Build API (tsc)
  ansible.builtin.command: npx tsc
  args:
    chdir: "{{ hyperdx_install_dir }}/packages/api"
    creates: "{{ hyperdx_install_dir }}/packages/api/build/src/index.js"
  become: false
  environment:
    PATH: "{{ fm_bin }}:{{ ansible_facts['env']['PATH'] }}"

- name: Resolve path aliases (tsc-alias)
  ansible.builtin.command: npx tsc-alias -p tsconfig.json --outDir build/src
  args:
    chdir: "{{ hyperdx_install_dir }}/packages/api"
  become: false
  changed_when: false
  environment:
    PATH: "{{ fm_bin }}:{{ ansible_facts['env']['PATH'] }}"

- name: Create proto output directory
  ansible.builtin.file:
    path: "{{ hyperdx_install_dir }}/packages/api/build/src/opamp/proto"
    state: directory
    mode: "0755"

- name: Copy OpAMP proto files to build output
  ansible.builtin.shell: >
    cp {{ hyperdx_install_dir }}/packages/api/src/opamp/proto/*.proto
    {{ hyperdx_install_dir }}/packages/api/build/src/opamp/proto/
  changed_when: false

- name: Build Next.js frontend
  ansible.builtin.command: npx next build --webpack
  args:
    chdir: "{{ hyperdx_install_dir }}/packages/app"
    creates: "{{ hyperdx_install_dir }}/packages/app/.next"
  become: false
  environment:
    PATH: "{{ fm_bin }}:{{ ansible_facts['env']['PATH'] }}"

- name: Deploy HyperDX environment file
  ansible.builtin.template:
    src: hyperdx.env.j2
    dest: "{{ hyperdx_env_file }}"
    mode: "0644"
  notify:
    - restart hyperdx-api
    - restart hyperdx-app

- name: Create credstore directory for HyperDX
  ansible.builtin.file:
    path: /etc/credstore/hyperdx
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy HyperDX secrets environment file
  ansible.builtin.template:
    src: hyperdx-secrets.env.j2
    dest: /etc/credstore/hyperdx/secrets.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify:
    - restart hyperdx-api
    - restart hyperdx-app

- name: Deploy HyperDX API systemd unit
  ansible.builtin.template:
    src: hyperdx-api.service.j2
    dest: /etc/systemd/system/hyperdx-api.service
    mode: "0644"
  notify: restart hyperdx-api

- name: Deploy HyperDX App systemd unit
  ansible.builtin.template:
    src: hyperdx-app.service.j2
    dest: /etc/systemd/system/hyperdx-app.service
    mode: "0644"
  notify: restart hyperdx-app

- name: Enable and start HyperDX API
  ansible.builtin.systemd:
    name: hyperdx-api
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for HyperDX API to be ready
  ansible.builtin.wait_for:
    port: "{{ services.hyperdx.api_port }}"
    host: "{{ services.hyperdx.host }}"
    timeout: 60

- name: Enable and start HyperDX App
  ansible.builtin.systemd:
    name: hyperdx-app
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for HyperDX App to be ready
  ansible.builtin.wait_for:
    port: "{{ services.hyperdx.app_port }}"
    host: "{{ services.hyperdx.host }}"
    timeout: 60
