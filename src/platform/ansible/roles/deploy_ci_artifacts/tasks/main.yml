---
# Stage built guest artifacts from /tmp/ci/output/ to /var/lib/ci/.

- name: Ensure CI artifacts directory exists
  ansible.builtin.file:
    path: "{{ deploy_ci_artifacts_dest_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Stage CI artifacts
  ansible.builtin.copy:
    src: "{{ deploy_ci_artifacts_source_dir }}/{{ item }}"
    dest: "{{ deploy_ci_artifacts_dest_dir }}/{{ item }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  loop: "{{ deploy_ci_artifacts_files }}"

- name: Verify staged artifacts
  ansible.builtin.stat:
    path: "{{ deploy_ci_artifacts_dest_dir }}/{{ item }}"
  loop: "{{ deploy_ci_artifacts_files }}"
  register: deploy_ci_artifacts_staged_check
  failed_when: not deploy_ci_artifacts_staged_check.stat.exists
