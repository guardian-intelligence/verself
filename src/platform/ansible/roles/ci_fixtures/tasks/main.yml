---
# Stage controlled fixture suites on the worker and verify expected CI outcomes.

- name: Verify forge-metal CLI is present on the worker
  ansible.builtin.stat:
    path: "{{ fm_bin }}/forge-metal"
  register: ci_fixtures_forge_metal_cli

- name: Fail when forge-metal CLI is missing
  ansible.builtin.fail:
    msg: >-
      forge-metal CLI not found at {{ fm_bin }}/forge-metal.
      Run: cd ansible && ansible-playbook playbooks/dev-single-node.yml
  when: not ci_fixtures_forge_metal_cli.stat.exists

- name: Verify staged CI artifacts are present
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ firecracker_kernel_path | default('/var/lib/ci/vmlinux') }}"
    - "{{ firecracker_rootfs_path | default('/var/lib/ci/rootfs.ext4') }}"
    - "{{ firecracker_guest_artifact_manifest_path | default('/var/lib/ci/guest-artifacts.json') }}"
  register: ci_fixtures_required_paths

- name: Collect missing CI artifact paths
  ansible.builtin.set_fact:
    ci_fixtures_missing_required_paths: >-
      {{
        ci_fixtures_required_paths.results
        | rejectattr('stat.exists')
        | map(attribute='stat.path')
        | list
      }}

- name: Fail when staged CI artifacts are missing
  ansible.builtin.fail:
    msg: >-
      CI fixture prerequisites are missing on the worker: {{ ci_fixtures_missing_required_paths | join(', ') }}.
      Run: cd ansible && ansible-playbook playbooks/guest-rootfs.yml
  when: ci_fixtures_missing_required_paths | length > 0

- name: Wait for Forgejo to be reachable
  ansible.builtin.wait_for:
    host: "{{ services.forgejo.host }}"
    port: "{{ services.forgejo.port }}"
    timeout: 30

- name: Check Forgejo automation token file
  ansible.builtin.stat:
    path: /etc/credstore/forgejo/automation-token
  register: ci_fixtures_forgejo_automation_token_file
  no_log: true

- name: Fail when Forgejo automation token is missing
  ansible.builtin.fail:
    msg: >-
      Forgejo automation token not found at /etc/credstore/forgejo/automation-token.
      Deploy the forgejo role first so the technical automation account can seed fixture repositories.
  when: not ci_fixtures_forgejo_automation_token_file.stat.exists

- name: Read Forgejo automation token
  ansible.builtin.slurp:
    src: /etc/credstore/forgejo/automation-token
  register: ci_fixtures_forgejo_automation_token_raw
  no_log: true

- name: Set Forgejo fixture automation facts
  ansible.builtin.set_fact:
    ci_fixtures_forgejo_owner: "{{ forgejo_automation_username | default('forgejo-automation') }}"
    ci_fixtures_forgejo_email: "{{ forgejo_automation_email | default('forgejo-automation@' ~ forge_metal_domain) }}"
    ci_fixtures_forgejo_token: "{{ ci_fixtures_forgejo_automation_token_raw.content | b64decode | trim }}"

- name: Reset fixture staging directory
  ansible.builtin.file:
    path: /opt/forge-metal/test-fixtures
    state: absent

- name: Create fixture staging directory
  ansible.builtin.file:
    path: /opt/forge-metal/test-fixtures
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Copy local fixture repositories to server
  delegate_to: localhost
  become: false
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../test/fixtures/"
    dest: /opt/forge-metal/test-fixtures/
    delete: true
    recursive: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.next"
      - "--exclude=.turbo"
      - "--exclude=dist"
      - "--no-owner"
      - "--no-group"

- name: Reset fixture suite CLI arguments
  ansible.builtin.set_fact:
    ci_fixtures_suite_args: []

- name: Build fixture suite CLI arguments
  ansible.builtin.set_fact:
    ci_fixtures_suite_args: "{{ ci_fixtures_suite_args + ['--suite', item] }}"
  loop: "{{ ci_fixtures_suites }}"

- name: Run fixture suites
  ansible.builtin.command:
    argv: "{{ [
      fm_bin ~ '/forge-metal',
      'fixtures',
      'run',
      '--fixtures-root', '/opt/forge-metal/test-fixtures',
      '--parallelism', (ci_fixtures_parallelism | int | string),
      '--forgejo-url', 'http://' ~ services.forgejo.host ~ ':' ~ (services.forgejo.port | string),
      '--owner', ci_fixtures_forgejo_owner,
      '--username', ci_fixtures_forgejo_owner,
      '--email', ci_fixtures_forgejo_email
    ] + ci_fixtures_suite_args }}"
  become: true
  environment:
    FORGE_METAL_CLICKHOUSE_PASSWORD: "{{ clickhouse_password }}"
    FORGE_METAL_FIXTURES_TOKEN: "{{ ci_fixtures_forgejo_token }}"
    PATH: "{{ fm_bin }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  changed_when: true
