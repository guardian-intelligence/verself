---
- name: Render Forgejo group-claim action script
  ansible.builtin.set_fact:
    forgejo_claim_action_script: "{{ lookup('template', 'forgejo-groups-action.js.j2') }}"

- name: Search Zitadel actions for Forgejo claim action
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/actions/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ forgejo_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ forgejo_auth_claim_action_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
    return_content: true
  register: forgejo_claim_actions
  no_log: true

- name: Set existing Forgejo claim action fact
  ansible.builtin.set_fact:
    forgejo_existing_claim_action: "{{ forgejo_claim_actions.json.result | default([]) | first | default({}) }}"

- name: Create Forgejo group-claim action
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/actions"
    method: POST
    headers:
      Authorization: "Bearer {{ forgejo_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      name: "{{ forgejo_auth_claim_action_name }}"
      script: "{{ forgejo_claim_action_script }}"
    status_code: 200
    return_content: true
  register: forgejo_claim_action_created
  when: forgejo_existing_claim_action == {}
  no_log: true

- name: Set Forgejo claim action ID fact
  ansible.builtin.set_fact:
    forgejo_claim_action_id: >-
      {{
        forgejo_existing_claim_action.id
        | default(forgejo_claim_action_created.json.id, true)
      }}

- name: Get Complement Token flow
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/flows/2"
    method: GET
    headers:
      Authorization: "Bearer {{ forgejo_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    status_code: 200
    return_content: true
  register: forgejo_complement_token_flow
  no_log: true

- name: Set Complement Token trigger facts
  ansible.builtin.set_fact:
    forgejo_pre_userinfo_action_ids: >-
      {{
        (
          forgejo_complement_token_flow.json.flow.triggerActions
          | default([])
          | selectattr('triggerType.id', 'equalto', '4')
          | map(attribute='actions')
          | first
          | default([])
        ) | map(attribute='id') | list
      }}
    forgejo_pre_access_token_action_ids: >-
      {{
        (
          forgejo_complement_token_flow.json.flow.triggerActions
          | default([])
          | selectattr('triggerType.id', 'equalto', '5')
          | map(attribute='actions')
          | first
          | default([])
        ) | map(attribute='id') | list
      }}

- name: Ensure Forgejo claim action runs before userinfo creation
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/flows/2/trigger/4"
    method: POST
    headers:
      Authorization: "Bearer {{ forgejo_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      actionIds: "{{ (forgejo_pre_userinfo_action_ids + [forgejo_claim_action_id]) | unique }}"
    status_code: 200
    return_content: true
  when: forgejo_claim_action_id not in forgejo_pre_userinfo_action_ids
  no_log: true

- name: Ensure Forgejo claim action runs before access token creation
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/flows/2/trigger/5"
    method: POST
    headers:
      Authorization: "Bearer {{ forgejo_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      actionIds: "{{ (forgejo_pre_access_token_action_ids + [forgejo_claim_action_id]) | unique }}"
    status_code: 200
    return_content: true
  when: forgejo_claim_action_id not in forgejo_pre_access_token_action_ids
  no_log: true
