---
# Forgejo git server configuration.
# Binaries provided by deploy_profile role (pinned static binaries).

- name: Create Forgejo user
  ansible.builtin.user:
    name: forgejo
    system: true
    shell: /bin/bash
    home: /var/lib/forgejo
    create_home: true

- name: Create Forgejo config directory
  ansible.builtin.file:
    path: /etc/forgejo
    state: directory
    owner: forgejo
    mode: "0751"

- name: Deploy Forgejo app.ini
  ansible.builtin.template:
    src: app.ini.j2
    dest: /etc/forgejo/app.ini
    owner: forgejo
    group: forgejo
    mode: "0640"
  notify:
    - restart forgejo

- name: Deploy Forgejo systemd unit
  ansible.builtin.template:
    src: forgejo.service.j2
    dest: /etc/systemd/system/forgejo.service
    mode: "0644"
  notify:
    - restart forgejo

- name: Regenerate Forgejo authorized_keys projection
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/forgejo"
      - admin
      - regenerate
      - keys
      - --config
      - /etc/forgejo/app.ini
  become: true
  become_user: forgejo
  environment:
    FORGEJO_WORK_DIR: /var/lib/forgejo
  changed_when: false

- name: Enable and start Forgejo
  ansible.builtin.systemd:
    name: forgejo
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Forgejo to be ready
  ansible.builtin.wait_for:
    port: "{{ topology_endpoints.forgejo.endpoints.http.port }}"
    host: "{{ topology_endpoints.forgejo.host }}"
    timeout: 60

- name: Set up Forgejo Zitadel OIDC application
  ansible.builtin.include_role:
    name: zitadel_oauth_app
  vars:
    zitadel_oauth_app_name: "{{ forgejo_auth_app_name }}"
    zitadel_oauth_app_project_name: "{{ forgejo_auth_project_name }}"
    zitadel_oauth_app_redirect_uris:
      - "https://{{ forgejo_domain }}/user/oauth2/{{ forgejo_auth_source_name }}/callback"
    zitadel_oauth_app_post_logout_redirect_uris:
      - "https://{{ forgejo_domain }}/"
    zitadel_oauth_app_credstore_dir: /etc/credstore/forgejo
    zitadel_oauth_app_credstore_group: forgejo
    zitadel_oauth_app_auth_method_type: OIDC_AUTH_METHOD_TYPE_POST
    zitadel_oauth_app_grant_types:
      - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
      - OIDC_GRANT_TYPE_REFRESH_TOKEN
    zitadel_oauth_app_create_project_if_missing: true
    zitadel_oauth_app_project_role_assertion: true
    zitadel_oauth_app_project_role_check: true
    zitadel_oauth_app_role_assertions: true

- name: Export Forgejo OIDC app facts
  ansible.builtin.set_fact:
    forgejo_project_id: "{{ zitadel_oauth_app_out_project_id }}"
    forgejo_client_id: "{{ zitadel_oauth_app_out_client_id }}"
    forgejo_client_secret: "{{ zitadel_oauth_app_out_client_secret }}"
  no_log: true

- name: Ensure Forgejo project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ zitadel_oauth_app_pat }}"
    zitadel_project_roles_project_id: "{{ forgejo_project_id }}"
    zitadel_project_roles_definitions:
      - key: "{{ forgejo_auth_admin_group }}"
        display_name: Forgejo Admin
        group: forgejo

- name: Configure Forgejo OIDC auth source
  ansible.builtin.include_tasks: configure_oauth.yml

- name: Ensure Forgejo automation token exists
  ansible.builtin.include_tasks: automation_user.yml
