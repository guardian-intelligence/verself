---
# Forgejo git server + CI runner configuration.
# Binaries provided by deploy_profile role (pinned static binaries).

- name: Create Forgejo user
  ansible.builtin.user:
    name: forgejo
    system: true
    shell: /bin/bash
    home: /var/lib/forgejo
    create_home: true

- name: Create Forgejo config directory
  ansible.builtin.file:
    path: /etc/forgejo
    state: directory
    owner: forgejo
    mode: "0751"

- name: Deploy Forgejo app.ini
  ansible.builtin.template:
    src: app.ini.j2
    dest: /etc/forgejo/app.ini
    owner: forgejo
    group: forgejo
    mode: "0640"
  notify:
    - restart forgejo

- name: Deploy Forgejo systemd unit
  ansible.builtin.template:
    src: forgejo.service.j2
    dest: /etc/systemd/system/forgejo.service
    mode: "0644"
  notify:
    - restart forgejo

- name: Enable and start Forgejo
  ansible.builtin.systemd:
    name: forgejo
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Forgejo to be ready
  ansible.builtin.wait_for:
    port: "{{ services.forgejo.port }}"
    host: "{{ services.forgejo.host }}"
    timeout: 60

- name: Set up Zitadel OIDC application
  ansible.builtin.include_tasks: zitadel_app.yml

- name: Configure Forgejo OAuth source
  ansible.builtin.include_tasks: configure_oauth.yml

- name: Ensure Forgejo automation token exists
  ansible.builtin.include_tasks: automation_user.yml

- name: Deploy Forgejo Runner systemd unit
  ansible.builtin.template:
    src: forgejo-runner.service.j2
    dest: /etc/systemd/system/forgejo-runner.service
    mode: "0644"
  notify:
    - restart forgejo-runner

- name: Flush handlers before runner registration
  ansible.builtin.meta: flush_handlers

- name: Include runner registration
  ansible.builtin.include_tasks: register_runner.yml
