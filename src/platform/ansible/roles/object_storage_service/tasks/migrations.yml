---
- name: Apply object-storage-service PostgreSQL migrations
  ansible.builtin.include_role:
    name: service_pg_migrations
  vars:
    service_pg_migrations_service: object-storage-service
    service_pg_migrations_db: object_storage_service
    service_pg_migrations_db_user: object_storage_service
    service_pg_migrations_db_owner: object_storage_service
    service_pg_migrations_db_password: "{{ object_storage_service_pg_password }}"
    service_pg_migrations_source_dir: "{{ playbook_dir }}/../../../object-storage-service/migrations"
    service_pg_migrations_probe_table: object_storage_buckets
    service_pg_migrations_stop_units:
      - object-storage-service
    service_pg_migrations_force_reset: "{{ object_storage_service_force_schema_reset | bool }}"

- name: Reconcile object-storage-service object ownership and privileges
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres
      -d object_storage_service
      -v ON_ERROR_STOP=1
    stdin: |
      DO $$
      BEGIN
        IF to_regclass('public.object_storage_buckets') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.object_storage_buckets OWNER TO object_storage_service';
        END IF;
        IF to_regclass('public.object_storage_bucket_aliases') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.object_storage_bucket_aliases OWNER TO object_storage_service';
        END IF;
        IF to_regclass('public.object_storage_credentials') IS NOT NULL THEN
          EXECUTE 'ALTER TABLE public.object_storage_credentials OWNER TO object_storage_service';
        END IF;
      END
      $$;
      GRANT USAGE, CREATE ON SCHEMA public TO object_storage_service;
      GRANT ALL PRIVILEGES ON TABLE
        public.object_storage_buckets,
        public.object_storage_bucket_aliases,
        public.object_storage_credentials
      TO object_storage_service;
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  changed_when: false
  no_log: true
