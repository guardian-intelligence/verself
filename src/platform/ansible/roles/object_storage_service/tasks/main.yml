---
- name: Verify object-storage-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/object-storage-service"
  register: object_storage_service_binary
  failed_when: not object_storage_service_binary.stat.exists

- name: Verify object-storage-secret-sync binary exists in profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/object-storage-secret-sync"
  register: object_storage_secret_sync_binary
  failed_when: not object_storage_secret_sync_binary.stat.exists

- name: Create object_storage_service system group
  ansible.builtin.group:
    name: object_storage_service
    system: true

- name: Create object_storage_admin system group
  ansible.builtin.group:
    name: object_storage_admin
    system: true

- name: Ensure spire workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create object_storage_service system user
  ansible.builtin.user:
    name: object_storage_service
    uid: "{{ object_storage_service_uid }}"
    group: object_storage_service
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/object-storage-service
    create_home: false

- name: Create object_storage_admin system user
  ansible.builtin.user:
    name: object_storage_admin
    uid: "{{ object_storage_admin_uid }}"
    group: object_storage_admin
    groups:
      - object_storage_service
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/object-storage-admin
    create_home: false

- name: Resolve object-storage runtime uids for SPIRE registration
  ansible.builtin.command:
    cmd: "id -u {{ item.user }}"
  loop:
    - { user: object_storage_service, entry_id: forge-metal-object-storage-service, spiffe_id: "{{ spire_object_storage_service_id }}" }
    - { user: object_storage_admin, entry_id: forge-metal-object-storage-admin, spiffe_id: "{{ spire_object_storage_admin_id }}" }
  loop_control:
    label: "{{ item.user }}"
  register: object_storage_runtime_uids
  changed_when: false

- name: Read object-storage SPIRE registrations
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server entry show
      -socketPath {{ spire_server_socket_path }}
      -entryID {{ item.entry_id }}
      -output json
  loop:
    - { user: object_storage_service, entry_id: forge-metal-object-storage-service, spiffe_id: "{{ spire_object_storage_service_id }}" }
    - { user: object_storage_admin, entry_id: forge-metal-object-storage-admin, spiffe_id: "{{ spire_object_storage_admin_id }}" }
  loop_control:
    label: "{{ item.entry_id }}"
  register: object_storage_spire_entries
  failed_when: false
  changed_when: false

- name: Register object-storage SPIFFE workloads
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server entry create
      -socketPath {{ spire_server_socket_path }}
      -entryID {{ item.item.entry_id }}
      -parentID {{ spire_agent_id }}
      -spiffeID {{ item.item.spiffe_id }}
      -selector unix:uid:{{ object_storage_runtime_uids.results[ansible_loop.index0].stdout | trim }}
      -x509SVIDTTL 3600
  loop: "{{ object_storage_spire_entries.results }}"
  loop_control:
    label: "{{ item.item.entry_id }}"
    extended: true
  when: item.rc != 0 or item.item.entry_id not in item.stdout
  changed_when: true
  notify:
    - restart object-storage-admin
    - restart object-storage-service

- name: Update object-storage SPIRE workload selector drift
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server entry update
      -socketPath {{ spire_server_socket_path }}
      -entryID {{ item.item.entry_id }}
      -parentID {{ spire_agent_id }}
      -spiffeID {{ item.item.spiffe_id }}
      -selector unix:uid:{{ object_storage_runtime_uids.results[ansible_loop.index0].stdout | trim }}
      -x509SVIDTTL 3600
  loop: "{{ object_storage_spire_entries.results }}"
  loop_control:
    label: "{{ item.item.entry_id }}"
    extended: true
  when:
    - item.rc == 0
    - "'uid:' ~ (object_storage_runtime_uids.results[ansible_loop.index0].stdout | trim) not in item.stdout"
  changed_when: true
  notify:
    - restart object-storage-admin
    - restart object-storage-service

- name: Deploy object-storage nftables rulesets
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: object-storage-service.nft.j2, dest: /etc/nftables.d/object-storage-service.nft }
    - { src: object-storage-admin.nft.j2, dest: /etc/nftables.d/object-storage-admin.nft }
  loop_control:
    label: "{{ item.dest }}"
  notify: reload nftables

- name: Apply object-storage nftables before proceeding
  ansible.builtin.meta: flush_handlers

- name: Create object-storage runtime state directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "0750"
  loop:
    - { path: /var/lib/object-storage-service, owner: object_storage_service, group: object_storage_service }
    - { path: /var/lib/object-storage-admin, owner: object_storage_admin, group: object_storage_admin }

- name: Include object-storage-service credential tasks
  ansible.builtin.include_tasks: credentials.yml

- name: Include object-storage-service PostgreSQL database tasks
  ansible.builtin.include_tasks: database.yml

- name: Include object-storage-service PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

- name: Derive ClickHouse operator client command for object-storage-service grants
  ansible.builtin.set_fact:
    object_storage_clickhouse_operator_client_command: >-
      {{
        clickhouse_operator_client_command
        | default(
            'sudo -u '
            ~ (clickhouse_operator_system_user | default('clickhouse_operator'))
            ~ ' '
            ~ fm_bin
            ~ '/clickhouse-client --config-file '
            ~ (clickhouse_operator_client_config_path | default('/etc/clickhouse-client/operator.xml'))
            ~ ' --user '
            ~ (clickhouse_operator_db_user | default('clickhouse_operator')),
            true
          )
      }}

- name: Derive Garage endpoint lists for object-storage runtimes
  ansible.builtin.set_fact:
    object_storage_garage_s3_urls: "{{ object_storage_garage_s3_endpoints }}"
    object_storage_garage_admin_urls: "{{ object_storage_garage_admin_endpoints }}"
  vars:
    object_storage_garage_s3_endpoints: >-
      {{
        (
          'http://' ~ services.garage.host ~ ':'
          ~ (
            services.garage.nodes
            | map(attribute='s3_port')
            | map('string')
            | join(',http://' ~ services.garage.host ~ ':')
          )
        )
      }}
    object_storage_garage_admin_endpoints: >-
      {{
        (
          'http://' ~ services.garage.host ~ ':'
          ~ (
            services.garage.nodes
            | map(attribute='admin_port')
            | map('string')
            | join(',http://' ~ services.garage.host ~ ':')
          )
        )
      }}

- name: Ensure object-storage-service ClickHouse user exists with access-event grants
  ansible.builtin.shell: |
    set -euo pipefail
    {{ object_storage_clickhouse_operator_client_command }} --multiquery <<'SQL'
    CREATE USER IF NOT EXISTS object_storage_service IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_object_storage_service_id }}' HOST LOCAL;
    ALTER USER object_storage_service IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_object_storage_service_id }}' HOST LOCAL;
    GRANT INSERT ON forge_metal.object_access_events TO object_storage_service;
    GRANT SELECT ON forge_metal.object_access_events TO object_storage_service;
    SQL
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Deploy object-storage-service systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/object-storage-service.service
    mode: "0644"
    content: |
      [Unit]
      Description=Object Storage Service
      After=forge-metal-firewall.target network.target postgresql.service clickhouse-server.service secrets-service.service garage@0.service garage@1.service garage@2.service spire-agent.service
      Requires=forge-metal-firewall.target
      Wants=postgresql.service clickhouse-server.service secrets-service.service garage@0.service garage@1.service garage@2.service spire-agent.service

      [Service]
      Type=simple
      User=object_storage_service
      Group=object_storage_service
      SupplementaryGroups={{ spire_workload_group }}
      LoadCredential=credential-kek:/etc/credstore/object-storage-service/credential-kek
      LoadCredential=clickhouse-ca-cert:/etc/clickhouse-server/tls/server-ca.pem
      LoadCredential=s3-tls-cert:/etc/object-storage-service/tls/server-cert.pem
      LoadCredential=s3-tls-key:/etc/object-storage-service/tls/server-key.pem
      Environment=OBJECT_STORAGE_ROLE=s3
      Environment=OBJECT_STORAGE_S3_LISTEN_ADDR={{ services.object_storage_service.host }}:{{ services.object_storage_service.port }}
      Environment=OBJECT_STORAGE_PG_DSN=postgres://object_storage_service@/object_storage_service?host=/var/run/postgresql&sslmode=disable
      Environment=OBJECT_STORAGE_CH_ADDRESS={{ services.clickhouse.host }}:{{ services.clickhouse.secure_native_port }}
      Environment=OBJECT_STORAGE_CH_USER=object_storage_service
      Environment=OBJECT_STORAGE_SECRETS_URL=https://{{ services.secrets_service.host }}:{{ services.secrets_service.internal_port }}
      Environment=OBJECT_STORAGE_SECRETS_SPIFFE_ID={{ spire_secrets_service_id }}
      Environment=OBJECT_STORAGE_GARAGE_S3_URLS={{ object_storage_garage_s3_urls }}
      Environment=OBJECT_STORAGE_GARAGE_REGION=garage
      Environment=SPIFFE_ENDPOINT_SOCKET=unix://{{ spire_agent_socket_path }}
      Environment=OTEL_EXPORTER_OTLP_ENDPOINT=http://{{ services.otelcol.host }}:{{ services.otelcol.grpc_port }}
      ExecStart={{ fm_bin }}/object-storage-service
      Restart=on-failure
      RestartSec=5
      ProtectSystem=strict
      ProtectHome=true
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectControlGroups=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictNamespaces=true
      PrivateTmp=true
      ReadWritePaths=/var/lib/object-storage-service
      UMask=0077

      [Install]
      WantedBy=multi-user.target
  notify: restart object-storage-service

- name: Deploy object-storage-admin systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/object-storage-admin.service
    mode: "0644"
    content: |
      [Unit]
      Description=Object Storage Admin
      After=forge-metal-firewall.target network.target postgresql.service governance-service.service garage@0.service garage@1.service garage@2.service spire-agent.service
      Requires=forge-metal-firewall.target
      Wants=postgresql.service governance-service.service garage@0.service garage@1.service garage@2.service spire-agent.service

      [Service]
      Type=simple
      User=object_storage_admin
      Group=object_storage_admin
      SupplementaryGroups=object_storage_service {{ spire_workload_group }}
      LoadCredential=credential-kek:/etc/credstore/object-storage-service/credential-kek
      LoadCredential=garage-admin-token:/etc/garage/admin-token
      LoadCredential=garage-proxy-access-key-id:/etc/credstore/object-storage-service/garage-proxy-access-key-id
      Environment=OBJECT_STORAGE_ROLE=admin
      Environment=OBJECT_STORAGE_ADMIN_LISTEN_ADDR={{ services.object_storage_service.host }}:{{ services.object_storage_service.admin_port }}
      Environment=OBJECT_STORAGE_PG_DSN=postgres://object_storage_service@/object_storage_service?host=/var/run/postgresql&sslmode=disable
      Environment=OBJECT_STORAGE_GARAGE_ADMIN_URLS={{ object_storage_garage_admin_urls }}
      Environment=OBJECT_STORAGE_GARAGE_REGION=garage
      Environment=OBJECT_STORAGE_GOVERNANCE_AUDIT_URL=https://{{ services.governance_service.host }}:{{ services.governance_service.internal_port }}
      Environment=OBJECT_STORAGE_GOVERNANCE_SPIFFE_ID={{ spire_governance_service_id }}
      Environment=OBJECT_STORAGE_ADMIN_CLIENT_SPIFFE_IDS={{ spire_object_storage_admin_id }}
      Environment=SPIFFE_ENDPOINT_SOCKET=unix://{{ spire_agent_socket_path }}
      Environment=OTEL_EXPORTER_OTLP_ENDPOINT=http://{{ services.otelcol.host }}:{{ services.otelcol.grpc_port }}
      ExecStart={{ fm_bin }}/object-storage-service
      Restart=on-failure
      RestartSec=5
      ProtectSystem=strict
      ProtectHome=true
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectControlGroups=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictNamespaces=true
      PrivateTmp=true
      ReadWritePaths=/var/lib/object-storage-admin
      UMask=0077

      [Install]
      WantedBy=multi-user.target
  notify: restart object-storage-admin

- name: Apply object-storage unit changes before proceeding
  ansible.builtin.meta: flush_handlers

- name: Enable and start object-storage units
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - object-storage-admin
    - object-storage-service

- name: Wait for object-storage admin port
  ansible.builtin.wait_for:
    host: "{{ services.object_storage_service.host }}"
    port: "{{ services.object_storage_service.admin_port }}"
    timeout: 30

- name: Wait for object-storage-service S3 port
  ansible.builtin.wait_for:
    host: "{{ services.object_storage_service.host }}"
    port: "{{ services.object_storage_service.port }}"
    timeout: 30

- name: Verify object-storage-service S3 health
  ansible.builtin.command:
    argv:
      - curl
      - --fail
      - --silent
      - --show-error
      - --cacert
      - /etc/forge-metal/local-cas/object-storage-s3-ca.pem
      - https://127.0.0.1:{{ services.object_storage_service.port }}/healthz
  changed_when: false
