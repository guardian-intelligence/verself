---
- name: Create credstore directory for object-storage-service
  ansible.builtin.file:
    path: /etc/credstore/object-storage-service
    state: directory
    owner: root
    group: object_storage_service
    mode: "0750"

- name: Create object-storage-service TLS directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/object-storage-service, owner: root, group: object_storage_service, mode: "0750" }
    - { path: /etc/object-storage-service/tls, owner: root, group: object_storage_service, mode: "0750" }
    - { path: /etc/verself, owner: root, group: root, mode: "0755" }
    - { path: /etc/verself/local-cas, owner: root, group: root, mode: "0755" }

- name: Check object-storage-service generated credentials
  ansible.builtin.stat:
    path: "/etc/credstore/object-storage-service/{{ item }}"
  loop:
    - pg-password
    - credential-kek
  register: object_storage_service_generated_credential_files
  no_log: true

- name: Generate missing object-storage-service generated credentials
  ansible.builtin.copy:
    content: >-
      {{
        lookup(
          'password',
          (item.item == 'credential-kek')
          | ternary('/dev/null length=64 chars=hexdigits', '/dev/null length=64 chars=ascii_letters,digits')
        ) | trim
      }}
    dest: "/etc/credstore/object-storage-service/{{ item.item }}"
    owner: root
    group: object_storage_service
    mode: "0640"
  loop: "{{ object_storage_service_generated_credential_files.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: not item.stat.exists
  no_log: true

- name: Converge object-storage-service generated credential permissions
  ansible.builtin.file:
    path: "/etc/credstore/object-storage-service/{{ item }}"
    owner: root
    group: object_storage_service
    mode: "0640"
  loop:
    - pg-password
    - credential-kek

- name: Read object-storage-service generated PostgreSQL password
  ansible.builtin.slurp:
    src: /etc/credstore/object-storage-service/pg-password
  register: object_storage_service_pg_password_raw
  no_log: true

- name: Set object-storage-service generated PostgreSQL password fact
  ansible.builtin.set_fact:
    object_storage_service_pg_password: "{{ object_storage_service_pg_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Deploy object-storage-service server certificate extensions
  ansible.builtin.copy:
    dest: /etc/object-storage-service/tls/server-cert.ext
    owner: root
    group: object_storage_service
    mode: "0640"
    content: |
      basicConstraints=CA:FALSE
      keyUsage=digitalSignature,keyEncipherment
      extendedKeyUsage=serverAuth
      subjectAltName=IP:127.0.0.1,DNS:localhost

- name: Generate object-storage-service local CA private key
  ansible.builtin.command:
    argv:
      - openssl
      - genrsa
      - -out
      - /etc/object-storage-service/tls/server-ca-key.pem
      - "4096"
    creates: /etc/object-storage-service/tls/server-ca-key.pem

- name: Generate object-storage-service local CA certificate
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -x509
      - -new
      - -nodes
      - -key
      - /etc/object-storage-service/tls/server-ca-key.pem
      - -sha256
      - -days
      - "3650"
      - -out
      - /etc/object-storage-service/tls/server-ca.pem
      - -subj
      - /CN=Verself object-storage local CA
    creates: /etc/object-storage-service/tls/server-ca.pem

- name: Generate object-storage-service server private key and CSR
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -new
      - -newkey
      - rsa:2048
      - -nodes
      - -keyout
      - /etc/object-storage-service/tls/server-key.pem
      - -out
      - /etc/object-storage-service/tls/server.csr
      - -subj
      - /CN=127.0.0.1
    creates: /etc/object-storage-service/tls/server-key.pem

- name: Sign object-storage-service server certificate
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -req
      - -in
      - /etc/object-storage-service/tls/server.csr
      - -CA
      - /etc/object-storage-service/tls/server-ca.pem
      - -CAkey
      - /etc/object-storage-service/tls/server-ca-key.pem
      - -CAcreateserial
      - -out
      - /etc/object-storage-service/tls/server-cert.pem
      - -days
      - "3650"
      - -sha256
      - -extfile
      - /etc/object-storage-service/tls/server-cert.ext
    creates: /etc/object-storage-service/tls/server-cert.pem

- name: Converge object-storage-service TLS material ownership
  ansible.builtin.file:
    path: "/etc/object-storage-service/tls/{{ item.name }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { name: server-ca.pem, owner: root, group: object_storage_service, mode: "0640" }
    - { name: server-ca-key.pem, owner: root, group: root, mode: "0600" }
    - { name: server-cert.pem, owner: root, group: object_storage_service, mode: "0640" }
    - { name: server-key.pem, owner: root, group: object_storage_service, mode: "0640" }
    - { name: server.csr, owner: root, group: object_storage_service, mode: "0640" }
    - { name: server-cert.ext, owner: root, group: object_storage_service, mode: "0640" }

- name: Check object-storage-service local CA serial file
  ansible.builtin.stat:
    path: /etc/object-storage-service/tls/server-ca.srl
  register: object_storage_service_server_ca_serial

- name: Set object-storage-service local CA serial ownership
  ansible.builtin.file:
    path: /etc/object-storage-service/tls/server-ca.srl
    owner: root
    group: root
    mode: "0600"
  when: object_storage_service_server_ca_serial.stat.exists

- name: Copy object-storage-service local CA into operator bundle path
  ansible.builtin.copy:
    src: /etc/object-storage-service/tls/server-ca.pem
    dest: /etc/verself/local-cas/object-storage-s3-ca.pem
    remote_src: true
    owner: root
    group: root
    mode: "0644"

- name: Check object-storage-service Garage proxy credential files
  ansible.builtin.stat:
    path: "/etc/credstore/object-storage-service/{{ item }}"
  loop:
    - garage-proxy-access-key-id
    - garage-proxy-secret-access-key
  register: object_storage_service_proxy_credential_files
  no_log: true

- name: Assert object-storage-service Garage proxy credentials are either both present or both absent
  ansible.builtin.assert:
    that:
      - >-
        (
          object_storage_service_proxy_credential_files.results[0].stat.exists
          and object_storage_service_proxy_credential_files.results[1].stat.exists
        ) or (
          not object_storage_service_proxy_credential_files.results[0].stat.exists
          and not object_storage_service_proxy_credential_files.results[1].stat.exists
        )
    fail_msg: Garage proxy credentials are partially present; delete both files and redeploy.

- name: Read Garage admin token for object-storage-service bootstrap
  ansible.builtin.slurp:
    src: /etc/garage/admin-token
  register: object_storage_service_garage_admin_token_raw
  no_log: true

- name: Create object-storage-service Garage proxy key
  ansible.builtin.uri:
    url: "http://{{ topology_clusters.garage.host }}:{{ topology_clusters.garage.nodes[0].admin_port }}/v2/CreateKey"
    method: POST
    headers:
      Authorization: "Bearer {{ object_storage_service_garage_admin_token_raw.content | b64decode | trim }}"
    body_format: json
    body:
      name: object-storage-service-proxy
      neverExpires: true
    return_content: true
    status_code: 200
  register: object_storage_service_proxy_key_created
  when: not object_storage_service_proxy_credential_files.results[0].stat.exists
  no_log: true

- name: Persist object-storage-service Garage proxy access key id
  ansible.builtin.copy:
    content: "{{ object_storage_service_proxy_key_created.json.accessKeyId }}\n"
    dest: /etc/credstore/object-storage-service/garage-proxy-access-key-id
    owner: root
    group: object_storage_service
    mode: "0640"
  when: not object_storage_service_proxy_credential_files.results[0].stat.exists
  no_log: true

- name: Persist object-storage-service Garage proxy secret access key
  ansible.builtin.copy:
    content: "{{ object_storage_service_proxy_key_created.json.secretAccessKey }}\n"
    dest: /etc/credstore/object-storage-service/garage-proxy-secret-access-key
    owner: root
    group: object_storage_service
    mode: "0640"
  when: not object_storage_service_proxy_credential_files.results[1].stat.exists
  no_log: true

- name: Sync object-storage-service runtime proxy secrets through secrets-service
  become: true
  become_user: object_storage_admin
  ansible.builtin.command:
    argv:
      - "{{ verself_bin }}/object-storage-secret-sync"
  environment:
    SPIFFE_ENDPOINT_SOCKET: "unix://{{ spire_agent_socket_path }}"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ topology_endpoints.otelcol.endpoints.otlp_grpc.address }}"
    OBJECT_STORAGE_SECRET_SYNC_SECRETS_URL: "https://{{ topology_endpoints.secrets_service.endpoints.internal_https.address }}"
  changed_when: false
  no_log: true
