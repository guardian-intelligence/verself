---
- name: Ensure object_storage_service PostgreSQL role and database exist
  module_defaults:
    community.postgresql.postgresql_user:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      trust_input: false
    community.postgresql.postgresql_db:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      maintenance_db: postgres
      trust_input: false
    community.postgresql.postgresql_owner:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: postgres
      trust_input: false
  block:
    - name: Ensure object_storage_service PostgreSQL user exists
      community.postgresql.postgresql_user:
        name: object_storage_service
        password: "{{ object_storage_service_pg_password }}"
        role_attr_flags: LOGIN
        conn_limit: "{{ postgresql_role_connection_limits.object_storage_service }}"
      no_log: true

    - name: Ensure object_storage_service database exists
      community.postgresql.postgresql_db:
        name: object_storage_service
        owner: object_storage_service
        state: present
      no_log: true

    - name: Ensure object_storage_service owns object_storage_service database
      community.postgresql.postgresql_owner:
        obj_name: object_storage_service
        obj_type: database
        new_owner: object_storage_service
      no_log: true
