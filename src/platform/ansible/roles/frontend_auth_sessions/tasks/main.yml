---
- name: Create frontend auth credstore directory
  ansible.builtin.file:
    path: "{{ frontend_auth_sessions_credstore_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Check for existing frontend auth PostgreSQL password
  ansible.builtin.stat:
    path: "{{ frontend_auth_sessions_credstore_dir }}/pg-password"
  register: frontend_auth_sessions_pg_password_file

- name: Generate frontend auth PostgreSQL password
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    dest: "{{ frontend_auth_sessions_credstore_dir }}/pg-password"
    owner: root
    group: root
    mode: "0600"
  when: not frontend_auth_sessions_pg_password_file.stat.exists
  no_log: true

- name: Converge frontend auth PostgreSQL password permissions
  ansible.builtin.file:
    path: "{{ frontend_auth_sessions_credstore_dir }}/pg-password"
    owner: root
    group: root
    mode: "0600"

- name: Read frontend auth PostgreSQL password
  ansible.builtin.slurp:
    src: "{{ frontend_auth_sessions_credstore_dir }}/pg-password"
  register: frontend_auth_sessions_pg_password_raw

- name: Set frontend auth PostgreSQL password fact
  ansible.builtin.set_fact:
    frontend_auth_sessions_pg_password: >-
      {{ frontend_auth_sessions_pg_password_raw.content | b64decode | trim }}

- name: Ensure frontend auth PostgreSQL role and database exist
  module_defaults:
    community.postgresql.postgresql_user:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      trust_input: false
    community.postgresql.postgresql_db:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      maintenance_db: postgres
      trust_input: false
    community.postgresql.postgresql_owner:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: postgres
      trust_input: false
  block:
    - name: Ensure frontend auth PostgreSQL user exists
      community.postgresql.postgresql_user:
        name: "{{ frontend_auth_sessions_db_user }}"
        password: "{{ frontend_auth_sessions_pg_password }}"
        role_attr_flags: LOGIN
        conn_limit: "{{ postgresql_role_connection_limits.frontend_auth }}"
      no_log: true

    - name: Ensure frontend auth database exists
      community.postgresql.postgresql_db:
        name: "{{ frontend_auth_sessions_db_name }}"
        owner: "{{ frontend_auth_sessions_db_user }}"
        state: present
      no_log: true

    - name: Ensure frontend auth database ownership
      community.postgresql.postgresql_owner:
        obj_name: "{{ frontend_auth_sessions_db_name }}"
        obj_type: database
        new_owner: "{{ frontend_auth_sessions_db_user }}"
      no_log: true

- name: Apply frontend auth schema
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U {{ frontend_auth_sessions_db_user }}
      -d {{ frontend_auth_sessions_db_name }}
      -v ON_ERROR_STOP=1
    stdin: "{{ lookup('ansible.builtin.file', playbook_dir + '/../../../viteplus-monorepo/packages/auth-web/schema/001_auth_sessions.up.sql') }}"
  environment:
    PGPASSWORD: "{{ frontend_auth_sessions_pg_password }}"
  changed_when: false
  no_log: true
