---
- name: Create credstore directory for notifications-service
  ansible.builtin.file:
    path: /etc/credstore/notifications-service
    state: directory
    owner: root
    group: notifications_service
    mode: "0750"

- name: Check notifications-service generated credentials
  ansible.builtin.stat:
    path: "/etc/credstore/notifications-service/{{ item }}"
  loop:
    - pg-password
  register: notifications_service_generated_credential_files
  no_log: true

- name: Generate notifications-service missing credentials
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: "/etc/credstore/notifications-service/{{ item.item }}"
    owner: root
    group: notifications_service
    mode: "0640"
  loop: "{{ notifications_service_generated_credential_files.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: not item.stat.exists
  no_log: true

- name: Converge notifications-service generated credential permissions
  ansible.builtin.file:
    path: "/etc/credstore/notifications-service/{{ item }}"
    owner: root
    group: notifications_service
    mode: "0640"
  loop:
    - pg-password

- name: Read notifications-service generated PostgreSQL password
  ansible.builtin.slurp:
    src: /etc/credstore/notifications-service/pg-password
  register: notifications_service_pg_password_raw
  no_log: true

- name: Set notifications-service generated PostgreSQL password fact
  ansible.builtin.set_fact:
    notifications_service_pg_password: "{{ notifications_service_pg_password_raw.content | b64decode | trim }}"
  no_log: true
