---
- name: Apply notifications-service PostgreSQL migrations
  ansible.builtin.include_role:
    name: service_pg_migrations
  vars:
    service_pg_migrations_service: notifications-service
    service_pg_migrations_db: "{{ notifications_service_pg_database }}"
    service_pg_migrations_db_user: notifications_service
    service_pg_migrations_db_owner: notifications_service
    service_pg_migrations_db_password: "{{ notifications_service_pg_password }}"
    service_pg_migrations_source_dir: "{{ playbook_dir }}/../../../notifications-service/migrations"
    service_pg_migrations_probe_table: notification_inbox_state
    service_pg_migrations_stop_units:
      - notifications-service
      - electric-notifications
    service_pg_migrations_force_reset: "{{ notifications_service_force_schema_reset | bool }}"
