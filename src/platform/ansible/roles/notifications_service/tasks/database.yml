---
- name: Ensure notifications_service PostgreSQL role and database exist
  module_defaults:
    community.postgresql.postgresql_user:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      trust_input: false
    community.postgresql.postgresql_db:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      maintenance_db: postgres
      trust_input: false
    community.postgresql.postgresql_owner:
      login_host: "{{ topology_endpoints.postgresql.host }}"
      login_port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: postgres
      trust_input: false
  block:
    - name: Ensure notifications_service PostgreSQL user exists
      community.postgresql.postgresql_user:
        name: notifications_service
        password: "{{ notifications_service_pg_password }}"
        role_attr_flags: LOGIN
        conn_limit: "{{ postgresql_role_connection_limits.notifications_service }}"
      no_log: true

    - name: Ensure notifications_service database exists
      community.postgresql.postgresql_db:
        name: "{{ notifications_service_pg_database }}"
        owner: notifications_service
        state: present
      no_log: true

    - name: Ensure notifications_service owns notifications_service database
      community.postgresql.postgresql_owner:
        obj_name: "{{ notifications_service_pg_database }}"
        obj_type: database
        new_owner: notifications_service
      no_log: true
