---
- name: Verify notifications-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/notifications-service"
  register: notifications_service_binary
  failed_when: not notifications_service_binary.stat.exists

- name: Create notifications_service system group
  ansible.builtin.group:
    name: notifications_service
    system: true

- name: Ensure spire workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create notifications_service system user
  ansible.builtin.user:
    name: notifications_service
    group: notifications_service
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Resolve notifications-service uid for SPIRE registration
  ansible.builtin.command:
    cmd: id -u notifications_service
  register: notifications_service_uid
  changed_when: false

- name: Read notifications-service SPIRE registration
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server entry show
      -socketPath {{ spire_server_socket_path }}
      -entryID forge-metal-notifications-service
      -output json
  register: notifications_service_spire_entry
  failed_when: false
  changed_when: false

- name: Register notifications-service SPIFFE workload
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server entry create
      -socketPath {{ spire_server_socket_path }}
      -entryID forge-metal-notifications-service
      -parentID {{ spire_agent_id }}
      -spiffeID {{ spire_notifications_service_id }}
      -selector unix:uid:{{ notifications_service_uid.stdout | trim }}
      -x509SVIDTTL 3600
  when: notifications_service_spire_entry.rc != 0 or 'forge-metal-notifications-service' not in notifications_service_spire_entry.stdout
  changed_when: true
  notify: restart notifications-service

- name: Update notifications-service SPIRE workload selector drift
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server entry update
      -socketPath {{ spire_server_socket_path }}
      -entryID forge-metal-notifications-service
      -parentID {{ spire_agent_id }}
      -spiffeID {{ spire_notifications_service_id }}
      -selector unix:uid:{{ notifications_service_uid.stdout | trim }}
      -x509SVIDTTL 3600
  when:
    - notifications_service_spire_entry.rc == 0
    - "'uid:' ~ (notifications_service_uid.stdout | trim) not in notifications_service_spire_entry.stdout"
  changed_when: true
  notify: restart notifications-service

- name: Deploy notifications-service nftables ruleset
  ansible.builtin.template:
    src: notifications-service.nft.j2
    dest: /etc/nftables.d/notifications-service.nft
    mode: "0644"
  notify: reload nftables

- name: Apply notifications-service nftables before proceeding
  ansible.builtin.meta: flush_handlers

- name: Include notifications-service generated credential tasks
  ansible.builtin.include_tasks: credentials.yml

- name: Include notifications-service PostgreSQL database tasks
  ansible.builtin.include_tasks: database.yml

- name: Include notifications-service PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

- name: Ensure notifications-service ClickHouse user exists with ledger grants
  ansible.builtin.shell: |
    set -euo pipefail
    {{ clickhouse_operator_client_command }} --multiquery <<'SQL'
    CREATE USER IF NOT EXISTS notifications_service IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_notifications_service_id }}' HOST LOCAL;
    ALTER USER notifications_service IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_notifications_service_id }}' HOST LOCAL;
    GRANT INSERT ON forge_metal.notification_events TO notifications_service;
    GRANT SELECT ON forge_metal.notification_events TO notifications_service;
    SQL
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Wait for Zitadel before resolving notifications-service auth audience
  ansible.builtin.wait_for:
    host: "{{ services.zitadel.host }}"
    port: "{{ services.zitadel.port }}"
    timeout: 60

- name: Read Zitadel admin PAT for notifications-service auth setup
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: notifications_service_zitadel_admin_pat_raw
  no_log: true

- name: Set notifications-service Zitadel admin PAT fact
  ansible.builtin.set_fact:
    notifications_service_zitadel_admin_pat: "{{ notifications_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
  no_log: true

- name: Find identity-service auth project for notifications-service bearer validation
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ notifications_service_zitadel_admin_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: "{{ notifications_service_identity_project_name }}"
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
    return_content: true
  register: notifications_service_identity_project_search
  no_log: true

- name: Assert identity-service auth project exists for notifications-service
  ansible.builtin.assert:
    that: (notifications_service_identity_project_search.json.result | default([])) | length > 0
    fail_msg: >-
      Identity-service Zitadel project '{{ notifications_service_identity_project_name }}'
      not found. Run the identity_service role before notifications_service.

- name: Set notifications-service auth audience fact
  ansible.builtin.set_fact:
    notifications_service_auth_audience: "{{ notifications_service_identity_project_search.json.result[0].id }}"

- name: Deploy notifications-service systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Notifications Service
      After=forge-metal-firewall.target network.target postgresql.service clickhouse-server.service nats.service zitadel.service spire-agent.service
      Requires=forge-metal-firewall.target
      Wants=postgresql.service clickhouse-server.service nats.service zitadel.service spire-agent.service

      [Service]
      Type=simple
      User=notifications_service
      Group=notifications_service
      SupplementaryGroups={{ spire_workload_group }}
      BindReadOnlyPaths=/etc/forge-metal/auth-discovery-hosts:/etc/hosts
      LoadCredential=clickhouse-ca-cert:/etc/clickhouse-server/tls/server-ca.pem
      Environment=NOTIFICATIONS_LISTEN_ADDR={{ services.notifications_service.host }}:{{ services.notifications_service.port }}
      Environment=NOTIFICATIONS_PG_DSN=postgres://notifications_service@/{{ notifications_service_pg_database }}?host=/var/run/postgresql&sslmode=disable
      Environment=NOTIFICATIONS_PG_MAX_CONNS={{ notifications_service_pg_max_conns }}
      Environment=NOTIFICATIONS_PG_MIN_CONNS={{ notifications_service_pg_min_conns }}
      Environment=NOTIFICATIONS_PG_CONN_MAX_LIFETIME_SECONDS={{ notifications_service_pg_conn_max_lifetime_seconds }}
      Environment=NOTIFICATIONS_PG_CONN_MAX_IDLE_SECONDS={{ notifications_service_pg_conn_max_idle_seconds }}
      Environment=NOTIFICATIONS_CH_ADDRESS={{ services.clickhouse.host }}:{{ services.clickhouse.secure_native_port }}
      Environment=NOTIFICATIONS_CH_USER=notifications_service
      Environment=NOTIFICATIONS_NATS_URL=tls://{{ services.nats.host }}:{{ services.nats.port }}
      Environment=NOTIFICATIONS_AUTH_ISSUER_URL={{ notifications_service_auth_issuer_url }}
      Environment=NOTIFICATIONS_AUTH_AUDIENCE={{ notifications_service_auth_audience }}
      Environment=SPIFFE_ENDPOINT_SOCKET=unix://{{ spire_agent_socket_path }}
      Environment=OTEL_SERVICE_NAME=notifications-service
      Environment=OTEL_EXPORTER_OTLP_ENDPOINT=http://{{ services.otelcol.host }}:{{ services.otelcol.grpc_port }}
      ExecStart={{ fm_bin }}/notifications-service
      Restart=on-failure
      RestartSec=5
      CapabilityBoundingSet=
      ProtectHome=true
      ProtectSystem=strict
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0077

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/notifications-service.service
    mode: "0644"
  notify: restart notifications-service

- name: Trigger notifications-service restart after binary and schema are in sync
  ansible.builtin.command: /bin/true
  changed_when: deploy_profile_notifications_service_binary_copy.changed | default(false)
  notify: restart notifications-service

- name: Apply notifications-service unit changes before proceeding
  ansible.builtin.meta: flush_handlers

- name: Enable and start notifications-service
  ansible.builtin.systemd:
    name: notifications-service
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for notifications-service listener to be present
  ansible.builtin.wait_for:
    host: "{{ services.notifications_service.host }}"
    port: "{{ services.notifications_service.port }}"
    timeout: 60

- name: Wait for notifications-service readiness
  ansible.builtin.uri:
    url: "http://{{ services.notifications_service.host }}:{{ services.notifications_service.port }}/readyz"
    method: GET
    status_code: 200
  register: notifications_service_readyz
  retries: 30
  delay: 1
  until: notifications_service_readyz.status == 200
