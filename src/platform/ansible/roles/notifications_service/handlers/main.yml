---
- name: Check if notifications-service unit exists
  listen: restart notifications-service
  ansible.builtin.stat:
    path: /etc/systemd/system/notifications-service.service
  register: notifications_service_unit_file

- name: Restart notifications-service
  listen: restart notifications-service
  ansible.builtin.systemd:
    daemon_reload: true
    name: notifications-service
    state: restarted
  when: notifications_service_unit_file.stat.exists
