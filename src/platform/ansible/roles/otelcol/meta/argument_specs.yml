---
argument_specs:
  main:
    short_description: "OpenTelemetry Collector exporting directly to ClickHouse"
    description:
      - "Deploys otelcol-contrib, configures OTLP"
      - "receivers plus host and Caddy scraping, and exports logs, traces,"
      - "and metrics into ClickHouse."
      - "Service ports come from the generated services registry (group_vars/all/generated/services.yml)."
    options:
      verself_bin:
        type: path
        required: true
        description: "Path to the server binary directory."
