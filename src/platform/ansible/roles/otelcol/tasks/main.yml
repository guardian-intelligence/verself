---
# OpenTelemetry Collector configuration.
# Binary provided by substrate_profile role (pinned static binary).

- name: Create OTel Collector system group
  ansible.builtin.group:
    name: "{{ otelcol_system_group }}"
    system: true

- name: Create OTel Collector system user
  ansible.builtin.user:
    name: "{{ otelcol_system_user }}"
    group: "{{ otelcol_system_group }}"
    groups: "{{ ([spire_workload_group] + otelcol_log_reader_groups) | join(',') }}"
    append: false
    system: true
    home: /var/lib/otelcol
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure OTel Collector ClickHouse user exists with insert grants
  ansible.builtin.shell: |
    set -euo pipefail
    {{ clickhouse_operator_client_command }} --multiquery <<'SQL'
    CREATE USER IF NOT EXISTS {{ otelcol_clickhouse_user }} IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_otelcol_id }}' HOST LOCAL;
    ALTER USER {{ otelcol_clickhouse_user }} IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_otelcol_id }}' HOST LOCAL;
    GRANT INSERT ON default.* TO {{ otelcol_clickhouse_user }};
    GRANT SELECT ON default.otel_logs TO {{ otelcol_clickhouse_user }};
    GRANT SELECT (Timestamp, SpanAttributes, SpanName, TraceId, SpanId, ServiceName) ON default.otel_traces TO {{ otelcol_clickhouse_user }};
    SQL
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Create OTel Collector config directory
  ansible.builtin.file:
    path: /etc/otelcol
    state: directory
    owner: root
    group: "{{ otelcol_system_group }}"
    mode: "0750"

- name: Create OTel Collector state directory
  ansible.builtin.file:
    path: /var/lib/otelcol
    state: directory
    owner: "{{ otelcol_system_user }}"
    group: "{{ otelcol_system_group }}"
    mode: "0750"

- name: Create OTel Collector storage directory
  ansible.builtin.file:
    path: /var/lib/otelcol/storage
    state: directory
    owner: "{{ otelcol_system_user }}"
    group: "{{ otelcol_system_group }}"
    mode: "0750"

- name: Repair OTel Collector storage ownership drift
  ansible.builtin.file:
    # The collector used to run as root; reclaim the persisted offsets so the
    # filelog receivers survive the service-user cutover.
    path: /var/lib/otelcol/storage
    state: directory
    owner: "{{ otelcol_system_user }}"
    group: "{{ otelcol_system_group }}"
    recurse: true

- name: Create OTel Collector ClickHouse SPIFFE directory
  ansible.builtin.file:
    path: "{{ otelcol_clickhouse_spiffe_dir }}"
    state: directory
    owner: "{{ otelcol_system_user }}"
    group: "{{ otelcol_system_group }}"
    mode: "0700"

- name: Copy ClickHouse server CA into OTel Collector config
  ansible.builtin.copy:
    src: /etc/clickhouse-server/tls/server-ca.pem
    dest: "{{ otelcol_clickhouse_server_ca_path }}"
    remote_src: true
    owner: root
    group: "{{ otelcol_system_group }}"
    mode: "0640"
  notify: restart otelcol

- name: Deploy OTel Collector ClickHouse SPIFFE helper config
  ansible.builtin.template:
    src: otelcol-clickhouse-spiffe-helper.conf.j2
    dest: "{{ otelcol_clickhouse_helper_config_path }}"
    owner: root
    group: "{{ otelcol_system_group }}"
    mode: "0640"
  notify: restart otelcol-clickhouse-spiffe-helper

- name: Deploy OTel Collector ClickHouse SPIFFE helper systemd unit
  ansible.builtin.template:
    src: otelcol-clickhouse-spiffe-helper.service.j2
    dest: /etc/systemd/system/otelcol-clickhouse-spiffe-helper.service
    owner: root
    group: root
    mode: "0644"
  notify: restart otelcol-clickhouse-spiffe-helper

- name: Deploy OTel Collector config
  ansible.builtin.template:
    src: otelcol-config.yaml.j2
    dest: /etc/otelcol/config.yaml
    owner: root
    group: "{{ otelcol_system_group }}"
    mode: "0640"
  notify: restart otelcol

- name: Deploy OTel Collector systemd unit
  ansible.builtin.template:
    src: otelcol.service.j2
    dest: /etc/systemd/system/otelcol.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - restart otelcol

- name: Apply OTel Collector unit and config changes before readiness
  ansible.builtin.meta: flush_handlers

- name: Enable and start OTel Collector ClickHouse SPIFFE helper
  ansible.builtin.systemd:
    name: otelcol-clickhouse-spiffe-helper
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start OTel Collector
  ansible.builtin.systemd:
    name: otelcol
    enabled: true
    state: started
    daemon_reload: true
