---
# Substrate-side SSH CA configuration.
#
# Materialises the OpenBao-issued CA public key into /etc/ssh/, writes
# the per-user principals file, renders the sshd_config drop-in that
# enforces cert-only authentication, and installs the systemd drop-in
# that orders sshd after wg-quick@wg-ops so the listener never tries
# to bind 10.66.66.1 before the WG interface exists. Runs after the
# openbao role in box.yml so the credstore CA pubkey is guaranteed
# present.

- name: Read OpenBao SSH CA public key from credstore
  ansible.builtin.slurp:
    src: "{{ openbao_credstore_dir }}/ssh-ca.pub"
  register: ssh_ca_pubkey_raw

- name: Ensure principals directory exists
  ansible.builtin.file:
    path: "{{ topology_ssh_ca.principals_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Materialise the SSH CA public key on the host
  ansible.builtin.copy:
    content: "{{ ssh_ca_pubkey_raw.content | b64decode }}"
    dest: "{{ topology_ssh_ca.ca_pubkey_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload sshd

- name: Render the per-user principals file
  ansible.builtin.copy:
    # One principal name per line. AuthorizedPrincipalsFile %u expands
    # to the OS user sshd accepts; only certs whose `valid_principals`
    # set intersects this file are admitted.
    content: |
      # Managed by Ansible — ssh_ca role.
      # Principals authorised to log in as {{ topology_ssh_ca.default_user }}.
      # Source: src/cue-renderer/instances/prod/config.cue:ssh_ca.principals
      {% for name, principal in (topology_ssh_ca.principals | dictsort) %}
      {{ principal.name }}
      {% endfor %}
    dest: "{{ topology_ssh_ca.principals_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload sshd

- name: Render the sshd_config drop-in for cert authentication
  ansible.builtin.template:
    src: 60-ssh-ca.conf.j2
    dest: /etc/ssh/sshd_config.d/60-ssh-ca.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sshd

# Validate the FULL sshd_config tree (main file + drop-ins) before the
# handler reload fires. `sshd -T` exits non-zero on any parse error;
# `sshd -t` does the same plus checks for required values. We use -t
# because it catches missing values where sshd would otherwise start
# with surprising defaults. Runs unconditionally so a stale broken
# drop-in from a prior run still surfaces.
- name: Validate the merged sshd_config tree
  ansible.builtin.command:
    cmd: /usr/sbin/sshd -t
  changed_when: false

# The wg-ops interface comes up via wg-quick@wg-ops.service. Without
# explicit ordering, sshd may start before the IP is configured and
# fail to bind. After=network-online.target alone isn't enough because
# WireGuard interfaces are not part of the standard online-target wait.
- name: Ensure systemd drop-in directory for ssh.service exists
  ansible.builtin.file:
    path: /etc/systemd/system/ssh.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install systemd drop-in to order sshd after wg-quick@wg-ops
  ansible.builtin.copy:
    dest: /etc/systemd/system/ssh.service.d/wg-ops.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible — ssh_ca role.
      [Unit]
      After=wg-quick@wg-ops.service network-online.target
      Wants=wg-quick@wg-ops.service
  notify: Reload sshd-systemd

# Wipe the per-user authorized_keys file. AuthorizedKeysFile=none in
# sshd_config makes sshd ignore it, but the file itself is still
# writable by ubuntu and by anyone with sudo. Leaving stale keys on
# disk invites confusion the next time a human reads the file. Replace
# with a header that tells the next reader where to look.
- name: Inert ~ubuntu/.ssh/authorized_keys (sshd ignores it after cutover)
  ansible.builtin.copy:
    dest: "/home/{{ topology_ssh_ca.default_user }}/.ssh/authorized_keys"
    owner: "{{ topology_ssh_ca.default_user }}"
    group: "{{ topology_ssh_ca.default_user }}"
    mode: "0600"
    content: |
      # This file is no longer consulted by sshd.
      # AuthorizedKeysFile is set to `none` in
      # /etc/ssh/sshd_config.d/60-ssh-ca.conf. Static keys do not grant
      # access. The only path is OpenBao-issued certs trusted by
      # /etc/ssh/verself-ssh-ca.pub.
      # Source: src/cue-renderer/instances/prod/config.cue:ssh_ca
