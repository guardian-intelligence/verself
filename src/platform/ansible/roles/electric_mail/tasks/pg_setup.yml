---
# Uses postgresql_admin_password from SOPS-decrypted group_vars (same as the postgresql role).

- name: Manage Electric Mail PostgreSQL replication state
  vars:
    electric_mail_publication_tables:
      - mailbox_accounts
      - mailboxes
      - emails
      - email_mailboxes
      - email_bodies
      - threads
  module_defaults:
    community.postgresql.postgresql_user:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      trust_input: false
    community.postgresql.postgresql_privs:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: mailbox_service
      trust_input: false
    community.postgresql.postgresql_query:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: mailbox_service
    community.postgresql.postgresql_publication:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: mailbox_service
      trust_input: false
  block:
    - name: Create Electric Mail PostgreSQL role
      community.postgresql.postgresql_user:
        name: electric_mail
        password: "{{ electric_mail_pg_password }}"
        role_attr_flags: REPLICATION,LOGIN
      no_log: true

    - name: Grant Electric Mail role read access to mailbox_service tables
      community.postgresql.postgresql_privs:
        privs: SELECT
        type: table
        objs: "{{ electric_mail_publication_tables | join(',') }}"
        schema: public
        roles: electric_mail
      no_log: true

    - name: Discover Electric Mail tables missing REPLICA IDENTITY FULL
      community.postgresql.postgresql_query:
        query: >-
          SELECT c.relname
          FROM pg_class AS c
          JOIN pg_namespace AS n ON n.oid = c.relnamespace
          WHERE n.nspname = 'public'
            AND c.relname = ANY(%s)
            AND c.relreplident <> 'f'
          ORDER BY c.relname
        positional_args:
          - "{{ electric_mail_publication_tables }}"
      register: electric_mail_replica_identity_probe
      changed_when: false
      no_log: true

    - name: Ensure Electric Mail-synced tables use REPLICA IDENTITY FULL
      community.postgresql.postgresql_query:
        query: "ALTER TABLE public.{{ item.relname }} REPLICA IDENTITY FULL"
      loop: >-
        {{
          []
          if electric_mail_replica_identity_probe.query_result is mapping
          else (electric_mail_replica_identity_probe.query_result | default([]))
        }}
      loop_control:
        label: "{{ item.relname }}"
      no_log: true

    - name: Ensure publication for Electric Mail exists
      community.postgresql.postgresql_publication:
        name: electric_publication_mail
        owner: electric_mail
        tables: "{{ electric_mail_publication_tables }}"
      no_log: true
