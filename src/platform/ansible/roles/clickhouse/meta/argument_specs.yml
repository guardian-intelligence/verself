---
argument_specs:
  main:
    short_description: "ClickHouse service and forge-metal schema migrations"
    description:
      - "Deploys ClickHouse, configures the standalone"
      - "service unit, and applies forge-metal migrations to the forge_metal"
      - "database when the local migration fingerprint changes."
      - "Service ports come from the services registry (group_vars/all/services.yml)."
    options:
      clickhouse_data_path:
        type: path
        default: /var/lib/clickhouse
        description: "ClickHouse data directory."

      fm_bin:
        type: path
        required: true
        description: "Path to the server binary directory."
