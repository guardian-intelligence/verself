---
# ClickHouse configuration.
# Binary provided by deploy_profile role (pinned static binary).

- name: Create ClickHouse system group
  ansible.builtin.group:
    name: clickhouse
    system: true

- name: Ensure SPIRE workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create ClickHouse operator system group
  ansible.builtin.group:
    name: "{{ clickhouse_operator_system_group }}"
    system: true

- name: Create ClickHouse operator system user
  ansible.builtin.user:
    name: "{{ clickhouse_operator_system_user }}"
    group: "{{ clickhouse_operator_system_group }}"
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    home: /var/lib/clickhouse-operator
    shell: /usr/sbin/nologin
    create_home: false

- name: Resolve ClickHouse operator uid for SPIRE registration
  ansible.builtin.command:
    cmd: "id -u {{ clickhouse_operator_system_user }}"
  register: clickhouse_operator_uid
  changed_when: false

- name: Read ClickHouse operator SPIRE registration
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server entry show
      -socketPath {{ spire_server_socket_path }}
      -entryID forge-metal-clickhouse-operator
      -output json
  register: clickhouse_operator_spire_entry
  failed_when: false
  changed_when: false

- name: Register ClickHouse operator SPIFFE workload
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server entry create
      -socketPath {{ spire_server_socket_path }}
      -entryID forge-metal-clickhouse-operator
      -parentID {{ spire_agent_id }}
      -spiffeID {{ spire_clickhouse_operator_id }}
      -selector unix:uid:{{ clickhouse_operator_uid.stdout | trim }}
      -x509SVIDTTL 3600
  when: clickhouse_operator_spire_entry.rc != 0 or 'forge-metal-clickhouse-operator' not in clickhouse_operator_spire_entry.stdout
  changed_when: true
  notify: restart clickhouse-operator-spiffe-helper

- name: Update ClickHouse operator SPIRE workload selector drift
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server entry update
      -socketPath {{ spire_server_socket_path }}
      -entryID forge-metal-clickhouse-operator
      -parentID {{ spire_agent_id }}
      -spiffeID {{ spire_clickhouse_operator_id }}
      -selector unix:uid:{{ clickhouse_operator_uid.stdout | trim }}
      -x509SVIDTTL 3600
  when:
    - clickhouse_operator_spire_entry.rc == 0
    - "'uid:' ~ (clickhouse_operator_uid.stdout | trim) not in clickhouse_operator_spire_entry.stdout"
  changed_when: true
  notify: restart clickhouse-operator-spiffe-helper

- name: Set ClickHouse operator client command fact
  ansible.builtin.set_fact:
    clickhouse_operator_client_command: >-
      sudo -u {{ clickhouse_operator_system_user }} {{ fm_bin }}/clickhouse-client
      --config-file {{ clickhouse_operator_client_config_path }}
      --user {{ clickhouse_operator_db_user }}

- name: Create ClickHouse directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/clickhouse-server/config.d
    - /etc/clickhouse-server/tls
    - "{{ clickhouse_data_path }}"
    - /var/log/clickhouse-server

- name: Create ClickHouse operator directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ clickhouse_operator_client_dir }}"
      owner: root
      group: "{{ clickhouse_operator_system_group }}"
      mode: "0750"
    - path: /var/lib/clickhouse-operator
      owner: "{{ clickhouse_operator_system_user }}"
      group: "{{ clickhouse_operator_system_group }}"
      mode: "0750"
    - path: "{{ clickhouse_operator_spiffe_dir }}"
      owner: "{{ clickhouse_operator_system_user }}"
      group: "{{ clickhouse_operator_system_group }}"
      mode: "0700"

- name: Discover legacy billing bridge metadata files
  ansible.builtin.find:
    paths: "{{ clickhouse_data_path }}/store"
    recurse: true
    file_type: file
    patterns: "billing_windows_pg.sql*"
  register: clickhouse_legacy_billing_bridge_metadata
  failed_when: false
  changed_when: false

- name: Stop ClickHouse before removing legacy billing bridge metadata
  ansible.builtin.systemd:
    name: clickhouse-server
    state: stopped
  when: (clickhouse_legacy_billing_bridge_metadata.matched | default(0) | int) > 0

- name: Remove legacy billing bridge metadata files
  # Atomic databases keep table definitions in /var/lib/clickhouse/store; remove
  # the obsolete billing_windows_pg metadata before startup or every query fails.
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ clickhouse_legacy_billing_bridge_metadata.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when: (clickhouse_legacy_billing_bridge_metadata.matched | default(0) | int) > 0

- name: Deploy ClickHouse server certificate extensions
  ansible.builtin.copy:
    dest: /etc/clickhouse-server/tls/server-cert.ext
    owner: root
    group: clickhouse
    mode: "0640"
    content: |
      basicConstraints=CA:FALSE
      keyUsage=digitalSignature,keyEncipherment
      extendedKeyUsage=serverAuth
      subjectAltName=IP:127.0.0.1,DNS:localhost

- name: Generate ClickHouse local CA private key
  ansible.builtin.command:
    argv:
      - openssl
      - genrsa
      - -out
      - /etc/clickhouse-server/tls/server-ca-key.pem
      - "4096"
    creates: /etc/clickhouse-server/tls/server-ca-key.pem

- name: Generate ClickHouse local CA certificate
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -x509
      - -new
      - -nodes
      - -key
      - /etc/clickhouse-server/tls/server-ca-key.pem
      - -sha256
      - -days
      - "3650"
      - -out
      - /etc/clickhouse-server/tls/server-ca.pem
      - -subj
      - /CN=Forge Metal ClickHouse local CA
    creates: /etc/clickhouse-server/tls/server-ca.pem

- name: Generate ClickHouse server private key and CSR
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -new
      - -newkey
      - rsa:2048
      - -nodes
      - -keyout
      - /etc/clickhouse-server/tls/server-key.pem
      - -out
      - /etc/clickhouse-server/tls/server.csr
      - -subj
      - /CN=127.0.0.1
    creates: /etc/clickhouse-server/tls/server-key.pem

- name: Sign ClickHouse server certificate
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -req
      - -in
      - /etc/clickhouse-server/tls/server.csr
      - -CA
      - /etc/clickhouse-server/tls/server-ca.pem
      - -CAkey
      - /etc/clickhouse-server/tls/server-ca-key.pem
      - -CAcreateserial
      - -out
      - /etc/clickhouse-server/tls/server-cert.pem
      - -days
      - "3650"
      - -sha256
      - -extfile
      - /etc/clickhouse-server/tls/server-cert.ext
    creates: /etc/clickhouse-server/tls/server-cert.pem

- name: Export SPIRE trust bundle for ClickHouse client certificate verification
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/spire-server bundle show
      -socketPath {{ spire_server_socket_path }}
      -format pem
  register: clickhouse_spire_bundle
  changed_when: false

- name: Deploy ClickHouse client CA bundle
  ansible.builtin.copy:
    content: "{{ clickhouse_spire_bundle.stdout | trim }}\n"
    dest: /etc/clickhouse-server/tls/client-ca.pem
    owner: root
    group: clickhouse
    mode: "0640"
  notify: restart clickhouse

- name: Converge ClickHouse TLS material ownership
  ansible.builtin.file:
    path: "/etc/clickhouse-server/tls/{{ item.name }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { name: server-ca.pem, owner: root, group: clickhouse, mode: "0640" }
    - { name: server-ca-key.pem, owner: root, group: root, mode: "0600" }
    - { name: server-cert.pem, owner: root, group: clickhouse, mode: "0640" }
    - { name: server-key.pem, owner: root, group: clickhouse, mode: "0640" }
    - { name: server.csr, owner: root, group: clickhouse, mode: "0640" }
    - { name: server-cert.ext, owner: root, group: clickhouse, mode: "0640" }

- name: Check ClickHouse local CA serial file
  ansible.builtin.stat:
    path: /etc/clickhouse-server/tls/server-ca.srl
  register: clickhouse_server_ca_serial

- name: Set ClickHouse local CA serial ownership
  ansible.builtin.file:
    path: /etc/clickhouse-server/tls/server-ca.srl
    owner: root
    group: root
    mode: "0600"
  when: clickhouse_server_ca_serial.stat.exists

- name: Copy ClickHouse server CA into operator client config
  ansible.builtin.copy:
    src: /etc/clickhouse-server/tls/server-ca.pem
    dest: "{{ clickhouse_operator_ca_path }}"
    remote_src: true
    owner: root
    group: "{{ clickhouse_operator_system_group }}"
    mode: "0640"

- name: Deploy ClickHouse operator client config
  ansible.builtin.template:
    src: clickhouse-operator-client.xml.j2
    dest: "{{ clickhouse_operator_client_config_path }}"
    owner: root
    group: "{{ clickhouse_operator_system_group }}"
    mode: "0640"
  notify: restart clickhouse-operator-spiffe-helper

- name: Deploy ClickHouse operator SPIFFE helper config
  ansible.builtin.template:
    src: clickhouse-operator-spiffe-helper.conf.j2
    dest: "{{ clickhouse_operator_helper_config_path }}"
    owner: root
    group: "{{ clickhouse_operator_system_group }}"
    mode: "0640"
  notify: restart clickhouse-operator-spiffe-helper

- name: Deploy ClickHouse operator SPIFFE helper systemd unit
  ansible.builtin.template:
    src: clickhouse-operator-spiffe-helper.service.j2
    dest: /etc/systemd/system/clickhouse-operator-spiffe-helper.service
    owner: root
    group: root
    mode: "0644"
  notify: restart clickhouse-operator-spiffe-helper

- name: Deploy ClickHouse systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=ClickHouse Server
      After=forge-metal-firewall.target network.target
      Requires=forge-metal-firewall.target

      [Service]
      Type=simple
      User=root
      ExecStart={{ fm_bin }}/clickhouse-server --config-file /etc/clickhouse-server/config.d/forge-metal.xml
      Restart=on-failure
      RestartSec=5
      LimitNOFILE=500000

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/clickhouse-server.service
    mode: "0644"
  notify:
    - restart clickhouse

- name: Deploy ClickHouse server config
  ansible.builtin.template:
    src: clickhouse-config.xml.j2
    dest: /etc/clickhouse-server/config.d/forge-metal.xml
    owner: root
    group: clickhouse
    mode: "0640"
  notify: restart clickhouse

- name: Apply ClickHouse config changes before proceeding
  ansible.builtin.meta: flush_handlers

- name: Enable and start ClickHouse operator SPIFFE helper
  ansible.builtin.systemd:
    name: clickhouse-operator-spiffe-helper
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start ClickHouse
  ansible.builtin.systemd:
    name: clickhouse-server
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for ClickHouse
  ansible.builtin.shell: >
    {{ clickhouse_operator_client_command }}
    --query 'SELECT 1'
  register: clickhouse_ready
  retries: 10
  delay: 3
  until: clickhouse_ready.rc == 0
  changed_when: false

- name: Flush system logs (creates query_log table if query logging just enabled)
  ansible.builtin.shell: >
    {{ clickhouse_operator_client_command }}
    --query 'SYSTEM FLUSH LOGS'
  changed_when: false

- name: Compute local migrations fingerprint
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.shell:
    cmd: "set -o pipefail && find . -name '[0-9][0-9][0-9]_*.up.sql' -exec sha256sum {} + | sort | sha256sum"
    chdir: "{{ playbook_dir }}/../../migrations"
    executable: /bin/bash
  register: clickhouse_migrations_local_hash
  changed_when: false

- name: Read remote migrations fingerprint
  ansible.builtin.slurp:
    src: /opt/forge-metal/migrations/.applied-hash
  register: clickhouse_migrations_remote_hash
  failed_when: false

- name: Probe for expected tables (fingerprint can survive a wipe if /opt/forge-metal is recreated before deploy)
  ansible.builtin.shell: >
    {{ clickhouse_operator_client_command }}
    --query "SELECT count() FROM system.tables
             WHERE (database = 'default' AND name = 'otel_metrics_sum')
                OR (database = 'forge_metal' AND name IN ('metering', 'billing_events', 'audit_events'))"
  register: clickhouse_expected_table_probe
  changed_when: false

- name: Determine whether ClickHouse schema reset is required
  ansible.builtin.set_fact:
    clickhouse_should_reset_schema: >-
      {{
        clickhouse_force_schema_reset
        or (clickhouse_migrations_remote_hash is failed)
        or ((clickhouse_migrations_remote_hash.content | default('') | b64decode | trim)
           != (clickhouse_migrations_local_hash.stdout.split()[0] | trim))
        or ((clickhouse_expected_table_probe.stdout | trim) != '4')
      }}

- name: Apply ClickHouse migrations
  when: clickhouse_should_reset_schema
  block:
    - name: Remove deployed migrations directory
      ansible.builtin.file:
        path: /opt/forge-metal/migrations
        state: absent

    - name: Create deployed migrations directory
      ansible.builtin.file:
        path: /opt/forge-metal/migrations
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Upload migrations
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../migrations/"
        dest: /opt/forge-metal/migrations/
        mode: "0644"

    - name: Stop ClickHouse writers before force schema reset
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - otelcol
        - billing-service
        - sandbox-rental-service
        - governance-service
      register: clickhouse_writers_stop_result
      # Tolerate first-run case where the writer unit is not yet installed.
      failed_when:
        - clickhouse_writers_stop_result.failed | default(false)
        - "'Could not find' not in (clickhouse_writers_stop_result.msg | default(''))"
      when: clickhouse_force_schema_reset

    - name: Drop forge_metal database before force schema reset
      ansible.builtin.shell: >
        {{ clickhouse_operator_client_command }}
        --query 'DROP DATABASE IF EXISTS forge_metal SYNC'
      changed_when: false
      when: clickhouse_force_schema_reset

    - name: Discover default ClickHouse telemetry tables to truncate
      ansible.builtin.shell: >
        {{ clickhouse_operator_client_command }}
        --query "
          SELECT concat(database, '.', name)
          FROM system.tables
          WHERE database = 'default'
            AND engine NOT IN ('MaterializedView', 'View')
            AND (name LIKE 'otel_%' OR name = 'http_access_logs')
          ORDER BY name
          FORMAT TSVRaw
        "
      register: clickhouse_force_reset_tables
      changed_when: false
      when: clickhouse_force_schema_reset

    - name: Truncate default ClickHouse telemetry tables during force schema reset
      ansible.builtin.shell: >
        {{ clickhouse_operator_client_command }}
        --query 'TRUNCATE TABLE {{ item }}'
      loop: "{{ clickhouse_force_reset_tables.stdout_lines | default([]) }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false
      when: clickhouse_force_schema_reset

    - name: Create forge_metal database
      ansible.builtin.shell: >
        {{ clickhouse_operator_client_command }}
        --query 'CREATE DATABASE IF NOT EXISTS forge_metal'
      changed_when: false

    - name: Apply migration files
      ansible.builtin.shell: >
        {{ clickhouse_operator_client_command }}
        --database forge_metal --multiquery
        --queries-file /opt/forge-metal/migrations/{{ item }}
      loop: >-
        {{
          query('ansible.builtin.fileglob', playbook_dir + '/../../migrations/[0-9][0-9][0-9]_*.up.sql')
          | map('basename')
          | sort
        }}
      loop_control:
        label: "{{ item }}"
      changed_when: false

    - name: Record migrations fingerprint
      ansible.builtin.copy:
        content: "{{ clickhouse_migrations_local_hash.stdout.split()[0] }}\n"
        dest: /opt/forge-metal/migrations/.applied-hash
        mode: "0644"

    - name: Start ClickHouse writers after force schema reset
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
      loop:
        - otelcol
        - billing-service
        - sandbox-rental-service
        - governance-service
      register: clickhouse_writers_start_result
      # Tolerate first-run case where the writer unit is not yet installed.
      failed_when:
        - clickhouse_writers_start_result.failed | default(false)
        - "'Could not find' not in (clickhouse_writers_start_result.msg | default(''))"
      when: clickhouse_force_schema_reset
