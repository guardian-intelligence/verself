---
# Execute the generated development tool install plan. The topology compiler
# owns tool layout; Ansible applies checksumed artifacts and package actions.

- name: Require generated dev tool install plan
  ansible.builtin.assert:
    that:
      - topology_dev_tool_install_plan is defined
      - topology_dev_tool_install_plan.downloads is defined
      - topology_dev_tool_install_plan.uv_tools is defined
      - topology_dev_tool_install_plan.go_installs is defined
    quiet: true
    fail_msg: >-
      topology_dev_tool_install_plan is missing. Run make topology-generate before setup-dev.

- name: Set dev tool install plan
  ansible.builtin.set_fact:
    dev_tools_install_plan: "{{ topology_dev_tool_install_plan }}"

- name: Create generated dev tool directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop: "{{ dev_tools_install_plan.directories }}"
  loop_control:
    label: "{{ item.path }}"

- name: Install generated apt dev tools
  ansible.builtin.apt:
    name: "{{ dev_tools_install_plan.apt_packages }}"
    state: present

- name: Download generated dev tool artifacts
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.dest }}"
    checksum: "{{ item.checksum }}"
    mode: "{{ item.mode }}"
  loop: "{{ dev_tools_install_plan.downloads }}"
  loop_control:
    label: "{{ item.key }}"

- name: Extract generated dev tool archives
  ansible.builtin.unarchive:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    remote_src: true
    creates: "{{ item.creates }}"
    extra_opts: "{{ item.extra_opts | default(omit) }}"
  loop: "{{ dev_tools_install_plan.extracts }}"
  loop_control:
    label: "{{ item.key }}"

- name: Copy generated dev tool outputs
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    remote_src: true
    mode: "{{ item.mode }}"
  loop: "{{ dev_tools_install_plan.copies }}"
  loop_control:
    label: "{{ item.key }} -> {{ item.dest }}"

- name: Copy generated dev tool support directories
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    remote_src: true
    mode: "{{ item.mode }}"
  loop: "{{ dev_tools_install_plan.directory_copies }}"
  loop_control:
    label: "{{ item.key }} -> {{ item.dest }}"

- name: Remove generated dev tool replacement paths
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ dev_tools_install_plan.replacement_paths }}"
  loop_control:
    label: "{{ item }}"

- name: Link generated dev tool outputs
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: "{{ item.force }}"
  loop: "{{ dev_tools_install_plan.links }}"
  loop_control:
    label: "{{ item.key }} -> {{ item.dest }}"

- name: Write generated dev tool profile files
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode }}"
  loop: "{{ dev_tools_install_plan.profile_files }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Install generated Go dev tools
  ansible.builtin.command:
    argv: "{{ item.argv }}"
  environment:
    GOPATH: "{{ item.gopath }}"
    GOBIN: "{{ item.gobin }}"
  changed_when: true
  loop: "{{ dev_tools_install_plan.go_installs }}"
  loop_control:
    label: "{{ item.key }}"

- name: Install generated uv dev tools
  ansible.builtin.command:
    argv: "{{ item.argv }}"
  environment:
    UV_TOOL_DIR: /opt/uv-tools
    UV_TOOL_BIN_DIR: /usr/local/bin
  changed_when: true
  loop: "{{ dev_tools_install_plan.uv_tools }}"
  loop_control:
    label: "{{ item.key }}"

- name: Install required Ansible collections
  ansible.builtin.command:
    argv:
      - /usr/local/bin/ansible-galaxy
      - collection
      - install
      - -r
      - "{{ dev_tools_install_plan.ansible_collections_requirements }}"
  register: dev_tools_galaxy_result
  changed_when: >-
    'Installing' in (dev_tools_galaxy_result.stdout + dev_tools_galaxy_result.stderr)
    or 'Downloading' in (dev_tools_galaxy_result.stdout + dev_tools_galaxy_result.stderr)

- name: Remove retired pipx package
  ansible.builtin.apt:
    name: "{{ dev_tools_install_plan.cleanup_apt_packages }}"
    state: absent

- name: Remove retired pipx directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ dev_tools_install_plan.cleanup_paths }}"
  loop_control:
    label: "{{ item }}"
