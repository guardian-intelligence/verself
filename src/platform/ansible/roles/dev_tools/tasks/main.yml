---
# Bring the controller's dev tools up to topology. Three delivery channels:
#
#   1. dev_tools.tar.zst (pinned_http_file tier) — Bazel-fetched, sha256-pinned,
#      one untar at /. Owns 16 binaries plus /usr/local/{go,zig} symlinks.
#   2. systemPackages — apt-managed entries with explicit risk acknowledgements;
#      the only intentionally unpinned channel.
#   3. install plan (legacy_install_plan tier) — `go install` and `uv tool install`
#      for tools that haven't migrated to a hermetic tier yet.
#
# Order matters: the tarball must land before `go install` runs (which needs
# /usr/local/go/bin/go) and before `uv tool install` runs (which needs
# /usr/local/bin/uv).

- name: Require generated dev tool install plan
  ansible.builtin.assert:
    that:
      - topology_dev_tool_install_plan is defined
      - topology_dev_tool_install_plan.go_installs is defined
      - topology_dev_tool_install_plan.uv_tools is defined
    quiet: true
    fail_msg: >-
      topology_dev_tool_install_plan is missing or stale. Run make topology-generate before setup-dev.

- name: Install pinned_http_file dev tools via Bazel-managed archive
  ansible.builtin.include_tasks: dev_tools_archive.yml

- name: Install system packages
  ansible.builtin.include_tasks: system_packages.yml

- name: Set legacy install plan facts
  ansible.builtin.set_fact:
    dev_tools_install_plan: "{{ topology_dev_tool_install_plan }}"

- name: Ensure GOPATH bin directory exists
  ansible.builtin.file:
    path: "{{ dev_tools_gopath }}/bin"
    state: directory
    mode: "0755"
  when: dev_tools_install_plan.go_installs | length > 0

- name: Install generated Go dev tools
  ansible.builtin.command:
    argv: "{{ item.argv }}"
  environment:
    GOPATH: "{{ item.gopath }}"
    GOBIN: "{{ item.gobin }}"
  changed_when: true
  loop: "{{ dev_tools_install_plan.go_installs }}"
  loop_control:
    label: "{{ item.key }}"

- name: Install generated uv dev tools
  ansible.builtin.command:
    argv: "{{ item.argv }}"
  environment:
    UV_TOOL_DIR: /opt/uv-tools
    UV_TOOL_BIN_DIR: /usr/local/bin
  changed_when: true
  loop: "{{ dev_tools_install_plan.uv_tools }}"
  loop_control:
    label: "{{ item.key }}"

- name: Write Go PATH profile shim
  ansible.builtin.copy:
    content: "export PATH=/usr/local/go/bin:{{ dev_tools_gopath }}/bin:$PATH\n"
    dest: /etc/profile.d/go.sh
    mode: "0644"

- name: Install required Ansible collections
  ansible.builtin.command:
    argv:
      - /usr/local/bin/ansible-galaxy
      - collection
      - install
      - -r
      - "{{ playbook_dir }}/../requirements.yml"
  register: dev_tools_galaxy_result
  changed_when: >-
    'Installing' in (dev_tools_galaxy_result.stdout + dev_tools_galaxy_result.stderr)
    or 'Downloading' in (dev_tools_galaxy_result.stdout + dev_tools_galaxy_result.stderr)
