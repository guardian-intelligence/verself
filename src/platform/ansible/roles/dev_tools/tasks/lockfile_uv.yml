---
# Install lockfile_uv-tier dev tools. Each entry in
# topology_lockfile_uv_projects is a uv project at
# src/platform/uv-tools/<name>/ with a committed pyproject.toml + uv.lock.
# We run `uv sync --frozen --project <dir>` to materialise a per-project
# .venv whose wheel sha256s match the committed lockfile, then symlink
# every entrypoint into /usr/local/bin/.
#
# `uv` itself comes from dev_tools.tar.zst (Phase 1). This task must run
# AFTER dev_tools_archive.yml so /usr/local/bin/uv exists.

- name: Sync each uv-tool project (--frozen against committed uv.lock)
  ansible.builtin.command:
    argv:
      - /usr/local/bin/uv
      - sync
      - --frozen
      - --project
      - "{{ dev_tools_repo_root }}/{{ item.value.project_dir }}"
  loop: "{{ topology_lockfile_uv_projects | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  # uv sync emits "Audited N packages" on a noop run and "Installed N
  # packages" when wheels were materialised; the changed_when filter
  # narrows the green-on-clean signal to actual installs.
  register: dev_tools_lockfile_uv_sync_results
  changed_when: >-
    'Installed' in (dev_tools_lockfile_uv_sync_results.stdout | default(''))
    or 'Installed' in (dev_tools_lockfile_uv_sync_results.stderr | default(''))

- name: Symlink uv-tool entrypoints into /usr/local/bin/
  ansible.builtin.file:
    state: link
    src: "{{ dev_tools_repo_root }}/{{ item.0.value.project_dir }}/.venv/bin/{{ item.1 }}"
    dest: "/usr/local/bin/{{ item.1 }}"
    force: true
  loop: "{{ topology_lockfile_uv_projects | dict2items | subelements('value.entrypoints') }}"
  loop_control:
    label: "{{ item.0.key }}/{{ item.1 }}"
