---
- name: Create letters credstore directory
  ansible.builtin.file:
    path: /etc/credstore/letters
    state: directory
    owner: root
    group: "{{ ansible_user }}"
    mode: "0750"

- name: Check for existing letters PG password
  ansible.builtin.stat:
    path: /etc/credstore/letters/pg-password
  register: letters_pg_password_file

- name: Generate letters PG password
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/letters/pg-password
    owner: root
    group: "{{ ansible_user }}"
    mode: "0640"
  when: not letters_pg_password_file.stat.exists
  no_log: true

- name: Read letters PG password
  ansible.builtin.slurp:
    src: /etc/credstore/letters/pg-password
  register: letters_pg_password_raw

- name: Set letters PG password fact
  ansible.builtin.set_fact:
    letters_pg_password: "{{ letters_pg_password_raw.content | b64decode | trim }}"

- name: Check for existing letters auth session secret
  ansible.builtin.stat:
    path: /etc/credstore/letters/auth-session-secret
  register: letters_auth_session_secret_file

- name: Generate letters auth session secret
  ansible.builtin.copy:
    content: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
    dest: /etc/credstore/letters/auth-session-secret
    owner: root
    group: "{{ ansible_user }}"
    mode: "0640"
  when: not letters_auth_session_secret_file.stat.exists
  no_log: true

- name: Read letters auth session secret
  ansible.builtin.slurp:
    src: /etc/credstore/letters/auth-session-secret
  register: letters_auth_session_secret_raw

- name: Set letters auth session secret fact
  ansible.builtin.set_fact:
    letters_auth_session_secret: "{{ letters_auth_session_secret_raw.content | b64decode | trim }}"

- name: Ensure letters PostgreSQL role and database exist
  module_defaults:
    community.postgresql.postgresql_user:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      trust_input: false
    community.postgresql.postgresql_db:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      maintenance_db: postgres
      trust_input: false
    community.postgresql.postgresql_owner:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: postgres
      trust_input: false
  block:
    - name: Ensure letters PostgreSQL user exists
      community.postgresql.postgresql_user:
        name: letters
        password: "{{ letters_pg_password }}"
        role_attr_flags: LOGIN
      no_log: true

    - name: Ensure letters database exists
      community.postgresql.postgresql_db:
        name: letters
        owner: letters
        state: present
      no_log: true

    - name: Ensure letters owns letters database
      community.postgresql.postgresql_owner:
        obj_name: letters
        obj_type: database
        new_owner: letters
      no_log: true
