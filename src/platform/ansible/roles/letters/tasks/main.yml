---
- name: Include letters PostgreSQL database tasks
  ansible.builtin.include_tasks: database.yml

- name: Include letters PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

- name: Create letters install directory
  ansible.builtin.file:
    path: "{{ letters_install_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Verify corepack exists in profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/corepack"
  register: letters_corepack
  failed_when: not letters_corepack.stat.exists

- name: Remove generated letters artifacts before sync
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ letters_install_dir }}/.output"
    - "{{ letters_install_dir }}/.tanstack"
    - "{{ letters_install_dir }}/apps/letters/.output"
    - "{{ letters_install_dir }}/apps/letters/.tanstack"
    - "{{ letters_install_dir }}/packages/ui/dist"

- name: Synchronize letters source
  delegate_to: localhost
  become: false
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../../viteplus-monorepo/"
    dest: "{{ letters_install_dir }}/"
    delete: true
    recursive: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.output"
      - "--exclude=dist"
      - "--exclude=.tanstack"
      - "--exclude=apps/rent-a-sandbox"
      - "--exclude=apps/rent-a-sandbox/**"
      - "--exclude=apps/mail"
      - "--exclude=apps/mail/**"
      - "--exclude=playwright-report"
      - "--exclude=test-results"
      - "--exclude=HANDOFF_PROMPT.md"
      - "--no-owner"
      - "--no-group"

- name: Compute letters workspace dependency fingerprint
  delegate_to: localhost
  become: false
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        cd {{ playbook_dir }}/../../../viteplus-monorepo
        {
          printf '%s\0' package.json pnpm-lock.yaml pnpm-workspace.yaml apps/letters/package.json
          find packages -mindepth 2 -maxdepth 2 -name package.json -print0
        } | sort -z | xargs -0 sha256sum | sha256sum
  register: letters_workspace_dependency_fingerprint
  changed_when: false

- name: Check cached letters install fingerprint
  ansible.builtin.stat:
    path: "{{ letters_dependencies_fingerprint_path }}"
  register: letters_install_fingerprint_file

- name: Read cached letters install fingerprint
  ansible.builtin.slurp:
    src: "{{ letters_dependencies_fingerprint_path }}"
  register: letters_install_fingerprint_raw
  when: letters_install_fingerprint_file.stat.exists

- name: Check cached letters node_modules
  ansible.builtin.stat:
    path: "{{ letters_install_dir }}/node_modules"
  register: letters_node_modules_dir

- name: Install letters workspace dependencies when manifests change
  become: false
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/corepack"
      - pnpm
      - install
    chdir: "{{ letters_install_dir }}"
  environment:
    PATH: "{{ fm_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true
  when: >-
    (not letters_node_modules_dir.stat.exists)
    or (not letters_install_fingerprint_file.stat.exists)
    or (
      (letters_install_fingerprint_raw.content | default('') | b64decode | trim)
      != (letters_workspace_dependency_fingerprint.stdout.split()[0] | trim)
    )

- name: Record cached letters install fingerprint
  ansible.builtin.copy:
    content: "{{ letters_workspace_dependency_fingerprint.stdout.split()[0] | trim }}\n"
    dest: "{{ letters_dependencies_fingerprint_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Build letters package dependencies
  become: false
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/corepack"
      - pnpm
      - --filter
      - "@forge-metal/letters^..."
      - run
      - build
    chdir: "{{ letters_install_dir }}"
  environment:
    PATH: "{{ fm_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true
  notify: Restart letters

- name: Build letters app
  become: false
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/corepack"
      - pnpm
      - --filter
      - "@forge-metal/letters"
      - run
      - build
    chdir: "{{ letters_install_dir }}"
  environment:
    PATH: "{{ fm_bin }}:/usr/bin:/bin"
    HOME: "/home/{{ ansible_user }}"
  changed_when: true
  notify: Restart letters

- name: Set up Zitadel OIDC application
  ansible.builtin.include_tasks: zitadel_app.yml

- name: Deploy letters environment file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/letters/env
    mode: "0640"
    owner: root
    group: "{{ ansible_user }}"
  notify: Restart letters

- name: Deploy letters systemd unit
  ansible.builtin.template:
    src: letters.service.j2
    dest: /etc/systemd/system/letters.service
    mode: "0644"
  notify: Restart letters

- name: Deploy letters nftables rules
  ansible.builtin.template:
    src: letters.nft.j2
    dest: /etc/nftables.d/letters.nft
    mode: "0644"
  notify: Reload nftables

- name: Enable and start letters
  ansible.builtin.systemd:
    name: letters
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for letters to be ready
  ansible.builtin.wait_for:
    host: "{{ services.letters.host }}"
    port: "{{ services.letters.port }}"
    timeout: 30
