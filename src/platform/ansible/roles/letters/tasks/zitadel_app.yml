---
- name: Wait for Zitadel readiness
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/healthz"
    status_code: 200
  register: letters_zitadel_health
  until: letters_zitadel_health.status == 200
  retries: 30
  delay: 2

- name: Read Zitadel admin PAT
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: letters_zitadel_pat_raw
  no_log: true

- name: Set Zitadel PAT fact
  ansible.builtin.set_fact:
    letters_zitadel_pat: "{{ letters_zitadel_pat_raw.content | b64decode | trim }}"

- name: List Zitadel projects for letters auth
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ letters_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body: {}
    return_content: true
  register: letters_zitadel_projects
  no_log: true

- name: Find letters auth project
  ansible.builtin.set_fact:
    letters_auth_project: >-
      {{
        (
          letters_zitadel_projects.json.result
          | selectattr('name', 'equalto', letters_auth_project_name)
          | list
          | first
        ) | default({})
      }}

- name: Create letters auth project if missing
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ letters_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      name: "{{ letters_auth_project_name }}"
    return_content: true
  register: letters_auth_project_created
  when: letters_auth_project == {}
  no_log: true

- name: Set letters project ID fact
  ansible.builtin.set_fact:
    letters_project_id: >-
      {{
        letters_auth_project.id
        | default(letters_auth_project_created.json.id, true)
      }}

- name: Assert letters project ID is set
  ansible.builtin.assert:
    that: letters_project_id | default('', true) | length > 0
    fail_msg: letters_project_id could not be resolved from Zitadel.

- name: Search for existing letters app in project
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ letters_project_id }}/apps/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ letters_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: letters
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
  register: letters_app_search

- name: Check letters OIDC Web cutover marker
  ansible.builtin.stat:
    path: /etc/credstore/letters/oidc-web-cutover
  register: letters_oidc_web_cutover_marker

- name: Set existing app fact
  ansible.builtin.set_fact:
    letters_existing_app: "{{ letters_app_search.json.result | default([]) | first | default({}) }}"
    letters_app_exists: "{{ letters_app_search.json.result is defined and letters_app_search.json.result | length > 0 }}"
    letters_app_id: "{{ (letters_app_search.json.result | default([]) | first | default({})).id | default('') }}"
    letters_client_id: "{{ (letters_app_search.json.result | default([]) | first | default({})).oidcConfig.clientId | default('') }}"
    letters_app_requires_recreate: >-
      {{
        (
          letters_app_search.json.result is defined
          and letters_app_search.json.result | length > 0
        )
        and
        (
          not letters_oidc_web_cutover_marker.stat.exists
          or (
            (letters_app_search.json.result | default([]) | first | default({})).oidcConfig.authMethodType
            | default('')
          ) != 'OIDC_AUTH_METHOD_TYPE_NONE'
          or (
            ((letters_app_search.json.result | default([]) | first | default({})).oidcConfig.redirectUris
            | default([]) | sort)
            != (["https://" ~ letters_domain ~ "/callback"] | sort)
          )
          or (
            ((letters_app_search.json.result | default([]) | first | default({})).oidcConfig.responseTypes
            | default([]) | sort)
            != (["OIDC_RESPONSE_TYPE_CODE"] | sort)
          )
          or (
            ((letters_app_search.json.result | default([]) | first | default({})).oidcConfig.grantTypes
            | default([]) | sort)
            != (["OIDC_GRANT_TYPE_AUTHORIZATION_CODE", "OIDC_GRANT_TYPE_REFRESH_TOKEN"] | sort)
          )
          or (
            ((letters_app_search.json.result | default([]) | first | default({})).oidcConfig.postLogoutRedirectUris
            | default([]) | sort)
            != (["https://" ~ letters_domain] | sort)
          )
          or (
            (letters_app_search.json.result | default([]) | first | default({})).oidcConfig.accessTokenType
            | default('')
          ) != 'OIDC_TOKEN_TYPE_JWT'
        )
      }}
  when: letters_app_search is not skipped

- name: Remove incompatible letters OIDC application
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ letters_project_id }}/apps/{{ letters_app_id }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ letters_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    status_code: 200
  when:
    - letters_app_exists is defined
    - letters_app_exists | bool
    - letters_app_requires_recreate | default(false) | bool
    - letters_app_id | default('', true) | length > 0
  no_log: true

- name: Create letters OIDC application
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ letters_project_id }}/apps/oidc"
    method: POST
    headers:
      Authorization: "Bearer {{ letters_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      name: letters
      redirectUris:
        - "https://{{ letters_domain }}/callback"
      responseTypes:
        - "OIDC_RESPONSE_TYPE_CODE"
      grantTypes:
        - "OIDC_GRANT_TYPE_AUTHORIZATION_CODE"
        - "OIDC_GRANT_TYPE_REFRESH_TOKEN"
      appType: "OIDC_APP_TYPE_WEB"
      authMethodType: "OIDC_AUTH_METHOD_TYPE_NONE"
      postLogoutRedirectUris:
        - "https://{{ letters_domain }}"
      devMode: false
      accessTokenType: "OIDC_TOKEN_TYPE_JWT"
    status_code: 200
  register: letters_app_created
  when: >-
    letters_app_exists is defined
    and (
      not letters_app_exists | bool
      or letters_app_requires_recreate | default(false) | bool
    )
  no_log: true

- name: Re-query letters OIDC application
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ letters_project_id }}/apps/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ letters_zitadel_pat }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      queries:
        - nameQuery:
            name: letters
            method: TEXT_QUERY_METHOD_EQUALS
    status_code: 200
  register: letters_final_app_search

- name: Set final letters app facts
  ansible.builtin.set_fact:
    letters_app_id: "{{ (letters_final_app_search.json.result | default([]) | first | default({})).id | default('') }}"
    letters_client_id: "{{ (letters_final_app_search.json.result | default([]) | first | default({})).oidcConfig.clientId | default('') }}"

- name: Persist letters OIDC Web cutover marker
  ansible.builtin.copy:
    dest: /etc/credstore/letters/oidc-web-cutover
    owner: root
    group: "{{ ansible_user }}"
    mode: "0640"
    content: |
      app_id={{ letters_app_id }}
      client_id={{ letters_client_id }}
      auth_method=OIDC_AUTH_METHOD_TYPE_NONE
  when: letters_client_id | default('', true) | length > 0

- name: Ensure env directory exists
  ansible.builtin.file:
    path: /etc/letters
    state: directory
    owner: root
    group: "{{ ansible_user }}"
    mode: "0750"
