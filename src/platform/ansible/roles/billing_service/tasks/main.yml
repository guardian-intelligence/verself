---
# --- Verify binary ---

- name: Verify billing-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/billing-service"
  register: billing_service_binary
  failed_when: not billing_service_binary.stat.exists

# --- System user ---

- name: Create billing system group
  ansible.builtin.group:
    name: billing
    system: true

- name: Create billing system user
  ansible.builtin.user:
    name: billing
    group: billing
    system: true
    shell: /usr/sbin/nologin
    create_home: false

# --- nftables egress rules ---

- name: Deploy billing-service nftables ruleset
  ansible.builtin.template:
    src: billing.nft.j2
    dest: /etc/nftables.d/billing.nft
    mode: "0644"
  notify: reload nftables

- name: Apply billing-service nftables before proceeding
  ansible.builtin.meta: flush_handlers

# --- Schema migrations ---

- name: Include billing PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

# --- Credentials ---

- name: Include billing credential tasks
  ansible.builtin.include_tasks: credentials.yml

# --- Auth configuration ---

- name: Wait for Zitadel before configuring billing auth
  ansible.builtin.wait_for:
    host: "{{ services.zitadel.host }}"
    port: "{{ services.zitadel.port }}"
    timeout: 60

- name: Read Zitadel admin PAT for billing auth setup
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: billing_service_zitadel_admin_pat_raw
  no_log: true

- name: List Zitadel projects for billing auth
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ billing_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body: {}
    return_content: true
  register: billing_service_zitadel_projects
  no_log: true

- name: Find billing auth project
  ansible.builtin.set_fact:
    billing_service_auth_project: >-
      {{
        (
          billing_service_zitadel_projects.json.result
          | selectattr('name', 'equalto', billing_service_auth_project_name)
          | list
          | first
        ) | default({})
      }}

- name: Create billing auth project if missing
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ billing_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      name: "{{ billing_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    return_content: true
  register: billing_service_auth_project_created
  when: billing_service_auth_project == {}
  no_log: true

- name: Set billing auth audience
  ansible.builtin.set_fact:
    billing_service_auth_audience: >-
      {{
        billing_service_auth_project.id
        | default(billing_service_auth_project_created.json.id, true)
      }}

- name: Assert billing auth audience is set
  ansible.builtin.assert:
    that: billing_service_auth_audience | default('', true) | length > 0
    fail_msg: billing_service_auth_audience could not be resolved from Zitadel.

- name: Ensure billing project has role assertion enabled
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/management/v1/projects/{{ billing_service_auth_audience }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ billing_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ forge_metal_domain }}"
    body_format: json
    body:
      name: "{{ billing_service_auth_project_name }}"
      projectRoleAssertion: true
      projectRoleCheck: true
    status_code: 200
  when: billing_service_auth_project != {}
  no_log: true

- name: Ensure billing project roles exist
  ansible.builtin.include_role:
    name: zitadel_project_roles
  vars:
    zitadel_project_roles_admin_pat: "{{ billing_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
    zitadel_project_roles_project_id: "{{ billing_service_auth_audience }}"
    zitadel_project_roles_definitions:
      - key: "{{ billing_service_internal_role }}"
        display_name: Billing Internal
        group: billing
  when: billing_service_auth_audience | default('', true) | length > 0

# --- systemd unit ---

- name: Deploy billing-service systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Billing Service
      After=forge-metal-firewall.target network.target postgresql.service
      Requires=forge-metal-firewall.target
      Wants=postgresql.service

      [Service]
      Type=simple
      User=billing
      Group=billing
      LoadCredential=pg-dsn:/etc/credstore/billing/pg-dsn
      LoadCredential=stripe-secret-key:/etc/credstore/billing/stripe-secret-key
      LoadCredential=stripe-webhook-secret:/etc/credstore/billing/stripe-webhook-secret
      LoadCredential=ch-password:/etc/credstore/billing/ch-password
      Environment=BILLING_CH_ADDRESS={{ services.clickhouse.host }}:{{ services.clickhouse.native_port }}
      Environment=BILLING_TB_ADDRESS={{ services.tigerbeetle.host }}:{{ services.tigerbeetle.port }}
      Environment=BILLING_TB_CLUSTER_ID={{ billing_service_tigerbeetle_cluster_id }}
      Environment=BILLING_LISTEN_ADDR={{ services.billing.host }}:{{ services.billing.port }}
      Environment=BILLING_AUTH_ISSUER_URL={{ billing_service_auth_issuer_url }}
      Environment=BILLING_AUTH_JWKS_URL={{ billing_service_auth_jwks_url }}
      Environment=BILLING_AUTH_AUDIENCE={{ billing_service_auth_audience }}
      ExecStart={{ fm_bin }}/billing-service
      Restart=on-failure
      RestartSec=5
      ProtectSystem=strict
      ProtectHome=true
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectControlGroups=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictNamespaces=true
      LockPersonality=true

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/billing-service.service
    mode: "0644"
  notify:
    - restart billing-service

- name: Trigger billing-service restart after binary and schema are in sync
  ansible.builtin.command: /bin/true
  changed_when: deploy_profile_billing_service_binary_copy.changed | default(false)
  notify:
    - restart billing-service

- name: Apply billing-service unit changes before proceeding
  ansible.builtin.meta: flush_handlers

# --- Enable and start ---

- name: Enable and start billing-service
  ansible.builtin.systemd:
    name: billing-service
    enabled: true
    state: started
    daemon_reload: true

# --- Readiness gate ---

- name: Wait for billing-service to be ready
  ansible.builtin.wait_for:
    host: "{{ services.billing.host }}"
    port: "{{ services.billing.port }}"
    timeout: 30

- name: Start previously active billing callers after ledger reset
  ansible.builtin.systemd:
    name: "{{ item.item }}"
    state: started
  loop: >-
    {{
      billing_service_ledger_reset_caller_states.results
      | default([])
      | selectattr('rc', 'equalto', 0)
      | rejectattr('item', 'equalto', 'billing-service')
      | list
    }}
  loop_control:
    label: "{{ item.item }}"
  when: billing_service_should_reset_ledger | default(false) | bool
