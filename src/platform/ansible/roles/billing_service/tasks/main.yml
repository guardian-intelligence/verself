---
# --- Verify binary ---

- name: Verify billing-service binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/billing-service"
  register: billing_service_binary
  failed_when: not billing_service_binary.stat.exists

# --- System user ---

- name: Create billing system group
  ansible.builtin.group:
    name: billing
    system: true

- name: Ensure spire workload socket group exists
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create billing system user
  ansible.builtin.user:
    name: billing
    group: billing
    groups:
      - "{{ spire_workload_group }}"
    append: false
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Assert billing PostgreSQL database name is safe
  ansible.builtin.assert:
    that:
      - billing_service_pg_database is match('^[a-z_][a-z0-9_]*$')
    fail_msg: billing_service_pg_database must be a lowercase PostgreSQL identifier.

# --- nftables egress rules ---

- name: Deploy billing-service nftables ruleset
  ansible.builtin.copy:
    src: "{{ platform_rendered_dir }}/etc/nftables.d/billing.nft"
    dest: /etc/nftables.d/billing.nft
    mode: "0644"
  notify: Reload nftables for billing-service

- name: Apply billing-service nftables before proceeding
  ansible.builtin.meta: flush_handlers

# --- Schema migrations ---

- name: Include billing PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

# --- Credentials ---

- name: Include billing credential tasks
  ansible.builtin.include_tasks: credentials.yml

# --- ClickHouse auth ---

- name: Ensure billing-service ClickHouse user exists with write grants
  ansible.builtin.shell: |
    set -euo pipefail
    {{ clickhouse_operator_client_command }} --multiquery <<'SQL'
    CREATE USER IF NOT EXISTS billing_service IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_billing_service_id }}' HOST LOCAL;
    ALTER USER billing_service IDENTIFIED WITH ssl_certificate SAN 'URI:{{ spire_billing_service_id }}' HOST LOCAL;
    GRANT INSERT ON verself.billing_events TO billing_service;
    GRANT INSERT ON verself.metering TO billing_service;
    SQL
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

# --- Auth configuration ---

- name: Wait for Zitadel before configuring billing auth
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.zitadel.host }}"
    port: "{{ topology_endpoints.zitadel.endpoints.http.port }}"
    timeout: 60

- name: Read Zitadel admin PAT for billing auth setup
  ansible.builtin.slurp:
    src: /etc/zitadel/admin.pat
  register: billing_service_zitadel_admin_pat_raw
  no_log: true

- name: List Zitadel projects for billing auth
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/_search"
    method: POST
    headers:
      Authorization: "Bearer {{ billing_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body: {}
    return_content: true
  register: billing_service_zitadel_projects
  no_log: true

- name: Find billing auth project
  ansible.builtin.set_fact:
    billing_service_auth_project: >-
      {{
        (
          billing_service_zitadel_projects.json.result
          | selectattr('name', 'equalto', billing_service_auth_project_name)
          | list
          | first
        ) | default({})
      }}

- name: Create billing auth project if missing
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ billing_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ billing_service_auth_project_name }}"
      projectRoleAssertion: false
      projectRoleCheck: false
    return_content: true
  register: billing_service_auth_project_created
  when: billing_service_auth_project == {}
  no_log: true

- name: Set billing auth audience
  ansible.builtin.set_fact:
    billing_service_auth_audience: >-
      {{
        billing_service_auth_project.id
        | default(billing_service_auth_project_created.json.id, true)
      }}

- name: Assert billing auth audience is set
  ansible.builtin.assert:
    that: billing_service_auth_audience | default('', true) | length > 0
    fail_msg: billing_service_auth_audience could not be resolved from Zitadel.

- name: Ensure billing project does not require stale internal roles
  ansible.builtin.uri:
    url: "http://{{ topology_endpoints.zitadel.endpoints.http.address }}/management/v1/projects/{{ billing_service_auth_audience }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ billing_service_zitadel_admin_pat_raw.content | b64decode | trim }}"
      Host: "auth.{{ verself_domain }}"
    body_format: json
    body:
      name: "{{ billing_service_auth_project_name }}"
      projectRoleAssertion: false
      projectRoleCheck: false
    status_code: 200
  when: billing_service_auth_project != {}
  no_log: true

# --- systemd unit ---

- name: Deploy billing-service systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Billing Service
      After=verself-firewall.target network.target postgresql.service clickhouse-server.service spire-agent.service secrets-service.service
      Requires=verself-firewall.target
      Wants=postgresql.service clickhouse-server.service spire-agent.service secrets-service.service

      [Service]
      Type=simple
      User=billing
      Group=billing
      SupplementaryGroups={{ spire_workload_group }}
      BindReadOnlyPaths=/etc/verself/auth-discovery-hosts:/etc/hosts
      LoadCredential=clickhouse-ca-cert:/etc/clickhouse-server/tls/server-ca.pem
      Environment=BILLING_CH_ADDRESS={{ topology_endpoints.clickhouse.endpoints.native_tls.address }}
      Environment=BILLING_CH_USER=billing_service
      Environment=BILLING_TB_ADDRESS={{ topology_endpoints.tigerbeetle.endpoints.client.address }}
      Environment=BILLING_TB_CLUSTER_ID={{ billing_service_tigerbeetle_cluster_id }}
      Environment=BILLING_PG_DSN=postgres://billing@/{{ billing_service_pg_database }}?host=/var/run/postgresql&sslmode=disable
      Environment=BILLING_LISTEN_ADDR={{ topology_endpoints.billing.endpoints.public_http.address }}
      Environment=BILLING_INTERNAL_LISTEN_ADDR={{ topology_endpoints.billing.endpoints.internal_https.address }}
      Environment=BILLING_SECRETS_URL=https://{{ topology_endpoints.secrets_service.endpoints.internal_https.address }}
      Environment=BILLING_AUTH_ISSUER_URL={{ billing_service_auth_issuer_url }}
      Environment=BILLING_AUTH_AUDIENCE={{ billing_service_auth_audience }}
      Environment=BILLING_PG_MAX_CONNS={{ billing_service_pg_max_conns }}
      Environment=BILLING_PG_MIN_CONNS={{ billing_service_pg_min_conns }}
      Environment=BILLING_PG_CONN_MAX_LIFETIME_SECONDS={{ billing_service_pg_conn_max_lifetime_seconds }}
      Environment=BILLING_PG_CONN_MAX_IDLE_SECONDS={{ billing_service_pg_conn_max_idle_seconds }}
      Environment=SPIFFE_ENDPOINT_SOCKET=unix://{{ spire_agent_socket_path }}
      ExecStart={{ verself_bin }}/billing-service
      Restart=on-failure
      RestartSec=5
      ProtectSystem=strict
      ProtectHome=true
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectControlGroups=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictNamespaces=true
      LockPersonality=true

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/billing-service.service
    mode: "0644"
  notify:
    - restart billing-service

- name: Trigger billing-service restart after binary and schema are in sync
  ansible.builtin.command: /bin/true
  changed_when: deploy_profile_billing_service_binary_copy.changed | default(false)
  notify:
    - restart billing-service

- name: Apply billing-service unit changes before proceeding
  ansible.builtin.meta: flush_handlers

# --- Enable and start ---

- name: Enable and start billing-service
  ansible.builtin.systemd:
    name: billing-service
    enabled: true
    state: started
    daemon_reload: true

# --- Readiness gate ---

- name: Wait for billing-service to be ready
  ansible.builtin.wait_for:
    host: "{{ topology_endpoints.billing.host }}"
    port: "{{ topology_endpoints.billing.endpoints.public_http.port }}"
    timeout: 30

- name: Start previously active billing callers after ledger reset
  ansible.builtin.systemd:
    name: "{{ item.item }}"
    state: started
  loop: >-
    {{
      billing_service_ledger_reset_caller_states.results
      | default([])
      | selectattr('active')
      | rejectattr('item', 'equalto', 'billing-service')
      | list
    }}
  loop_control:
    label: "{{ item.item }}"
  when: billing_service_should_reset_ledger | default(false) | bool
