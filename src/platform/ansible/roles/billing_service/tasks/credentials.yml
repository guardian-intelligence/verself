---
- name: Create credstore directory for billing
  ansible.builtin.file:
    path: /etc/credstore/billing
    state: directory
    owner: root
    group: billing
    mode: "0750"

# Test credentials — used by `go test` on the bare metal host, not by the
# billing-service runtime. Deployed to the same credstore for consistency.

- name: Deploy Stripe test publishable key credential
  ansible.builtin.copy:
    content: "{{ stripe_publishable_key }}"
    dest: /etc/credstore/billing/stripe-test-publishable-key
    owner: root
    group: billing
    mode: "0640"
  no_log: true

- name: Deploy Stripe test webhook endpoint ID credential
  ansible.builtin.copy:
    content: "{{ stripe_test_webhook_endpoint_id }}"
    dest: /etc/credstore/billing/stripe-test-webhook-endpoint-id
    owner: root
    group: billing
    mode: "0640"
  no_log: true

- name: Reconcile Stripe test webhook endpoint URL
  ansible.builtin.uri:
    url: "https://api.stripe.com/v1/webhook_endpoints/{{ stripe_test_webhook_endpoint_id }}"
    method: POST
    url_username: "{{ stripe_secret_key }}"
    url_password: ""
    force_basic_auth: true
    body_format: form-urlencoded
    body:
      url: "https://{{ billing_service_domain }}/webhooks/stripe"
    status_code: 200
    return_content: false
  delegate_to: localhost
  become: false
  no_log: true
