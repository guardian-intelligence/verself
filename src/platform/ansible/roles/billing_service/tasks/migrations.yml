---
- name: Probe billing callers before potential ledger reset
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - "{{ item }}"
  loop:
    - sandbox-rental-service
    - billing-service
  loop_control:
    label: "{{ item }}"
  register: billing_service_ledger_reset_caller_states
  # is-active returns non-zero when the unit is inactive — legitimate signal.
  failed_when: false
  changed_when: false

- name: Apply billing PostgreSQL migrations
  ansible.builtin.include_role:
    name: service_pg_migrations
  vars:
    service_pg_migrations_service: billing-service
    service_pg_migrations_db: "{{ billing_service_pg_database }}"
    service_pg_migrations_db_user: billing
    service_pg_migrations_db_owner: billing
    service_pg_migrations_db_password: "{{ postgresql_billing_password }}"
    service_pg_migrations_source_dir: "{{ playbook_dir }}/../../../billing-service/migrations"
    service_pg_migrations_probe_table: orgs
    service_pg_migrations_stop_units:
      - sandbox-rental-service
      - billing-service
    service_pg_migrations_force_reset: "{{ billing_service_force_ledger_reset | default(false) | bool }}"

# Billing is special: on ledger reset we also blow away and re-format the
# TigerBeetle cluster so the account ledger matches the fresh schema. The
# shared role doesn't know about TigerBeetle; keep the TB dance here gated
# on the same "should reset" state it computed.
- name: Reset TigerBeetle when billing schema resets
  when: service_pg_migrations_should_reset | default(false) | bool
  block:
    - name: Stop TigerBeetle before billing ledger reset
      ansible.builtin.systemd:
        name: tigerbeetle
        state: stopped

    - name: Remove TigerBeetle data file before billing ledger reset
      ansible.builtin.file:
        path: "{{ billing_service_tigerbeetle_data_file }}"
        state: absent

    - name: Format TigerBeetle data file for billing ledger reset
      ansible.builtin.command:
        cmd: >-
          {{ fm_bin }}/tigerbeetle format
          --cluster={{ billing_service_tigerbeetle_cluster_id }}
          --replica={{ billing_service_tigerbeetle_replica_id }}
          --replica-count={{ billing_service_tigerbeetle_replica_count }}
          {{ billing_service_tigerbeetle_data_file }}
      become: true
      become_user: tigerbeetle
      changed_when: true

    - name: Start TigerBeetle after billing ledger reset
      ansible.builtin.systemd:
        name: tigerbeetle
        state: started

    - name: Wait for TigerBeetle after billing ledger reset
      ansible.builtin.wait_for:
        host: "{{ services.tigerbeetle.host }}"
        port: "{{ services.tigerbeetle.port }}"
        timeout: 30

- name: Reconcile billing object ownership and privileges
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres
      -d {{ billing_service_pg_database }}
      -v ON_ERROR_STOP=1
    stdin: |
      DO $$
      DECLARE
        table_name text;
      BEGIN
        FOREACH table_name IN ARRAY ARRAY[
          'orgs',
          'products',
          'credit_buckets',
          'skus',
          'plans',
          'plan_sku_rates',
          'entitlement_policies',
          'plan_entitlements',
          'contracts',
          'provider_bindings',
          'payment_methods',
          'billing_provider_events',
          'contract_changes',
          'contract_phases',
          'contract_entitlement_lines',
          'billing_cycles',
          'entitlement_periods',
          'credit_grants',
          'billing_windows',
          'billing_window_ledger_legs',
          'billing_finalizations',
          'billing_documents',
          'billing_document_line_items',
          'invoice_adjustments',
          'document_number_allocators',
          'billing_document_previews',
          'billing_payment_disputes',
          'billing_ledger_accounts',
          'billing_ledger_commands',
          'billing_ledger_drift_events',
          'billing_events',
          'billing_event_delivery_queue',
          'billing_clock_overrides',
          'river_migration',
          'river_job',
          'river_queue',
          'river_leader',
          'river_client',
          'river_client_queue'
        ]
        LOOP
          IF to_regclass('public.' || table_name) IS NOT NULL THEN
            EXECUTE format('ALTER TABLE public.%I OWNER TO billing', table_name);
            EXECUTE format('GRANT ALL PRIVILEGES ON TABLE public.%I TO billing', table_name);
          END IF;
        END LOOP;
      END
      $$;
      GRANT USAGE, CREATE ON SCHEMA public TO billing;
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  changed_when: false
  no_log: true
