---
- name: Compute local PostgreSQL migrations fingerprint
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.shell:
    cmd: "set -o pipefail && find . -name '[0-9][0-9][0-9]_*.up.sql' -exec sha256sum {} + | sort | sha256sum"
    chdir: "{{ playbook_dir }}/../../../billing-service/postgresql-migrations"
    executable: /bin/bash
  register: billing_service_pg_migrations_local_hash
  changed_when: false

- name: Read remote PostgreSQL migrations fingerprint
  ansible.builtin.slurp:
    src: /opt/forge-metal/postgresql-migrations/.applied-hash
  register: billing_service_pg_migrations_remote_hash
  failed_when: false

- name: Probe for expected billing tables
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres
      -d sandbox
      -tAc
      "SELECT count(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_name = 'orgs';"
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  register: billing_service_pg_table_probe
  failed_when: false
  changed_when: false
  no_log: true

- name: Determine whether billing ledger reset is required
  ansible.builtin.set_fact:
    billing_service_should_reset_ledger: >-
      {{
        (billing_service_force_ledger_reset | default(false) | bool)
        or (billing_service_pg_migrations_remote_hash is failed)
        or ((billing_service_pg_migrations_remote_hash.content | default('') | b64decode | trim)
           != (billing_service_pg_migrations_local_hash.stdout.split()[0] | trim))
        or ((billing_service_pg_table_probe.stdout | default('0', true) | trim) == '0')
      }}

- name: Apply billing PostgreSQL migrations
  when: billing_service_should_reset_ledger | bool
  block:
    - name: Remove deployed PostgreSQL migrations directory
      ansible.builtin.file:
        path: /opt/forge-metal/postgresql-migrations
        state: absent

    - name: Create deployed PostgreSQL migrations directory
      ansible.builtin.file:
        path: /opt/forge-metal/postgresql-migrations
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Upload PostgreSQL migrations
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../billing-service/postgresql-migrations/"
        dest: /opt/forge-metal/postgresql-migrations/
        mode: "0644"

    - name: Probe billing callers before billing ledger reset
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - "{{ item }}"
      loop:
        - sandbox-rental-service
        - billing-service
      loop_control:
        label: "{{ item }}"
      register: billing_service_ledger_reset_caller_states
      failed_when: false
      changed_when: false

    - name: Stop billing callers before billing ledger reset
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - sandbox-rental-service
        - billing-service
      failed_when: false

    - name: Stop TigerBeetle before billing ledger reset
      ansible.builtin.systemd:
        name: tigerbeetle
        state: stopped

    - name: Remove TigerBeetle data file before billing ledger reset
      ansible.builtin.file:
        path: "{{ billing_service_tigerbeetle_data_file }}"
        state: absent

    - name: Format TigerBeetle data file for billing ledger reset
      ansible.builtin.command:
        cmd: >-
          {{ fm_bin }}/tigerbeetle format
          --cluster={{ billing_service_tigerbeetle_cluster_id }}
          --replica={{ billing_service_tigerbeetle_replica_id }}
          --replica-count={{ billing_service_tigerbeetle_replica_count }}
          {{ billing_service_tigerbeetle_data_file }}
      become: true
      become_user: tigerbeetle
      changed_when: true

    - name: Start TigerBeetle after billing ledger reset
      ansible.builtin.systemd:
        name: tigerbeetle
        state: started

    - name: Wait for TigerBeetle after billing ledger reset
      ansible.builtin.wait_for:
        host: "{{ services.tigerbeetle.host }}"
        port: "{{ services.tigerbeetle.port }}"
        timeout: 30

    - name: Reset sandbox PostgreSQL database for billing schema
      ansible.builtin.include_role:
        name: postgresql_db_reset
      vars:
        postgresql_db_reset_name: sandbox
        postgresql_db_reset_owner: billing
        postgresql_db_reset_stop_units:
          - sandbox-rental-service
          - billing-service

    - name: Apply PostgreSQL migration files
      ansible.builtin.command:
        cmd: >-
          {{ fm_bin }}/psql
          -h {{ services.postgresql.host }}
          -p {{ services.postgresql.port }}
          -U billing
          -d sandbox
          -v ON_ERROR_STOP=1
          -f /opt/forge-metal/postgresql-migrations/{{ item }}
      environment:
        PGPASSWORD: "{{ postgresql_billing_password }}"
      loop: >-
        {{
          query('ansible.builtin.fileglob', playbook_dir + '/../../../billing-service/postgresql-migrations/[0-9][0-9][0-9]_*.up.sql')
          | map('basename')
          | sort
        }}
      loop_control:
        label: "{{ item }}"
      changed_when: false
      no_log: true

    - name: Record PostgreSQL migrations fingerprint
      ansible.builtin.copy:
        content: "{{ billing_service_pg_migrations_local_hash.stdout.split()[0] }}\n"
        dest: /opt/forge-metal/postgresql-migrations/.applied-hash
        mode: "0644"

- name: Reconcile billing object ownership and privileges
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres
      -d sandbox
      -v ON_ERROR_STOP=1
    stdin: |
      DO $$
      DECLARE
        table_name text;
        sequence_name text;
      BEGIN
        FOREACH table_name IN ARRAY ARRAY[
          'products',
          'plans',
          'orgs',
          'subscriptions',
          'credit_grants',
          'billing_windows'
        ]
        LOOP
          IF to_regclass('public.' || table_name) IS NOT NULL THEN
            EXECUTE format('ALTER TABLE public.%I OWNER TO billing', table_name);
            EXECUTE format('GRANT ALL PRIVILEGES ON TABLE public.%I TO billing', table_name);
          END IF;
        END LOOP;

        FOREACH sequence_name IN ARRAY ARRAY[
          'subscriptions_subscription_id_seq'
        ]
        LOOP
          IF to_regclass('public.' || sequence_name) IS NOT NULL THEN
            EXECUTE format('ALTER SEQUENCE public.%I OWNER TO billing', sequence_name);
            EXECUTE format('GRANT ALL PRIVILEGES ON SEQUENCE public.%I TO billing', sequence_name);
          END IF;
        END LOOP;
      END
      $$;
      GRANT USAGE, CREATE ON SCHEMA public TO billing;
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  changed_when: false
  no_log: true
