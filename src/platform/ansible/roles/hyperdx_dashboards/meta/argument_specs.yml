---
argument_specs:
  main:
    short_description: "HyperDX sources and dashboard synchronization"
    description:
      - "Uses the live HyperDX API plus MongoDB source metadata to create or"
      - "update the default infrastructure dashboards without rebuilding or"
      - "restarting the HyperDX application."
      - "Service ports come from the services registry (group_vars/all/services.yml)."
    options:
      fm_bin:
        type: path
        required: true
        description: "Path to the server binary directory."
