---
argument_specs:
  main:
    short_description: "Caddy edge proxy for Billing Service, Grafana, Temporal Web, Forgejo, and Zitadel"
    description:
      - "Configures Caddy and renders the edge config that fronts Billing Service,"
      - "Grafana, Temporal Web, Forgejo, and Zitadel with site-specific WAF policies and access logging."
      - "Billing Service exposes only /webhooks/stripe publicly; all other paths return 404."
      - "The billing webhook route is allowlisted to Stripe's published source IPs."
      - "Zitadel uses h2c (HTTP/2 cleartext) for gRPC on the same port."
      - "Service ports come from the services registry (group_vars/all/services.yml)."
    options:
      caddy_stripe_webhook_ips:
        type: list
        elements: str
        required: true
        description: "Stripe-published webhook source IPs allowed to call the billing webhook route."

      billing_service_domain:
        type: str
        required: true
        description: "Public domain for the Billing Service (only /webhooks/stripe exposed)."

      grafana_domain:
        type: str
        required: true
        description: "Public domain for the Grafana dashboard."

      temporal_web_domain:
        type: str
        required: true
        description: "Public domain for the Temporal operator web UI."

      forgejo_domain:
        type: str
        required: true
        description: "Public domain for Forgejo."

      zitadel_domain:
        type: str
        required: true
        description: "Public domain for Zitadel (h2c reverse proxy)."

      fm_bin:
        type: path
        required: true
        description: "Path to the server binary directory."
