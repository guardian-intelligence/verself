---
# Caddy reverse proxy with automatic TLS.
# Binary provided by deploy_profile role (xcaddy build on controller).

- name: Create Caddy config directory
  ansible.builtin.file:
    path: /etc/caddy
    state: directory
    mode: "0755"

- name: Create Caddy log directory
  ansible.builtin.file:
    path: /var/log/caddy
    state: directory
    owner: root
    mode: "0755"

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: "0644"
  notify: restart caddy

- name: Deploy Caddy systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Caddy HTTP/2 web server
      After=forge-metal-firewall.target network-online.target
      Requires=forge-metal-firewall.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart={{ fm_bin }}/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
      ExecReload={{ fm_bin }}/caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
      Restart=on-failure
      RestartSec=5
      AmbientCapabilities=CAP_NET_BIND_SERVICE
      CapabilityBoundingSet=CAP_NET_BIND_SERVICE
      LimitNOFILE=1048576

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/caddy.service
    mode: "0644"
  notify:
    - restart caddy

- name: Enable and start Caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
    daemon_reload: true
