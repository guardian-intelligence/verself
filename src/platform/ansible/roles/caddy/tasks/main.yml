---
# Caddy reverse proxy with automatic TLS.
# Binary provided by deploy_profile role (xcaddy build on controller).

- name: Create Caddy config directory
  ansible.builtin.file:
    path: /etc/caddy
    state: directory
    mode: "0755"

- name: Create Caddy log directory
  ansible.builtin.file:
    path: /var/log/caddy
    state: directory
    owner: root
    mode: "0755"

- name: Require billing webhook DNS to remain DNS-only
  ansible.builtin.assert:
    that: not (cloudflare_proxied | default(false) | bool)
    fail_msg: >-
      billing webhook origin IP allowlisting requires billing DNS to remain
      DNS-only (cloudflare_proxied=false). Move the allowlist to the
      Cloudflare edge before enabling orange-cloud proxying.

- name: Fetch Stripe webhook IP feed
  ansible.builtin.uri:
    url: "{{ caddy_stripe_webhook_ips_url }}"
    method: GET
    status_code: 200
    return_content: true
  register: caddy_stripe_webhook_ips_response
  delegate_to: localhost
  become: false
  retries: 5
  delay: 3
  until:
    - caddy_stripe_webhook_ips_response.status == 200
    - caddy_stripe_webhook_ips_response.json.WEBHOOKS | default([], true) | length > 0

- name: Set Stripe webhook IP list fact
  ansible.builtin.set_fact:
    caddy_stripe_webhook_ips: "{{ caddy_stripe_webhook_ips_response.json.WEBHOOKS }}"

- name: Assert Stripe webhook IP list parsed
  ansible.builtin.assert:
    that:
      - caddy_stripe_webhook_ips | length > 0
      - caddy_stripe_webhook_ips | select('string') | list | length == caddy_stripe_webhook_ips | length
    fail_msg: >-
      Failed to parse Stripe webhook IPs from {{ caddy_stripe_webhook_ips_url }}.

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: "0644"
  notify: restart caddy

- name: Deploy Caddy systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Caddy HTTP/2 web server
      After=forge-metal-firewall.target network-online.target
      Requires=forge-metal-firewall.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart={{ fm_bin }}/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
      ExecReload={{ fm_bin }}/caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
      Restart=on-failure
      RestartSec=5
      AmbientCapabilities=CAP_NET_BIND_SERVICE
      CapabilityBoundingSet=CAP_NET_BIND_SERVICE
      LimitNOFILE=1048576

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/caddy.service
    mode: "0644"
  notify:
    - restart caddy

- name: Enable and start Caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
    daemon_reload: true
