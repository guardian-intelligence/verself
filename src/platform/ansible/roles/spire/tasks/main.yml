---
- name: Assert SPIRE JWT bundle endpoint remains loopback-only
  ansible.builtin.assert:
    that:
      - spire_bundle_endpoint_bind_address == '127.0.0.1'
      - spire_jwt_bundle_endpoint_url == 'https://127.0.0.1:' ~ (spire_bundle_endpoint_bind_port | string)
      - spire_jwt_issuer_url == spire_jwt_bundle_endpoint_url
    fail_msg: >-
      SPIRE's JWT bundle endpoint is an internal OpenBao JWKS endpoint in this
      topology. Use a different threat model before changing its bind address
      or issuer URL.

- name: Create spire system group
  ansible.builtin.group:
    name: spire
    system: true

- name: Create SPIRE workload socket group
  ansible.builtin.group:
    name: "{{ spire_workload_group }}"
    system: true

- name: Create spire system user
  ansible.builtin.user:
    name: spire
    group: spire
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create SPIRE directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/spire/server, owner: root, group: spire, mode: "0750" }
    - { path: /etc/spire/agent, owner: root, group: spire, mode: "0750" }
    - { path: /etc/spire/bundle-endpoint, owner: root, group: spire, mode: "0750" }
    - { path: /var/lib/spire, owner: root, group: spire, mode: "0750" }
    - { path: /var/lib/spire/server, owner: spire, group: spire, mode: "0700" }
    - { path: /var/lib/spire/agent, owner: spire, group: "{{ spire_workload_group }}", mode: "0700" }
    - { path: /run/spire-server/private, owner: spire, group: spire, mode: "0750" }
    - { path: /run/spire-agent/sockets, owner: spire, group: "{{ spire_workload_group }}", mode: "0750" }

- name: Generate SPIRE bundle endpoint local CA private key
  ansible.builtin.command:
    argv:
      - openssl
      - genrsa
      - -out
      - /etc/spire/bundle-endpoint/ca-key.pem
      - "4096"
    creates: /etc/spire/bundle-endpoint/ca-key.pem

- name: Generate SPIRE bundle endpoint local CA certificate
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -x509
      - -new
      - -nodes
      - -key
      - /etc/spire/bundle-endpoint/ca-key.pem
      - -sha256
      - -days
      - "3650"
      - -out
      - /etc/spire/bundle-endpoint/ca.pem
      - -subj
      - /CN=Verself SPIRE JWT bundle local CA
    creates: /etc/spire/bundle-endpoint/ca.pem

- name: Deploy SPIRE bundle endpoint server certificate extensions
  ansible.builtin.copy:
    dest: /etc/spire/bundle-endpoint/server-cert.ext
    owner: root
    group: spire
    mode: "0644"
    content: |
      basicConstraints=CA:FALSE
      keyUsage=digitalSignature,keyEncipherment
      extendedKeyUsage=serverAuth
      subjectAltName=IP:127.0.0.1,DNS:localhost

- name: Generate SPIRE bundle endpoint server private key and CSR
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -new
      - -newkey
      - rsa:2048
      - -nodes
      - -keyout
      - /etc/spire/bundle-endpoint/server-key.pem
      - -out
      - /etc/spire/bundle-endpoint/server.csr
      - -subj
      - /CN=127.0.0.1
    creates: /etc/spire/bundle-endpoint/server-key.pem

- name: Sign SPIRE bundle endpoint server certificate
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -req
      - -in
      - /etc/spire/bundle-endpoint/server.csr
      - -CA
      - /etc/spire/bundle-endpoint/ca.pem
      - -CAkey
      - /etc/spire/bundle-endpoint/ca-key.pem
      - -CAcreateserial
      - -out
      - /etc/spire/bundle-endpoint/server-cert.pem
      - -days
      - "3650"
      - -sha256
      - -extfile
      - /etc/spire/bundle-endpoint/server-cert.ext
    creates: /etc/spire/bundle-endpoint/server-cert.pem

- name: Set SPIRE bundle endpoint TLS material ownership
  ansible.builtin.file:
    path: "/etc/spire/bundle-endpoint/{{ item.name }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { name: ca.pem, owner: root, group: spire, mode: "0644" }
    - { name: ca-key.pem, owner: root, group: root, mode: "0600" }
    - { name: server-cert.pem, owner: root, group: spire, mode: "0644" }
    - { name: server-key.pem, owner: root, group: spire, mode: "0640" }
    - { name: server.csr, owner: root, group: spire, mode: "0644" }
    - { name: server-cert.ext, owner: root, group: spire, mode: "0644" }

- name: Check SPIRE bundle endpoint CA serial file
  ansible.builtin.stat:
    path: /etc/spire/bundle-endpoint/ca.srl
  register: spire_bundle_endpoint_ca_serial

- name: Set SPIRE bundle endpoint CA serial ownership
  ansible.builtin.file:
    path: /etc/spire/bundle-endpoint/ca.srl
    owner: root
    group: root
    mode: "0600"
  when: spire_bundle_endpoint_ca_serial.stat.exists

- name: Converge SPIRE agent state ownership
  ansible.builtin.file:
    path: /var/lib/spire/agent
    state: directory
    owner: spire
    group: "{{ spire_workload_group }}"
    mode: "0700"

- name: Discover SPIRE agent state files
  ansible.builtin.find:
    paths: /var/lib/spire/agent
    file_type: file
    recurse: false
  register: spire_agent_state_files

- name: Converge SPIRE agent state file permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: file
    owner: spire
    group: "{{ spire_workload_group }}"
    mode: "0600"
  loop: "{{ spire_agent_state_files.files }}"

- name: Deploy SPIRE server config
  ansible.builtin.template:
    src: server.conf.j2
    dest: /etc/spire/server/server.conf
    owner: root
    group: spire
    mode: "0640"
  notify: restart spire-server

- name: Deploy SPIRE agent config
  ansible.builtin.template:
    src: agent.conf.j2
    dest: /etc/spire/agent/agent.conf
    owner: root
    group: spire
    mode: "0640"

- name: Validate SPIRE server config
  ansible.builtin.command:
    cmd: "{{ verself_bin }}/spire-server validate -config /etc/spire/server/server.conf"
  changed_when: false

- name: Validate SPIRE agent config
  ansible.builtin.command:
    cmd: "{{ verself_bin }}/spire-agent validate -config /etc/spire/agent/agent.conf"
  changed_when: false

- name: Deploy spire-server systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=SPIRE Server
      After=verself-firewall.target network.target
      Requires=verself-firewall.target

      [Service]
      Type=simple
      User=spire
      Group=spire
      RuntimeDirectory=spire-server/private
      RuntimeDirectoryMode=0750
      ExecStart={{ verself_bin }}/spire-server run -config /etc/spire/server/server.conf
      Restart=on-failure
      RestartSec=5
      CapabilityBoundingSet=
      ProtectHome=true
      ProtectSystem=strict
      ReadWritePaths=/var/lib/spire/server /run/spire-server/private
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0077

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/spire-server.service
    mode: "0644"
  notify: restart spire-server

- name: Apply SPIRE server unit and config changes before proceeding
  ansible.builtin.meta: flush_handlers

- name: Enable and start spire-server
  ansible.builtin.systemd:
    name: spire-server
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for SPIRE bundle endpoint listener
  ansible.builtin.wait_for:
    host: "{{ spire_bundle_endpoint_bind_address }}"
    port: "{{ spire_bundle_endpoint_bind_port }}"
    timeout: 30

- name: Wait for SPIRE server API socket
  ansible.builtin.wait_for:
    path: "{{ spire_server_socket_path }}"
    timeout: 30

- name: Check SPIRE agent attestation state
  ansible.builtin.stat:
    path: /var/lib/spire/agent/agent-data.json
  register: spire_agent_attestation_state

- name: Stop SPIRE agent before single-node re-attestation
  ansible.builtin.systemd:
    name: spire-agent
    state: stopped
    daemon_reload: true
  failed_when: false
  when: not spire_agent_attestation_state.stat.exists

- name: Remove SPIRE agent state before single-node re-attestation
  ansible.builtin.file:
    path: /var/lib/spire/agent
    state: absent
  when: not spire_agent_attestation_state.stat.exists

- name: Recreate SPIRE agent state directory before single-node re-attestation
  ansible.builtin.file:
    path: /var/lib/spire/agent
    state: directory
    owner: spire
    group: "{{ spire_workload_group }}"
    mode: "0700"
  when: not spire_agent_attestation_state.stat.exists

- name: Deploy spire-agent systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=SPIRE Agent
      After=verself-firewall.target network.target spire-server.service
      Requires=verself-firewall.target spire-server.service

      [Service]
      Type=simple
      User=spire
      Group={{ spire_workload_group }}
      SupplementaryGroups=spire
      RuntimeDirectory=spire-agent/private spire-agent/sockets
      RuntimeDirectoryMode=0750
      ExecStartPre=/bin/sh -c {{ spire_agent_join_token_exec | quote }}
      ExecStart={{ verself_bin }}/spire-agent run -config /etc/spire/agent/agent.conf -joinTokenFile /run/spire-agent/private/join-token
      ExecStartPost=/bin/sh -c 'sleep 2; rm -f /run/spire-agent/private/join-token'
      Restart=on-failure
      RestartSec=5
      CapabilityBoundingSet=
      ProtectHome=true
      ProtectSystem=strict
      ReadWritePaths=/var/lib/spire/agent /run/spire-agent/private /run/spire-agent/sockets
      PrivateDevices=true
      PrivateTmp=true
      ProtectClock=true
      ProtectControlGroups=true
      ProtectKernelLogs=true
      ProtectKernelModules=true
      ProtectKernelTunables=true
      LockPersonality=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictRealtime=true
      RestrictSUIDSGID=true
      SystemCallArchitectures=native
      UMask=0007

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/spire-agent.service
    mode: "0644"
  vars:
    spire_agent_join_token_exec: >-
      umask 077;
      {{ verself_bin }}/spire-server token generate
      -socketPath {{ spire_server_socket_path }}
      -spiffeID {{ spire_agent_id }}
      -ttl 600
      -output json
      | jq -r .value
      > /run/spire-agent/private/join-token
  notify: restart spire-agent

- name: Apply SPIRE unit changes before proceeding
  ansible.builtin.meta: flush_handlers

- name: Enable and start spire-agent
  ansible.builtin.systemd:
    name: spire-agent
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for SPIRE workload API socket
  ansible.builtin.wait_for:
    path: "{{ spire_agent_socket_path }}"
    timeout: 30
