---
# PostgreSQL database server.
# Binary provided by deploy_profile role (apt from PGDG repo).

# --- Binary presence ---

- name: Verify PostgreSQL binary exists in profile
  ansible.builtin.stat:
    path: "{{ verself_bin }}/postgres"
  register: postgresql_binary
  failed_when: not postgresql_binary.stat.exists

- name: Capture PostgreSQL version
  ansible.builtin.command:
    cmd: "{{ verself_bin }}/postgres --version"
  register: postgresql_version_output
  changed_when: false

- name: Assert PostgreSQL version matches expected
  ansible.builtin.assert:
    that: "'16.' in postgresql_version_output.stdout"
    fail_msg: >-
      Expected PostgreSQL 16.x, got: {{ postgresql_version_output.stdout }}.
      Update server-tools.json or adjust the version assertion.

# --- System user ---

- name: Create postgres system group
  ansible.builtin.group:
    name: postgres
    system: true

- name: Create postgres system user
  ansible.builtin.user:
    name: postgres
    group: postgres
    system: true
    home: /var/lib/postgresql
    shell: /bin/bash
    create_home: true

# --- Directories ---

- name: Create PostgreSQL directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"
  loop:
    - "{{ postgresql_data_dir }}"
    - "{{ postgresql_config_dir }}"

- name: Create PostgreSQL log directory
  ansible.builtin.file:
    # The setgid bit keeps new collector-readable log files in group adm even
    # though postgres runs with primary group postgres.
    path: "{{ postgresql_log_dir }}"
    state: directory
    owner: postgres
    group: adm
    mode: "2755"

- name: Discover PostgreSQL log files
  ansible.builtin.find:
    paths: "{{ postgresql_log_dir }}"
    patterns: "postgresql-*.log"
    file_type: file
  register: postgresql_log_files

- name: Repair PostgreSQL log file permissions for OTel ingestion
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: postgres
    group: adm
    mode: "0640"
  loop: "{{ postgresql_log_files.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Create PostgreSQL run directory
  ansible.builtin.file:
    path: /var/run/postgresql
    state: directory
    owner: postgres
    group: postgres
    mode: "0755"

# --- Idempotent initdb ---

- name: Check if PostgreSQL data directory is initialized
  ansible.builtin.stat:
    path: "{{ postgresql_data_dir }}/PG_VERSION"
  register: postgresql_data_stat

- name: Write temporary password file for initdb
  ansible.builtin.copy:
    content: "{{ postgresql_admin_password }}"
    dest: /tmp/.pg_initdb_pw
    owner: postgres
    group: postgres
    mode: "0600"
  when: not postgresql_data_stat.stat.exists
  no_log: true

- name: Initialize PostgreSQL data directory
  ansible.builtin.command:
    cmd: >-
      {{ verself_bin }}/initdb
      --pgdata={{ postgresql_data_dir }}
      --auth=scram-sha-256
      --encoding=UTF8
      --locale=C.UTF-8
      --pwfile=/tmp/.pg_initdb_pw
  become: true
  become_user: postgres
  environment:
    HOME: /tmp
  changed_when: true
  when: not postgresql_data_stat.stat.exists

- name: Remove temporary password file
  ansible.builtin.file:
    path: /tmp/.pg_initdb_pw
    state: absent

# --- Configuration ---

- name: Deploy postgresql.conf
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: "{{ postgresql_config_dir }}/postgresql.conf"
    owner: postgres
    group: postgres
    mode: "0600"
  notify:
    - restart postgresql

- name: Deploy pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "{{ postgresql_config_dir }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0600"
  notify:
    - restart postgresql

- name: Deploy pg_ident.conf
  ansible.builtin.template:
    src: pg_ident.conf.j2
    dest: "{{ postgresql_config_dir }}/pg_ident.conf"
    owner: postgres
    group: postgres
    mode: "0600"
  notify:
    - restart postgresql

# --- systemd unit ---

- name: Deploy PostgreSQL systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=PostgreSQL
      After=verself-firewall.target network.target
      Requires=verself-firewall.target

      [Service]
      Type=simple
      User=postgres
      Group=postgres
      ExecStart={{ verself_bin }}/postgres -D {{ postgresql_data_dir }} -c config_file={{ postgresql_config_dir }}/postgresql.conf
      ExecReload=/bin/kill -HUP $MAINPID
      Restart=on-failure
      RestartSec=5
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/postgresql.service
    mode: "0644"
  notify:
    - restart postgresql

- name: Apply PostgreSQL unit changes before proceeding
  ansible.builtin.meta: flush_handlers

# --- Enable and start ---

- name: Enable and start PostgreSQL
  ansible.builtin.systemd:
    name: postgresql
    enabled: true
    state: started
    daemon_reload: true

# --- Readiness gate ---

- name: Wait for PostgreSQL to be ready
  ansible.builtin.wait_for:
    port: "{{ services.postgresql.port }}"
    host: "{{ services.postgresql.host }}"
    timeout: 30

# --- Set admin password (idempotent — always update to match credential file) ---

- name: Set postgres superuser password
  community.postgresql.postgresql_user:
    name: postgres
    password: "{{ postgresql_admin_password }}"
    login_unix_socket: /var/run/postgresql
    login_user: postgres
    trust_input: false
  become: true
  become_user: postgres
  no_log: true

- name: Ensure PostgreSQL roles and databases match desired state
  vars:
    postgresql_managed_roles:
      - name: billing
        password: "{{ postgresql_billing_password }}"
        role_attr_flags: LOGIN
        conn_limit: "{{ postgresql_role_connection_limits.billing }}"
      - name: sandbox_rental
        password: "{{ postgresql_sandbox_rental_password }}"
        role_attr_flags: LOGIN
        conn_limit: "{{ postgresql_role_connection_limits.sandbox_rental }}"
      # Stalwart authenticates via Unix-socket peer auth (pg_ident: stalwart ->
      # stalwart). The role is deliberately password-less so TCP/SCRAM auth
      # cannot reach it even from the loopback interface.
      - name: stalwart
        role_attr_flags: LOGIN
        conn_limit: "{{ postgresql_role_connection_limits.stalwart }}"
      # Temporal connects over the local Unix socket with peer auth only. The
      # role is password-less so no loopback SCRAM secret can linger after a reset.
      - name: temporal
        role_attr_flags: LOGIN
        conn_limit: "{{ postgresql_role_connection_limits.temporal }}"
    postgresql_managed_databases:
      - name: "{{ billing_service_pg_database | default('billing') }}"
        owner: billing
      - name: storefront
        owner: billing
      - name: sandbox_rental
        owner: sandbox_rental
      - name: stalwart
        owner: stalwart
      - name: temporal
        owner: temporal
      - name: temporal_visibility
        owner: temporal
  module_defaults:
    community.postgresql.postgresql_user:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      trust_input: false
    community.postgresql.postgresql_db:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      maintenance_db: postgres
      trust_input: false
    community.postgresql.postgresql_owner:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: postgres
      trust_input: false
    community.postgresql.postgresql_ping:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: postgres
    community.postgresql.postgresql_query:
      login_host: "{{ services.postgresql.host }}"
      login_port: "{{ services.postgresql.port }}"
      login_user: postgres
      login_password: "{{ postgresql_admin_password }}"
      login_db: postgres
      trust_input: false
  block:
    - name: Ensure application PostgreSQL roles exist
      community.postgresql.postgresql_user:
        name: "{{ item.name }}"
        password: "{{ item.password | default(omit) }}"
        role_attr_flags: "{{ item.role_attr_flags }}"
        conn_limit: "{{ item.conn_limit }}"
      loop: "{{ postgresql_managed_roles }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    # Peer-auth-only roles must have no password at all — otherwise the 127.0.0.1
    # SCRAM rule in pg_hba.conf would still accept a historical password from a
    # previous cutover. postgresql_user won't clear a password by omission, so
    # we clear it explicitly on every converge.
    - name: Clear password on peer-auth-only PostgreSQL roles
      community.postgresql.postgresql_query:
        query: "ALTER ROLE {{ item }} PASSWORD NULL"
      loop:
        - stalwart
        - temporal
      loop_control:
        label: "{{ item }}"

    - name: Ensure application PostgreSQL databases exist
      community.postgresql.postgresql_db:
        name: "{{ item.name }}"
        owner: "{{ item.owner }}"
        state: present
      loop: "{{ postgresql_managed_databases }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Ensure application PostgreSQL database ownership
      community.postgresql.postgresql_owner:
        obj_name: "{{ item.name }}"
        obj_type: database
        new_owner: "{{ item.owner }}"
      loop: "{{ postgresql_managed_databases }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Verify PostgreSQL connectivity
      community.postgresql.postgresql_ping:
      register: postgresql_ping_result
      no_log: true

- name: Assert PostgreSQL connectivity succeeded
  ansible.builtin.assert:
    that: postgresql_ping_result.is_available | default(false)
    fail_msg: >-
      PostgreSQL connectivity check failed for
      {{ services.postgresql.host }}:{{ services.postgresql.port }}.
