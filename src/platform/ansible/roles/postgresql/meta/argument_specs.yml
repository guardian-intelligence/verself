---
argument_specs:
  main:
    short_description: "PostgreSQL database server"
    description:
      - "Deploys PostgreSQL. Initializes the data"
      - "directory (idempotent), configures listen address and auth,"
      - "and creates application databases and users."
      - "Service ports come from CUE-rendered topology, not from this role."
    options:
      postgresql_data_dir:
        type: path
        default: /var/lib/postgresql/16/verself
        description: "PostgreSQL data directory."

      postgresql_config_dir:
        type: path
        default: /etc/postgresql/verself
        description: "PostgreSQL configuration directory."

      postgresql_log_dir:
        type: path
        default: /var/log/postgresql
        description: "PostgreSQL log directory."

      verself_bin:
        type: path
        required: true
        description: "Path to the server binary directory."
