---
# Hot-swap vm-guest-telemetry into a dev golden zvol, boot a Firecracker VM,
# smoke-test the boot path, then tear down.
#
# Usage:
#   cd src/platform/ansible && ansible-playbook playbooks/vm-guest-telemetry-dev.yml
#
# Fault-injection variables (optional, deterministic):
#   -e vm_guest_telemetry_fault_profile=gap_once@12
#   -e vm_guest_expected_telemetry_diagnostic_kind=gap
#   -e vm_guest_telemetry_fault_profile=regression_once@12
#   -e vm_guest_expected_telemetry_diagnostic_kind=regression
#   -e vm_guest_bridge_fault_mode=result_seq_zero
#   -e vm_guest_expect_protocol_violation_state=await_guest_result
#   -e vm_guest_expect_run_failure=true

- name: Build and upload vm-guest-telemetry binary
  hosts: all
  gather_facts: false
  tasks:
    - name: Build vm-guest-telemetry locally
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.command:
        argv: [zig, build, -Doptimize=ReleaseSafe]
        chdir: "{{ playbook_dir }}/../../../vm-guest-telemetry"
      changed_when: true

    - name: Upload guest binary to server
      become: true
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../vm-guest-telemetry/zig-out/bin/vm-guest-telemetry"
        dest: /tmp/vm-guest-telemetry
        owner: root
        group: root
        mode: "0755"

    - name: Build vm-bridge locally
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.command:
        argv: [go, build, "-ldflags=-s -w", -o, /tmp/vm-bridge, ./src/vm-orchestrator/cmd/vm-bridge]
        chdir: "{{ playbook_dir }}/../../../../"
      environment:
        CGO_ENABLED: "0"
        GOOS: linux
        GOARCH: amd64
      changed_when: true

    - name: Upload vm-bridge to server
      become: true
      ansible.builtin.copy:
        src: /tmp/vm-bridge
        dest: /tmp/vm-bridge
        owner: root
        group: root
        mode: "0755"

- name: Hot-swap vm-guest-telemetry and probe in Firecracker VM
  hosts: all
  become: true
  vars_files:
    - ../roles/firecracker/defaults/main.yml
  vars:
    vm_guest_telemetry_dev_zvol: "{{ firecracker_zfs_pool }}/vm-guest-telemetry-dev-zvol"
    vm_guest_telemetry_dev_snapshot: "{{ vm_guest_telemetry_dev_zvol }}@ready"
    vm_guest_telemetry_dev_mnt: /tmp/vm-guest-telemetry-dev-mnt
    vm_guest_telemetry_dev_socket: /tmp/vm-orchestrator-telemetry-dev.sock
    vm_guest_telemetry_dev_pidfile: /tmp/vm-orchestrator-telemetry-dev.pid
    vm_guest_telemetry_dev_log: /tmp/vm-orchestrator-telemetry-dev.log
    vm_guest_telemetry_upload: /tmp/vm-guest-telemetry
    vm_bridge_upload: /tmp/vm-bridge
    vm_sleep_seconds: 8
    boot_timeout: 20
    vm_guest_bridge_fault_mode: ""
    vm_guest_telemetry_fault_profile: ""
    vm_guest_expected_telemetry_diagnostic_kind: ""
    vm_guest_expect_protocol_violation_state: ""
    vm_guest_expect_run_failure: false
  tasks:

    # ── Preflight ──────────────────────────────────────────────────────────

    - name: Ansible collection ansible.posix must be installed
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.command: ansible-galaxy collection list ansible.posix
      changed_when: false
      register: preflight_ap
      failed_when: "'ansible.posix' not in preflight_ap.stdout"

    - name: Verify uploaded guest binary exists
      ansible.builtin.stat:
        path: "{{ vm_guest_telemetry_upload }}"
      register: guest_bin
      failed_when: not guest_bin.stat.exists

    - name: Verify uploaded vm-bridge binary exists
      ansible.builtin.stat:
        path: "{{ vm_bridge_upload }}"
      register: vm_bridge_bin
      failed_when: not vm_bridge_bin.stat.exists

    - name: Verify base golden snapshot exists
      ansible.builtin.command: "zfs list -H {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}@ready"
      changed_when: false

    # ── Hot-swap binary into dev golden ───────────────────────────────────

    - name: Destroy old dev zvol if present
      ansible.builtin.command: "zfs destroy -r {{ vm_guest_telemetry_dev_zvol }}"
      failed_when: false
      changed_when: true

    - name: Clone base golden to dev zvol
      ansible.builtin.command: >
        zfs clone
        {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}@ready
        {{ vm_guest_telemetry_dev_zvol }}
      changed_when: true

    - name: Wait for dev zvol device node
      ansible.builtin.command: udevadm settle
      changed_when: false

    - name: Create dev mount point
      ansible.builtin.file:
        path: "{{ vm_guest_telemetry_dev_mnt }}"
        state: directory
        mode: "0755"

    - name: Mount dev zvol
      ansible.posix.mount:
        src: "/dev/zvol/{{ vm_guest_telemetry_dev_zvol }}"
        path: "{{ vm_guest_telemetry_dev_mnt }}"
        fstype: ext4
        state: ephemeral

    - name: Copy guest binary into dev rootfs
      ansible.builtin.copy:
        src: "{{ vm_guest_telemetry_upload }}"
        dest: "{{ vm_guest_telemetry_dev_mnt }}/usr/local/bin/vm-guest-telemetry"
        remote_src: true
        owner: root
        group: root
        mode: "0755"

    - name: Remove /sbin/init before vm-bridge hot-swap
      ansible.builtin.file:
        path: "{{ vm_guest_telemetry_dev_mnt }}/sbin/init"
        state: absent

    - name: Copy vm-bridge binary into dev rootfs init path
      ansible.builtin.copy:
        src: "{{ vm_bridge_upload }}"
        dest: "{{ vm_guest_telemetry_dev_mnt }}/sbin/init"
        remote_src: true
        owner: root
        group: root
        mode: "0755"

    - name: Copy vm-bridge binary into dev rootfs CLI path
      ansible.builtin.copy:
        src: "{{ vm_bridge_upload }}"
        dest: "{{ vm_guest_telemetry_dev_mnt }}/usr/local/bin/vm-bridge"
        remote_src: true
        owner: root
        group: root
        mode: "0755"

    - name: Unmount dev zvol
      ansible.posix.mount:
        path: "{{ vm_guest_telemetry_dev_mnt }}"
        state: unmounted

    - name: Snapshot dev zvol
      ansible.builtin.command: "zfs snapshot {{ vm_guest_telemetry_dev_snapshot }}"
      changed_when: true

    - name: Dev golden ready
      ansible.builtin.debug:
        msg: "dev golden ready: {{ vm_guest_telemetry_dev_snapshot }}"

    # ── Boot VM, probe, teardown ──────────────────────────────────────────

    - name: Boot VM, probe, and tear down dev Firecracker instance
      block:
        - name: Stop stale telemetry dev orchestrator if present
          ansible.builtin.shell: |
            set -euo pipefail
            if [[ -f {{ vm_guest_telemetry_dev_pidfile | quote }} ]]; then
              pid="$(cat {{ vm_guest_telemetry_dev_pidfile | quote }})"
              kill "$pid" 2>/dev/null || true
              wait "$pid" 2>/dev/null || true
            fi
            rm -f {{ vm_guest_telemetry_dev_pidfile | quote }} {{ vm_guest_telemetry_dev_socket | quote }}
          args:
            executable: /bin/bash
          changed_when: true

        - name: Start temporary vm-orchestrator for dev golden
          ansible.builtin.shell: |
            set -euo pipefail
            rm -f {{ vm_guest_telemetry_dev_socket | quote }} {{ vm_guest_telemetry_dev_log | quote }}
            nohup {{ firecracker_vm_orchestrator_binary_path | quote }} \
              -listen-unix {{ vm_guest_telemetry_dev_socket | quote }} \
              -socket-group {{ firecracker_vm_orchestrator_socket_group | quote }} \
              -golden-zvol vm-guest-telemetry-dev-zvol \
              > {{ vm_guest_telemetry_dev_log | quote }} 2>&1 &
            echo $! > {{ vm_guest_telemetry_dev_pidfile | quote }}
          args:
            executable: /bin/bash
          changed_when: true

        - name: Wait for temporary telemetry dev orchestrator socket
          ansible.builtin.wait_for:
            path: "{{ vm_guest_telemetry_dev_socket }}"
            state: present
            timeout: 20

        - name: Boot Firecracker VM from dev golden (background)
          ansible.builtin.shell: |
            set -euo pipefail
            vm_run_cmd=(
              {{ fm_bin | quote }}/vm-run
              -api-socket {{ vm_guest_telemetry_dev_socket | quote }}
              -timeout 60s
            )
            if [[ -n "{{ vm_guest_bridge_fault_mode }}" ]]; then
              vm_run_cmd+=(-bridge-fault {{ vm_guest_bridge_fault_mode | quote }})
            fi
            if [[ -n "{{ vm_guest_telemetry_fault_profile }}" ]]; then
              vm_run_cmd+=(-telemetry-fault {{ vm_guest_telemetry_fault_profile | quote }})
            fi
            vm_run_cmd+=(-- sleep {{ vm_sleep_seconds | quote }})
            "${vm_run_cmd[@]}"
          args:
            executable: /bin/bash
          async: 60
          poll: 0
          register: firecracker_job

        - name: Wait for vsock bridge socket
          ansible.builtin.find:
            paths: "{{ firecracker_jailer_root }}/firecracker"
            patterns: "forge-control.sock"
            recurse: true
            file_type: any
          register: bridge_search
          until: bridge_search.files | length > 0
          retries: "{{ boot_timeout }}"
          delay: 1

        - name: Record bridge socket path
          ansible.builtin.set_fact:
            bridge_socket: "{{ bridge_search.files[0].path }}"
            vm_run_id: "{{ bridge_search.files[0].path | regex_replace('^.*/firecracker/([^/]+)/root/run/forge-control\\.sock$', '\\1') }}"

        - name: Wait for vm-orchestrator telemetry hello log in ClickHouse
          ansible.builtin.shell: |
            set -euo pipefail
            CLICKHOUSE_PASSWORD="$(sed -n 's/^password = "\(.*\)"$/\1/p' /etc/forge-metal/config.toml)"
            {{ fm_bin }}/clickhouse-client --user default --password "$CLICKHOUSE_PASSWORD" --query "
              SELECT count()
              FROM forge_metal.vm_run_evidence
              WHERE run_id = '{{ vm_run_id }}'
                AND evidence_type = 'telemetry_hello'
            "
          args:
            executable: /bin/bash
          register: vm_orchestrator_telemetry_log
          changed_when: false
          retries: "{{ boot_timeout }}"
          delay: 1
          until: (vm_orchestrator_telemetry_log.stdout | trim | int) > 0

        - name: Wait for expected telemetry diagnostic log in ClickHouse
          ansible.builtin.shell: |
            set -euo pipefail
            CLICKHOUSE_PASSWORD="$(sed -n 's/^password = "\(.*\)"$/\1/p' /etc/forge-metal/config.toml)"
            {{ fm_bin }}/clickhouse-client --user default --password "$CLICKHOUSE_PASSWORD" --query "
              SELECT count()
              FROM forge_metal.vm_run_evidence
              WHERE run_id = '{{ vm_run_id }}'
                AND evidence_type = 'telemetry_diagnostic'
                AND diagnostic_kind = '{{ vm_guest_expected_telemetry_diagnostic_kind }}'
            "
          args:
            executable: /bin/bash
          register: vm_orchestrator_telemetry_diagnostic_log
          changed_when: false
          retries: "{{ boot_timeout }}"
          delay: 1
          until: (vm_orchestrator_telemetry_diagnostic_log.stdout | trim | int) > 0
          when: vm_guest_expected_telemetry_diagnostic_kind | length > 0

        - name: Wait for expected protocol-violation terminal reason in ClickHouse
          ansible.builtin.shell: |
            set -euo pipefail
            CLICKHOUSE_PASSWORD="$(sed -n 's/^password = "\(.*\)"$/\1/p' /etc/forge-metal/config.toml)"
            {{ fm_bin }}/clickhouse-client --user default --password "$CLICKHOUSE_PASSWORD" --query "
              SELECT count()
              FROM forge_metal.vm_run_evidence
              WHERE run_id = '{{ vm_run_id }}'
                AND evidence_type = 'run_state_transition'
                AND to_state = 'failed'
                AND reason_code = 'guest_protocol_violation'
                AND protocol_state = '{{ vm_guest_expect_protocol_violation_state }}'
            "
          args:
            executable: /bin/bash
          register: vm_orchestrator_protocol_violation_log
          changed_when: false
          retries: "{{ boot_timeout }}"
          delay: 1
          until: (vm_orchestrator_protocol_violation_log.stdout | trim | int) > 0
          when: vm_guest_expect_protocol_violation_state | length > 0

        - name: Boot smoke test passed
          ansible.builtin.debug:
            msg: "PASS: vm booted from dev golden, exposed forge-control.sock, and vm-orchestrator exported expected telemetry/control evidence for run {{ vm_run_id }}"

      always:
        - name: Wait for Firecracker VM to exit
          ansible.builtin.async_status:
            jid: "{{ firecracker_job.ansible_job_id }}"
          register: firecracker_result
          until: firecracker_result.finished
          retries: 30
          delay: 2
          failed_when: false
          when: firecracker_job is defined

        - name: Stop temporary telemetry dev orchestrator
          ansible.builtin.shell: |
            set -euo pipefail
            if [[ -f {{ vm_guest_telemetry_dev_pidfile | quote }} ]]; then
              pid="$(cat {{ vm_guest_telemetry_dev_pidfile | quote }})"
              kill "$pid" 2>/dev/null || true
              wait "$pid" 2>/dev/null || true
            fi
            rm -f {{ vm_guest_telemetry_dev_pidfile | quote }} {{ vm_guest_telemetry_dev_socket | quote }}
          args:
            executable: /bin/bash
          failed_when: false
          changed_when: true

        - name: Destroy dev zvol
          ansible.builtin.command: "zfs destroy -r {{ vm_guest_telemetry_dev_zvol }}"
          failed_when: false
          changed_when: true

    - name: vm-run should fail for expected-failure scenarios
      ansible.builtin.assert:
        that:
          - firecracker_result.rc | int != 0
        fail_msg: "expected vm-run failure but rc={{ firecracker_result.rc }}"
      when:
        - firecracker_job is defined
        - vm_guest_expect_run_failure | bool

    - name: vm-run should succeed for default scenario
      ansible.builtin.assert:
        that:
          - firecracker_result.rc | int == 0
        fail_msg: "expected vm-run success but rc={{ firecracker_result.rc }}"
      when:
        - firecracker_job is defined
        - not (vm_guest_expect_run_failure | bool)
