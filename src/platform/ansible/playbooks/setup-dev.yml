---
# Install pinned dev tools from dev-tools.json.
# Usage: cd ansible && ansible-playbook playbooks/setup-dev.yml
- name: Set up verself development environment
  hosts: localhost
  connection: local
  become: true
  vars:
    # Use system Python, not Nix Python, so pip/apt modules work correctly.
    ansible_python_interpreter: /usr/bin/python3
  roles:
    - role: dev_tools
      tags: [dev_tools]
