---
# Seed billing catalog + prepaid credits for sandbox-rental end-to-end testing.
#
# Usage:
#   cd src/platform/ansible && ansible-playbook playbooks/seed-sandbox-billing-test-data.yml

- name: Seed sandbox billing test data
  hosts: infra
  serial: 1
  become: true
  gather_facts: false
  vars:
    seed_sandbox_billing_auth_project_name: "{{ sandbox_rental_service_auth_project_name | default('sandbox-rental') }}"
    seed_sandbox_billing_machine_username: "sandbox-billing-seed-{{ inventory_hostname }}"
    seed_sandbox_billing_machine_name: "sandbox billing seed {{ inventory_hostname }}"
    seed_sandbox_billing_probe_user_pattern: "^(sandbox-billing-seed-.*)$"
    seed_sandbox_billing_zitadel_base_url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}"
    seed_sandbox_billing_zitadel_host: "auth.{{ forge_metal_domain }}"
    seed_sandbox_billing_scope: >-
      openid profile
      urn:zitadel:iam:user:resourceowner
      urn:zitadel:iam:org:project:id:{{ seed_sandbox_billing_project_id }}:aud
    seed_sandbox_billing_product_id: sandbox
    seed_sandbox_billing_product_display_name: Sandbox
    seed_sandbox_billing_meter_unit: vcpu_second
    seed_sandbox_billing_billing_model: metered
    seed_sandbox_billing_plan_id: sandbox-default
    seed_sandbox_billing_plan_display_name: Sandbox PAYG
    seed_sandbox_billing_unit_rates:
      vcpu: 325
      gib: 40
    seed_sandbox_billing_overage_unit_rates: {}
    seed_sandbox_billing_quotas: {}
    seed_sandbox_billing_target_prepaid_units: 5000000
    seed_sandbox_billing_expires_after: 8760h
    seed_sandbox_billing_helper_local_path: "/tmp/billing-seed-{{ inventory_hostname }}"
    seed_sandbox_billing_helper_remote_path: /tmp/billing-seed
  tasks:
    - name: Wait for Zitadel to be ready
      ansible.builtin.wait_for:
        host: "{{ services.zitadel.host }}"
        port: "{{ services.zitadel.port }}"
        timeout: 60

    - name: Read Zitadel admin PAT
      ansible.builtin.slurp:
        src: /etc/zitadel/admin.pat
      register: seed_sandbox_billing_admin_pat_raw
      no_log: true

    - name: Set Zitadel admin PAT fact
      ansible.builtin.set_fact:
        seed_sandbox_billing_admin_pat: "{{ seed_sandbox_billing_admin_pat_raw.content | b64decode | trim }}"
      no_log: true

    - name: List Zitadel projects
      ansible.builtin.uri:
        url: "{{ seed_sandbox_billing_zitadel_base_url }}/management/v1/projects/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_sandbox_billing_admin_pat }}"
          Host: "{{ seed_sandbox_billing_zitadel_host }}"
        body_format: json
        body: {}
        return_content: true
      register: seed_sandbox_billing_projects
      no_log: true

    - name: Set sandbox auth project fact
      ansible.builtin.set_fact:
        seed_sandbox_billing_project: >-
          {{
            (
              seed_sandbox_billing_projects.json.result
              | default([])
              | selectattr('name', 'equalto', seed_sandbox_billing_auth_project_name)
              | list
              | first
            ) | default({})
          }}

    - name: Assert sandbox auth project exists
      ansible.builtin.assert:
        that:
          - seed_sandbox_billing_project != {}
          - seed_sandbox_billing_project.id | default('', true) | length > 0
        fail_msg: Sandbox rental Zitadel project was not found.

    - name: Set sandbox auth project ID fact
      ansible.builtin.set_fact:
        seed_sandbox_billing_project_id: "{{ seed_sandbox_billing_project.id }}"

    - name: List Zitadel users before cleanup
      ansible.builtin.uri:
        url: "{{ seed_sandbox_billing_zitadel_base_url }}/management/v1/users/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_sandbox_billing_admin_pat }}"
          Host: "{{ seed_sandbox_billing_zitadel_host }}"
        body_format: json
        body: {}
        return_content: true
      register: seed_sandbox_billing_users_before_cleanup
      no_log: true

    - name: Set stale seed users fact
      ansible.builtin.set_fact:
        seed_sandbox_billing_stale_users: >-
          {{
            seed_sandbox_billing_users_before_cleanup.json.result
            | default([])
            | selectattr('machine', 'defined')
            | selectattr('userName', 'match', seed_sandbox_billing_probe_user_pattern)
            | list
          }}

    - name: Revoke stale seed user secrets
      ansible.builtin.uri:
        url: "{{ seed_sandbox_billing_zitadel_base_url }}/v2/users/{{ item.id }}/secret"
        method: DELETE
        headers:
          Authorization: "Bearer {{ seed_sandbox_billing_admin_pat }}"
          Host: "{{ seed_sandbox_billing_zitadel_host }}"
        status_code: [200, 400, 404]
      loop: "{{ seed_sandbox_billing_stale_users }}"
      loop_control:
        label: "{{ item.userName }}"
      no_log: true

    - name: Deactivate stale seed users
      ansible.builtin.uri:
        url: "{{ seed_sandbox_billing_zitadel_base_url }}/v2/users/{{ item.id }}/deactivate"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_sandbox_billing_admin_pat }}"
          Host: "{{ seed_sandbox_billing_zitadel_host }}"
        status_code: [200, 400, 404]
      loop: "{{ seed_sandbox_billing_stale_users }}"
      loop_control:
        label: "{{ item.userName }}"

    - name: Delete stale seed users
      ansible.builtin.uri:
        url: "{{ seed_sandbox_billing_zitadel_base_url }}/v2/users/{{ item.id }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ seed_sandbox_billing_admin_pat }}"
          Host: "{{ seed_sandbox_billing_zitadel_host }}"
        status_code: [200, 404]
      loop: "{{ seed_sandbox_billing_stale_users }}"
      loop_control:
        label: "{{ item.userName }}"

    - name: Seed sandbox billing data
      block:
        - name: Create seed machine user
          ansible.builtin.uri:
            url: "{{ seed_sandbox_billing_zitadel_base_url }}/management/v1/users/machine"
            method: POST
            headers:
              Authorization: "Bearer {{ seed_sandbox_billing_admin_pat }}"
              Host: "{{ seed_sandbox_billing_zitadel_host }}"
            body_format: json
            body:
              userName: "{{ seed_sandbox_billing_machine_username }}"
              name: "{{ seed_sandbox_billing_machine_name }}"
              accessTokenType: ACCESS_TOKEN_TYPE_JWT
            return_content: true
          register: seed_sandbox_billing_machine_user
          no_log: true

        - name: Set seed machine user ID fact
          ansible.builtin.set_fact:
            seed_sandbox_billing_machine_user_id: "{{ seed_sandbox_billing_machine_user.json.userId }}"

        - name: Create seed machine user secret
          ansible.builtin.uri:
            url: "{{ seed_sandbox_billing_zitadel_base_url }}/v2/users/{{ seed_sandbox_billing_machine_user_id }}/secret"
            method: POST
            headers:
              Authorization: "Bearer {{ seed_sandbox_billing_admin_pat }}"
              Host: "{{ seed_sandbox_billing_zitadel_host }}"
            status_code: 200
            return_content: true
          register: seed_sandbox_billing_machine_secret
          no_log: true

        - name: Grant seed machine user access to sandbox auth project
          ansible.builtin.uri:
            url: "{{ seed_sandbox_billing_zitadel_base_url }}/management/v1/users/{{ seed_sandbox_billing_machine_user_id }}/grants"
            method: POST
            headers:
              Authorization: "Bearer {{ seed_sandbox_billing_admin_pat }}"
              Host: "{{ seed_sandbox_billing_zitadel_host }}"
            body_format: json
            body:
              projectId: "{{ seed_sandbox_billing_project_id }}"
              roleKeys: []
            status_code: 200
            return_content: true
          register: seed_sandbox_billing_user_grant
          no_log: true

        - name: Set seed user grant ID fact
          ansible.builtin.set_fact:
            seed_sandbox_billing_user_grant_id: "{{ seed_sandbox_billing_user_grant.json.userGrantId }}"

        - name: Request seed access token
          ansible.builtin.uri:
            url: "{{ seed_sandbox_billing_zitadel_base_url }}/oauth/v2/token"
            method: POST
            headers:
              Host: "{{ seed_sandbox_billing_zitadel_host }}"
            body_format: form-urlencoded
            body:
              grant_type: client_credentials
              scope: "{{ seed_sandbox_billing_scope }}"
            url_username: "{{ seed_sandbox_billing_machine_username }}"
            url_password: "{{ seed_sandbox_billing_machine_secret.json.clientSecret }}"
            force_basic_auth: true
            return_content: true
            status_code: 200
          register: seed_sandbox_billing_token
          no_log: true

        - name: Assert seed token was issued
          ansible.builtin.assert:
            that:
              - seed_sandbox_billing_token.json.access_token | default('', true) | length > 0
              - seed_sandbox_billing_token.json.token_type | default('', true) == 'Bearer'
            fail_msg: Failed to obtain a sandbox billing seed access token.

        - name: Decode seed token claims
          ansible.builtin.set_fact:
            seed_sandbox_billing_claims: >-
              {{
                (
                  (
                    seed_sandbox_billing_token.json.access_token.split('.')[1]
                    | replace('-', '+')
                    | replace('_', '/')
                  )
                  + (
                    '=' * (
                      (4 - ((seed_sandbox_billing_token.json.access_token.split('.')[1] | length) % 4)) % 4
                    )
                  )
                ) | b64decode | from_json
              }}
          no_log: true

        - name: Debug decoded seed token claims
          ansible.builtin.debug:
            var: seed_sandbox_billing_claims
          when: seed_sandbox_billing_debug_claims | default(false) | bool

        - name: Set sandbox billing org facts
          ansible.builtin.set_fact:
            seed_sandbox_billing_org_id: >-
              {{
                seed_sandbox_billing_claims.get('urn:zitadel:iam:user:resourceowner:id', '')
                or seed_sandbox_billing_claims.get('urn:zitadel:iam:org:id', '')
                or seed_sandbox_billing_claims.get('org_id', '')
                or seed_sandbox_billing_claims.get('resource_owner', '')
                or seed_sandbox_billing_claims.get('urn:zitadel:iam:user:resourceowner', {}).get('id', '')
              }}
            seed_sandbox_billing_org_name: >-
              {{
                seed_sandbox_billing_claims.get('urn:zitadel:iam:user:resourceowner:name', '')
                or seed_sandbox_billing_claims.get('urn:zitadel:iam:user:resourceowner', {}).get('name', '')
                or 'forge-metal'
              }}

        - name: Assert sandbox billing org facts are present
          ansible.builtin.assert:
            that:
              - seed_sandbox_billing_org_id | default('', true) | length > 0
            fail_msg: Failed to derive Zitadel org ID from the seed access token.

        - name: Build billing seed helper on controller
          ansible.builtin.command:
            argv:
              - go
              - build
              - -o
              - "{{ seed_sandbox_billing_helper_local_path }}"
              - ./src/billing-service/cmd/billing-seed
          args:
            chdir: "{{ playbook_dir }}/../../../.."
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Upload billing seed helper
          ansible.builtin.copy:
            src: "{{ seed_sandbox_billing_helper_local_path }}"
            dest: "{{ seed_sandbox_billing_helper_remote_path }}"
            mode: "0755"

        - name: Run billing seed helper
          ansible.builtin.command:
            argv:
              - "{{ seed_sandbox_billing_helper_remote_path }}"
              - --pg-dsn-file
              - /etc/credstore/billing/pg-dsn
              - --tb-address
              - "{{ services.tigerbeetle.host }}:{{ services.tigerbeetle.port }}"
              - --tb-cluster-id
              - "{{ billing_service_tigerbeetle_cluster_id | default(0, true) | string }}"
              - --org-id
              - "{{ seed_sandbox_billing_org_id }}"
              - --org-name
              - "{{ seed_sandbox_billing_org_name }}"
              - --product-id
              - "{{ seed_sandbox_billing_product_id }}"
              - --product-display-name
              - "{{ seed_sandbox_billing_product_display_name }}"
              - --meter-unit
              - "{{ seed_sandbox_billing_meter_unit }}"
              - --billing-model
              - "{{ seed_sandbox_billing_billing_model }}"
              - --plan-id
              - "{{ seed_sandbox_billing_plan_id }}"
              - --plan-display-name
              - "{{ seed_sandbox_billing_plan_display_name }}"
              - --unit-rates-json
              - "{{ seed_sandbox_billing_unit_rates | to_json }}"
              - --overage-unit-rates-json
              - "{{ seed_sandbox_billing_overage_unit_rates | to_json }}"
              - --quotas-json
              - "{{ seed_sandbox_billing_quotas | to_json }}"
              - --target-prepaid-units
              - "{{ seed_sandbox_billing_target_prepaid_units | string }}"
              - --expires-after
              - "{{ seed_sandbox_billing_expires_after }}"
          register: seed_sandbox_billing_seed
          changed_when: >-
            (
              seed_sandbox_billing_seed.stdout | from_json
            ).deposited_units | int > 0

        - name: Parse billing seed result
          ansible.builtin.set_fact:
            seed_sandbox_billing_result: "{{ seed_sandbox_billing_seed.stdout | from_json }}"

        - name: Assert prepaid sandbox balance is seeded
          ansible.builtin.assert:
            that:
              - seed_sandbox_billing_result.org_id | string == seed_sandbox_billing_org_id | string
              - seed_sandbox_billing_result.product_id == seed_sandbox_billing_product_id
              - seed_sandbox_billing_result.plan_id == seed_sandbox_billing_plan_id
              - seed_sandbox_billing_result.prepaid_after | int >= seed_sandbox_billing_target_prepaid_units | int
            fail_msg: Seed playbook did not reach the target prepaid sandbox balance.

        - name: Print billing seed summary
          ansible.builtin.debug:
            msg:
              - "sandbox org_id={{ seed_sandbox_billing_result.org_id }}"
              - "prepaid_before={{ seed_sandbox_billing_result.prepaid_before }}"
              - "deposited_units={{ seed_sandbox_billing_result.deposited_units }}"
              - "prepaid_after={{ seed_sandbox_billing_result.prepaid_after }}"

      always:
        - name: Remove remote billing seed helper
          ansible.builtin.file:
            path: "{{ seed_sandbox_billing_helper_remote_path }}"
            state: absent

        - name: Remove local billing seed helper
          ansible.builtin.file:
            path: "{{ seed_sandbox_billing_helper_local_path }}"
            state: absent
          delegate_to: localhost
          become: false

        - name: Remove seed user grant
          ansible.builtin.uri:
            url: >-
              {{ seed_sandbox_billing_zitadel_base_url }}/management/v1/users/{{
              seed_sandbox_billing_machine_user_id }}/grants/{{ seed_sandbox_billing_user_grant_id }}
            method: DELETE
            headers:
              Authorization: "Bearer {{ seed_sandbox_billing_admin_pat }}"
              Host: "{{ seed_sandbox_billing_zitadel_host }}"
            status_code: [200, 404]
          when:
            - seed_sandbox_billing_machine_user_id is defined
            - seed_sandbox_billing_user_grant_id is defined

        - name: Revoke seed machine user secret
          ansible.builtin.uri:
            url: "{{ seed_sandbox_billing_zitadel_base_url }}/v2/users/{{ seed_sandbox_billing_machine_user_id }}/secret"
            method: DELETE
            headers:
              Authorization: "Bearer {{ seed_sandbox_billing_admin_pat }}"
              Host: "{{ seed_sandbox_billing_zitadel_host }}"
            status_code: [200, 400, 404]
          when: seed_sandbox_billing_machine_user_id is defined
          no_log: true

        - name: Deactivate seed machine user
          ansible.builtin.uri:
            url: "{{ seed_sandbox_billing_zitadel_base_url }}/v2/users/{{ seed_sandbox_billing_machine_user_id }}/deactivate"
            method: POST
            headers:
              Authorization: "Bearer {{ seed_sandbox_billing_admin_pat }}"
              Host: "{{ seed_sandbox_billing_zitadel_host }}"
            status_code: [200, 400, 404]
          when: seed_sandbox_billing_machine_user_id is defined

        - name: Delete seed machine user
          ansible.builtin.uri:
            url: "{{ seed_sandbox_billing_zitadel_base_url }}/v2/users/{{ seed_sandbox_billing_machine_user_id }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ seed_sandbox_billing_admin_pat }}"
              Host: "{{ seed_sandbox_billing_zitadel_host }}"
            status_code: [200, 404]
          when: seed_sandbox_billing_machine_user_id is defined
