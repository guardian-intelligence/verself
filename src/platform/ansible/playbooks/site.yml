---
# Canonical site deployment.
# Topology lives in inventory: the single-node inventory places the same host in
# workers and infra; multi-node deployments use distinct hosts in those groups.
#
# Usage: ansible-playbook -i inventory/hosts.ini playbooks/site.yml

# ── Preflight (~2s) ──────────────────────────────────────────────────────────
# Catch missing prerequisites before the slow work starts.

- name: "Preflight: controller prerequisites"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [always]
  tasks:
    - name: Run controller preflight checks
      ansible.builtin.import_tasks: tasks/controller-preflight.yml

- name: "Preflight: remote prerequisites"
  hosts: all
  gather_facts: false
  become: true
  tags: [always]
  tasks:
    - name: Require Verself product domain
      ansible.builtin.assert:
        that: verself_domain | default('', true) | length > 0
        fail_msg: >-
          verself_domain is required for product origins. Set it in the encrypted Ansible group vars before deploying.

    - name: Require Guardian company domain
      ansible.builtin.assert:
        that: company_domain | default('', true) | length > 0
        fail_msg: >-
          company_domain is required for the Guardian company site. Set it in the encrypted Ansible group vars before deploying.

    - name: Require cloudflare_api_token
      ansible.builtin.assert:
        that: cloudflare_api_token | default('', true) | length > 0
        fail_msg: >-
          cloudflare_api_token is empty. Set it in the encrypted Ansible group vars before deploying.

    - name: Inspect retired product runtime units
      ansible.builtin.stat:
        path: "/etc/systemd/system/{{ item.unit }}"
      loop: "{{ retired_product_runtimes }}"
      loop_control:
        label: "{{ item.unit }}"
      register: retired_product_unit_files

    - name: Stop and disable retired product runtime units
      ansible.builtin.systemd:
        name: "{{ item.item.unit }}"
        state: stopped
        enabled: false
        daemon_reload: true
      loop: "{{ retired_product_unit_files.results }}"
      loop_control:
        label: "{{ item.item.unit }}"
      when: item.stat.exists

    - name: Remove retired product runtime unit files
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ item.unit }}"
        state: absent
      loop: "{{ retired_product_runtimes }}"
      loop_control:
        label: "{{ item.unit }}"
      notify: Reload systemd after retired product runtime unit removal
      register: retired_product_unit_delete

    - name: Remove retired product runtime directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ retired_product_runtimes | map(attribute='paths') | flatten }}"

    - name: Remove retired product runtime users
      ansible.builtin.user:
        name: "{{ item.user }}"
        state: absent
        remove: true
        force: true
      loop: "{{ retired_product_runtimes }}"
      loop_control:
        label: "{{ item.user }}"

    - name: Remove retired product runtime groups
      ansible.builtin.group:
        name: "{{ item.group }}"
        state: absent
      loop: "{{ retired_product_runtimes }}"
      loop_control:
        label: "{{ item.group }}"

  handlers:
    - name: Reload systemd after retired product runtime unit removal
      ansible.builtin.systemd:
        daemon_reload: true

- name: "Preflight: Firecracker worker prerequisites"
  hosts: workers
  gather_facts: false
  become: true
  tags: [firecracker]
  tasks:
    - name: Check ZFS pool exists
      ansible.builtin.command: "zpool status {{ firecracker_zfs_pool | default(zfs_pool) }}"
      changed_when: false
      failed_when: false
      register: preflight_zpool

    - name: Check guest kernel exists
      ansible.builtin.stat:
        path: /var/lib/verself/guest-artifacts/vmlinux
        get_checksum: false
      register: preflight_guest_kernel

    - name: Check guest rootfs exists
      ansible.builtin.stat:
        path: /var/lib/verself/guest-artifacts/rootfs.ext4
        # get_checksum defaults to true, which would sha1 the multi-GB rootfs every preflight (~4s).
        get_checksum: false
      register: preflight_guest_rootfs

    - name: Check Vite+ composed image exists
      ansible.builtin.stat:
        path: /var/lib/verself/guest-artifacts/viteplus.ext4
        get_checksum: false
      register: preflight_viteplus_image

    - name: Warn if ZFS pool is missing
      ansible.builtin.debug:
        msg: >-
          WARNING: ZFS pool '{{ firecracker_zfs_pool | default(zfs_pool) }}' not found on {{ inventory_hostname }}.
          The zfs role will create it, but only if a suitable disk is available.
      when: preflight_zpool.rc != 0

    - name: Fail if guest artifacts are missing
      ansible.builtin.fail:
        msg: >-
          Guest artifacts not staged on {{ inventory_hostname }}. The firecracker role
          requires vmlinux, rootfs.ext4, and viteplus.ext4 at /var/lib/verself/guest-artifacts/.
          Run: cd ansible && ansible-playbook playbooks/guest-rootfs.yml
      when: not preflight_guest_kernel.stat.exists or not preflight_guest_rootfs.stat.exists or not preflight_viteplus_image.stat.exists

# ── Deploy ───────────────────────────────────────────────────────────────────

- name: Deploy profile to all nodes
  hosts: all
  become: true
  roles:
    - role: deploy_profile
      tags: [deploy_profile, object_storage_service, profile_service, notifications_service, projects_service, source_code_hosting_service, nats]
    - role: base
      tags: [base]
    - role: nftables
      tags: [nftables]
    - role: zfs
      tags: [zfs]

- name: Configure worker nodes
  hosts: workers
  become: true
  roles:
    - role: containerd
      tags: [containerd]
    - role: wireguard
      vars:
        wireguard_tunnels: >-
          {{
            topology_wireguard.host_groups.workers
            | map('extract', topology_wireguard.tunnels)
            | list
          }}
      tags: [wireguard]
    - role: firecracker
      tags: [firecracker]

- name: Configure infrastructure nodes
  hosts: infra
  become: true
  roles:
    - role: wireguard
      vars:
        wireguard_tunnels: >-
          {{
            topology_wireguard.host_groups.infra
            | map('extract', topology_wireguard.tunnels)
            | list
          }}
      tags: [wireguard]
    - role: cloudflare_dns
      tags: [cloudflare_dns, projects_service, source_code_hosting_service]
    - role: resend
      tags: [resend]
    - role: spire
      tags:
        - spire
        - clickhouse
        - otelcol
        - billing_service
        - identity_service
        - governance_service
        - profile_service
        - notifications_service
        - projects_service
        - nats
        - secrets_service
        - sandbox_rental_service
        - source_code_hosting_service
        - mailbox_service
        - object_storage_service
        - temporal
        - grafana
    - role: spire_registrations
      tags:
        - spire_registrations
        - spire
        - clickhouse
        - otelcol
        - billing_service
        - identity_service
        - governance_service
        - profile_service
        - notifications_service
        - projects_service
        - nats
        - secrets_service
        - sandbox_rental_service
        - source_code_hosting_service
        - mailbox_service
        - object_storage_service
        - temporal
        - grafana
        - openbao
        - openbao_tenancy
    - role: garage
      tags: [garage, object_storage_service]
    - role: clickhouse
      tags:
        - clickhouse
        - identity_service
        - otelcol
        - billing_service
        - sandbox_rental_service
        - governance_service
        - profile_service
        - notifications_service
        - projects_service
        - object_storage_service
        - openbao
        - openbao_tenancy
        - temporal
        - grafana
    - role: tigerbeetle
      tags: [tigerbeetle]
    - role: postgresql
      tags:
        - postgresql
        - object_storage_service
        - profile_service
        - notifications_service
        - projects_service
        - source_code_hosting_service
        - openbao
        - openbao_tenancy
        - temporal
    # Service deploys query Zitadel during auth-project reconciliation; converge
    # the identity provider first so PostgreSQL resets cannot leave stale auth state.
    - role: zitadel
      tags:
        - zitadel
        - postgresql
        - billing_service
        - governance_service
        - identity_service
        - profile_service
        - notifications_service
        - projects_service
        - secrets_service
        - sandbox_rental_service
        - source_code_hosting_service
        - mailbox_service
        - object_storage_service
        - console
        - openbao
        - openbao_tenancy
    - role: openbao
      tags: [openbao, openbao_tenancy, billing_service, governance_service, sandbox_rental_service, mailbox_service]
    - role: identity_service
      tags: [identity_service, profile_service, projects_service, source_code_hosting_service]
    - role: governance_service
      tags: [governance_service, profile_service, object_storage_service, openbao, openbao_tenancy, temporal]
    - role: profile_service
      tags: [profile_service]
    - role: nats
      tags: [nats, notifications_service]
    - role: notifications_service
      tags: [notifications_service]
    - role: projects_service
      tags: [projects_service]
    - role: secrets_service
      tags: [secrets_service, object_storage_service, openbao_tenancy]
    - role: openbao_tenancy
      tags: [openbao_tenancy, object_storage_service]
    - role: object_storage_service
      tags: [object_storage_service]
    - role: billing_service
      tags: [billing_service]
    - role: electric
      vars:
        electric_config: "{{ topology_electric_instances.notifications }}"
      tags: [electric_notifications, notifications_service]
    # sandbox-rental-service now owns a Temporal namespace and recurring worker,
    # so Temporal must be configured before the service is started.
    - role: temporal
      tags: [temporal]
    - role: sandbox_rental_service
      tags: [sandbox_rental_service]
    - role: electric
      vars:
        electric_config: "{{ topology_electric_instances.default }}"
      tags: [electric, sandbox_rental_service]
    - role: frontend_auth_sessions
      tags: [frontend_auth_sessions, console, governance_service]
    - role: console
      tags: [console, governance_service]
    - role: stalwart
      tags: [stalwart]
    - role: otelcol
      tags: [otelcol, temporal, projects_service, source_code_hosting_service]
    - role: mailbox_service
      tags: [mailbox_service]
    - role: electric
      vars:
        electric_config: "{{ topology_electric_instances.mail }}"
      tags: [electric_mail, mailbox_service]
    - role: platform
      tags: [platform]
    - role: company
      tags: [company]
    - role: grafana
      tags: [grafana, temporal]
    - role: verdaccio
      tags: [verdaccio]
    - role: forgejo
      tags: [forgejo]
    - role: source_code_hosting_service
      tags: [source_code_hosting_service]
    - role: caddy
      tags: [caddy, profile_service, notifications_service, projects_service, source_code_hosting_service, openbao_tenancy]
