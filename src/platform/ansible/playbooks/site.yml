---
# Canonical site deployment.
# Topology lives in inventory: the single-node inventory places the same host in
# workers and infra; multi-node deployments use distinct hosts in those groups.
#
# Usage: aspect deploy [--site=prod] [--tags=...]
# (renders the per-site cache and invokes ansible-with-otel.sh).

# ── Preflight (~2s) ──────────────────────────────────────────────────────────
# Catch missing prerequisites before the slow work starts.

- name: "Preflight: controller prerequisites"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [always]
  tasks:
    - name: Run controller preflight checks
      ansible.builtin.import_tasks: tasks/controller-preflight.yml

- name: "Preflight: remote prerequisites"
  hosts: all
  gather_facts: false
  become: true
  tags: [always]
  tasks:
    - name: Require Verself product domain
      ansible.builtin.assert:
        that: verself_domain | default('', true) | length > 0
        fail_msg: >-
          verself_domain is required for product origins. Set it in the encrypted Ansible group vars before deploying.

    - name: Require Guardian company domain
      ansible.builtin.assert:
        that: company_domain | default('', true) | length > 0
        fail_msg: >-
          company_domain is required for the Guardian company site. Set it in the encrypted Ansible group vars before deploying.

    - name: Require cloudflare_api_token
      ansible.builtin.assert:
        that: cloudflare_api_token | default('', true) | length > 0
        fail_msg: >-
          cloudflare_api_token is empty. Set it in the encrypted Ansible group vars before deploying.

- name: "Preflight: Firecracker worker prerequisites"
  hosts: workers
  gather_facts: false
  become: true
  tags: [firecracker]
  tasks:
    - name: Check ZFS pool exists
      ansible.builtin.command: "zpool status {{ firecracker_zfs_pool | default(zfs_pool) }}"
      changed_when: false
      failed_when: false
      register: preflight_zpool

    - name: Check guest kernel exists
      ansible.builtin.stat:
        path: /var/lib/verself/guest-images/vmlinux
        get_checksum: false
      register: preflight_guest_kernel

    - name: Check substrate ext4 exists
      ansible.builtin.stat:
        path: /var/lib/verself/guest-images/substrate.ext4
        # get_checksum defaults to true, which would sha1 the multi-hundred-MB substrate every preflight.
        get_checksum: false
      register: preflight_substrate

    - name: Warn if ZFS pool is missing
      ansible.builtin.debug:
        msg: >-
          WARNING: ZFS pool '{{ firecracker_zfs_pool | default(zfs_pool) }}' not found on {{ inventory_hostname }}.
          The zfs role will create it, but only if a suitable disk is available.
      when: preflight_zpool.rc != 0

    - name: Fail if guest images are missing
      ansible.builtin.fail:
        msg: >-
          Guest images not staged on {{ inventory_hostname }}. The firecracker role
          requires vmlinux and substrate.ext4 at /var/lib/verself/guest-images/.
          Run: cd ansible && ansible-playbook playbooks/guest-rootfs.yml
      when: not preflight_guest_kernel.stat.exists or not preflight_substrate.stat.exists

# ── Deploy ───────────────────────────────────────────────────────────────────

- name: Deploy profile to all nodes
  hosts: all
  become: true
  roles:
    - role: deploy_profile
      tags:
        - deploy_profile
        - billing_service
        - firecracker
        - governance_service
        - identity_service
        - mailbox_service
        - nats
        - notifications_service
        - object_storage_service
        - profile_service
        - projects_service
        - sandbox_rental_service
        - secrets_service
        - source_code_hosting_service
    - role: base
      tags: [base]
    - role: nftables
      tags: [nftables]
    - role: zfs
      tags: [zfs]

- name: Configure worker nodes
  hosts: workers
  become: true
  roles:
    - role: containerd
      tags: [containerd]
    - role: wireguard
      vars:
        wireguard_tunnels: >-
          {{
            topology_wireguard.host_groups.workers
            | map('extract', topology_wireguard.tunnels)
            | list
          }}
      tags: [wireguard]
    - role: firecracker
      tags: [firecracker]

- name: Configure infrastructure nodes
  hosts: infra
  become: true
  roles:
    - role: wireguard
      vars:
        wireguard_tunnels: >-
          {{
            topology_wireguard.host_groups.infra
            | map('extract', topology_wireguard.tunnels)
            | list
          }}
      tags: [wireguard]
    - role: cloudflare_dns
      tags: [cloudflare_dns, projects_service, source_code_hosting_service]
    - role: resend
      tags: [resend]
    - role: spire
      tags:
        - spire
        - clickhouse
        - otelcol
        - billing_service
        - identity_service
        - governance_service
        - profile_service
        - notifications_service
        - projects_service
        - nats
        - secrets_service
        - sandbox_rental_service
        - source_code_hosting_service
        - mailbox_service
        - object_storage_service
        - temporal
        - grafana
    - role: spire_registrations
      tags:
        - spire_registrations
        - spire
        - clickhouse
        - otelcol
        - billing_service
        - identity_service
        - governance_service
        - profile_service
        - notifications_service
        - projects_service
        - nats
        - secrets_service
        - sandbox_rental_service
        - source_code_hosting_service
        - mailbox_service
        - object_storage_service
        - temporal
        - grafana
        - openbao
        - openbao_tenancy
    - role: garage
      tags: [garage, object_storage_service]
    - role: bazel_remote
      tags: [bazel_remote]
    - role: clickhouse
      tags:
        - clickhouse
        - identity_service
        - otelcol
        - billing_service
        - sandbox_rental_service
        - governance_service
        - profile_service
        - notifications_service
        - projects_service
        - object_storage_service
        - openbao
        - openbao_tenancy
        - temporal
        - grafana
    - role: tigerbeetle
      tags: [tigerbeetle]
    - role: postgresql
      tags:
        - postgresql
        - object_storage_service
        - profile_service
        - notifications_service
        - projects_service
        - source_code_hosting_service
        - openbao
        - openbao_tenancy
        - temporal
    # Service deploys query Zitadel during auth-project reconciliation; converge
    # the identity provider first so PostgreSQL resets cannot leave stale auth state.
    - role: zitadel
      tags:
        - zitadel
        - postgresql
        - billing_service
        - governance_service
        - identity_service
        - profile_service
        - notifications_service
        - projects_service
        - secrets_service
        - sandbox_rental_service
        - source_code_hosting_service
        - mailbox_service
        - object_storage_service
        - verself_web
        - openbao
        - openbao_tenancy
    - role: openbao
      tags: [openbao, openbao_tenancy, billing_service, governance_service, sandbox_rental_service, mailbox_service]
    - role: nats
      tags: [nats, notifications_service]
    # sandbox-rental-service owns a Temporal namespace and recurring worker,
    # so Temporal must be configured before the component loop starts it.
    - role: temporal
      tags: [temporal, sandbox_rental_service]
    - role: stalwart
      tags: [stalwart, mailbox_service]
    - role: forgejo
      tags: [forgejo, sandbox_rental_service, source_code_hosting_service]
    - role: nftables
      tags:
        - nftables
        - billing_service
        - governance_service
        - identity_service
        - mailbox_service
        - notifications_service
        - object_storage_service
        - profile_service
        - projects_service
        - sandbox_rental_service
        - secrets_service
        - source_code_hosting_service

  tasks:
    - name: Select service components for convergence
      ansible.builtin.set_fact:
        service_components: >-
          {{
            topology_components
            | selectattr('kind', 'equalto', 'service')
            | selectattr('converge.enabled', 'equalto', true)
            | sort(attribute='converge.order')
            | list
          }}
      tags: always

    - name: Converge service components from CUE topology
      ansible.builtin.include_tasks:
        file: ../tasks/converge_component.yml
        apply:
          tags: always
      loop: "{{ service_components }}"
      loop_control:
        loop_var: component
        label: "{{ component.name }}"
      when: >-
        ('all' in (ansible_run_tags | default(['all'])))
        or (component.name in (ansible_run_tags | default([])))
        or (component.deploy_tag in (ansible_run_tags | default([])))
        or ((((component.converge.bootstrap | default([])) | map(attribute='name') | list) | intersect(ansible_run_tags | default([]))) | length > 0)
      tags:
        - always
        - billing_service
        - governance_service
        - identity_service
        - mailbox_service
        - notifications_service
        - object_storage_service
        - profile_service
        - projects_service
        - sandbox_rental_service
        - secrets_service
        - source_code_hosting_service

  handlers:
    # The handler file is rendered by `aspect render --site=<site>`
    # (writes the cache copy AND the tracked-but-gitignored copy below
    # so ansible-lint resolves the import at parse time without an
    # inventory). Site.yml deliberately holds a static path because
    # handlers must resolve before inventory is loaded.
    - name: Import generated component systemd handlers
      ansible.builtin.import_tasks: ../handlers/component-systemd.yml

- name: Configure infrastructure dependents
  hosts: infra
  become: true
  roles:
    - role: electric
      vars:
        electric_config: "{{ topology_electric_instances.notifications }}"
      tags: [electric_notifications, notifications_service]
    - role: electric
      vars:
        electric_config: "{{ topology_electric_instances.default }}"
      tags: [electric, sandbox_rental_service]
    - role: frontend_auth_sessions
      tags: [frontend_auth_sessions, verself_web, governance_service]
    - role: verself_web
      tags: [verself_web, governance_service]
    - role: otelcol
      tags: [otelcol, temporal, projects_service, source_code_hosting_service]
    - role: electric
      vars:
        electric_config: "{{ topology_electric_instances.mail }}"
      tags: [electric_mail, mailbox_service]
    - role: company
      tags: [company]
    - role: grafana
      tags: [grafana, temporal]
    - role: verdaccio
      tags: [verdaccio]
    - role: caddy
      tags: [caddy, profile_service, notifications_service, projects_service, source_code_hosting_service, openbao_tenancy]
