---
# Seed the default platform tenant plus a sample customer tenant.
#
# Creates:
# - platform operator user: ceo@<domain>
# - platform agent/admin user: agent@<domain>
# - sample customer org: Acme Corp
# - sample customer users: acme-admin@<domain>, acme-user@<domain>
# - machine users for assume-platform-admin, assume-acme-admin, and assume-acme-member
# - billing seed for both platform + Acme orgs
# - Stalwart mailboxes + seeded mailbox bindings
# - optional dev OIDC apps and billing auth verification
#
# Usage:
#   cd src/platform/ansible && ansible-playbook playbooks/seed-system.yml
#
# Cherry-pick:
#   --tags identity    Create/update orgs, users, and project grants only
#   --tags billing     Seed billing catalog + credits only
#   --tags stalwart    Seed Stalwart mailboxes + bindings
#   --tags dev-oidc    Create dev OIDC apps for local frontend development
#   --tags verify      Verify billing auth integration only
#   --tags forgejo     Seed forge-metal repo on Forgejo + configure controller SSH
#
# Password overrides:
#   -e 'seed_system_password_overrides={"ceo":"...", "acme_admin":"...", "acme_user":"..."}'

- name: Seed platform and sample customer tenants
  hosts: infra
  serial: 1
  become: true
  gather_facts: false
  vars:
    seed_system_zitadel_base_url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}"
    seed_system_zitadel_host: "auth.{{ forge_metal_domain }}"

    seed_system_password_overrides: {}
    seed_system_credstore_dir: /etc/credstore/seed-system

    seed_system_platform_org_name: forge-metal
    seed_system_acme_org_name: "Acme Corp"

    seed_system_sandbox_project_name: "{{ sandbox_rental_service_auth_project_name | default('sandbox-rental') }}"
    seed_system_identity_project_name: "{{ identity_service_auth_project_name | default('identity-service') }}"
    seed_system_secrets_project_name: "{{ secrets_service_auth_project_name | default('secrets-service') }}"
    seed_system_forgejo_project_name: "{{ forgejo_auth_project_name | default('forgejo') }}"
    seed_system_mailbox_project_name: "{{ mailbox_service_auth_project_name | default('mailbox-service') }}"

    seed_system_users:
      ceo:
        key: ceo
        org_key: platform
        email: "ceo@{{ forge_metal_domain }}"
        username: ceo
        first_name: CEO
        last_name: Operator
        password_credstore_path: "{{ seed_system_credstore_dir }}/ceo-password"
      platform_agent:
        key: platform_agent
        org_key: platform
        email: "agent@{{ forge_metal_domain }}"
        username: agent
        first_name: Platform
        last_name: Agent
        password_credstore_path: "{{ seed_system_credstore_dir }}/platform-agent-password"
      acme_admin:
        key: acme_admin
        org_key: acme
        email: "acme-admin@{{ forge_metal_domain }}"
        username: acme-admin
        first_name: Acme
        last_name: Admin
        password_credstore_path: "{{ seed_system_credstore_dir }}/acme-admin-password"
      acme_user:
        key: acme_user
        org_key: acme
        email: "acme-user@{{ forge_metal_domain }}"
        username: acme-user
        first_name: Acme
        last_name: User
        password_credstore_path: "{{ seed_system_credstore_dir }}/acme-user-password"

    seed_system_machine_users:
      platform_admin:
        key: platform_admin
        org_key: platform
        username: assume-platform-admin
        name: "Assume Platform Admin"
        secret_credstore_path: "{{ seed_system_credstore_dir }}/assume-platform-admin-client-secret"
      acme_admin:
        key: acme_admin
        org_key: acme
        username: assume-acme-admin
        name: "Assume Acme Admin"
        secret_credstore_path: "{{ seed_system_credstore_dir }}/assume-acme-admin-client-secret"
      acme_member:
        key: acme_member
        org_key: acme
        username: assume-acme-member
        name: "Assume Acme Member"
        secret_credstore_path: "{{ seed_system_credstore_dir }}/assume-acme-member-client-secret"

    seed_system_product_id: sandbox
    seed_system_product_display_name: Sandbox
    seed_system_meter_unit: sku_ms
    seed_system_billing_model: metered
    seed_system_plan_id: sandbox-default
    seed_system_plan_display_name: Sandbox PAYG
    # Free-tier bucket allowances reconciled monthly for every org with the
    # default plan. These are what populate the Sandbox card in the
    # entitlements view; without them an org with only an account-scoped
    # top-up renders a universal strip and no per-bucket tables.
    seed_system_free_tier_buckets:
      compute: 10000000
      memory: 5000000
      execution_root_storage: 2000000
    seed_system_plan_entitlements: {}
    seed_system_contract_tiers:
      - plan_id: sandbox-hobby
        display_name: Hobby
        tier: hobby
        currency: usd
        cadence: monthly
        unit_amount_cents: 500
        entitlements:
          compute: 30000000
          memory: 15000000
          execution_root_storage: 5000000
      - plan_id: sandbox-pro
        display_name: Pro
        tier: pro
        currency: usd
        cadence: monthly
        unit_amount_cents: 2000
        entitlements:
          compute: 120000000
          memory: 60000000
          execution_root_storage: 20000000
    seed_system_platform_target_prepaid_units: 500000000000
    seed_system_customer_target_prepaid_units: 500000000000
    seed_system_expires_after: 8760h
    # Acme demos the SKU branch of the entitlements view by carrying a small
    # promo grant pinned to the execution root-storage SKU. Without it the SKU
    # row in the rent-a-sandbox /billing screen never renders.
    seed_system_acme_sku_scoped_grants:
      - sku_id: sandbox_execution_root_storage_premium_nvme_gib_ms
        units: 50000000
        source: promo
    seed_system_helper_local_path: "/tmp/billing-seed-{{ inventory_hostname }}"
    seed_system_helper_remote_path: "/opt/forge-metal/staging/billing-seed-{{ inventory_hostname }}"
    seed_system_stripe_catalog_helper_local_path: "/tmp/billing-stripe-catalog-{{ inventory_hostname }}"
    seed_system_stripe_catalog_helper_remote_path: "/opt/forge-metal/staging/billing-stripe-catalog-{{ inventory_hostname }}"

    seed_system_stalwart_disabled_permissions:
      - email-send
      - jmap-sieve-script-set
      - jmap-sieve-script-validate
      - sieve-put-script
      - sieve-set-active

  tasks:
    - name: Wait for Zitadel to be ready
      ansible.builtin.wait_for:
        host: "{{ services.zitadel.host }}"
        port: "{{ services.zitadel.port }}"
        timeout: 60
      tags: [identity, billing, stalwart, verify, dev-oidc, forgejo]

    - name: Wait for billing-service to be ready
      ansible.builtin.wait_for:
        host: "{{ services.billing.host }}"
        port: "{{ services.billing.port }}"
        timeout: 60
      tags: [billing, verify]

    - name: Read Zitadel admin PAT
      ansible.builtin.slurp:
        src: /etc/zitadel/admin.pat
      register: seed_system_admin_pat_raw
      no_log: true
      tags: [identity, billing, stalwart, verify, dev-oidc, forgejo]

    - name: Set Zitadel admin PAT fact
      ansible.builtin.set_fact:
        seed_system_admin_pat: "{{ seed_system_admin_pat_raw.content | b64decode | trim }}"
      no_log: true
      tags: [identity, billing, stalwart, verify, dev-oidc, forgejo]

    - name: Find sandbox-rental project
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/management/v1/projects/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body:
          queries:
            - nameQuery:
                name: "{{ seed_system_sandbox_project_name }}"
                method: TEXT_QUERY_METHOD_EQUALS
        return_content: true
      register: seed_system_sandbox_project_search
      no_log: true
      tags: [identity, billing, verify, dev-oidc, forgejo]

    - name: Set sandbox-rental project ID fact
      ansible.builtin.set_fact:
        seed_system_sandbox_project_id: "{{ seed_system_sandbox_project_search.json.result[0].id }}"
      when: seed_system_sandbox_project_search.json.result is defined and seed_system_sandbox_project_search.json.result | length > 0
      tags: [identity, billing, verify, dev-oidc, forgejo]

    - name: Assert sandbox-rental project exists
      ansible.builtin.assert:
        that: seed_system_sandbox_project_id is defined
        fail_msg: "Sandbox-rental Zitadel project '{{ seed_system_sandbox_project_name }}' not found. Run the full deploy first."
      tags: [identity, billing, verify, dev-oidc, forgejo]

    - name: Find identity-service project
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/management/v1/projects/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body:
          queries:
            - nameQuery:
                name: "{{ seed_system_identity_project_name }}"
                method: TEXT_QUERY_METHOD_EQUALS
        return_content: true
      register: seed_system_identity_project_search
      no_log: true
      tags: [identity, dev-oidc]

    - name: Set identity-service project ID fact
      ansible.builtin.set_fact:
        seed_system_identity_project_id: "{{ seed_system_identity_project_search.json.result[0].id }}"
      when: seed_system_identity_project_search.json.result is defined and seed_system_identity_project_search.json.result | length > 0
      tags: [identity, dev-oidc]

    - name: Assert identity-service project exists
      ansible.builtin.assert:
        that: seed_system_identity_project_id is defined
        fail_msg: "Identity-service Zitadel project '{{ seed_system_identity_project_name }}' not found. Run the full deploy first."
      tags: [identity, dev-oidc]

    - name: Find secrets-service project
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/management/v1/projects/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body:
          queries:
            - nameQuery:
                name: "{{ seed_system_secrets_project_name }}"
                method: TEXT_QUERY_METHOD_EQUALS
        return_content: true
      register: seed_system_secrets_project_search
      no_log: true
      tags: [identity, dev-oidc]

    - name: Set secrets-service project ID fact
      ansible.builtin.set_fact:
        seed_system_secrets_project_id: "{{ seed_system_secrets_project_search.json.result[0].id }}"
      when: seed_system_secrets_project_search.json.result is defined and seed_system_secrets_project_search.json.result | length > 0
      tags: [identity, dev-oidc]

    - name: Assert secrets-service project exists
      ansible.builtin.assert:
        that: seed_system_secrets_project_id is defined
        fail_msg: "Secrets-service Zitadel project '{{ seed_system_secrets_project_name }}' not found. Run the full deploy first."
      tags: [identity, dev-oidc]

    - name: Find Forgejo project
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/management/v1/projects/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body:
          queries:
            - nameQuery:
                name: "{{ seed_system_forgejo_project_name }}"
                method: TEXT_QUERY_METHOD_EQUALS
        return_content: true
      register: seed_system_forgejo_project_search
      no_log: true
      tags: [identity]

    - name: Set Forgejo project ID fact
      ansible.builtin.set_fact:
        seed_system_forgejo_project_id: "{{ seed_system_forgejo_project_search.json.result[0].id }}"
      when: seed_system_forgejo_project_search.json.result is defined and seed_system_forgejo_project_search.json.result | length > 0
      tags: [identity]

    - name: Assert Forgejo project exists
      ansible.builtin.assert:
        that: seed_system_forgejo_project_id is defined
        fail_msg: "Forgejo Zitadel project '{{ seed_system_forgejo_project_name }}' not found. Run the full deploy first."
      tags: [identity]

    - name: Find mailbox-service project
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/management/v1/projects/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body:
          queries:
            - nameQuery:
                name: "{{ seed_system_mailbox_project_name }}"
                method: TEXT_QUERY_METHOD_EQUALS
        return_content: true
      register: seed_system_mailbox_project_search
      no_log: true
      tags: [identity, dev-oidc]

    - name: Set mailbox-service project ID fact
      ansible.builtin.set_fact:
        seed_system_mailbox_project_id: "{{ seed_system_mailbox_project_search.json.result[0].id }}"
      when: seed_system_mailbox_project_search.json.result is defined and seed_system_mailbox_project_search.json.result | length > 0
      tags: [identity, dev-oidc]

    - name: Assert mailbox-service project exists
      ansible.builtin.assert:
        that: seed_system_mailbox_project_id is defined
        fail_msg: "Mailbox-service Zitadel project '{{ seed_system_mailbox_project_name }}' not found. Run the full deploy first."
      tags: [identity]

    - name: List existing organizations
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/v2/organizations/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body: {}
        return_content: true
      register: seed_system_org_search
      no_log: true
      tags: [identity, billing, forgejo]

    - name: Set organization search facts
      ansible.builtin.set_fact:
        seed_system_platform_org_existing: >-
          {{
            (
              seed_system_org_search.json.result
              | default([])
              | selectattr('name', 'equalto', seed_system_platform_org_name)
              | list
              | first
            ) | default({})
          }}
        seed_system_acme_org_existing: >-
          {{
            (
              seed_system_org_search.json.result
              | default([])
              | selectattr('name', 'equalto', seed_system_acme_org_name)
              | list
              | first
            ) | default({})
          }}
      tags: [identity, billing, forgejo]

    - name: Assert platform organization exists
      ansible.builtin.assert:
        that: seed_system_platform_org_existing.id | default('', true) | length > 0
        fail_msg: >-
          Platform organization {{ seed_system_platform_org_name }} was not found
          in Zitadel. Re-run the full deploy or reset Zitadel bootstrap first.
      tags: [identity, billing, forgejo]

    - name: Create Acme organization
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/v2/organizations"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body:
          name: "{{ seed_system_acme_org_name }}"
        status_code: [200, 201]
        return_content: true
      register: seed_system_acme_org_created
      when: seed_system_acme_org_existing == {}
      no_log: true
      tags: [identity, billing]

    - name: Refresh organizations after Acme creation
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/v2/organizations/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body: {}
        return_content: true
      register: seed_system_org_search_final
      no_log: true
      tags: [identity, billing]

    - name: Set organization facts
      ansible.builtin.set_fact:
        seed_system_orgs:
          platform:
            organization_id: >-
              {{
                (
                  seed_system_org_search_final.json.result
                  | default([])
                  | selectattr('name', 'equalto', seed_system_platform_org_name)
                  | map(attribute='id')
                  | list
                  | first
                )
              }}
            name: "{{ seed_system_platform_org_name }}"
          acme:
            organization_id: >-
              {{
                (
                  seed_system_org_search_final.json.result
                  | default([])
                  | selectattr('name', 'equalto', seed_system_acme_org_name)
                  | map(attribute='id')
                  | list
                  | first
                )
              }}
            name: "{{ seed_system_acme_org_name }}"
      tags: [identity, billing]

    - name: Assert organization IDs are set
      ansible.builtin.assert:
        that:
          - seed_system_orgs.platform.organization_id | default('', true) | length > 0
          - seed_system_orgs.acme.organization_id | default('', true) | length > 0
        fail_msg: "Platform or Acme organization could not be resolved from Zitadel."
      tags: [identity, billing]

    - name: Create seed-system credstore directory
      ansible.builtin.file:
        path: "{{ seed_system_credstore_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      tags: [identity]

    - name: Seed human users
      ansible.builtin.include_tasks: tasks/seed-human-user.yml
      loop: "{{ seed_system_users | dict2items | map(attribute='value') | list }}"
      loop_control:
        loop_var: seed_system_user
        label: "{{ seed_system_user.email }}"
      tags: [identity]

    - name: Seed assume-persona machine users
      ansible.builtin.include_tasks: tasks/seed-machine-user.yml
      loop: "{{ seed_system_machine_users | dict2items | map(attribute='value') | list }}"
      loop_control:
        loop_var: seed_system_machine_user
        label: "{{ seed_system_machine_user.username }}"
      tags: [identity]

    - name: Ensure CEO is platform organization owner
      ansible.builtin.uri:
        url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/zitadel.internal_permission.v2.InternalPermissionService/CreateAdministrator"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
          Connect-Protocol-Version: "1"
        body_format: json
        body:
          userId: "{{ seed_system_users_state.ceo.user_id }}"
          resource:
            organizationId: "{{ seed_system_orgs.platform.organization_id }}"
          roles:
            - ORG_OWNER
        status_code: [200, 409]
      no_log: true
      tags: [identity]

    - name: Ensure Acme admin is Acme organization owner
      ansible.builtin.uri:
        url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/zitadel.internal_permission.v2.InternalPermissionService/CreateAdministrator"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
          Connect-Protocol-Version: "1"
        body_format: json
        body:
          userId: "{{ seed_system_users_state.acme_admin.user_id }}"
          resource:
            organizationId: "{{ seed_system_orgs.acme.organization_id }}"
          roles:
            - ORG_OWNER
        status_code: [200, 409]
      no_log: true
      tags: [identity]

    - name: List existing seeded authorizations
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/zitadel.authorization.v2.AuthorizationService/ListAuthorizations"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
          Connect-Protocol-Version: "1"
        body_format: json
        body:
          pagination:
            limit: 200
        status_code: 200
        return_content: true
      register: seed_system_authorizations
      no_log: true
      tags: [identity]

    - name: List existing sandbox-rental project grants
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/management/v1/projects/{{ seed_system_sandbox_project_id }}/grants/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body:
          limit: 200
        status_code: 200
        return_content: true
      register: seed_system_sandbox_project_grants
      no_log: true
      tags: [identity]

    - name: List existing identity-service project grants
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/management/v1/projects/{{ seed_system_identity_project_id }}/grants/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body:
          limit: 200
        status_code: 200
        return_content: true
      register: seed_system_identity_project_grants
      no_log: true
      tags: [identity]

    - name: List existing secrets-service project grants
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/management/v1/projects/{{ seed_system_secrets_project_id }}/grants/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body:
          limit: 200
        status_code: 200
        return_content: true
      register: seed_system_secrets_project_grants
      no_log: true
      tags: [identity]

    - name: Set desired service project grants fact
      ansible.builtin.set_fact:
        seed_system_desired_project_grants:
          - project_id: "{{ seed_system_sandbox_project_id }}"
            granted_organization_id: "{{ seed_system_orgs.acme.organization_id }}"
            role_keys:
              - owner
              - admin
              - member
            existing_grants: "{{ seed_system_sandbox_project_grants }}"
          - project_id: "{{ seed_system_identity_project_id }}"
            granted_organization_id: "{{ seed_system_orgs.acme.organization_id }}"
            role_keys:
              - owner
              - admin
              - member
            existing_grants: "{{ seed_system_identity_project_grants }}"
          - project_id: "{{ seed_system_secrets_project_id }}"
            granted_organization_id: "{{ seed_system_orgs.acme.organization_id }}"
            role_keys:
              - owner
              - admin
              - member
            existing_grants: "{{ seed_system_secrets_project_grants }}"
      tags: [identity]

    - name: Upsert service project grants
      ansible.builtin.include_tasks:
        file: tasks/upsert_project_grant.yml
        apply:
          tags: [identity]
      loop: "{{ seed_system_desired_project_grants }}"
      loop_control:
        label: "{{ item.project_id }} -> {{ item.granted_organization_id }}"
      vars:
        zitadel_project_grant_base_url: "{{ seed_system_zitadel_base_url }}"
        zitadel_project_grant_host: "{{ seed_system_zitadel_host }}"
        zitadel_project_grant_admin_pat: "{{ seed_system_admin_pat }}"
        zitadel_project_grants: "{{ item.existing_grants }}"
        zitadel_project_grant: "{{ item }}"
      no_log: true
      tags: [identity]

    - name: Set desired seeded authorizations fact
      ansible.builtin.set_fact:
        seed_system_desired_authorizations:
          - user_id: "{{ seed_system_users_state.ceo.user_id }}"
            organization_id: "{{ seed_system_orgs.platform.organization_id }}"
            project_id: "{{ seed_system_sandbox_project_id }}"
            role_keys: [owner]
          - user_id: "{{ seed_system_users_state.ceo.user_id }}"
            organization_id: "{{ seed_system_orgs.platform.organization_id }}"
            project_id: "{{ seed_system_identity_project_id }}"
            role_keys: [owner]
          - user_id: "{{ seed_system_users_state.ceo.user_id }}"
            organization_id: "{{ seed_system_orgs.platform.organization_id }}"
            project_id: "{{ seed_system_secrets_project_id }}"
            role_keys: [owner]
          - user_id: "{{ seed_system_users_state.ceo.user_id }}"
            organization_id: "{{ seed_system_orgs.platform.organization_id }}"
            project_id: "{{ seed_system_forgejo_project_id }}"
