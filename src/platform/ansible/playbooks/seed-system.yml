    - name: Build billing seed helper on controller
      ansible.builtin.command:
        argv:
          - go
          - build
          - -o
          - "{{ seed_system_helper_local_path }}"
          - ./src/billing-service/cmd/billing-seed
      args:
        chdir: "{{ playbook_dir }}/../../../.."
      delegate_to: localhost
      become: false
      changed_when: false
      tags: [billing]

    - name: Ensure billing helper staging directory exists
      ansible.builtin.file:
        path: /opt/forge-metal/staging
        state: directory
        mode: "0755"
      tags: [billing]

    - name: Upload billing seed helper
      ansible.builtin.copy:
        src: "{{ seed_system_helper_local_path }}"
        dest: "{{ seed_system_helper_remote_path }}"
        mode: "0755"
      tags: [billing]

    - name: Run billing seed helper for platform and Acme
      ansible.builtin.command:
        argv:
          - "{{ seed_system_helper_remote_path }}"
          - --pg-dsn
          - "postgres://billing@/billing?host=/var/run/postgresql&sslmode=disable"
          - --org-id
          - "{{ item.org_id }}"
          - --org-name
          - "{{ item.org_name }}"
          - --org-trust-tier
          - "{{ item.org_trust_tier }}"
          - --product-id
          - "{{ seed_system_product_id }}"
          - --product-display-name
          - "{{ seed_system_product_display_name }}"
          - --meter-unit
          - "{{ seed_system_meter_unit }}"
          - --billing-model
          - "{{ seed_system_billing_model }}"
          - --plan-id
          - "{{ seed_system_plan_id }}"
          - --plan-display-name
          - "{{ seed_system_plan_display_name }}"
          - --free-tier-buckets-json
          - "{{ seed_system_free_tier_buckets | to_json }}"
          - --plan-entitlements-json
          - "{{ seed_system_plan_entitlements | to_json }}"
          - --target-prepaid-units
          - "{{ item.target_prepaid_units | string }}"
          - --prepaid-source
          - "{{ item.prepaid_source }}"
          - --expires-after
          - "{{ seed_system_expires_after }}"
          - --sku-scoped-grants-json
          - "{{ item.sku_scoped_grants | default([]) | to_json }}"
      become: true
      become_user: billing
      loop:
        - key: platform
          org_id: "{{ seed_system_orgs.platform.organization_id }}"
          org_name: "{{ seed_system_orgs.platform.name }}"
          org_trust_tier: platform
          target_prepaid_units: "{{ seed_system_platform_target_prepaid_units }}"
          prepaid_source: purchase
          sku_scoped_grants: []
        - key: acme
          org_id: "{{ seed_system_orgs.acme.organization_id }}"
          org_name: "{{ seed_system_orgs.acme.name }}"
          org_trust_tier: established
          target_prepaid_units: "{{ seed_system_customer_target_prepaid_units }}"
          prepaid_source: purchase
          sku_scoped_grants: "{{ seed_system_acme_sku_scoped_grants }}"
      loop_control:
        label: "{{ item.key }}"
      register: seed_system_billing_result_raw
      changed_when: >-
        ((seed_system_billing_result_raw.stdout | from_json).deposited_units | int) > 0
        or ((seed_system_billing_result_raw.stdout | from_json).sku_grants_deposited | int) > 0
      tags: [billing]

    - name: Run free secrets billing catalog seed for platform and Acme
      ansible.builtin.command:
        argv:
          - "{{ seed_system_helper_remote_path }}"
          - --pg-dsn
          - "postgres://billing@/billing?host=/var/run/postgresql&sslmode=disable"
          - --org-id
          - "{{ item.org_id }}"
          - --org-name
          - "{{ item.org_name }}"
          - --org-trust-tier
          - "{{ item.org_trust_tier }}"
          - --product-id
          - secrets
          - --product-display-name
          - Secrets
          - --meter-unit
          - operations
          - --billing-model
          - metered
          - --plan-id
          - secrets-default
          - --plan-display-name
          - Secrets Free
          - --free-tier-buckets-json
          - "{}"
          - --plan-entitlements-json
          - "{}"
          - --target-prepaid-units
          - "0"
          - --prepaid-source
          - purchase
          - --expires-after
          - "{{ seed_system_expires_after }}"
          - --sku-scoped-grants-json
          - "[]"
      become: true
      become_user: billing
      loop:
        - key: platform
          org_id: "{{ seed_system_orgs.platform.organization_id }}"
          org_name: "{{ seed_system_orgs.platform.name }}"
          org_trust_tier: platform
        - key: acme
          org_id: "{{ seed_system_orgs.acme.organization_id }}"
          org_name: "{{ seed_system_orgs.acme.name }}"
          org_trust_tier: established
      loop_control:
        label: "{{ item.key }}"
      register: seed_system_secrets_billing_result_raw
      changed_when: >-
        ((seed_system_secrets_billing_result_raw.stdout | from_json).deposited_units | int) > 0
        or ((seed_system_secrets_billing_result_raw.stdout | from_json).sku_grants_deposited | int) > 0
      tags: [billing]

    - name: Parse billing seed results
      ansible.builtin.set_fact:
        seed_system_billing_results: >-
          {{
            dict(
              seed_system_billing_result_raw.results
              | map(attribute='item.key')
              | zip(
                  seed_system_billing_result_raw.results
                  | map(attribute='stdout')
                  | map('from_json')
                )
            )
          }}
      tags: [billing]

    - name: Print billing seed summary
      ansible.builtin.debug:
        msg:
          - "Platform billing seeded for {{ seed_system_billing_results.platform.org_id }}"
          - "  Prepaid after: {{ seed_system_billing_results.platform.prepaid_after }}"
          - "Acme billing seeded for {{ seed_system_billing_results.acme.org_id }}"
          - "  Prepaid after: {{ seed_system_billing_results.acme.prepaid_after }}"
      tags: [billing]

    - name: Build billing Stripe catalog helper on controller
      ansible.builtin.command:
        argv:
          - go
          - build
          - -o
          - "{{ seed_system_stripe_catalog_helper_local_path }}"
          - ./src/billing-service/cmd/billing-stripe-catalog
      args:
        chdir: "{{ playbook_dir }}/../../../.."
      delegate_to: localhost
      become: false
      changed_when: false
      tags: [billing]

    - name: Upload billing Stripe catalog helper
      ansible.builtin.copy:
        src: "{{ seed_system_stripe_catalog_helper_local_path }}"
        dest: "{{ seed_system_stripe_catalog_helper_remote_path }}"
        mode: "0755"
      tags: [billing]

    - name: Read OpenBao root token for Stripe catalog seed
      ansible.builtin.slurp:
        src: /etc/credstore/openbao/root-token
      register: seed_system_openbao_root_token_raw
      no_log: true
      tags: [billing]

    - name: Read billing Stripe provider secret from OpenBao
      ansible.builtin.uri:
        url: >-
          https://{{ services.openbao.host }}:{{ services.openbao.port }}/v1/kv-{{
          seed_system_orgs.platform.organization_id }}/data/secret/org/billing-service.stripe.secret_key
        method: GET
        headers:
          X-Vault-Token: "{{ seed_system_openbao_root_token_raw.content | b64decode | trim }}"
        validate_certs: false
        status_code: 200
        return_content: true
      register: seed_system_stripe_provider_secret
      no_log: true
      tags: [billing]

    - name: Create billing seed runtime secret directory
      ansible.builtin.file:
        path: /run/forge-metal/seed-system
        state: directory
        owner: root
        group: billing
        mode: "0750"
      tags: [billing]

    - name: Materialize transient Stripe catalog seed secret
      ansible.builtin.copy:
        content: "{{ seed_system_stripe_provider_secret.json.data.data.value }}"
        dest: /run/forge-metal/seed-system/stripe-secret-key
        owner: root
        group: billing
        mode: "0640"
      no_log: true
      tags: [billing]

    - name: Ensure Stripe contract catalog is reconciled
      ansible.builtin.command:
        argv:
          - "{{ seed_system_stripe_catalog_helper_remote_path }}"
          - --pg-dsn
          - "postgres://billing@/billing?host=/var/run/postgresql&sslmode=disable"
          - --stripe-secret-key-file
          - /run/forge-metal/seed-system/stripe-secret-key
          - --product-id
          - "{{ seed_system_product_id }}"
          - --product-display-name
          - "{{ seed_system_product_display_name }}"
          - --rate-source-plan-id
          - "{{ seed_system_plan_id }}"
          - --tiers-json
          - "{{ seed_system_contract_tiers | to_json }}"
      become: true
      become_user: billing
      register: seed_system_stripe_catalog_raw
      changed_when: false
      tags: [billing]

    - name: Remove transient Stripe catalog seed secret
      ansible.builtin.file:
        path: /run/forge-metal/seed-system/stripe-secret-key
        state: absent
      tags: [billing]

    - name: Parse Stripe contract catalog result
      ansible.builtin.set_fact:
        seed_system_stripe_catalog_result: "{{ seed_system_stripe_catalog_raw.stdout | from_json }}"
      tags: [billing]

    - name: Print Stripe contract catalog summary
      ansible.builtin.debug:
        msg:
          - "Stripe catalog ready for {{ seed_system_stripe_catalog_result.product_id }} ({{ seed_system_stripe_catalog_result.stripe_product_id }})"
          - >-
            Plans:
            {{
              seed_system_stripe_catalog_result.plans
              | map(attribute='plan_id')
              | list
              | join(', ')
            }}
      tags: [billing]

    - name: Remove billing seed helper from server
      ansible.builtin.file:
        path: "{{ seed_system_helper_remote_path }}"
        state: absent
      tags: [billing]

    - name: Remove billing Stripe catalog helper from server
      ansible.builtin.file:
        path: "{{ seed_system_stripe_catalog_helper_remote_path }}"
        state: absent
      tags: [billing]

    - name: Remove local billing seed helper
      ansible.builtin.file:
        path: "{{ seed_system_helper_local_path }}"
        state: absent
      delegate_to: localhost
      become: false
      tags: [billing]

    - name: Remove local billing Stripe catalog helper
      ansible.builtin.file:
        path: "{{ seed_system_stripe_catalog_helper_local_path }}"
        state: absent
      delegate_to: localhost
      become: false
      tags: [billing]

    - name: Wait for Stalwart to be ready
      ansible.builtin.wait_for:
        host: "{{ services.stalwart.host }}"
        port: "{{ services.stalwart.http_port }}"
        timeout: 60
      tags: [stalwart]

    - name: Stop mailbox-service before mailbox reseed
      ansible.builtin.systemd:
        name: mailbox-service
        state: stopped
      failed_when: false
      tags: [stalwart]

    - name: Compute bcrypt hashes for mailbox passwords
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import bcrypt, json, sys
            passwords = json.loads(sys.stdin.read())
            out = {}
            for name, pw in passwords.items():
                out[name] = bcrypt.hashpw(pw.encode(), bcrypt.gensalt()).decode()
            print(json.dumps(out))
        stdin: >-
          {{ {"ceo": stalwart_ceo_password, "agents": stalwart_agents_password} | to_json }}
      register: seed_system_mailbox_hashes_raw
      changed_when: false
      delegate_to: localhost
      become: false
      no_log: true
      tags: [stalwart]

    - name: Set mailbox password hashes fact
      ansible.builtin.set_fact:
        seed_system_mailbox_hashes: "{{ seed_system_mailbox_hashes_raw.stdout | from_json }}"
      no_log: true
      tags: [stalwart]

    - name: Check if CEO mailbox exists
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal/ceo"
        method: GET
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        status_code: 200
        return_content: true
      register: seed_system_ceo_check
      no_log: true
      tags: [stalwart]

    - name: Delete existing CEO mailbox
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal/ceo"
        method: DELETE
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        status_code: 200
      when: seed_system_ceo_check.json.error is not defined
      no_log: true
      tags: [stalwart]

    - name: Create CEO mailbox
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal"
        method: POST
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          type: individual
          name: ceo
          description: "Forge Metal operator mailbox"
          secrets: ["{{ seed_system_mailbox_hashes['ceo'] }}"]
          emails: ["ceo@{{ forge_metal_domain }}"]
          roles: ["user"]
          disabledPermissions: "{{ seed_system_stalwart_disabled_permissions }}"
          quota: 0
        status_code: 200
        return_content: true
      no_log: true
      tags: [stalwart]

    - name: Check if agents mailbox exists
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal/agents"
        method: GET
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        status_code: 200
        return_content: true
      register: seed_system_agents_check
      no_log: true
      tags: [stalwart]

    - name: Delete existing agents mailbox
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal/agents"
        method: DELETE
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        status_code: 200
      when: seed_system_agents_check.json.error is not defined
      no_log: true
      tags: [stalwart]

    - name: Create agents mailbox
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal"
        method: POST
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          type: individual
          name: agents
          description: "Shared agent mailbox"
          secrets: ["{{ seed_system_mailbox_hashes['agents'] }}"]
          emails: ["agents@{{ forge_metal_domain }}"]
          roles: ["user"]
          disabledPermissions: "{{ seed_system_stalwart_disabled_permissions }}"
          quota: 0
        status_code: 200
        return_content: true
      no_log: true
      tags: [stalwart]

    - name: Reset mailbox-service projection for seeded mailboxes
      ansible.builtin.command:
        cmd: >-
          {{ fm_bin }}/psql
          -h {{ services.postgresql.host }}
          -p {{ services.postgresql.port }}
          -U mailbox_service
          -d mailbox_service
          -v ON_ERROR_STOP=1
        stdin: |
          DELETE FROM email_bodies
          WHERE account_id IN ('ceo', 'agents');
          DELETE FROM email_mailboxes
          WHERE account_id IN ('ceo', 'agents');
          DELETE FROM emails
          WHERE account_id IN ('ceo', 'agents');
          DELETE FROM mailboxes
          WHERE account_id IN ('ceo', 'agents');
          DELETE FROM threads
          WHERE account_id IN ('ceo', 'agents');
          DELETE FROM sync_state
          WHERE account_id IN ('ceo', 'agents');
          DELETE FROM mailbox_accounts
          WHERE account_id IN ('ceo', 'agents');
      environment:
        PGPASSWORD: "{{ postgresql_mailbox_service_password }}"
      changed_when: false
      no_log: true
      tags: [stalwart]

    - name: Restart Stalwart after mailbox reseed
      ansible.builtin.systemd:
        name: stalwart
        state: restarted
      tags: [stalwart]

    - name: Wait for Stalwart after mailbox reseed
      ansible.builtin.wait_for:
        host: "{{ services.stalwart.host }}"
        port: "{{ services.stalwart.http_port }}"
        timeout: 60
      tags: [stalwart]

    - name: Deploy operator forwarder target credential
      ansible.builtin.copy:
        content: "{{ stalwart_operator_forward_to }}"
        dest: /etc/credstore/mailbox-service/forward-to
        owner: root
        group: mailbox_service
        mode: "0640"
      when: stalwart_operator_forward_to | default('', true) | length > 0
      tags: [stalwart]

    - name: Reset operator forwarder state on reseed
      ansible.builtin.file:
        path: /var/lib/mailbox-service/forwarder-state.json
        state: absent
      tags: [stalwart]

    - name: Read deployed mailbox-service unit # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: systemctl cat mailbox-service.service
      register: seed_system_mailbox_service_unit
      changed_when: false
      failed_when: false
      tags: [stalwart]

    - name: Set split-credential mailbox-service support fact
      ansible.builtin.set_fact:
        seed_system_mailbox_service_supports_split_credentials: >-
          {{
            seed_system_mailbox_service_unit.rc == 0
            and
            ('LoadCredential=stalwart-ceo-password:/etc/credstore/mailbox-service/stalwart-ceo-password' in seed_system_mailbox_service_unit.stdout)
            and
            ('LoadCredential=stalwart-agents-password:/etc/credstore/mailbox-service/stalwart-agents-password' in seed_system_mailbox_service_unit.stdout)
          }}
      tags: [stalwart]

    - name: Restart mailbox-service after mailbox reseed
      ansible.builtin.systemd:
        name: mailbox-service
        enabled: true
        state: restarted
        daemon_reload: true
      when: seed_system_mailbox_service_supports_split_credentials
      tags: [stalwart]

    - name: Note mailbox-service restart is deferred until deploy
      ansible.builtin.debug:
        msg: >-
          mailbox-service remains stopped after mailbox reseed because the
          deployed unit does not yet load split Stalwart credentials. Run the
          mailbox_service deploy next.
      when: not seed_system_mailbox_service_supports_split_credentials
      tags: [stalwart]

    - name: Set seeded mailbox bindings fact
      ansible.builtin.set_fact:
        seed_system_seeded_mailbox_bindings:
          - subject: "{{ seed_system_users_state.ceo.user_id }}"
            account_id: ceo
            email_address: "{{ seed_system_users_state.ceo.email }}"
          - subject: "{{ seed_system_users_state.platform_agent.user_id }}"
            account_id: agents
            email_address: "agents@{{ forge_metal_domain }}"
          - subject: "{{ seed_system_machine_users_state.platform_admin.user_id }}"
            account_id: agents
            email_address: "agents@{{ forge_metal_domain }}"
      when:
        - seed_system_users_state.ceo.user_id | default('', true) | length > 0
        - seed_system_users_state.platform_agent.user_id | default('', true) | length > 0
        - seed_system_machine_users_state.platform_admin.user_id | default('', true) | length > 0
      tags: [identity, stalwart]

    - name: Clear existing seeded mailbox bindings
      community.postgresql.postgresql_query:
        login_host: "{{ services.postgresql.host }}"
        login_port: "{{ services.postgresql.port }}"
        login_user: mailbox_service
        login_password: "{{ postgresql_mailbox_service_password }}"
        login_db: mailbox_service
        query: "DELETE FROM mailbox_bindings WHERE account_id IN ('ceo', 'agents')"
      no_log: true
      when: seed_system_seeded_mailbox_bindings | default([]) | length > 0
      tags: [identity, stalwart]

    - name: Upsert seeded mailbox bindings
      community.postgresql.postgresql_query:
        login_host: "{{ services.postgresql.host }}"
        login_port: "{{ services.postgresql.port }}"
        login_user: mailbox_service
        login_password: "{{ postgresql_mailbox_service_password }}"
        login_db: mailbox_service
        query: >-
          INSERT INTO mailbox_bindings (subject, account_id, email_address)
          VALUES (%s, %s, %s)
          ON CONFLICT (subject) DO UPDATE
          SET account_id = EXCLUDED.account_id,
              email_address = EXCLUDED.email_address
        positional_args:
          - "{{ item.subject }}"
          - "{{ item.account_id }}"
          - "{{ item.email_address }}"
      loop: "{{ seed_system_seeded_mailbox_bindings | default([]) }}"
      loop_control:
        label: "{{ item.email_address }}"
      no_log: true
      when: seed_system_seeded_mailbox_bindings | default([]) | length > 0
      tags: [identity, stalwart]

    - name: Print mailbox summary
      ansible.builtin.debug:
        msg: >-
          {{
            [
              'Stalwart mailboxes created:',
              '  ceo@' + forge_metal_domain,
              '  agents@' + forge_metal_domain,
              ''
            ]
            + (
              ['  Forwarding ceo@ -> ' + stalwart_operator_forward_to]
              if stalwart_operator_forward_to | default('', true) | length > 0
              else ['  Forwarding: disabled (set stalwart_operator_forward_to in group_vars)']
            )
          }}
      tags: [stalwart]

    - name: Set dev OIDC project facts
      ansible.builtin.set_fact:
        seed_system_dev_oidc_apps:
          - name: rent-a-sandbox-dev
            project_id: "{{ seed_system_sandbox_project_id }}"
            port: 4244
      tags: [dev-oidc]

    - name: Search for existing dev OIDC apps
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/management/v1/projects/{{ item.project_id }}/apps/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body:
          queries:
            - nameQuery:
                name: "{{ item.name }}"
                method: TEXT_QUERY_METHOD_EQUALS
        status_code: 200
      register: seed_system_dev_oidc_search
      loop: "{{ seed_system_dev_oidc_apps }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.project_id | length > 0
      tags: [dev-oidc]

    - name: Delete existing dev OIDC apps
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/management/v1/projects/{{ item.item.project_id }}/apps/{{ (item.json.result | first).id }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        status_code: 200
      loop: "{{ seed_system_dev_oidc_search.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when:
        - item is not skipped
        - (item.json.result | default([]) | length) > 0
      tags: [dev-oidc]

    - name: Create dev OIDC apps
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/management/v1/projects/{{ item.item.project_id }}/apps/oidc"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body:
          name: "{{ item.item.name }}"
          redirectUris:
            - "http://127.0.0.1:*/callback"
          responseTypes:
            - OIDC_RESPONSE_TYPE_CODE
          grantTypes:
            - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
            - OIDC_GRANT_TYPE_REFRESH_TOKEN
          appType: OIDC_APP_TYPE_WEB
          authMethodType: OIDC_AUTH_METHOD_TYPE_NONE
          postLogoutRedirectUris:
            - "http://127.0.0.1:*"
          devMode: true
          accessTokenType: OIDC_TOKEN_TYPE_JWT
        status_code: 200
      register: seed_system_dev_oidc_created
      loop: "{{ seed_system_dev_oidc_search.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when:
        - item is not skipped
      tags: [dev-oidc]

    - name: Re-query dev OIDC apps for client IDs
      ansible.builtin.uri:
        url: "{{ seed_system_zitadel_base_url }}/management/v1/projects/{{ item.project_id }}/apps/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_system_admin_pat }}"
          Host: "{{ seed_system_zitadel_host }}"
        body_format: json
        body:
          queries:
            - nameQuery:
                name: "{{ item.name }}"
                method: TEXT_QUERY_METHOD_EQUALS
        status_code: 200
      register: seed_system_dev_oidc_final
      loop: "{{ seed_system_dev_oidc_apps }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.project_id | length > 0
      tags: [dev-oidc]

    - name: Print dev OIDC summary
      ansible.builtin.debug:
        msg: >-
          {{ item.item.name }}:
          AUTH_CLIENT_ID={{ (item.json.result | first).oidcConfig.clientId }}
          (port {{ item.item.port }})
      loop: "{{ seed_system_dev_oidc_final.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item is not skipped and (item.json.result | default([]) | length) > 0
      tags: [dev-oidc]

    - name: Verify billing auth integration
      tags: [verify]
      block:
        - name: Create ephemeral verification machine user
          ansible.builtin.uri:
            url: "{{ seed_system_zitadel_base_url }}/management/v1/users/machine"
            method: POST
            headers:
              Authorization: "Bearer {{ seed_system_admin_pat }}"
              Host: "{{ seed_system_zitadel_host }}"
            body_format: json
            body:
              userName: "seed-system-verify-{{ inventory_hostname }}"
              name: "seed system verify {{ inventory_hostname }}"
              accessTokenType: ACCESS_TOKEN_TYPE_JWT
            return_content: true
          register: seed_system_verify_user
          no_log: true

        - name: Create verification user secret
          ansible.builtin.uri:
            url: "{{ seed_system_zitadel_base_url }}/v2/users/{{ seed_system_verify_user.json.userId }}/secret"
            method: POST
            headers:
              Authorization: "Bearer {{ seed_system_admin_pat }}"
              Host: "{{ seed_system_zitadel_host }}"
            status_code: 200
            return_content: true
          register: seed_system_verify_secret
          no_log: true

        - name: Grant verification user access to sandbox-rental project
          ansible.builtin.uri:
            url: "{{ seed_system_zitadel_base_url }}/management/v1/users/{{ seed_system_verify_user.json.userId }}/grants"
            method: POST
            headers:
              Authorization: "Bearer {{ seed_system_admin_pat }}"
              Host: "{{ seed_system_zitadel_host }}"
            body_format: json
            body:
              projectId: "{{ seed_system_sandbox_project_id }}"
              roleKeys:
                - admin
            status_code: [200, 409]
          no_log: true

        - name: Request verification access token
          ansible.builtin.uri:
            url: "{{ seed_system_zitadel_base_url }}/oauth/v2/token"
            method: POST
            headers:
              Host: "{{ seed_system_zitadel_host }}"
            body_format: form-urlencoded
            body:
              grant_type: client_credentials
              scope: >-
                openid profile
                urn:zitadel:iam:user:resourceowner
                urn:zitadel:iam:org:projects:roles
                urn:zitadel:iam:org:project:id:{{ seed_system_sandbox_project_id }}:aud
            url_username: "seed-system-verify-{{ inventory_hostname }}"
            url_password: "{{ seed_system_verify_secret.json.clientSecret }}"
            force_basic_auth: true
            return_content: true
            status_code: 200
          register: seed_system_verify_token
          no_log: true

        - name: Wait for sandbox-rental-service before auth verification
          ansible.builtin.wait_for:
            host: "{{ services.sandbox_rental.host }}"
            port: "{{ services.sandbox_rental.port }}"
            timeout: 60

        - name: Verify sandbox-rental billing proxy rejects unauthenticated request
          ansible.builtin.uri:
            url: "http://{{ services.sandbox_rental.host }}:{{ services.sandbox_rental.port }}/api/v1/billing/entitlements"
            method: GET
            status_code: 401

        - name: Verify sandbox-rental billing proxy accepts authenticated request
          ansible.builtin.uri:
            url: "http://{{ services.sandbox_rental.host }}:{{ services.sandbox_rental.port }}/api/v1/billing/entitlements"
            method: GET
            headers:
              Authorization: "Bearer {{ seed_system_verify_token.json.access_token }}"
            status_code: 200
            return_content: true
          register: seed_system_verify_authed
          no_log: true

        - name: Assert entitlements response shape
          ansible.builtin.assert:
            that:
              - seed_system_verify_authed.json.org_id is defined
              - seed_system_verify_authed.json.universal is defined
              - seed_system_verify_authed.json.products is defined
            fail_msg: "Billing entitlements proxy returned unexpected payload: {{ seed_system_verify_authed.json }}"

        - name: Print verification result
          ansible.builtin.debug:
            msg:
              - "Auth verification passed"
              - "  Universal pools: {{ (seed_system_verify_authed.json.universal | default([])) | length }}"
              - "  Product sections: {{ (seed_system_verify_authed.json.products | default([])) | length }}"

      always:
        - name: Cleanup verification machine user
          ansible.builtin.uri:
            url: "{{ seed_system_zitadel_base_url }}/v2/users/{{ seed_system_verify_user.json.userId }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ seed_system_admin_pat }}"
              Host: "{{ seed_system_zitadel_host }}"
            status_code: [200, 404]
          when: seed_system_verify_user is defined and seed_system_verify_user.json.userId is defined

    # ── Forgejo repo seeding ──────────────────────────────────────────
    - name: Read Forgejo automation token for repo seeding
      ansible.builtin.slurp:
        src: /etc/credstore/forgejo/automation-token
      register: seed_forgejo_token_raw
      no_log: true
      tags: [forgejo]

    - name: Set Forgejo automation token fact
      ansible.builtin.set_fact:
        seed_forgejo_automation_token: "{{ seed_forgejo_token_raw.content | b64decode | trim }}"
      no_log: true
      tags: [forgejo]

    - name: Seed forge-metal repo on Forgejo
      ansible.builtin.include_tasks:
        file: tasks/seed-forgejo-repos.yml
        apply:
          tags: [forgejo]
      vars:
        seed_forgejo_owner: "{{ seed_system_users.ceo.username }}"
        seed_forgejo_controller_ssh_pubkey_path: "~/.ssh/id_ed25519.pub"
        seed_forgejo_repo_local_path: "{{ playbook_dir }}/../../../.."
        seed_forgejo_admin_pat: "{{ seed_system_admin_pat }}"
        seed_forgejo_platform_org_id: "{{ seed_system_platform_org_existing.id }}"
        seed_forgejo_sandbox_project_id: "{{ seed_system_sandbox_project_id }}"
        seed_forgejo_zitadel_base_url: "{{ seed_system_zitadel_base_url }}"
        seed_forgejo_zitadel_host: "{{ seed_system_zitadel_host }}"
      tags: [forgejo]

    - name: Print seed-system summary
      ansible.builtin.debug:
        msg:
          - "============================================"
          - " Seed system ready"
          - "============================================"
          - ""
          - " Operator login: https://rentasandbox.{{ forge_metal_domain }}/"
          - " CEO:            {{ seed_system_users_state.ceo.email }}"
          - " CEO password:   {{ seed_system_users_state.ceo.password_credstore_path }}"
          - " Agent:          {{ seed_system_users_state.platform_agent.email }}"
          - " Agent password: {{ seed_system_users_state.platform_agent.password_credstore_path }}"
          - " Platform API:   {{ seed_system_machine_users_state.platform_admin.username }}"
          - ""
          - " Acme admin:     {{ seed_system_users_state.acme_admin.email }}"
          - " Acme password:  {{ seed_system_users_state.acme_admin.password_credstore_path }}"
          - " Acme user:      {{ seed_system_users_state.acme_user.email }}"
          - " User password:  {{ seed_system_users_state.acme_user.password_credstore_path }}"
          - " Acme APIs:      {{ seed_system_machine_users_state.acme_admin.username }}, {{ seed_system_machine_users_state.acme_member.username }}"
          - ""
          - " Platform org:   {{ seed_system_orgs.platform.organization_id | default('(run with --tags identity)') }}"
          - " Acme org:       {{ seed_system_orgs.acme.organization_id | default('(run with --tags identity)') }}"
          - " Platform credits: {{ ((seed_system_billing_results | default({})).platform | default({})).prepaid_after | default('(run with --tags billing)') }}"
          - " Acme credits:     {{ ((seed_system_billing_results | default({})).acme | default({})).prepaid_after | default('(run with --tags billing)') }}"
          - ""
          - " Note: users still have a single home org in runtime/auth paths today. Multi-org membership and org switching remain future work."
          - "============================================"
