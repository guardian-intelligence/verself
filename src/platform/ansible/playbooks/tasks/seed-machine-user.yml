---
- name: List users for seeded machine user
  ansible.builtin.uri:
    url: "{{ seed_system_zitadel_base_url }}/v2/users"
    method: POST
    headers:
      Authorization: "Bearer {{ seed_system_admin_pat }}"
      Host: "{{ seed_system_zitadel_host }}"
    body_format: json
    body: {}
    return_content: true
    status_code: 200
  register: seed_system_machine_user_search
  no_log: true
  tags: [identity]

- name: Set seeded machine user fact
  ansible.builtin.set_fact:
    seed_system_existing_machine_user: >-
      {{
        (
          seed_system_machine_user_search.json.result | default([])
          | selectattr('username', 'equalto', seed_system_machine_user.username)
          | list
          | first
        ) | default({})
      }}
  tags: [identity]

- name: Assert existing machine user belongs to expected organization
  ansible.builtin.assert:
    that:
      - seed_system_existing_machine_user.details.resourceOwner | default('') == seed_system_orgs[seed_system_machine_user.org_key].organization_id
    fail_msg: >-
      Machine user {{ seed_system_machine_user.username }} already exists in
      organization {{ seed_system_existing_machine_user.details.resourceOwner | default('(unknown)') }}
      but seed-system expects organization
      {{ seed_system_orgs[seed_system_machine_user.org_key].organization_id }}.
  when: seed_system_existing_machine_user.userId is defined
  tags: [identity]

- name: Check stored seeded machine user secret
  ansible.builtin.stat:
    path: "{{ seed_system_machine_user.secret_credstore_path }}"
  register: seed_system_machine_user_secret_file
  no_log: true
  tags: [identity]

- name: Create seeded machine user
  ansible.builtin.uri:
    url: "{{ seed_system_zitadel_base_url }}/v2/users/new"
    method: POST
    headers:
      Authorization: "Bearer {{ seed_system_admin_pat }}"
      Host: "{{ seed_system_zitadel_host }}"
    body_format: json
    body:
      organizationId: "{{ seed_system_orgs[seed_system_machine_user.org_key].organization_id }}"
      username: "{{ seed_system_machine_user.username }}"
      machine:
        name: "{{ seed_system_machine_user.name }}"
        accessTokenType: ACCESS_TOKEN_TYPE_JWT
    status_code: [200, 201]
    return_content: true
  register: seed_system_machine_user_created
  when: seed_system_existing_machine_user.userId is not defined
  no_log: true
  tags: [identity]

- name: Record seeded machine user ID fact
  ansible.builtin.set_fact:
    seed_system_machine_user_id: >-
      {{
        seed_system_existing_machine_user.userId
        | default(seed_system_machine_user_created.json.id, true)
        | default(seed_system_machine_user_created.json.userId, true)
      }}
  no_log: true
  tags: [identity]

- name: Assert seeded machine user ID is set
  ansible.builtin.assert:
    that:
      - seed_system_machine_user_id | default('', true) | length > 0
    fail_msg: "Machine user {{ seed_system_machine_user.username }} did not return a Zitadel user ID."
  tags: [identity]

- name: Create seeded machine user secret when needed
  ansible.builtin.uri:
    url: "{{ seed_system_zitadel_base_url }}/v2/users/{{ seed_system_machine_user_id }}/secret"
    method: POST
    headers:
      Authorization: "Bearer {{ seed_system_admin_pat }}"
      Host: "{{ seed_system_zitadel_host }}"
    status_code: 200
    return_content: true
  register: seed_system_machine_user_secret
  when:
    - seed_system_existing_machine_user.userId is not defined or not seed_system_machine_user_secret_file.stat.exists
  no_log: true
  tags: [identity]

- name: Persist seeded machine user secret
  ansible.builtin.copy:
    content: "{{ seed_system_machine_user_secret.json.clientSecret }}"
    dest: "{{ seed_system_machine_user.secret_credstore_path }}"
    owner: root
    group: root
    mode: "0600"
  when:
    - seed_system_machine_user_secret is defined
    - not (seed_system_machine_user_secret.skipped | default(false))
  no_log: true
  tags: [identity]

- name: Record seeded machine user state
  ansible.builtin.set_fact:
    seed_system_machine_users_state: >-
      {{
        seed_system_machine_users_state | default({})
        | combine({
            seed_system_machine_user.key: {
              'user_id': seed_system_machine_user_id,
              'username': seed_system_machine_user.username,
              'org_key': seed_system_machine_user.org_key,
              'secret_credstore_path': seed_system_machine_user.secret_credstore_path
            }
          }, recursive=True)
      }}
  no_log: true
  tags: [identity]
