- name: Seed billing for {{ seed_demo_billing_target.org_name }}
  ansible.builtin.command:
    argv:
      - "{{ seed_demo_helper_remote_path }}"
      - --pg-dsn-file
      - /etc/credstore/billing/pg-dsn
      - --tb-address
      - "{{ services.tigerbeetle.host }}:{{ services.tigerbeetle.port }}"
      - --tb-cluster-id
      - "{{ billing_service_tigerbeetle_cluster_id | default(0, true) | string }}"
      - --org-id
      - "{{ seed_demo_billing_target.org_id }}"
      - --org-name
      - "{{ seed_demo_billing_target.org_name }}"
      - --org-trust-tier
      - "{{ seed_demo_billing_target.org_trust_tier }}"
      - --product-id
      - "{{ seed_demo_product_id }}"
      - --product-display-name
      - "{{ seed_demo_product_display_name }}"
      - --meter-unit
      - "{{ seed_demo_meter_unit }}"
      - --billing-model
      - "{{ seed_demo_billing_model }}"
      - --plan-id
      - "{{ seed_demo_plan_id }}"
      - --plan-display-name
      - "{{ seed_demo_plan_display_name }}"
      - --unit-rates-json
      - "{{ seed_demo_unit_rates | to_json }}"
      - --overage-unit-rates-json
      - "{{ seed_demo_overage_unit_rates | to_json }}"
      - --quotas-json
      - "{{ seed_demo_quotas | to_json }}"
      - --target-prepaid-units
      - "{{ seed_demo_billing_target.prepaid_units | string }}"
      - --prepaid-source
      - "{{ seed_demo_prepaid_source }}"
      - --promotion-name
      - "{{ seed_demo_billing_target.promotion_name }}"
      - --promotion-percent
      - "{{ seed_demo_billing_target.promotion_percent | string }}"
      - --expires-after
      - "{{ seed_demo_expires_after }}"
  register: seed_demo_billing_target_result_raw
  changed_when: (seed_demo_billing_target_result_raw.stdout | from_json).deposited_units | int > 0

- name: Accumulate billing seed results
  ansible.builtin.set_fact:
    seed_demo_billing_results: >-
      {{
        (seed_demo_billing_results | default({}))
        | combine({seed_demo_billing_target.key: (seed_demo_billing_target_result_raw.stdout | from_json)})
      }}
