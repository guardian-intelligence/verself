---
- name: Search for existing seeded user
  ansible.builtin.uri:
    url: "{{ seed_system_zitadel_base_url }}/v2/users"
    method: POST
    headers:
      Authorization: "Bearer {{ seed_system_admin_pat }}"
      Host: "{{ seed_system_zitadel_host }}"
    body_format: json
    body:
      queries:
        - emailQuery:
            emailAddress: "{{ seed_system_user.email }}"
    return_content: true
  register: seed_system_user_search
  tags: [identity]

- name: Set seeded user fact
  ansible.builtin.set_fact:
    seed_system_existing_user: >-
      {{
        (seed_system_user_search.json.result | default([]) | first) | default({})
      }}
  tags: [identity]

- name: Assert existing user belongs to expected organization
  ansible.builtin.assert:
    that:
      - seed_system_existing_user.details.resourceOwner | default('') == seed_system_orgs[seed_system_user.org_key].organization_id
    fail_msg: >-
      User {{ seed_system_user.email }} already exists in organization
      {{ seed_system_existing_user.details.resourceOwner | default('(unknown)') }}
      but seed-system expects organization
      {{ seed_system_orgs[seed_system_user.org_key].organization_id }}.
  when: seed_system_existing_user.userId is defined
  tags: [identity]

- name: Check stored seeded user password
  ansible.builtin.stat:
    path: "{{ seed_system_user.password_credstore_path }}"
  register: seed_system_user_password_file
  no_log: true
  tags: [identity]

- name: Read stored seeded user password
  ansible.builtin.slurp:
    src: "{{ seed_system_user.password_credstore_path }}"
  register: seed_system_user_password_raw
  when: seed_system_user_password_file.stat.exists
  no_log: true
  tags: [identity]

- name: Assert password source exists for existing seeded user
  ansible.builtin.assert:
    that:
      - seed_system_user_password_file.stat.exists or ((seed_system_password_overrides[seed_system_user.key] | default('', true)) | trim | length > 0)
    fail_msg: >-
      Seeded user {{ seed_system_user.email }} already exists but
      {{ seed_system_user.password_credstore_path }} is missing. Re-run with
      -e seed_system_password_overrides='{"{{ seed_system_user.key }}":"..."}'
      to bootstrap the stored password file, or restore the credstore file.
  when: seed_system_existing_user.userId is defined
  tags: [identity]

- name: Assert provided seeded password matches stored password
  ansible.builtin.assert:
    that:
      - ((seed_system_password_overrides[seed_system_user.key] | default('', true)) | trim) == (seed_system_user_password_raw.content | b64decode | trim)
    fail_msg: >-
      Provided password override for {{ seed_system_user.email }} does not match
      {{ seed_system_user.password_credstore_path }}.
  when:
    - seed_system_existing_user.userId is defined
    - seed_system_user_password_file.stat.exists
    - ((seed_system_password_overrides[seed_system_user.key] | default('', true)) | trim | length) > 0
  no_log: true
  tags: [identity]

- name: Generate seeded user password
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import secrets, string
        alphabet = string.ascii_letters + string.digits + "!@#$%^&*()-_=+"
        while True:
            password = "".join(secrets.choice(alphabet) for _ in range(24))
            if (
                any(c.islower() for c in password)
                and any(c.isupper() for c in password)
                and any(c.isdigit() for c in password)
                and any(c in "!@#$%^&*()-_=+" for c in password)
            ):
                print(password)
                break
  register: seed_system_generated_user_password
  changed_when: false
  delegate_to: localhost
  become: false
  when:
    - seed_system_existing_user.userId is not defined
    - ((seed_system_password_overrides[seed_system_user.key] | default('', true)) | trim | length) == 0
    - not seed_system_user_password_file.stat.exists
  no_log: true
  tags: [identity]

- name: Set effective seeded user password
  ansible.builtin.set_fact:
    seed_system_effective_user_password: >-
      {{
        (
          seed_system_password_overrides[seed_system_user.key] | default('', true) | trim
        )
        if ((seed_system_password_overrides[seed_system_user.key] | default('', true)) | trim | length > 0)
        else (
          (seed_system_user_password_raw.content | b64decode | trim)
          if (seed_system_user_password_file.stat.exists)
          else (seed_system_generated_user_password.stdout | trim)
        )
      }}
  no_log: true
  tags: [identity]

- name: Persist seeded user password
  ansible.builtin.copy:
    content: "{{ seed_system_effective_user_password }}"
    dest: "{{ seed_system_user.password_credstore_path }}"
    owner: root
    group: root
    mode: "0600"
  when:
    - seed_system_existing_user.userId is not defined or not seed_system_user_password_file.stat.exists
  no_log: true
  tags: [identity]

- name: Create seeded human user
  ansible.builtin.uri:
    url: "{{ seed_system_zitadel_base_url }}/v2/users/new"
    method: POST
    headers:
      Authorization: "Bearer {{ seed_system_admin_pat }}"
      Host: "{{ seed_system_zitadel_host }}"
    body_format: json
    body:
      organizationId: "{{ seed_system_orgs[seed_system_user.org_key].organization_id }}"
      username: "{{ seed_system_user.username }}"
      human:
        profile:
          givenName: "{{ seed_system_user.first_name }}"
          familyName: "{{ seed_system_user.last_name }}"
        email:
          email: "{{ seed_system_user.email }}"
          isVerified: true
        password:
          password: "{{ seed_system_effective_user_password }}"
          changeRequired: false
    status_code: [200, 201]
    return_content: true
  register: seed_system_user_created
  when: seed_system_existing_user.userId is not defined
  no_log: true
  tags: [identity]

- name: Record seeded user state
  ansible.builtin.set_fact:
    seed_system_users_state: >-
      {{
        seed_system_users_state | default({})
        | combine({
            seed_system_user.key: {
              'user_id': seed_system_user_created.json.id | default(seed_system_existing_user.userId),
              'email': seed_system_user.email,
              'username': seed_system_user.username,
              'org_key': seed_system_user.org_key,
              'password_credstore_path': seed_system_user.password_credstore_path
            }
          }, recursive=True)
      }}
    seed_system_user_passwords: >-
      {{
        seed_system_user_passwords | default({})
        | combine({ seed_system_user.key: seed_system_effective_user_password }, recursive=True)
      }}
  no_log: true
  tags: [identity]
