- name: Search for existing seeded user
  ansible.builtin.uri:
    url: "{{ seed_demo_zitadel_base_url }}/v2/users"
    method: POST
    headers:
      Authorization: "Bearer {{ seed_demo_admin_pat }}"
      Host: "{{ seed_demo_zitadel_host }}"
    body_format: json
    body:
      queries:
        - emailQuery:
            emailAddress: "{{ seed_demo_identity.email }}"
    return_content: true
  register: seed_demo_identity_search
  no_log: true

- name: Set existing seeded user fact
  ansible.builtin.set_fact:
    seed_demo_existing_identity_user: >-
      {{
        (seed_demo_identity_search.json.result | default([]) | first) | default({})
      }}

- name: Ensure password credstore directory exists
  ansible.builtin.file:
    path: "{{ seed_demo_identity.password_credstore_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Check stored seeded user password
  ansible.builtin.stat:
    path: "{{ seed_demo_identity.password_credstore_path }}"
  register: seed_demo_identity_password_file
  no_log: true

- name: Read stored seeded user password
  ansible.builtin.slurp:
    src: "{{ seed_demo_identity.password_credstore_path }}"
  register: seed_demo_identity_password_raw
  when: seed_demo_identity_password_file.stat.exists
  no_log: true

- name: Resolve explicit seeded user password override
  ansible.builtin.set_fact:
    seed_demo_identity_explicit_password: >-
      {{
        lookup('vars', seed_demo_identity.password_var, default='') | trim
      }}
    seed_demo_identity_default_password: >-
      {{
        (
          lookup('vars', seed_demo_identity.default_password_var, default='') | trim
        )
        if (seed_demo_identity.default_password_var | default('', true) | length > 0)
        else ''
      }}
  no_log: true

- name: Assert password source exists for existing seeded user
  ansible.builtin.assert:
    that:
      - >-
        seed_demo_identity_password_file.stat.exists
        or (seed_demo_identity_explicit_password | length > 0)
        or (seed_demo_identity_default_password | length > 0)
    fail_msg: >-
      Seeded user {{ seed_demo_identity.email }} already exists but
      {{ seed_demo_identity.password_credstore_path }} is missing and no
      explicit/default password source is available.
  when: seed_demo_existing_identity_user.userId is defined

- name: Assert provided seeded password matches stored password
  ansible.builtin.assert:
    that:
      - seed_demo_identity_explicit_password == (seed_demo_identity_password_raw.content | b64decode | trim)
    fail_msg: >-
      Provided {{ seed_demo_identity.password_var }} does not match the stored
      password in {{ seed_demo_identity.password_credstore_path }} for user
      {{ seed_demo_identity.email }}.
  when:
    - seed_demo_existing_identity_user.userId is defined
    - seed_demo_identity_password_file.stat.exists
    - seed_demo_identity_explicit_password | length > 0
  no_log: true

- name: Generate seeded user password
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import secrets, string
        alphabet = string.ascii_letters + string.digits + "!@#$%^&*()-_=+"
        while True:
            password = "".join(secrets.choice(alphabet) for _ in range(24))
            if (
                any(c.islower() for c in password)
                and any(c.isupper() for c in password)
                and any(c.isdigit() for c in password)
                and any(c in "!@#$%^&*()-_=+" for c in password)
            ):
                print(password)
                break
  register: seed_demo_generated_identity_password
  changed_when: false
  delegate_to: localhost
  become: false
  when:
    - seed_demo_existing_identity_user.userId is not defined
    - seed_demo_identity_explicit_password | length == 0
    - seed_demo_identity_default_password | length == 0
    - not seed_demo_identity_password_file.stat.exists
  no_log: true

- name: Set effective seeded user password
  ansible.builtin.set_fact:
    seed_demo_identity_effective_password: >-
      {{
        seed_demo_identity_explicit_password
        if (seed_demo_identity_explicit_password | length > 0)
        else (
          (seed_demo_identity_password_raw.content | b64decode | trim)
          if (seed_demo_identity_password_file.stat.exists)
          else (
            seed_demo_identity_default_password
            if (seed_demo_identity_default_password | length > 0)
            else (seed_demo_generated_identity_password.stdout | trim)
          )
        )
      }}
  no_log: true

- name: Persist seeded user password
  ansible.builtin.copy:
    content: "{{ seed_demo_identity_effective_password }}"
    dest: "{{ seed_demo_identity.password_credstore_path }}"
    owner: root
    group: root
    mode: "0600"
  when:
    - seed_demo_existing_identity_user.userId is not defined or not seed_demo_identity_password_file.stat.exists
  no_log: true

- name: Create seeded human user
  ansible.builtin.uri:
    url: "{{ seed_demo_zitadel_base_url }}/v2/users/new"
    method: POST
    headers:
      Authorization: "Bearer {{ seed_demo_admin_pat }}"
      Host: "{{ seed_demo_zitadel_host }}"
    body_format: json
    body:
      organizationId: "{{ seed_demo_identity.organization_id }}"
      username: "{{ seed_demo_identity.username }}"
      human:
        profile:
          givenName: "{{ seed_demo_identity.first_name }}"
          familyName: "{{ seed_demo_identity.last_name }}"
        email:
          email: "{{ seed_demo_identity.email }}"
          isVerified: true
        password:
          password: "{{ seed_demo_identity_effective_password }}"
          changeRequired: false
    status_code: [200, 201]
    return_content: true
  register: seed_demo_identity_created
  when: seed_demo_existing_identity_user.userId is not defined
  no_log: true

- name: Set seeded user ID fact
  ansible.builtin.set_fact:
    seed_demo_identity_user_id: >-
      {{
        seed_demo_identity_created.json.id
        | default(seed_demo_existing_identity_user.userId, true)
      }}

- name: Read seeded user details
  ansible.builtin.uri:
    url: "{{ seed_demo_zitadel_base_url }}/management/v1/users/{{ seed_demo_identity_user_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ seed_demo_admin_pat }}"
      Host: "{{ seed_demo_zitadel_host }}"
    return_content: true
  register: seed_demo_identity_details
  no_log: true

- name: Accumulate seeded user facts
  ansible.builtin.set_fact:
    seed_demo_seeded_users: >-
      {{
        (seed_demo_seeded_users | default([]))
        + [
          {
            "key": seed_demo_identity.key,
            "email": seed_demo_identity.email,
            "username": seed_demo_identity.username,
            "first_name": seed_demo_identity.first_name,
            "last_name": seed_demo_identity.last_name,
            "user_id": seed_demo_identity_user_id,
            "org_id": seed_demo_identity_details.json.user.details.resourceOwner,
            "org_name": seed_demo_identity.org_name,
            "password_credstore_path": seed_demo_identity.password_credstore_path,
            "project_roles": seed_demo_identity.project_roles | default({}),
            "mailbox_account": seed_demo_identity.mailbox_account | default(''),
            "display_name": seed_demo_identity.display_name | default(seed_demo_identity.email)
          }
        ]
      }}
