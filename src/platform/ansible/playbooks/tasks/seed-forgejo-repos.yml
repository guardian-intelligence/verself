---
# Seed the forge-metal repository on Forgejo and configure controller access.
#
# Requires:
#   - Forgejo running and automation user promoted to admin
#   - seed_forgejo_owner: Forgejo username to own the repo
#   - seed_forgejo_controller_ssh_pubkey_path: path to SSH public key on controller
#   - seed_forgejo_repo_local_path: local path to the git repo on controller
#
# Expects these facts to already be set by the caller:
#   - seed_forgejo_automation_token (read from credstore)
#   - seed_forgejo_admin_pat
#   - seed_forgejo_platform_org_id
#   - seed_forgejo_sandbox_project_id
#   - seed_forgejo_zitadel_base_url
#   - seed_forgejo_zitadel_host

- name: Read controller SSH public key
  ansible.builtin.slurp:
    src: "{{ seed_forgejo_controller_ssh_pubkey_path }}"
  delegate_to: localhost
  become: false
  register: seed_forgejo_ssh_pubkey_raw

- name: Set SSH public key fact
  ansible.builtin.set_fact:
    seed_forgejo_ssh_pubkey: "{{ seed_forgejo_ssh_pubkey_raw.content | b64decode | trim }}"

# --- SSH key registration (idempotent) ---

- name: List SSH keys on owner account
  ansible.builtin.uri:
    url: "http://{{ services.forgejo.host }}:{{ services.forgejo.port }}/api/v1/users/{{ seed_forgejo_owner }}/keys"
    method: GET
    headers:
      Authorization: "token {{ seed_forgejo_automation_token }}"
    status_code: [200]
  register: seed_forgejo_existing_keys

- name: Check if controller key already registered
  ansible.builtin.set_fact:
    seed_forgejo_key_exists: >-
      {{
        seed_forgejo_existing_keys.json
        | selectattr('key', 'equalto', seed_forgejo_ssh_pubkey)
        | list
        | length > 0
      }}

- name: Register controller SSH key on owner account
  ansible.builtin.uri:
    url: "http://{{ services.forgejo.host }}:{{ services.forgejo.port }}/api/v1/admin/users/{{ seed_forgejo_owner }}/keys"
    method: POST
    headers:
      Authorization: "token {{ seed_forgejo_automation_token }}"
      Content-Type: application/json
    body_format: json
    body:
      title: "controller-{{ inventory_hostname }}"
      key: "{{ seed_forgejo_ssh_pubkey }}"
    status_code: [201]
  when: not seed_forgejo_key_exists
  register: seed_forgejo_key_created

# --- Repository creation (idempotent) ---

- name: Check if forge-metal repo exists
  ansible.builtin.uri:
    url: "http://{{ services.forgejo.host }}:{{ services.forgejo.port }}/api/v1/repos/{{ seed_forgejo_owner }}/forge-metal"
    method: GET
    headers:
      Authorization: "token {{ seed_forgejo_automation_token }}"
    status_code: [200, 404]
  register: seed_forgejo_repo_check

- name: Create forge-metal repo under owner
  ansible.builtin.uri:
    url: "http://{{ services.forgejo.host }}:{{ services.forgejo.port }}/api/v1/admin/users/{{ seed_forgejo_owner }}/repos"
    method: POST
    headers:
      Authorization: "token {{ seed_forgejo_automation_token }}"
      Content-Type: application/json
    body_format: json
    body:
      name: forge-metal
      auto_init: false
      default_branch: main
      description: "Self-hosted bare-metal platform"
      private: false
    status_code: [201]
  when: seed_forgejo_repo_check.status == 404

# --- Sandbox webhook endpoint + Forgejo hook (idempotent) ---

- name: Assert Forgejo webhook seed inputs
  ansible.builtin.assert:
    that:
      - seed_forgejo_admin_pat | default('', true) | length > 0
      - seed_forgejo_platform_org_id | default('', true) | length > 0
      - seed_forgejo_sandbox_project_id | default('', true) | length > 0
      - seed_forgejo_zitadel_base_url | default('', true) | length > 0
      - seed_forgejo_zitadel_host | default('', true) | length > 0
    fail_msg: "Forgejo webhook seeding requires sandbox-rental Zitadel and platform org facts."

- name: Set Forgejo webhook seed facts
  ansible.builtin.set_fact:
    seed_forgejo_provider_host: "git.{{ forge_metal_domain }}"
    seed_forgejo_webhook_label: "platform-forgejo-{{ seed_forgejo_owner }}-forge-metal"
    seed_forgejo_sandbox_base_url: "http://{{ services.sandbox_rental.host }}:{{ services.sandbox_rental.port }}"
    seed_forgejo_repo_api_url: "http://{{ services.forgejo.host }}:{{ services.forgejo.port }}/api/v1/repos/{{ seed_forgejo_owner }}/forge-metal"
    seed_forgejo_webhook_events:
      - push
      - pull_request
    seed_forgejo_webhook_secret: ""
    seed_forgejo_hook_changed: false

- name: Configure sandbox-rental endpoint for Forgejo
  block:
    - name: Set webhook seed machine username
      ansible.builtin.set_fact:
        seed_forgejo_webhook_machine_username: "seed-forgejo-webhook-{{ inventory_hostname }}-{{ lookup('pipe', 'date -u +%Y%m%d%H%M%S') }}"

    - name: Create temporary sandbox-rental webhook seed user
      ansible.builtin.uri:
        url: "{{ seed_forgejo_zitadel_base_url }}/v2/users/new"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_forgejo_admin_pat }}"
          Host: "{{ seed_forgejo_zitadel_host }}"
        body_format: json
        body:
          organizationId: "{{ seed_forgejo_platform_org_id }}"
          username: "{{ seed_forgejo_webhook_machine_username }}"
          machine:
            name: "seed forgejo webhook {{ inventory_hostname }}"
            accessTokenType: ACCESS_TOKEN_TYPE_JWT
        return_content: true
        status_code: [200, 201]
      register: seed_forgejo_webhook_user
      no_log: true

    - name: Set temporary sandbox-rental webhook seed user ID
      ansible.builtin.set_fact:
        seed_forgejo_webhook_user_id: "{{ seed_forgejo_webhook_user.json.id | default(seed_forgejo_webhook_user.json.userId) }}"
      no_log: true

    - name: Create temporary sandbox-rental webhook seed user secret
      ansible.builtin.uri:
        url: "{{ seed_forgejo_zitadel_base_url }}/v2/users/{{ seed_forgejo_webhook_user_id }}/secret"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_forgejo_admin_pat }}"
          Host: "{{ seed_forgejo_zitadel_host }}"
        status_code: 200
        return_content: true
      register: seed_forgejo_webhook_user_secret
      no_log: true

    - name: Grant temporary webhook seed user access to sandbox-rental project
      ansible.builtin.uri:
        url: "{{ seed_forgejo_zitadel_base_url }}/zitadel.authorization.v2.AuthorizationService/CreateAuthorization"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_forgejo_admin_pat }}"
          Host: "{{ seed_forgejo_zitadel_host }}"
          Connect-Protocol-Version: "1"
        body_format: json
        body:
          userId: "{{ seed_forgejo_webhook_user_id }}"
          projectId: "{{ seed_forgejo_sandbox_project_id }}"
          organizationId: "{{ seed_forgejo_platform_org_id }}"
          roleKeys:
            - sandbox_org_admin
        status_code: 200
      no_log: true

    - name: Request temporary sandbox-rental webhook seed token
      ansible.builtin.uri:
        url: "{{ seed_forgejo_zitadel_base_url }}/oauth/v2/token"
        method: POST
        headers:
          Host: "{{ seed_forgejo_zitadel_host }}"
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          scope: >-
            openid profile
            urn:zitadel:iam:user:resourceowner
            urn:zitadel:iam:org:project:id:{{ seed_forgejo_sandbox_project_id }}:aud
        url_username: "{{ seed_forgejo_webhook_machine_username }}"
        url_password: "{{ seed_forgejo_webhook_user_secret.json.clientSecret }}"
        force_basic_auth: true
        return_content: true
        status_code: 200
      register: seed_forgejo_webhook_token
      no_log: true

    - name: Wait for sandbox-rental-service before webhook endpoint setup
      ansible.builtin.wait_for:
        host: "{{ services.sandbox_rental.host }}"
        port: "{{ services.sandbox_rental.port }}"
        timeout: 60

    - name: List sandbox-rental webhook endpoints
      ansible.builtin.uri:
        url: "{{ seed_forgejo_sandbox_base_url }}/api/v1/webhook-endpoints"
        method: GET
        headers:
          Authorization: "Bearer {{ seed_forgejo_webhook_token.json.access_token }}"
        return_content: true
        status_code: 200
      register: seed_forgejo_webhook_endpoints
      no_log: true

    - name: Select sandbox-rental Forgejo webhook endpoint
      ansible.builtin.set_fact:
        seed_forgejo_matching_webhook_endpoints: >-
          {{
            seed_forgejo_webhook_endpoints.json
            | default([])
            | selectattr('provider', 'equalto', 'forgejo')
            | selectattr('provider_host', 'equalto', seed_forgejo_provider_host)
            | selectattr('label', 'equalto', seed_forgejo_webhook_label)
            | list
          }}
        seed_forgejo_active_webhook_endpoint: >-
          {{
            seed_forgejo_webhook_endpoints.json
            | default([])
            | selectattr('provider', 'equalto', 'forgejo')
            | selectattr('provider_host', 'equalto', seed_forgejo_provider_host)
            | selectattr('label', 'equalto', seed_forgejo_webhook_label)
            | selectattr('active', 'equalto', true)
            | list
            | first
            | default({})
          }}

    - name: Fail on inactive Forgejo webhook endpoint label conflict
      ansible.builtin.assert:
        that:
          - seed_forgejo_matching_webhook_endpoints | selectattr('active', 'equalto', true) | list | length > 0
          - seed_forgejo_matching_webhook_endpoints | rejectattr('active', 'equalto', true) | list | length == 0
        fail_msg: >-
          Found inactive sandbox-rental webhook endpoint with label
          {{ seed_forgejo_webhook_label }}. Delete the stale row or use a new label.
      when:
        - seed_forgejo_active_webhook_endpoint == {}
        - seed_forgejo_matching_webhook_endpoints | length > 0

    - name: Create sandbox-rental Forgejo webhook endpoint
      ansible.builtin.uri:
        url: "{{ seed_forgejo_sandbox_base_url }}/api/v1/webhook-endpoints"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_forgejo_webhook_token.json.access_token }}"
          Idempotency-Key: "seed-forgejo-webhook-create-{{ seed_forgejo_webhook_label }}"
        body_format: json
        body:
          provider: forgejo
          provider_host: "{{ seed_forgejo_provider_host }}"
          label: "{{ seed_forgejo_webhook_label }}"
        return_content: true
        status_code: 201
      register: seed_forgejo_webhook_endpoint_create
      when: seed_forgejo_active_webhook_endpoint == {}
      no_log: true

    - name: Use existing sandbox-rental Forgejo webhook endpoint
      ansible.builtin.set_fact:
        seed_forgejo_webhook_endpoint: "{{ seed_forgejo_active_webhook_endpoint }}"
      when: seed_forgejo_active_webhook_endpoint != {}

    - name: Use newly created sandbox-rental Forgejo webhook endpoint
      ansible.builtin.set_fact:
        seed_forgejo_webhook_endpoint: "{{ seed_forgejo_webhook_endpoint_create.json }}"
        seed_forgejo_webhook_secret: "{{ seed_forgejo_webhook_endpoint_create.json.secret }}"
      when: seed_forgejo_active_webhook_endpoint == {}
      no_log: true

    - name: Set Forgejo webhook target URL
      ansible.builtin.set_fact:
        seed_forgejo_webhook_url: "{{ seed_forgejo_sandbox_base_url }}/webhooks/ingest/{{ seed_forgejo_webhook_endpoint.endpoint_id }}"
        seed_forgejo_webhook_delivery_count_before: "{{ seed_forgejo_webhook_endpoint.delivery_count | default(0) | int }}"

    - name: List Forgejo repo webhooks
      ansible.builtin.uri:
        url: "http://{{ services.forgejo.host }}:{{ services.forgejo.port }}/api/v1/repos/{{ seed_forgejo_owner }}/forge-metal/hooks"
        method: GET
        headers:
          Authorization: "token {{ seed_forgejo_automation_token }}"
        return_content: true
        status_code: 200
      register: seed_forgejo_existing_hooks
      no_log: true

    - name: Select Forgejo repo webhook
      ansible.builtin.set_fact:
        seed_forgejo_webhook_hook: >-
          {{
            seed_forgejo_existing_hooks.json
            | default([])
            | selectattr('url', 'equalto', seed_forgejo_webhook_url)
            | list
            | first
            | default({})
          }}

    - name: Set Forgejo webhook reconcile decision
      ansible.builtin.set_fact:
        seed_forgejo_webhook_hook_needs_reconcile: >-
          {{
            seed_forgejo_webhook_hook == {}
            or not (seed_forgejo_webhook_hook.active | default(false) | bool)
            or ('push' not in (seed_forgejo_webhook_hook.events | default([])))
            or ('pull_request' not in (seed_forgejo_webhook_hook.events | default([])))
          }}

    - name: Rotate sandbox-rental webhook secret for Forgejo hook reconciliation
      ansible.builtin.uri:
        url: "{{ seed_forgejo_sandbox_base_url }}/api/v1/webhook-endpoints/{{ seed_forgejo_webhook_endpoint.endpoint_id }}/rotate"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_forgejo_webhook_token.json.access_token }}"
          Idempotency-Key: "seed-forgejo-webhook-rotate-{{ seed_forgejo_webhook_endpoint.endpoint_id }}"
        return_content: true
        status_code: 200
      register: seed_forgejo_webhook_secret_rotate
      when:
        - seed_forgejo_webhook_hook_needs_reconcile | bool
        - seed_forgejo_webhook_secret | length == 0
      no_log: true

    - name: Use rotated sandbox-rental webhook secret
      ansible.builtin.set_fact:
        seed_forgejo_webhook_secret: "{{ seed_forgejo_webhook_secret_rotate.json.secret }}"
      when:
        - seed_forgejo_webhook_secret_rotate is defined
        - not (seed_forgejo_webhook_secret_rotate.skipped | default(false))
      no_log: true

    - name: Create Forgejo repo webhook
      ansible.builtin.uri:
        url: "http://{{ services.forgejo.host }}:{{ services.forgejo.port }}/api/v1/repos/{{ seed_forgejo_owner }}/forge-metal/hooks"
        method: POST
        headers:
          Authorization: "token {{ seed_forgejo_automation_token }}"
        body_format: json
        body:
          type: forgejo
          active: true
          events: "{{ seed_forgejo_webhook_events }}"
          config:
            url: "{{ seed_forgejo_webhook_url }}"
            content_type: json
            secret: "{{ seed_forgejo_webhook_secret }}"
        return_content: true
        status_code: 201
      register: seed_forgejo_webhook_hook_create
      when:
        - seed_forgejo_webhook_hook == {}
        - seed_forgejo_webhook_hook_needs_reconcile | bool
      no_log: true

    - name: Update Forgejo repo webhook
      ansible.builtin.uri:
        url: "{{ seed_forgejo_repo_api_url }}/hooks/{{ seed_forgejo_webhook_hook.id }}"
        method: PATCH
        headers:
          Authorization: "token {{ seed_forgejo_automation_token }}"
        body_format: json
        body:
          active: true
          events: "{{ seed_forgejo_webhook_events }}"
          config:
            url: "{{ seed_forgejo_webhook_url }}"
            content_type: json
            secret: "{{ seed_forgejo_webhook_secret }}"
        return_content: true
        status_code: 200
      register: seed_forgejo_webhook_hook_update
      when:
        - seed_forgejo_webhook_hook != {}
        - seed_forgejo_webhook_hook_needs_reconcile | bool
      no_log: true

    - name: Mark Forgejo repo webhook as changed after create
      ansible.builtin.set_fact:
        seed_forgejo_hook_changed: true
      when:
        - seed_forgejo_webhook_hook_create is defined
        - not (seed_forgejo_webhook_hook_create.skipped | default(false))

    - name: Mark Forgejo repo webhook as changed after update
      ansible.builtin.set_fact:
        seed_forgejo_hook_changed: true
      when:
        - seed_forgejo_webhook_hook_update is defined
        - not (seed_forgejo_webhook_hook_update.skipped | default(false))

    - name: Re-query Forgejo repo webhooks after reconciliation
      ansible.builtin.uri:
        url: "http://{{ services.forgejo.host }}:{{ services.forgejo.port }}/api/v1/repos/{{ seed_forgejo_owner }}/forge-metal/hooks"
        method: GET
        headers:
          Authorization: "token {{ seed_forgejo_automation_token }}"
        return_content: true
        status_code: 200
      register: seed_forgejo_existing_hooks_reconciled
      when: seed_forgejo_webhook_hook_needs_reconcile | bool
      no_log: true

    - name: Select final Forgejo repo webhook
      ansible.builtin.set_fact:
        seed_forgejo_webhook_hooks_final: >-
          {{
            (
              seed_forgejo_existing_hooks_reconciled.json
              if (
                seed_forgejo_existing_hooks_reconciled is defined
                and seed_forgejo_existing_hooks_reconciled.json is defined
              )
              else seed_forgejo_existing_hooks.json
            ) | default([])
          }}

    - name: Set final Forgejo repo webhook fact
      ansible.builtin.set_fact:
        seed_forgejo_webhook_hook_final: >-
          {{
            seed_forgejo_webhook_hooks_final
            | selectattr('url', 'equalto', seed_forgejo_webhook_url)
            | list
            | first
            | default({})
          }}

    - name: Assert final Forgejo repo webhook exists
      ansible.builtin.assert:
        that:
          - seed_forgejo_webhook_hook_final.id | default('', true) | string | length > 0
          - seed_forgejo_webhook_hook_final.active | bool
        fail_msg: "Forgejo repo webhook for {{ seed_forgejo_webhook_url }} was not created."

# --- Controller git remote (local) ---

- name: Check if forgejo remote exists on controller  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: git remote get-url forgejo
    chdir: "{{ seed_forgejo_repo_local_path }}"
  delegate_to: localhost
  become: false
  register: seed_forgejo_remote_check
  changed_when: false
  failed_when: false

- name: Set expected Forgejo SSH remote URL
  ansible.builtin.set_fact:
    seed_forgejo_remote_url: "ssh://forgejo@git.{{ forge_metal_domain }}:{{ services.forgejo.ssh_port }}/{{ seed_forgejo_owner }}/forge-metal.git"

- name: Add forgejo remote on controller  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: "git remote add forgejo {{ seed_forgejo_remote_url }}"
    chdir: "{{ seed_forgejo_repo_local_path }}"
  delegate_to: localhost
  become: false
  when: seed_forgejo_remote_check.rc != 0
  changed_when: true

- name: Update forgejo remote URL if changed  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: "git remote set-url forgejo {{ seed_forgejo_remote_url }}"
    chdir: "{{ seed_forgejo_repo_local_path }}"
  delegate_to: localhost
  become: false
  when: seed_forgejo_remote_check.rc == 0 and seed_forgejo_remote_check.stdout | trim != seed_forgejo_remote_url
  changed_when: true

# --- Push (idempotent — fast-forward only) ---

- name: Push forge-metal to Forgejo  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: git push forgejo main
    chdir: "{{ seed_forgejo_repo_local_path }}"
  delegate_to: localhost
  become: false
  register: seed_forgejo_push
  changed_when: "'Everything up-to-date' not in seed_forgejo_push.stderr"
  environment:
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new -p {{ services.forgejo.ssh_port }}"

- name: Test Forgejo repo webhook when seed push is up to date
  ansible.builtin.uri:
    url: "{{ seed_forgejo_repo_api_url }}/hooks/{{ seed_forgejo_webhook_hook_final.id }}/tests?ref=main"
    method: POST
    headers:
      Authorization: "token {{ seed_forgejo_automation_token }}"
    status_code: 204
  when:
    - seed_forgejo_hook_changed | bool
    - "'Everything up-to-date' in (seed_forgejo_push.stderr | default(''))"
  no_log: true

- name: Wait for sandbox-rental webhook delivery from Forgejo seed
  ansible.builtin.uri:
    url: "{{ seed_forgejo_sandbox_base_url }}/api/v1/webhook-endpoints"
    method: GET
    headers:
      Authorization: "Bearer {{ seed_forgejo_webhook_token.json.access_token }}"
    return_content: true
    status_code: 200
  register: seed_forgejo_webhook_endpoint_verify
  until: >-
    {{
      (
        seed_forgejo_webhook_endpoint_verify.json
        | default([])
        | selectattr('endpoint_id', 'equalto', seed_forgejo_webhook_endpoint.endpoint_id)
        | map(attribute='delivery_count')
        | list
        | first
        | default(seed_forgejo_webhook_delivery_count_before)
        | int
      ) > (seed_forgejo_webhook_delivery_count_before | int)
    }}
  retries: 30
  delay: 1
  when: >-
    seed_forgejo_hook_changed | bool
    or ('Everything up-to-date' not in (seed_forgejo_push.stderr | default('')))
  no_log: true

- name: Cleanup temporary sandbox-rental webhook seed user
  ansible.builtin.uri:
    url: "{{ seed_forgejo_zitadel_base_url }}/v2/users/{{ seed_forgejo_webhook_user_id }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ seed_forgejo_admin_pat }}"
      Host: "{{ seed_forgejo_zitadel_host }}"
    status_code: [200, 404]
  when: seed_forgejo_webhook_user_id | default('', true) | length > 0
  no_log: true

- name: Print Forgejo repo seed summary
  ansible.builtin.debug:
    msg:
      - "Forgejo repo: https://git.{{ forge_metal_domain }}/{{ seed_forgejo_owner }}/forge-metal"
      - "SSH remote:   {{ seed_forgejo_remote_url }}"
      - "Webhook:      {{ seed_forgejo_webhook_url }}"
      - "SSH key:      {{ 'registered' if not seed_forgejo_key_exists else 'already present' }}"
      - "Repo:         {{ 'created' if seed_forgejo_repo_check.status == 404 else 'already exists' }}"
      - "Hook:         {{ 'created/updated' if seed_forgejo_hook_changed else 'already present' }}"
      - "Push:         {{ 'up-to-date' if 'Everything up-to-date' in (seed_forgejo_push.stderr | default('')) else 'pushed' }}"
