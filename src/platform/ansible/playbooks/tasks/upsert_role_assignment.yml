- name: Resolve existing role assignment
  ansible.builtin.set_fact:
    zitadel_existing_authorization: >-
      {{
        (
          zitadel_authorizations.json.authorizations | default([])
          | selectattr('user.id', 'equalto', zitadel_authorization.user_id)
          | selectattr('project.id', 'equalto', zitadel_authorization.project_id)
          | selectattr('organization.id', 'equalto', zitadel_authorization.organization_id)
          | list
          | first
        ) | default({})
      }}

- name: Create missing role assignment
  ansible.builtin.uri:
    url: "{{ zitadel_authorization_base_url }}/zitadel.authorization.v2.AuthorizationService/CreateAuthorization"
    method: POST
    headers:
      Authorization: "Bearer {{ zitadel_authorization_admin_pat }}"
      Host: "{{ zitadel_authorization_host }}"
      Connect-Protocol-Version: "1"
    body_format: json
    body:
      userId: "{{ zitadel_authorization.user_id }}"
      projectId: "{{ zitadel_authorization.project_id }}"
      organizationId: "{{ zitadel_authorization.organization_id }}"
      roleKeys: "{{ zitadel_authorization.role_keys }}"
    status_code: 200
  when: zitadel_existing_authorization == {}
  no_log: true

- name: Update changed role assignment
  ansible.builtin.uri:
    url: "{{ zitadel_authorization_base_url }}/zitadel.authorization.v2.AuthorizationService/UpdateAuthorization"
    method: POST
    headers:
      Authorization: "Bearer {{ zitadel_authorization_admin_pat }}"
      Host: "{{ zitadel_authorization_host }}"
      Connect-Protocol-Version: "1"
    body_format: json
    body:
      id: "{{ zitadel_existing_authorization.id }}"
      roleKeys: "{{ zitadel_authorization.role_keys }}"
    status_code: 200
  when:
    - zitadel_existing_authorization != {}
    - >-
      (
        zitadel_existing_authorization.roles | default([])
        | map(attribute='key')
        | sort
      ) != (zitadel_authorization.role_keys | sort)
  no_log: true
