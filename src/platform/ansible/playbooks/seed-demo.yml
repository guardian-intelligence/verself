---
# Seed a complete demo environment for rent-a-sandbox end-to-end testing.
#
# Creates a human test user in Zitadel, grants it access to the sandbox-rental
# project, seeds the billing catalog and prepaid credits, and verifies the
# billing-service auth integration.
#
# Usage:
#   cd src/platform/ansible && ansible-playbook playbooks/seed-demo.yml
#
# Cherry-pick:
#   --tags user        Create/verify demo user only
#   --tags billing     Seed billing catalog + credits only
#   --tags stalwart    Seed Stalwart mailboxes + bindings
#   --tags dev-oidc    Create dev OIDC apps for local frontend development
#   --tags verify      Verify billing auth integration only
#
# Override or set the initial demo user password:
#   -e seed_demo_user_email=alice@example.com -e seed_demo_user_password=MyP@ss1

- name: Seed demo environment
  hosts: infra
  serial: 1
  become: true
  gather_facts: false
  vars:
    # --- Zitadel connection ---
    seed_demo_zitadel_base_url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}"
    seed_demo_zitadel_host: "auth.{{ forge_metal_domain }}"

    # --- Demo user ---
    seed_demo_user_email: "demo@{{ forge_metal_domain }}"
    seed_demo_user_first_name: Demo
    seed_demo_user_last_name: User
    seed_demo_user_username: "demo"
    seed_demo_user_password_credstore_path: /etc/credstore/seed-demo/demo-user-password

    # --- Sandbox-rental project ---
    seed_demo_auth_project_name: "{{ sandbox_rental_service_auth_project_name | default('sandbox-rental') }}"

    # --- Billing catalog ---
    seed_demo_product_id: sandbox
    seed_demo_product_display_name: Sandbox
    seed_demo_meter_unit: vcpu_second
    seed_demo_billing_model: metered
    seed_demo_plan_id: sandbox-default
    seed_demo_plan_display_name: Sandbox PAYG
    seed_demo_unit_rates:
      vcpu: 325
      gib: 40
    seed_demo_overage_unit_rates: {}
    seed_demo_quotas: {}
    seed_demo_platform_org_trust_tier: platform
    seed_demo_prepaid_source: promo
    seed_demo_target_prepaid_units: 1000000000000
    seed_demo_platform_promotion_name: platform-showback
    seed_demo_platform_promotion_percent: 100
    seed_demo_expires_after: 8760h
    seed_demo_sandbox_env_path: /etc/forge-metal/sandbox-rental.env

    # --- Stalwart mailboxes ---
    seed_demo_stalwart_domain: "mail.{{ forge_metal_domain }}"
    seed_demo_stalwart_disabled_permissions:
      - email-send
      - jmap-sieve-script-set
      - jmap-sieve-script-validate
      - sieve-put-script
      - sieve-set-active

    # --- Internal ---
    seed_demo_helper_local_path: "/tmp/billing-seed-{{ inventory_hostname }}"
    seed_demo_helper_remote_path: /tmp/billing-seed
    seed_demo_probe_user_pattern: "^(billing-auth-verify-.*|billing-smoke-.*)$"

  tasks:
    # ── Prerequisites ──────────────────────────────────────────────────────────

    - name: Wait for Zitadel to be ready
      ansible.builtin.wait_for:
        host: "{{ services.zitadel.host }}"
        port: "{{ services.zitadel.port }}"
        timeout: 60
      tags: [user, billing, stalwart, verify, dev-oidc]

    - name: Wait for billing-service to be ready
      ansible.builtin.wait_for:
        host: "{{ services.billing.host }}"
        port: "{{ services.billing.port }}"
        timeout: 60
      tags: [billing, verify]

    - name: Read Zitadel admin PAT
      ansible.builtin.slurp:
        src: /etc/zitadel/admin.pat
      register: seed_demo_admin_pat_raw
      no_log: true
      tags: [user, billing, stalwart, verify, dev-oidc]

    - name: Set Zitadel admin PAT fact
      ansible.builtin.set_fact:
        seed_demo_admin_pat: "{{ seed_demo_admin_pat_raw.content | b64decode | trim }}"
      no_log: true
      tags: [user, billing, stalwart, verify, dev-oidc]

    - name: Find sandbox-rental project
      ansible.builtin.uri:
        url: "{{ seed_demo_zitadel_base_url }}/management/v1/projects/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_demo_admin_pat }}"
          Host: "{{ seed_demo_zitadel_host }}"
        body_format: json
        body:
          queries:
            - nameQuery:
                name: "{{ seed_demo_auth_project_name }}"
                method: TEXT_QUERY_METHOD_EQUALS
        return_content: true
      register: seed_demo_project_search
      no_log: true
      tags: [user, billing, verify, dev-oidc]

    - name: Set project ID fact
      ansible.builtin.set_fact:
        seed_demo_project_id: "{{ seed_demo_project_search.json.result[0].id }}"
      when: seed_demo_project_search.json.result is defined and seed_demo_project_search.json.result | length > 0
      tags: [user, billing, verify, dev-oidc]

    - name: Assert sandbox-rental project exists
      ansible.builtin.assert:
        that: seed_demo_project_id is defined
        fail_msg: "Sandbox-rental Zitadel project '{{ seed_demo_auth_project_name }}' not found. Run the full deploy first."
      tags: [user, billing, verify, dev-oidc]

    # ── Demo user ──────────────────────────────────────────────────────────────

    - name: Search for existing demo user
      ansible.builtin.uri:
        url: "{{ seed_demo_zitadel_base_url }}/v2/users"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_demo_admin_pat }}"
          Host: "{{ seed_demo_zitadel_host }}"
        body_format: json
        body:
          queries:
            - emailQuery:
                emailAddress: "{{ seed_demo_user_email }}"
        return_content: true
      register: seed_demo_user_search
      tags: [user]

    - name: Set existing user fact
      ansible.builtin.set_fact:
        seed_demo_existing_user: >-
          {{
            (seed_demo_user_search.json.result | default([]) | first) | default({})
          }}
      tags: [user]

    - name: Create seed-demo credstore directory
      ansible.builtin.file:
        path: "{{ seed_demo_user_password_credstore_path | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      tags: [user]

    - name: Check stored demo user password
      ansible.builtin.stat:
        path: "{{ seed_demo_user_password_credstore_path }}"
      register: seed_demo_user_password_file
      no_log: true
      tags: [user]

    - name: Read stored demo user password
      ansible.builtin.slurp:
        src: "{{ seed_demo_user_password_credstore_path }}"
      register: seed_demo_user_password_raw
      when: seed_demo_user_password_file.stat.exists
      no_log: true
      tags: [user]

    - name: Assert password source exists for existing demo user
      ansible.builtin.assert:
        that:
          - seed_demo_user_password_file.stat.exists or (seed_demo_user_password | default('', true) | trim | length > 0)
        fail_msg: >-
          Demo user {{ seed_demo_user_email }} already exists but
          {{ seed_demo_user_password_credstore_path }} is missing.
          Re-run with -e seed_demo_user_password=... to bootstrap the stored
          password file, or restore the stored password file.
      when: seed_demo_existing_user.userId is defined
      tags: [user]

    - name: Assert provided demo password matches stored password
      ansible.builtin.assert:
        that:
          - (seed_demo_user_password | default('', true) | trim) == (seed_demo_user_password_raw.content | b64decode | trim)
        fail_msg: >-
          Provided seed_demo_user_password does not match the stored password
          in {{ seed_demo_user_password_credstore_path }} for existing demo user
          {{ seed_demo_user_email }}.
      when:
        - seed_demo_existing_user.userId is defined
        - seed_demo_user_password_file.stat.exists
        - seed_demo_user_password | default('', true) | trim | length > 0
      no_log: true
      tags: [user]

    - name: Generate demo user password
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import secrets, string
            alphabet = string.ascii_letters + string.digits + "!@#$%^&*()-_=+"
            while True:
                password = "".join(secrets.choice(alphabet) for _ in range(24))
                if (
                    any(c.islower() for c in password)
                    and any(c.isupper() for c in password)
                    and any(c.isdigit() for c in password)
                    and any(c in "!@#$%^&*()-_=+" for c in password)
                ):
                    print(password)
                    break
      register: seed_demo_generated_user_password
      changed_when: false
      delegate_to: localhost
      become: false
      when:
        - seed_demo_existing_user.userId is not defined
        - seed_demo_user_password | default('', true) | trim | length == 0
        - not seed_demo_user_password_file.stat.exists
      no_log: true
      tags: [user]

    - name: Set effective demo user password
      ansible.builtin.set_fact:
        seed_demo_effective_user_password: >-
          {{
            (
              seed_demo_user_password | default('', true) | trim
            )
            if (seed_demo_user_password | default('', true) | trim | length > 0)
            else (
              (seed_demo_user_password_raw.content | b64decode | trim)
              if (seed_demo_user_password_file.stat.exists)
              else (seed_demo_generated_user_password.stdout | trim)
            )
          }}
      no_log: true
      tags: [user]

    - name: Persist demo user password
      ansible.builtin.copy:
        content: "{{ seed_demo_effective_user_password }}"
        dest: "{{ seed_demo_user_password_credstore_path }}"
        owner: root
        group: root
        mode: "0600"
      when:
        - seed_demo_existing_user.userId is not defined or not seed_demo_user_password_file.stat.exists
      no_log: true
      tags: [user]

    - name: Create demo human user
      ansible.builtin.uri:
        url: "{{ seed_demo_zitadel_base_url }}/v2/users/human"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_demo_admin_pat }}"
          Host: "{{ seed_demo_zitadel_host }}"
        body_format: json
        body:
          username: "{{ seed_demo_user_username }}"
          profile:
            givenName: "{{ seed_demo_user_first_name }}"
            familyName: "{{ seed_demo_user_last_name }}"
          email:
            email: "{{ seed_demo_user_email }}"
            isVerified: true
          password:
            password: "{{ seed_demo_effective_user_password }}"
            changeRequired: false
        status_code: [200, 201]
        return_content: true
      register: seed_demo_user_created
      when: seed_demo_existing_user.userId is not defined
      no_log: true
      tags: [user]

    - name: Set demo user ID fact
      ansible.builtin.set_fact:
        seed_demo_user_id: >-
          {{ seed_demo_user_created.json.userId | default(seed_demo_existing_user.userId) }}
      tags: [user]

    - name: Grant demo user access to sandbox-rental project
      ansible.builtin.uri:
        url: "{{ seed_demo_zitadel_base_url }}/management/v1/users/{{ seed_demo_user_id }}/grants"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_demo_admin_pat }}"
          Host: "{{ seed_demo_zitadel_host }}"
        body_format: json
        body:
          projectId: "{{ seed_demo_project_id }}"
          roleKeys: []
        status_code: [200, 409]
      tags: [user]

    - name: Get demo user org ID
      ansible.builtin.uri:
        url: "{{ seed_demo_zitadel_base_url }}/management/v1/users/{{ seed_demo_user_id }}"
        method: GET
        headers:
          Authorization: "Bearer {{ seed_demo_admin_pat }}"
          Host: "{{ seed_demo_zitadel_host }}"
        return_content: true
      register: seed_demo_user_details
      tags: [user, billing]

    - name: Set org facts
      ansible.builtin.set_fact:
        seed_demo_org_id: "{{ seed_demo_user_details.json.user.details.resourceOwner }}"
        seed_demo_org_name: "forge-metal"
      tags: [user, billing]

    - name: Print demo user credentials
      ansible.builtin.debug:
        msg:
          - "Demo user ready for {{ seed_demo_zitadel_host }}"
          - "  Email:         {{ seed_demo_user_email }}"
          - "  Password file: {{ seed_demo_user_password_credstore_path }}"
          - "  Org ID:        {{ seed_demo_org_id }}"
          - "  User ID:       {{ seed_demo_user_id }}"
      tags: [user]

    # ── Billing catalog + credits ──────────────────────────────────────────────

    - name: Build billing seed helper on controller
      ansible.builtin.command:
        argv:
          - go
          - build
          - -o
          - "{{ seed_demo_helper_local_path }}"
          - ./src/billing-service/cmd/billing-seed
      args:
        chdir: "{{ playbook_dir }}/../../../.."
      delegate_to: localhost
      become: false
      changed_when: false
      tags: [billing]

    - name: Upload billing seed helper
      ansible.builtin.copy:
        src: "{{ seed_demo_helper_local_path }}"
        dest: "{{ seed_demo_helper_remote_path }}"
        mode: "0755"
      tags: [billing]

    - name: Run billing seed helper
      ansible.builtin.command:
        argv:
          - "{{ seed_demo_helper_remote_path }}"
          - --pg-dsn-file
          - /etc/credstore/billing/pg-dsn
          - --tb-address
          - "{{ services.tigerbeetle.host }}:{{ services.tigerbeetle.port }}"
          - --tb-cluster-id
          - "{{ billing_service_tigerbeetle_cluster_id | default(0, true) | string }}"
          - --org-id
          - "{{ seed_demo_org_id }}"
          - --org-name
          - "{{ seed_demo_org_name }}"
          - --org-trust-tier
          - "{{ seed_demo_platform_org_trust_tier }}"
          - --product-id
          - "{{ seed_demo_product_id }}"
          - --product-display-name
          - "{{ seed_demo_product_display_name }}"
          - --meter-unit
          - "{{ seed_demo_meter_unit }}"
          - --billing-model
          - "{{ seed_demo_billing_model }}"
          - --plan-id
          - "{{ seed_demo_plan_id }}"
          - --plan-display-name
          - "{{ seed_demo_plan_display_name }}"
          - --unit-rates-json
          - "{{ seed_demo_unit_rates | to_json }}"
          - --overage-unit-rates-json
          - "{{ seed_demo_overage_unit_rates | to_json }}"
          - --quotas-json
          - "{{ seed_demo_quotas | to_json }}"
          - --target-prepaid-units
          - "{{ seed_demo_target_prepaid_units | string }}"
          - --prepaid-source
          - "{{ seed_demo_prepaid_source }}"
          - --promotion-name
          - "{{ seed_demo_platform_promotion_name }}"
          - --promotion-percent
          - "{{ seed_demo_platform_promotion_percent | string }}"
          - --expires-after
          - "{{ seed_demo_expires_after }}"
      register: seed_demo_billing_result_raw
      changed_when: (seed_demo_billing_result_raw.stdout | from_json).deposited_units | int > 0
      tags: [billing]

    - name: Parse billing seed result
      ansible.builtin.set_fact:
        seed_demo_billing_result: "{{ seed_demo_billing_result_raw.stdout | from_json }}"
      tags: [billing]

    - name: Print billing seed summary
      ansible.builtin.debug:
        msg:
          - "Billing catalog seeded for org {{ seed_demo_billing_result.org_id }}"
          - "  Trust tier:      {{ seed_demo_billing_result.org_trust_tier }}"
          - "  Product:         {{ seed_demo_product_id }}"
          - "  Plan:            {{ seed_demo_plan_id }}"
          - "  Prepaid before:  {{ seed_demo_billing_result.prepaid_before }}"
          - "  Deposited:       {{ seed_demo_billing_result.deposited_units }}"
          - "  Prepaid after:   {{ seed_demo_billing_result.prepaid_after }}"
          - "  Promotion:       {{ seed_demo_platform_promotion_name }} ({{ seed_demo_platform_promotion_percent }}% off)"
      tags: [billing]

    - name: Ensure forge-metal config directory exists for sandbox webhook env
      ansible.builtin.file:
        path: "{{ seed_demo_sandbox_env_path | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      tags: [billing]

    - name: Check existing sandbox webhook env file
      ansible.builtin.stat:
        path: "{{ seed_demo_sandbox_env_path }}"
      register: seed_demo_sandbox_env_file
      no_log: true
      tags: [billing]

    - name: Read existing sandbox webhook env file
      ansible.builtin.slurp:
        src: "{{ seed_demo_sandbox_env_path }}"
      register: seed_demo_sandbox_env_raw
      when: seed_demo_sandbox_env_file.stat.exists
      no_log: true
      tags: [billing]

    - name: Extract existing sandbox webhook secret
      ansible.builtin.set_fact:
        seed_demo_sandbox_webhook_secret: >-
          {{
            (
              seed_demo_sandbox_env_raw.content | b64decode
              | regex_search('^SANDBOX_FORGEJO_WEBHOOK_SECRET=(.+)$', '\\1', multiline=True)
              | first
            ) | default('', true) | trim
          }}
      when: seed_demo_sandbox_env_file.stat.exists
      no_log: true
      tags: [billing]

    - name: Generate sandbox webhook secret
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - "import secrets; print(secrets.token_hex(32))"
      register: seed_demo_generated_webhook_secret
      changed_when: false
      delegate_to: localhost
      become: false
      when: seed_demo_sandbox_webhook_secret | default('', true) | trim | length == 0
      no_log: true
      tags: [billing]

    - name: Set effective sandbox webhook secret
      ansible.builtin.set_fact:
        seed_demo_effective_webhook_secret: >-
          {{
            (
              seed_demo_sandbox_webhook_secret | default('', true) | trim
            )
            if (seed_demo_sandbox_webhook_secret | default('', true) | trim | length > 0)
            else (seed_demo_generated_webhook_secret.stdout | trim)
          }}
      no_log: true
      tags: [billing]

    - name: Write sandbox webhook env file
      ansible.builtin.copy:
        content: |
          SANDBOX_PLATFORM_ORG_ID={{ seed_demo_org_id }}
          SANDBOX_FORGEJO_WEBHOOK_SECRET={{ seed_demo_effective_webhook_secret }}
        dest: "{{ seed_demo_sandbox_env_path }}"
        owner: root
        group: root
        mode: "0600"
      register: seed_demo_sandbox_env_write
      tags: [billing]

    - name: Restart sandbox-rental-service after webhook env update # noqa: no-handler
      ansible.builtin.systemd:
        name: sandbox-rental-service
        state: restarted
        daemon_reload: true
      when: seed_demo_sandbox_env_write.changed
      tags: [billing]

    - name: Remove billing seed helpers
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ seed_demo_helper_remote_path }}"
      tags: [billing]

    - name: Remove local billing seed helper
      ansible.builtin.file:
        path: "{{ seed_demo_helper_local_path }}"
        state: absent
      delegate_to: localhost
      become: false
      tags: [billing]

    # ── Stalwart mailboxes ───────────────────────────────────────────────────

    - name: Wait for Stalwart to be ready
      ansible.builtin.wait_for:
        host: "{{ services.stalwart.host }}"
        port: "{{ services.stalwart.http_port }}"
        timeout: 60
      tags: [stalwart]

    - name: Stop mailbox-service before mailbox reseed
      ansible.builtin.systemd:
        name: mailbox-service
        state: stopped
      failed_when: false
      tags: [stalwart]

    - name: Compute bcrypt hashes for mailbox passwords
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import bcrypt, json, sys
            passwords = json.loads(sys.stdin.read())
            out = {}
            for name, pw in passwords.items():
                out[name] = bcrypt.hashpw(pw.encode(), bcrypt.gensalt()).decode()
            print(json.dumps(out))
        stdin: >-
          {{ {"ceo": stalwart_ceo_password, "agents": stalwart_agents_password} | to_json }}
      register: seed_demo_mailbox_hashes_raw
      changed_when: false
      delegate_to: localhost
      become: false
      no_log: true
      tags: [stalwart]

    - name: Set mailbox password hashes fact
      ansible.builtin.set_fact:
        seed_demo_mailbox_hashes: "{{ seed_demo_mailbox_hashes_raw.stdout | from_json }}"
      no_log: true
      tags: [stalwart]

    - name: Check if operator mailbox exists
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal/ceo"
        method: GET
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        status_code: 200
        return_content: true
      register: seed_demo_ceo_check
      no_log: true
      tags: [stalwart]

    - name: Delete existing operator mailbox (ceo@)
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal/ceo"
        method: DELETE
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        status_code: 200
      when: seed_demo_ceo_check.json.error is not defined
      no_log: true
      tags: [stalwart]

    - name: Create operator mailbox (ceo@)
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal"
        method: POST
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          type: individual
          name: "ceo"
          description: "Operator"
          secrets: ["{{ seed_demo_mailbox_hashes['ceo'] }}"]
          emails: ["ceo@{{ forge_metal_domain }}"]
          roles: ["user"]
          disabledPermissions: "{{ seed_demo_stalwart_disabled_permissions }}"
          quota: 0
        status_code: 200
        return_content: true
      no_log: true
      tags: [stalwart]

    - name: Check if agents mailbox exists
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal/agents"
        method: GET
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        status_code: 200
        return_content: true
      register: seed_demo_agents_check
      no_log: true
      tags: [stalwart]

    - name: Delete existing agents mailbox
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal/agents"
        method: DELETE
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        status_code: 200
      when: seed_demo_agents_check.json.error is not defined
      no_log: true
      tags: [stalwart]

    - name: Create agents mailbox (agents@)
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal"
        method: POST
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          type: individual
          name: "agents"
          description: "Shared agent mailbox"
          secrets: ["{{ seed_demo_mailbox_hashes['agents'] }}"]
          emails: ["agents@{{ forge_metal_domain }}"]
          roles: ["user"]
          disabledPermissions: "{{ seed_demo_stalwart_disabled_permissions }}"
          quota: 0
        status_code: 200
        return_content: true
      no_log: true
      tags: [stalwart]

    - name: Check if legacy agent mailboxes exist
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal/{{ item }}"
        method: GET
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        status_code: 200
        return_content: true
      loop:
        - bernoulli.agent
        - dijkstra.agent
        - lamport.agent
      register: seed_demo_legacy_agent_checks
      no_log: true
      tags: [stalwart]

    - name: Delete legacy agent mailboxes
      ansible.builtin.uri:
        url: "http://{{ services.stalwart.host }}:{{ services.stalwart.http_port }}/api/principal/{{ item.item }}"
        method: DELETE
        url_username: admin
        url_password: "{{ stalwart_admin_password }}"
        force_basic_auth: true
        status_code: 200
      loop: "{{ seed_demo_legacy_agent_checks.results }}"
      when: item.json.error is not defined
      no_log: true
      tags: [stalwart]

    - name: Reset mailbox-service projection for reseeded mailboxes
      ansible.builtin.command:
        cmd: >-
          {{ fm_bin }}/psql
          -h {{ services.postgresql.host }}
          -p {{ services.postgresql.port }}
          -U mailbox_service
          -d mailbox_service
          -v ON_ERROR_STOP=1
        stdin: |
          DELETE FROM email_bodies
          WHERE account_id IN ('ceo', 'agents', 'bernoulli.agent', 'dijkstra.agent', 'lamport.agent');
          DELETE FROM email_mailboxes
          WHERE account_id IN ('ceo', 'agents', 'bernoulli.agent', 'dijkstra.agent', 'lamport.agent');
          DELETE FROM emails
          WHERE account_id IN ('ceo', 'agents', 'bernoulli.agent', 'dijkstra.agent', 'lamport.agent');
          DELETE FROM mailboxes
          WHERE account_id IN ('ceo', 'agents', 'bernoulli.agent', 'dijkstra.agent', 'lamport.agent');
          DELETE FROM threads
          WHERE account_id IN ('ceo', 'agents', 'bernoulli.agent', 'dijkstra.agent', 'lamport.agent');
          DELETE FROM sync_state
          WHERE account_id IN ('ceo', 'agents', 'bernoulli.agent', 'dijkstra.agent', 'lamport.agent');
          DELETE FROM mailbox_accounts
          WHERE account_id IN ('ceo', 'agents', 'bernoulli.agent', 'dijkstra.agent', 'lamport.agent');
          DELETE FROM mailbox_bindings
          WHERE account_id IN ('bernoulli.agent', 'dijkstra.agent', 'lamport.agent');
      environment:
        PGPASSWORD: "{{ postgresql_mailbox_service_password }}"
      changed_when: false
      no_log: true
      tags: [stalwart]

    - name: Restart Stalwart after mailbox reseed
      ansible.builtin.systemd:
        name: stalwart
        state: restarted
      tags: [stalwart]

    - name: Wait for Stalwart after mailbox reseed
      ansible.builtin.wait_for:
        host: "{{ services.stalwart.host }}"
        port: "{{ services.stalwart.http_port }}"
        timeout: 60
      tags: [stalwart]

    - name: Deploy operator forwarder target credential
      ansible.builtin.copy:
        content: "{{ stalwart_operator_forward_to }}"
        dest: /etc/credstore/mailbox-service/forward-to
        owner: root
        group: mailbox_service
        mode: "0640"
      when: stalwart_operator_forward_to | default('', true) | length > 0
      tags: [stalwart]

    - name: Reset operator forwarder state on reseed
      ansible.builtin.file:
        path: /var/lib/mailbox-service/forwarder-state.json
        state: absent
      tags: [stalwart]

    - name: Read deployed mailbox-service unit # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: systemctl cat mailbox-service.service
      register: seed_demo_mailbox_service_unit
      changed_when: false
      failed_when: false
      tags: [stalwart]

    - name: Set split-credential mailbox-service support fact
      ansible.builtin.set_fact:
        seed_demo_mailbox_service_supports_split_credentials: >-
          {{
            seed_demo_mailbox_service_unit.rc == 0
            and
            ('LoadCredential=stalwart-ceo-password:/etc/credstore/mailbox-service/stalwart-ceo-password' in seed_demo_mailbox_service_unit.stdout)
            and
            ('LoadCredential=stalwart-agents-password:/etc/credstore/mailbox-service/stalwart-agents-password' in seed_demo_mailbox_service_unit.stdout)
          }}
      tags: [stalwart]

    - name: Restart mailbox-service after mailbox reseed
      ansible.builtin.systemd:
        name: mailbox-service
        enabled: true
        state: restarted
        daemon_reload: true
      when: seed_demo_mailbox_service_supports_split_credentials
      tags: [stalwart]

    - name: Note mailbox-service restart is deferred until deploy
      ansible.builtin.debug:
        msg: >-
          mailbox-service remains stopped after mailbox reseed because the
          deployed unit does not yet load split Stalwart credentials. Run the
          mailbox_service deploy next.
      when: not seed_demo_mailbox_service_supports_split_credentials
      tags: [stalwart]

    - name: Search for demo user for mailbox binding
      ansible.builtin.uri:
        url: "{{ seed_demo_zitadel_base_url }}/v2/users"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_demo_admin_pat }}"
          Host: "{{ seed_demo_zitadel_host }}"
        body_format: json
        body:
          queries:
            - emailQuery:
                emailAddress: "{{ seed_demo_user_email }}"
        return_content: true
      register: seed_demo_mailbox_binding_user_search
      no_log: true
      tags: [stalwart]

    - name: Set mailbox binding user fact
      ansible.builtin.set_fact:
        seed_demo_mailbox_binding_user: >-
          {{
            (seed_demo_mailbox_binding_user_search.json.result | default([]) | first) | default({})
          }}
      tags: [stalwart]

    - name: Upsert demo mailbox binding
      ansible.builtin.command:
        cmd: >-
          {{ fm_bin }}/psql
          -h {{ services.postgresql.host }}
          -p {{ services.postgresql.port }}
          -U mailbox_service
          -d mailbox_service
          -v ON_ERROR_STOP=1
        stdin: |
          INSERT INTO mailbox_bindings (subject, account_id, email_address)
          VALUES ('{{ seed_demo_mailbox_binding_user.userId }}', 'ceo', '{{ seed_demo_user_email }}')
          ON CONFLICT (subject) DO UPDATE
          SET account_id = EXCLUDED.account_id,
              email_address = EXCLUDED.email_address;
      environment:
        PGPASSWORD: "{{ postgresql_mailbox_service_password }}"
      changed_when: false
      no_log: true
      when: seed_demo_mailbox_binding_user.userId is defined
      tags: [stalwart]

    - name: Print mailbox summary
      ansible.builtin.debug:
        msg: >-
          {{
            [
              'Stalwart mailboxes created:',
              '  ceo@' + forge_metal_domain,
              '  agents@' + forge_metal_domain,
              ''
            ]
            + (
              ['  Forwarding ceo@ -> ' + stalwart_operator_forward_to]
              if stalwart_operator_forward_to | default('', true) | length > 0
              else ['  Forwarding: disabled (set stalwart_operator_forward_to in group_vars)']
            )
          }}
      tags: [stalwart]

    # ── Dev OIDC apps ──────────────────────────────────────────────────────────
    # Creates devMode OIDC apps for local frontend development (HTTP redirect
    # URIs). Production apps are created by each app's Ansible role.

    - name: Find mailbox-service project for dev OIDC
      ansible.builtin.uri:
        url: "{{ seed_demo_zitadel_base_url }}/management/v1/projects/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_demo_admin_pat }}"
          Host: "{{ seed_demo_zitadel_host }}"
        body_format: json
        body:
          queries:
            - nameQuery:
                name: "mailbox-service"
                method: TEXT_QUERY_METHOD_EQUALS
        status_code: 200
      register: seed_demo_mailbox_project_search
      tags: [dev-oidc]

    - name: Find letters project for dev OIDC
      ansible.builtin.uri:
        url: "{{ seed_demo_zitadel_base_url }}/management/v1/projects/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_demo_admin_pat }}"
          Host: "{{ seed_demo_zitadel_host }}"
        body_format: json
        body:
          queries:
            - nameQuery:
                name: "letters"
                method: TEXT_QUERY_METHOD_EQUALS
        status_code: 200
      register: seed_demo_letters_project_search
      tags: [dev-oidc]

    - name: Set dev OIDC project facts
      ansible.builtin.set_fact:
        seed_demo_dev_oidc_apps:
          - name: rent-a-sandbox-dev
            project_id: "{{ seed_demo_project_id }}"
            port: 4244
          - name: webmail-dev
            project_id: "{{ (seed_demo_mailbox_project_search.json.result | default([]) | first | default({})).id | default('') }}"
            port: 4245
          - name: letters-dev
            project_id: "{{ (seed_demo_letters_project_search.json.result | default([]) | first | default({})).id | default('') }}"
            port: 4247
      tags: [dev-oidc]

    - name: Search for existing dev OIDC apps
      ansible.builtin.uri:
        url: "{{ seed_demo_zitadel_base_url }}/management/v1/projects/{{ item.project_id }}/apps/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_demo_admin_pat }}"
          Host: "{{ seed_demo_zitadel_host }}"
        body_format: json
        body:
          queries:
            - nameQuery:
                name: "{{ item.name }}"
                method: TEXT_QUERY_METHOD_EQUALS
        status_code: 200
      register: seed_demo_dev_oidc_search
      loop: "{{ seed_demo_dev_oidc_apps }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.project_id | length > 0
      tags: [dev-oidc]

    - name: Create dev OIDC apps
      ansible.builtin.uri:
        url: "{{ seed_demo_zitadel_base_url }}/management/v1/projects/{{ item.item.project_id }}/apps/{{ (item.json.result | first).id }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ seed_demo_admin_pat }}"
          Host: "{{ seed_demo_zitadel_host }}"
        status_code: 200
      loop: "{{ seed_demo_dev_oidc_search.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when:
        - item is not skipped
        - (item.json.result | default([]) | length) > 0
      tags: [dev-oidc]

    - name: Create dev OIDC apps
      ansible.builtin.uri:
        url: "{{ seed_demo_zitadel_base_url }}/management/v1/projects/{{ item.item.project_id }}/apps/oidc"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_demo_admin_pat }}"
          Host: "{{ seed_demo_zitadel_host }}"
        body_format: json
        body:
          name: "{{ item.item.name }}"
          redirectUris:
            - "http://127.0.0.1:{{ item.item.port }}/callback"
          responseTypes:
            - "OIDC_RESPONSE_TYPE_CODE"
          grantTypes:
            - "OIDC_GRANT_TYPE_AUTHORIZATION_CODE"
            - "OIDC_GRANT_TYPE_REFRESH_TOKEN"
          appType: "OIDC_APP_TYPE_WEB"
          authMethodType: "OIDC_AUTH_METHOD_TYPE_NONE"
          postLogoutRedirectUris:
            - "http://127.0.0.1:{{ item.item.port }}"
          devMode: true
          accessTokenType: "OIDC_TOKEN_TYPE_JWT"
        status_code: 200
      register: seed_demo_dev_oidc_created
      loop: "{{ seed_demo_dev_oidc_search.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when:
        - item is not skipped
      tags: [dev-oidc]

    - name: Re-query dev OIDC apps for client IDs
      ansible.builtin.uri:
        url: "{{ seed_demo_zitadel_base_url }}/management/v1/projects/{{ item.project_id }}/apps/_search"
        method: POST
        headers:
          Authorization: "Bearer {{ seed_demo_admin_pat }}"
          Host: "{{ seed_demo_zitadel_host }}"
        body_format: json
        body:
          queries:
            - nameQuery:
                name: "{{ item.name }}"
                method: TEXT_QUERY_METHOD_EQUALS
        status_code: 200
      register: seed_demo_dev_oidc_final
      loop: "{{ seed_demo_dev_oidc_apps }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.project_id | length > 0
      tags: [dev-oidc]

    - name: Print dev OIDC summary
      ansible.builtin.debug:
        msg: >-
          {{ item.item.name }}:
          AUTH_CLIENT_ID={{ (item.json.result | first).oidcConfig.clientId }}
          (port {{ item.item.port }})
      loop: "{{ seed_demo_dev_oidc_final.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item is not skipped and (item.json.result | default([]) | length) > 0
      tags: [dev-oidc]

    # ── Verify billing auth ────────────────────────────────────────────────────

    - name: Verify billing auth integration
      tags: [verify]
      block:
        - name: Create ephemeral verification machine user
          ansible.builtin.uri:
            url: "{{ seed_demo_zitadel_base_url }}/management/v1/users/machine"
            method: POST
            headers:
              Authorization: "Bearer {{ seed_demo_admin_pat }}"
              Host: "{{ seed_demo_zitadel_host }}"
            body_format: json
            body:
              userName: "seed-demo-verify-{{ inventory_hostname }}"
              name: "seed demo verify {{ inventory_hostname }}"
              accessTokenType: ACCESS_TOKEN_TYPE_JWT
            return_content: true
          register: seed_demo_verify_user
          no_log: true

        - name: Create verification user secret
          ansible.builtin.uri:
            url: "{{ seed_demo_zitadel_base_url }}/v2/users/{{ seed_demo_verify_user.json.userId }}/secret"
            method: POST
            headers:
              Authorization: "Bearer {{ seed_demo_admin_pat }}"
              Host: "{{ seed_demo_zitadel_host }}"
            status_code: 200
            return_content: true
          register: seed_demo_verify_secret
          no_log: true

        - name: Grant verification user access to sandbox-rental project
          ansible.builtin.uri:
            url: "{{ seed_demo_zitadel_base_url }}/management/v1/users/{{ seed_demo_verify_user.json.userId }}/grants"
            method: POST
            headers:
              Authorization: "Bearer {{ seed_demo_admin_pat }}"
              Host: "{{ seed_demo_zitadel_host }}"
            body_format: json
            body:
              projectId: "{{ seed_demo_project_id }}"
              roleKeys: []
            status_code: 200
          no_log: true

        - name: Request verification access token
          ansible.builtin.uri:
            url: "{{ seed_demo_zitadel_base_url }}/oauth/v2/token"
            method: POST
            headers:
              Host: "{{ seed_demo_zitadel_host }}"
            body_format: form-urlencoded
            body:
              grant_type: client_credentials
              scope: >-
                openid profile
                urn:zitadel:iam:user:resourceowner
                urn:zitadel:iam:org:project:id:{{ seed_demo_project_id }}:aud
            url_username: "seed-demo-verify-{{ inventory_hostname }}"
            url_password: "{{ seed_demo_verify_secret.json.clientSecret }}"
            force_basic_auth: true
            return_content: true
            status_code: 200
          register: seed_demo_verify_token
          no_log: true

        - name: Wait for sandbox-rental-service before auth verification
          ansible.builtin.wait_for:
            host: "{{ services.sandbox_rental.host }}"
            port: "{{ services.sandbox_rental.port }}"
            timeout: 60

        - name: Verify sandbox-rental billing proxy rejects unauthenticated request
          ansible.builtin.uri:
            url: "http://{{ services.sandbox_rental.host }}:{{ services.sandbox_rental.port }}/api/v1/billing/balance"
            method: GET
            status_code: 401
          register: seed_demo_verify_unauthed

        - name: Verify sandbox-rental billing proxy accepts authenticated request
          ansible.builtin.uri:
            url: "http://{{ services.sandbox_rental.host }}:{{ services.sandbox_rental.port }}/api/v1/billing/balance"
            method: GET
            headers:
              Authorization: "Bearer {{ seed_demo_verify_token.json.access_token }}"
            status_code: 200
            return_content: true
          register: seed_demo_verify_authed
          no_log: true

        - name: Assert balance response has org_id
          ansible.builtin.assert:
            that:
              - seed_demo_verify_authed.json.org_id | default('') | length > 0
            fail_msg: "Billing proxy returned unexpected payload: {{ seed_demo_verify_authed.json }}"

        - name: Print verification result
          ansible.builtin.debug:
            msg:
              - "Auth verification passed"
              - "  Org balance: {{ seed_demo_verify_authed.json.total_available | default(0) }} credits available"

      always:
        - name: Cleanup verification machine user
          ansible.builtin.uri:
            url: "{{ seed_demo_zitadel_base_url }}/v2/users/{{ seed_demo_verify_user.json.userId }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ seed_demo_admin_pat }}"
              Host: "{{ seed_demo_zitadel_host }}"
            status_code: [200, 404]
          when: seed_demo_verify_user is defined and seed_demo_verify_user.json.userId is defined

    # ── Summary ────────────────────────────────────────────────────────────────

    - name: Print demo environment summary
      ansible.builtin.debug:
        msg:
          - "============================================"
          - " Demo environment ready"
          - "============================================"
          - ""
          - " Login at: https://rentasandbox.{{ forge_metal_domain }}/"
          - ""
          - " Email:         {{ seed_demo_user_email }}"
          - " Password file: {{ seed_demo_user_password_credstore_path }}"
          - ""
          - " Org ID:        {{ seed_demo_org_id | default('(run with --tags user)') }}"
          - " Credits:       {{ seed_demo_billing_result.prepaid_after | default('(run with --tags billing)') }}"
          - "============================================"
