---
# Wipe the verification environment to a clean slate before end-to-end runs,
# then run the canonical deploy path.

- import_playbook: wipe-pg-db.yml
  vars:
    wipe_pg_db_name: billing

- import_playbook: wipe-pg-db.yml
  vars:
    wipe_pg_db_name: sandbox_rental

- import_playbook: wipe-pg-db.yml
  vars:
    wipe_pg_db_name: governance_service

- import_playbook: site.yml
  vars:
    temporal_force_schema_reset: true
    clickhouse_force_schema_reset: true
