---
# Wipe the verification environment to a clean slate before end-to-end runs.
#
# This playbook recreates:
# - TigerBeetle + billing PostgreSQL schema
# - sandbox_rental PostgreSQL schema
# - verself ClickHouse schema
# - default ClickHouse telemetry tables used for trace/log correlation
#
# Usage:
#   make deploy PLAYBOOK=verification-reset

- name: Exhaustive verification reset
  hosts: all
  become: true
  force_handlers: true
  vars:
    billing_service_force_ledger_reset: true
    sandbox_rental_service_force_schema_reset: true
    governance_service_force_schema_reset: true
    secrets_service_force_schema_reset: true
    temporal_force_schema_reset: true
    clickhouse_force_schema_reset: true
  roles:
    - role: deploy_profile
      tags: [deploy_profile]
    - role: clickhouse
      tags: [clickhouse, billing_service, sandbox_rental_service, governance_service, temporal]
    - role: tigerbeetle
      tags: [tigerbeetle]
    - role: postgresql
      tags: [postgresql]
    # verification-reset can run immediately after PostgreSQL is recreated; keep
    # Zitadel structurally ready before billing/sandbox roles query auth projects.
    - role: zitadel
      tags: [zitadel, postgresql]
    - role: billing_service
      tags: [billing_service]
    - role: governance_service
      tags: [governance_service]
    - role: temporal
      tags: [temporal]
    - role: secrets_service
      tags: [secrets_service]
    - role: sandbox_rental_service
      tags: [sandbox_rental_service]
    - role: electric
      vars:
        electric_instance: default
        electric_service_name: electric
        electric_service_port: "{{ services.electric.port }}"
        electric_pg_role: electric
        electric_pg_conn_limit: "{{ postgresql_role_connection_limits.electric }}"
        electric_db: sandbox_rental
        electric_writer_role: sandbox_rental
        electric_publication_name: electric_publication_default
        electric_publication_tables: [executions, execution_logs]
        electric_storage_dir: /var/lib/electric
        electric_credstore_dir: /etc/credstore/electric
        electric_nftables_table: verself_electric
        electric_nftables_file: /etc/nftables.d/electric.nft
        electric_db_pool_size: 15
      tags: [electric]
    - role: frontend_auth_sessions
      tags: [frontend_auth_sessions, console, governance_service]
    - role: console
      tags: [console, governance_service]
    - role: otelcol
      tags: [otelcol, temporal]
    - role: grafana
      tags: [grafana, temporal]
  handlers:
    - name: Ignore mailbox-service restart during verification reset
      listen: restart mailbox-service
      ansible.builtin.systemd:
        name: mailbox-service
        state: restarted
      failed_when: false
