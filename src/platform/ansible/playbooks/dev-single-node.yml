---
# Idempotent single-node deployment (no wipe).
# Use for config changes and updates after initial deploy.
#
# Usage: ansible-playbook -i inventory/hosts.ini playbooks/dev-single-node.yml

# ── Preflight (~2s) ──────────────────────────────────────────────────────────
# Catch missing prerequisites before the slow work starts.
# Controller-side checks run with gather_facts: false for speed.

- name: "Preflight: controller prerequisites"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [always]
  tasks:
    - name: Run controller preflight checks
      ansible.builtin.import_tasks: tasks/controller-preflight.yml

- name: "Preflight: remote prerequisites"
  hosts: all
  gather_facts: false
  become: true
  tags: [always]
  tasks:
    - name: Require forge_metal_domain
      ansible.builtin.assert:
        that: forge_metal_domain | default('', true) | length > 0
        fail_msg: >-
          forge_metal_domain is required. Set it in the encrypted Ansible group vars before deploying.

    - name: Require cloudflare_api_token
      ansible.builtin.assert:
        that: cloudflare_api_token | default('', true) | length > 0
        fail_msg: >-
          cloudflare_api_token is empty. Set it in the encrypted Ansible group vars before deploying.

    - name: Check ZFS pool exists
      ansible.builtin.command: "zpool status forgepool"
      changed_when: false
      failed_when: false
      register: preflight_zpool

    - name: Check guest kernel exists
      ansible.builtin.stat:
        path: /var/lib/forge-metal/guest-artifacts/vmlinux
        get_checksum: false
      register: preflight_guest_kernel

    - name: Check guest rootfs exists
      ansible.builtin.stat:
        path: /var/lib/forge-metal/guest-artifacts/rootfs.ext4
        # get_checksum defaults to true, which would sha1 the multi-GB rootfs every preflight (~4s).
        get_checksum: false
      register: preflight_guest_rootfs

    - name: Check Vite+ composed image exists
      ansible.builtin.stat:
        path: /var/lib/forge-metal/guest-artifacts/viteplus.ext4
        get_checksum: false
      register: preflight_viteplus_image

    - name: Warn if ZFS pool is missing (firecracker role will fail)
      ansible.builtin.debug:
        msg: >-
          WARNING: ZFS pool 'forgepool' not found. The zfs and firecracker roles
          will create it, but only if a suitable disk is available.
      when: preflight_zpool.rc != 0

    - name: Fail if guest artifacts are missing
      ansible.builtin.fail:
        msg: >-
          Guest artifacts not staged. The firecracker role requires vmlinux, rootfs.ext4, and viteplus.ext4
          at /var/lib/forge-metal/guest-artifacts/. Run: cd ansible && ansible-playbook playbooks/guest-rootfs.yml
      when: not preflight_guest_kernel.stat.exists or not preflight_guest_rootfs.stat.exists or not preflight_viteplus_image.stat.exists

# ── Deploy ───────────────────────────────────────────────────────────────────

- name: Deploy forge-metal (single node, idempotent)
  hosts: all
  become: true
  force_handlers: true
  roles:
    - role: deploy_profile
      tags: [deploy_profile]
    - role: base
      tags: [base]
    - role: nftables
      tags: [nftables]
    - role: spire
      tags: [spire, billing_service, identity_service, governance_service, secrets_service, sandbox_rental_service, mailbox_service]
    - role: cloudflare_dns
      tags: [cloudflare_dns]
    - role: clickhouse
      tags: [clickhouse, billing_service, sandbox_rental_service, governance_service, openbao, openbao_tenancy]
    - role: tigerbeetle
      tags: [tigerbeetle]
    - role: postgresql
      tags: [postgresql, openbao, openbao_tenancy]
    - role: zitadel
      tags: [zitadel, openbao, openbao_tenancy]
    - role: openbao
      tags: [openbao, openbao_tenancy, billing_service, governance_service, sandbox_rental_service, mailbox_service]
    - role: billing_service
      tags: [billing_service]
    - role: identity_service
      tags: [identity_service]
    - role: governance_service
      tags: [governance_service, openbao, openbao_tenancy]
    - role: secrets_service
      tags: [secrets_service, openbao_tenancy]
    - role: sandbox_rental_service
      tags: [sandbox_rental_service]
    # sandbox_rental_service's migration path drops and recreates its database
    # when the schema fingerprint changes, which wipes Electric's publication,
    # shape-table ownership, and REPLICA IDENTITY FULL — and leaves Electric
    # stopped. Tagging this role with `sandbox_rental_service` guarantees the
    # reconcile runs on any SR-scoped deploy, so partial invocations can't leave
    # Electric crash-looping with "Publication not found".
    - role: electric
      vars:
        electric_instance: default
        electric_service_name: electric
        electric_service_port: "{{ services.electric.port }}"
        electric_pg_role: electric
        electric_pg_conn_limit: "{{ postgresql_role_connection_limits.electric }}"
        electric_db: sandbox_rental
        electric_writer_role: sandbox_rental
        electric_publication_name: electric_publication_default
        electric_publication_tables: [executions, execution_logs]
        electric_storage_dir: /var/lib/electric
        electric_credstore_dir: /etc/credstore/electric
        electric_nftables_table: forge_metal_electric
        electric_nftables_file: /etc/nftables.d/electric.nft
        electric_db_pool_size: 15
      tags: [electric, sandbox_rental_service]
    - role: frontend_auth_sessions
      tags: [frontend_auth_sessions, rent_a_sandbox, governance_service, webmail]
    - role: rent_a_sandbox
      tags: [rent_a_sandbox, governance_service]
    - role: stalwart
      tags: [stalwart]
    - role: otelcol
      tags: [otelcol]
    - role: mailbox_service
      tags: [mailbox_service]
    - role: electric
      vars:
        electric_instance: mail
        electric_service_name: electric-mail
        electric_service_port: "{{ services.electric_mail.port }}"
        electric_pg_role: electric_mail
        electric_pg_conn_limit: "{{ postgresql_role_connection_limits.electric_mail }}"
        electric_db: mailbox_service
        electric_writer_role: mailbox_service
        electric_publication_name: electric_publication_mail
        electric_publication_tables:
          - mailbox_accounts
          - mailboxes
          - emails
          - email_mailboxes
          - email_bodies
          - threads
        electric_storage_dir: /var/lib/electric-mail
        electric_credstore_dir: /etc/credstore/electric-mail
        electric_nftables_table: forge_metal_electric_mail
        electric_nftables_file: /etc/nftables.d/electric-mail.nft
        electric_db_pool_size: 10
        electric_extra_systemd_after: [mailbox-service.service]
      tags: [electric_mail, mailbox_service]
    - role: webmail
      tags: [webmail]
    - role: platform
      tags: [platform]
    - role: company
      tags: [company]
    - role: grafana
      tags: [grafana]
    - role: verdaccio
      tags: [verdaccio]
    - role: forgejo
      tags: [forgejo]
    - role: firecracker
      tags: [firecracker]
    - role: caddy
      tags: [caddy, openbao_tenancy]
    - role: openbao_tenancy
      tags: [openbao_tenancy]
