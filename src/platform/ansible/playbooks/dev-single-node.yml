---
# Idempotent single-node deployment (no wipe).
# Use for config changes and updates after initial deploy.
#
# Usage: ansible-playbook -i inventory/hosts.ini playbooks/dev-single-node.yml

# ── Preflight (~2s) ──────────────────────────────────────────────────────────
# Catch missing prerequisites before the slow work starts.
# Controller-side checks run with gather_facts: false for speed.

- name: "Preflight: controller prerequisites"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [always]
  tasks:
    - name: Zig must be available (needed by firecracker role)
      ansible.builtin.command: zig version
      changed_when: false

    - name: Ansible collection community.general must be installed
      ansible.builtin.command: ansible-galaxy collection list community.general
      changed_when: false
      register: preflight_cg
      failed_when: "'community.general' not in preflight_cg.stdout"

    - name: Ansible collection ansible.posix must be installed
      ansible.builtin.command: ansible-galaxy collection list ansible.posix
      changed_when: false
      register: preflight_ap
      failed_when: "'ansible.posix' not in preflight_ap.stdout"

    - name: Ansible collection community.postgresql must be installed
      ansible.builtin.command: ansible-galaxy collection list community.postgresql
      changed_when: false
      register: preflight_cp
      failed_when: "'community.postgresql' not in preflight_cp.stdout"

- name: "Preflight: remote prerequisites"
  hosts: all
  gather_facts: false
  become: true
  tags: [always]
  tasks:
    - name: Require forge_metal_domain
      ansible.builtin.assert:
        that: forge_metal_domain | default('', true) | length > 0
        fail_msg: >-
          forge_metal_domain is required. Set it in the encrypted Ansible group vars before deploying.

    - name: Require cloudflare_api_token
      ansible.builtin.assert:
        that: cloudflare_api_token | default('', true) | length > 0
        fail_msg: >-
          cloudflare_api_token is empty. Set it in the encrypted Ansible group vars before deploying.

    - name: Check ZFS pool exists
      ansible.builtin.command: "zpool status forgepool"
      changed_when: false
      failed_when: false
      register: preflight_zpool

    - name: Check guest kernel exists
      ansible.builtin.stat:
        path: /var/lib/forge-metal/guest-artifacts/vmlinux
      register: preflight_guest_kernel

    - name: Check guest rootfs exists
      ansible.builtin.stat:
        path: /var/lib/forge-metal/guest-artifacts/rootfs.ext4
      register: preflight_guest_rootfs

    - name: Warn if ZFS pool is missing (firecracker role will fail)
      ansible.builtin.debug:
        msg: >-
          WARNING: ZFS pool 'forgepool' not found. The zfs and firecracker roles
          will create it, but only if a suitable disk is available.
      when: preflight_zpool.rc != 0

    - name: Fail if guest artifacts are missing
      ansible.builtin.fail:
        msg: >-
          Guest artifacts not staged. The firecracker role requires vmlinux and rootfs.ext4
          at /var/lib/forge-metal/guest-artifacts/. Run: cd ansible && ansible-playbook playbooks/guest-rootfs.yml
      when: not preflight_guest_kernel.stat.exists or not preflight_guest_rootfs.stat.exists

# ── Deploy ───────────────────────────────────────────────────────────────────

- name: Deploy forge-metal (single node, idempotent)
  hosts: all
  become: true
  force_handlers: true
  roles:
    - role: deploy_profile
      tags: [deploy_profile]
    - role: base
      tags: [base]
    - role: nftables
      tags: [nftables]
    - role: cloudflare_dns
      tags: [cloudflare_dns]
    - role: clickhouse
      tags: [clickhouse]
    - role: tigerbeetle
      tags: [tigerbeetle]
    - role: postgresql
      tags: [postgresql]
    - role: zitadel
      tags: [zitadel]
    - role: billing_service
      tags: [billing_service]
    - role: sandbox_rental_service
      tags: [sandbox_rental_service]
    - role: identity_service
      tags: [identity_service]
    - role: electric
      tags: [electric]
    - role: frontend_auth_sessions
      tags: [frontend_auth_sessions, rent_a_sandbox, webmail]
    - role: rent_a_sandbox
      tags: [rent_a_sandbox]
    - role: stalwart
      tags: [stalwart]
    - role: otelcol
      tags: [otelcol]
    - role: mailbox_service
      tags: [mailbox_service]
    - role: electric_mail
      tags: [electric_mail]
    - role: webmail
      tags: [webmail]
    - role: letters
      tags: [letters]
    - role: grafana
      tags: [grafana]
    - role: verdaccio
      tags: [verdaccio]
    - role: forgejo
      tags: [forgejo]
    - role: firecracker
      tags: [firecracker]
    - role: caddy
      tags: [caddy]
