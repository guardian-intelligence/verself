---
# Wipe one managed PostgreSQL service database and re-run the owning schema path.
#
# Usage:
#   make wipe-pg-db DB=sandbox_rental
#
# Supported DBs:
# - billing: billing ledger reset, including TigerBeetle
# - sandbox_rental
# - mailbox_service
# - identity_service
# - secrets_service
# - notifications_service
# - projects_service
# - source_code_hosting

- name: Wipe one managed PostgreSQL database
  hosts: all
  become: true
  force_handlers: true
  vars:
    wipe_pg_db_supported:
      - billing
      - sandbox_rental
      - mailbox_service
      - identity_service
      - secrets_service
      - notifications_service
      - projects_service
      - source_code_hosting
  pre_tasks:
    - name: Assert supported PostgreSQL wipe target
      ansible.builtin.assert:
        that:
          - (wipe_pg_db_name | default('')) in wipe_pg_db_supported
        fail_msg: >-
          wipe_pg_db_name must be one of {{ wipe_pg_db_supported | join(', ') }}.

    - name: Check deployed PostgreSQL client binary for wipe
      ansible.builtin.stat:
        path: "{{ verself_bin }}/psql"
      register: wipe_pg_db_psql_binary

    - name: Assert deployed PostgreSQL client is present for wipe
      ansible.builtin.assert:
        that:
          - wipe_pg_db_psql_binary.stat.exists
        fail_msg: >-
          wipe-pg-db runs against an existing deployment, but {{ verself_bin }}/psql is missing.
          Run a deploy playbook before wiping a managed PostgreSQL database.

    - name: Wait for deployed PostgreSQL before wipe
      ansible.builtin.wait_for:
        host: "{{ topology_endpoints.postgresql.host }}"
        port: "{{ topology_endpoints.postgresql.endpoints.postgres.port }}"
        timeout: 5

    - name: Verify PostgreSQL admin connectivity before wipe
      ansible.builtin.command:
        argv:
          - "{{ verself_bin }}/psql"
          - -h
          - "{{ topology_endpoints.postgresql.host }}"
          - -p
          - "{{ topology_endpoints.postgresql.endpoints.postgres.port | string }}"
          - -U
          - postgres
          - -d
          - postgres
          - -v
          - ON_ERROR_STOP=1
          - -tAc
          - SELECT 1
      environment:
        PGPASSWORD: "{{ postgresql_admin_password }}"
      changed_when: false
      no_log: true

  tasks:
    - name: Include ClickHouse for PostgreSQL wipe targets that configure ClickHouse users
      ansible.builtin.include_role:
        name: clickhouse
      tags: [clickhouse]
      when: >-
        wipe_pg_db_name in [
          'billing',
          'sandbox_rental',
          'identity_service',
          'notifications_service',
        ]

    - name: Include TigerBeetle for billing PostgreSQL wipe
      ansible.builtin.include_role:
        name: tigerbeetle
      tags: [tigerbeetle]
      when: wipe_pg_db_name == 'billing'

    - name: Include billing-service for billing PostgreSQL wipe
      ansible.builtin.include_role:
        name: billing_service
      tags: [billing_service]
      vars:
        billing_service_force_ledger_reset: true
      when: wipe_pg_db_name == 'billing'

    - name: Include sandbox-rental-service after billing PostgreSQL wipe
      ansible.builtin.include_role:
        name: sandbox_rental_service
      tags: [sandbox_rental_service]
      when: wipe_pg_db_name == 'billing'

    - name: Include sandbox-rental-service for sandbox_rental PostgreSQL wipe
      ansible.builtin.include_role:
        name: sandbox_rental_service
      tags: [sandbox_rental_service]
      vars:
        sandbox_rental_service_force_schema_reset: true
      when: wipe_pg_db_name == 'sandbox_rental'

    - name: Include Electric after sandbox_rental PostgreSQL wipe
      ansible.builtin.include_role:
        name: electric
      tags: [electric]
      vars:
        electric_config: "{{ topology_electric_instances.default }}"
      when: wipe_pg_db_name == 'sandbox_rental'

    - name: Include mailbox-service for mailbox_service PostgreSQL wipe
      ansible.builtin.include_role:
        name: mailbox_service
      tags: [mailbox_service]
      vars:
        mailbox_service_force_schema_reset: true
      when: wipe_pg_db_name == 'mailbox_service'

    - name: Include Electric Mail after mailbox_service PostgreSQL wipe
      ansible.builtin.include_role:
        name: electric
      tags: [electric_mail]
      vars:
        electric_config: "{{ topology_electric_instances.mail }}"
      when: wipe_pg_db_name == 'mailbox_service'

    - name: Include identity-service for identity_service PostgreSQL wipe
      ansible.builtin.include_role:
        name: identity_service
      tags: [identity_service]
      vars:
        identity_service_force_schema_reset: true
      when: wipe_pg_db_name == 'identity_service'

    - name: Include secrets-service for secrets_service PostgreSQL wipe
      ansible.builtin.include_role:
        name: secrets_service
      tags: [secrets_service]
      vars:
        secrets_service_force_schema_reset: true
      when: wipe_pg_db_name == 'secrets_service'

    - name: Include notifications-service for notifications_service PostgreSQL wipe
      ansible.builtin.include_role:
        name: notifications_service
      tags: [notifications_service]
      vars:
        notifications_service_force_schema_reset: true
      when: wipe_pg_db_name == 'notifications_service'

    - name: Include projects-service for projects_service PostgreSQL wipe
      ansible.builtin.include_role:
        name: projects_service
      tags: [projects_service]
      vars:
        projects_service_force_schema_reset: true
      when: wipe_pg_db_name == 'projects_service'

    - name: Include source-code-hosting-service for source_code_hosting PostgreSQL wipe
      ansible.builtin.include_role:
        name: source_code_hosting_service
      tags: [source_code_hosting_service]
      vars:
        source_code_hosting_service_force_schema_reset: true
      when: wipe_pg_db_name == 'source_code_hosting'

    - name: Include Electric Notifications after notifications_service PostgreSQL wipe
      ansible.builtin.include_role:
        name: electric
      tags: [electric_notifications]
      vars:
        electric_config: "{{ topology_electric_instances.notifications }}"
      when: wipe_pg_db_name == 'notifications_service'
