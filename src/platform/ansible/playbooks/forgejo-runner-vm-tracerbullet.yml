---
# Tracer bullet: prove an official forgejo-runner binary can live inside a
# Firecracker guest, register against the live Forgejo instance, and stay
# healthy long enough to justify the next control-plane phase.
#
# Surgical notes:
# - This hot-swaps forgejo-runner into a dev clone of the golden image instead
#   of baking it into the base rootfs. That keeps the spike isolated and easy
#   to tear down.
# - The guest script embeds a short-lived registration token. The dev zvol is
#   destroyed in the same play so the secret never lands in a shared snapshot.
# - Forgejo 14 does not support ephemeral runner registration. This spike
#   registers a normal runner and deletes tracer-bullet rows from Forgejo's
#   SQLite database during teardown.
# - This does not execute a real workflow job yet. It proves the runner seam:
#   Firecracker guest + official Forgejo runner + live instance connectivity.
#
# Usage:
#   cd src/platform/ansible && ansible-playbook playbooks/forgejo-runner-vm-tracerbullet.yml

- name: Hot-swap forgejo-runner into a dev golden and smoke-test it in Firecracker
  hosts: all
  become: true
  gather_facts: false
  vars_files:
    - ../roles/firecracker/defaults/main.yml
  vars:
    forgejo_runner_vm_tracer_zvol_name: forgejo-runner-tracerbullet-zvol
    forgejo_runner_vm_tracer_zvol: "{{ firecracker_zfs_pool }}/{{ forgejo_runner_vm_tracer_zvol_name }}"
    forgejo_runner_vm_tracer_snapshot: "{{ forgejo_runner_vm_tracer_zvol }}@ready"
    forgejo_runner_vm_tracer_mount: /tmp/forgejo-runner-tracerbullet-mnt
    forgejo_runner_vm_instance_url: "https://git.{{ forge_metal_domain }}"
    forgejo_runner_vm_labels: "forge-metal-vm-tracerbullet:host"
    forgejo_runner_vm_hold_seconds: 20
    forgejo_runner_vm_timeout_seconds: 90
    forgejo_runner_vm_name: "forge-metal-vm-tracerbullet-{{ lookup('pipe', 'date -u +%Y%m%d%H%M%S') }}"
    forgejo_runner_vm_local_vm_run: /tmp/vm-run-tracerbullet
    forgejo_runner_vm_remote_vm_run: /tmp/vm-run-tracerbullet
  tasks:
    - name: Run forgejo-runner tracer bullet workflow
      block:
        - name: Build vm-run locally
          delegate_to: localhost
          become: false
          ansible.builtin.command:
            argv:
              - go
              - build
              - -ldflags=-s -w
              - -o
              - "{{ forgejo_runner_vm_local_vm_run }}"
              - ./src/vm-orchestrator/cmd/vm-run
            chdir: "{{ playbook_dir }}/../../../.."
          changed_when: true

        - name: Ansible collection ansible.posix must be installed
          delegate_to: localhost
          become: false
          ansible.builtin.command: ansible-galaxy collection list ansible.posix
          changed_when: false
          register: forgejo_runner_vm_preflight_ap
          failed_when: "'ansible.posix' not in forgejo_runner_vm_preflight_ap.stdout"

        - name: Verify forgejo-runner binary exists on host
          ansible.builtin.stat:
            path: "{{ fm_bin }}/forgejo-runner"
          register: forgejo_runner_vm_bin
          failed_when: not forgejo_runner_vm_bin.stat.exists

        - name: Upload vm-run tracer-bullet client
          ansible.builtin.copy:
            src: "{{ forgejo_runner_vm_local_vm_run }}"
            dest: "{{ forgejo_runner_vm_remote_vm_run }}"
            mode: "0755"

        - name: Verify base golden snapshot exists
          ansible.builtin.command: "zfs list -H {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}@ready"
          changed_when: false

        - name: Verify Forgejo public endpoint is reachable from host
          ansible.builtin.uri:
            url: "{{ forgejo_runner_vm_instance_url }}"
            method: HEAD
            return_content: false
            status_code: [200, 302, 303]
            validate_certs: true

        - name: Generate short-lived runner registration token
          ansible.builtin.command:
            argv:
              - runuser
              - -u
              - forgejo
              - --
              - "{{ fm_bin }}/forgejo"
              - --config
              - /etc/forgejo/app.ini
              - actions
              - generate-runner-token
          environment:
            FORGEJO_WORK_DIR: /var/lib/forgejo
          register: forgejo_runner_vm_registration_token
          changed_when: false
          no_log: true

        - name: Destroy old tracer zvol if present
          ansible.builtin.command: "zfs destroy -r {{ forgejo_runner_vm_tracer_zvol }}"
          failed_when: false
          changed_when: true

        - name: Clone base golden to tracer zvol
          ansible.builtin.command: >
            zfs clone
            {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}@ready
            {{ forgejo_runner_vm_tracer_zvol }}
          changed_when: true

        - name: Wait for tracer zvol device node
          ansible.builtin.command: udevadm settle
          changed_when: false

        - name: Create tracer mount point
          ansible.builtin.file:
            path: "{{ forgejo_runner_vm_tracer_mount }}"
            state: directory
            mode: "0755"

        - name: Mount tracer zvol
          ansible.posix.mount:
            src: "/dev/zvol/{{ forgejo_runner_vm_tracer_zvol }}"
            path: "{{ forgejo_runner_vm_tracer_mount }}"
            fstype: ext4
            state: ephemeral

        - name: Copy forgejo-runner into tracer guest rootfs
          ansible.builtin.copy:
            src: "{{ fm_bin }}/forgejo-runner"
            dest: "{{ forgejo_runner_vm_tracer_mount }}/usr/local/bin/forgejo-runner"
            remote_src: true
            owner: root
            group: root
            mode: "0755"

        - name: Install forgejo-runner tracer-bullet guest script
          ansible.builtin.copy:
            dest: "{{ forgejo_runner_vm_tracer_mount }}/usr/local/bin/forgejo-runner-tracerbullet"
            owner: root
            group: root
            mode: "0700"
            content: |
              #!/bin/sh
              set -eu

              log() {
                printf '[tracerbullet] %s\n' "$1"
              }

              export PATH=/usr/local/bin:/usr/bin:/bin
              INSTANCE_URL={{ forgejo_runner_vm_instance_url | quote }}
              RUNNER_TOKEN={{ forgejo_runner_vm_registration_token.stdout | trim | quote }}
              RUNNER_NAME={{ forgejo_runner_vm_name | quote }}
              RUNNER_LABELS={{ forgejo_runner_vm_labels | quote }}
              HOLD_SECONDS={{ forgejo_runner_vm_hold_seconds | string | quote }}
              RUNNER_HOME=/home/runner

              log "starting forgejo-runner smoke script"
              log "forgejo-runner version: $(/usr/local/bin/forgejo-runner --version)"

              curl -fsSIL "$INSTANCE_URL" >/dev/null
              log "Forgejo endpoint reachable: $INSTANCE_URL"

              install -d -m 0755 "$RUNNER_HOME"
              chown runner:runner "$RUNNER_HOME"
              rm -f "$RUNNER_HOME/.runner" "$RUNNER_HOME/runner-config.yaml"

              su runner -c "cd $RUNNER_HOME && /usr/local/bin/forgejo-runner generate-config > $RUNNER_HOME/runner-config.yaml"
              log "runner config generated"

              su runner -c "cd $RUNNER_HOME && /usr/local/bin/forgejo-runner register \
                --config $RUNNER_HOME/runner-config.yaml \
                --no-interactive \
                --instance $INSTANCE_URL \
                --token $RUNNER_TOKEN \
                --name $RUNNER_NAME \
                --labels $RUNNER_LABELS"
              log "runner registered"

              rc=0
              su runner -c "cd $RUNNER_HOME && timeout ${HOLD_SECONDS}s /usr/local/bin/forgejo-runner daemon \
                --config $RUNNER_HOME/runner-config.yaml" || rc=$?
              if [ "$rc" -eq 124 ]; then
                log "runner daemon stayed healthy for ${HOLD_SECONDS}s"
                exit 0
              fi

              log "runner daemon exited unexpectedly with rc=$rc"
              exit "$rc"
          no_log: true

        - name: Unmount tracer zvol
          ansible.posix.mount:
            path: "{{ forgejo_runner_vm_tracer_mount }}"
            state: unmounted

        - name: Snapshot tracer zvol
          ansible.builtin.command: "zfs snapshot {{ forgejo_runner_vm_tracer_snapshot }}"
          changed_when: true

        - name: Boot VM and run forgejo-runner tracer bullet
          ansible.builtin.command: >
            {{ forgejo_runner_vm_remote_vm_run }}
            -golden-zvol {{ forgejo_runner_vm_tracer_zvol_name }}
            -timeout {{ forgejo_runner_vm_timeout_seconds }}s
            -- /usr/local/bin/forgejo-runner-tracerbullet
          async: "{{ forgejo_runner_vm_timeout_seconds }}"
          poll: 0
          register: forgejo_runner_vm_job

        - name: Wait for tracer-bullet VM to finish
          ansible.builtin.async_status:
            jid: "{{ forgejo_runner_vm_job.ansible_job_id }}"
          register: forgejo_runner_vm_result
          until: forgejo_runner_vm_result.finished
          retries: "{{ forgejo_runner_vm_timeout_seconds }}"
          delay: 1

        - name: Assert tracer bullet completed successfully
          ansible.builtin.assert:
            that:
              - forgejo_runner_vm_result.rc == 0
              - "'[tracerbullet] Forgejo endpoint reachable:' in (forgejo_runner_vm_result.stdout | default(''))"
              - "'[tracerbullet] runner config generated' in (forgejo_runner_vm_result.stdout | default(''))"
              - "'[tracerbullet] runner registered' in (forgejo_runner_vm_result.stdout | default(''))"
              - "'[tracerbullet] runner daemon stayed healthy' in (forgejo_runner_vm_result.stdout | default(''))"
            fail_msg: "{{ forgejo_runner_vm_result.stdout | default('') }}{{ forgejo_runner_vm_result.stderr | default('') }}"

        - name: Tracer bullet passed
          ansible.builtin.debug:
            msg: >-
              PASS: official forgejo-runner lived inside a Firecracker guest,
              registered against {{ forgejo_runner_vm_instance_url }}, and remained
              healthy for {{ forgejo_runner_vm_hold_seconds }} seconds.
      always:
        - name: Delete tracer-bullet runner rows from Forgejo SQLite state
          ansible.builtin.command:
            argv:
              - sqlite3
              - /var/lib/forgejo/data/forgejo.db
              - "DELETE FROM action_runner WHERE name LIKE 'forge-metal-vm-tracerbullet-%';"
          changed_when: true
          failed_when: false

        - name: Destroy tracer zvol
          ansible.builtin.command: "zfs destroy -r {{ forgejo_runner_vm_tracer_zvol }}"
          failed_when: false
          changed_when: true
