---
# Hot-swap homestead-smelter-guest into a dev golden zvol, boot a Firecracker
# VM, verify the host agent is streaming guest telemetry, then tear down.
#
# This is the fastest way to iterate on homestead-smelter guest code (~10s).
# Requires a valid golden-zvol@ready (run the guest-rootfs and deploy playbooks
# at least once first).
#
# Usage:
#   cd src/platform/ansible && ansible-playbook playbooks/smelter-dev.yml

- name: Build and upload smelter guest binary
  hosts: all
  gather_facts: false
  tasks:
    - name: Build homestead-smelter guest locally
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.command:
        argv: [zig, build, -Doptimize=ReleaseSafe]
        chdir: "{{ playbook_dir }}/../../../homestead-smelter"
      changed_when: true

    - name: Upload guest binary to server
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../homestead-smelter/zig-out/bin/homestead-smelter-guest"
        dest: /tmp/homestead-smelter-guest
        mode: "0755"

- name: Hot-swap smelter guest and probe in Firecracker VM
  hosts: all
  become: true
  vars_files:
    - ../roles/firecracker/defaults/main.yml
  vars:
    smelter_dev_zvol: "{{ firecracker_zfs_pool }}/smelter-dev-zvol"
    smelter_dev_snapshot: "{{ smelter_dev_zvol }}@ready"
    smelter_dev_mnt: /tmp/smelter-dev-mnt
    smelter_guest_upload: /tmp/homestead-smelter-guest
    smelter_vm_sleep: 8
    boot_timeout: 20
    probe_settle_seconds: 2
  tasks:

    # ── Preflight ──────────────────────────────────────────────────────────

    - name: Ansible collection ansible.posix must be installed
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.command: ansible-galaxy collection list ansible.posix
      changed_when: false
      register: preflight_ap
      failed_when: "'ansible.posix' not in preflight_ap.stdout"

    - name: Verify uploaded guest binary exists
      ansible.builtin.stat:
        path: "{{ smelter_guest_upload }}"
      register: guest_bin
      failed_when: not guest_bin.stat.exists

    - name: Verify base golden snapshot exists
      ansible.builtin.command: "zfs list -H {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}@ready"
      changed_when: false

    - name: Verify forge-metal is available
      ansible.builtin.command: "{{ fm_bin }}/forge-metal --version"
      changed_when: false

    - name: Verify homestead-smelter-host is available
      ansible.builtin.stat:
        path: "{{ firecracker_smelter_host_binary_path }}"
      register: smelter_host_bin
      failed_when: not smelter_host_bin.stat.exists

    # ── Hot-swap binary into dev golden ───────────────────────────────────

    - name: Destroy old dev zvol if present
      ansible.builtin.command: "zfs destroy -r {{ smelter_dev_zvol }}"
      failed_when: false
      changed_when: true

    - name: Clone base golden to dev zvol
      ansible.builtin.command: >
        zfs clone
        {{ firecracker_zfs_pool }}/{{ firecracker_golden_zvol }}@ready
        {{ smelter_dev_zvol }}
      changed_when: true

    - name: Wait for dev zvol device node
      ansible.builtin.command: udevadm settle
      changed_when: false

    - name: Create dev mount point
      ansible.builtin.file:
        path: "{{ smelter_dev_mnt }}"
        state: directory
        mode: "0755"

    - name: Mount dev zvol
      ansible.posix.mount:
        src: "/dev/zvol/{{ smelter_dev_zvol }}"
        path: "{{ smelter_dev_mnt }}"
        fstype: ext4
        state: ephemeral

    - name: Copy guest binary into dev rootfs
      ansible.builtin.copy:
        src: "{{ smelter_guest_upload }}"
        dest: "{{ smelter_dev_mnt }}/usr/local/bin/homestead-smelter-guest"
        remote_src: true
        owner: root
        group: root
        mode: "0755"

    - name: Unmount dev zvol
      ansible.posix.mount:
        path: "{{ smelter_dev_mnt }}"
        state: unmounted

    - name: Snapshot dev zvol
      ansible.builtin.command: "zfs snapshot {{ smelter_dev_snapshot }}"
      changed_when: true

    - name: Dev golden ready
      ansible.builtin.debug:
        msg: "dev golden ready: {{ smelter_dev_snapshot }}"

    # ── Boot VM, probe, teardown ──────────────────────────────────────────

    - name: Boot VM, probe, and tear down dev Firecracker instance
      block:
        - name: Boot Firecracker VM from dev golden (background)
          ansible.builtin.command: >
            {{ fm_bin }}/forge-metal firecracker-test
            --golden-zvol smelter-dev-zvol
            --timeout 60s
            -- sleep {{ smelter_vm_sleep }}
          async: 60
          poll: 0
          register: firecracker_job

        - name: Wait for vsock bridge socket
          ansible.builtin.find:
            paths: "{{ firecracker_jailer_root }}/firecracker"
            patterns: "forge-control.sock"
            recurse: true
            file_type: any
          register: bridge_search
          until: bridge_search.files | length > 0
          retries: "{{ boot_timeout }}"
          delay: 1

        - name: Record bridge socket path
          ansible.builtin.set_fact:
            bridge_socket: "{{ bridge_search.files[0].path }}"
            smelter_job_id: "{{ bridge_search.files[0].path | regex_replace('^.*/firecracker/([^/]+)/root/run/forge-control\\.sock$', '\\1') }}"

        - name: Wait for smelter guest to start
          ansible.builtin.pause:
            seconds: "{{ probe_settle_seconds }}"

        - name: Wait for host agent to report live telemetry for the VM
          ansible.builtin.command: >
            {{ firecracker_smelter_host_binary_path }} check-live
            --control-uds {{ firecracker_smelter_control_socket }}
            --job-id {{ smelter_job_id }}
          register: smelter_live_result
          changed_when: false
          until: smelter_live_result.rc == 0
          retries: 20
          delay: 1

        - name: Show host snapshot
          ansible.builtin.command: >
            {{ firecracker_smelter_host_binary_path }} snapshot
            --control-uds {{ firecracker_smelter_control_socket }}
          register: smelter_snapshot_result
          changed_when: false

        - name: Show host snapshot output
          ansible.builtin.debug:
            msg: "{{ smelter_snapshot_result.stdout }}"

        - name: Host telemetry path passed
          ansible.builtin.debug:
            msg: "PASS: host agent observed live guest telemetry"

      always:
        - name: Wait for Firecracker VM to exit
          ansible.builtin.async_status:
            jid: "{{ firecracker_job.ansible_job_id }}"
          register: firecracker_result
          until: firecracker_result.finished
          retries: 30
          delay: 2
          failed_when: false
          when: firecracker_job is defined

        - name: Destroy dev zvol
          ansible.builtin.command: "zfs destroy -r {{ smelter_dev_zvol }}"
          failed_when: false
          changed_when: true
