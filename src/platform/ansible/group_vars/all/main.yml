---
# Global variables for all nodes.

verself_version: "0.1.0"

# All binaries here after deploy_profile role.
verself_bin: "/opt/verself/profile/bin"

# Product base domain (required). Product services get subdomains automatically:
#   verself.sh             → public product docs, policy, and API reference
#   console.verself.sh     → authenticated product console
#   <service>.api.verself.sh → customer, SDK, and CLI APIs
#   dashboard.verself.sh   → Grafana dashboard
#   git.verself.sh         → source-code-hosting-service Git smart HTTP
verself_domain: "verself.sh"
platform_domain: "{{ verself_domain }}"

# Company base domain. Guardian Intelligence owns the company site, letters,
# newsroom, company metadata, and company-level social cards.
company_domain: "guardianintelligence.org"

console_subdomain: console
console_domain: "{{ console_subdomain }}.{{ verself_domain }}"
billing_service_subdomain: billing.api
billing_service_domain: "{{ billing_service_subdomain }}.{{ verself_domain }}"
sandbox_rental_service_subdomain: sandbox.api
sandbox_rental_service_domain: "{{ sandbox_rental_service_subdomain }}.{{ verself_domain }}"
identity_service_subdomain: identity.api
identity_service_domain: "{{ identity_service_subdomain }}.{{ verself_domain }}"
profile_service_subdomain: profile.api
profile_service_domain: "{{ profile_service_subdomain }}.{{ verself_domain }}"
notifications_service_subdomain: notifications.api
notifications_service_domain: "{{ notifications_service_subdomain }}.{{ verself_domain }}"
projects_service_subdomain: projects.api
projects_service_domain: "{{ projects_service_subdomain }}.{{ verself_domain }}"
source_code_hosting_service_subdomain: source.api
source_code_hosting_service_domain: "{{ source_code_hosting_service_subdomain }}.{{ verself_domain }}"
governance_service_subdomain: governance.api
governance_service_domain: "{{ governance_service_subdomain }}.{{ verself_domain }}"
secrets_service_subdomain: secrets.api
secrets_service_domain: "{{ secrets_service_subdomain }}.{{ verself_domain }}"
mailbox_service_subdomain: mail.api
mailbox_service_domain: "{{ mailbox_service_subdomain }}.{{ verself_domain }}"

# Transactional email (Resend)
resend_subdomain: notify
resend_domain: "{{ resend_subdomain }}.{{ verself_domain }}"
resend_sender_address: "noreply@{{ resend_domain }}"
resend_sender_name: verself

# Self-hosted mail (Stalwart + mailbox-service)
stalwart_subdomain: mail
stalwart_domain: "{{ stalwart_subdomain }}.{{ verself_domain }}"

# Operator email forwarding — all mail to ceo@<domain> is copied here by the
# mailbox-service internal forwarder. Required for turnkey operator
# notifications.
stalwart_operator_forward_to: ""

# GitHub Actions runner integration. Create/update the customer-facing app at
# https://github.com/settings/apps/new or the org-owned app settings URL below.
# The private key, webhook secret, and client secret are stored as platform-org
# secrets and are not committed.
sandbox_rental_service_github_app_enabled: true
sandbox_rental_service_github_app_id: 3370540
sandbox_rental_service_github_app_slug: verself-ci
sandbox_rental_service_github_app_client_id: "Iv23liDpxGOmBSQwSJ5i"
sandbox_rental_service_github_app_settings_url: "https://github.com/organizations/guardian-intelligence/settings/apps/verself-ci"

# OpenBao relying-party settings for secrets-service workload auth.
openbao_spiffe_jwt_mount: spiffe-jwt
openbao_workload_audience: openbao

# WireGuard
wireguard_interface: wg0
wireguard_port: 51820
wireguard_network: "10.0.0.0/16"

# PostgreSQL connection budget.
#
# max_connections is a shared global ceiling; if any one service's client-side
# pool grows unbounded it will starve every other service and the operator
# will see raw "remaining connection slots are reserved for roles with the
# SUPERUSER attribute" 500s. The only durable bulkhead is per-role connection
# limits enforced by postgres itself, declared here as the single source of
# truth and applied at role-creation time by each service role.
#
# Budget rules:
#   - Sum of limits ≤ postgresql_max_connections - postgresql_superuser_reserved_connections - headroom
#   - Headroom absorbs one-off admin sessions and short-lived migration tools.
#   - The `postgres` superuser is intentionally unlimited (-1) — locking it
#     down risks locking yourself out of recovery.
#
# Observed steady-state connection counts (2026-04-15) for reference:
#   billing ~22, sandbox_rental ~18, electric ~21 (pool 20 + slot 1),
#   electric_mail ~21, zitadel ~4, grafana ~4, stalwart ~3, identity_service ~2,
#   governance_service ~10, mailbox_service ~2. Current budget sums to 190, leaving ~100 under max after
#   superuser reserve.
postgresql_max_connections: 300
postgresql_superuser_reserved_connections: 10
postgresql_role_connection_limits:
  billing: 30
  sandbox_rental: 30
  electric: 25
  electric_mail: 25
  zitadel: 15
  frontend_auth: 15
  grafana: 10
  stalwart: 10
  identity_service: 10
  governance_service: 15
  profile_service: 10
  notifications_service: 10
  projects_service: 10
  source_code_hosting_service: 10
  electric_notifications: 15
  mailbox_service: 10
  object_storage_service: 10
  temporal: 80

# Object-storage identities must use fixed UIDs because Garage's nftables
# rules load before the object-storage role creates the users.
object_storage_service_uid: 960
object_storage_admin_uid: 961
