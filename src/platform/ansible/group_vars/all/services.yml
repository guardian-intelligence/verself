---
# Service registry — single source of truth for all service endpoints.
# Templates and tasks reference services.X.host / services.X.port instead of
# hardcoding localhost and scattering port numbers across role defaults.
#
# This is a static topology for single-node deployment. To move a service
# off-box, change its host here — no template rewrites needed.
#
# ──────────────────────────────────────────────────────────────────────────
# Port allocation rules
# ──────────────────────────────────────────────────────────────────────────
# 1. Every service port lives in this file. Role templates, Caddyfiles, and
#    nftables rules reference `services.X.<port>` by name — never a literal.
# 2. Private-by-default. New services bind 127.0.0.1 unless they are
#    intentionally internet-exposed via Caddy. Missing nftables rules must
#    fail closed, not open.
# 3. Ports are partitioned by concern. Pick from the right range when adding
#    a service; do not reuse or re-home existing allocations casually.
#
#    Upstream-fixed (chosen by the upstream, we accept them):
#      25            Stalwart SMTP
#      2222          Forgejo SSH
#      3000          Forgejo HTTP
#      6933-6939     Temporal membership
#      3320          TigerBeetle
#      4222 / 8222   NATS client / monitoring
#      4317 / 4318   OTel collector gRPC / HTTP
#      5432          PostgreSQL
#      7233-7246     Temporal frontend/history/matching/worker gRPC + HTTP
#      7936          Temporal pprof
#      8085          Zitadel
#      8200 / 8201   OpenBao API / cluster
#      9440          ClickHouse secure native
#      8125          StatsD UDP (otelcol receiver; TigerBeetle is the sender)
#      9181          ClickHouse Keeper (reserved, not allocated on single-node)
#
#    Verself Go services (control plane):   4240–4269
#      4241  identity-service internal SPIFFE mTLS
#      4242  billing-service
#      4243  sandbox-rental-service
#      4246  mailbox-service
#      4248  identity-service
#      4250  governance-service
#      4251  secrets-service
#      4253  secrets-service internal SPIFFE mTLS
#      4256  object-storage-service S3 facade
#      4257  object-storage-service admin
#      4258  profile-service
#      4259  profile-service internal SPIFFE mTLS
#      4260  notifications-service
#      4261  source-code-hosting-service
#      4262  source-code-hosting-service internal SPIFFE mTLS
#      4263  sandbox-rental-service internal SPIFFE mTLS
#      4264  projects-service
#      4265  projects-service internal SPIFFE mTLS
#
#    TanStack frontends (Nitro SSR):             4240–4269 (shared block)
#      4244  console
#      4249  platform
#      4252  company
#
# Port 4245 was webmail; the app was retired and its surfaces will be folded
# into console. The port is reserved — do not re-assign until that
# absorption lands.
#    Grafana & ops UIs:                          4300–4399
#      4300  Grafana
#      4301  Temporal Web
#
#    Verdaccio (npm mirror):                     4873 (upstream convention)
#    Garage private endpoints:                   3900–3923
#      3900/3910/3920  Garage S3
#      3901/3911/3921  Garage RPC
#      3903/3913/3923  Garage admin
#
#    Electric SQL replicators:                   3010–3019
#      3010  electric (primary)
#      3011  electric_mail
#      3012  electric_notifications
#
#    vm-orchestrator host services (VM subnet):  18080+ on 10.255.0.1
#      18080 firecracker_host_service
#
#    Reserved for future use:
#      metrics / pprof / health      9000–9099 / 9100–9199 — adopt when we
#                                    add per-service scrape endpoints.
#      9001                          Temporal Prometheus metrics
#
# 4. Every allocation in this file must be unique. There is no CI check for
#    this yet — adding one under src/platform/test/ that loads this file and
#    asserts uniqueness + range membership is a good first validator.
# ──────────────────────────────────────────────────────────────────────────

services:
  clickhouse:
    host: "127.0.0.1"
    secure_native_port: 9440
    # keeper_port: 9181 — re-add when 3-node replication lands and <keeper_server>
    # is configured in clickhouse-config.xml.j2. Single-node runs without Keeper.
