---
spire_trust_domain: "spiffe.{{ verself_domain }}"
spire_server_bind_address: 127.0.0.1
spire_server_bind_port: 8081
spire_server_socket_path: /run/spire-server/private/api.sock
spire_agent_socket_path: /run/spire-agent/sockets/agent.sock
spire_workload_group: spire_workload
spire_agent_id: "spiffe://{{ spire_trust_domain }}/node/single-node"
spire_identity_service_id: "spiffe://{{ spire_trust_domain }}/svc/identity-service"
spire_profile_service_id: "spiffe://{{ spire_trust_domain }}/svc/profile-service"
spire_notifications_service_id: "spiffe://{{ spire_trust_domain }}/svc/notifications-service"
spire_projects_service_id: "spiffe://{{ spire_trust_domain }}/svc/projects-service"
spire_source_code_hosting_service_id: "spiffe://{{ spire_trust_domain }}/svc/source-code-hosting-service"
spire_nats_id: "spiffe://{{ spire_trust_domain }}/svc/nats"
spire_governance_service_id: "spiffe://{{ spire_trust_domain }}/svc/governance-service"
spire_billing_service_id: "spiffe://{{ spire_trust_domain }}/svc/billing-service"
spire_sandbox_rental_id: "spiffe://{{ spire_trust_domain }}/svc/sandbox-rental-service"
spire_secrets_service_id: "spiffe://{{ spire_trust_domain }}/svc/secrets-service"
spire_mailbox_service_id: "spiffe://{{ spire_trust_domain }}/svc/mailbox-service"
spire_object_storage_admin_id: "spiffe://{{ spire_trust_domain }}/svc/object-storage-admin"
spire_object_storage_service_id: "spiffe://{{ spire_trust_domain }}/svc/object-storage-service"
spire_temporal_server_id: "spiffe://{{ spire_trust_domain }}/svc/temporal-server"
spire_temporal_web_id: "spiffe://{{ spire_trust_domain }}/svc/temporal-web"
spire_grafana_id: "spiffe://{{ spire_trust_domain }}/svc/grafana"
spire_otelcol_id: "spiffe://{{ spire_trust_domain }}/svc/otelcol"
spire_clickhouse_server_id: "spiffe://{{ spire_trust_domain }}/svc/clickhouse-server"
spire_clickhouse_operator_id: "spiffe://{{ spire_trust_domain }}/svc/clickhouse-operator"
spire_bundle_endpoint_bind_address: 127.0.0.1
spire_bundle_endpoint_bind_port: 8082
spire_jwt_bundle_endpoint_url: "https://{{ spire_bundle_endpoint_bind_address }}:{{ spire_bundle_endpoint_bind_port }}"
spire_jwt_issuer_url: "{{ spire_jwt_bundle_endpoint_url }}"
