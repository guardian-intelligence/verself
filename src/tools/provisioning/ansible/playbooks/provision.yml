---
# Provision bare metal infrastructure via OpenTofu and generate Ansible inventory.
#
# Usage:
#   aspect provision apply

- name: Provision bare metal infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    terraform_project_path: "{{ playbook_dir }}/../../terraform"
    tofu_binary_path: "{{ lookup('env', 'TOFU_BIN') | default('/home/ubuntu/.nix-profile/bin/tofu', true) }}"
    provision_site: "{{ lookup('env', 'VERSELF_SITE') | default('prod', true) }}"
    provisioning_site_dir: "{{ playbook_dir }}/../../sites/{{ provision_site }}"
    sops_secrets_file: "{{ provisioning_site_dir }}/secrets.sops.yml"
    inventory_path: "{{ playbook_dir }}/../../../host-configuration/sites/{{ provision_site }}/inventory.ini"
  tasks:
    - name: Verify terraform.tfvars.json exists
      ansible.builtin.stat:
        path: "{{ provisioning_site_dir }}/terraform.tfvars.json"
      register: tfvars_stat

    - name: Fail if tfvars missing
      ansible.builtin.fail:
        msg: >-
          {{ provisioning_site_dir }}/terraform.tfvars.json not found.
          Create the site-scoped tfvars before running provisioning.
      when: not tfvars_stat.stat.exists

    - name: Extract Latitude.sh auth token from SOPS
      ansible.builtin.command:
        cmd: >-
          sops -d --extract '["latitudesh_auth_token"]'
          {{ sops_secrets_file }}
      register: latitudesh_token
      changed_when: false
      no_log: true

    - name: Apply OpenTofu configuration
      community.general.terraform:
        project_path: "{{ terraform_project_path }}"
        state: present
        force_init: true
        binary_path: "{{ tofu_binary_path }}"
        variables_files:
          - "{{ provisioning_site_dir }}/terraform.tfvars.json"
      environment:
        LATITUDESH_AUTH_TOKEN: "{{ latitudesh_token.stdout }}"

    - name: Read worker IPs from OpenTofu outputs
      ansible.builtin.command:
        argv:
          - "{{ tofu_binary_path }}"
          - "-chdir={{ terraform_project_path }}"
          - output
          - -json
          - worker_ips
      register: worker_ips_output
      changed_when: false
      failed_when: false

    - name: Read infra IPs from OpenTofu outputs
      ansible.builtin.command:
        argv:
          - "{{ tofu_binary_path }}"
          - "-chdir={{ terraform_project_path }}"
          - output
          - -json
          - infra_ips
      register: infra_ips_output
      changed_when: false
      failed_when: false

    - name: Parse OpenTofu inventory outputs
      ansible.builtin.set_fact:
        worker_ips: >-
          {{
            (worker_ips_output.stdout | default('[]') | from_json)
            if worker_ips_output.rc == 0 and (worker_ips_output.stdout | default('') | length) > 0
            else []
          }}
        infra_ips: >-
          {{
            (infra_ips_output.stdout | default('[]') | from_json)
            if infra_ips_output.rc == 0 and (infra_ips_output.stdout | default('') | length) > 0
            else []
          }}

    - name: Fail if OpenTofu produced no hosts
      ansible.builtin.fail:
        msg: "No IPs found in OpenTofu outputs. Is infrastructure provisioned?"
      when: worker_ips | length == 0 and infra_ips | length == 0

    - name: Read terraform.tfvars.json
      ansible.builtin.slurp:
        src: "{{ provisioning_site_dir }}/terraform.tfvars.json"
      register: tfvars_content

    - name: Resolve inventory cluster name
      ansible.builtin.set_fact:
        inventory_cluster_name: "{{ (tfvars_content.content | b64decode | from_json).cluster_name | default('dev') }}"

    - name: Ensure generated inventory directory exists
      ansible.builtin.file:
        path: "{{ inventory_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Write generated host inventory
      ansible.builtin.copy:
        dest: "{{ inventory_path }}"
        mode: "0644"
        content: |
          [workers]
          {% for ip in worker_ips %}
          vs-{{ inventory_cluster_name }}-w{{ loop.index0 }} ansible_host={{ ip }}
          {% endfor %}

          [infra]
          {% if infra_ips | length > 0 %}
          {% for ip in infra_ips %}
          vs-{{ inventory_cluster_name }}-i{{ loop.index0 }} ansible_host={{ ip }}
          {% endfor %}
          {% else %}
          {% for ip in worker_ips %}
          vs-{{ inventory_cluster_name }}-w{{ loop.index0 }} ansible_host={{ ip }}
          {% endfor %}
          {% endif %}

          [all:vars]
          ansible_user=ubuntu
          ansible_python_interpreter=/usr/bin/python3
