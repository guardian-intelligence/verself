---
# Destroy all bare metal infrastructure and remove generated inventory.
#
# Usage:
#   aspect provision destroy --confirm

- name: Destroy bare metal infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    terraform_project_path: "{{ playbook_dir }}/../../terraform"
    tofu_binary_path: "{{ lookup('env', 'TOFU_BIN') | default('/home/ubuntu/.nix-profile/bin/tofu', true) }}"
    provisioning_site_dir: "{{ playbook_dir }}/../../../../host/sites/{{ verself_site }}"
    sops_secrets_file: "{{ provisioning_site_dir }}/secrets/provisioning.sops.yml"
    deprovision_inventory_file: "{{ playbook_dir }}/../../../../host/sites/{{ verself_site }}/inventory.ini"
  tasks:
    - name: Require verself_site to be set
      ansible.builtin.assert:
        that: verself_site | default('', true) | length > 0
        fail_msg: >-
          verself_site is required. Run: aspect provision destroy --confirm (which passes -e verself_site=<site>).

    - name: Extract Latitude.sh auth token from SOPS
      ansible.builtin.command:
        cmd: >-
          sops -d --extract '["latitudesh_auth_token"]'
          {{ sops_secrets_file }}
      register: latitudesh_token
      changed_when: false
      no_log: true

    - name: Destroy OpenTofu-managed infrastructure
      community.general.terraform:
        project_path: "{{ terraform_project_path }}"
        state: absent
        binary_path: "{{ tofu_binary_path }}"
        variables_files:
          - "{{ provisioning_site_dir }}/provisioning.tfvars.json"
      environment:
        LATITUDESH_AUTH_TOKEN: "{{ latitudesh_token.stdout }}"

    - name: Remove generated inventory file
      ansible.builtin.file:
        path: "{{ deprovision_inventory_file }}"
        state: absent
