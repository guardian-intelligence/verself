components:
  schemas:
    BalanceOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/BalanceOutputBody.json
          format: uri
          readOnly: true
          type: string
        credit_available:
          format: int64
          type: integer
        credit_pending:
          format: int64
          type: integer
        free_tier_available:
          format: int64
          type: integer
        free_tier_pending:
          format: int64
          type: integer
        org_id:
          format: int64
          type: integer
        total_available:
          format: int64
          type: integer
      required:
        - org_id
        - free_tier_available
        - free_tier_pending
        - credit_available
        - credit_pending
        - total_available
      type: object
    CreateCheckoutBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/CreateCheckoutBody.json
          format: uri
          readOnly: true
          type: string
        amount_cents:
          format: int64
          minimum: 1
          type: integer
        cancel_url:
          maxLength: 2048
          type: string
        org_id:
          format: int64
          type: integer
        product_id:
          maxLength: 255
          type: string
        success_url:
          maxLength: 2048
          type: string
      required:
        - org_id
        - product_id
        - amount_cents
        - success_url
        - cancel_url
      type: object
    CreateSubscriptionBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/CreateSubscriptionBody.json
          format: uri
          readOnly: true
          type: string
        cadence:
          enum:
            - monthly
            - annual
          type: string
        cancel_url:
          maxLength: 2048
          type: string
        org_id:
          format: int64
          type: integer
        plan_id:
          maxLength: 255
          type: string
        success_url:
          maxLength: 2048
          type: string
      required:
        - org_id
        - plan_id
        - success_url
        - cancel_url
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    GrantJSON:
      additionalProperties: false
      properties:
        available:
          format: int64
          type: integer
        expires_at:
          type: string
        grant_id:
          type: string
        pending:
          format: int64
          type: integer
        source:
          type: string
      required:
        - grant_id
        - source
        - available
        - pending
      type: object
    GrantsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/GrantsOutputBody.json
          format: uri
          readOnly: true
          type: string
        grants:
          items:
            $ref: "#/components/schemas/GrantJSON"
          type:
            - array
            - "null"
      required:
        - grants
      type: object
    ReserveInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/ReserveInputBody.json
          format: uri
          readOnly: true
          type: string
        actor_id:
          maxLength: 255
          type: string
        allocation:
          additionalProperties:
            format: double
            type: number
          type: object
        concurrent_count:
          format: int64
          type: integer
        org_id:
          format: int64
          type: integer
        product_id:
          maxLength: 255
          type: string
        source_ref:
          maxLength: 255
          type: string
        source_type:
          maxLength: 255
          type: string
      required:
        - org_id
        - product_id
        - actor_id
        - concurrent_count
        - source_type
        - source_ref
        - allocation
      type: object
    ReserveOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/ReserveOutputBody.json
          format: uri
          readOnly: true
          type: string
        reservation:
          $ref: "#/components/schemas/WindowReservationJSON"
      required:
        - reservation
      type: object
    SettleInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/SettleInputBody.json
          format: uri
          readOnly: true
          type: string
        actual_quantity:
          format: int32
          minimum: 0
          type: integer
        usage_summary:
          additionalProperties: {}
          type: object
        window_id:
          maxLength: 255
          type: string
      required:
        - window_id
        - actual_quantity
      type: object
    SettleOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/SettleOutputBody.json
          format: uri
          readOnly: true
          type: string
        actual_quantity:
          format: int32
          type: integer
        billable_quantity:
          format: int32
          type: integer
        billed_charge_units:
          format: int64
          type: integer
        settled_at:
          type: string
        window_id:
          type: string
        writeoff_charge_units:
          format: int64
          type: integer
        writeoff_quantity:
          format: int32
          type: integer
      required:
        - window_id
        - actual_quantity
        - billable_quantity
        - writeoff_quantity
        - billed_charge_units
        - writeoff_charge_units
        - settled_at
      type: object
    SubscriptionJSON:
      additionalProperties: false
      properties:
        cadence:
          type: string
        current_period_end:
          type: string
        current_period_start:
          type: string
        plan_id:
          type: string
        product_id:
          type: string
        status:
          type: string
        subscription_id:
          format: int64
          type: integer
      required:
        - subscription_id
        - product_id
        - plan_id
        - cadence
        - status
      type: object
    SubscriptionsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/SubscriptionsOutputBody.json
          format: uri
          readOnly: true
          type: string
        subscriptions:
          items:
            $ref: "#/components/schemas/SubscriptionJSON"
          type:
            - array
            - "null"
      required:
        - subscriptions
      type: object
    URLOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/URLOutputBody.json
          format: uri
          readOnly: true
          type: string
        url:
          type: string
      required:
        - url
      type: object
    VoidInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/VoidInputBody.json
          format: uri
          readOnly: true
          type: string
        window_id:
          maxLength: 255
          type: string
      required:
        - window_id
      type: object
    VoidOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:4242/schemas/VoidOutputBody.json
          format: uri
          readOnly: true
          type: string
        window_id:
          type: string
      required:
        - window_id
      type: object
    WindowReservationJSON:
      additionalProperties: false
      properties:
        actor_id:
          type: string
        allocation:
          additionalProperties:
            format: double
            type: number
          type: object
        cost_per_unit:
          format: int64
          type: integer
        expires_at:
          type: string
        org_id:
          format: int64
          type: integer
        plan_id:
          type: string
        pricing_phase:
          type: string
        product_id:
          type: string
        renew_by:
          type: string
        reservation_shape:
          type: string
        reserved_charge_units:
          format: int64
          type: integer
        reserved_quantity:
          format: int32
          type: integer
        source_ref:
          type: string
        source_type:
          type: string
        unit_rates:
          additionalProperties:
            format: int64
            type: integer
          type: object
        window_id:
          type: string
        window_seq:
          format: int32
          type: integer
        window_start:
          type: string
      required:
        - window_id
        - org_id
        - product_id
        - plan_id
        - actor_id
        - source_type
        - source_ref
        - window_seq
        - reservation_shape
        - reserved_quantity
        - reserved_charge_units
        - pricing_phase
        - allocation
        - unit_rates
        - cost_per_unit
        - window_start
        - expires_at
      type: object
info:
  title: Billing Service
  version: 2.0.0
openapi: 3.1.0
paths:
  /internal/billing/v1/checkout:
    post:
      operationId: create-checkout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URLOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a Stripe checkout session
  /internal/billing/v1/orgs/{org_id}/balance:
    get:
      operationId: get-balance
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get org grant balance
  /internal/billing/v1/orgs/{org_id}/grants:
    get:
      operationId: list-grants
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: product_id
          schema:
            type: string
        - explode: false
          in: query
          name: active
          schema:
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List credit grants for an org
  /internal/billing/v1/orgs/{org_id}/subscriptions:
    get:
      operationId: list-subscriptions
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List subscriptions for an org
  /internal/billing/v1/reserve:
    post:
      operationId: reserve-window
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Reserve a billing window
  /internal/billing/v1/settle:
    post:
      operationId: settle-window
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettleInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettleOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Settle a reserved billing window
  /internal/billing/v1/subscribe:
    post:
      operationId: create-subscription
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URLOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a Stripe subscription checkout
  /internal/billing/v1/void:
    post:
      operationId: void-window
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoidInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoidOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Void a reserved billing window
servers:
  - url: http://127.0.0.1:4242
