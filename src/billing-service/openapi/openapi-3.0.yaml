components:
  schemas:
    BalanceOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/BalanceOutputBody.json
          format: uri
          readOnly: true
          type: string
        credit_available:
          format: int64
          minimum: 0
          type: integer
        credit_pending:
          format: int64
          minimum: 0
          type: integer
        free_tier_available:
          format: int64
          minimum: 0
          type: integer
        free_tier_pending:
          format: int64
          minimum: 0
          type: integer
        org_id:
          type: string
        total_available:
          format: int64
          minimum: 0
          type: integer
      required:
        - org_id
        - free_tier_available
        - free_tier_pending
        - credit_available
        - credit_pending
        - total_available
      type: object
    CheckoutInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/CheckoutInputBody.json
          format: uri
          readOnly: true
          type: string
        amount_cents:
          format: int64
          minimum: 1
          type: integer
        cancel_url:
          maxLength: 2048
          type: string
        org_id:
          format: int64
          minimum: 1
          type: integer
        product_id:
          maxLength: 255
          type: string
        success_url:
          maxLength: 2048
          type: string
      required:
        - org_id
        - product_id
        - amount_cents
        - success_url
        - cancel_url
      type: object
    DepositCreditsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/DepositCreditsOutputBody.json
          format: uri
          readOnly: true
          type: string
        credits_deposited:
          format: int64
          type: integer
        credits_failed:
          format: int64
          type: integer
        credits_skipped:
          format: int64
          type: integer
        errors:
          items:
            type: string
          nullable: true
          type: array
        subscriptions_processed:
          format: int64
          type: integer
      required:
        - subscriptions_processed
        - credits_deposited
        - credits_skipped
        - credits_failed
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    ExpireCreditsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/ExpireCreditsOutputBody.json
          format: uri
          readOnly: true
          type: string
        errors:
          items:
            type: string
          nullable: true
          type: array
        grants_checked:
          format: int64
          type: integer
        grants_expired:
          format: int64
          type: integer
        grants_failed:
          format: int64
          type: integer
        units_expired:
          format: int64
          minimum: 0
          type: integer
      required:
        - grants_checked
        - grants_expired
        - grants_failed
        - units_expired
      type: object
    GrantJSON:
      additionalProperties: false
      properties:
        amount:
          format: int64
          type: integer
        closed_at:
          format: date-time
          type: string
        created_at:
          format: date-time
          type: string
        expires_at:
          format: date-time
          type: string
        grant_id:
          type: string
        product_id:
          type: string
        source:
          type: string
      required:
        - grant_id
        - product_id
        - amount
        - source
        - created_at
      type: object
    GrantLegJSON:
      additionalProperties: false
      properties:
        amount:
          format: int64
          minimum: 0
          type: integer
        grant_id:
          type: string
        source:
          type: string
        transfer_id:
          type: string
      required:
        - grant_id
        - transfer_id
        - amount
        - source
      type: object
    GrantsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/GrantsOutputBody.json
          format: uri
          readOnly: true
          type: string
        grants:
          items:
            $ref: "#/components/schemas/GrantJSON"
          nullable: true
          type: array
        org_id:
          type: string
      required:
        - org_id
        - grants
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        status:
          type: string
      required:
        - status
      type: object
    ProductBalanceOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/ProductBalanceOutputBody.json
          format: uri
          readOnly: true
          type: string
        free_tier_remaining:
          format: int64
          minimum: 0
          type: integer
        included_remaining:
          format: int64
          minimum: 0
          type: integer
        org_id:
          type: string
        prepaid_remaining:
          format: int64
          minimum: 0
          type: integer
        product_id:
          type: string
      required:
        - org_id
        - product_id
        - free_tier_remaining
        - included_remaining
        - prepaid_remaining
      type: object
    QuotaCheckInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/QuotaCheckInputBody.json
          format: uri
          readOnly: true
          type: string
        org_id:
          format: int64
          minimum: 1
          type: integer
        product_id:
          maxLength: 255
          type: string
        usage:
          additionalProperties:
            format: double
            type: number
          type: object
      required:
        - org_id
        - product_id
        - usage
      type: object
    QuotaCheckOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/QuotaCheckOutputBody.json
          format: uri
          readOnly: true
          type: string
        allowed:
          type: boolean
        violations:
          items:
            $ref: "#/components/schemas/QuotaViolationJSON"
          nullable: true
          type: array
      required:
        - allowed
      type: object
    QuotaViolationJSON:
      additionalProperties: false
      properties:
        current:
          format: int64
          minimum: 0
          type: integer
        dimension:
          type: string
        limit:
          format: int64
          minimum: 0
          type: integer
        window:
          type: string
      required:
        - dimension
        - window
        - limit
        - current
      type: object
    ReconcileCheckJSON:
      additionalProperties: false
      properties:
        details:
          type: string
        name:
          type: string
        passed:
          type: boolean
        severity:
          type: string
      required:
        - name
        - severity
        - passed
      type: object
    ReconcileOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/ReconcileOutputBody.json
          format: uri
          readOnly: true
          type: string
        checks:
          items:
            $ref: "#/components/schemas/ReconcileCheckJSON"
          nullable: true
          type: array
        has_alerts:
          type: boolean
      required:
        - checks
        - has_alerts
      type: object
    ReservationJSON:
      additionalProperties: false
      properties:
        actor_id:
          type: string
        allocation:
          additionalProperties:
            format: double
            type: number
          type: object
        cost_per_sec:
          format: int64
          minimum: 0
          type: integer
        grant_legs:
          items:
            $ref: "#/components/schemas/GrantLegJSON"
          nullable: true
          type: array
        job_id:
          format: int64
          type: integer
        org_id:
          format: int64
          minimum: 0
          type: integer
        plan_id:
          type: string
        pricing_phase:
          type: string
        product_id:
          type: string
        source_ref:
          type: string
        source_type:
          type: string
        unit_rates:
          additionalProperties:
            format: int64
            minimum: 0
            type: integer
          type: object
        window_secs:
          format: int32
          minimum: 0
          type: integer
        window_seq:
          format: int32
          minimum: 0
          type: integer
        window_start:
          format: date-time
          type: string
      required:
        - job_id
        - org_id
        - product_id
        - plan_id
        - actor_id
        - source_type
        - source_ref
        - window_seq
        - window_secs
        - window_start
        - pricing_phase
        - allocation
        - unit_rates
        - cost_per_sec
        - grant_legs
      type: object
    ReserveInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/ReserveInputBody.json
          format: uri
          readOnly: true
          type: string
        actor_id:
          maxLength: 255
          type: string
        allocation:
          additionalProperties:
            format: double
            type: number
          type: object
        job_id:
          format: int64
          minimum: 1
          type: integer
        org_id:
          format: int64
          minimum: 1
          type: integer
        product_id:
          maxLength: 255
          type: string
        source_ref:
          maxLength: 255
          type: string
        source_type:
          maxLength: 255
          type: string
      required:
        - job_id
        - org_id
        - product_id
        - actor_id
        - source_type
        - source_ref
        - allocation
      type: object
    ReserveOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/ReserveOutputBody.json
          format: uri
          readOnly: true
          type: string
        reservation:
          $ref: "#/components/schemas/ReservationJSON"
      required:
        - reservation
      type: object
    SettleInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/SettleInputBody.json
          format: uri
          readOnly: true
          type: string
        actual_seconds:
          format: int32
          minimum: 1
          type: integer
        reservation:
          $ref: "#/components/schemas/ReservationJSON"
      required:
        - reservation
        - actual_seconds
      type: object
    StatusOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/StatusOutputBody.json
          format: uri
          readOnly: true
          type: string
        status:
          type: string
      required:
        - status
      type: object
    SubscriptionInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/SubscriptionInputBody.json
          format: uri
          readOnly: true
          type: string
        cadence:
          enum:
            - monthly
            - annual
          type: string
        cancel_url:
          maxLength: 2048
          type: string
        org_id:
          format: int64
          minimum: 1
          type: integer
        plan_id:
          maxLength: 255
          type: string
        success_url:
          maxLength: 2048
          type: string
      required:
        - org_id
        - plan_id
        - success_url
        - cancel_url
      type: object
    SubscriptionJSON:
      additionalProperties: false
      properties:
        cadence:
          type: string
        created_at:
          format: date-time
          type: string
        current_period_end:
          format: date-time
          type: string
        current_period_start:
          format: date-time
          type: string
        overage_cap_units:
          format: int64
          type: integer
        plan_id:
          type: string
        product_id:
          type: string
        status:
          type: string
        stripe_subscription_id:
          type: string
        subscription_id:
          format: int64
          type: integer
      required:
        - subscription_id
        - plan_id
        - product_id
        - cadence
        - status
        - created_at
      type: object
    SubscriptionsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/SubscriptionsOutputBody.json
          format: uri
          readOnly: true
          type: string
        org_id:
          type: string
        subscriptions:
          items:
            $ref: "#/components/schemas/SubscriptionJSON"
          nullable: true
          type: array
      required:
        - org_id
        - subscriptions
      type: object
    TrustTierOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/TrustTierOutputBody.json
          format: uri
          readOnly: true
          type: string
        errors:
          items:
            type: string
          nullable: true
          type: array
        org_demoted:
          format: int64
          type: integer
        org_promoted:
          format: int64
          type: integer
      required:
        - org_promoted
        - org_demoted
      type: object
    UrlOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/UrlOutputBody.json
          format: uri
          readOnly: true
          type: string
        url:
          type: string
      required:
        - url
      type: object
    UsageEventJSON:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        event_id:
          format: int64
          type: integer
        event_type:
          type: string
        payload: {}
      required:
        - event_id
        - event_type
        - payload
        - created_at
      type: object
    UsageOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/UsageOutputBody.json
          format: uri
          readOnly: true
          type: string
        events:
          items:
            $ref: "#/components/schemas/UsageEventJSON"
          nullable: true
          type: array
        org_id:
          type: string
      required:
        - org_id
        - events
      type: object
    VoidInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/VoidInputBody.json
          format: uri
          readOnly: true
          type: string
        reservation:
          $ref: "#/components/schemas/ReservationJSON"
      required:
        - reservation
      type: object
info:
  title: Billing Service
  version: 1.1.0
openapi: 3.0.3
paths:
  /healthz:
    get:
      operationId: healthz
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Liveness probe
  /internal/billing/v1/check-quotas:
    post:
      operationId: check-quotas
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotaCheckInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaCheckOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Check quota windows for a metered product
  /internal/billing/v1/checkout:
    post:
      operationId: create-checkout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UrlOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a Stripe checkout session
  /internal/billing/v1/ops/deposit-credits:
    post:
      operationId: ops-deposit-credits
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositCreditsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Deposit subscription credits for the current period
  /internal/billing/v1/ops/expire-credits:
    post:
      operationId: ops-expire-credits
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpireCreditsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Expire credit grants past their expiry date
  /internal/billing/v1/ops/reconcile:
    post:
      operationId: ops-reconcile
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconcileOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Run reconciliation across PG, TigerBeetle, and ClickHouse
  /internal/billing/v1/ops/trust-tier-evaluate:
    post:
      operationId: ops-trust-tier-evaluate
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustTierOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Evaluate and update org trust tiers
  /internal/billing/v1/orgs/{org_id}/balance:
    get:
      operationId: get-org-balance
      parameters:
        - description: Organization ID
          in: path
          name: org_id
          required: true
          schema:
            description: Organization ID
            format: int64
            minimum: 0
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get org balance across all grants
  /internal/billing/v1/orgs/{org_id}/grants:
    get:
      operationId: list-grants
      parameters:
        - description: Organization ID
          in: path
          name: org_id
          required: true
          schema:
            description: Organization ID
            format: int64
            minimum: 0
            type: integer
        - description: Filter by product
          explode: false
          in: query
          name: product_id
          schema:
            description: Filter by product
            type: string
        - description: Only active grants
          explode: false
          in: query
          name: active
          schema:
            description: Only active grants
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List credit grants for an org
  /internal/billing/v1/orgs/{org_id}/products/{product_id}/balance:
    get:
      operationId: get-product-balance
      parameters:
        - description: Organization ID
          in: path
          name: org_id
          required: true
          schema:
            description: Organization ID
            format: int64
            minimum: 0
            type: integer
        - description: Product ID
          in: path
          name: product_id
          required: true
          schema:
            description: Product ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductBalanceOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get product-specific balance for an org
  /internal/billing/v1/orgs/{org_id}/subscriptions:
    get:
      operationId: list-subscriptions
      parameters:
        - description: Organization ID
          in: path
          name: org_id
          required: true
          schema:
            description: Organization ID
            format: int64
            minimum: 0
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List subscriptions for an org
  /internal/billing/v1/orgs/{org_id}/usage:
    get:
      operationId: list-usage
      parameters:
        - description: Organization ID
          in: path
          name: org_id
          required: true
          schema:
            description: Organization ID
            format: int64
            minimum: 0
            type: integer
        - description: Filter by product
          explode: false
          in: query
          name: product_id
          schema:
            description: Filter by product
            type: string
        - description: RFC3339 lower bound on created_at
          explode: false
          in: query
          name: since
          schema:
            description: RFC3339 lower bound on created_at
            type: string
        - description: Max results (1-1000, default 100)
          explode: false
          in: query
          name: limit
          schema:
            description: Max results (1-1000, default 100)
            format: int64
            maximum: 1000
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List billing events for an org
  /internal/billing/v1/reserve:
    post:
      operationId: reserve
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
