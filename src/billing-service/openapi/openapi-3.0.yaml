components:
  schemas:
    BillingBalance:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/BillingBalance.json
          format: uri
          readOnly: true
          type: string
        credit_available:
          pattern: ^[0-9]+$
          type: string
        credit_pending:
          pattern: ^[0-9]+$
          type: string
        free_tier_available:
          pattern: ^[0-9]+$
          type: string
        free_tier_pending:
          pattern: ^[0-9]+$
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        total_available:
          pattern: ^[0-9]+$
          type: string
      required:
        - org_id
        - free_tier_available
        - free_tier_pending
        - credit_available
        - credit_pending
        - total_available
      type: object
    BillingGrant:
      additionalProperties: false
      properties:
        available:
          pattern: ^[0-9]+$
          type: string
        expires_at:
          format: date-time
          type: string
        grant_id:
          type: string
        pending:
          pattern: ^[0-9]+$
          type: string
        source:
          type: string
      required:
        - grant_id
        - source
        - available
        - pending
      type: object
    BillingGrants:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/BillingGrants.json
          format: uri
          readOnly: true
          type: string
        grants:
          items:
            $ref: "#/components/schemas/BillingGrant"
          nullable: true
          type: array
      required:
        - grants
      type: object
    BillingSettleResult:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/BillingSettleResult.json
          format: uri
          readOnly: true
          type: string
        actual_quantity:
          format: int32
          minimum: 0
          type: integer
        billable_quantity:
          format: int32
          minimum: 0
          type: integer
        billed_charge_units:
          pattern: ^[0-9]+$
          type: string
        settled_at:
          format: date-time
          type: string
        window_id:
          type: string
        writeoff_charge_units:
          pattern: ^[0-9]+$
          type: string
        writeoff_quantity:
          format: int32
          minimum: 0
          type: integer
      required:
        - window_id
        - actual_quantity
        - billable_quantity
        - writeoff_quantity
        - billed_charge_units
        - writeoff_charge_units
        - settled_at
      type: object
    BillingSubscription:
      additionalProperties: false
      properties:
        cadence:
          type: string
        current_period_end:
          format: date-time
          type: string
        current_period_start:
          format: date-time
          type: string
        plan_id:
          type: string
        product_id:
          type: string
        status:
          type: string
        subscription_id:
          pattern: ^-?[0-9]+$
          type: string
      required:
        - subscription_id
        - product_id
        - plan_id
        - cadence
        - status
      type: object
    BillingSubscriptions:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/BillingSubscriptions.json
          format: uri
          readOnly: true
          type: string
        subscriptions:
          items:
            $ref: "#/components/schemas/BillingSubscription"
          nullable: true
          type: array
      required:
        - subscriptions
      type: object
    BillingWindowReservation:
      additionalProperties: false
      properties:
        actor_id:
          type: string
        allocation:
          additionalProperties:
            format: double
            type: number
          type: object
        cost_per_unit:
          pattern: ^[0-9]+$
          type: string
        expires_at:
          format: date-time
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        plan_id:
          type: string
        pricing_phase:
          type: string
        product_id:
          type: string
        renew_by:
          format: date-time
          type: string
        reservation_shape:
          type: string
        reserved_charge_units:
          pattern: ^[0-9]+$
          type: string
        reserved_quantity:
          format: int32
          minimum: 0
          type: integer
        source_ref:
          type: string
        source_type:
          type: string
        unit_rates:
          additionalProperties:
            pattern: ^[0-9]+$
            type: string
          type: object
        window_id:
          type: string
        window_seq:
          format: int32
          minimum: 0
          type: integer
        window_start:
          format: date-time
          type: string
      required:
        - window_id
        - org_id
        - product_id
        - plan_id
        - actor_id
        - source_type
        - source_ref
        - window_seq
        - reservation_shape
        - reserved_quantity
        - reserved_charge_units
        - pricing_phase
        - allocation
        - unit_rates
        - cost_per_unit
        - window_start
        - expires_at
      type: object
    CreateCheckoutRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/CreateCheckoutRequest.json
          format: uri
          readOnly: true
          type: string
        amount_cents:
          format: int64
          maximum: 9007199254740991
          minimum: 1
          type: integer
        cancel_url:
          maxLength: 2048
          minLength: 1
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        product_id:
          maxLength: 255
          minLength: 1
          type: string
        success_url:
          maxLength: 2048
          minLength: 1
          type: string
      required:
        - org_id
        - product_id
        - amount_cents
        - success_url
        - cancel_url
      type: object
    CreateSubscriptionRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/CreateSubscriptionRequest.json
          format: uri
          readOnly: true
          type: string
        cadence:
          enum:
            - monthly
            - annual
          type: string
        cancel_url:
          maxLength: 2048
          minLength: 1
          type: string
        org_id:
          pattern: ^[0-9]+$
          type: string
        plan_id:
          maxLength: 255
          minLength: 1
          type: string
        success_url:
          maxLength: 2048
          minLength: 1
          type: string
      required:
        - org_id
        - plan_id
        - success_url
        - cancel_url
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          maximum: 599
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    ReserveWindowRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/ReserveWindowRequest.json
          format: uri
          readOnly: true
          type: string
        actor_id:
          maxLength: 255
          minLength: 1
          type: string
        allocation:
          additionalProperties:
            format: double
            type: number
          minProperties: 1
          type: object
        concurrent_count:
          format: int64
          maximum: 9007199254740991
          minimum: 0
          type: integer
        org_id:
          pattern: ^[0-9]+$
          type: string
        product_id:
          maxLength: 255
          minLength: 1
          type: string
        source_ref:
          maxLength: 255
          minLength: 1
          type: string
        source_type:
          maxLength: 255
          minLength: 1
          type: string
      required:
        - org_id
        - product_id
        - actor_id
        - concurrent_count
        - source_type
        - source_ref
        - allocation
      type: object
    ReserveWindowResult:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/ReserveWindowResult.json
          format: uri
          readOnly: true
          type: string
        reservation:
          $ref: "#/components/schemas/BillingWindowReservation"
      required:
        - reservation
      type: object
    SettleWindowRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/SettleWindowRequest.json
          format: uri
          readOnly: true
          type: string
        actual_quantity:
          format: int32
          minimum: 0
          type: integer
        usage_summary:
          additionalProperties: {}
          type: object
        window_id:
          maxLength: 255
          minLength: 1
          type: string
      required:
        - window_id
        - actual_quantity
      type: object
    URLResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/URLResponse.json
          format: uri
          readOnly: true
          type: string
        url:
          type: string
      required:
        - url
      type: object
    VoidWindowRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/VoidWindowRequest.json
          format: uri
          readOnly: true
          type: string
        window_id:
          maxLength: 255
          minLength: 1
          type: string
      required:
        - window_id
      type: object
    VoidWindowResult:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: http://127.0.0.1:4242/schemas/VoidWindowResult.json
          format: uri
          readOnly: true
          type: string
        window_id:
          type: string
      required:
        - window_id
      type: object
info:
  title: Billing Service
  version: 2.0.0
openapi: 3.0.3
paths:
  /internal/billing/v1/checkout:
    post:
      operationId: create-checkout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URLResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a Stripe checkout session
  /internal/billing/v1/orgs/{org_id}/balance:
    get:
      operationId: get-balance
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            pattern: ^[0-9]+$
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingBalance"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get org grant balance
  /internal/billing/v1/orgs/{org_id}/grants:
    get:
      operationId: list-grants
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            pattern: ^[0-9]+$
            type: string
        - explode: false
          in: query
          name: product_id
          schema:
            maxLength: 255
            type: string
        - explode: false
          in: query
          name: active
          schema:
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingGrants"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List credit grants for an org
  /internal/billing/v1/orgs/{org_id}/subscriptions:
    get:
      operationId: list-subscriptions
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            pattern: ^[0-9]+$
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSubscriptions"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List subscriptions for an org
  /internal/billing/v1/reserve:
    post:
      operationId: reserve-window
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveWindowRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveWindowResult"
          description: OK
        "402":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Payment Required
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Reserve a billing window
  /internal/billing/v1/settle:
    post:
      operationId: settle-window
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettleWindowRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSettleResult"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Settle a reserved billing window
  /internal/billing/v1/subscribe:
    post:
      operationId: create-subscription
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URLResponse"
          description: OK
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "501":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Implemented
      summary: Create a Stripe subscription checkout
  /internal/billing/v1/void:
    post:
      operationId: void-window
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoidWindowRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoidWindowResult"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Void a reserved billing window
servers:
  - url: http://127.0.0.1:4242
