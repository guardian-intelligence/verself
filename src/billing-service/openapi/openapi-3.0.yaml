info:
  title: Billing Service
  version: 2.0.0
openapi: 3.0.3
paths:
  /internal/billing/v1/activate:
    post:
      operationId: activate-window
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingActivateWindowRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingActivateWindowResult"
          description: OK
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Activate billing window
  /internal/billing/v1/checkout:
    post:
      operationId: create-checkout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCreateCheckoutRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingURLResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create credit checkout
  /internal/billing/v1/contracts:
    post:
      operationId: create-contract
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCreateContractRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingURLResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create contract checkout
  /internal/billing/v1/contracts/{contract_id}/cancel:
    post:
      operationId: cancel-contract
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            maxLength: 255
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCancelContractRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingCancelContractResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Cancel contract
  /internal/billing/v1/contracts/{contract_id}/changes:
    post:
      operationId: create-contract-change
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            maxLength: 255
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCreateContractChangeRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingContractChangeResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create contract change
  /internal/billing/v1/orgs/{org_id}/contracts:
    get:
      operationId: list-contracts
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            pattern: ^[0-9]+$
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingContracts"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List org contracts
  /internal/billing/v1/orgs/{org_id}/entitlements:
    get:
      operationId: get-entitlements
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            pattern: ^[0-9]+$
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingEntitlementsView"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get org entitlements view
  /internal/billing/v1/orgs/{org_id}/grants:
    get:
      operationId: list-grants
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            pattern: ^[0-9]+$
            type: string
        - explode: false
          in: query
          name: product_id
          schema:
            maxLength: 255
            type: string
        - explode: false
          in: query
          name: active
          schema:
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingGrants"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List org credit grants
  /internal/billing/v1/orgs/{org_id}/statement:
    get:
      operationId: get-statement
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            pattern: ^[0-9]+$
            type: string
        - explode: false
          in: query
          name: product_id
          required: true
          schema:
            maxLength: 255
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingStatement"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Preview current statement
  /internal/billing/v1/portal:
    post:
      operationId: create-portal
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCreatePortalSessionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingURLResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create Stripe portal session
  /internal/billing/v1/products/{product_id}/plans:
    get:
      operationId: list-plans
      parameters:
        - in: path
          name: product_id
          required: true
          schema:
            maxLength: 255
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPlans"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List active plans
  /internal/billing/v1/reserve:
    post:
      operationId: reserve-window
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingReserveWindowRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingReserveWindowResult"
          description: OK
        "402":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Payment Required
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Reserve billing window
  /internal/billing/v1/settle:
    post:
      operationId: settle-window
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingSettleWindowRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSettleResult"
          description: OK
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Settle billing window
  /internal/billing/v1/void:
    post:
      operationId: void-window
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingVoidWindowRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingVoidWindowResult"
          description: OK
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Void billing window
