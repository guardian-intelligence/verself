<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ramp logo study</title>
  <style>
    :root { color-scheme: dark; --bg: #0e0e10; --panel: #17171a; --line: #2a2a2f;
      --ramp: #C7F02E; --black: #0B0B0B; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg);
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Inter", sans-serif; }
    main { max-width: 900px; margin: 0 auto; padding: 32px 24px 64px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
      overflow: hidden; }
    .frame { aspect-ratio: 1 / 1; background: var(--ramp); }
    .frame img, .frame svg { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
<main>
  <div class="grid">
    <div class="card">
      <div class="frame">
        <img src="logo.png" alt="" />
      </div>
    </div>
    <div class="card">
      <div class="frame">
        <svg id="reference" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
         <path d="M141.544 135.456v0.315l-45.249 0.016v-0.331c6.5247-3.738 11.0285-7.5457 15.0812-11.5245h18.5798zm-11.2116-59.7761-11.4695-11.4119h-0.3332s0.1936 21.2676-19.0635 40.6099c-18.8433 18.9308-41.0029 18.9735-41.0029 18.9735v0.3318l11.6844 11.6095s21.8369 0.2195 41.1264-18.9735c19.2196-19.1284 19.0582-41.1393 19.0582-41.1393z"></path>
        </svg>
      </div>
    </div>
    <div class="card">
      <div class="frame">
        <svg id="refactor" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
           <rect width="200" height="200" fill="#C7F02E"/>
              <path d="M141.544 135.456v0.315l-45.249 0.016v-0.331c6.5247-3.738 11.0285-7.5457 15.0812-11.5245h18.5798zm-11.2116-59.7761-11.4695-11.4119h-0.3332s0.1936 21.2676-19.0635 40.6099c-18.8433 18.9308-41.0029 18.9735-41.0029 18.9735v0.3318l11.6844 11.6095s21.8369 0.2195 41.1264-18.9735c19.2196-19.1284 19.0582-41.1393 19.0582-41.1393z"/>
        </svg>
        
      </div>
    </div>
    <div class="card">
      <div class="frame">
        <svg id="clean" xmlns="http://www.w3.org/2000/svg" viewBox="30.01 31.08 291.14 291.14">
          <rect x="30.01" y="31.08" width="291.14" height="291.14" fill="#C7F02E"/>
          <path fill="#0B0B0B" d="M124.497 236.057L226.107 116.237L225.816 161.189C222.205 165.295 221.465 170.585 204.635 182.995C187.815 195.405 138.065 227.365 124.497 236.057ZM130.031 237.06C142.891 235.13 191.081 235.09 207.191 225.49C223.291 215.9 223.421 187.17 226.671 179.5C219.181 185.187 197.671 203.647 181.671 213.117C165.671 222.587 139.191 232.527 130.031 237.06Z"/>
        </svg>
      </div>
    </div>
  </div>
</main>
</body>
</html>
