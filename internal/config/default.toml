# forge-metal default configuration
# Override with forge-metal.toml, --config flag, or environment variables.

[clickhouse]
addr = "127.0.0.1:9000"
database = "forge_metal"
username = "default"
# password via FORGE_METAL_CLICKHOUSE_PASSWORD env var

[clickhouse.replication]
enabled = false
# cluster = "forge_metal_cluster"
# When enabled, uses ReplicatedMergeTree. Otherwise MergeTree.

[zfs]
pool = "benchpool"
golden_dataset = "golden"
ci_dataset = "ci"

[wireguard]
interface = "wg0"
listen_port = 51820
network = "10.0.0.0/16"

[latitude]
region = "ASH"
plan = "s3-large-x86"
operating_system = "ubuntu_24_04_x64_lts"
billing = "hourly"

[ssh]
private_key_path = "~/.ssh/id_ed25519"
public_key_path = "~/.ssh/id_ed25519.pub"
user = "ubuntu"

[supplychain]
min_release_age_days = 3
osv_database_path = "/var/lib/osv-scanner"
guarddog_exclude_rules = ["npm-obfuscation"]
