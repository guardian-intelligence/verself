syntax = "proto3";

package forge_metal.v1;

option go_package = "github.com/forge-metal/forge-metal/internal/proto/v1;protov1";

// AgentService is the gRPC service that agents call on the controller.
service AgentService {
  // Heartbeat reports node health and capacity.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // GetJob blocks until a job is available for this node.
  rpc GetJob(GetJobRequest) returns (GetJobResponse);

  // ReportResult sends a completed job result back to the controller.
  rpc ReportResult(ReportResultRequest) returns (ReportResultResponse);
}

message HeartbeatRequest {
  string node_id = 1;
  string region = 2;
  string plan = 3;
  uint32 cores = 4;
  uint64 memory_mb = 5;
  uint32 active_jobs = 6;
  uint32 max_jobs = 7;
  // ZFS pool free space in bytes
  uint64 zfs_free_bytes = 8;
}

message HeartbeatResponse {
  // Controller may instruct the agent to drain (stop accepting jobs).
  bool drain = 1;
}

message GetJobRequest {
  string node_id = 1;
  // Golden snapshots available on this node.
  repeated string available_snapshots = 2;
}

message GetJobResponse {
  string job_id = 1;
  string repo = 2;
  string branch = 3;
  string commit_sha = 4;
  uint32 pr_number = 5;
  string golden_snapshot = 6;
  // Timeout for the entire job in seconds.
  uint32 timeout_seconds = 7;
}

message ReportResultRequest {
  string job_id = 1;
  string node_id = 2;
  bool success = 3;
  // Serialized CIEvent (wide event) as JSON for flexibility.
  bytes event_json = 4;
}

message ReportResultResponse {}
