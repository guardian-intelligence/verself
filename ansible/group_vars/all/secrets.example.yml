---
# Secrets for forge-metal.
# Copy to secrets.yml and fill in values:
#
#   cp secrets.example.yml secrets.yml
#
# secrets.yml is gitignored — never commit it.

# Cloudflare API token (Zone:DNS:Edit permission required)
# Create at: https://dash.cloudflare.com/profile/api-tokens
cloudflare_api_token: ""

# Auto-generated credentials are stored in ansible/.credentials/
# and managed by the Ansible `password` lookup. They are:
#
#   clickhouse_password           — ClickHouse default user password
#   hyperdx_admin_email_slug      — random slug for HyperDX admin email
#   hyperdx_admin_password        — base secret for HyperDX admin password
#   hyperdx_session_secret        — HyperDX session signing key
#   forgejo_admin_user_slug       — random slug for Forgejo admin username
#   forgejo_admin_email_slug      — random slug for Forgejo admin email
#   forgejo_admin_password        — base secret for Forgejo admin password
#
# These files are generated on first deploy and reused on subsequent deploys.
# For the default generated admin passwords, append `#@F1` to the file contents:
#   HyperDX: printf '%s#@F1\n' "$(cat ansible/.credentials/hyperdx_admin_password)"
#   Forgejo: printf '%s#@F1\n' "$(cat ansible/.credentials/forgejo_admin_password)"
# ClickHouse uses the file contents directly:
#   cat ansible/.credentials/clickhouse_password
# To override auto-generation, uncomment and set values here:
# hyperdx_admin_email: "admin@example.com"
# hyperdx_admin_password: "your-password-here"
# forgejo_admin_user: "admin"
# forgejo_admin_email: "admin@example.com"
# forgejo_admin_password: "your-password-here"
