---
# Secrets for forge-metal.
# Copy to secrets.yml and fill in values:
#
#   cp secrets.example.yml secrets.yml
#
# secrets.yml is gitignored — never commit it.

# Cloudflare API token (Zone:DNS:Edit permission required)
# Create at: https://dash.cloudflare.com/profile/api-tokens
cloudflare_api_token: ""

# Admin credentials are auto-generated at deploy time if not set here.
# Uncomment to pin them:
# clickstack_admin_email: "admin@example.com"
# clickstack_admin_password: "your-password-here"
# forgejo_admin_user: "admin"
# forgejo_admin_email: "admin@example.com"
# forgejo_admin_password: "your-password-here"
