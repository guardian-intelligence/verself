---
# Global variables for all nodes.

forge_metal_version: "0.1.0"

# Nix server profile path. All binaries here after nix_deploy role.
fm_bin: "/opt/forge-metal/profile/bin"

# Domain — set to your Cloudflare-managed domain (e.g. ci.example.com).
# Leave empty to use bare IP with self-signed TLS.
forge_metal_domain: ""

# Cloudflare DNS settings (only used when forge_metal_domain is set)
cloudflare_zone: ""       # Root zone, e.g. "example.com". Auto-derived from domain if empty.
cloudflare_proxied: false # Set true to route traffic through Cloudflare's CDN/WAF.

# WireGuard
wireguard_interface: wg0
wireguard_port: 51820
wireguard_network: "10.0.0.0/16"
