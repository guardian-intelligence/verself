---
# Multi-node production deployment.
# Separates worker and infra node roles.
#
# Usage: ansible-playbook -i inventory/hosts.ini playbooks/site.yml \
#          -e nix_server_profile_path=$(nix build .#server-profile --no-link --print-out-paths)

# ── Preflight (~2s) ──────────────────────────────────────────────────────────
# Catch missing prerequisites before the slow work starts.

- name: "Preflight: controller prerequisites"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Require nix_server_profile_path
      ansible.builtin.assert:
        that: nix_server_profile_path | default('') | length > 0
        fail_msg: >-
          nix_server_profile_path required — run:
          nix build .#server-profile --no-link --print-out-paths

    - name: Verify nix_server_profile_path exists on disk
      ansible.builtin.stat:
        path: "{{ nix_server_profile_path }}"
      register: preflight_nix_profile
      failed_when: not preflight_nix_profile.stat.exists

    - name: Zig must be available (needed by firecracker role)
      ansible.builtin.command: zig version
      changed_when: false

    - name: Ansible collection community.general must be installed
      ansible.builtin.command: ansible-galaxy collection list community.general
      changed_when: false
      register: preflight_cg
      failed_when: "'community.general' not in preflight_cg.stdout"

    - name: Ansible collection ansible.posix must be installed
      ansible.builtin.command: ansible-galaxy collection list ansible.posix
      changed_when: false
      register: preflight_ap
      failed_when: "'ansible.posix' not in preflight_ap.stdout"

- name: "Preflight: remote prerequisites"
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Require forge_metal_domain
      ansible.builtin.assert:
        that: forge_metal_domain | default('', true) | length > 0
        fail_msg: >-
          forge_metal_domain is required. Run: make setup-domain

    - name: Require cloudflare_api_token
      ansible.builtin.assert:
        that: cloudflare_api_token | default('', true) | length > 0
        fail_msg: >-
          cloudflare_api_token is empty. Run: make setup-domain

- name: "Preflight: worker prerequisites"
  hosts: workers
  gather_facts: false
  become: true
  tasks:
    - name: Check ZFS pool exists
      ansible.builtin.command: "zpool status benchpool"
      changed_when: false
      failed_when: false
      register: preflight_zpool

    - name: Check CI kernel exists
      ansible.builtin.stat:
        path: /var/lib/ci/vmlinux
      register: preflight_ci_kernel

    - name: Check CI rootfs exists
      ansible.builtin.stat:
        path: /var/lib/ci/rootfs.ext4
      register: preflight_ci_rootfs

    - name: Warn if ZFS pool is missing
      ansible.builtin.debug:
        msg: >-
          WARNING: ZFS pool 'benchpool' not found on {{ inventory_hostname }}.
          The zfs role will create it, but only if a suitable disk is available.
      when: preflight_zpool.rc != 0

    - name: Fail if CI artifacts are missing
      ansible.builtin.fail:
        msg: >-
          CI artifacts not staged on {{ inventory_hostname }}. The firecracker role
          requires vmlinux and rootfs.ext4 at /var/lib/ci/.
          Run: make guest-rootfs && make deploy-ci-artifacts
      when: not preflight_ci_kernel.stat.exists or not preflight_ci_rootfs.stat.exists

# ── Deploy ───────────────────────────────────────────────────────────────────

- name: Deploy Nix closure to all nodes
  hosts: all
  become: true
  roles:
    - nix_deploy
    - base
    - nftables
    - zfs

- name: Configure worker nodes
  hosts: workers
  become: true
  roles:
    - containerd
    - wireguard
    - firecracker

- name: Configure infrastructure nodes
  hosts: infra
  become: true
  roles:
    - wireguard
    - cloudflare_dns
    - clickhouse
    - tigerbeetle
    - postgresql
    - zitadel
    - otelcol
    - hyperdx
    - hyperdx_dashboards
    - verdaccio
    - forgejo
    - caddy
