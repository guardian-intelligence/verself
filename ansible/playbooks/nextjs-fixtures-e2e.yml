---
# Deploy the Firecracker/Forgejo stack and validate it against the controlled
# Next.js fixture repos.

- name: Deploy forge-metal and validate Next.js fixtures
  hosts: all
  become: true
  vars:
    fc_refresh_base_golden: true
    fc_prune_repo_goldens_on_refresh: true
    fc_prune_ci_children_on_refresh: true
  roles:
    - nix_deploy
    - base
    - verdaccio
    - forgejo
    - firecracker
    - ci_fixtures
