---
# Benchmark wipe + reprovision cycle.
# Runs N iterations of the full ci-e2e pipeline and records timing.
#
# Usage: ansible-playbook -i inventory/hosts.ini playbooks/benchmark-reprovision.yml \
#          -e nix_server_profile_path=$(nix build .#server-profile --no-link --print-out-paths) \
#          -e iterations=3
#
# Results are printed at the end and written to /tmp/forge-metal-bench-results.json on the controller.

- name: "Benchmark: Wipe + Reprovision (iteration {{ item }})"
  hosts: all
  become: true
  vars:
    clickstack_domain: "{{ ansible_default_ipv4.address }}"
    iteration: "{{ item }}"
  tasks:
    # --- WIPE ---
    - name: "Record wipe start time"
      ansible.builtin.set_fact:
        wipe_start: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%S.%fZ') }}"

    - name: Stop all services
      ansible.builtin.systemd:
        name: "{{ svc }}"
        state: stopped
      loop_control:
        loop_var: svc
      loop:
        - hyperdx-app
        - hyperdx-api
        - caddy
        - otelcol
        - clickhouse-server
        - mongod
      failed_when: false

    - name: Drop databases
      ansible.builtin.shell: |
        {{ fm_bin }}/clickhouse-client --query "DROP DATABASE IF EXISTS forge_metal" 2>/dev/null || true
        {{ fm_bin }}/mongosh --quiet --eval "db.dropDatabase()" hyperdx 2>/dev/null || true
      changed_when: true
      environment:
        PATH: "{{ fm_bin }}:{{ ansible_env.PATH }}"

    - name: Remove state files
      ansible.builtin.file:
        path: "{{ f }}"
        state: absent
      loop_control:
        loop_var: f
      loop:
        - /opt/clickstack/session_secret
        - /etc/clickstack/admin-credentials.txt
        - /opt/clickstack/hyperdx

    - name: "Record wipe end time"
      ansible.builtin.set_fact:
        wipe_end: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%S.%fZ') }}"

    # --- DEPLOY NIX CLOSURE ---
    - name: "Record nix deploy start time"
      ansible.builtin.set_fact:
        deploy_start: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%S.%fZ') }}"

    - name: Push Nix closure (skip if already present from previous iteration)
      delegate_to: localhost
      become: false
      ansible.builtin.command: >
        nix copy --to ssh://{{ ansible_user }}@{{ ansible_host }}
        {{ nix_server_profile_path }}
      changed_when: true

    - name: Install server profile
      ansible.builtin.command: >
        /nix/var/nix/profiles/default/bin/nix profile install
        --profile /opt/forge-metal/profile
        {{ nix_server_profile_path }}
      environment:
        NIX_CONFIG: "experimental-features = nix-command flakes"
      changed_when: true

    - name: "Record nix deploy end time"
      ansible.builtin.set_fact:
        deploy_end: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%S.%fZ') }}"

    # --- CONFIGURE ---
    - name: "Record configure start time"
      ansible.builtin.set_fact:
        configure_start: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%S.%fZ') }}"

  # Run clickstack role inline
- name: "Benchmark: Configure (iteration {{ item }})"
  hosts: all
  become: true
  vars:
    clickstack_domain: "{{ ansible_default_ipv4.address }}"
  roles:
    - base
    - clickstack

- name: "Benchmark: Verify + Record (iteration {{ item }})"
  hosts: all
  become: true
  vars:
    clickstack_domain: "{{ ansible_default_ipv4.address }}"
    iteration: "{{ item }}"
  tasks:
    - name: "Record configure end time"
      ansible.builtin.set_fact:
        configure_end: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%S.%fZ') }}"

    # --- HEALTH CHECK ---
    - name: "Record health check start time"
      ansible.builtin.set_fact:
        health_start: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%S.%fZ') }}"

    - name: Assert all services are running
      ansible.builtin.systemd:
        name: "{{ svc }}"
      register: svc_status
      failed_when: svc_status.status.ActiveState != "active"
      loop_control:
        loop_var: svc
      loop:
        - clickhouse-server
        - mongod
        - otelcol
        - hyperdx-api
        - hyperdx-app
        - caddy

    - name: Assert ClickHouse responds
      ansible.builtin.command: "{{ fm_bin }}/clickhouse-client --query 'SELECT 1'"
      changed_when: false

    - name: Assert HyperDX API via Caddy
      ansible.builtin.uri:
        url: "https://{{ clickstack_domain }}/api/installation"
        validate_certs: false
        return_content: true
      register: api_check
      failed_when: "'isTeamExisting' not in api_check.content"

    - name: "Record health check end time"
      ansible.builtin.set_fact:
        health_end: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%S.%fZ') }}"

    # --- RECORD RESULTS ---
    - name: Print iteration results
      ansible.builtin.debug:
        msg: |
          === Iteration {{ iteration }} ===
          Wipe:       {{ wipe_start }} -> {{ wipe_end }}
          Nix deploy: {{ deploy_start }} -> {{ deploy_end }}
          Configure:  {{ configure_start }} -> {{ configure_end }}
          Health:     {{ health_start }} -> {{ health_end }}
          Total:      {{ wipe_start }} -> {{ health_end }}
