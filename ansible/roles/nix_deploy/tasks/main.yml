---
# Install Nix on a stock Ubuntu host and push the server profile closure.
# After this role runs, all forge-metal binaries are at:
#   /opt/forge-metal/profile/bin/
#
# This replaces ALL apt installs, get_url downloads, and git clone+build steps.

- name: Check if Nix is installed
  ansible.builtin.stat:
    path: /nix/var/nix/profiles/default/bin/nix
  register: nix_binary

- name: Install Nix (multi-user daemon mode)
  when: not nix_binary.stat.exists
  block:
    - name: Download Nix installer
      ansible.builtin.get_url:
        url: https://nixos.org/nix/install
        dest: /tmp/nix-install.sh
        mode: "0755"

    - name: Run Nix installer
      ansible.builtin.command: /tmp/nix-install.sh --daemon --yes
      environment:
        NIX_INSTALLER_YES: "1"

    - name: Enable and start nix-daemon
      ansible.builtin.systemd:
        name: nix-daemon
        enabled: true
        state: started

- name: Ensure Nix daemon is running
  ansible.builtin.systemd:
    name: nix-daemon
    state: started

# Enable flakes on the remote host.
- name: Ensure Nix config directory exists
  ansible.builtin.file:
    path: /etc/nix
    state: directory
    mode: "0755"

- name: Enable flakes and nix-command
  ansible.builtin.copy:
    content: |
      experimental-features = nix-command flakes
      trusted-users = root {{ ansible_user }}
      require-sigs = false
    dest: /etc/nix/nix.conf
    mode: "0644"
  notify: restart nix-daemon

- name: Flush handlers (ensure nix-daemon restarts before copy)
  ansible.builtin.meta: flush_handlers

# Build the server profile locally (on the Ansible controller) and push to remote.
# This is the key step: the entire closure gets pushed in one shot.
- name: Push server profile closure to remote host
  delegate_to: localhost
  become: false
  ansible.builtin.command: >
    nix copy --to ssh://{{ ansible_user }}@{{ ansible_host }}
    {{ nix_server_profile_path }}
  changed_when: true

# Create a stable profile path so systemd units don't need store hashes.
- name: Create forge-metal directory
  ansible.builtin.file:
    path: /opt/forge-metal
    state: directory
    mode: "0755"

# Atomic symlink swap — simpler than nix profile, no conflict issues.
# The server profile is already a buildEnv (merged closure), so we just point at it.
- name: Activate server profile (atomic symlink swap)
  ansible.builtin.file:
    src: "{{ nix_server_profile_path }}"
    dest: /opt/forge-metal/profile
    state: link
    force: true

# Symlink for convenience: /usr/local/bin/fm -> profile
# This lets existing PATH expectations work.
- name: Symlink profile bin to /usr/local/bin/forge-metal-env
  ansible.builtin.file:
    src: /opt/forge-metal/profile/bin
    dest: /usr/local/bin/forge-metal-env
    state: link
    force: true

# Add profile to system PATH for all users.
- name: Add Nix profile to system PATH
  ansible.builtin.copy:
    content: |
      export PATH="/opt/forge-metal/profile/bin:$PATH"
    dest: /etc/profile.d/forge-metal.sh
    mode: "0644"
