---
# ClickStack defaults — all versions pinned for reproducible deploys.

# ClickHouse
clickhouse_version: "26.3.2.3"
clickhouse_http_port: 8123
clickhouse_native_port: 9000
clickhouse_data_path: /var/lib/clickhouse

# MongoDB
mongodb_version: "7.0"

# HyperDX
hyperdx_repo: "https://github.com/hyperdxio/hyperdx.git"
hyperdx_branch: "main"
hyperdx_version: "676e4f4bc91f7b67448b3be6d9bc5cbc3a004964"  # main @ 2026-04-02
hyperdx_api_port: 8000
hyperdx_app_port: 8080
hyperdx_opamp_port: 4320
hyperdx_install_dir: /opt/clickstack/hyperdx

# OTel Collector
otelcol_version: "0.120.0"

# Caddy
caddy_version: "2.*"  # pin to 2.x series
caddy_waf_mode: "DetectionOnly"  # DetectionOnly (log only) or On (block)

# Subdomain prefix for the ClickStack dashboard.
clickstack_subdomain: admin

# Full domain: auto-derived as <subdomain>.<forge_metal_domain>.
clickstack_domain: "{{ clickstack_subdomain }}.{{ forge_metal_domain }}"

# Admin user (seeded on first run via registration API)
# Email and password generated at deploy time if not set.
# clickstack_admin_email: ""
# clickstack_admin_password: ""
