---
- name: Download OTel Collector
  ansible.builtin.get_url:
    url: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otelcol_version }}/otelcol-contrib_{{ otelcol_version }}_linux_amd64.tar.gz"
    dest: "/tmp/otelcol-{{ otelcol_version }}.tar.gz"
    mode: "0644"

- name: Extract OTel Collector (version-aware)
  ansible.builtin.unarchive:
    src: "/tmp/otelcol-{{ otelcol_version }}.tar.gz"
    dest: /usr/local/bin/
    remote_src: true
    extra_opts: ["otelcol-contrib"]
  register: otelcol_extract

- name: Make OTel Collector executable
  ansible.builtin.file:
    path: /usr/local/bin/otelcol-contrib
    mode: "0755"

- name: Create OTel Collector config directory
  ansible.builtin.file:
    path: /etc/otelcol
    state: directory
    mode: "0755"

- name: Deploy OTel Collector config
  ansible.builtin.template:
    src: otelcol-config.yaml.j2
    dest: /etc/otelcol/config.yaml
    mode: "0644"
  notify: restart otelcol

- name: Deploy OTel Collector systemd unit
  ansible.builtin.template:
    src: otelcol.service.j2
    dest: /etc/systemd/system/otelcol.service
    mode: "0644"
  register: otelcol_unit

- name: Enable and start OTel Collector
  ansible.builtin.systemd:
    name: otelcol
    enabled: true
    state: started
    daemon_reload: true
