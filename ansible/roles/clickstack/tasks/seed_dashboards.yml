---
# Provision HyperDX metric source and dashboards.
#
# Idempotent: creates the metric source if missing, looks up each dashboard by
# name and creates or updates accordingly. Connection and source IDs are
# resolved at runtime since they are assigned by MongoDB on first boot.

# --------------------------------------------------------------------------- #
# Auth + connection resolution                                                 #
# --------------------------------------------------------------------------- #

- name: Get HyperDX user access key
  ansible.builtin.command: >
    mongosh --quiet --eval "db.users.findOne({}, {accessKey: 1, _id: 0}).accessKey" hyperdx
  register: _hdx_access_key_result
  changed_when: false

- name: Set access key fact
  ansible.builtin.set_fact:
    _hdx_access_key: "{{ _hdx_access_key_result.stdout | trim | regex_replace(\"^'|'$\", '') }}"

- name: Get sources and connection ID
  ansible.builtin.uri:
    url: "http://localhost:{{ hyperdx_api_port }}/api/v2/sources"
    method: GET
    headers:
      Authorization: "Bearer {{ _hdx_access_key }}"
    return_content: true
  register: _hdx_sources_result

- name: Set connection ID fact
  ansible.builtin.set_fact:
    _hdx_connection_id: "{{ _hdx_sources_result.json.data[0].connection }}"

# --------------------------------------------------------------------------- #
# Metric source (created via MongoDB — the v2 sources API is read-only)        #
# --------------------------------------------------------------------------- #

- name: Index existing sources by name
  ansible.builtin.set_fact:
    _hdx_source_names: "{{ _hdx_sources_result.json.data | map(attribute='name') | list }}"

- name: Get team ID
  ansible.builtin.command: >
    mongosh --quiet --eval "db.teams.findOne({}, {_id: 1})._id.toString()" hyperdx
  register: _hdx_team_id_result
  changed_when: false
  when: "'OTel Metrics' not in _hdx_source_names"

- name: Create OTel Metrics source
  ansible.builtin.command:
    argv:
      - mongosh
      - --quiet
      - --eval
      - >-
          db.sources.insertOne({
            name: "OTel Metrics",
            kind: "metric",
            team: ObjectId("{{ _hdx_team_id_result.stdout | trim | regex_replace("^'|'$", '') }}"),
            connection: ObjectId("{{ _hdx_connection_id }}"),
            from: { databaseName: "default", tableName: "" },
            metricTables: {
              gauge: "otel_metrics_gauge",
              sum: "otel_metrics_sum",
              histogram: "otel_metrics_histogram"
            },
            timestampValueExpression: "TimeUnix",
            resourceAttributesExpression: "ResourceAttributes",
            createdAt: new Date(),
            updatedAt: new Date()
          })
      - hyperdx
  when: "'OTel Metrics' not in _hdx_source_names"
  register: _hdx_metric_source_created

# Re-fetch sources to pick up the metric source ID.
- name: Refresh sources
  ansible.builtin.uri:
    url: "http://localhost:{{ hyperdx_api_port }}/api/v2/sources"
    method: GET
    headers:
      Authorization: "Bearer {{ _hdx_access_key }}"
    return_content: true
  register: _hdx_sources_result

- name: Set metric source ID fact
  ansible.builtin.set_fact:
    _hdx_metric_source_id: >-
      {{
        (_hdx_sources_result.json.data | selectattr('name', 'equalto', 'OTel Metrics') | first).id
      }}

# --------------------------------------------------------------------------- #
# Dashboards                                                                   #
# --------------------------------------------------------------------------- #

- name: List existing dashboards
  ansible.builtin.uri:
    url: "http://localhost:{{ hyperdx_api_port }}/api/v2/dashboards"
    method: GET
    headers:
      Authorization: "Bearer {{ _hdx_access_key }}"
    return_content: true
  register: _hdx_dashboards_result

# Build a name→id lookup so we can update in place.
- name: Index existing dashboards by name
  ansible.builtin.set_fact:
    _hdx_dashboard_ids: >-
      {{
        _hdx_dashboards_result.json.data
        | items2dict(key_name='name', value_name='id')
      }}

# --- Host Process Metrics ---------------------------------------------------

- name: Render Host Process Metrics dashboard
  ansible.builtin.set_fact:
    _hdx_host_metrics_body: "{{ lookup('template', 'dashboards/host-process-metrics.json.j2') }}"

- name: Create Host Process Metrics dashboard
  ansible.builtin.uri:
    url: "http://localhost:{{ hyperdx_api_port }}/api/v2/dashboards"
    method: POST
    headers:
      Authorization: "Bearer {{ _hdx_access_key }}"
      Content-Type: application/json
    body_format: json
    body: "{{ _hdx_host_metrics_body }}"
    status_code: [200]
  when: "'Host Process Metrics' not in _hdx_dashboard_ids"

- name: Update Host Process Metrics dashboard
  ansible.builtin.uri:
    url: "http://localhost:{{ hyperdx_api_port }}/api/v2/dashboards/{{ _hdx_dashboard_ids['Host Process Metrics'] }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ _hdx_access_key }}"
      Content-Type: application/json
    body_format: json
    body: "{{ _hdx_host_metrics_body }}"
    status_code: [200]
  when: "'Host Process Metrics' in _hdx_dashboard_ids"

# --------------------------------------------------------------------------- #
# Validate every tile renders data                                             #
# --------------------------------------------------------------------------- #

- name: Parse rendered dashboard
  ansible.builtin.set_fact:
    _hdx_rendered_tiles: "{{ (_hdx_host_metrics_body | from_json).tiles }}"

# --- Builder (metric) tiles — validated via charts/series API ----------------

- name: Collect builder tiles
  ansible.builtin.set_fact:
    _hdx_builder_tiles: >-
      {{ _hdx_rendered_tiles | selectattr('config.sourceId', 'defined') | list }}

- name: Validate builder tiles return data
  ansible.builtin.uri:
    url: "http://localhost:{{ hyperdx_api_port }}/api/v2/charts/series"
    method: POST
    headers:
      Authorization: "Bearer {{ _hdx_access_key }}"
      Content-Type: application/json
    body_format: json
    body:
      series:
        - sourceId: "{{ item.config.sourceId }}"
          aggFn: "{{ item.config.select[0].aggFn }}"
          field: "{{ item.config.select[0].valueExpression | default('') }}"
          metricName: "{{ item.config.select[0].metricName }}"
          metricDataType: "{{ item.config.select[0].metricType }}"
          where: ""
          groupBy: []
      startTime: "{{ ((ansible_date_time.epoch | int) - 300) * 1000 }}"
      endTime: "{{ (ansible_date_time.epoch | int) * 1000 }}"
      granularity: "1m"
    status_code: [200]
    return_content: true
  loop: "{{ _hdx_builder_tiles }}"
  loop_control:
    label: "{{ item.name }}"
  register: _hdx_builder_validation
  failed_when: >-
    _hdx_builder_validation is failed
    or (_hdx_builder_validation.json.data | default([]) | length) == 0

# --- Raw SQL tiles — validated via ClickHouse directly -----------------------

- name: Collect raw SQL tiles
  ansible.builtin.set_fact:
    _hdx_sql_tiles: >-
      {{ _hdx_rendered_tiles | selectattr('config.configType', 'defined') | list }}

- name: Validate raw SQL tiles return data
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/clickhouse-client"
      - --query
      - >-
          SELECT count() FROM (
            {{ item.config.sqlTemplate
               | regex_replace('\$__timeFilter_ms\((\w+)\)', '\1 >= now() - INTERVAL 5 MINUTE')
               | regex_replace('\$__timeInterval\((\w+)\)', 'toStartOfInterval(\1, INTERVAL 1 minute)')
            }}
          )
  loop: "{{ _hdx_sql_tiles }}"
  loop_control:
    label: "{{ item.name }}"
  register: _hdx_sql_validation
  failed_when: >-
    _hdx_sql_validation.rc != 0
    or (_hdx_sql_validation.stdout | trim | int) == 0
  changed_when: false
