---
# Seed ClickStack (HyperDX) admin user on first run via registration API.
#
# Credentials lifecycle:
#   1. If credentials exist in group_vars/all/credentials.auto.yml, use them.
#   2. If not, generate random credentials.
#   3. Seed the user, save to server, and write back to credentials.auto.yml
#      so the same credentials survive wipe+redeploy cycles.

- name: Check if a team already exists (via MongoDB)
  ansible.builtin.command: >
    mongosh --quiet --eval "db.teams.countDocuments()" hyperdx
  register: clickstack_team_count
  changed_when: false

- name: Set seeding needed fact
  ansible.builtin.set_fact:
    _clickstack_needs_seed: "{{ clickstack_team_count.stdout | trim | int == 0 }}"

- name: Generate admin credentials (if not provided)
  ansible.builtin.set_fact:
    clickstack_admin_email: "{{ clickstack_admin_email | default('admin+' ~ lookup('password', '/dev/null length=6 chars=ascii_lowercase,digits') ~ '@forge-metal.local', true) }}"
    clickstack_admin_password: "{{ clickstack_admin_password | default(lookup('password', '/dev/null length=24 chars=ascii_letters,digits') ~ '#@F1', true) }}"
  when: _clickstack_needs_seed | bool
  no_log: true

- name: Create clickstack credentials directory
  ansible.builtin.file:
    path: /etc/clickstack
    state: directory
    mode: "0700"
  when: _clickstack_needs_seed | bool

- name: Seed admin user via registration API
  ansible.builtin.uri:
    url: "http://localhost:{{ hyperdx_app_port }}/api/register/password"
    method: POST
    body_format: json
    body:
      email: "{{ clickstack_admin_email }}"
      password: "{{ clickstack_admin_password }}"
      confirmPassword: "{{ clickstack_admin_password }}"
    status_code: [200]
    headers:
      Content-Type: application/json
  when: _clickstack_needs_seed | bool
  no_log: true
  retries: 5
  delay: 3
  register: clickstack_seed_result
  until: clickstack_seed_result is not failed

- name: Save admin credentials to server
  ansible.builtin.copy:
    content: |
      # ClickStack Admin Credentials (generated by Ansible)
      # URL:      https://{{ clickstack_domain }}
      # Email:    {{ clickstack_admin_email }}
      # Password: {{ clickstack_admin_password }}
    dest: /etc/clickstack/admin-credentials.txt
    mode: "0600"
    owner: root
  when: _clickstack_needs_seed | bool
  no_log: true

- name: Persist credentials locally
  ansible.builtin.blockinfile:
    path: "{{ playbook_dir }}/../group_vars/all/credentials.auto.yml"
    create: true
    mode: "0600"
    marker: "# {mark} CLICKSTACK CREDENTIALS"
    block: |
      clickstack_admin_email: "{{ clickstack_admin_email }}"
      clickstack_admin_password: "{{ clickstack_admin_password }}"
  delegate_to: localhost
  become: false
  when: _clickstack_needs_seed | bool
  no_log: true
