---
# Seed admin user on first run via HyperDX registration API.

- name: Generate admin password if not provided
  ansible.builtin.set_fact:
    clickstack_admin_password: "{{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits') }}!@Fm"
  when: clickstack_admin_password is not defined or clickstack_admin_password == ""
  no_log: true

- name: Check if a team already exists (via MongoDB)
  ansible.builtin.command: >
    {{ fm_bin }}/mongosh --quiet --eval "db.teams.countDocuments()" hyperdx
  register: team_count
  changed_when: false

- name: Create clickstack credentials directory
  ansible.builtin.file:
    path: /etc/clickstack
    state: directory
    mode: "0700"

- name: Seed admin user via registration API
  ansible.builtin.uri:
    url: "http://localhost:{{ hyperdx_app_port }}/api/register/password"
    method: POST
    body_format: json
    body:
      email: "{{ clickstack_admin_email }}"
      password: "{{ clickstack_admin_password }}"
      confirmPassword: "{{ clickstack_admin_password }}"
    status_code: [200, 301, 302]
    headers:
      Content-Type: application/json
    follow_redirects: all
  register: seed_result
  when: team_count.stdout | trim | int == 0
  no_log: true
  failed_when: false

- name: Save admin credentials
  ansible.builtin.copy:
    content: |
      # ClickStack Admin Credentials (generated by Ansible)
      # URL:      https://{{ clickstack_domain }}
      # Email:    {{ clickstack_admin_email }}
      # Password: {{ clickstack_admin_password }}
    dest: /etc/clickstack/admin-credentials.txt
    mode: "0600"
    owner: root
  no_log: true

- name: Display admin credentials
  ansible.builtin.debug:
    msg: |
      ClickStack admin user seeded:
        URL:      https://{{ clickstack_domain }}
        Email:    {{ clickstack_admin_email }}
        Password: {{ clickstack_admin_password }}
  when: seed_result is changed
