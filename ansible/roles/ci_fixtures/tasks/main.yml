---
# Stage controlled fixture suites on the worker and verify expected CI outcomes.

- name: Resolve Forgejo admin credentials from password lookup
  ansible.builtin.set_fact:
    ci_fixtures_forgejo_admin_user: >-
      {{ forgejo_admin_user | default(
           'forge-admin-' ~ lookup('password', credentials_dir ~ '/forgejo_admin_user_slug length=4 chars=ascii_lowercase,digits'),
           true
         ) }}
    ci_fixtures_forgejo_admin_email: >-
      {{ forgejo_admin_email | default(
           'admin+' ~ lookup('password', credentials_dir ~ '/forgejo_admin_email_slug length=6 chars=ascii_lowercase,digits') ~ '@forge-metal.local',
           true
         ) }}
    ci_fixtures_forgejo_admin_password: >-
      {{ forgejo_admin_password | default(
           lookup('password', credentials_dir ~ '/forgejo_admin_password length=24 chars=ascii_letters,digits') ~ '#@F1',
           true
         ) }}
    ci_fixtures_clickhouse_password: >-
      {{ lookup('password', credentials_dir ~ '/clickhouse_password length=32 chars=ascii_letters,digits') }}
  no_log: true

- name: Verify forge-metal CLI is present on the worker
  ansible.builtin.stat:
    path: "{{ fm_bin }}/forge-metal"
  register: ci_fixtures_forge_metal_cli

- name: Fail when forge-metal CLI is missing
  ansible.builtin.fail:
    msg: >-
      forge-metal CLI not found at {{ fm_bin }}/forge-metal.
      Run: make deploy
  when: not ci_fixtures_forge_metal_cli.stat.exists

- name: Verify staged CI artifacts are present
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ firecracker_kernel_path | default('/var/lib/ci/vmlinux') }}"
    - "{{ firecracker_rootfs_path | default('/var/lib/ci/rootfs.ext4') }}"
    - "{{ firecracker_guest_artifact_manifest_path | default('/var/lib/ci/guest-artifacts.json') }}"
  register: ci_fixtures_required_paths

- name: Collect missing CI artifact paths
  ansible.builtin.set_fact:
    ci_fixtures_missing_required_paths: >-
      {{
        ci_fixtures_required_paths.results
        | rejectattr('stat.exists')
        | map(attribute='stat.path')
        | list
      }}

- name: Fail when staged CI artifacts are missing
  ansible.builtin.fail:
    msg: >-
      CI fixture prerequisites are missing on the worker: {{ ci_fixtures_missing_required_paths | join(', ') }}.
      Run: make ci-fixtures-refresh
  when: ci_fixtures_missing_required_paths | length > 0

- name: Wait for Forgejo to be reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ forgejo_port }}"
    timeout: 30

- name: Reset fixture staging directory
  ansible.builtin.file:
    path: /opt/forge-metal/test-fixtures
    state: absent

- name: Create fixture staging directory
  ansible.builtin.file:
    path: /opt/forge-metal/test-fixtures
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Copy local fixture repositories to server
  delegate_to: localhost
  become: false
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../test/fixtures/"
    dest: /opt/forge-metal/test-fixtures/
    delete: true
    recursive: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.next"
      - "--exclude=.turbo"
      - "--exclude=dist"
      - "--no-owner"
      - "--no-group"

- name: Create API token for fixture seeding
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ forgejo_port }}/api/v1/users/{{ ci_fixtures_forgejo_admin_user }}/tokens"
    method: POST
    user: "{{ ci_fixtures_forgejo_admin_user }}"
    password: "{{ ci_fixtures_forgejo_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "forge-metal-fixtures-{{ 999999999 | random }}"
      scopes:
        - "all"
    status_code: [201]
  register: ci_fixtures_api_token
  changed_when: true

- name: Parse fixture seeding API token
  ansible.builtin.set_fact:
    ci_fixtures_api_token_sha1: "{{ ci_fixtures_api_token.json.sha1 }}"

- name: Reset fixture suite CLI arguments
  ansible.builtin.set_fact:
    ci_fixtures_suite_args: []

- name: Build fixture suite CLI arguments
  ansible.builtin.set_fact:
    ci_fixtures_suite_args: "{{ ci_fixtures_suite_args + ['--suite', item] }}"
  loop: "{{ ci_fixtures_suites }}"

- name: Run fixture suites
  ansible.builtin.command:
    argv: "{{ [
      fm_bin ~ '/forge-metal',
      'fixtures',
      'run',
      '--fixtures-root', '/opt/forge-metal/test-fixtures',
      '--parallelism', (ci_fixtures_parallelism | int | string),
      '--forgejo-url', 'http://127.0.0.1:' ~ (forgejo_port | string),
      '--owner', ci_fixtures_forgejo_admin_user,
      '--username', ci_fixtures_forgejo_admin_user,
      '--email', ci_fixtures_forgejo_admin_email
    ] + ci_fixtures_suite_args }}"
  become: true
  environment:
    FORGE_METAL_CLICKHOUSE_PASSWORD: "{{ ci_fixtures_clickhouse_password }}"
    FORGE_METAL_FIXTURES_TOKEN: "{{ ci_fixtures_api_token_sha1 }}"
    PATH: "{{ fm_bin }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  changed_when: true
