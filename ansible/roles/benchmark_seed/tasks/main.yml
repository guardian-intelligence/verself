---
# Seed a Next.js benchmark repository in Forgejo with a CI workflow,
# open a PR, and verify the Actions pipeline runs to completion.
#
# Idempotent: skips repo creation if it already exists.

- name: Create API token for admin user
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ forgejo_port }}/api/v1/users/{{ forgejo_admin_user }}/tokens"
    method: POST
    user: "{{ forgejo_admin_user }}"
    password: "{{ forgejo_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "benchmark-seed-{{ 999999999 | random }}"
      scopes:
        - "all"
    status_code: [201]
  register: api_token_result

- name: Set API token fact
  ansible.builtin.set_fact:
    forgejo_api_token: "{{ api_token_result.json.sha1 }}"
  no_log: true

- name: Check if benchmark repo already exists
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ forgejo_port }}/api/v1/repos/{{ forgejo_admin_user }}/{{ benchmark_repo_name }}"
    method: GET
    headers:
      Authorization: "token {{ forgejo_api_token }}"
    status_code: [200, 404]
  register: repo_check

- name: Seed benchmark repo
  when: repo_check.status == 404
  block:
    - name: Create benchmark repository
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ forgejo_port }}/api/v1/user/repos"
        method: POST
        headers:
          Authorization: "token {{ forgejo_api_token }}"
        body_format: json
        body:
          name: "{{ benchmark_repo_name }}"
          auto_init: true
          default_branch: main
          description: "Next.js benchmark for CI baseline"
          private: false
        status_code: [201]

    - name: Clone next-learn from GitHub
      ansible.builtin.git:
        repo: "{{ benchmark_repo_clone_url }}"
        dest: /tmp/next-learn-upstream
        version: main
        depth: 1
        force: true

    - name: Prepare local repo workspace
      ansible.builtin.file:
        path: /tmp/benchmark-seed
        state: absent

    - name: Clone the Forgejo repo locally (token auth)
      ansible.builtin.shell: |
        git clone http://{{ forgejo_admin_user }}:{{ forgejo_api_token }}@127.0.0.1:{{ forgejo_port }}/{{ forgejo_admin_user }}/{{ benchmark_repo_name }}.git /tmp/benchmark-seed
      args:
        executable: /bin/bash
      environment:
        GIT_TERMINAL_PROMPT: "0"

    - name: Copy dashboard/final-example into repo
      ansible.builtin.shell: |
        cp -a /tmp/next-learn-upstream/{{ benchmark_repo_subdir }}/. /tmp/benchmark-seed/
      args:
        executable: /bin/bash

    - name: Create .forgejo/workflows directory
      ansible.builtin.file:
        path: /tmp/benchmark-seed/.forgejo/workflows
        state: directory
        mode: "0755"

    - name: Write CI workflow file
      ansible.builtin.copy:
        content: |
          name: CI
          on: [push, pull_request]
          jobs:
            build:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: '22'
                - run: npm install --registry=https://registry.npmjs.org
                - run: npx tsc --noEmit
        dest: /tmp/benchmark-seed/.forgejo/workflows/ci.yml
        mode: "0644"

    - name: Configure git identity and push to main
      ansible.builtin.shell: |
        cd /tmp/benchmark-seed
        git config user.name "{{ forgejo_admin_user }}"
        git config user.email "{{ forgejo_admin_email }}"
        git add -A
        git commit -m "feat: add Next.js dashboard app with CI workflow"
        git push origin main
      args:
        executable: /bin/bash
      environment:
        GIT_TERMINAL_PROMPT: "0"

    - name: Wait for push event to register
      ansible.builtin.pause:
        seconds: 3

    - name: Create trigger branch
      ansible.builtin.shell: |
        cd /tmp/benchmark-seed
        git checkout -b test/trigger-ci
        echo "// CI trigger test" >> /tmp/benchmark-seed/app/page.tsx
        git add -A
        git commit -m "test: trigger CI pipeline"
        git push origin test/trigger-ci
      args:
        executable: /bin/bash
      environment:
        GIT_TERMINAL_PROMPT: "0"

    - name: Create pull request
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ forgejo_port }}/api/v1/repos/{{ forgejo_admin_user }}/{{ benchmark_repo_name }}/pulls"
        method: POST
        headers:
          Authorization: "token {{ forgejo_api_token }}"
        body_format: json
        body:
          title: "test: trigger CI baseline run"
          head: "test/trigger-ci"
          base: "main"
        status_code: [201]
      register: pr_result

    - name: Log PR created
      ansible.builtin.debug:
        msg: "PR #{{ pr_result.json.number }} created: {{ pr_result.json.title }}"

- name: Wait for CI run to appear and complete
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ forgejo_port }}/api/v1/repos/{{ forgejo_admin_user }}/{{ benchmark_repo_name }}/actions/runs"
    method: GET
    headers:
      Authorization: "token {{ forgejo_api_token }}"
    return_content: true
  register: runs_result
  until: >
    runs_result.json.workflow_runs | default([]) | length > 0
    and (runs_result.json.workflow_runs | selectattr('status', 'equalto', 'success') | list | length > 0
         or runs_result.json.workflow_runs | selectattr('status', 'equalto', 'failure') | list | length > 0)
  retries: "{{ (benchmark_ci_timeout_seconds | int / 15) | int }}"
  delay: 15
  failed_when: false

- name: Evaluate CI results
  block:
    - name: Set CI run facts
      ansible.builtin.set_fact:
        ci_runs: "{{ runs_result.json.workflow_runs | default([]) }}"

    - name: Log CI run results
      ansible.builtin.debug:
        msg: |
          ========================================
          Forgejo Actions CI Results
          ========================================
          Total runs: {{ ci_runs | length }}
          {% for run in ci_runs %}
          Run #{{ run.id }}: status={{ run.status }} event={{ run.event }}
          {% endfor %}
          ========================================

    - name: Assert at least one CI run completed
      ansible.builtin.assert:
        that:
          - ci_runs | length > 0
          - ci_runs | selectattr('status', 'in', ['success', 'failure']) | list | length > 0
        fail_msg: "No CI runs completed within {{ benchmark_ci_timeout_seconds }}s timeout"
        success_msg: "CI pipeline executed successfully"

- name: Cleanup temp directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/next-learn-upstream
    - /tmp/benchmark-seed
