---
argument_specs:
  main:
    short_description: "Zitadel identity provider"
    description:
      - "Deploys Zitadel from the Nix profile. Creates the PostgreSQL"
      - "database and user, generates the masterkey, runs start-from-init"
      - "(idempotent first-run), and configures the systemd unit."
      - "Exports OTel traces to the collector on localhost:4317."
      - "Service ports come from the services registry (group_vars/all/services.yml)."
    options:
      zitadel_config_dir:
        type: path
        default: /etc/zitadel
        description: "Zitadel configuration directory."

      zitadel_subdomain:
        type: str
        default: auth
        description: "Subdomain for Zitadel (prepended to forge_metal_domain)."

      zitadel_domain:
        type: str
        description: "Full domain for Zitadel (auto-derived as <subdomain>.<forge_metal_domain>)."

      fm_bin:
        type: path
        required: true
        description: "Path to the Nix server profile bin directory."
