---
# Zitadel identity provider.
# Binary provided by the Nix server profile.
# Requires a running PostgreSQL instance (meta/main.yml dependency).

# --- Binary presence ---

- name: Verify Zitadel binary exists in Nix profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/zitadel"
  register: zitadel_binary
  failed_when: not zitadel_binary.stat.exists

# --- System user ---

- name: Create zitadel system group
  ansible.builtin.group:
    name: zitadel
    system: true

- name: Create zitadel system user
  ansible.builtin.user:
    name: zitadel
    group: zitadel
    system: true
    home: "{{ zitadel_config_dir }}"
    shell: /usr/sbin/nologin
    create_home: false

# --- PostgreSQL database and user ---

- name: Create zitadel PostgreSQL user
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres -c
      "DO $$ BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'zitadel') THEN
          CREATE ROLE zitadel LOGIN PASSWORD '{{ zitadel_db_password }}';
        ELSE
          ALTER ROLE zitadel PASSWORD '{{ zitadel_db_password }}';
        END IF;
      END $$;"
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  changed_when: false
  no_log: true

- name: Create zitadel database
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres -c
      "SELECT 'exists' FROM pg_database WHERE datname = 'zitadel';"
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  register: zitadel_db_check
  changed_when: false

- name: Create zitadel database if not exists
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U postgres -c
      "CREATE DATABASE zitadel OWNER zitadel;"
  environment:
    PGPASSWORD: "{{ postgresql_admin_password }}"
  when: "'exists' not in zitadel_db_check.stdout"
  changed_when: true

# --- Configuration ---

- name: Create Zitadel config directory
  ansible.builtin.file:
    path: "{{ zitadel_config_dir }}"
    state: directory
    owner: zitadel
    group: zitadel
    mode: "0700"

- name: Create credstore directory for Zitadel
  ansible.builtin.file:
    path: /etc/credstore/zitadel
    state: directory
    owner: root
    group: zitadel
    mode: "0750"

- name: Deploy Zitadel masterkey to credstore
  ansible.builtin.copy:
    content: "{{ zitadel_masterkey }}"
    dest: /etc/credstore/zitadel/masterkey
    owner: root
    group: zitadel
    mode: "0640"
  no_log: true
  notify:
    - restart zitadel

- name: Remove legacy masterkey from config directory
  ansible.builtin.file:
    path: "{{ zitadel_config_dir }}/masterkey"
    state: absent

- name: Deploy Zitadel config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ zitadel_config_dir }}/config.yaml"
    owner: zitadel
    group: zitadel
    mode: "0600"
  notify:
    - restart zitadel

- name: Deploy Zitadel first-instance steps
  ansible.builtin.template:
    src: steps.yaml.j2
    dest: "{{ zitadel_config_dir }}/steps.yaml"
    owner: zitadel
    group: zitadel
    mode: "0600"

# --- systemd unit ---
# Deployed before init/setup so the restart handler has a valid target.

- name: Deploy Zitadel systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Zitadel Identity Provider
      After=network.target postgresql.service
      Requires=postgresql.service

      [Service]
      Type=simple
      User=zitadel
      Group=zitadel
      LoadCredential=masterkey:/etc/credstore/zitadel/masterkey
      ExecStart={{ fm_bin }}/zitadel start \
        --masterkeyFile %d/masterkey \
        --config {{ zitadel_config_dir }}/config.yaml
      Restart=always
      RestartSec=5
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/zitadel.service
    mode: "0644"
  notify:
    - restart zitadel

- name: Remove legacy environment file (masterkey now read from file)
  ansible.builtin.file:
    path: "{{ zitadel_config_dir }}/env"
    state: absent

# --- First-run initialization ---
# Zitadel has a three-phase lifecycle: init (create schemas), setup (run
# migrations + create first instance), start (run the server).
# `init` and `setup` are idempotent and exit after completion.
# We gate on the eventstore schema to skip on subsequent deploys.
#
# Caveat: changing ExternalDomain/ExternalPort/ExternalSecure after first
# deploy requires rerunning `zitadel setup` manually — a restart alone
# won't apply the migration.

- name: Check if Zitadel has been initialized
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U zitadel -d zitadel -c
      "SELECT 1 FROM information_schema.schemata WHERE schema_name = 'eventstore';"
  environment:
    PGPASSWORD: "{{ zitadel_db_password }}"
  register: zitadel_init_check
  changed_when: false
  failed_when: false

- name: Run Zitadel init (create database schemas)
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/zitadel init
      --config {{ zitadel_config_dir }}/config.yaml
  become: true
  become_user: zitadel
  when: "'1' not in zitadel_init_check.stdout"
  changed_when: true

- name: Run Zitadel setup (migrations + first instance)
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/zitadel setup
      --masterkeyFile /etc/credstore/zitadel/masterkey
      --config {{ zitadel_config_dir }}/config.yaml
      --steps {{ zitadel_config_dir }}/steps.yaml
  become: true
  become_user: zitadel
  when: "'1' not in zitadel_init_check.stdout"
  changed_when: true

- name: Verify Zitadel schemas were created
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U zitadel -d zitadel -c
      "SELECT schema_name FROM information_schema.schemata WHERE schema_name IN ('eventstore', 'projections', 'system') ORDER BY schema_name;"
  environment:
    PGPASSWORD: "{{ zitadel_db_password }}"
  register: zitadel_schema_check
  changed_when: false
  when: "'1' not in zitadel_init_check.stdout"
  failed_when: "'eventstore' not in zitadel_schema_check.stdout"

# --- Admin PAT ---
# FirstInstance.Org.Machine creates a machine user (IAM_OWNER) and writes the
# PAT to PatPath during `zitadel setup`. Save a local copy for Ansible and
# export it as a fact so downstream roles can call the Admin API.

- name: Verify admin PAT was written by setup
  ansible.builtin.stat:
    path: "{{ zitadel_config_dir }}/admin.pat"
  register: zitadel_admin_pat_file
  failed_when: not zitadel_admin_pat_file.stat.exists

- name: Set admin PAT file permissions
  ansible.builtin.file:
    path: "{{ zitadel_config_dir }}/admin.pat"
    owner: zitadel
    group: zitadel
    mode: "0600"

- name: Read admin PAT
  ansible.builtin.slurp:
    src: "{{ zitadel_config_dir }}/admin.pat"
  register: zitadel_admin_pat_raw
  no_log: true

- name: Export admin PAT for downstream roles
  ansible.builtin.set_fact:
    zitadel_admin_pat: "{{ zitadel_admin_pat_raw.content | b64decode | trim }}"
  no_log: true

- name: Write admin PAT back to SOPS secrets
  ansible.builtin.command:
    cmd: >-
      sops --set '["zitadel_admin_pat"] "{{ zitadel_admin_pat }}"'
      {{ playbook_dir }}/../group_vars/all/secrets.sops.yml
  delegate_to: localhost
  become: false
  no_log: true
  changed_when: true

- name: Apply Zitadel unit changes before proceeding
  ansible.builtin.meta: flush_handlers

# --- Enable and start ---

- name: Enable and start Zitadel
  ansible.builtin.systemd:
    name: zitadel
    enabled: true
    state: started
    daemon_reload: true

# --- Readiness gate ---

- name: Wait for Zitadel to be ready
  ansible.builtin.wait_for:
    port: "{{ services.zitadel.port }}"
    host: "{{ services.zitadel.host }}"
    timeout: 60

# --- Health check ---

- name: Verify Zitadel healthz endpoint
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/debug/healthz"
    return_content: true
  register: zitadel_health
  retries: 5
  delay: 3
  until: zitadel_health.status == 200

# --- OIDC discovery smoke test ---

- name: Verify OIDC discovery endpoint
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/.well-known/openid-configuration"
    headers:
      Host: "{{ zitadel_domain }}"
    return_content: true
  register: zitadel_oidc
  retries: 3
  delay: 2
  until: zitadel_oidc.status == 200 and 'authorization_endpoint' in zitadel_oidc.content

# --- Login V2 bootstrap ---
# Login V2 is a separate Next.js app (zitadel-login) not embedded in the Zitadel
# Go binary. Zitadel 4.x defaults to LoginV2.Required=true, which makes OIDC
# redirect to /ui/v2/login/ — a path the binary cannot serve. The config sets
# DefaultInstance.Features.LoginV2.Required: false for new instances, but the
# existing instance has an explicit event overriding the default.
#
# The admin UI depends on the very login flow we need to fix (chicken-and-egg),
# so the only bootstrapping path is a direct event store INSERT.

- name: Check if Login V2 is currently required
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U zitadel -d zitadel -t -A -c
      "SELECT payload FROM eventstore.events2
       WHERE event_type = 'feature.instance.login_v2.set'
       ORDER BY position DESC LIMIT 1;"
  environment:
    PGPASSWORD: "{{ zitadel_db_password }}"
  register: zitadel_login_v2_state
  changed_when: false

- name: Disable Login V2 via event store (use embedded Login V1)
  ansible.builtin.command:
    cmd: >-
      {{ fm_bin }}/psql
      -h {{ services.postgresql.host }}
      -p {{ services.postgresql.port }}
      -U zitadel -d zitadel -c
      "INSERT INTO eventstore.events2
        (instance_id, aggregate_type, aggregate_id, event_type,
         sequence, revision, created_at, payload,
         creator, owner, position, in_tx_order)
       SELECT
         instance_id, 'feature', aggregate_id,
         'feature.instance.login_v2.set',
         (SELECT MAX(sequence) + 1 FROM eventstore.events2
          WHERE aggregate_type = 'feature'
            AND aggregate_id = e.aggregate_id
            AND instance_id = e.instance_id),
         2, NOW(),
         '{\"Value\": {\"required\": false}}'::jsonb,
         '', owner,
         EXTRACT(EPOCH FROM clock_timestamp()), 1
       FROM eventstore.events2 e
       WHERE event_type = 'feature.instance.login_v2.set'
         AND payload = '{\"Value\": {\"required\": true}}'::jsonb
       ORDER BY position DESC LIMIT 1;"
  environment:
    PGPASSWORD: "{{ zitadel_db_password }}"
  when: >-
    '"required": true' in zitadel_login_v2_state.stdout
  changed_when: true
  notify:
    - restart zitadel

- name: Apply Login V2 disable before health checks
  ansible.builtin.meta: flush_handlers

- name: Wait for Zitadel to be ready after Login V2 disable
  ansible.builtin.wait_for:
    port: "{{ services.zitadel.port }}"
    host: "{{ services.zitadel.host }}"
    timeout: 60
  when: >-
    '"required": true' in zitadel_login_v2_state.stdout

- name: Wait for Zitadel projections to rebuild
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/debug/healthz"
    return_content: true
  register: zitadel_post_restart_health
  retries: 10
  delay: 3
  until: zitadel_post_restart_health.status == 200
  when: >-
    '"required": true' in zitadel_login_v2_state.stdout

# --- Deep health checks ---

- name: Verify Login UI is reachable
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/ui/login/login"
    headers:
      Host: "{{ zitadel_domain }}"
    follow_redirects: none
    status_code: [200, 302]
  register: zitadel_login_ui
  retries: 5
  delay: 3
  until: zitadel_login_ui.status in [200, 302]

- name: Verify Console UI is reachable
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/ui/console/"
    headers:
      Host: "{{ zitadel_domain }}"
    return_content: true
  register: zitadel_console_ui
  retries: 3
  delay: 2
  until: zitadel_console_ui.status == 200

- name: Verify OIDC authorize endpoint is routable
  vars:
    oidc_url: >-
      http://{{ services.zitadel.host }}:{{ services.zitadel.port
      }}/oauth/v2/authorize?response_type=code&client_id=nonexistent&redirect_uri=http://localhost&scope=openid
  ansible.builtin.uri:
    url: "{{ oidc_url }}"
    headers:
      Host: "{{ zitadel_domain }}"
    follow_redirects: none
    status_code: [302, 400]
  register: zitadel_oidc_authorize
  retries: 3
  delay: 2
  until: zitadel_oidc_authorize.status in [302, 400]

- name: Verify Prometheus metrics endpoint
  ansible.builtin.uri:
    url: "http://{{ services.zitadel.host }}:{{ services.zitadel.port }}/debug/metrics"
    return_content: true
  register: zitadel_metrics
  retries: 3
  delay: 2
  until: >-
    zitadel_metrics.status == 200
    and 'projection_events_processed_total' in zitadel_metrics.content
