# --------------------------------------------------------------------------- #
# Validate every tile renders data                                             #
# --------------------------------------------------------------------------- #

- name: Parse rendered dashboard tiles for validation
  ansible.builtin.set_fact:
    hyperdx_dashboards_rendered_tiles: >-
      {{ (hyperdx_dashboards_host_metrics_body | from_json).tiles }}

- name: Collect builder tiles
  ansible.builtin.set_fact:
    hyperdx_dashboards_builder_tiles: >-
      {{ hyperdx_dashboards_rendered_tiles | selectattr('config.sourceId', 'defined') | list }}

- name: Validate builder tiles return data
  ansible.builtin.uri:
    url: "http://{{ services.hyperdx.host }}:{{ services.hyperdx.api_port }}/api/v2/charts/series"
    method: POST
    headers:
      Authorization: "Bearer {{ hyperdx_dashboards_access_key }}"
      Content-Type: application/json
    body_format: json
    body:
      series:
        - sourceId: "{{ item.config.sourceId }}"
          aggFn: "{{ item.config.select[0].aggFn }}"
          field: "{{ item.config.select[0].valueExpression | default('') }}"
          metricName: "{{ item.config.select[0].metricName }}"
          metricDataType: "{{ item.config.select[0].metricType }}"
          where: ""
          groupBy: []
      startTime: "{{ ((ansible_date_time.epoch | int) - 300) * 1000 }}"
      endTime: "{{ (ansible_date_time.epoch | int) * 1000 }}"
      granularity: "1m"
    status_code: [200]
    return_content: true
  loop: "{{ hyperdx_dashboards_builder_tiles }}"
  loop_control:
    label: "{{ item.name }}"
  register: hyperdx_dashboards_builder_validation
  failed_when: >-
    hyperdx_dashboards_builder_validation is failed
    or (hyperdx_dashboards_builder_validation.json.data | default([]) | length) == 0

- name: Collect raw SQL tiles
  ansible.builtin.set_fact:
    hyperdx_dashboards_sql_tiles: >-
      {{ hyperdx_dashboards_rendered_tiles | selectattr('config.configType', 'defined') | list }}

- name: Validate raw SQL tiles return data
  ansible.builtin.shell: |
    set -o pipefail
    cat <<'EOF' | {{ fm_bin }}/clickhouse-client --user default --password "$CLICKHOUSE_PASSWORD"
    SELECT count() FROM (
      {{ item.config.sqlTemplate
         | regex_replace('\$__timeFilter_ms\((\w+)\)', '\1 >= now() - INTERVAL 5 MINUTE')
         | regex_replace('\$__timeInterval\((\w+)\)', 'toStartOfInterval(\1, INTERVAL 1 minute)')
      }}
    )
    EOF
  args:
    executable: /bin/bash
  loop: "{{ hyperdx_dashboards_sql_tiles }}"
  loop_control:
    label: "{{ item.name }}"
  register: hyperdx_dashboards_sql_validation
  failed_when: >-
    hyperdx_dashboards_sql_validation.rc != 0
    or (hyperdx_dashboards_sql_validation.stdout | trim | int) == 0
  changed_when: false
  environment:
    CLICKHOUSE_PASSWORD: "{{ clickhouse_password }}"
