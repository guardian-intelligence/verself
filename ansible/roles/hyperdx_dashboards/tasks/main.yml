---
# Provision HyperDX metric source and dashboards.
#
# Idempotent: creates the metric source if missing, looks up each dashboard by
# name and creates or updates accordingly. Connection and source IDs are
# resolved at runtime since they are assigned by MongoDB on first boot.

# --------------------------------------------------------------------------- #
# Auth + connection resolution                                                 #
# --------------------------------------------------------------------------- #

- name: Get HyperDX user access key
  ansible.builtin.command: >
    mongosh --quiet --eval "db.users.findOne({}, {accessKey: 1, _id: 0}).accessKey" hyperdx
  register: hyperdx_dashboards_access_key_result
  changed_when: false

- name: Set access key fact
  ansible.builtin.set_fact:
    hyperdx_dashboards_access_key: "{{ hyperdx_dashboards_access_key_result.stdout | trim | regex_replace(\"^'|'$\", '') }}"

- name: Get sources and connection ID
  ansible.builtin.uri:
    url: "http://{{ services.hyperdx.host }}:{{ services.hyperdx.api_port }}/api/v2/sources"
    method: GET
    headers:
      Authorization: "Bearer {{ hyperdx_dashboards_access_key }}"
    return_content: true
  register: hyperdx_dashboards_sources_result

- name: Set connection ID fact
  ansible.builtin.set_fact:
    hyperdx_dashboards_connection_id: "{{ hyperdx_dashboards_sources_result.json.data[0].connection }}"

# --------------------------------------------------------------------------- #
# OTel Metrics source reconciliation                                          #
# --------------------------------------------------------------------------- #

- name: Build source index by name
  ansible.builtin.set_fact:
    hyperdx_dashboards_sources_by_name: >-
      {{
        hyperdx_dashboards_sources_result.json.data
        | items2dict(key_name='name', value_name='id')
      }}

- name: Get team ID
  ansible.builtin.command: >
    mongosh --quiet --eval "db.teams.findOne({}, {_id: 1})._id.toString()" hyperdx
  register: hyperdx_dashboards_team_id_result
  changed_when: false

- name: Reconcile OTel Metrics source metadata
  ansible.builtin.command:
    argv:
      - mongosh
      - --quiet
      - --eval
      - >-
          const teamId = ObjectId("{{ hyperdx_dashboards_team_id_result.stdout | trim | regex_replace("^'|'$", '') }}");
          const connectionId = ObjectId("{{ hyperdx_dashboards_connection_id }}");
          const otelLogsSourceId = "{{ hyperdx_dashboards_sources_by_name.get('OTel Logs', '') }}";
          const desiredFrom = { databaseName: "default", tableName: "otel_metrics_gauge" };
          const desiredMetricTables = {
            gauge: "otel_metrics_gauge",
            sum: "otel_metrics_sum",
            histogram: "otel_metrics_histogram"
          };
          const existing = db.sources.find({ name: "OTel Metrics" }).sort({ createdAt: 1, _id: 1 }).toArray();
          let changed = false;
          let keepId;

          if (existing.length === 0) {
            keepId = db.sources.insertOne({
              name: "OTel Metrics",
              kind: "metric",
              team: teamId,
              connection: connectionId,
              from: desiredFrom,
              metricTables: desiredMetricTables,
              timestampValueExpression: "TimeUnix",
              resourceAttributesExpression: "ResourceAttributes",
              logSourceId: otelLogsSourceId,
              createdAt: new Date(),
              updatedAt: new Date()
            }).insertedId;
            changed = true;
          } else {
            const canonical = existing.find((source) =>
              source.from
              && source.from.databaseName === desiredFrom.databaseName
              && source.from.tableName === desiredFrom.tableName
            ) || existing[0];
            keepId = canonical._id;

            const update = {
              name: "OTel Metrics",
              kind: "metric",
              team: teamId,
              connection: connectionId,
              from: desiredFrom,
              metricTables: desiredMetricTables,
              timestampValueExpression: "TimeUnix",
              resourceAttributesExpression: "ResourceAttributes",
              updatedAt: new Date()
            };
            if (otelLogsSourceId !== "") {
              update.logSourceId = otelLogsSourceId;
            }

            db.sources.updateOne({ _id: keepId }, { $set: update });
            const duplicates = existing
              .filter((source) => source._id.toString() !== keepId.toString())
              .map((source) => source._id);
            if (duplicates.length > 0) {
              db.sources.deleteMany({ _id: { $in: duplicates } });
            }

            const metricTables = canonical.metricTables || {};
            const metricTablesMatch =
              metricTables.gauge === desiredMetricTables.gauge
              && metricTables.sum === desiredMetricTables.sum
              && metricTables.histogram === desiredMetricTables.histogram;
            const connectionMatches =
              canonical.connection && canonical.connection.toString() === connectionId.toString();
            const teamMatches =
              canonical.team && canonical.team.toString() === teamId.toString();
            const logSourceMatches =
              otelLogsSourceId === "" || canonical.logSourceId === otelLogsSourceId;

            if (
              canonical.kind !== "metric"
              || !canonical.from
              || canonical.from.databaseName !== desiredFrom.databaseName
              || canonical.from.tableName !== desiredFrom.tableName
              || canonical.timestampValueExpression !== "TimeUnix"
              || canonical.resourceAttributesExpression !== "ResourceAttributes"
              || !connectionMatches
              || !teamMatches
              || !metricTablesMatch
              || !logSourceMatches
              || duplicates.length > 0
            ) {
              changed = true;
            }
          }

          print(JSON.stringify({ changed, keepId: keepId.toString() }));
      - hyperdx
  register: hyperdx_dashboards_metric_source_reconcile
  changed_when: >-
    (
      hyperdx_dashboards_metric_source_reconcile.stdout
      | from_json
    ).changed | bool

- name: Refresh sources
  ansible.builtin.uri:
    url: "http://{{ services.hyperdx.host }}:{{ services.hyperdx.api_port }}/api/v2/sources"
    method: GET
    headers:
      Authorization: "Bearer {{ hyperdx_dashboards_access_key }}"
    return_content: true
  register: hyperdx_dashboards_sources_result

# --------------------------------------------------------------------------- #
# Dashboards                                                                   #
# --------------------------------------------------------------------------- #

- name: List existing dashboards
  ansible.builtin.uri:
    url: "http://{{ services.hyperdx.host }}:{{ services.hyperdx.api_port }}/api/v2/dashboards"
    method: GET
    headers:
      Authorization: "Bearer {{ hyperdx_dashboards_access_key }}"
    return_content: true
  register: hyperdx_dashboards_dashboards_result

- name: Index existing dashboards by name
  ansible.builtin.set_fact:
    hyperdx_dashboards_dashboard_ids: >-
      {{
        hyperdx_dashboards_dashboards_result.json.data
        | items2dict(key_name='name', value_name='id')
      }}

- name: Render Host Process Metrics dashboard
  ansible.builtin.set_fact:
    hyperdx_dashboards_host_metrics_body: "{{ lookup('template', 'dashboards/host-process-metrics.json.j2') }}"

- name: Create Host Process Metrics dashboard
  ansible.builtin.uri:
    url: "http://{{ services.hyperdx.host }}:{{ services.hyperdx.api_port }}/api/v2/dashboards"
    method: POST
    headers:
      Authorization: "Bearer {{ hyperdx_dashboards_access_key }}"
      Content-Type: application/json
    body_format: json
    body: "{{ hyperdx_dashboards_host_metrics_body }}"
    status_code: [200]
  when: "'Host Process Metrics' not in hyperdx_dashboards_dashboard_ids"

- name: Update Host Process Metrics dashboard
  ansible.builtin.uri:
    url: "http://{{ services.hyperdx.host }}:{{ services.hyperdx.api_port }}/api/v2/dashboards/{{ hyperdx_dashboards_dashboard_ids['Host Process Metrics'] }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ hyperdx_dashboards_access_key }}"
      Content-Type: application/json
    body_format: json
    body: "{{ hyperdx_dashboards_host_metrics_body }}"
    status_code: [200]
  when: "'Host Process Metrics' in hyperdx_dashboards_dashboard_ids"

