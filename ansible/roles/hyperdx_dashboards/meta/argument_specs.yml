---
argument_specs:
  main:
    short_description: "HyperDX sources and dashboard synchronization"
    description:
      - "Uses the live HyperDX API plus MongoDB source metadata to create or"
      - "update the default infrastructure dashboards without rebuilding or"
      - "restarting the HyperDX application."
    options:
      hyperdx_dashboards_api_port:
        type: int
        default: 8000
        description: "HyperDX API server port used for dashboard synchronization."

      fm_bin:
        type: path
        required: true
        description: "Path to the Nix server profile bin directory."
