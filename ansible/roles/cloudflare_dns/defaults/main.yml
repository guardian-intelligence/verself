---
# cloudflare_dns defaults.

# The domain to point at this host (inherited from group_vars).
# forge_metal_domain: ""

# Cloudflare zone (root domain). Auto-derived from forge_metal_domain if empty.
# e.g. forge_metal_domain=ci.example.com → cloudflare_zone=example.com
# cloudflare_zone: ""

# DNS record type. Override to AAAA for IPv6-only hosts.
cloudflare_record_type: A

# TTL in seconds. 1 = Cloudflare automatic.
cloudflare_ttl: 1

# Whether to proxy traffic through Cloudflare (CDN/WAF).
# false = DNS-only (grey cloud) — Caddy handles TLS directly via Let's Encrypt.
# true  = proxied (orange cloud) — Cloudflare terminates TLS.
# cloudflare_proxied: false
