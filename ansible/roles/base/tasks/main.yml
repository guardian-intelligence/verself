---
# Base system configuration for all nodes.
# No package installs — all software comes from the Nix server profile.
# This role only handles system-level configuration that Nix doesn't manage.

- name: Install ZFS and ext4 utilities
  ansible.builtin.apt:
    name:
      - zfsutils-linux
      - e2fsprogs
    state: present
    update_cache: true

- name: Create bench-ci system user
  ansible.builtin.user:
    name: bench-ci
    system: true
    shell: /bin/bash
    home: /var/lib/bench-ci
    create_home: true

- name: Disable unsupported GSSAPIAuthentication in ssh_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/ssh_config
    regexp: '^\s*GSSAPIAuthentication'
    line: "    # GSSAPIAuthentication yes  # disabled — not supported by this SSH build"
    backrefs: false
  register: base_ssh_gssapi_update
  failed_when: false

- name: Allow bench-ci to execute forge-metal CI runs as root
  ansible.builtin.copy:
    content: |
      bench-ci ALL=(root) NOPASSWD: /opt/forge-metal/profile/bin/forge-metal ci exec *
    dest: /etc/sudoers.d/bench-ci-firecracker
    mode: "0440"
    validate: "visudo -cf %s"
