---
# Base system configuration for all nodes.
# No package installs — all software comes from the Nix server profile.
# This role only handles system-level configuration that Nix doesn't manage.

- name: Install ZFS utilities (kernel-dependent, must match running kernel)
  ansible.builtin.apt:
    name: zfsutils-linux
    state: present
    update_cache: true

- name: Create bench-ci system user
  ansible.builtin.user:
    name: bench-ci
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/bench-ci
    create_home: true

- name: Set system-wide npm registry to local Verdaccio
  ansible.builtin.copy:
    content: "registry=http://127.0.0.1:{{ verdaccio_port | default(4873) }}\n"
    dest: /etc/npmrc
    mode: "0644"
