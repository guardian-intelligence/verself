---
# Forgejo defaults.

# Subdomain prefix for the Forgejo git server.
forgejo_subdomain: git

# Full domain: auto-derived as <subdomain>.<forge_metal_domain>, or bare IP if no domain set.
forgejo_domain: "{{ (forgejo_subdomain ~ '.' ~ forge_metal_domain) if (forge_metal_domain | default('', true) | length > 0) else ansible_default_ipv4.address }}"

# Forgejo listens on this port (reverse-proxied by Caddy).
forgejo_port: 3000

# SSH port for git clone over SSH.
forgejo_ssh_port: 2222
