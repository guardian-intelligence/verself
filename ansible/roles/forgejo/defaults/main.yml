---
# Forgejo defaults.

# Subdomain prefix for the Forgejo git server.
forgejo_subdomain: git

# Full domain: auto-derived as <subdomain>.<forge_metal_domain>.
forgejo_domain: "{{ forgejo_subdomain }}.{{ forge_metal_domain }}"

# Forgejo listens on this port (reverse-proxied by Caddy).
forgejo_port: 3000

# SSH port for git clone over SSH.
forgejo_ssh_port: 2222

# Optional explicit runner capacity for Forgejo Actions jobs.
# When unset, forge-metal defaults to the host vCPU count.
# Forgejo runner does not support a true unbounded concurrency mode.
forgejo_runner_capacity:

# Admin user (seeded on first run via CLI)
# Username and password generated at deploy time if not set.
# forgejo_admin_user: ""
# forgejo_admin_password: ""
# forgejo_admin_email: ""
