---
- name: Reload systemd
  listen: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart Forgejo
  listen: restart forgejo
  ansible.builtin.systemd:
    name: forgejo
    state: restarted

- name: Restart Forgejo runner
  listen: restart forgejo-runner
  ansible.builtin.systemd:
    name: forgejo-runner
    state: restarted
