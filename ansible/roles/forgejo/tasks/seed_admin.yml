---
# Seed Forgejo admin user on first run via CLI.
# Credentials come from SOPS-decrypted variables (derived_secrets.yml).

- name: Check if any Forgejo users exist
  ansible.builtin.command: >
    {{ fm_bin }}/forgejo admin user list --config /etc/forgejo/app.ini
  become: true
  become_user: forgejo
  environment:
    FORGEJO_WORK_DIR: /var/lib/forgejo
  register: forgejo_users
  changed_when: false

- name: Set seeding needed fact
  ansible.builtin.set_fact:
    _forgejo_needs_seed: "{{ forgejo_users.stdout_lines | length <= 1 }}"

- name: Seed Forgejo admin user
  ansible.builtin.command:
    argv:
      - "{{ fm_bin }}/forgejo"
      - admin
      - user
      - create
      - --config
      - /etc/forgejo/app.ini
      - --username
      - "{{ forgejo_admin_user }}"
      - --email
      - "{{ forgejo_admin_email }}"
      - --password
      - "{{ forgejo_admin_password }}"
      - --admin
      - --must-change-password=false
  become: true
  become_user: forgejo
  environment:
    FORGEJO_WORK_DIR: /var/lib/forgejo
  when: _forgejo_needs_seed | bool
  changed_when: true
  no_log: true

- name: Remove legacy Forgejo admin credentials file from server
  ansible.builtin.file:
    path: /etc/forgejo/admin-credentials.txt
    state: absent
