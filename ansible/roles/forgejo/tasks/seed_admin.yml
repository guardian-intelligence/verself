---
# Seed Forgejo admin user on first run via CLI.
#
# Credentials lifecycle:
#   1. If credentials exist in group_vars/all/credentials.auto.yml, use them.
#   2. If not, generate random credentials.
#   3. Seed the user, save to server, and write back to credentials.auto.yml
#      so the same credentials survive wipe+redeploy cycles.

- name: Check if any Forgejo users exist
  ansible.builtin.command: >
    {{ fm_bin }}/forgejo admin user list --config /etc/forgejo/app.ini
  become: true
  become_user: forgejo
  environment:
    FORGEJO_WORK_DIR: /var/lib/forgejo
  register: forgejo_users
  changed_when: false

- name: Set seeding needed fact
  ansible.builtin.set_fact:
    _forgejo_needs_seed: "{{ forgejo_users.stdout_lines | length <= 1 }}"

- name: Generate Forgejo admin credentials (if not provided)
  ansible.builtin.set_fact:
    forgejo_admin_user: "{{ forgejo_admin_user | default('forge-admin-' ~ lookup('password', '/dev/null length=4 chars=ascii_lowercase,digits'), true) }}"
    forgejo_admin_email: "{{ forgejo_admin_email | default('admin+' ~ lookup('password', '/dev/null length=6 chars=ascii_lowercase,digits') ~ '@forge-metal.local', true) }}"
    forgejo_admin_password: "{{ forgejo_admin_password | default(lookup('password', '/dev/null length=24 chars=ascii_letters,digits') ~ '#@F1', true) }}"
  when: _forgejo_needs_seed | bool
  no_log: true

- name: Seed Forgejo admin user
  ansible.builtin.command: >
    {{ fm_bin }}/forgejo admin user create
      --config /etc/forgejo/app.ini
      --username "{{ forgejo_admin_user }}"
      --email "{{ forgejo_admin_email }}"
      --password "{{ forgejo_admin_password }}"
      --admin
      --must-change-password=false
  become: true
  become_user: forgejo
  environment:
    FORGEJO_WORK_DIR: /var/lib/forgejo
  when: _forgejo_needs_seed | bool
  no_log: true

- name: Save Forgejo admin credentials to server
  ansible.builtin.copy:
    content: |
      # Forgejo Admin Credentials (generated by Ansible)
      # URL:      https://{{ forgejo_domain }}
      # Username: {{ forgejo_admin_user }}
      # Email:    {{ forgejo_admin_email }}
      # Password: {{ forgejo_admin_password }}
    dest: /etc/forgejo/admin-credentials.txt
    mode: "0600"
    owner: root
  when: _forgejo_needs_seed | bool
  no_log: true

- name: Persist credentials locally
  ansible.builtin.blockinfile:
    path: "{{ playbook_dir }}/../group_vars/all/credentials.auto.yml"
    create: true
    mode: "0600"
    marker: "# {mark} FORGEJO CREDENTIALS"
    block: |
      forgejo_admin_user: "{{ forgejo_admin_user }}"
      forgejo_admin_email: "{{ forgejo_admin_email }}"
      forgejo_admin_password: "{{ forgejo_admin_password }}"
  delegate_to: localhost
  become: false
  when: _forgejo_needs_seed | bool
  no_log: true
