---
# Seed Forgejo admin user on first run via CLI.
# Credentials are generated by Ansible's password lookup and persisted
# in the local .credentials/ directory (one file per secret).

- name: Check if any Forgejo users exist
  ansible.builtin.command: >
    {{ fm_bin }}/forgejo admin user list --config /etc/forgejo/app.ini
  become: true
  become_user: forgejo
  environment:
    FORGEJO_WORK_DIR: /var/lib/forgejo
  register: forgejo_users
  changed_when: false

- name: Set seeding needed fact
  ansible.builtin.set_fact:
    _forgejo_needs_seed: "{{ forgejo_users.stdout_lines | length <= 1 }}"

- name: Resolve admin credentials from password lookup
  ansible.builtin.set_fact:
    forgejo_admin_user: >-
      {{ forgejo_admin_user | default(
           'forge-admin-' ~ lookup('password', credentials_dir ~ '/forgejo_admin_user_slug length=4 chars=ascii_lowercase,digits'),
           true
         ) }}
    forgejo_admin_email: >-
      {{ forgejo_admin_email | default(
           'admin+' ~ lookup('password', credentials_dir ~ '/forgejo_admin_email_slug length=6 chars=ascii_lowercase,digits') ~ '@forge-metal.local',
           true
         ) }}
    forgejo_admin_password: >-
      {{ forgejo_admin_password | default(
           lookup('password', credentials_dir ~ '/forgejo_admin_password length=24 chars=ascii_letters,digits') ~ '#@F1',
           true
         ) }}
  no_log: true

- name: Seed Forgejo admin user
  ansible.builtin.command: >
    {{ fm_bin }}/forgejo admin user create
      --config /etc/forgejo/app.ini
      --username "{{ forgejo_admin_user }}"
      --email "{{ forgejo_admin_email }}"
      --password "{{ forgejo_admin_password }}"
      --admin
      --must-change-password=false
  become: true
  become_user: forgejo
  environment:
    FORGEJO_WORK_DIR: /var/lib/forgejo
  when: _forgejo_needs_seed | bool
  changed_when: true
  no_log: true

- name: Remove legacy Forgejo admin credentials file from server
  ansible.builtin.file:
    path: /etc/forgejo/admin-credentials.txt
    state: absent
