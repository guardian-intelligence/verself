---
# Forgejo git server + CI runner configuration.
# Binaries provided by Nix server profile (forgejo, forgejo-runner).

- name: Create Forgejo user
  ansible.builtin.user:
    name: forgejo
    system: true
    shell: /bin/bash
    home: /var/lib/forgejo
    create_home: true

- name: Create Forgejo config directory
  ansible.builtin.file:
    path: /etc/forgejo
    state: directory
    owner: forgejo
    mode: "0750"

- name: Deploy Forgejo app.ini
  ansible.builtin.template:
    src: app.ini.j2
    dest: /etc/forgejo/app.ini
    owner: forgejo
    group: forgejo
    mode: "0640"
  notify:
    - restart forgejo

- name: Deploy Forgejo systemd unit
  ansible.builtin.template:
    src: forgejo.service.j2
    dest: /etc/systemd/system/forgejo.service
    mode: "0644"
  notify:
    - reload systemd
    - restart forgejo

- name: Enable and start Forgejo
  ansible.builtin.systemd:
    name: forgejo
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Forgejo to be ready
  ansible.builtin.wait_for:
    port: "{{ forgejo_port }}"
    host: 127.0.0.1
    timeout: 60

- name: Include admin user seeding
  ansible.builtin.include_tasks: seed_admin.yml

- name: Deploy Forgejo Runner systemd unit
  ansible.builtin.template:
    src: forgejo-runner.service.j2
    dest: /etc/systemd/system/forgejo-runner.service
    mode: "0644"
  notify:
    - reload systemd
    - restart forgejo-runner

- name: Flush handlers before runner registration
  ansible.builtin.meta: flush_handlers

- name: Include runner registration
  ansible.builtin.include_tasks: register_runner.yml
