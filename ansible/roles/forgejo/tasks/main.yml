---
# Forgejo git server + CI runner configuration.
# Binaries provided by Nix server profile (forgejo, forgejo-runner).

- name: Create Forgejo user
  ansible.builtin.user:
    name: forgejo
    system: true
    shell: /bin/bash
    home: /var/lib/forgejo
    create_home: true

- name: Create Forgejo config directory
  ansible.builtin.file:
    path: /etc/forgejo
    state: directory
    owner: forgejo
    mode: "0750"

- name: Deploy Forgejo systemd unit
  ansible.builtin.template:
    src: forgejo.service.j2
    dest: /etc/systemd/system/forgejo.service
    mode: "0644"
  notify:
    - reload systemd
    - restart forgejo

- name: Enable and start Forgejo
  ansible.builtin.systemd:
    name: forgejo
    enabled: true
    state: started
    daemon_reload: true

- name: Deploy Forgejo Runner systemd unit
  ansible.builtin.template:
    src: forgejo-runner.service.j2
    dest: /etc/systemd/system/forgejo-runner.service
    mode: "0644"
  notify:
    - reload systemd
    - restart forgejo-runner
