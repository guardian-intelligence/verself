---
# Forgejo git server + CI runner setup.

- name: Create Forgejo user
  ansible.builtin.user:
    name: forgejo
    system: true
    shell: /bin/bash
    home: /var/lib/forgejo
    create_home: true

- name: Download Forgejo binary
  ansible.builtin.get_url:
    url: "https://codeberg.org/forgejo/forgejo/releases/download/v{{ forgejo_version | default('10.0.1') }}/forgejo-{{ forgejo_version | default('10.0.1') }}-linux-amd64"
    dest: /usr/local/bin/forgejo
    mode: "0755"

- name: Create Forgejo config directory
  ansible.builtin.file:
    path: /etc/forgejo
    state: directory
    owner: forgejo
    mode: "0750"

- name: Deploy Forgejo systemd unit
  ansible.builtin.template:
    src: forgejo.service.j2
    dest: /etc/systemd/system/forgejo.service
    mode: "0644"
  notify:
    - reload systemd
    - restart forgejo

- name: Enable and start Forgejo
  ansible.builtin.systemd:
    name: forgejo
    enabled: true
    state: started

- name: Download Forgejo Runner
  ansible.builtin.get_url:
    url: "https://codeberg.org/forgejo/runner/releases/download/v{{ forgejo_runner_version | default('6.3.1') }}/forgejo-runner-{{ forgejo_runner_version | default('6.3.1') }}-linux-amd64"
    dest: /usr/local/bin/forgejo-runner
    mode: "0755"

- name: Deploy Forgejo Runner systemd unit
  ansible.builtin.template:
    src: forgejo-runner.service.j2
    dest: /etc/systemd/system/forgejo-runner.service
    mode: "0644"
  notify:
    - reload systemd
    - restart forgejo-runner
