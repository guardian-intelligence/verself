---
# Register Forgejo Actions runner (idempotent).
# Skips if .runner file already exists in bench-ci workdir (written by register).

- name: Check if runner is already registered
  ansible.builtin.stat:
    path: /var/lib/bench-ci/.runner
  register: forgejo_runner_file_stat

- name: Ensure /etc/forgejo is traversable by bench-ci
  ansible.builtin.file:
    path: /etc/forgejo
    mode: "0755"

- name: Resolve Forgejo runner capacity
  ansible.builtin.set_fact:
    forgejo_runner_capacity_effective: >-
      {{
        (
          forgejo_runner_capacity
          if forgejo_runner_capacity is not none
          else (
            ansible_facts.processor_vcpus
            | default(ansible_facts.processor_nproc)
            | default(1)
          )
        ) | int
      }}

- name: Assert Forgejo runner capacity is valid
  ansible.builtin.assert:
    that:
      - forgejo_runner_capacity_effective > 0
    fail_msg: >-
      Forgejo runner capacity must be a positive integer; got
      {{ forgejo_runner_capacity_effective }}.

- name: Generate default runner config
  ansible.builtin.command: >
    {{ fm_bin }}/forgejo-runner generate-config
  register: forgejo_runner_default_config
  changed_when: false

- name: Assert generated runner config exposes capacity
  ansible.builtin.assert:
    that:
      - forgejo_runner_default_config.stdout is search('(?m)^\\s*capacity:')
    fail_msg: "forgejo-runner generate-config no longer emits a capacity field; update register_runner.yml."

- name: Write runner config with explicit capacity
  ansible.builtin.copy:
    content: "{{ forgejo_runner_default_config.stdout }}"
    dest: /etc/forgejo/runner-config.yaml
    owner: bench-ci
    group: bench-ci
    mode: "0640"
  register: forgejo_runner_config_file

- name: Set runner capacity explicitly
  ansible.builtin.lineinfile:
    path: /etc/forgejo/runner-config.yaml
    regexp: '^(\s*)capacity:\s*.*$'
    line: '  capacity: {{ forgejo_runner_capacity_effective }}'
    backrefs: false
  register: forgejo_runner_capacity_line

- name: Runner registration block
  when: not forgejo_runner_file_stat.stat.exists
  block:
    - name: Get runner registration token via CLI
      ansible.builtin.command: >
        {{ fm_bin }}/forgejo --config /etc/forgejo/app.ini
        actions generate-runner-token
      become: true
      become_user: forgejo
      environment:
        FORGEJO_WORK_DIR: /var/lib/forgejo
      register: forgejo_runner_registration_token
      changed_when: false

    - name: Register runner with Forgejo
      ansible.builtin.command:
        argv:
          - "{{ fm_bin }}/forgejo-runner"
          - register
          - --no-interactive
          - --instance
          - "http://{{ services.forgejo.host }}:{{ services.forgejo.port }}"
          - --token
          - "{{ forgejo_runner_registration_token.stdout | trim }}"
          - --name
          - forge-metal-runner
          - --labels
          - ubuntu-latest:host
          - --config
          - /etc/forgejo/runner-config.yaml
        chdir: /var/lib/bench-ci
      become: true
      become_user: bench-ci
      environment:
        HOME: /var/lib/bench-ci
      changed_when: true

- name: Ensure forgejo-runner is enabled and started
  ansible.builtin.systemd:
    name: forgejo-runner
    enabled: true
    state: started

- name: Restart forgejo-runner when registration or config changes
  ansible.builtin.systemd:
    name: forgejo-runner
    state: restarted
    daemon_reload: true
  when: forgejo_runner_config_file.changed or forgejo_runner_capacity_line.changed or not forgejo_runner_file_stat.stat.exists

- name: Wait for runner to connect
  ansible.builtin.pause:
    seconds: 3
  when: not forgejo_runner_file_stat.stat.exists
