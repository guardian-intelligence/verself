---
# Bake Next.js app into the golden zvol so CI jobs have pre-installed deps.
# Idempotent: skips if /workspace/node_modules already exists inside the zvol.
#
# HACK: This entire file is next-learn specific. A real platform would accept
# any workload config and generalize the bake process. The SSL patch, seed.sql,
# and hardcoded paths are all next-learn artifacts.
#
# HACK: The Postgres seed task (line ~97) requires bind-mounting /dev and /proc
# into the chroot. On the server this was done manually — this Ansible task has
# NOT been tested end-to-end via ansible-playbook. The chroot needs:
#   mount --bind /dev $MNT/dev && mount --bind /proc $MNT/proc
# before pg_ctl start, and corresponding umounts after pg_ctl stop.
#
# HACK: zvol name is hardcoded to golden-zvol, but server uses golden-zvol2.
# These must match forge-vm-run.sh's GOLDEN_SNAP constant.

- name: Create temp mount point for golden zvol check
  ansible.builtin.tempfile:
    state: directory
    prefix: fc-golden-check-
  register: golden_check_mount

- name: Mount golden zvol for workspace check
  ansible.builtin.command: mount /dev/zvol/benchpool/golden-zvol {{ golden_check_mount.path }}

- name: Check if /workspace/node_modules exists (install completed)
  ansible.builtin.stat:
    path: "{{ golden_check_mount.path }}/workspace/node_modules"
  register: workspace_check

- name: Unmount golden zvol after check
  ansible.builtin.shell: |
    umount {{ golden_check_mount.path }}
  args:
    executable: /bin/bash

- name: Remove check mount point
  ansible.builtin.file:
    path: "{{ golden_check_mount.path }}"
    state: absent

- name: Populate golden image with Next.js app
  when: not workspace_check.stat.exists
  block:
    - name: Destroy old golden snapshot before modifying zvol
      ansible.builtin.command: zfs destroy benchpool/golden-zvol@ready
      failed_when: false

    - name: Clone next-learn from GitHub
      ansible.builtin.git:
        repo: "{{ fc_bench_clone_url }}"
        dest: /tmp/next-learn-upstream
        version: main
        depth: 1
        force: true

    - name: Create temp mount point for golden zvol
      ansible.builtin.tempfile:
        state: directory
        prefix: fc-golden-
      register: golden_mount

    - name: Mount golden zvol
      ansible.builtin.shell: |
        mount /dev/zvol/benchpool/golden-zvol {{ golden_mount.path }}
      args:
        executable: /bin/bash

    - name: Create workspace directory
      ansible.builtin.file:
        path: "{{ golden_mount.path }}/workspace"
        state: directory
        mode: "0755"

    - name: Copy dashboard app into workspace
      ansible.builtin.shell: |
        cp -a /tmp/next-learn-upstream/{{ fc_bench_subdir }}/. {{ golden_mount.path }}/workspace/
      args:
        executable: /bin/bash

    - name: Copy CA certificates into golden image for HTTPS
      ansible.builtin.shell: |
        mkdir -p {{ golden_mount.path }}/etc/ssl/certs
        cp /etc/ssl/certs/ca-certificates.crt {{ golden_mount.path }}/etc/ssl/certs/ca-certificates.crt
      args:
        executable: /bin/bash

    - name: Install npm dependencies inside golden image (chroot)
      ansible.builtin.shell: |
        chroot {{ golden_mount.path }} bash -c "cd /workspace && SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt npm install --registry=https://registry.npmjs.org"
      args:
        executable: /bin/bash
      environment:
        HOME: /root

    # HACK: next-learn hardcodes ssl: 'require' for Postgres connections.
    # We patch it to ssl: false because Postgres runs on localhost inside the VM.
    # LEARNING: sed -i fails on zvols with "Structure needs cleaning" after
    # repeated create/destroy cycles. Use python3 for reliable in-place edits.
    - name: Patch postgres client to disable SSL (localhost, no TLS needed)
      ansible.builtin.shell: |
        sed -i "s/ssl: 'require'/ssl: false/g" {{ golden_mount.path }}/workspace/app/lib/data.ts
        sed -i "s/ssl: 'require'/ssl: false/g" {{ golden_mount.path }}/workspace/app/seed/route.ts
      args:
        executable: /bin/bash

    - name: Copy seed.sql into golden image
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../ci/seed.sql"
        dest: "{{ golden_mount.path }}/tmp/seed.sql"
        mode: "0644"

    - name: Seed PostgreSQL database in golden image
      ansible.builtin.shell: |
        # Start Postgres inside the chroot
        chroot {{ golden_mount.path }} bash -c '
          mkdir -p /run/postgresql && chown postgres:postgres /run/postgresql
          su postgres -c "pg_ctl start -D /var/lib/postgresql/data -l /tmp/pg.log -o \"-k /run/postgresql -h localhost\" -w"
          su postgres -c "createdb nextlearn"
          su postgres -c "psql -d nextlearn -f /tmp/seed.sql"
          su postgres -c "pg_ctl stop -D /var/lib/postgresql/data -m fast"
        '
      args:
        executable: /bin/bash

    - name: Unmount golden zvol
      ansible.builtin.shell: |
        umount {{ golden_mount.path }}
      args:
        executable: /bin/bash

    - name: Remove mount point
      ansible.builtin.file:
        path: "{{ golden_mount.path }}"
        state: absent

- name: Ensure golden snapshot exists
  ansible.builtin.shell: |
    zfs list -t snapshot benchpool/golden-zvol@ready >/dev/null 2>&1 || \
    zfs snapshot benchpool/golden-zvol@ready
  args:
    executable: /bin/bash
  when: not workspace_check.stat.exists
