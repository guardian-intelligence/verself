---
# Create the forge-ci-action repo in Forgejo with a composite action
# that invokes forge-vm-run.sh.

- name: Check if forge-ci-action repo exists
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ forgejo_port }}/api/v1/repos/{{ forgejo_admin_user }}/{{ fc_action_repo_name }}"
    method: GET
    headers:
      Authorization: "token {{ forgejo_api_token }}"
    status_code: [200, 404]
  register: action_repo_check

- name: Create forge-ci-action repo
  when: action_repo_check.status == 404
  block:
    - name: Create repository via API
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ forgejo_port }}/api/v1/user/repos"
        method: POST
        headers:
          Authorization: "token {{ forgejo_api_token }}"
        body_format: json
        body:
          name: "{{ fc_action_repo_name }}"
          auto_init: true
          default_branch: main
          description: "Composite action: run CI inside Firecracker microVM with ZFS clone"
          private: false
        status_code: [201]

    - name: Prepare local workspace
      ansible.builtin.file:
        path: /tmp/fc-action-seed
        state: absent

    - name: Clone repo locally (token auth)
      ansible.builtin.shell: |
        git clone http://{{ forgejo_admin_user }}:{{ forgejo_api_token }}@127.0.0.1:{{ forgejo_port }}/{{ forgejo_admin_user }}/{{ fc_action_repo_name }}.git /tmp/fc-action-seed
      args:
        executable: /bin/bash
      environment:
        GIT_TERMINAL_PROMPT: "0"

    - name: Write action.yml
      ansible.builtin.shell: |
        cat > /tmp/fc-action-seed/action.yml << 'EOF'
        name: 'Forge CI (Firecracker)'
        description: 'Run CI inside a Firecracker microVM with ZFS clone workspace'
        inputs:
          run:
            description: 'Command to execute inside the VM'
            required: true
          work-dir:
            description: 'Working directory inside the VM'
            default: '/workspace'
        runs:
          using: 'composite'
          steps:
            - shell: bash
              run: sudo /opt/forge-metal/scripts/forge-vm-run.sh "${{ '{{' }} inputs.work-dir {{ '}}' }}" "${{ '{{' }} inputs.run {{ '}}' }}"
        EOF
      args:
        executable: /bin/bash

    - name: Commit and push action.yml
      ansible.builtin.shell: |
        cd /tmp/fc-action-seed
        git config user.name "{{ forgejo_admin_user }}"
        git config user.email "{{ forgejo_admin_email }}"
        git add -A
        git commit -m "feat: add Firecracker CI composite action"
        git push origin main
      args:
        executable: /bin/bash
      environment:
        GIT_TERMINAL_PROMPT: "0"
