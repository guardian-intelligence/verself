---
# Dev tools installation from dev-tools.json.
# Follows the established firecracker/containerd role pattern:
# get_url + checksum + version verify.
#
# Idempotent: every tool checks its current version before downloading.
# A no-op re-run should complete in <5s.

- name: Load dev tool pins from repo
  ansible.builtin.set_fact:
    dev_tools_manifest: "{{ lookup('ansible.builtin.file', dev_tools_json) | from_json }}"

# ============================================================================
# Go (must be first — go install tools depend on it)
# ============================================================================

- name: Check current Go version
  ansible.builtin.command: /usr/local/go/bin/go version
  register: dev_tools_go_current
  changed_when: false
  failed_when: false
  when: dev_tools_manifest.go is defined

- name: Install Go {{ dev_tools_manifest.go.version }}
  when:
    - dev_tools_manifest.go is defined
    - dev_tools_go_current.rc != 0 or dev_tools_manifest.go.version not in (dev_tools_go_current.stdout | default(''))
  block:
    - name: Remove stale Go installation
      ansible.builtin.file:
        path: /usr/local/go
        state: absent

    - name: Download and extract Go
      ansible.builtin.unarchive:
        src: "{{ dev_tools_manifest.go.url }}"
        dest: /usr/local
        remote_src: true

- name: Ensure Go and go-install tools are in system PATH
  ansible.builtin.copy:
    content: |
      export PATH=/usr/local/go/bin:{{ dev_tools_gopath }}/bin:$PATH
    dest: /etc/profile.d/go.sh
    mode: "0644"
  when: dev_tools_manifest.go is defined

- name: Verify Go version
  ansible.builtin.command: /usr/local/go/bin/go version
  register: dev_tools_go_version_check
  changed_when: false
  failed_when: "dev_tools_manifest.go.version not in dev_tools_go_version_check.stdout"
  when: dev_tools_manifest.go is defined

# ============================================================================
# Zig
# ============================================================================

- name: Create Zig install directory
  ansible.builtin.file:
    path: /usr/local/zig
    state: directory
    mode: "0755"
  when: dev_tools_manifest.zig is defined

- name: Check current Zig version
  ansible.builtin.command: /usr/local/zig/zig version
  register: dev_tools_zig_current
  changed_when: false
  failed_when: false
  when: dev_tools_manifest.zig is defined

- name: Install Zig {{ dev_tools_manifest.zig.version }}
  when:
    - dev_tools_manifest.zig is defined
    - dev_tools_zig_current.rc != 0 or dev_tools_manifest.zig.version not in (dev_tools_zig_current.stdout | default(''))
  block:
    - name: Download and extract Zig
      ansible.builtin.unarchive:
        src: "{{ dev_tools_manifest.zig.url }}"
        dest: /usr/local/zig
        remote_src: true
        extra_opts: ["--strip-components=1"]

    - name: Symlink zig to /usr/local/bin
      ansible.builtin.file:
        src: /usr/local/zig/zig
        dest: /usr/local/bin/zig
        state: link

- name: Verify Zig version
  ansible.builtin.command: /usr/local/zig/zig version
  register: dev_tools_zig_version_check
  changed_when: false
  failed_when: "dev_tools_manifest.zig.version not in dev_tools_zig_version_check.stdout"
  when: dev_tools_manifest.zig is defined

# ============================================================================
# OpenTofu (zip → single binary)
# ============================================================================

- name: Check current OpenTofu version
  ansible.builtin.command: /usr/local/bin/tofu version -json
  register: dev_tools_tofu_current
  changed_when: false
  failed_when: false
  when: dev_tools_manifest.tofu is defined

- name: Install OpenTofu {{ dev_tools_manifest.tofu.version }}
  when:
    - dev_tools_manifest.tofu is defined
    - dev_tools_tofu_current.rc != 0 or dev_tools_manifest.tofu.version not in (dev_tools_tofu_current.stdout | default(''))
  block:
    - name: Create temp dir for OpenTofu
      ansible.builtin.tempfile:
        state: directory
      register: dev_tools_tofu_tmp

    - name: Download OpenTofu zip
      ansible.builtin.get_url:
        url: "{{ dev_tools_manifest.tofu.url }}"
        dest: "{{ dev_tools_tofu_tmp.path }}/tofu.zip"
        checksum: "sha256:{{ dev_tools_manifest.tofu.sha256 }}"
        mode: "0644"

    - name: Extract OpenTofu
      ansible.builtin.unarchive:
        src: "{{ dev_tools_tofu_tmp.path }}/tofu.zip"
        dest: "{{ dev_tools_tofu_tmp.path }}"
        remote_src: true

    - name: Install tofu binary
      ansible.builtin.copy:
        src: "{{ dev_tools_tofu_tmp.path }}/tofu"
        dest: /usr/local/bin/tofu
        remote_src: true
        mode: "0755"

    - name: Clean up temp dir
      ansible.builtin.file:
        path: "{{ dev_tools_tofu_tmp.path }}"
        state: absent

- name: Verify OpenTofu version
  ansible.builtin.command: /usr/local/bin/tofu version -json
  register: dev_tools_tofu_version_check
  changed_when: false
  failed_when: "dev_tools_manifest.tofu.version not in dev_tools_tofu_version_check.stdout"
  when: dev_tools_manifest.tofu is defined

# ============================================================================
# protoc (zip → /usr/local/bin + /usr/local/include)
# ============================================================================

- name: Check current protoc version
  ansible.builtin.command: /usr/local/bin/protoc --version
  register: dev_tools_protoc_current
  changed_when: false
  failed_when: false
  when: dev_tools_manifest.protoc is defined

- name: Install protoc {{ dev_tools_manifest.protoc.version }}
  when:
    - dev_tools_manifest.protoc is defined
    - dev_tools_protoc_current.rc != 0 or dev_tools_manifest.protoc.version not in (dev_tools_protoc_current.stdout | default(''))
  block:
    - name: Create temp dir for protoc
      ansible.builtin.tempfile:
        state: directory
      register: dev_tools_protoc_tmp

    - name: Download protoc zip
      ansible.builtin.get_url:
        url: "{{ dev_tools_manifest.protoc.url }}"
        dest: "{{ dev_tools_protoc_tmp.path }}/protoc.zip"
        checksum: "sha256:{{ dev_tools_manifest.protoc.sha256 }}"
        mode: "0644"

    - name: Extract protoc
      ansible.builtin.unarchive:
        src: "{{ dev_tools_protoc_tmp.path }}/protoc.zip"
        dest: /usr/local
        remote_src: true

    - name: Clean up temp dir
      ansible.builtin.file:
        path: "{{ dev_tools_protoc_tmp.path }}"
        state: absent

- name: Verify protoc version
  ansible.builtin.command: /usr/local/bin/protoc --version
  register: dev_tools_protoc_version_check
  changed_when: false
  failed_when: "dev_tools_manifest.protoc.version not in dev_tools_protoc_version_check.stdout"
  when: dev_tools_manifest.protoc is defined

# ============================================================================
# Single-binary downloads: buf, jq, sops
# get_url without force: skips download when dest exists and checksum matches.
# ============================================================================

- name: Install buf {{ dev_tools_manifest.buf.version }}
  ansible.builtin.get_url:
    url: "{{ dev_tools_manifest.buf.url }}"
    dest: /usr/local/bin/buf
    checksum: "sha256:{{ dev_tools_manifest.buf.sha256 }}"
    mode: "0755"
  when: dev_tools_manifest.buf is defined

- name: Verify buf version
  ansible.builtin.command: /usr/local/bin/buf --version
  register: dev_tools_buf_version_check
  changed_when: false
  failed_when: "dev_tools_manifest.buf.version not in dev_tools_buf_version_check.stdout"
  when: dev_tools_manifest.buf is defined

- name: Install jq {{ dev_tools_manifest.jq.version }}
  ansible.builtin.get_url:
    url: "{{ dev_tools_manifest.jq.url }}"
    dest: /usr/local/bin/jq
    checksum: "sha256:{{ dev_tools_manifest.jq.sha256 }}"
    mode: "0755"
  when: dev_tools_manifest.jq is defined

- name: Verify jq version
  ansible.builtin.command: /usr/local/bin/jq --version
  register: dev_tools_jq_version_check
  changed_when: false
  failed_when: "dev_tools_manifest.jq.version not in dev_tools_jq_version_check.stdout"
  when: dev_tools_manifest.jq is defined

- name: Install sops {{ dev_tools_manifest.sops.version }}
  ansible.builtin.get_url:
    url: "{{ dev_tools_manifest.sops.url }}"
    dest: /usr/local/bin/sops
    checksum: "sha256:{{ dev_tools_manifest.sops.sha256 }}"
    mode: "0755"
  when: dev_tools_manifest.sops is defined

- name: Verify sops version
  ansible.builtin.command: /usr/local/bin/sops --version
  register: dev_tools_sops_version_check
  changed_when: false
  failed_when: "dev_tools_manifest.sops.version not in dev_tools_sops_version_check.stdout"
  when: dev_tools_manifest.sops is defined

# ============================================================================
# shellcheck (tarball → single binary)
# ============================================================================

- name: Check current shellcheck version
  ansible.builtin.command: /usr/local/bin/shellcheck --version
  register: dev_tools_shellcheck_current
  changed_when: false
  failed_when: false
  when: dev_tools_manifest.shellcheck is defined

- name: Install shellcheck {{ dev_tools_manifest.shellcheck.version }}
  when:
    - dev_tools_manifest.shellcheck is defined
    - dev_tools_shellcheck_current.rc != 0 or dev_tools_manifest.shellcheck.version not in (dev_tools_shellcheck_current.stdout | default(''))
  block:
    - name: Create temp dir for shellcheck
      ansible.builtin.tempfile:
        state: directory
      register: dev_tools_shellcheck_tmp

    - name: Download shellcheck tarball
      ansible.builtin.get_url:
        url: "{{ dev_tools_manifest.shellcheck.url }}"
        dest: "{{ dev_tools_shellcheck_tmp.path }}/shellcheck.tar.xz"
        checksum: "sha256:{{ dev_tools_manifest.shellcheck.sha256 }}"
        mode: "0644"

    - name: Extract shellcheck
      ansible.builtin.unarchive:
        src: "{{ dev_tools_shellcheck_tmp.path }}/shellcheck.tar.xz"
        dest: "{{ dev_tools_shellcheck_tmp.path }}"
        remote_src: true

    - name: Install shellcheck binary
      ansible.builtin.copy:
        src: "{{ dev_tools_shellcheck_tmp.path }}/shellcheck-v{{ dev_tools_manifest.shellcheck.version }}/shellcheck"
        dest: /usr/local/bin/shellcheck
        remote_src: true
        mode: "0755"

    - name: Clean up temp dir
      ansible.builtin.file:
        path: "{{ dev_tools_shellcheck_tmp.path }}"
        state: absent

- name: Verify shellcheck version
  ansible.builtin.command: /usr/local/bin/shellcheck --version
  register: dev_tools_shellcheck_version_check
  changed_when: false
  failed_when: "dev_tools_manifest.shellcheck.version not in dev_tools_shellcheck_version_check.stdout"
  when: dev_tools_manifest.shellcheck is defined

# ============================================================================
# age (tarball with two binaries: age, age-keygen)
# ============================================================================

- name: Check current age version
  ansible.builtin.command: /usr/local/bin/age --version
  register: dev_tools_age_current
  changed_when: false
  failed_when: false
  when: dev_tools_manifest.age is defined

- name: Install age {{ dev_tools_manifest.age.version }}
  when:
    - dev_tools_manifest.age is defined
    - dev_tools_age_current.rc != 0 or dev_tools_manifest.age.version not in (dev_tools_age_current.stdout | default(''))
  block:
    - name: Create temp dir for age
      ansible.builtin.tempfile:
        state: directory
      register: dev_tools_age_tmp

    - name: Download age tarball
      ansible.builtin.get_url:
        url: "{{ dev_tools_manifest.age.url }}"
        dest: "{{ dev_tools_age_tmp.path }}/age.tar.gz"
        checksum: "sha256:{{ dev_tools_manifest.age.sha256 }}"
        mode: "0644"

    - name: Extract age
      ansible.builtin.unarchive:
        src: "{{ dev_tools_age_tmp.path }}/age.tar.gz"
        dest: "{{ dev_tools_age_tmp.path }}"
        remote_src: true

    - name: Install age binaries
      ansible.builtin.copy:
        src: "{{ dev_tools_age_tmp.path }}/age/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        remote_src: true
        mode: "0755"
      loop:
        - age
        - age-keygen

    - name: Clean up temp dir
      ansible.builtin.file:
        path: "{{ dev_tools_age_tmp.path }}"
        state: absent

- name: Verify age version
  ansible.builtin.command: /usr/local/bin/age --version
  register: dev_tools_age_version_check
  changed_when: false
  failed_when: "dev_tools_manifest.age.version not in dev_tools_age_version_check.stdout"
  when: dev_tools_manifest.age is defined

# ============================================================================
# ClickHouse (tarball → single multi-tool binary + symlinks)
# ============================================================================

- name: Check current ClickHouse version
  ansible.builtin.command: /usr/local/bin/clickhouse client --version
  register: dev_tools_clickhouse_current
  changed_when: false
  failed_when: false
  when: dev_tools_manifest.clickhouse is defined

- name: Install ClickHouse {{ dev_tools_manifest.clickhouse.version }}
  when:
    - dev_tools_manifest.clickhouse is defined
    - dev_tools_clickhouse_current.rc != 0 or dev_tools_manifest.clickhouse.version not in (dev_tools_clickhouse_current.stdout | default(''))
  block:
    - name: Create temp dir for ClickHouse
      ansible.builtin.tempfile:
        state: directory
      register: dev_tools_clickhouse_tmp

    - name: Download ClickHouse tarball
      ansible.builtin.get_url:
        url: "{{ dev_tools_manifest.clickhouse.url }}"
        dest: "{{ dev_tools_clickhouse_tmp.path }}/clickhouse.tgz"
        checksum: "sha256:{{ dev_tools_manifest.clickhouse.sha256 }}"
        mode: "0644"

    - name: Extract ClickHouse
      ansible.builtin.unarchive:
        src: "{{ dev_tools_clickhouse_tmp.path }}/clickhouse.tgz"
        dest: "{{ dev_tools_clickhouse_tmp.path }}"
        remote_src: true

    - name: Install ClickHouse binary
      ansible.builtin.copy:
        src: "{{ dev_tools_clickhouse_tmp.path }}/clickhouse-common-static-{{ dev_tools_manifest.clickhouse.version }}/usr/bin/clickhouse"
        dest: /usr/local/bin/clickhouse
        remote_src: true
        mode: "0755"

    - name: Create ClickHouse symlinks
      ansible.builtin.file:
        src: /usr/local/bin/clickhouse
        dest: "/usr/local/bin/clickhouse-{{ item }}"
        state: link
      loop:
        - server
        - client
        - local
        - keeper
        - benchmark

    - name: Clean up temp dir
      ansible.builtin.file:
        path: "{{ dev_tools_clickhouse_tmp.path }}"
        state: absent

- name: Verify ClickHouse version
  ansible.builtin.command: /usr/local/bin/clickhouse client --version
  register: dev_tools_clickhouse_version_check
  changed_when: false
  failed_when: "dev_tools_manifest.clickhouse.version not in dev_tools_clickhouse_version_check.stdout"
  when: dev_tools_manifest.clickhouse is defined

# ============================================================================
# go install tools (requires Go already installed above)
# Check version before running go install — go install is a no-op when the
# binary exists and matches, but the module download still takes seconds.
# ============================================================================

- name: Ensure GOPATH bin directory exists
  ansible.builtin.file:
    path: "{{ dev_tools_gopath }}/bin"
    state: directory
    mode: "0755"

- name: Check golangci-lint version
  ansible.builtin.command: "{{ dev_tools_gopath }}/bin/golangci-lint --version"
  register: dev_tools_golangci_current
  changed_when: false
  failed_when: false
  when: dev_tools_manifest['golangci-lint'] is defined

- name: Install golangci-lint via go install
  ansible.builtin.command:
    cmd: "/usr/local/go/bin/go install {{ dev_tools_manifest['golangci-lint'].go_package }}@v{{ dev_tools_manifest['golangci-lint'].version }}"
  environment:
    GOPATH: "{{ dev_tools_gopath }}"
    GOBIN: "{{ dev_tools_gopath }}/bin"
  changed_when: true
  when:
    - dev_tools_manifest['golangci-lint'] is defined
    - dev_tools_golangci_current.rc != 0 or dev_tools_manifest['golangci-lint'].version not in (dev_tools_golangci_current.stdout | default(''))

- name: Check gofumpt version
  ansible.builtin.command: "{{ dev_tools_gopath }}/bin/gofumpt --version"
  register: dev_tools_gofumpt_current
  changed_when: false
  failed_when: false
  when: dev_tools_manifest.gofumpt is defined

- name: Install gofumpt via go install
  ansible.builtin.command:
    cmd: "/usr/local/go/bin/go install {{ dev_tools_manifest.gofumpt.go_package }}@v{{ dev_tools_manifest.gofumpt.version }}"
  environment:
    GOPATH: "{{ dev_tools_gopath }}"
    GOBIN: "{{ dev_tools_gopath }}/bin"
  changed_when: true
  when:
    - dev_tools_manifest.gofumpt is defined
    - dev_tools_gofumpt_current.rc != 0 or dev_tools_manifest.gofumpt.version not in (dev_tools_gofumpt_current.stdout | default(''))

- name: Check protoc-gen-go version
  ansible.builtin.command: "{{ dev_tools_gopath }}/bin/protoc-gen-go --version"
  register: dev_tools_protoc_gen_go_current
  changed_when: false
  failed_when: false
  when: dev_tools_manifest['protoc-gen-go'] is defined

- name: Install protoc-gen-go via go install
  ansible.builtin.command:
    cmd: "/usr/local/go/bin/go install {{ dev_tools_manifest['protoc-gen-go'].go_package }}@v{{ dev_tools_manifest['protoc-gen-go'].version }}"
  environment:
    GOPATH: "{{ dev_tools_gopath }}"
    GOBIN: "{{ dev_tools_gopath }}/bin"
  changed_when: true
  when:
    - dev_tools_manifest['protoc-gen-go'] is defined
    - dev_tools_protoc_gen_go_current.rc != 0 or dev_tools_manifest['protoc-gen-go'].version not in (dev_tools_protoc_gen_go_current.stdout | default(''))

- name: Check protoc-gen-go-grpc version
  ansible.builtin.command: "{{ dev_tools_gopath }}/bin/protoc-gen-go-grpc --version"
  register: dev_tools_protoc_gen_go_grpc_current
  changed_when: false
  failed_when: false
  when: dev_tools_manifest['protoc-gen-go-grpc'] is defined

- name: Install protoc-gen-go-grpc via go install
  ansible.builtin.command:
    cmd: "/usr/local/go/bin/go install {{ dev_tools_manifest['protoc-gen-go-grpc'].go_package }}@v{{ dev_tools_manifest['protoc-gen-go-grpc'].version }}"
  environment:
    GOPATH: "{{ dev_tools_gopath }}"
    GOBIN: "{{ dev_tools_gopath }}/bin"
  changed_when: true
  when:
    - dev_tools_manifest['protoc-gen-go-grpc'] is defined
    - >-
      dev_tools_protoc_gen_go_grpc_current.rc != 0 or
      dev_tools_manifest['protoc-gen-go-grpc'].version not in
      (dev_tools_protoc_gen_go_grpc_current.stdout | default(''))

# ============================================================================
# pipx: ansible
# ============================================================================

- name: Ensure pipx is available
  ansible.builtin.apt:
    name: pipx
    state: present

- name: Install ansible-core via pipx
  ansible.builtin.command:
    cmd: "pipx install ansible-core=={{ dev_tools_manifest.ansible.version }}"
  environment:
    PIPX_HOME: /opt/pipx
    PIPX_BIN_DIR: /usr/local/bin
  register: dev_tools_pipx_ansible
  changed_when: "'installed package' in dev_tools_pipx_ansible.stdout"
  failed_when:
    - dev_tools_pipx_ansible.rc != 0
    - "'already seems to be installed' not in (dev_tools_pipx_ansible.stdout + dev_tools_pipx_ansible.stderr)"
  when: dev_tools_manifest.ansible is defined

- name: Verify Ansible version
  ansible.builtin.command: /usr/local/bin/ansible --version
  register: dev_tools_ansible_version_check
  changed_when: false
  failed_when: "dev_tools_manifest.ansible.version not in dev_tools_ansible_version_check.stdout"
  when: dev_tools_manifest.ansible is defined

- name: Check ansible-lint version
  ansible.builtin.command: /usr/local/bin/ansible-lint --version
  register: dev_tools_ansible_lint_current
  changed_when: false
  failed_when: false
  when:
    - dev_tools_manifest.ansible is defined
    - dev_tools_manifest['ansible-lint'] is defined

- name: Install ansible-lint into the ansible-core pipx environment
  ansible.builtin.command:
    cmd: >-
      pipx inject --include-apps ansible-core
      ansible-lint=={{ dev_tools_manifest['ansible-lint'].version }}
  environment:
    PIPX_HOME: /opt/pipx
    PIPX_BIN_DIR: /usr/local/bin
  changed_when: true
  when:
    - dev_tools_manifest.ansible is defined
    - dev_tools_manifest['ansible-lint'] is defined
    - dev_tools_ansible_lint_current.rc != 0
      or dev_tools_manifest['ansible-lint'].version not in (dev_tools_ansible_lint_current.stdout | default(''))

- name: Verify ansible-lint version
  ansible.builtin.command: /usr/local/bin/ansible-lint --version
  register: dev_tools_ansible_lint_version_check
  changed_when: false
  failed_when: "dev_tools_manifest['ansible-lint'].version not in dev_tools_ansible_lint_version_check.stdout"
  when:
    - dev_tools_manifest.ansible is defined
    - dev_tools_manifest['ansible-lint'] is defined

- name: Install required Ansible collections
  ansible.builtin.command:
    cmd: "/usr/local/bin/ansible-galaxy collection install -r {{ playbook_dir }}/../requirements.yml"
  register: dev_tools_galaxy_result
  changed_when: >-
    'Installing' in (dev_tools_galaxy_result.stdout + dev_tools_galaxy_result.stderr)
    or 'Downloading' in (dev_tools_galaxy_result.stdout + dev_tools_galaxy_result.stderr)
  when: dev_tools_manifest.ansible is defined

# ============================================================================
# apt: crun, debootstrap
# ============================================================================

- name: Install apt packages
  ansible.builtin.apt:
    name:
      - crun
      - debootstrap
    state: present
