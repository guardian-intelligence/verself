---
# Seed HyperDX admin user on first run via registration API.
# Credentials are generated by Ansible's password lookup and persisted
# in the local .credentials/ directory (one file per secret).

- name: Check if a team already exists (via MongoDB)
  ansible.builtin.command: >
    mongosh --quiet --eval "db.teams.countDocuments()" hyperdx
  register: hyperdx_team_count
  changed_when: false

- name: Set seeding needed fact
  ansible.builtin.set_fact:
    hyperdx_needs_seed: "{{ hyperdx_team_count.stdout | trim | int == 0 }}"

- name: Set admin credentials from password lookup
  ansible.builtin.set_fact:
    hyperdx_admin_email: >-
      {{ hyperdx_admin_email | default(
           'admin+' ~ lookup('password', credentials_dir ~ '/hyperdx_admin_email_slug length=6 chars=ascii_lowercase,digits') ~ '@forge-metal.local',
           true
         ) }}
    hyperdx_admin_password: >-
      {{ hyperdx_admin_password | default(
           lookup('password', credentials_dir ~ '/hyperdx_admin_password length=24 chars=ascii_letters,digits') ~ '#@F1',
           true
         ) }}
  when: hyperdx_needs_seed | bool
  no_log: true

- name: Create HyperDX credentials directory
  ansible.builtin.file:
    path: "{{ hyperdx_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: hyperdx_needs_seed | bool

- name: Seed admin user via registration API
  ansible.builtin.uri:
    url: "http://localhost:{{ hyperdx_app_port }}/api/register/password"
    method: POST
    body_format: json
    body:
      email: "{{ hyperdx_admin_email }}"
      password: "{{ hyperdx_admin_password }}"
      confirmPassword: "{{ hyperdx_admin_password }}"
    status_code: [200]
    headers:
      Content-Type: application/json
  when: hyperdx_needs_seed | bool
  no_log: true
  retries: 5
  delay: 3
  register: hyperdx_seed_result
  until: hyperdx_seed_result is not failed

- name: Remove legacy HyperDX admin credentials file from server
  ansible.builtin.file:
    path: "{{ hyperdx_config_dir }}/admin-credentials.txt"
    state: absent
