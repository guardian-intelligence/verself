---
# MongoDB for HyperDX application state.
# Installed via apt because there is no practical Nix binary-cache path here.

- name: Add MongoDB GPG key
  ansible.builtin.apt_key:
    url: "https://www.mongodb.org/static/pgp/server-{{ hyperdx_mongodb_version }}.asc"
    keyring: /usr/share/keyrings/mongodb-server-{{ hyperdx_mongodb_version }}.gpg
    state: present

- name: Add MongoDB repository (jammy for noble compat)
  ansible.builtin.apt_repository:
    repo: >-
      deb [ signed-by=/usr/share/keyrings/mongodb-server-{{ hyperdx_mongodb_version }}.gpg ]
      https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/{{ hyperdx_mongodb_version }} multiverse
    state: present

- name: Install MongoDB
  ansible.builtin.apt:
    name: mongodb-org
    state: present
    update_cache: true

- name: Ensure MongoDB data directory exists
  ansible.builtin.file:
    path: /var/lib/mongodb
    state: directory
    owner: mongodb
    group: mongodb
    mode: "0755"

- name: Enable and start MongoDB
  ansible.builtin.systemd:
    name: mongod
    enabled: true
    state: started
