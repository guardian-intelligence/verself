---
argument_specs:
  main:
    short_description: "HyperDX UI/API plus MongoDB-backed application state"
    description:
      - "Installs MongoDB for HyperDX application state, builds HyperDX from"
      - "source, writes the runtime environment, and seeds the initial admin"
      - "account."
    options:
      hyperdx_mongodb_version:
        type: str
        default: "7.0"
        description: "MongoDB major version for HyperDX app state."

      hyperdx_repo:
        type: str
        default: "https://github.com/hyperdxio/hyperdx.git"
        description: "HyperDX git repository URL."

      hyperdx_branch:
        type: str
        default: main
        description: "Git branch to fetch from."

      hyperdx_version:
        type: str
        default: "676e4f4bc91f7b67448b3be6d9bc5cbc3a004964"
        description: "Pinned commit SHA to checkout."

      hyperdx_api_port:
        type: int
        default: 8000
        description: "HyperDX API server port."

      hyperdx_app_port:
        type: int
        default: 8080
        description: "HyperDX frontend port."

      hyperdx_opamp_port:
        type: int
        default: 4320
        description: "HyperDX OpAMP port for OTel agent management."

      hyperdx_install_dir:
        type: path
        default: /opt/hyperdx
        description: "HyperDX installation directory."

      hyperdx_config_dir:
        type: path
        default: /etc/hyperdx
        description: "Directory for HyperDX runtime configuration and credentials."

      hyperdx_env_file:
        type: path
        description: "Rendered HyperDX environment file consumed by systemd."

      hyperdx_subdomain:
        type: str
        default: admin
        description: "Subdomain prefix for the HyperDX dashboard."

      hyperdx_domain:
        type: str
        description: "Full domain for the HyperDX dashboard."

      hyperdx_admin_email:
        type: str
        required: false
        description: "Admin email for HyperDX."

      hyperdx_admin_password:
        type: str
        required: false
        description: "Admin password for HyperDX."

      clickhouse_http_port:
        type: int
        required: true
        description: "ClickHouse HTTP interface port for the default HyperDX connection."

      fm_bin:
        type: path
        required: true
        description: "Path to the Nix server profile bin directory."
