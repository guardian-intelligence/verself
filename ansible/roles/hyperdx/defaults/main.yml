---
# HyperDX defaults.
hyperdx_mongodb_version: "7.0"
hyperdx_repo: "https://github.com/hyperdxio/hyperdx.git"
hyperdx_branch: "main"
hyperdx_version: "676e4f4bc91f7b67448b3be6d9bc5cbc3a004964"  # main @ 2026-04-02
hyperdx_api_port: 8000
hyperdx_app_port: 8080
hyperdx_opamp_port: 4320
hyperdx_install_dir: /opt/hyperdx
hyperdx_config_dir: /etc/hyperdx
hyperdx_env_file: "{{ hyperdx_config_dir }}/hyperdx.env"

# Subdomain prefix for the HyperDX dashboard.
hyperdx_subdomain: admin

# Full domain: auto-derived as <subdomain>.<forge_metal_domain>.
hyperdx_domain: "{{ hyperdx_subdomain }}.{{ forge_metal_domain }}"

# Admin user (seeded on first run via registration API)
# Email and password generated at deploy time if not set.
# hyperdx_admin_email: ""
# hyperdx_admin_password: ""
