---
- name: Reload systemd
  listen: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart HyperDX API
  listen: restart hyperdx-api
  ansible.builtin.systemd:
    name: hyperdx-api
    state: restarted

- name: Restart HyperDX App
  listen: restart hyperdx-app
  ansible.builtin.systemd:
    name: hyperdx-app
    state: restarted
