---
# Firecracker host setup: KVM, jailer directories, golden zvol, kernel.
# CI artifacts (vmlinux, rootfs.ext4) are built by scripts/build-guest-rootfs.sh
# and pre-staged to /var/lib/ci/ before this role runs.

# --- KVM ---

- name: Ensure iptables is installed
  ansible.builtin.apt:
    name: iptables
    state: present
    update_cache: true

- name: Ensure KVM module is loaded
  community.general.modprobe:
    name: kvm_amd
    state: present
  failed_when: false

- name: Verify /dev/kvm exists
  ansible.builtin.stat:
    path: /dev/kvm
  register: dev_kvm

- name: Fail if KVM is not available
  ansible.builtin.fail:
    msg: "/dev/kvm does not exist. Ensure KVM is enabled in BIOS and kvm_amd/kvm_intel is loaded."
  when: not dev_kvm.stat.exists

# --- ZFS ARC tuning ---

- name: Set ZFS ARC max to prevent VM OOM
  ansible.builtin.copy:
    content: "options zfs zfs_arc_max={{ fc_zfs_arc_max_bytes }}\n"
    dest: /etc/modprobe.d/zfs-arc.conf
    mode: "0644"
  notify: rebuild initramfs

# --- Jailer user and directories ---

- name: Create firecracker group
  ansible.builtin.group:
    name: "{{ fc_jailer_user }}"
    gid: "{{ fc_jailer_gid }}"
    state: present

- name: Create firecracker user
  ansible.builtin.user:
    name: "{{ fc_jailer_user }}"
    uid: "{{ fc_jailer_uid }}"
    group: "{{ fc_jailer_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: false

- name: Create jailer root directory
  ansible.builtin.file:
    path: "{{ fc_jailer_root }}"
    state: directory
    mode: "0755"

- name: Create CI directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /var/lib/ci
    - /var/lib/ci/net
    - "{{ fc_net_lease_dir }}"

- name: Install Firecracker host networking setup script
  ansible.builtin.template:
    src: firecracker-network-setup.sh.j2
    dest: /usr/local/bin/forge-metal-firecracker-network-setup
    mode: "0755"
  notify: restart firecracker networking

- name: Install Firecracker host networking service
  ansible.builtin.template:
    src: forge-metal-firecracker-network.service.j2
    dest: /etc/systemd/system/forge-metal-firecracker-network.service
    mode: "0644"
  notify: restart firecracker networking

- name: Ensure Firecracker host networking service is enabled and started
  ansible.builtin.systemd:
    name: forge-metal-firecracker-network.service
    enabled: true
    state: started
    daemon_reload: true

# --- Guest artifact verification ---
# Artifacts built by scripts/build-guest-rootfs.sh, pre-staged to /var/lib/ci/.

- name: Verify CI kernel exists
  ansible.builtin.stat:
    path: "{{ fc_kernel_path }}"
  register: ci_kernel

- name: Verify CI rootfs exists
  ansible.builtin.stat:
    path: "{{ fc_rootfs_path }}"
  register: ci_rootfs

- name: Fail if CI artifacts are missing
  ansible.builtin.fail:
    msg: >
      CI artifacts not found at {{ fc_kernel_path }} and/or {{ fc_rootfs_path }}.
      Build with: sudo scripts/build-guest-rootfs.sh
  when: not ci_kernel.stat.exists or not ci_rootfs.stat.exists

# --- Golden zvol ---

- name: Check if golden zvol exists
  ansible.builtin.command: "zfs list -H {{ fc_zfs_pool }}/{{ fc_golden_zvol }}"
  register: golden_zvol_check
  changed_when: false
  failed_when: false

- name: Create golden zvol
  ansible.builtin.command: >
    zfs create -V {{ fc_golden_zvol_size }}
    -o volblocksize=16K
    -o compression=lz4
    {{ fc_zfs_pool }}/{{ fc_golden_zvol }}
  when: golden_zvol_check.rc != 0

- name: Wait for zvol device node
  ansible.builtin.wait_for:
    path: "/dev/zvol/{{ fc_zfs_pool }}/{{ fc_golden_zvol }}"
    state: present
    timeout: 10
  when: golden_zvol_check.rc != 0

- name: Check if golden snapshot exists
  ansible.builtin.command: "zfs list -H {{ fc_zfs_pool }}/{{ fc_golden_zvol }}@ready"
  register: golden_snap_check
  changed_when: false
  failed_when: false

- name: Compute CI rootfs checksum
  ansible.builtin.command: "sha256sum {{ fc_rootfs_path }}"
  register: ci_rootfs_sha256
  changed_when: false

- name: Check recorded golden rootfs checksum
  ansible.builtin.stat:
    path: "{{ fc_rootfs_hash_record }}"
  register: golden_rootfs_hash_stat

- name: Read recorded golden rootfs checksum
  ansible.builtin.slurp:
    src: "{{ fc_rootfs_hash_record }}"
  register: golden_rootfs_hash
  when: golden_rootfs_hash_stat.stat.exists

- name: Decide whether the base golden needs refresh
  ansible.builtin.set_fact:
    fc_refresh_base_golden_needed: >-
      {{
        fc_refresh_base_golden
        or golden_zvol_check.rc != 0
        or golden_snap_check.rc != 0
        or not golden_rootfs_hash_stat.stat.exists
        or ((golden_rootfs_hash.content | default('') | b64decode | trim) != (ci_rootfs_sha256.stdout.split()[0] | trim))
      }}

- name: Prune repo goldens before base golden refresh
  ansible.builtin.command: "zfs destroy -r {{ fc_zfs_pool }}/repo-goldens"
  when:
    - fc_refresh_base_golden_needed
    - fc_prune_repo_goldens_on_refresh
  failed_when: false
  changed_when: true

- name: Prune CI job clones before base golden refresh
  ansible.builtin.shell: |
    set -euo pipefail
    zfs list -H -o name -r {{ fc_zfs_pool }}/{{ fc_ci_dataset }} | tail -n +2 | xargs -r -n1 zfs destroy -r
  args:
    executable: /bin/bash
  when:
    - fc_refresh_base_golden_needed
    - fc_prune_ci_children_on_refresh
  changed_when: true

- name: Destroy old golden snapshot before refresh
  ansible.builtin.command: "zfs destroy {{ fc_zfs_pool }}/{{ fc_golden_zvol }}@ready"
  when:
    - fc_refresh_base_golden_needed
    - golden_snap_check.rc == 0

- name: Write ext4 rootfs to golden zvol
  ansible.builtin.command: >
    dd if={{ fc_rootfs_path }}
    of=/dev/zvol/{{ fc_zfs_pool }}/{{ fc_golden_zvol }}
    bs=1M conv=fsync status=progress
  when: fc_refresh_base_golden_needed

- name: Create golden snapshot
  ansible.builtin.command: "zfs snapshot {{ fc_zfs_pool }}/{{ fc_golden_zvol }}@ready"
  when: fc_refresh_base_golden_needed

- name: Record golden rootfs checksum
  ansible.builtin.copy:
    content: "{{ ci_rootfs_sha256.stdout.split()[0] }}\n"
    dest: "{{ fc_rootfs_hash_record }}"
    mode: "0644"
  when: fc_refresh_base_golden_needed

# --- CI dataset for job clones ---

- name: Ensure CI dataset exists
  community.general.zfs:
    name: "{{ fc_zfs_pool }}/{{ fc_ci_dataset }}"
    state: present
