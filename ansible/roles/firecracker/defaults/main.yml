---
# Firecracker host setup defaults.
fc_zfs_pool: benchpool
# HACK: Server currently uses golden-zvol2 because golden-zvol is stuck in
# "dataset is busy" state. forge-vm-run.sh has its own GOLDEN_SNAP constant
# that must match. TODO: unify into a single config source.
fc_golden_zvol: golden-zvol
fc_golden_zvol_size: 4G
fc_ci_dataset: ci
fc_jailer_root: /srv/jailer
fc_jailer_uid: 10000
fc_jailer_gid: 10000
fc_jailer_user: firecracker
fc_kernel_path: /var/lib/ci/vmlinux
fc_rootfs_path: /var/lib/ci/rootfs.ext4
fc_rootfs_hash_record: /var/lib/ci/golden-zvol.rootfs.sha256
fc_refresh_base_golden: false
fc_prune_repo_goldens_on_refresh: false
fc_prune_ci_children_on_refresh: false
fc_zfs_arc_max_bytes: 8589934592  # 8 GiB
fc_guest_pool_cidr: 172.16.0.0/16
fc_net_lease_dir: /var/lib/ci/net/leases
fc_host_uplink_interface: ""
