---
- name: Create credstore directory for billing
  ansible.builtin.file:
    path: /etc/credstore/billing
    state: directory
    owner: root
    group: billing
    mode: "0750"

- name: Deploy billing secrets environment file
  vars:
    billing_api_pg_host: "{{ services.postgresql.host }}"
    billing_api_pg_port: "{{ services.postgresql.port }}"
  ansible.builtin.copy:
    content: |
      BILLING_PG_DSN=postgres://billing:{{ postgresql_billing_password }}@{{ billing_api_pg_host }}:{{ billing_api_pg_port }}/sandbox?sslmode=disable
      STOREFRONT_PG_DSN=postgres://billing:{{ postgresql_billing_password }}@{{ billing_api_pg_host }}:{{ billing_api_pg_port }}/storefront?sslmode=disable
      STRIPE_SECRET_KEY={{ stripe_secret_key }}
      STRIPE_WEBHOOK_SECRET={{ stripe_webhook_secret }}
      BILLING_TB_ADDRESS={{ services.tigerbeetle.host }}:{{ services.tigerbeetle.port }}
      BILLING_TB_CLUSTER_ID={{ billing_api_tigerbeetle_cluster_id }}
      BILLING_CH_ADDRESS={{ services.clickhouse.host }}:{{ services.clickhouse.native_port }}
      BILLING_CH_PASSWORD={{ clickhouse_password }}
      BILLING_LISTEN_ADDR={{ services.billing.host }}:{{ services.billing.port }}
    dest: /etc/credstore/billing/secrets.env
    owner: root
    group: billing
    mode: "0640"
  no_log: true

- name: Remove legacy billing environment file
  ansible.builtin.file:
    path: /etc/forge-metal/billing.env
    state: absent
