---
# --- Verify binary ---

- name: Verify billing-server binary exists in Nix profile
  ansible.builtin.stat:
    path: "{{ fm_bin }}/billing-server"
  register: billing_api_binary
  failed_when: not billing_api_binary.stat.exists

# --- System user ---

- name: Create billing system group
  ansible.builtin.group:
    name: billing
    system: true

- name: Create billing system user
  ansible.builtin.user:
    name: billing
    group: billing
    system: true
    shell: /usr/sbin/nologin
    create_home: false

# --- nftables egress rules ---

- name: Deploy billing-api nftables ruleset
  ansible.builtin.template:
    src: billing.nft.j2
    dest: /etc/nftables.d/billing.nft
    mode: "0644"
  notify: reload nftables

- name: Apply billing-api nftables before proceeding
  ansible.builtin.meta: flush_handlers

# --- Schema migrations ---

- name: Include billing PostgreSQL migration tasks
  ansible.builtin.include_tasks: migrations.yml

# --- Credentials ---

- name: Include billing credential tasks
  ansible.builtin.include_tasks: credentials.yml

# --- systemd unit ---

- name: Deploy billing-api systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Billing API
      After=forge-metal-firewall.target network.target postgresql.service tigerbeetle.service
      Requires=forge-metal-firewall.target
      Wants=postgresql.service tigerbeetle.service

      [Service]
      Type=simple
      User=billing
      Group=billing
      EnvironmentFile=/etc/credstore/billing/secrets.env
      ExecStart={{ fm_bin }}/billing-server
      Restart=on-failure
      RestartSec=5
      ProtectSystem=strict
      ProtectHome=true
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectControlGroups=true
      NoNewPrivileges=true
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictNamespaces=true
      LockPersonality=true

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/billing-api.service
    mode: "0644"
  notify:
    - restart billing-api

- name: Apply billing-api unit changes before proceeding
  ansible.builtin.meta: flush_handlers

# --- Enable and start ---

- name: Enable and start billing-api
  ansible.builtin.systemd:
    name: billing-api
    enabled: true
    state: started
    daemon_reload: true

# --- Readiness gate ---

- name: Wait for billing-api to be ready
  ansible.builtin.wait_for:
    host: "{{ services.billing.host }}"
    port: "{{ services.billing.port }}"
    timeout: 30
