---
argument_specs:
  main:
    short_description: "Caddy edge proxy for HyperDX and Forgejo"
    description:
      - "Deploys Caddy from the Nix profile and renders the edge config that"
      - "fronts HyperDX and Forgejo with the shared WAF and access logging."
    options:
      caddy_waf_mode:
        type: str
        default: DetectionOnly
        description: "Coraza WAF mode. DetectionOnly logs only; On blocks."

      hyperdx_domain:
        type: str
        required: true
        description: "Public domain for the HyperDX dashboard."

      hyperdx_app_port:
        type: int
        required: true
        description: "Local HyperDX frontend port proxied by Caddy."

      forgejo_domain:
        type: str
        required: true
        description: "Public domain for Forgejo."

      forgejo_port:
        type: int
        required: true
        description: "Local Forgejo HTTP port proxied by Caddy."

      fm_bin:
        type: path
        required: true
        description: "Path to the Nix server profile bin directory."
