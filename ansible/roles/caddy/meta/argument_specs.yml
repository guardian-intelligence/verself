---
argument_specs:
  main:
    short_description: "Caddy edge proxy for Billing API, HyperDX, Forgejo, and Zitadel"
    description:
      - "Deploys Caddy from the Nix profile and renders the edge config that"
      - "fronts Billing API, HyperDX, Forgejo, and Zitadel with the shared WAF and access logging."
      - "Billing API exposes only /webhooks/stripe publicly; all other paths return 404."
      - "Zitadel uses h2c (HTTP/2 cleartext) for gRPC on the same port."
      - "Service ports come from the services registry (group_vars/all/services.yml)."
    options:
      caddy_waf_mode:
        type: str
        default: DetectionOnly
        description: >-
          Coraza WAF mode. Default remains DetectionOnly because HyperDX sends
          legitimate text/plain SQL requests through /api/clickhouse-proxy and
          the stock CRS ruleset currently produces false positives there.

      billing_api_domain:
        type: str
        required: true
        description: "Public domain for the Billing API (only /webhooks/stripe exposed)."

      hyperdx_domain:
        type: str
        required: true
        description: "Public domain for the HyperDX dashboard."

      forgejo_domain:
        type: str
        required: true
        description: "Public domain for Forgejo."

      zitadel_domain:
        type: str
        required: true
        description: "Public domain for Zitadel (h2c reverse proxy)."

      fm_bin:
        type: path
        required: true
        description: "Path to the Nix server profile bin directory."
