---
# Sealed Verdaccio npm mirror for worker nodes.
# Verdaccio is not in nixpkgs, so we install it via the Nix-provided npm.

- name: Install Verdaccio via npm
  ansible.builtin.command: "{{ fm_bin }}/npm install -g verdaccio@{{ verdaccio_version }}"
  args:
    creates: /opt/forge-metal/profile/lib/node_modules/verdaccio
  environment:
    PATH: "{{ fm_bin }}:{{ ansible_env.PATH }}"

- name: Create Verdaccio config directory
  ansible.builtin.file:
    path: /etc/verdaccio
    state: directory
    mode: "0755"

- name: Deploy Verdaccio config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/verdaccio/config.yaml
    mode: "0644"
  notify: restart verdaccio

- name: Deploy Verdaccio systemd unit
  ansible.builtin.template:
    src: verdaccio.service.j2
    dest: /etc/systemd/system/verdaccio.service
    mode: "0644"
  notify:
    - reload systemd
    - restart verdaccio

- name: Enable and start Verdaccio
  ansible.builtin.systemd:
    name: verdaccio
    enabled: true
    state: started
