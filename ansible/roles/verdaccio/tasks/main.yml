---
# Sealed Verdaccio npm mirror for worker nodes.
# Verdaccio is not in nixpkgs, so we install it via the Nix-provided npm into a
# writable prefix under /opt/forge-metal instead of the immutable Nix profile.

- name: Create Verdaccio system user
  ansible.builtin.user:
    name: verdaccio
    system: true
    home: /var/lib/verdaccio
    shell: /usr/sbin/nologin
    create_home: true

- name: Create Verdaccio install prefix
  ansible.builtin.file:
    path: "{{ verdaccio_install_prefix }}"
    state: directory
    mode: "0755"

- name: Set Verdaccio storage ownership
  ansible.builtin.file:
    path: /var/lib/verdaccio/storage
    state: directory
    owner: verdaccio
    group: verdaccio
    mode: "0755"

- name: Check installed Verdaccio version
  ansible.builtin.command: "{{ verdaccio_install_prefix }}/bin/verdaccio --version"
  register: verdaccio_installed_version
  changed_when: false
  failed_when: false

- name: Install Verdaccio via npm
  ansible.builtin.command: >
    {{ fm_bin }}/npm install --global
    --prefix {{ verdaccio_install_prefix }}
    verdaccio@{{ verdaccio_version }}
    --registry https://registry.npmjs.org
  when: verdaccio_installed_version.stdout | default('') | trim != verdaccio_version
  changed_when: true
  environment:
    PATH: "{{ fm_bin }}:{{ ansible_facts['env']['PATH'] }}"
    HOME: /root
  notify: restart verdaccio

- name: Install verdaccio-security-filter plugin
  ansible.builtin.command: >
    {{ fm_bin }}/npm install --global
    --prefix {{ verdaccio_install_prefix }}
    verdaccio-security-filter@{{ verdaccio_security_filter_version }}
    --registry https://registry.npmjs.org
  args:
    creates: "{{ verdaccio_install_prefix }}/lib/node_modules/verdaccio-security-filter"
  environment:
    PATH: "{{ fm_bin }}:{{ ansible_facts['env']['PATH'] }}"
    HOME: /root
  notify: restart verdaccio

- name: Create Verdaccio config directory
  ansible.builtin.file:
    path: /etc/verdaccio
    state: directory
    mode: "0755"

- name: Point npm at local Verdaccio
  ansible.builtin.copy:
    content: "registry=http://{{ services.verdaccio.host }}:{{ services.verdaccio.port }}\n"
    dest: /etc/npmrc
    mode: "0644"

- name: Ensure Verdaccio htpasswd file exists
  ansible.builtin.file:
    path: /etc/verdaccio/htpasswd
    state: touch
    owner: verdaccio
    group: verdaccio
    mode: "0640"

- name: Deploy Verdaccio config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/verdaccio/config.yaml
    mode: "0644"
  notify: restart verdaccio

- name: Deploy Verdaccio systemd unit
  ansible.builtin.template:
    src: verdaccio.service.j2
    dest: /etc/systemd/system/verdaccio.service
    mode: "0644"
  notify:
    - restart verdaccio

# ── Supply chain scanner dependencies ────────────────────────────
# These tools are invoked by `forge-metal ci scan-registry` during
# the mirror-update workflow. All are idempotent with creates: guards.

- name: Install js-x-ray for supply chain scanning
  ansible.builtin.command: >
    {{ fm_bin }}/npm install --global
    --prefix {{ verdaccio_install_prefix }}
    @nodesecure/js-x-ray@latest
    --registry https://registry.npmjs.org
  args:
    creates: "{{ verdaccio_install_prefix }}/lib/node_modules/@nodesecure/js-x-ray"
  environment:
    PATH: "{{ fm_bin }}:{{ ansible_facts['env']['PATH'] }}"
    HOME: /root

- name: Deploy jsxray-worker.mjs alongside forge-metal binary
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../internal/supplychain/jsxray-worker.mjs"
    dest: "{{ fm_bin }}/jsxray-worker.mjs"
    mode: "0644"

- name: Check if uv is installed
  ansible.builtin.stat:
    path: /usr/local/bin/uv
  register: verdaccio_uv_stat

- name: Download uv installer
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-install.sh
    mode: "0755"
  when: not verdaccio_uv_stat.stat.exists

- name: Install uv for Python tool management
  ansible.builtin.command: /tmp/uv-install.sh
  args:
    creates: /usr/local/bin/uv
  environment:
    UV_INSTALL_DIR: /usr/local/bin

- name: Install guarddog via uv tool
  ansible.builtin.command: >
    uv tool install guarddog=={{ verdaccio_guarddog_version }}
  args:
    creates: /root/.local/share/uv/tools/guarddog
  environment:
    PATH: "/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"
    HOME: /root

- name: Symlink guarddog into PATH
  ansible.builtin.file:
    src: /root/.local/bin/guarddog
    dest: /usr/local/bin/guarddog
    state: link
    force: true

- name: Download osv-scanner binary
  ansible.builtin.get_url:
    url: "{{ verdaccio_osv_scanner_url }}"
    dest: /usr/local/bin/osv-scanner
    checksum: "sha256:{{ verdaccio_osv_scanner_sha256 }}"
    mode: "0755"

- name: Create OSV-Scanner database directory
  ansible.builtin.file:
    path: /var/lib/osv-scanner
    state: directory
    mode: "0755"

- name: Enable and start Verdaccio
  ansible.builtin.systemd:
    name: verdaccio
    daemon_reload: true
    enabled: true
    state: started
