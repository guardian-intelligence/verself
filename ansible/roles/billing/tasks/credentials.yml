---
- name: Resolve billing credentials
  ansible.builtin.set_fact:
    billing_pg_password: "{{ lookup('password', credentials_dir + '/billing_pg_password length=32 chars=ascii_letters,digits') }}"
    billing_stripe_secret_key: "{{ lookup('password', credentials_dir + '/stripe_secret_key length=32 chars=ascii_letters,digits') }}"
    billing_stripe_webhook_secret: "{{ lookup('password', credentials_dir + '/stripe_webhook_secret length=32 chars=ascii_letters,digits') }}"
  no_log: true

- name: Deploy billing environment file
  ansible.builtin.copy:
    content: |
      BILLING_PG_DSN=postgres://billing:{{ billing_pg_password }}@127.0.0.1:5432/sandbox
      STOREFRONT_PG_DSN=postgres://billing:{{ billing_pg_password }}@127.0.0.1:5432/storefront
      STRIPE_SECRET_KEY={{ billing_stripe_secret_key | default('') }}
      STRIPE_WEBHOOK_SECRET={{ billing_stripe_webhook_secret | default('') }}
    dest: /etc/forge-metal/billing.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
