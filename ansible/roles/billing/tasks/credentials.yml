---
- name: Create credstore directory for billing
  ansible.builtin.file:
    path: /etc/credstore/billing
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy billing secrets environment file
  ansible.builtin.copy:
    content: |
      BILLING_PG_DSN=postgres://billing:{{ postgresql_billing_password }}@{{ services.postgresql.host }}:{{ services.postgresql.port }}/sandbox
      STOREFRONT_PG_DSN=postgres://billing:{{ postgresql_billing_password }}@{{ services.postgresql.host }}:{{ services.postgresql.port }}/storefront
      STRIPE_SECRET_KEY={{ stripe_secret_key }}
      STRIPE_WEBHOOK_SECRET={{ stripe_webhook_secret }}
      BILLING_TB_ADDRESS={{ services.tigerbeetle.host }}:{{ services.tigerbeetle.port }}
      BILLING_TB_CLUSTER_ID={{ billing_tigerbeetle_cluster_id }}
      BILLING_CH_ADDRESS={{ services.clickhouse.host }}:{{ services.clickhouse.native_port }}
      BILLING_CH_PASSWORD={{ clickhouse_password }}
      BILLING_LISTEN_ADDR=127.0.0.1:4242
    dest: /etc/credstore/billing/secrets.env
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Remove legacy billing environment file
  ansible.builtin.file:
    path: /etc/forge-metal/billing.env
    state: absent
