---
- name: Create credstore directory for billing
  ansible.builtin.file:
    path: /etc/credstore/billing
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy billing secrets environment file
  ansible.builtin.copy:
    content: |
      BILLING_PG_DSN=postgres://billing:{{ billing_pg_password }}@127.0.0.1:5432/sandbox
      STOREFRONT_PG_DSN=postgres://billing:{{ billing_pg_password }}@127.0.0.1:5432/storefront
      STRIPE_SECRET_KEY={{ stripe_secret_key }}
      STRIPE_WEBHOOK_SECRET={{ stripe_webhook_secret }}
    dest: /etc/credstore/billing/secrets.env
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Remove legacy billing environment file
  ansible.builtin.file:
    path: /etc/forge-metal/billing.env
    state: absent
