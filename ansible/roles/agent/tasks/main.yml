---
# Configure the forge-metal agent (bmci) on worker nodes.
# Binary provided by Nix server profile.

- name: Create forge-metal config directory
  ansible.builtin.file:
    path: /etc/forge-metal
    state: directory
    mode: "0755"

- name: Deploy agent config
  ansible.builtin.template:
    src: forge-metal.toml.j2
    dest: /etc/forge-metal/config.toml
    mode: "0640"
  notify: restart bmci-agent

- name: Deploy agent systemd unit
  ansible.builtin.template:
    src: bmci-agent.service.j2
    dest: /etc/systemd/system/bmci-agent.service
    mode: "0644"
  notify:
    - reload systemd
    - restart bmci-agent

- name: Enable and start bmci agent
  ansible.builtin.systemd:
    name: bmci-agent
    enabled: true
    state: started
    daemon_reload: true
